<style>
:root {
  --bg:#f4f7fb; --card:#ffffff; --ink:#172033; --muted:#64748b; --brand:#155e9f; --brand2:#0f766e;
  --line:#dbe7f3; --good:#d9f7e5; --good-border:#22a06b; --bad:#ffe1e1; --bad-border:#dc2626;
  --warn:#fff7d6; --shadow:0 12px 30px rgba(15,23,42,.08);
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#eaf3fc 0%,var(--bg) 260px);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;color:var(--ink);line-height:1.45}
header{padding:28px 16px 18px;text-align:center}
.header-card{max-width:980px;margin:0 auto;background:rgba(255,255,255,.84);border:1px solid var(--line);border-radius:24px;padding:24px;box-shadow:var(--shadow);backdrop-filter:blur(8px)}
h1{margin:0 0 8px;font-size:clamp(1.7rem,4vw,2.6rem);letter-spacing:-.03em;color:#12345a}
.subtitle{color:var(--muted);font-size:1.05rem}
.stats{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:18px}
.pill{background:#eef6ff;border:1px solid #cfe4ff;color:#164e83;padding:8px 12px;border-radius:999px;font-weight:700}
main{max-width:980px;margin:0 auto;padding:10px 16px 44px}
.toolbar{position:sticky;top:0;z-index:10;background:rgba(244,247,251,.93);border:1px solid var(--line);border-radius:18px;margin:10px 0 18px;padding:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;backdrop-filter:blur(8px)}
.btns{display:flex;gap:10px;flex-wrap:wrap}
button{border:0;border-radius:13px;padding:12px 16px;font-size:1rem;font-weight:800;cursor:pointer;transition:.15s transform,.15s opacity}
button:hover{transform:translateY(-1px)}
.primary{background:var(--brand);color:white}
.secondary{background:#e7eef7;color:#17324d}
.danger{background:#fee2e2;color:#991b1b}
.result{font-weight:900;font-size:1.05rem;color:#12345a}
.question-card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);margin:18px 0;overflow:hidden}
.q-head{background:linear-gradient(90deg,var(--brand),#2478bd);color:#fff;padding:12px 18px;font-weight:900;display:flex;justify-content:space-between;gap:10px;align-items:center}
.q-body{padding:18px}
.q-text{font-size:1.08rem;font-weight:650;margin-bottom:14px}
.choices{display:grid;gap:10px}
.choice{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fbfdff;cursor:pointer}
.choice input{margin-top:4px;transform:scale(1.2)}
.choice .letter{font-weight:900;color:#124f85;min-width:26px}
.choice.correct{background:var(--good);border-color:var(--good-border)}
.choice.incorrect{background:var(--bad);border-color:var(--bad-border)}
.choice.unselected-correct{background:var(--good);border-color:var(--good-border)}
.feedback{display:none;margin-top:14px;border-radius:14px;padding:13px;border:1px solid var(--line);background:#f8fafc}
.feedback.show{display:block}
.feedback b{color:#12345a}
.explanation{margin-top:8px;color:#334155}
.missed-only .question-card.correct-card{display:none}
.unanswered{outline:3px solid #facc15}
.footer-note{text-align:center;color:var(--muted);font-size:.9rem;margin-top:18px}
@media (max-width:640px){.toolbar{position:static}button{width:100%}.btns{width:100%}.result{width:100%;text-align:center}.q-body{padding:15px}}
</style>

<script>
const QUESTIONS = [{"number": 1, "question": "A 26-year-old woman presents with a 3-week cough that began with mild nasal congestion and malaise. Over the past 2 weeks she has experienced episodes of rapid-fire coughing followed by vomiting. She has been afebrile throughout. Lungs are clear. Which pathogen is responsible?", "choices": {"A": "Streptococcus pneumoniae", "B": "Mycoplasma pneumoniae", "C": "Bordetella pertussis", "D": "Influenza A", "E": "SARS-CoV-2"}, "answer": "C", "explanation": "Classic 3-stage pertussis presentation: catarrhal (cold symptoms) -> paroxysmal (rapid-fire cough + post- tussive emesis) -> convalescent. Afebrile throughout. Duration >2 weeks in an adult. B. pertussis toxin damages respiratory epithelium so cough does not equal active ongoing infection."}, {"number": 2, "question": "A 28-year-old father of a 2-month-old is diagnosed with pertussis (4 days of symptoms). Which management step is MOST important for preventing transmission to the infant?", "choices": {"A": "Avoid breastfeeding until symptomatic", "B": "Administer azithromycin and avoid contact with the infant until day 5 of antibiotic therapy", "C": "Hospitalize the infant prophylactically", "D": "Begin clarithromycin in the infant only", "E": "Recommend annual influenza vaccination for all household contacts"}, "answer": "B", "explanation": "Azithromycin x 5 days is first-line. Antibiotics reduce transmission, not clinical course. Infants <1 year account for 89% of pertussis-related deaths. Avoid contact with infant until day 5 of antibiotic therapy. Post-exposure prophylaxis is indicated for household contacts within 21 days of exposure regardless of vaccination status."}, {"number": 3, "question": "A 34-year-old woman presents to urgent care in January with abrupt onset fever (38.9°C), severe myalgias, and dry cough. Symptoms began mid-afternoon after feeling well in the morning. She denies anosmia or ageusia. O2 saturation is 98%. Which feature BEST distinguishes her likely diagnosis from COVID-19?", "choices": {"A": "Presence of dry cough", "B": "High fever >38.5°C", "C": "Abrupt onset with severe myalgias and no anosmia/ageusia", "D": "Normal oxygen saturation", "E": "Winter presentation"}, "answer": "C", "explanation": "Influenza = abrupt onset (hours), prominent systemic symptoms (high fever, severe myalgias), dry cough. COVID-19 more commonly causes anosmia/ageusia and has more gradual onset. The combination of abrupt onset + severe myalgias + no anosmia/ageusia is the most distinguishing feature of influenza."}, {"number": 4, "question": "A 4-year-old unvaccinated boy presents with 6 hours of high fever, drooling, muffled voice, and sitting in a tripod position. O2 sat is 92%. Lateral neck X-ray shows a \"thumbprint sign.\" What is the MOST appropriate immediate step?", "choices": {"A": "Obtain blood cultures, then start IV ceftriaxone", "B": "Perform direct laryngoscopy at the bedside", "C": "Secure the airway in a controlled setting with surgical backup", "D": "Administer nebulized racemic epinephrine", "E": "Discharge with oral amoxicillin and close follow-up"}, "answer": "C", "explanation": "Epiglottitis = airway emergency. NEVER agitate the patient or perform bedside laryngoscopy. Airway management must occur in a controlled setting with anesthesia/ENT immediately available for emergent surgical airway. IV ceftriaxone and blood cultures come AFTER airway is secured."}, {"number": 5, "question": "A 32-year-old construction worker in Indianapolis develops fever, nonproductive cough, and malaise 2 weeks after demolishing an old building. Chest CT shows diffuse miliary nodules. Urine antigen testing is positive. Which organism is responsible?", "choices": {"A": "Blastomyces dermatitidis", "B": "Coccidioides immitis", "C": "Histoplasma capsulatum", "D": "Aspergillus fumigatus", "E": "Cryptococcus neoformans"}, "answer": "C", "explanation": "Demolishing old buildings in Indianapolis (Ohio/Mississippi River valley endemic area) + miliary nodules on CT + positive urine antigen = Histoplasma capsulatum. Urine/serum antigen is the best initial test for acute pulmonary and disseminated histoplasmosis."}, {"number": 6, "question": "A 30-year-old returns from a camping trip along an Ontario riverbank. He has progressive cough, fever, and a painless nodular skin lesion on his arm. Chest X-ray shows a mass-like consolidation. The MOST likely diagnosis is:", "choices": {"A": "Histoplasmosis", "B": "Coccidioidomycosis", "C": "Sarcoidosis", "D": "Blastomycosis", "E": "Tuberculosis"}, "answer": "D", "explanation": "Ontario riverbank (Great Lakes region = Blastomyces endemic area) + painless nodular skin lesion (verrucous/ulcerative) + mass-like pulmonary consolidation = Blastomycosis. Histo gives miliary pattern. Cocci is southwestern US. Skin lesions are a key distinguishing feature of blastomycosis."}, {"number": 7, "question": "A 58-year-old woman with 4 antibiotic-requiring respiratory infections in the past year presents with daily productive cough for 2 years. CT shows bilateral bronchial wall thickening, airway dilation (broncho-arterial ratio >1), and mucus plugging. Spirometry: FEV1 62%, FEV1/FVC 0.64. Sputum grows Haemophilus influenzae. Which long-term therapy is MOST appropriate given ≥3 exacerbations/year?", "choices": {"A": "Daily high-dose inhaled corticosteroids", "B": "Azithromycin 250 mg daily (after baseline ECG)", "C": "Empiric four-drug anti-TB therapy", "D": "Surgical resection of affected lobes", "E": "Inhaled tobramycin prophylaxis"}, "answer": "B", "explanation": "Bronchiectasis with >=3 exacerbations/year = indication for long-term macrolide suppressive therapy. Azithromycin (250 mg daily or 500 mg 3x/week) reduces exacerbation frequency. Baseline ECG required to assess QTc before initiating. Surgical resection is reserved for localized disease refractory to medical management."}, {"number": 8, "question": "Which of the following COVID-19 treatments is the PREFERRED outpatient therapy for a high-risk patient with symptoms for 3 days?", "choices": {"A": "Remdesivir IV", "B": "Dexamethasone 6 mg oral", "C": "Nirmatrelvir-ritonavir (Paxlovid) PO x 5 days", "D": "Hydroxychloroquine", "E": "Ivermectin"}, "answer": "C", "explanation": "Nirmatrelvir-ritonavir (Paxlovid) is the preferred outpatient COVID-19 antiviral, initiated within 5 days of symptom onset. Remdesivir is IV for inpatients. Dexamethasone is for hospitalized patients requiring supplemental O2. Ivermectin and hydroxychloroquine are NOT recommended per evidence-based guidelines."}, {"number": 9, "question": "A 48-year-old HIV-positive man (CD4 450, undetectable viral load) has a positive T-SPOT test. CXR is normal. He is asymptomatic. Which statement is CORRECT?", "choices": {"A": "He has active TB and requires four-drug therapy", "B": "He has latent TB infection (LTBI) and should be treated to prevent progression", "C": "The positive T-SPOT is likely a false positive due to his antiretrovirals", "D": "Treatment is optional because his CD4 count is adequate", "E": "He needs 3 consecutive morning sputum AFB smears before treatment"}, "answer": "B", "explanation": "Positive T-SPOT + normal CXR + asymptomatic = LTBI. HIV is the strongest known risk factor for LTBI progressing to active TB (~8%/year in HIV vs ~0.1%/year in immunocompetent). All HIV-positive patients with LTBI should receive treatment regardless of CD4 count. Active TB requires positive culture and symptoms."}, {"number": 10, "question": "A patient has a positive AFB smear. Which additional finding CONFIRMS the diagnosis of active Mycobacterium tuberculosis (versus NTM)?", "choices": {"A": "Positive TST (>15 mm induration)", "B": "Positive AFB culture identifying M. tuberculosis", "C": "Bilateral hilar adenopathy on CXR", "D": "Elevated ESR and CRP", "E": "Positive Xpert MTB/RIF with RIF resistance detected"}, "answer": "B", "explanation": "AFB culture is the GOLD STANDARD for confirming active TB -- required for definitive diagnosis. AFB smear can be positive with non-tuberculosis mycobacteria (NTM). NAAT (Xpert MTB/RIF) rapidly detects MTB and rifampin resistance but culture provides definitive species identification and full drug susceptibility."}, {"number": 11, "question": "A 52-year-old woman from the Philippines with COPD presents with 4 weeks of progressive dyspnea, hemoptysis, and 8-lb weight loss. CXR shows a right upper lobe cavitary lesion. QuantiFERON is positive. AFB smear is positive. What is the FIRST-LINE treatment regimen for drug-susceptible active TB?", "choices": {"A": "Isoniazid + Rifampin x 9 months", "B": "Rifampin + Ethambutol x 6 months", "C": "Isoniazid + Rifampin + Pyrazinamide + Ethambutol x 2 months, then INH + RIF x 4 months", "D": "Isoniazid alone x 9 months", "E": "Azithromycin + Rifampin x 6 months"}, "answer": "C", "explanation": "Standard 6-month RIPE regimen: 2 months of Rifampin + Isoniazid + Pyrazinamide + Ethambutol (initial/intensive phase) followed by 4 months of INH + RIF (continuation phase). Total = 6 months. When drug susceptibility results are available, regimen can be adjusted accordingly."}, {"number": 12, "question": "A healthcare worker has a TST with 12 mm induration at 48 hours. She received BCG vaccine in Brazil 25 years ago. An IGRA (QuantiFERON) is negative. How should this be interpreted?", "choices": {"A": "TST positive; IGRA negative -- LTBI is confirmed and treatment required", "B": "TST positive likely due to BCG; negative IGRA argues against LTBI", "C": "Both tests must be positive to confirm LTBI", "D": "TST cutoff for healthcare workers is 5 mm; she is definitively positive", "E": "IGRA is unreliable in BCG-vaccinated individuals"}, "answer": "B", "explanation": "BCG vaccine causes false-positive TST (cross-reactivity) but does NOT affect IGRA results. A negative IGRA in a BCG-vaccinated person strongly argues against LTBI. IGRA is preferred for BCG-vaccinated individuals. The 10 mm cutoff applies to healthcare workers regardless of BCG status."}, {"number": 13, "question": "Which side effect of isoniazid (INH) can be prevented by co-administration of pyridoxine (vitamin B6)?", "choices": {"A": "Hepatotoxicity", "B": "Optic neuritis", "C": "Peripheral neuropathy", "D": "Hyperuricemia", "E": "Orange-colored secretions"}, "answer": "C", "explanation": "INH inhibits pyridoxine (vitamin B6) metabolism, causing peripheral neuropathy. Pyridoxine supplementation (25-50 mg/day) prevents this. Optic neuritis is a side effect of ethambutol. Hyperuricemia/gout is from pyrazinamide. Orange-colored secretions (urine, tears, sweat) are from rifampin. Hepatotoxicity from INH is not prevented by B6."}, {"number": 14, "question": "A 72-year-old man with CHF and HTN presents with confusion, productive cough, and fever (101°F) x 3 days. No hospitalizations in 5 years. RR 26, HR 126. Lung exam shows right lower lobe rales and egophony. CXR: right lower lobe consolidation. CURB-65 score is 3. What is the BEST empiric antibiotic regimen for inpatient non-ICU admission?", "choices": {"A": "Amoxicillin monotherapy PO", "B": "Piperacillin-tazobactam + vancomycin IV", "C": "Beta-lactam + macrolide (e.g., ceftriaxone + azithromycin)", "D": "TMP-SMX alone", "E": "Linezolid alone"}, "answer": "C", "explanation": "CURB-65 >=3 = hospitalization indicated. First-line for non-ICU inpatient CAP: beta-lactam + macrolide (ceftriaxone + azithromycin) OR respiratory fluoroquinolone monotherapy. No recent hospitalization or HAP risk factors, so broad coverage for MRSA/Pseudomonas is NOT indicated."}, {"number": 15, "question": "A 35-year-old man with diabetes presents with \"currant jelly\" sputum, high fever, and right upper lobe cavitary pneumonia. He has no recent hospitalization. Which pathogen is MOST likely?", "choices": {"A": "Pseudomonas aeruginosa", "B": "Klebsiella pneumoniae", "C": "Streptococcus pneumoniae", "D": "Legionella pneumophila", "E": "Mycoplasma pneumoniae"}, "answer": "B", "explanation": "Klebsiella pneumoniae: 'currant jelly' sputum (blood-tinged mucoid) + upper lobe cavitary pneumonia + diabetes (or alcoholism) = classic presentation. Gram-negative rod with mucoid capsule. Requires appropriate beta-lactam coverage (not ampicillin due to common resistance)."}, {"number": 16, "question": "A 28-year-old graduate student presents with 2 weeks of dry hacking cough, low-grade fever, headache, and malaise. CXR shows diffuse bilateral patchy interstitial infiltrates. His roommate had similar symptoms 3 weeks ago. Which pathogen is MOST likely and what is first-line treatment?", "choices": {"A": "S. pneumoniae -- amoxicillin", "B": "Legionella -- fluoroquinolone", "C": "Mycoplasma pneumoniae -- azithromycin", "D": "Influenza A -- oseltamivir", "E": "S. aureus -- vancomycin"}, "answer": "C", "explanation": "'Walking pneumonia' = Mycoplasma pneumoniae: young adult + cluster transmission (roommate) + gradual onset + dry hacking cough + bilateral interstitial infiltrates. Lacks cell wall = invisible on Gram stain + resistant to ALL beta-lactam antibiotics. First-line: macrolide (azithromycin) or doxycycline."}, {"number": 17, "question": "An HVAC technician presents with severe CAP unresponsive to beta-lactam antibiotics, diarrhea, hyponatremia, and elevated LFTs/ferritin. Which diagnostic test BEST identifies the causative organism?", "choices": {"A": "Blood cultures", "B": "Sputum Gram stain", "C": "Legionella urinary antigen", "D": "Multiplex respiratory PCR", "E": "Serum cold agglutinins"}, "answer": "C", "explanation": "Legionella classic triad: severe CAP unresponsive to beta-lactams + diarrhea + hyponatremia. Additional clues: elevated LDH, CK, ferritin; HVAC/aerosolized water exposure. Legionella urinary antigen detects serogroup 1 (most common). No person-to-person transmission. Treat with fluoroquinolone or macrolide."}, {"number": 18, "question": "A 72-year-old man who had cold symptoms last week (now improving) develops worsening fever, productive cough, and right lower lobe consolidation. Which pathogen is MOST likely causing his clinical deterioration?", "choices": {"A": "Influenza A", "B": "Klebsiella pneumoniae", "C": "Staphylococcus aureus", "D": "Mycoplasma pneumoniae", "E": "Neisseria meningitidis"}, "answer": "C", "explanation": "Post-viral bacterial pneumonia pattern: initial improvement from influenza -> clinical deterioration with new fever + productive cough + lobar/multilobar infiltrates = Staphylococcus aureus superinfection (also S. pneumoniae, H. influenzae). S. aureus accounts for many post-influenza pneumonia deaths. Consider MRSA coverage."}, {"number": 19, "question": "A hospitalized patient develops pneumonia 72 hours after admission. She has been on broad- spectrum antibiotics for 5 days and has known Pseudomonas colonization. Which empiric regimen is MOST appropriate?", "choices": {"A": "Azithromycin monotherapy", "B": "Single-agent piperacillin-tazobactam", "C": "Double anti-pseudomonal coverage (two different classes) + MRSA coverage", "D": "Vancomycin alone", "E": "Amoxicillin-clavulanate"}, "answer": "C", "explanation": "HAP/VAP with MDR risk factors (prior IV antibiotics >=5 days, prior hospitalization, Pseudomonas colonization) requires: TWO anti-pseudomonal agents from DIFFERENT classes + MRSA coverage (vancomycin or linezolid). Follow local antibiogram for specific agent selection. Single-agent coverage is inadequate."}, {"number": 20, "question": "A 15-year-old boy with asthma uses a daily low-dose ICS and albuterol PRN. He has nighttime awakenings twice weekly, uses albuterol 4x/week, and has exercise limitation. Per GINA, what step- up is MOST appropriate?", "choices": {"A": "Add oral prednisone daily", "B": "Step up to low-dose ICS-LABA or medium-dose ICS", "C": "Start biologic therapy (anti-IL-5)", "D": "Switch from ICS to LAMA monotherapy", "E": "Continue current therapy; reassess in 3 months"}, "answer": "B", "explanation": "Nighttime awakenings >1x/week + albuterol >2x/week + exercise limitation = not-well-controlled asthma at Step 2. Per GINA 2024, Step 3 for children >=6 years: low-dose ICS-LABA OR medium-dose ICS OR very low dose ICS-formoterol MART. Biologics are reserved for severe/refractory asthma at Step 5."}, {"number": 21, "question": "A patient in an asthma exacerbation has minimal wheezing despite significant respiratory distress and accessory muscle use. Which finding is MOST ominous?", "choices": {"A": "Tachycardia with HR 110", "B": "O2 saturation 93% on room air", "C": "Silent chest -- absence of wheezing in a distressed patient", "D": "Expiratory phase prolongation", "E": "Mild pulsus paradoxus"}, "answer": "C", "explanation": "Silent chest (absent wheezing in a severely distressed patient) indicates near-complete airway obstruction with insufficient airflow to generate a wheeze -- this is a pre-respiratory arrest finding. Paradoxically, the worse the obstruction, the less wheezing. Requires immediate aggressive intervention/intubation."}, {"number": 22, "question": "What distinguishes asthma from COPD on spirometry?", "choices": {"A": "Asthma: FEV1/FVC <0.70; COPD: normal ratio", "B": "Asthma shows significant post-bronchodilator reversibility (>=12% FEV1 and >=200 mL); COPD does not", "C": "COPD is associated with eosinophilic inflammation; asthma is neutrophilic", "D": "Asthma causes air trapping; COPD does not", "E": "Both can be definitively distinguished only by methacholine challenge"}, "answer": "B", "explanation": "Asthma = reversible obstruction: post-bronchodilator FEV1 increases >=12% AND >=200 mL absolute. COPD = fixed obstruction: post-BD FEV1/FVC remains <0.70 with minimal reversibility (<12% change). Both show FEV1/FVC <0.70 during obstruction. COPD = neutrophilic/CD8+; asthma = eosinophilic/CD4+."}, {"number": 23, "question": "Per GINA 2024, what is the PREFERRED reliever medication for adults with mild asthma (Step 1-2)?", "choices": {"A": "SABA (albuterol) alone", "B": "LAMA (tiotropium) alone", "C": "As-needed low-dose ICS-formoterol (anti-inflammatory reliever)", "D": "Oral corticosteroids PRN", "E": "Inhaled ipratropium PRN"}, "answer": "C", "explanation": "GINA 2024 changed first-line therapy from SABA-only to as-needed low-dose ICS-formoterol (anti- inflammatory reliever) at Steps 1-2. SABA-only relieves bronchoconstriction without addressing the underlying inflammation, increasing risk of severe exacerbations, hospitalizations, and asthma-related death."}, {"number": 24, "question": "A 62-year-old man with 45-pack-year smoking history has chronic productive cough, peripheral edema, and cyanosis. He is overweight. ABG: PaO2 52 mmHg, PaCO2 58 mmHg. FEV1/FVC post-BD = 0.58. Which COPD phenotype BEST describes him?", "choices": {"A": "Pink Puffer (emphysema-dominant)", "B": "Blue Bloater (chronic bronchitis-dominant)", "C": "Asthma-COPD overlap", "D": "Alpha-1 antitrypsin deficiency phenotype", "E": "Pure emphysema with air trapping"}, "answer": "B", "explanation": "'Blue Bloater' (chronic bronchitis-dominant): overweight + cyanosis + peripheral edema + chronic productive cough + hypercapnia (CO2 retention tolerated) + secondary polycythemia. 'Pink Puffer' (emphysema-dominant): thin/cachectic + pursed-lip breathing + maintains oxygenation at cost of increased work of breathing."}, {"number": 25, "question": "A 38-year-old non-smoker presents with dyspnea and FEV1/FVC <0.70. CT shows lower lobe panlobular emphysema. Family history of COPD. Which test should be ordered FIRST?", "choices": {"A": "High-resolution CT chest", "B": "Serum alpha-1 antitrypsin level", "C": "Methacholine challenge", "D": "DLCO only", "E": "CBC with eosinophil count"}, "answer": "B", "explanation": "Early-onset COPD (<40 years) + minimal/no smoking + lower lobe PANLOBULAR emphysema + family history = alpha-1 antitrypsin deficiency (AATD) until proven otherwise. GOLD guidelines recommend screening ALL COPD patients for AATD at initial diagnosis. PIZZ genotype (Glu342Lys mutation) causes most severe cases."}, {"number": 26, "question": "A COPD patient presents with worsening dyspnea, increased sputum production, and change in sputum color to yellow-green. He is managed outpatient. Which treatment combination is FIRST- LINE for mild-moderate AECOPD?", "choices": {"A": "IV corticosteroids + nebulized ipratropium only", "B": "SABA + short-course systemic corticosteroids (prednisone 40 mg x 5 days) + antibiotics", "C": "LABA alone", "D": "Oral theophylline", "E": "High-flow nasal cannula at home"}, "answer": "B", "explanation": "AECOPD triad: increased dyspnea + increased sputum volume + change in sputum character/purulence. Outpatient mild-moderate management: (1) rescue SABA as first-line bronchodilator, (2) short-course oral steroids (prednisone 40 mg x 5 days = equivalent to 14-day course), (3) antibiotics if >=2 cardinal symptoms present."}, {"number": 27, "question": "Which GOLD spirometric grade corresponds to FEV1 30-49% predicted with confirmed post- bronchodilator FEV1/FVC <0.70?", "choices": {"A": "GOLD Grade 1 (Mild)", "B": "GOLD Grade 2 (Moderate)", "C": "GOLD Grade 3 (Severe)", "D": "GOLD Grade 4 (Very Severe)", "E": "Cannot be graded without full PFTs"}, "answer": "C", "explanation": "GOLD Grades based on post-BD FEV1 % predicted: Grade 1 (Mild) = >=80%; Grade 2 (Moderate) = 50- 79%; Grade 3 (Severe) = 30-49%; Grade 4 (Very Severe) = <30%. FEV1 30-49% = GOLD Grade 3 Severe. Grade determines prognosis and escalation thresholds. GOLD Group (A/B/E) drives initial drug selection."}, {"number": 28, "question": "A severe COPD patient in the ICU with AECOPD has SpO2 84% and worsening hypercapnia. BiPAP is initiated. What is the target SpO2 range?", "choices": {"A": "95-100%", "B": "88-92%", "C": "85-88%", "D": "93-95%", "E": "Any SpO2 >90% is acceptable"}, "answer": "B", "explanation": "Severe COPD patients have chronic CO2 retention and rely partly on hypoxic ventilatory drive. Excess O2 causes Haldane effect (increased CO2 retention) and can worsen hypercapnia/respiratory acidosis. Target SpO2 88-92% in COPD exacerbations to balance adequate oxygenation without suppressing respiratory drive."}, {"number": 29, "question": "Which intervention has the STRONGEST evidence for improving survival in COPD?", "choices": {"A": "Long-acting bronchodilators (LABA/LAMA)", "B": "Inhaled corticosteroids", "C": "Smoking cessation", "D": "Long-term oxygen therapy in non-hypoxemic patients", "E": "Pulmonary rehabilitation"}, "answer": "C", "explanation": "Smoking cessation is the SINGLE MOST EFFECTIVE intervention to slow FEV1 decline and improve survival in COPD. LTOT improves survival ONLY in patients with severe resting hypoxemia (PaO2 <=55 mmHg, or <=60 mmHg with cor pulmonale/polycythemia). LABAs/LAMAs improve symptoms and reduce exacerbations but do not improve survival."}, {"number": 30, "question": "A 28-year-old woman has pleuritic chest pain after a viral illness. HR 82, SpO2 99%, no leg swelling, no estrogen use, no prior VTE. Clinical suspicion for PE is LOW and all PERC criteria are met. What is the BEST next step?", "choices": {"A": "CT pulmonary angiography", "B": "D-dimer", "C": "No further workup needed", "D": "Begin anticoagulation empirically", "E": "V/Q scan"}, "answer": "C", "explanation": "PERC (Pulmonary Embolism Rule-Out Criteria): if ALL 8 criteria are met in a LOW pretest probability patient, PE can be excluded without further testing. This patient meets all PERC criteria. PERC is ONLY valid when pretest probability is already LOW. Ordering D-dimer or CTPA would be inappropriate -- increases false positives, cost, radiation."}, {"number": 31, "question": "A 55-year-old man is started on apixaban for uncomplicated DVT. Which statement is CORRECT?", "choices": {"A": "He requires 5 days of parenteral anticoagulation before starting apixaban", "B": "Apixaban requires weekly INR monitoring", "C": "Apixaban can be started as a completely oral regimen (10 mg BID x 7 days, then 5 mg BID)", "D": "Apixaban must be bridged with warfarin", "E": "Apixaban is contraindicated if the DVT is provoked"}, "answer": "C", "explanation": "Apixaban and rivaroxaban are the two DOACs that can be initiated WITHOUT preceding parenteral anticoagulation (completely oral from the start). Apixaban: 10 mg BID x 7 days -> 5 mg BID. No INR monitoring required. Dabigatran and edoxaban require 5-day parenteral lead-in. Apixaban has lower bleeding risk vs warfarin."}, {"number": 32, "question": "A 68-year-old man is brought to the ED with acute dyspnea, hypotension (BP 82/50), tachycardia, and hypoxemia. CTPA confirms massive bilateral PE. What is the MOST appropriate next step?", "choices": {"A": "Immediate discharge with rivaroxaban", "B": "IV heparin and observation only", "C": "Systemic thrombolysis", "D": "Aspirin therapy", "E": "Oral apixaban and ICU monitoring"}, "answer": "C", "explanation": "Massive PE = hemodynamic instability (SBP <90 mmHg persisting >15 min). Requires urgent reperfusion therapy. Systemic thrombolysis is first-line if no absolute contraindications. Associated with 1.6% absolute mortality reduction (3.9% -> 2.3%) but ~10% major hemorrhage risk including intracranial bleeding."}, {"number": 33, "question": "Which component of Virchow's triad is MOST responsible for DVT in a post-operative hip replacement patient with 3 days of immobility?", "choices": {"A": "Endothelial injury", "B": "Hypercoagulability", "C": "Venous stasis", "D": "Platelet dysfunction", "E": "Arterial vasospasm"}, "answer": "C", "explanation": "Post-operative immobility (3 days of bed rest after hip replacement) = venous stasis -- the inactive calf muscle pump causes blood pooling in deep veins promoting clot formation. Endothelial injury from surgery itself is most prominent intraoperatively. Hypercoagulability is more characteristic of cancer or inherited thrombophilia."}, {"number": 34, "question": "A 58-year-old woman with active pancreatic cancer develops a DVT. What is the appropriate duration of anticoagulation?", "choices": {"A": "3 months, then discontinue", "B": "6 months, then discontinue", "C": "Extended (indefinite) anticoagulation while cancer is active", "D": "Anticoagulation is contraindicated in active cancer", "E": "3 months with aspirin transition"}, "answer": "C", "explanation": "Active cancer is a STRONG PERSISTENT risk factor for VTE -- creates a chronic hypercoagulable state. Guideline recommendation: extended/indefinite anticoagulation while cancer is active or until cancer is cured. DOACs preferred over LMWH for most cancers. Avoid in GI malignancy (edoxaban, rivaroxaban) due to increased GI bleeding risk."}, {"number": 35, "question": "A 30-year-old pregnant woman with suspected PE has a severe contrast allergy. CTPA is contraindicated. Which imaging study is PREFERRED?", "choices": {"A": "Compression ultrasound of legs only", "B": "Echocardiography", "C": "V/Q (ventilation-perfusion) scan", "D": "MRI pulmonary angiography", "E": "Chest X-ray only"}, "answer": "C", "explanation": "V/Q scan is the preferred alternative to CTPA when: (1) severe contrast allergy, (2) pregnancy (minimize radiation to fetus), (3) renal insufficiency. Echocardiography is useful for risk stratification but NOT diagnostic for PE. V/Q with high-probability pattern is diagnostic; normal V/Q effectively excludes PE."}, {"number": 36, "question": "Which long-term complication occurs in approximately 1-4% of PE survivors and is defined by persistent perfusion defects and elevated pulmonary artery pressure?", "choices": {"A": "Post-thrombotic syndrome", "B": "Chronic thromboembolic pulmonary hypertension (CTEPH)", "C": "Right heart failure from acute PE", "D": "Recurrent DVT", "E": "Post-PE syndrome with dyspnea"}, "answer": "B", "explanation": "CTEPH: chronic organized pulmonary emboli obstruct pulmonary arteries -> fixed vascular resistance -> PH. Affects 1-4% of PE survivors. Defined by mPAP >20 mmHg + perfusion defects >=3 months post-PE on V/Q scan. V/Q scan is the preferred initial diagnostic test (more sensitive than CTPA for CTEPH). PTE is potentially curative."}, {"number": 37, "question": "A 65-year-old woman with CHF presents with bilateral pleural effusions. Thoracentesis: pleural protein 2.1 g/dL (serum 6.8 g/dL), pleural LDH 145 U/L (serum 250 U/L). Pleural:serum protein ratio = 0.31; pleural:serum LDH ratio = 0.58. How should this effusion be classified?", "choices": {"A": "Exudative by all three Light's criteria", "B": "Transudative -- does not meet any Light's criteria for exudate", "C": "Indeterminate -- requires additional testing", "D": "Empyema based on LDH level", "E": "Exudative -- meets one Light's criterion (LDH ratio >0.6)"}, "answer": "B", "explanation": "Light's criteria for exudate -- ANY ONE met = exudate: (1) Pleural/serum protein >0.5 [0.31 -- NO], (2) Pleural/serum LDH >0.6 [0.58 -- NO], (3) Pleural LDH >2/3 ULN serum LDH [NO]. None of the three criteria are met = TRANSUDATIVE effusion, consistent with CHF. Diuresis is appropriate initial treatment."}, {"number": 38, "question": "A 25-year-old tall thin male smoker presents with sudden right-sided pleuritic chest pain and dyspnea. CXR shows a right pneumothorax with the lung edge 3 cm from the chest wall. He is hemodynamically stable, SpO2 96%. What is the MOST appropriate management?", "choices": {"A": "Immediate needle decompression at 2nd ICS, MCL", "B": "Supplemental O2 and observation with repeat CXR in 6 hours", "C": "Large bore chest tube (>16 Fr) immediately", "D": "Thoracoscopy with pleurodesis", "E": "Bilateral chest tubes"}, "answer": "B", "explanation": "Primary spontaneous pneumothorax in a stable patient. Per guidelines: <=2-3 cm from chest wall in a stable patient = observation with supplemental O2 (speeds reabsorption 3-4x) and repeat CXR in 6 hours. Most reabsorb within 10 days. Intervention (aspiration or chest tube) for >3 cm or significantly symptomatic."}, {"number": 39, "question": "A 68-year-old woman on anticoagulation falls and develops worsening dyspnea and hypotension. CXR shows fractured ribs 2-7 and a right pneumothorax measuring 3.3 cm. What is the NEXT appropriate step?", "choices": {"A": "Observation and repeat CXR in 6 hours", "B": "Needle decompression at 2nd ICS MCL", "C": "Chest tube placement", "D": "Therapeutic thoracentesis", "E": "Supplemental oxygen alone"}, "answer": "C", "explanation": "Traumatic pneumothorax measuring 3.3 cm (>3 cm) in a symptomatic, hemodynamically unstable patient on anticoagulation requires chest tube. Large bore tube (>=16 Fr) is preferred given fractured ribs and high risk for hemothorax from damaged intercostal vessels. This is NOT appropriate for observation alone."}, {"number": 40, "question": "In a patient with tension pneumothorax, which technique is used for EMERGENCY decompression?", "choices": {"A": "Chest tube at 4th-5th ICS, anterior axillary line", "B": "Needle decompression at 2nd intercostal space, midclavicular line", "C": "Thoracentesis at 7th ICS", "D": "Pericardiocentesis", "E": "Emergent thoracotomy"}, "answer": "B", "explanation": "Tension pneumothorax = MEDICAL EMERGENCY. Immediate needle decompression at 2nd ICS, midclavicular line (over superior border of 3rd rib) converts tension PTX to open PTX. MUST be followed by definitive chest tube placement. Do NOT wait for CXR confirmation if clinical diagnosis is clear -- delay can be fatal."}, {"number": 41, "question": "A pleural fluid analysis shows: pH 7.1, glucose 45 mg/dL, LDH markedly elevated, gram stain positive for bacteria. Which management is indicated?", "choices": {"A": "Chest tube drainage (complicated parapneumonic/empyema)", "B": "Antibiotics alone; re-tap in 48 hours", "C": "Diuresis -- this is a transudative effusion", "D": "Thoracentesis maximum 1.5 L, repeat as needed", "E": "All pneumonia-associated effusions require chest tube"}, "answer": "A", "explanation": "Complicated parapneumonic effusion/empyema: pH <7.2 + positive gram stain/culture + elevated LDH = requires chest tube drainage. The pleural fluid has been invaded by bacteria and/or frank pus is present. Simple parapneumonic effusions (pH >7.2, negative cultures, glucose >60) may resolve with antibiotics alone."}, {"number": 42, "question": "A 63-year-old ex-smoker (45 pack-years, quit 4 years ago) has an incidental 1.4 cm right upper lobe opacity with spiculated margins on CXR. He denies symptoms. What is the NEXT step?", "choices": {"A": "Observe with repeat CXR in 6 months", "B": "CT chest (mandatory) + PET-CT + tissue biopsy given high-risk features", "C": "Empiric antibiotics for presumed pneumonia", "D": "PET-CT only", "E": "Bronchoscopy immediately"}, "answer": "B", "explanation": "High-risk solitary pulmonary nodule: >8 mm + spiculated margins + upper lobe location + ex-heavy smoker + age >60. CT chest is MANDATORY (better characterizes than CXR). High-risk features -> PET-CT for metabolic activity. FDG-avid (positive PET) + high-risk -> tissue biopsy. Cannot observe high-risk nodule without further workup."}, {"number": 43, "question": "A 55-year-old nonsmoker woman with a peripheral lung mass is found to have adenocarcinoma on biopsy (TTF-1 positive). Before starting treatment, which test is MANDATORY?", "choices": {"A": "Sputum cytology", "B": "Molecular testing (NGS panel for EGFR, ALK, KRAS, ROS1, PD-L1)", "C": "Bone scan", "D": "Mediastinoscopy", "E": "Endobronchial biopsy"}, "answer": "B", "explanation": "Reflexive molecular testing (NGS panel for EGFR, ALK, KRAS, ROS1, BRAF, MET, RET, PD-L1) is the STANDARD OF CARE for advanced/metastatic NSCLC before initiating treatment. Adenocarcinoma in a nonsmoker is highly likely to harbor a targetable driver mutation (EGFR 40-50%, ALK 5-7%). Treatment selection depends entirely on molecular profile."}, {"number": 44, "question": "A 60-year-old smoker is found to have a central cavitary lung mass. Labs show serum calcium 12.8 mg/dL with low PTH and elevated PTHrP. Which lung cancer subtype is MOST likely?", "choices": {"A": "Adenocarcinoma", "B": "Small cell lung cancer (SCLC)", "C": "Squamous cell carcinoma", "D": "Large cell carcinoma", "E": "Carcinoid tumor"}, "answer": "C", "explanation": "Squamous cell carcinoma: central cavitary lung mass + hypercalcemia from PTHrP (parathyroid hormone- related peptide) secretion = paraneoplastic humoral hypercalcemia of malignancy. This is INDEPENDENT of bone metastases. Mnemonic: Squamous = PTHrP -> Hypercalcemia ('Bones, Stones, Groans, Psychic Moans')."}, {"number": 45, "question": "A 65-year-old man presents with shoulder pain radiating down the arm, hand weakness, and ptosis with miosis of the left eye. Chest MRI shows an apical lung mass with rib destruction. Which structures are invaded?", "choices": {"A": "Recurrent laryngeal nerve -- hoarseness", "B": "Cervical sympathetic chain (Horner syndrome) and brachial plexus (C8-T2)", "C": "Phrenic nerve -- hemidiaphragm elevation", "D": "Superior vena cava -- facial swelling", "E": "Esophagus -- dysphagia"}, "answer": "B", "explanation": "Pancoast tumor (superior sulcus): apical lung mass invades (1) cervical sympathetic chain (stellate ganglion) -> Horner syndrome: ipsilateral ptosis + miosis + anhidrosis AND (2) brachial plexus (C8, T1, T2) - > shoulder/axilla pain + hand intrinsic muscle weakness/atrophy. Classic triad: shoulder pain + hand weakness + Horner."}, {"number": 46, "question": "A patient with SCLC develops Na 122 mEq/L, serum hypoosmolality, and urine osmolality of 620 mOsm/kg. Which paraneoplastic syndrome explains this?", "choices": {"A": "Cushing syndrome from ectopic ACTH", "B": "SIADH from ectopic ADH production", "C": "Hypercalcemia from PTHrP secretion", "D": "Lambert-Eaton syndrome", "E": "Trousseau syndrome"}, "answer": "B", "explanation": "SCLC ectopic ADH (vasopressin) production -> SIADH -> renal free water retention -> dilutional hyponatremia + low serum osmolality + elevated urine osmolality/Na+. Treatment: fluid restriction for mild-moderate; hypertonic saline (3% NaCl) for Na <120 or symptomatic. CRITICAL: correct <=8-10 mEq/L per 24h to prevent osmotic demyelination syndrome."}, {"number": 47, "question": "A patient with proximal muscle weakness that IMPROVES with repeated use is found to have SCLC. Which paraneoplastic syndrome is present?", "choices": {"A": "Myasthenia gravis -- antibodies against AChR", "B": "Lambert-Eaton -- IgG antibodies against presynaptic P/Q-type Ca2+ channels", "C": "Guillain-Barre -- demyelination from anti-Hu antibodies", "D": "Peripheral neuropathy -- anti-Yo antibodies", "E": "Postsynaptic NMJ destruction"}, "answer": "B", "explanation": "Lambert-Eaton Myasthenic Syndrome (LEMS): proximal muscle WEAKNESS that IMPROVES with repeated use (post-tetanic potentiation) -- opposite of myasthenia gravis which WORSENS with use. IgG antibodies attack presynaptic voltage-gated Ca2+ channels -> impaired ACh vesicle release. EMG: low-amplitude action potentials that INCREASE with rapid repetitive stimulation. Associated with SCLC."}, {"number": 48, "question": "A patient with small cell lung cancer is diagnosed with limited-stage disease. What is the STANDARD treatment?", "choices": {"A": "Surgery alone", "B": "Chemotherapy alone", "C": "Concurrent chemotherapy + radiation therapy +/- prophylactic cranial irradiation", "D": "Targeted therapy with EGFR inhibitor", "E": "Immunotherapy (pembrolizumab) alone"}, "answer": "C", "explanation": "Limited-stage SCLC (confined to one hemithorax, can be encompassed in one radiation field) = curative intent. Standard treatment: concurrent platinum-based chemotherapy (etoposide-cisplatin) + thoracic radiation therapy. Consider prophylactic cranial irradiation (PCI) for complete responders. Median survival ~20 months; ~16% 5-year survival."}, {"number": 49, "question": "A 29-year-old African American woman has progressive dyspnea, dry cough, and fatigue. CXR shows bilateral hilar lymphadenopathy. Labs: elevated ACE, hypercalcemia. What is the MOST likely diagnosis and first-line treatment if symptomatic?", "choices": {"A": "Tuberculosis -- RIPE therapy", "B": "Lymphoma -- chemotherapy", "C": "Sarcoidosis -- corticosteroids", "D": "Histoplasmosis -- itraconazole", "E": "IPF -- nintedanib"}, "answer": "C", "explanation": "Classic sarcoidosis: young African American woman + bilateral hilar lymphadenopathy (most common radiographic finding) + elevated ACE (in ~60%) + hypercalcemia (granuloma-mediated 1-alpha- hydroxylase activity) + noncaseating granulomas on biopsy. First-line for symptomatic pulmonary or extrapulmonary disease = corticosteroids. Asymptomatic = observation (often self-resolves)."}, {"number": 50, "question": "A 68-year-old shipbuilder with progressive breathlessness has linear basilar opacities and calcified pleural plaques on imaging with digital clubbing. Which occupational lung disease is MOST likely?", "choices": {"A": "Silicosis", "B": "Coal workers' pneumoconiosis", "C": "Asbestosis", "D": "Berylliosis", "E": "Farmer's lung"}, "answer": "C", "explanation": "Asbestosis: shipbuilder/insulation worker + digital clubbing + LOWER lobe linear opacities + calcified pleural plaques = pathognomonic combination. Asbestos -> lower lobe fibrosis + pleural plaques. Silicosis -> upper lobe nodules + eggshell calcifications. Asbestosis also causes mesothelioma and bronchogenic carcinoma (synergistic with smoking)."}, {"number": 51, "question": "A 62-year-old male smoker has progressive exertional dyspnea. HRCT shows basal subpleural reticular opacities, honeycombing, and traction bronchiectasis without alternative diagnosis features. PFTs: FVC 58%, FEV1/FVC 0.82, DLCO markedly reduced. Which diagnosis and treatment is MOST appropriate?", "choices": {"A": "Sarcoidosis -- corticosteroids", "B": "Hypersensitivity pneumonitis -- antigen avoidance", "C": "Idiopathic pulmonary fibrosis (IPF) -- antifibrotics (nintedanib or pirfenidone)", "D": "Coal workers' pneumoconiosis -- corticosteroids", "E": "Cryptogenic organizing pneumonia -- corticosteroids"}, "answer": "C", "explanation": "Classic IPF (usual interstitial pneumonia pattern): older male smoker + basal subpleural honeycombing + traction bronchiectasis on HRCT + restrictive PFTs + decreased DLCO + no alternative diagnosis. Antifibrotics (nintedanib or pirfenidone) slow progression but don't reverse disease. Corticosteroids are NOT effective in IPF and should be avoided unless alternative diagnosis is suspected."}, {"number": 52, "question": "A bird keeper develops acute fever, chills, cough, and dyspnea 6 hours after cleaning bird cages. CT shows ground-glass opacities. BAL shows lymphocytosis. What is the diagnosis and MOST important treatment?", "choices": {"A": "Sarcoidosis -- corticosteroids", "B": "Hypersensitivity pneumonitis -- antigen avoidance", "C": "Blastomycosis -- itraconazole", "D": "Eosinophilic pneumonia -- corticosteroids", "E": "Asthma -- SABA and ICS"}, "answer": "B", "explanation": "Hypersensitivity pneumonitis (bird fancier's lung): symptoms 4-8 hours after antigen exposure (bird cage cleaning) + ground-glass opacities + BAL lymphocytosis. MOST IMPORTANT treatment = ANTIGEN AVOIDANCE. Without removing the causative antigen, disease will progress to irreversible fibrosis. Corticosteroids used for severe/chronic cases but avoidance is the cornerstone."}, {"number": 53, "question": "Granulomatosis with polyangiitis (GPA) classically involves which organ triad and what is the DIAGNOSTIC serologic marker?", "choices": {"A": "Lungs, liver, and skin -- ANA positive", "B": "Upper airways, lower airways, and kidneys -- c-ANCA (PR3)", "C": "Lungs, joints, and eyes -- p-ANCA (MPO)", "D": "Kidneys, skin, and joints -- anti-GBM antibodies", "E": "Lungs, heart, and nerves -- anti-dsDNA"}, "answer": "B", "explanation": "GPA (formerly Wegener's) classic triad: (1) upper respiratory tract (chronic sinusitis, epistaxis, saddle-nose deformity) + (2) lower respiratory tract (pulmonary nodules, cavities, hemoptysis) + (3) kidneys (hematuria, proteinuria, AKI from crescentic GN). Diagnostic marker: c-ANCA (anti-PR3 antibodies). Treatment: high-dose corticosteroids + rituximab or cyclophosphamide."}, {"number": 54, "question": "A 45-year-old woman with BMI 41 has PaCO2 52 mmHg, BMI >30, and sleep-disordered breathing with no other cause of hypoventilation. What is the diagnosis and first-line treatment?", "choices": {"A": "Obstructive sleep apnea -- CPAP alone", "B": "Obesity hypoventilation syndrome -- weight loss + NIPPV", "C": "Pulmonary fibrosis -- oxygen therapy", "D": "COPD -- bronchodilators", "E": "Central sleep apnea -- acetazolamide"}, "answer": "B", "explanation": "Obesity Hypoventilation Syndrome (OHS) diagnostic criteria: (1) BMI >30 + (2) PaCO2 >45 mmHg (daytime hypercapnia) + (3) sleep-disordered breathing + (4) exclusion of other causes of hypoventilation. 90% also have OSA which must be treated. Treatment: weight loss (most important long-term) + NIPPV/BiPAP. Avoid sedatives, opioids, alcohol."}, {"number": 55, "question": "A 72-year-old man with HFpEF is found to have elevated pulmonary artery pressure on echocardiography. Which PH group does he belong to?", "choices": {"A": "Group 1 (PAH)", "B": "Group 2 (left heart disease)", "C": "Group 3 (lung disease/hypoxia)", "D": "Group 4 (CTEPH)", "E": "Group 5 (multifactorial)"}, "answer": "B", "explanation": "HFpEF causes post-capillary (passive) pulmonary hypertension from elevated left atrial pressure transmitted back to pulmonary vasculature = PH Group 2 (left heart disease). This is the MOST COMMON cause of PH overall. Do NOT use Group 1 PAH-targeted medications (ERAs, PDE-5 inhibitors, prostacyclins) for Group 2 -- may worsen outcomes."}, {"number": 56, "question": "A 65-year-old woman with severe COPD and chronic hypoxia develops right ventricular hypertrophy and peripheral edema. Which condition describes this cardiac consequence?", "choices": {"A": "Pulmonary arterial hypertension (PAH)", "B": "Cor pulmonale", "C": "Left heart failure", "D": "Cardiac tamponade", "E": "Restrictive cardiomyopathy"}, "answer": "B", "explanation": "Cor pulmonale = RV dysfunction/failure caused by pulmonary hypertension from CHRONIC LUNG DISEASE (COPD most common cause, >50% of cases). Mechanism: chronic hypoxia -> pulmonary vasoconstriction - > increased PVR -> RV hypertrophy (compensated) -> RV dilation/failure (decompensated). By definition, EXCLUDES RV failure from left heart disease."}, {"number": 57, "question": "Which PH group is potentially CURABLE with surgical pulmonary thromboendarterectomy?", "choices": {"A": "Group 1 (PAH -- idiopathic)", "B": "Group 2 (left heart disease)", "C": "Group 3 (COPD)", "D": "Group 4 (CTEPH)", "E": "Group 5 (multifactorial)"}, "answer": "D", "explanation": "CTEPH (Group 4) is the ONLY potentially curable form of PH. Surgical pulmonary thromboendarterectomy (PTE) physically removes organized thrombus from pulmonary arteries and can be curative. Every patient with unexplained PH must have a V/Q scan to exclude CTEPH. Inoperable cases: riociguat (FDA-approved) + balloon pulmonary angioplasty + lifelong anticoagulation."}, {"number": 58, "question": "In PAH (Group 1), which test is the GOLD STANDARD to confirm the diagnosis and classify hemodynamic subtype?", "choices": {"A": "Echocardiography", "B": "V/Q scan", "C": "Right heart catheterization (RHC)", "D": "BNP/NT-proBNP level", "E": "CT pulmonary angiography"}, "answer": "C", "explanation": "Right heart catheterization (RHC) = gold standard for PH. Confirms mPAP >20 mmHg at rest, classifies hemodynamic subtype (pre-capillary: PAWP <=15 mmHg, PVR >=3 WU vs post-capillary: PAWP >15 mmHg), and guides Group 1 vs other classification. Echocardiography is the recommended first-line screening tool but does NOT confirm diagnosis."}, {"number": 59, "question": "A patient with PAH is started on combination therapy. Which drug class directly stimulates soluble guanylate cyclase (sGC) to increase nitric oxide-mediated vasodilation?", "choices": {"A": "ERA (bosentan)", "B": "PDE-5 inhibitor (sildenafil)", "C": "sGC stimulator (riociguat)", "D": "Prostacyclin analogue (epoprostenol)", "E": "Calcium channel blocker (nifedipine)"}, "answer": "C", "explanation": "Soluble guanylate cyclase (sGC) stimulators (riociguat): DIRECTLY stimulate sGC AND increase its sensitivity to endogenous NO -> increased cGMP -> vasodilation + decreased PVR. FDA-approved for both PAH (Group 1) AND inoperable/residual CTEPH (Group 4) -- the only drug approved for both. PDE-5 inhibitors prevent cGMP degradation but do not directly stimulate sGC."}, {"number": 60, "question": "When placing a chest tube for pneumothorax, at which site should the tube be directed?", "choices": {"A": "7th intercostal space at the posterior axillary line", "B": "2nd intercostal space at the midclavicular line (apical/anterior direction)", "C": "Subxiphoid approach", "D": "3rd intercostal space at the midclavicular line", "E": "4th intercostal space at the posterior axillary line"}, "answer": "B", "explanation": "For pneumothorax (air rises to apex anteriorly): chest tube directed to 2nd ICS midclavicular line (apical and anterior). For pleural effusion (fluid is gravity-dependent): 4th-5th ICS anterior axillary line. Critical anatomy: neurovascular bundle (vein, artery, nerve) runs under the INFERIOR surface of each rib -- ALWAYS advance over the SUPERIOR border of the rib below to avoid hemorrhage."}, {"number": 61, "question": "During chest tube placement with blunt dissection, the Kelly clamp should be advanced over the SUPERIOR border of the rib to avoid injury to which structure?", "choices": {"A": "Neurovascular bundle (vein, artery, nerve) running under the inferior rib", "B": "Pericardium", "C": "Internal mammary artery", "D": "Subclavian vein", "E": "Thoracic duct"}, "answer": "A", "explanation": "The intercostal neurovascular bundle (vein, artery, nerve) runs in the costal groove on the INFERIOR surface of each rib. Advancing the Kelly clamp or needle over the SUPERIOR border of the rib below avoids injury to this bundle. Laceration of the intercostal artery can cause significant hemorrhage as a procedural complication."}, {"number": 62, "question": "A patient with tuberculosis is admitted to the hospital. Which precaution type is REQUIRED?", "choices": {"A": "Standard precautions only", "B": "Droplet precautions (surgical mask)", "C": "Contact precautions (gown and gloves)", "D": "Airborne precautions (AIIR negative pressure room + N-95 mask)", "E": "Droplet + contact precautions"}, "answer": "D", "explanation": "Tuberculosis transmits via small droplet nuclei (<5 micrometers) that remain suspended in air for long periods and travel long distances = AIRBORNE transmission. Requires: (1) negative-pressure airborne infection isolation room (AIIR) + (2) N-95 respirator with proper fit testing for all healthcare workers entering. Also required for measles, varicella, disseminated herpes zoster."}, {"number": 63, "question": "A healthcare provider sustains a needlestick from an HIV-positive source patient. What is the MOST appropriate immediate action?", "choices": {"A": "Thoroughly wash the wound, then start ART post-exposure prophylaxis within 72 hours x 28 days", "B": "Administer HBIG immediately", "C": "No action needed if provider is vaccinated against hepatitis B", "D": "Wait for source patient HIV RNA result before deciding on PEP", "E": "Administer IVIG as prophylaxis"}, "answer": "A", "explanation": "HIV post-exposure prophylaxis (PEP): (1) Immediately wash exposed area with soap and water (flush mucous membranes with water/saline), (2) Start ART (2-3 drug antiretroviral regimen) within 72 hours -- sooner is better, continue x 28 days. No vaccine or IVIG exists for HIV. HBIG is for hepatitis B exposure in unvaccinated or inadequately immune providers."}, {"number": 64, "question": "Which precaution is required when caring for a hospitalized patient with pertussis?", "choices": {"A": "Airborne precautions (N-95 + negative pressure room)", "B": "Contact precautions (gown + gloves)", "C": "Droplet precautions (surgical mask + private room)", "D": "Standard precautions only", "E": "No additional precautions once antibiotics started"}, "answer": "C", "explanation": "Pertussis (Bordetella pertussis) transmits via respiratory droplets (>5 micrometers, travel <2 meters before settling) = DROPLET precautions: private room + surgical mask + eye protection. NOT airborne (no negative pressure room or N-95 needed). Patient remains contagious until 5 days of effective antibiotic therapy is completed."}, {"number": 65, "question": "A miner develops progressive dyspnea and CXR shows \"eggshell calcifications\" of hilar lymph nodes with upper lobe nodular opacities. Which pneumoconiosis is present?", "choices": {"A": "Asbestosis", "B": "Silicosis", "C": "Coal workers' pneumoconiosis", "D": "Berylliosis", "E": "Farmer's lung"}, "answer": "B", "explanation": "'Eggshell calcifications' of hilar lymph nodes = PATHOGNOMONIC of silicosis (exposure to crystalline silica from mining, quarrying, sandblasting, construction). Upper lobe nodular/reticular opacities. Silicosis significantly predisposes to TB and NTM infection. Asbestosis = lower lobe linear opacities + pleural plaques. No effective treatment; supportive care only."}, {"number": 66, "question": "A patient with anti-GBM antibodies presents with hemoptysis and hematuria. Lung biopsy shows linear IgG deposition on immunofluorescence. What is the diagnosis and initial treatment?", "choices": {"A": "GPA (Wegener's) -- rituximab + cyclophosphamide", "B": "Anti-GBM disease (Goodpasture's) -- plasmapheresis + corticosteroids + cyclophosphamide", "C": "Eosinophilic granulomatosis with polyangiitis -- steroids", "D": "SLE-associated nephritis -- hydroxychloroquine", "E": "Microscopic polyangiitis -- ANCA testing only"}, "answer": "B", "explanation": "Anti-GBM disease (Goodpasture's syndrome): anti-GBM antibodies + pulmonary-renal syndrome (hemoptysis + hematuria from crescentic GN) + linear IgG deposition on immunofluorescence = pathognomonic. Treatment: plasmapheresis (removes circulating anti-GBM antibodies) + immunosuppression (corticosteroids + cyclophosphamide) to prevent new antibody formation. Time- sensitive -- renal outcomes depend on early treatment."}, {"number": 67, "question": "A tall, thin 22-year-old male smoker develops sudden left-sided pleuritic chest pain. CXR shows a left apical pneumothorax. He has no underlying lung disease. What type of pneumothorax is this?", "choices": {"A": "Secondary spontaneous pneumothorax (due to underlying COPD)", "B": "Traumatic pneumothorax", "C": "Primary spontaneous pneumothorax", "D": "Tension pneumothorax", "E": "Catamenial pneumothorax"}, "answer": "C", "explanation": "Primary spontaneous pneumothorax (PSP): tall thin young male smoker with NO underlying lung disease = rupture of subpleural blebs (apical). Epidemiology: male:female 6:1, ages 10-30. Secondary SPT occurs WITH underlying lung disease (COPD, CF, asthma). PSP management: small stable = observation/O2; >2-3 cm or symptomatic = aspiration or chest tube."}, {"number": 68, "question": "Which COPD complication leads to right-sided heart failure caused by chronic hypoxia --> pulmonary vasoconstriction --> increased RV afterload?", "choices": {"A": "Cor pulmonale", "B": "Pulmonary arterial hypertension (Group 1)", "C": "Left ventricular failure", "D": "CTEPH", "E": "Pulmonary venous hypertension"}, "answer": "A", "explanation": "Cor pulmonale: COPD -> chronic hypoxia + hypercapnia + polycythemia -> pulmonary vasoconstriction -> increased PVR -> RV hypertrophy (compensated) -> RV dilation + failure (decompensated) = cor pulmonale. COPD accounts for >50% of cor pulmonale cases. By definition, cor pulmonale EXCLUDES RV failure from left heart disease."}, {"number": 69, "question": "A patient with SCLC has disease beyond one hemithorax with contralateral nodal involvement. This is classified as what stage and what is the treatment?", "choices": {"A": "Limited stage -- curative with concurrent chemo-XRT", "B": "Extensive stage -- palliative chemotherapy +/- immunotherapy", "C": "Stage IVA NSCLC -- targeted therapy", "D": "Limited stage -- surgery alone", "E": "Extensive stage -- surgery + adjuvant chemotherapy"}, "answer": "B", "explanation": "Extensive-stage SCLC: disease beyond one hemithorax including contralateral nodes, malignant pleural effusion, or distant metastases. ~70% of SCLC patients present at extensive stage (explains the 'immediate emergency' designation). Treatment is PALLIATIVE: chemotherapy (etoposide-platinum) +/- immunotherapy. Median survival 9-13 months; 5-year survival ~3%."}, {"number": 70, "question": "A pleural fluid analysis: protein 4.2 g/dL (serum 6.5 g/dL), LDH 310 U/L (serum 200 U/L). Pleural:serum protein ratio = 0.65; pleural:serum LDH ratio = 1.55. How is this classified?", "choices": {"A": "Transudative; likely CHF", "B": "Exudative by Light's criteria (protein ratio >0.5, LDH ratio >0.6)", "C": "Indeterminate; requires repeat thoracentesis", "D": "Transudative; likely hypoalbuminemia", "E": "Exudative -- consistent only with empyema"}, "answer": "B", "explanation": "Light's criteria for exudate -- ANY ONE met = exudate: (1) Pleural/serum protein >0.5: 4.2/6.5 = 0.65 > 0.5 [YES -- EXUDATE], (2) Pleural/serum LDH >0.6: 310/200 = 1.55 > 0.6 [YES -- EXUDATE], (3) Pleural LDH >2/3 upper limit normal serum LDH [YES]. All three criteria met = definitive exudative effusion. Consider malignancy, infection, or inflammatory disease as cause. Topics: Respiratory Infections | TB | Pneumonia | Asthma | COPD | DVT/PE | Pleural Disorders | Pulmonary Neoplasms | Restrictive ILD | Pulmonary Hypertension | Procedures & Standard Precautions"}];
let graded = false;
function esc(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function render() {
  const root = document.getElementById('questions');
  root.innerHTML = QUESTIONS.map(q => `
    <section class="question-card" id="qcard-${q.number}" data-q="${q.number}">
      <div class="q-head"><span>Question ${q.number}</span><span class="status" id="status-${q.number}"></span></div>
      <div class="q-body">
        <div class="q-text">${esc(q.question)}</div>
        <div class="choices">
          ${Object.entries(q.choices).map(([letter, text]) => `
            <label class="choice" id="q${q.number}-${letter}">
              <input type="radio" name="q${q.number}" value="${letter}">
              <span class="letter">${letter}.</span>
              <span>${esc(text)}</span>
            </label>`).join('')}
        </div>
        <div class="feedback" id="fb-${q.number}">
          <b>Correct answer: ${q.answer}.</b> ${esc(q.choices[q.answer] || '')}
          <div class="explanation">${esc(q.explanation || 'No explanation available.')}</div>
        </div>
      </div>
    </section>`).join('');
}
function gradeExam() {
  graded = true;
  document.getElementById('examWrap').classList.remove('missed-only');
  let correct = 0;
  let unanswered = 0;
  QUESTIONS.forEach(q => {
    const card = document.getElementById(`qcard-${q.number}`);
    card.classList.remove('correct-card','missed-card','unanswered');
    document.querySelectorAll(`[id^="q${q.number}-"]`).forEach(el => el.classList.remove('correct','incorrect','unselected-correct'));
    const selected = document.querySelector(`input[name="q${q.number}"]:checked`);
    const status = document.getElementById(`status-${q.number}`);
    const fb = document.getElementById(`fb-${q.number}`);
    fb.classList.add('show');
    const correctEl = document.getElementById(`q${q.number}-${q.answer}`);
    if (correctEl) correctEl.classList.add('unselected-correct');
    if (!selected) {
      unanswered++;
      card.classList.add('missed-card','unanswered');
      status.textContent = 'Unanswered';
      return;
    }
    if (selected.value === q.answer) {
      correct++;
      card.classList.add('correct-card');
      correctEl.classList.remove('unselected-correct');
      correctEl.classList.add('correct');
      status.textContent = 'Correct';
    } else {
      card.classList.add('missed-card');
      document.getElementById(`q${q.number}-${selected.value}`).classList.add('incorrect');
      status.textContent = 'Incorrect';
    }
  });
  const pct = Math.round((correct / QUESTIONS.length) * 1000) / 10;
  document.getElementById('scoreBox').textContent = `${correct} / ${QUESTIONS.length} correct • ${pct}%${unanswered ? ' • ' + unanswered + ' unanswered' : ''}`;
  window.scrollTo({top:0,behavior:'smooth'});
}
function reviewMissed() {
  if (!graded) gradeExam();
  document.getElementById('examWrap').classList.add('missed-only');
  window.scrollTo({top:0,behavior:'smooth'});
}
function resetExam() {
  graded = false;
  document.getElementById('examWrap').classList.remove('missed-only');
  document.querySelectorAll('input[type="radio"]').forEach(i => i.checked = false);
  document.querySelectorAll('.choice').forEach(el => el.classList.remove('correct','incorrect','unselected-correct'));
  document.querySelectorAll('.feedback').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.remove('correct-card','missed-card','unanswered'));
  document.querySelectorAll('.status').forEach(el => el.textContent = '');
  document.getElementById('scoreBox').textContent = 'Not graded';
  window.scrollTo({top:0,behavior:'smooth'});
}
render();
</script>
