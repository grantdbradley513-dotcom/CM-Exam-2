<style>
:root { --bg:#f5f7fb; --card:#ffffff; --ink:#162033; --muted:#667085; --accent:#1455d9; --accent2:#eef4ff; --green:#d1fadf; --green-border:#12b76a; --red:#fee4e2; --red-border:#f04438; --border:#d9e2ef; }
* { box-sizing:border-box; }
body { margin:0; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background:linear-gradient(180deg,#edf4ff 0%,var(--bg) 280px); color:var(--ink); font-size:18px; line-height:1.55; }
.container { width:min(1050px, 94vw); margin:0 auto; padding:28px 0 60px; }
.hero { background:rgba(255,255,255,.86); border:1px solid var(--border); border-radius:24px; padding:28px; box-shadow:0 18px 50px rgba(20,85,217,.10); margin-bottom:22px; }
h1 { margin:0 0 8px; font-size:clamp(1.9rem,4vw,3.2rem); line-height:1.08; letter-spacing:-.04em; }
.subtitle { color:var(--muted); font-weight:650; margin:0 0 18px; }
.meta { display:flex; gap:10px; flex-wrap:wrap; }
.pill { background:var(--accent2); color:#1849a9; border:1px solid #c7d7fe; padding:8px 12px; border-radius:999px; font-size:.92rem; font-weight:700; }
.toolbar { position:sticky; top:0; z-index:10; background:rgba(245,247,251,.92); backdrop-filter: blur(8px); padding:12px 0; margin-bottom:12px; }
.actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
button { appearance:none; border:none; border-radius:14px; padding:12px 18px; font-weight:800; font-size:1rem; cursor:pointer; background:var(--accent); color:white; box-shadow:0 8px 18px rgba(20,85,217,.18); }
button.secondary { background:#fff; color:var(--ink); border:1px solid var(--border); box-shadow:none; }
button.warn { background:#b42318; }
.scorebox { display:none; margin:14px 0 20px; border-radius:20px; background:#fff; border:1px solid var(--border); padding:18px; box-shadow:0 10px 25px rgba(16,24,40,.06); }
.scorebig { font-size:2.2rem; font-weight:900; color:var(--accent); letter-spacing:-.03em; }
.question-card { background:var(--card); border:1px solid var(--border); border-radius:22px; padding:24px; margin:18px 0; box-shadow:0 10px 25px rgba(16,24,40,.055); }
.q-header { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:12px; }
.qnum { font-weight:900; color:var(--accent); background:var(--accent2); padding:7px 12px; border-radius:999px; }
.status { font-weight:800; font-size:.95rem; color:var(--muted); }
.stem { white-space:pre-line; font-weight:650; margin:12px 0 18px; }
.choice { display:flex; gap:12px; align-items:flex-start; border:1px solid var(--border); border-radius:16px; padding:13px 14px; margin:10px 0; cursor:pointer; background:#fff; transition:.12s ease; }
.choice:hover { border-color:#9db5ff; background:#fbfdff; }
.choice input { margin-top:6px; transform:scale(1.2); }
.letter { font-weight:900; min-width:30px; color:#344054; }
.choice.correct { background:var(--green); border-color:var(--green-border); }
.choice.incorrect { background:var(--red); border-color:var(--red-border); }
.rationale { display:none; margin-top:16px; padding:15px; border-radius:16px; background:#f8fafc; border:1px solid var(--border); }
.rationale b { color:#101828; }
.hidden-missed { display:none; }
.footer-note { color:var(--muted); font-size:.92rem; text-align:center; margin-top:28px; }
@media (max-width:640px) { body{font-size:16px;} .hero,.question-card{padding:18px; border-radius:18px;} button{width:100%;} .actions{display:grid; grid-template-columns:1fr;} }
</style>

<script>
const questions = [{"number": 1, "question": "A 72-year-old man is found unresponsive on the floor by his family. EMS brings him to the ED. He has no gag reflex and is making snoring respirations. There is no concern for cervical spine injury.\n\nWhat is the most appropriate initial maneuver to open this patient's airway?", "choices": [{"label": "A", "text": "Insert a nasopharyngeal airway"}, {"label": "B", "text": "Perform a chin-lift and head tilt"}, {"label": "C", "text": "Administer RSI medications and intubate"}, {"label": "D", "text": "Place a non-rebreather mask"}, {"label": "E", "text": "Insert an oropharyngeal airway"}], "answer": "B", "explanation": "The first step in airway management for an unconscious patient without C-spine precautions is a basic manual maneuver: neck extension with chin-lift. This physically displaces the tongue anteriorly and opens the airway. Airway adjuncts (OPA, NPA) and intubation are subsequent steps if the airway remains compromised. A NRB delivers oxygen but does not open an obstructed airway."}, {"number": 2, "question": "A 58-year-old woman is brought in after a high-speed motor vehicle collision. She is unconscious with gurgling respirations. EMS has placed a cervical collar due to concern for spinal injury. The anterior portion of the collar has been removed.\n\nWhich maneuver is most appropriate to open her airway?", "choices": [{"label": "A", "text": "Head-tilt chin-lift"}, {"label": "B", "text": "Neck hyperextension"}, {"label": "C", "text": "Jaw-thrust without neck extension"}, {"label": "D", "text": "Oropharyngeal airway insertion with neck rotation"}, {"label": "E", "text": "Immediate orotracheal intubation with neck extension"}], "answer": "C", "explanation": "When cervical spine injury is suspected, neck extension is avoided. The jaw-thrust maneuver is performed without neck extension — an assistant stabilizes the neck on each side while the provider thrusts the mandible anteriorly to open the airway. An OPA or intubation may follow, but the jaw-thrust is the correct initial maneuver in this context."}, {"number": 3, "question": "A 45-year-old man with COPD exacerbation is placed on supplemental oxygen. His SpO2 improves from 86% to 91% on 2 L/min via nasal cannula.\n\nApproximately what FiO2 is this patient receiving?", "choices": [{"label": "A", "text": "21%"}, {"label": "B", "text": "24%"}, {"label": "C", "text": "28%"}, {"label": "D", "text": "32%"}, {"label": "E", "text": "44%"}], "answer": "C", "explanation": "Nasal cannula delivers approximately 4% additional FiO2 per liter above room air (21%). At 2 L/min, FiO2 ≈ 28%. At 1 L/min ≈ 24%, 3 L/min ≈ 32%, up to a maximum of 5 L/min."}, {"number": 4, "question": "A 68-year-old woman with pneumonia has an SpO2 of 88% on 5 L/min nasal cannula. You upgrade her to a non-rebreather mask (NRB) running at 15 L/min.\n\nWhich of the following best describes why the NRB is superior to a simple face mask in this acute setting?", "choices": [{"label": "A", "text": "The NRB delivers humidified oxygen, reducing mucosal drying"}, {"label": "B", "text": "The NRB has flap valves that minimize entrained room air, achieving FiO2 of 60–100%"}, {"label": "C", "text": "The NRB delivers oxygen at a maximum of 10 L/min, reducing barotrauma"}, {"label": "D", "text": "The NRB can be used in patients with active emesis"}, {"label": "E", "text": "The NRB provides mechanical ventilatory support in addition to oxygenation"}], "answer": "B", "explanation": "The NRB has one-way flap valves that limit the amount of exhaled gas and room air that re-enters, allowing FiO2 to reach 60–100% (with the reservoir bag containing 100% O2). It delivers non-humidified oxygen and does not provide ventilatory support (that requires NIPPV/BVM). It is not appropriate for patients with active emesis as the airway remains unprotected."}, {"number": 5, "question": "You are called to evaluate a 77-year-old male in the ICU who is unresponsive following a witnessed aspiration event. He is apneic. You grab a bag-valve-mask (BVM) and begin ventilating him alone while waiting for your team.\n\nWhat is the correct single-provider technique for holding the BVM mask?", "choices": [{"label": "A", "text": "Two-handed grip with thumbs on the apex and thenar eminence on the base"}, {"label": "B", "text": "C-E technique — thumb and index finger form a C on the mask, remaining three fingers lift the jaw"}, {"label": "C", "text": "Index finger seals the apex; thumb seals the base; remaining fingers squeeze the bag"}, {"label": "D", "text": "Both hands squeeze the bag while an assistant holds the mask to the face"}, {"label": "E", "text": "Press the mask firmly against the face with the palm and use the other hand to squeeze the bag"}], "answer": "B", "explanation": "When ventilating alone, the C-E technique is used: the thumb and index finger form a \"C\" to seal the mask (index on the base, thumb on the apex), while the remaining three fingers form an \"E\" under the jaw to control and elevate it. The two-handed technique requires a second provider to squeeze the bag and provides a better seal when available."}, {"number": 6, "question": "A patient is being ventilated with a BVM after cardiac arrest. The team has achieved return of spontaneous circulation (ROSC) and an LMA is now in place.\n\nWhat is the appropriate ventilation rate for a patient who remains apneic but now has a pulse and a secured supraglottic airway?", "choices": [{"label": "A", "text": "30 compressions to 2 breaths"}, {"label": "B", "text": "1 breath every 3 seconds (20/min)"}, {"label": "C", "text": "1 breath every 6 seconds (10/min)"}, {"label": "D", "text": "1 breath every 10 seconds (6/min)"}, {"label": "E", "text": "No ventilations until SpO2 drops below 90%"}], "answer": "C", "explanation": "For an apneic patient with a pulse and a secured airway (LMA or ETT), the goal is 10 breaths per minute — one breath every 6 seconds. The 30:2 ratio applies only during CPR without a secured airway. Hyperventilation must be avoided as it increases intrathoracic pressure and reduces venous return."}, {"number": 7, "question": "A 55-year-old woman with a history of morbid obesity and obstructive sleep apnea is in acute hypoxic respiratory failure from community-acquired pneumonia. SpO2 is 84% on NRB. She is awake, anxious, and following commands. She has no facial trauma and has not vomited.\n\nWhich of the following is the most appropriate next step?", "choices": [{"label": "A", "text": "Emergent orotracheal intubation"}, {"label": "B", "text": "Chin-lift and jaw-thrust maneuver"}, {"label": "C", "text": "Noninvasive positive pressure ventilation (NIPPV/BiPAP)"}, {"label": "D", "text": "High-flow nasal cannula at 10 L/min"}, {"label": "E", "text": "Oropharyngeal airway placement"}], "answer": "C", "explanation": "This patient is awake, protecting her airway, and has no contraindications to NIPPV (no emesis, no facial trauma, no restraints, no obtundation). NIPPV (BiPAP) is appropriate first-line escalation beyond NRB. Its advantages include avoiding intubation, improved patient comfort, and shorter hospital stays. Intubation may be necessary if she fails NIPPV or deteriorates."}, {"number": 8, "question": "Which of the following patients is NOT a candidate for noninvasive positive pressure ventilation (NIPPV)?\n\nSelect the most appropriate answer:", "choices": [{"label": "A", "text": "A 62-year-old with COPD exacerbation, SpO2 88%, awake and cooperative"}, {"label": "B", "text": "A 48-year-old post-extubation with hypoxia, no emesis"}, {"label": "C", "text": "A 70-year-old with CHF exacerbation, SpO2 90%, anxious but alert"}, {"label": "D", "text": "A 55-year-old obtunded after opioid overdose with vomit around the mouth"}, {"label": "E", "text": "A 40-year-old with asthma exacerbation, SpO2 91%, able to follow commands"}], "answer": "D", "explanation": "Contraindications to NIPPV include: obtundation, active emesis, inability to handle secretions, facial trauma/deformity, recent facial or upper GI surgery, and use of restraints. This patient has two contraindications — obtundation and emesis — making NIPPV dangerous due to aspiration risk with an unprotected airway."}, {"number": 9, "question": "You are preparing to intubate a 60-year-old male in acute respiratory failure. During your external assessment using the 3-3-2 rule, you find that his mouth opening accommodates only 2 finger widths.\n\nWhat does this finding predict, and what should you do?", "choices": [{"label": "A", "text": "Normal airway — proceed with standard video laryngoscopy"}, {"label": "B", "text": "Anterior airway — consider alternative approach, different equipment, or specialist consultation"}, {"label": "C", "text": "Posterior airway — use a Miller blade for better posterior visualization"}, {"label": "D", "text": "No clinical significance — proceed as planned"}, {"label": "E", "text": "Glottic stenosis — contraindication to intubation"}], "answer": "B", "explanation": "The 3-3-2 rule screens for a difficult airway: mouth opening ≥3 finger widths, hyoid to chin tip ≥3 finger widths, and upper thyroid cartilage to hyoid ≥2 finger widths. Failure of ANY criterion predicts an anterior (difficult) airway. When this is anticipated, consider alternative approaches, different equipment, conscious sedation, or ENT/Anesthesia consultation before attempting intubation."}, {"number": 10, "question": "During SOAPME preparation prior to intubation of a patient with massive hemoptysis, you are evaluating your \"S.\"\n\nWhich of the following is the most accurate description of what \"S\" requires in this scenario?", "choices": [{"label": "A", "text": "Sedation agents drawn and ready at bedside"}, {"label": "B", "text": "Suction — confirmed on and working, with multiple suction devices available"}, {"label": "C", "text": "SpO2 monitoring confirmed functional"}, {"label": "D", "text": "Stylet placed inside the ETT"}, {"label": "E", "text": "Syringe prepared for cuff inflation"}], "answer": "B", "explanation": "In SOAPME, \"S\" stands for Suction. It must be turned on, confirmed working, and in a patient with massive hemoptysis or risk of emesis, multiple suction devices should be available. The other letters: O = Oxygen (100% via NRB or BiPAP), A = Airways (adjuncts, ETTs, cricothyrotomy materials), P = Position, M = Monitors and Medications, E = End-tidal CO2 and other equipment."}, {"number": 11, "question": "You successfully intubate a patient and are confirming ETT placement. Capnography shows a color change from purple to gold. Auscultation reveals breath sounds bilaterally and absent sounds over the epigastrium. You notice condensation forming in the tube.\n\nWhat is the single most objective and accurate confirmation method for endotracheal placement?", "choices": [{"label": "A", "text": "Bilateral breath sounds on auscultation"}, {"label": "B", "text": "Absence of epigastric sounds"}, {"label": "C", "text": "Condensation in the ETT"}, {"label": "D", "text": "End-tidal CO2 (ETCO2) colorimetric detector — purple to gold color change"}, {"label": "E", "text": "Chest X-ray"}], "answer": "D", "explanation": "ETCO2 is the most accurate and objective confirmation of endotracheal placement. A color change from purple to gold confirms CO2 is being exhaled through the tube, confirming tracheal placement. Bilateral breath sounds, absent epigastric sounds, and condensation are supportive but less reliable. CXR confirms depth of placement but is not the primary confirmation method."}, {"number": 12, "question": "After intubation of a critically ill patient, you note that breath sounds are present on the right but absent on the left. ETCO2 is gold. The ETT is taped at the 25 cm mark.\n\nWhat is the most likely explanation, and what should you do?", "choices": [{"label": "A", "text": "Left-sided pneumothorax — perform needle decompression immediately"}, {"label": "B", "text": "Right mainstem intubation — pull the ETT back and reconfirm breath sounds bilaterally"}, {"label": "C", "text": "Equipment failure — replace the ETCO2 detector"}, {"label": "D", "text": "Esophageal intubation — remove the ETT and reoxygenate"}, {"label": "E", "text": "Mucus plug in the left bronchus — suction via the ETT"}], "answer": "B", "explanation": "The most common cause of unilateral breath sounds after intubation is right mainstem bronchus intubation — the ETT has advanced too far and entered the right mainstem bronchus, ventilating only the right lung. Since ETCO2 confirms tracheal placement, esophageal intubation is excluded. The ETT should be withdrawn 1–2 cm and breath sounds reassessed."}, {"number": 13, "question": "You need to place an OPA in an unconscious 65-year-old man in respiratory distress. Sizing the device, you measure from the corner of the lip to the angle of the jaw — approximately 90 mm.\n\nWhich insertion technique is correct?", "choices": [{"label": "A", "text": "Insert the OPA with the curve pointing inferiorly from the start"}, {"label": "B", "text": "Insert the OPA sideways (90 degree rotation) and then rotate into position"}, {"label": "C", "text": "Insert the OPA with the curve pointing superiorly until the hard palate is felt, then rotate 180 degrees so the curve points inferiorly"}, {"label": "D", "text": "Insert the OPA along the hard palate without any rotation"}, {"label": "E", "text": "Insert the OPA with the flange seated between the teeth, then advance"}], "answer": "C", "explanation": "The OPA is sized from the lips to the angle of the jaw. It is inserted with the curve facing superiorly (toward the hard palate) until the hard palate is felt, then rotated 180 degrees so the curve aligns with the tongue and points inferiorly. It is then advanced until the flange rests on the lips. The OPA cannot be used in awake patients as it triggers the gag reflex."}, {"number": 14, "question": "A trauma patient arrives following a facial gunshot wound with significant midface instability and active bleeding from the nose. She is semi-conscious but responsive to pain. You need to establish a temporizing airway.\n\nWhich airway adjunct is contraindicated in this patient?", "choices": [{"label": "A", "text": "Oropharyngeal airway"}, {"label": "B", "text": "Nasopharyngeal airway"}, {"label": "C", "text": "Laryngeal mask airway"}, {"label": "D", "text": "Video laryngoscopy-assisted intubation"}, {"label": "E", "text": "Bag-valve-mask ventilation"}], "answer": "B", "explanation": "Facial trauma is a contraindication to nasopharyngeal airway (NPA) placement. In midface fractures, the NPA could be advanced through a disrupted cribriform plate into the cranial vault. Additional NPA limitations include coagulopathy (relative), sinusitis, and gag reflex stimulation."}, {"number": 15, "question": "You are preparing to place an NPA in a 40-year-old male who is semiconscious but maintaining some airway reflexes. You select a 7.5 mm tube.\n\nWhich of the following describes correct insertion technique?", "choices": [{"label": "A", "text": "Position bevel toward the lateral nasal wall; advance vertically"}, {"label": "B", "text": "Position bevel facing the nasal septum; advance horizontally along the floor of the nasal passage until the flange rests at the nares"}, {"label": "C", "text": "Insert without lubrication to avoid mucosal trauma"}, {"label": "D", "text": "Advance at a 45 degree upward angle toward the frontal sinus"}, {"label": "E", "text": "Insert with the bevel facing superiorly; rotate 90 degrees once past the turbinates"}], "answer": "B", "explanation": "Correct NPA insertion: apply topical anesthetic/vasoconstrictor, lubricate the tube, position the bevel facing the nasal septum, and advance horizontally (not upward) along the nasal floor until the flange is seated at the nares. The tip should lie just behind the uvula. NPA sizing: tip of the nose to the earlobe; 6–7 mm for most females, 7–8 mm for most males."}, {"number": 16, "question": "A 28-year-old male is brought to the OR for an elective laparoscopic procedure. The anesthesiologist places a laryngeal mask airway (LMA) rather than an endotracheal tube. She selects a size 4 device.\n\nWhich of the following is a known limitation of the LMA compared to endotracheal intubation?", "choices": [{"label": "A", "text": "It cannot deliver FiO2 above 60%"}, {"label": "B", "text": "It cannot be used as a conduit for intubation"}, {"label": "C", "text": "It does not protect against aspiration as effectively as a cuffed ETT"}, {"label": "D", "text": "It cannot be placed in patients under general anesthesia"}, {"label": "E", "text": "It cannot be sized for patients weighing over 70 kg PART 2: CHEST TUBE INSERTION AND NEEDLE DECOMPRESSION"}], "answer": "C", "explanation": "The LMA is a supraglottic/extraglottic device — it sits above the glottis and does not provide a sealed tracheal airway. As a result, it offers less protection against aspiration compared to a cuffed ETT. It can be used as a conduit for bronchoscopy-directed intubation and can deliver high FiO2. Size 3 is used for females, size 4 for males, based on weight."}, {"number": 17, "question": "A 22-year-old healthy male presents with sudden onset right-sided pleuritic chest pain and dyspnea after lifting a heavy box. Chest X-ray shows a 1.5 cm rim of air between the right lung and the chest wall. He is hemodynamically stable with SpO2 96% on room air.\n\nWhat is the most appropriate initial management?", "choices": [{"label": "A", "text": "Immediate large-bore chest tube insertion"}, {"label": "B", "text": "Emergent needle decompression"}, {"label": "C", "text": "Observation with repeat CXR in 6 hours and supplemental oxygen"}, {"label": "D", "text": "Seldinger chest tube placement to the anterior apex"}, {"label": "E", "text": "Discharge home with 24-hour follow-up only"}], "answer": "C", "explanation": "This is a primary spontaneous pneumothorax (PSP) meeting criteria for observation: ≤2–3 cm between the chest wall and lung on CXR (or <15–20% of the hemithorax diameter). Management includes observation, supplemental oxygen (which accelerates reabsorption 3–4x), repeat CXR in 6 hours, and 24–48 hour follow-up. Most PSPs resolve within 10 days."}, {"number": 18, "question": "A 45-year-old man is involved in a high-speed motor vehicle accident and sustains blunt chest trauma. CT chest demonstrates a right-sided hemothorax with 900 mL of blood in the pleural space.\n\nWhich of the following is correct regarding management?", "choices": [{"label": "A", "text": "Observe with serial imaging; drain only if >1,500 mL"}, {"label": "B", "text": "Hemothorax always requires chest tube insertion"}, {"label": "C", "text": "Needle decompression is the preferred initial intervention"}, {"label": "D", "text": "Anticoagulation should be started to prevent clot formation"}, {"label": "E", "text": "Seldinger technique is preferred for all hemothoraces"}], "answer": "B", "explanation": "Hemothorax always requires chest tube insertion, regardless of size. Blood in the pleural space must be evacuated to prevent empyema and complications from clot organization. A large-bore chest tube (≥16 Fr) is placed to gravity-dependent areas (4th–5th ICS, anterior axillary line). The Seldinger technique uses small-bore tubes (≤14 Fr) and is preferred for pneumothorax or effusions, not hemothorax."}, {"number": 19, "question": "You are preparing to insert a chest tube for a right-sided pleural effusion in a 55-year-old woman. You perform site selection.\n\nAt which location should you insert the chest tube?", "choices": [{"label": "A", "text": "2nd intercostal space, midclavicular line"}, {"label": "B", "text": "4th–5th intercostal space, anterior axillary line"}, {"label": "C", "text": "2nd intercostal space, anterior axillary line"}, {"label": "D", "text": "6th intercostal space, midclavicular line"}, {"label": "E", "text": "1st intercostal space, midclavicular line"}], "answer": "B", "explanation": "Site selection depends on indication: pneumothorax is drained at the 2nd ICS at the midclavicular line (air rises to apex); pleural effusion/hemothorax is drained at the 4th–5th ICS at the anterior axillary line (fluid is gravity-dependent). When in doubt, ultrasound guidance should confirm the site."}, {"number": 20, "question": "During surgical chest tube insertion, you have made your incision and are using a Kelly clamp for blunt dissection.\n\nWhat is the critical anatomical relationship you must respect to avoid neurovascular injury?", "choices": [{"label": "A", "text": "Pass the clamp above the superior border of the rib to avoid the neurovascular bundle"}, {"label": "B", "text": "Pass the clamp below the inferior border of the rib where the bundle runs in a groove"}, {"label": "C", "text": "Pass the clamp directly through the middle of the intercostal space"}, {"label": "D", "text": "The neurovascular bundle runs along the anterior surface of each rib"}, {"label": "E", "text": "Neurovascular injury is not a concern if the patient is anticoagulated"}], "answer": "A", "explanation": "The intercostal neurovascular bundle (vein, artery, nerve — VAN) runs in a groove along the inferior aspect of each rib. To avoid injuring these structures, always pass instruments and the chest tube over the superior border of the rib below the intended intercostal space. Passing under the rib risks significant bleeding from the intercostal artery."}, {"number": 21, "question": "You are performing a surgical chest tube insertion. After making the incision and creating a track with blunt dissection, you close the Kelly clamp and apply firm pressure until the pleural cavity is penetrated.\n\nWhat is the correct next step immediately after entering the pleural space with the clamp?", "choices": [{"label": "A", "text": "Insert the chest tube through the closed clamp"}, {"label": "B", "text": "Insert your non-dominant index finger into the pleural space over the opened clamp, then remove the clamp"}, {"label": "C", "text": "Immediately attach the chest tube to the atrium without finger confirmation"}, {"label": "D", "text": "Dilate the tract with a rigid dilator over a guidewire"}, {"label": "E", "text": "Apply negative pressure suction directly to the opening"}], "answer": "B", "explanation": "After penetrating the pleural cavity with the Kelly clamp (opened), the next step is to insert your non-dominant index finger into the pleural space alongside the opened clamp, then remove the clamp. The finger confirms pleural entry, sweeps for adhesions or malposition, and guides the chest tube in the desired direction."}, {"number": 22, "question": "A 38-year-old woman undergoes chest tube insertion for a left-sided pneumothorax using the Seldinger technique. Post-procedure, she acutely develops worsening hypoxia and bilateral crackles on exam. CXR shows new bilateral infiltrates on the previously collapsed (left) side after lung re-expansion.\n\nWhat is the most likely complication?", "choices": [{"label": "A", "text": "Tension pneumothorax from air leak"}, {"label": "B", "text": "Hemothorax from vessel injury"}, {"label": "C", "text": "Reexpansion pulmonary edema"}, {"label": "D", "text": "Malpositioned chest tube in the parenchyma"}, {"label": "E", "text": "Device failure due to tube kinking"}], "answer": "C", "explanation": "Reexpansion pulmonary edema (RPE) is a recognized complication of chest tube drainage, particularly when a large or long-standing pneumothorax is rapidly re-expanded. It presents with hypoxia, bilateral crackles, and new infiltrates on the affected side shortly after lung re-expansion. Other complications include iatrogenic pneumothorax, malposition, neurovascular damage, and device failure."}, {"number": 23, "question": "After chest tube insertion, you monitor the drainage system. The tube initially drains 600 mL of serosanguinous fluid on suction. Over the next 24 hours, output decreases to 80 mL, and a repeat CXR const importReport = {"questions_found": 28, "questions_imported": 28, "unparsed_questions": [], "answer_key_found": true};
let graded = false;
let missedOnly = false;
function escapeHTML(str) { return String(str).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function renderExam() {
  const exam = document.getElementById('exam');
  exam.innerHTML = questions.map(q => `
    <article class="question-card" id="q${q.number}" data-q="${q.number}">
      <div class="q-header"><span class="qnum">Question ${q.number}</span><span class="status" id="status-${q.number}"></span></div>
      <div class="stem">${escapeHTML(q.question)}</div>
      <div class="choices">
        ${q.choices.map(c => `
          <label class="choice" id="q${q.number}-${c.label}">
            <input type="radio" name="q${q.number}" value="${c.label}" />
            <span class="letter">${c.label})</span>
            <span>${escapeHTML(c.text)}</span>
          </label>`).join('')}
      </div>
      <div class="rationale" id="rat-${q.number}"><b>Correct answer: ${q.answer}</b><br>${escapeHTML(q.explanation)}</div>
    </article>`).join('');
}
function gradeExam() {
  let correct = 0;
  let unanswered = 0;
  graded = true;
  missedOnly = false;
  questions.forEach(q => {
    const selected = document.querySelector(`input[name="q${q.number}"]:checked`);
    document.querySelectorAll(`#q${q.number} .choice`).forEach(el => el.classList.remove('correct','incorrect'));
    document.getElementById(`q${q.number}-${q.answer}`).classList.add('correct');
    const status = document.getElementById(`status-${q.number}`);
    if (!selected) { unanswered++; status.textContent = 'Unanswered'; }
    else if (selected.value === q.answer) { correct++; status.textContent = 'Correct'; }
    else { document.getElementById(`q${q.number}-${selected.value}`).classList.add('incorrect'); status.textContent = 'Incorrect'; }
    document.getElementById(`rat-${q.number}`).style.display = 'block';
    document.getElementById(`q${q.number}`).classList.remove('hidden-missed');
  });
  const pct = Math.round((correct / questions.length) * 1000) / 10;
  const scorebox = document.getElementById('scorebox');
  scorebox.style.display = 'block';
  scorebox.innerHTML = `<div class="scorebig">${pct}%</div><div><b>${correct} / ${questions.length}</b> correct</div><div>${unanswered} unanswered</div>`;
  window.scrollTo({top:0, behavior:'smooth'});
}
function resetExam() {
  document.querySelectorAll('input[type="radio"]').forEach(i => i.checked = false);
  document.querySelectorAll('.choice').forEach(el => el.classList.remove('correct','incorrect'));
  document.querySelectorAll('.rationale').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.status').forEach(el => el.textContent = '');
  document.querySelectorAll('.question-card').forEach(el => el.classList.remove('hidden-missed'));
  document.getElementById('scorebox').style.display = 'none';
  graded = false; missedOnly = false;
  window.scrollTo({top:0, behavior:'smooth'});
}
function reviewMissed() {
  if (!graded) gradeExam();
  missedOnly = true;
  questions.forEach(q => {
    const selected = document.querySelector(`input[name="q${q.number}"]:checked`);
    const card = document.getElementById(`q${q.number}`);
    if (selected && selected.value === q.answer) card.classList.add('hidden-missed');
    else card.classList.remove('hidden-missed');
  });
}
function showAll() {
  missedOnly = false;
  document.querySelectorAll('.question-card').forEach(el => el.classList.remove('hidden-missed'));
}
renderExam();
