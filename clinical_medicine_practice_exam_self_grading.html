 a known HBsAg-positive source, post-exposure prophylaxis consists of BOTH HBIG (passive immunity — provides immediate short-term protection) AND initiation of the 3-dose hepatitis B vaccine series (active immunization for long-term protection). HBIG should be given as soon as possible, ideally within 24 hours (and up to 7 days for percutaneous exposure). HBIG alone or vaccine alone is insufficient. If the source patient's HBsAg status is unknown, risk assessment should guide the decision, but when clearly HBsAg-positive, both HBIG and vaccine are given without delay."}, {"number": 94, "stem": "A nurse sustains a needlestick from a patient with known hepatitis C infection (anti-HCV positive,\nHCV RNA 2.4 million IU/mL). The nurse tests negative for HCV antibody at baseline. Which of the following best describes post-exposure management for hepatitis C?", "choices": {"A": "Immediately initiate post-exposure prophylaxis with sofosbuvir/ledipasvir", "B": "Administer hepatitis C immunoglobulin as soon as possible", "C": "There is no approved post-exposure prophylaxis for HCV; baseline testing and serial follow-up testing (HCV RNA at 3–6 weeks, antibody at 6 months) are recommended to detect seroconversion and initiate treatment if infection occurs", "D": "No follow-up is needed; the majority of occupational HCV exposures do not result in infection", "E": "Initiate ribavirin prophylaxis for 4 weeks"}, "answer": "C", "correctText": "There is no approved post-exposure prophylaxis for HCV; baseline", "explanation": "testing and serial follow-up testing (HCV RNA at 3–6 weeks, antibody at 6 months) are recommended to detect seroconversion and initiate treatment if infection occurs\nUnlike HIV and HBV, there is NO approved post-exposure prophylaxis for hepatitis C. Management consists of: baseline HCV antibody and HCV RNA testing of the exposed worker, followed by serial follow-up testing (HCV RNA at 3–6 weeks, anti-HCV at 4–6 months). If HCV RNA becomes positive\n(indicating acute HCV infection), referral for treatment with direct-acting antivirals (which achieve >95% cure rate) is recommended. Early treatment of acute HCV (before spontaneous clearance is determined) also achieves high cure rates. The risk of HCV transmission after needlestick is ~1.8%\n(compared to ~0.3% for HIV and ~30% for HBeAg-positive HBV).\n■■ TUBERCULOSIS ■■"}, {"number": 95, "stem": "A 28-year-old man who immigrated from Ethiopia 3 years ago undergoes TST screening for employment at a correctional facility. He is HIV-negative, takes no immunosuppressive medications, and has no known TB contacts. His TST induration measures 9 mm. Which of the following most accurately interprets this result?", "choices": {"A": "Negative; only ≥15 mm is positive regardless of risk factors", "B": "Negative; the ≥10 mm threshold applies but his result of 9 mm falls below it", "C": "Positive; the ≥5 mm threshold applies because he works in a correctional facility", "D": "Positive; the ≥10 mm threshold applies because he is a recent immigrant (within 5 years) from a high-prevalence country — 9 mm does not meet this threshold, so the result is\nNEGATIVE", "E": "Positive; the ≥10 mm threshold applies and 9 mm is considered borderline positive"}, "answer": "D", "correctText": "Positive; the ≥10 mm threshold applies because he is a recent", "explanation": "immigrant (within 5 years) from a high-prevalence country — 9 mm does not meet this threshold, so the result is NEGATIVE\nTST interpretation uses risk-stratified thresholds: ≥5 mm is positive in HIV-positive patients, organ transplant recipients, patients on TNF-alpha inhibitors or other immunosuppressants, close contacts of active TB, and those with CXR showing prior TB. ≥10 mm is positive in recent immigrants (<5 years) from high-prevalence countries, residents/employees of high-risk settings (correctional facilities, homeless shelters, nursing homes), injection drug users, and children <4 years. ≥15 mm is positive in persons with no identified risk factors. This patient (recent immigrant <5 years) falls in the ≥10 mm threshold group. His 9 mm result does NOT meet the 10 mm threshold — the result is negative."}, {"number": 96, "stem": "A 35-year-old man presents with 6 weeks of productive cough, drenching night sweats, 10 lb weight loss, and low-grade fever. He recently immigrated from a country with high TB prevalence.\nChest radiograph shows a right upper lobe cavitary lesion. Sputum AFB smear is positive. Which of the following is the most appropriate combination of initial infection control and diagnostic steps?", "choices": {"A": "Place patient in standard room on droplet precautions; obtain 1 sputum sample for culture", "B": "Airborne infection isolation room; obtain 3 sputum specimens on 3 separate days for AFB smear and mycobacterial culture; rapid molecular testing (Xpert MTB/RIF) to confirm and detect rifampin resistance", "C": "Discharge home; smear-positive patients can be treated outpatient", "D": "Begin treatment for latent TB infection with isoniazid; no isolation needed", "E": "Await culture results before placing in isolation; a single smear positive may be false positive"}, "answer": "B", "correctText": "Airborne infection isolation room; obtain 3 sputum specimens on 3", "explanation": "separate days for AFB smear and mycobacterial culture; rapid molecular testing (Xpert\nMTB/RIF) to confirm and detect rifampin resistance\nSuspected active TB requires immediate AIRBORNE isolation (negative-pressure room, N95 for\nHCWs). The diagnostic workup includes: (1) minimum 3 sputum specimens collected on 3 separate days (ideally early morning) for AFB smear and mycobacterial culture — culture is the gold standard, sensitivity 80–85% for smear, >95% for culture; (2) Xpert MTB/RIF (rapid molecular test) provides results in <2 hours with simultaneous rifampin resistance detection. Isolation must not wait for culture results. A single smear positive, combined with the clinical and epidemiologic picture, warrants empiric treatment and isolation. Smear-positive patients are highly contagious."}, {"number": 97, "stem": "A 42-year-old woman with HIV (CD4 count 210 cells/µL) presents for routine TB screening. Her\nTST induration is 3 mm (negative). Which of the following best explains why an interferon-gamma release assay (IGRA) would be preferred over TST in this patient, and what a negative IGRA result means in this context?", "choices": {"A": "IGRA is preferred over TST because it requires only one visit; a negative IGRA definitively excludes LTBI in an HIV-positive patient", "B": "IGRA is preferred in HIV-positive patients because it is less affected by prior BCG vaccination; however, both TST and IGRA can have false-negative results in immunocompromised patients, and a negative result does not definitively exclude LTBI", "C": "TST is always preferred in HIV-positive patients because IGRA causes immune activation", "D": "IGRA should not be performed in HIV patients because the CD4 count invalidates the result", "E": "A negative IGRA result in HIV-positive patients can be used to safely withhold LTBI treatment regardless of exposure history"}, "answer": "B", "correctText": "IGRA is preferred in HIV-positive patients because it is less affected by", "explanation": "prior BCG vaccination; however, both TST and IGRA can have false-negative results in immunocompromised patients, and a negative result does not definitively exclude LTBI\nIGRA (QuantiFERON-TB Gold Plus or T-SPOT.TB) advantages over TST: requires only one patient visit (no return for reading), unaffected by prior BCG vaccination (BCG causes false-positive TST), more specific for M. tuberculosis. IGRA is preferred in BCG-vaccinated individuals and in patients where return for TST reading is unreliable. However, in immunocompromised patients (HIV, low CD4), both TST and IGRA are less sensitive and have higher false-negative rates due to impaired T-cell responses. A negative result does not definitively exclude LTBI in this population. Clinical context, exposure history, and CD4 count all inform the decision to treat. Current guidelines suggest IGRA preferred (or TST + IGRA) for HIV-positive individuals."}, {"number": 98, "stem": "A 30-year-old woman who emigrated from the Philippines 4 months ago tests positive on\nQuantiFERON-TB Gold assay. She denies cough, fever, night sweats, or weight loss. Chest radiograph is normal. HIV is negative. Liver enzymes are normal. She is taking a combined oral contraceptive (OCP). She is diagnosed with latent TB infection (LTBI). Which of the following is the most appropriate treatment regimen?", "choices": {"A": "9 months of daily isoniazid (9H); no interaction with OCP", "B": "3-month regimen of once-weekly isoniazid + rifapentine (3HP); counsel that rifapentine is a\nCYP inducer that reduces OCP efficacy — recommend barrier contraception during treatment", "C": "4 months of daily rifampin (4R) alone; preferred first-line in all patients", "D": "4-drug RIPE therapy for 6 months; LTBI requires active TB regimen", "E": "Observation only; BCG vaccination explains the positive IGRA"}, "answer": "B", "correctText": "3-month regimen of once-weekly isoniazid + rifapentine (3HP); counsel", "explanation": "that rifapentine is a CYP inducer that reduces OCP efficacy — recommend barrier contraception during treatment\nMultiple regimens are approved for LTBI. The 3-month isoniazid + rifapentine (3HP) regimen is preferred by CDC guidelines when available due to high completion rates and equivalent efficacy to 9 months of isoniazid. An important drug interaction: rifapentine (and rifampin) are potent CYP3A4 inducers that significantly reduce plasma concentrations of oral contraceptive hormones, potentially leading to contraceptive failure. Patients on hormonal contraception should be counseled to use a barrier method or alternative non-hormonal contraception during rifamycin treatment. IGRAs are NOT affected by prior BCG vaccination (unlike TST) — a positive IGRA cannot be attributed to BCG."}, {"number": 99, "stem": "A 45-year-old man from South Africa (high TB prevalence country) received BCG vaccination at birth. He undergoes tuberculin skin testing (TST) as part of occupational screening for a hospital position. His TST induration is 14 mm. He is asymptomatic with a normal chest radiograph. Which of the following correctly addresses the influence of prior BCG vaccination on TST interpretation?", "choices": {"A": "BCG vaccination always causes false-positive TST results >10 mm; this result should be attributed entirely to BCG and no LTBI treatment is needed", "B": "BCG received in infancy rarely produces TST reactions >10 mm in adulthood; a positive TST\n(≥10 mm at ≥10 mm threshold as a recent immigrant) should be interpreted as probable LTBI and treated, unless IGRA is negative", "C": "BCG vaccination gives lifelong protective immunity; neither TST nor IGRA testing is needed in BCG-vaccinated individuals", "D": "TST is never positive from BCG vaccination and all positive results indicate true M. tuberculosis infection", "E": "BCG vaccination causes false-positive IGRA results; IGRA is not useful in BCG-vaccinated individuals"}, "answer": "B", "correctText": "BCG received in infancy rarely produces TST reactions >10 mm in", "explanation": "adulthood; a positive TST (≥10 mm at ≥10 mm threshold as a recent immigrant) should be interpreted as probable LTBI and treated, unless IGRA is negative\nBCG vaccination in infancy (given in many high-prevalence countries) can cause false-positive TST reactions, but this effect typically wanes over time. When BCG is given in infancy, TST reactions >10 mm in adulthood are unlikely to be solely from BCG and should be interpreted as probable LTBI, especially in recent immigrants from high-prevalence countries. IGRA (QuantiFERON-TB Gold Plus or\nT-SPOT) is NOT affected by BCG vaccination and is preferred in BCG-vaccinated individuals to distinguish true LTBI from BCG-related TST positivity. A positive IGRA confirms LTBI regardless of\nBCG history. This patient (recent immigrant, 14 mm TST, high-prevalence origin) should be tested with\nIGRA, and if positive, treated for LTBI."}, {"number": 100, "stem": "A 40-year-old man with newly diagnosed active pulmonary TB (drug susceptibility testing pending) is started on first-line treatment. Which of the following correctly describes the standard first-line treatment regimen for drug-susceptible active pulmonary TB, and what is the purpose of the initial 2-month intensive phase?", "choices": {"A": "Isoniazid alone for 9 months; adequate for drug-susceptible TB", "B": "2 months of RIPE (rifampin, isoniazid, pyrazinamide, ethambutol) — intensive phase to rapidly eliminate bacillary load and prevent resistance; followed by 4 months of isoniazid + rifampin (continuation phase) — total 6 months", "C": "Rifampin + isoniazid for 9 months; pyrazinamide is too hepatotoxic to include", "D": "4-drug RIPE therapy for 9 months continuously without a phase distinction", "E": "Azithromycin + rifampin for 6 months; macrolides cover most mycobacteria"}, "answer": "B", "correctText": "2 months of RIPE (rifampin, isoniazid, pyrazinamide, ethambutol) —", "explanation": "intensive phase to rapidly eliminate bacillary load and prevent resistance; followed by 4 months of isoniazid + rifampin (continuation phase) — total 6 months\nThe standard first-line regimen for drug-susceptible active pulmonary TB consists of two phases: (1)\nIntensive phase (2 months): 4-drug RIPE therapy (Rifampin, Isoniazid, Pyrazinamide, Ethambutol) — the rationale is to rapidly kill the large bacterial burden, prevent emergence of resistance (using multiple agents ensures no single mutant survives), and reduce infectivity. (2) Continuation phase (4 months):\nRifampin + Isoniazid only — targets remaining dormant or slowly replicating bacilli. Total 6 months for drug-susceptible pulmonary TB. Ethambutol can be discontinued once susceptibility is confirmed.\nDirectly observed therapy (DOT) improves completion rates. MDR-TB (resistant to INH + rifampin) requires 18–24 months with second-line agents."}];
const container = document.getElementById('questions');
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function render() {
  container.innerHTML = questions.map(q => `
    <section class="qcard" id="q${q.number}" data-answer="${q.answer}">
      <div class="qtop"><span class="qnum">Question ${q.number}</span><span class="status" id="status${q.number}"></span></div>
      <div class="stem">${esc(q.stem)}</div>
      <div class="choices">
        ${Object.entries(q.choices).map(([letter,text]) => `
          <label class="choice" id="q${q.number}_${letter}">
            <input type="radio" name="q${q.number}" value="${letter}" />
            <span class="letter">${letter}.</span><span>${esc(text)}</span>
          </label>`).join('')}
      </div>
      <div class="rationale" id="rat${q.number}"><strong>Correct answer: ${q.answer}. ${esc(q.correctText)}</strong>

${esc(q.explanation)}</div>
    </section>`).join('');
}
function gradeExam() {
  let correct=0, answered=0;
  document.body.classList.add('graded'); document.body.classList.remove('missedOnly');
  questions.forEach(q => {
    const selected = document.querySelector(`input[name="q${q.number}"]:checked`);
    const card = document.getElementById(`q${q.number}`);
    card.classList.remove('correctCard','missedCard');
    Object.keys(q.choices).forEach(l => document.getElementById(`q${q.number}_${l}`).classList.remove('correct','incorrect'));
    document.getElementById(`q${q.number}_${q.answer}`).classList.add('correct');
    if (selected) {
      answered++;
      if (selected.value === q.answer) { correct++; card.classList.add('correctCard'); document.getElementById(`status${q.number}`).textContent='Correct'; }
      else { document.getElementById(`q${q.number}_${selected.value}`).classList.add('incorrect'); card.classList.add('missedCard'); document.getElementById(`status${q.number}`).textContent='Missed'; }
    } else { card.classList.add('missedCard'); document.getElementById(`status${q.number}`).textContent='Unanswered'; }
  });
  const pct = Math.round((correct/questions.length)*1000)/10;
  document.getElementById('scoreBox').textContent = `${correct} / ${questions.length} correct • ${pct}% • ${answered} answered`;
  window.scrollTo({top:0,behavior:'smooth'});
}
function reviewMissed() { document.body.classList.add('missedOnly'); window.scrollTo({top:0,behavior:'smooth'}); }
function resetExam() {
  document.querySelectorAll('input[type=radio]').forEach(r => r.checked=false);
  document.querySelectorAll('.choice').forEach(c => c.classList.remove('correct','incorrect'));
  document.querySelectorAll('.qcard').forEach(c => c.classList.remove('correctCard','missedCard'));
  document.querySelectorAll('.status').forEach(s => s.textContent='');
  document.body.classList.remove('graded','missedOnly');
  document.getElementById('scoreBox').textContent='Not graded yet';
  window.scrollTo({top:0,behavior:'smooth'});
}
render();
</script>
</body>
</html>
