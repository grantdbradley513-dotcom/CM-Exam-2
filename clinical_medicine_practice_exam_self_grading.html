*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(180deg,#f7fbff,#eef3f9);color:var(--text);line-height:1.55;font-size:18px} .wrap{max-width:1050px;margin:0 auto;padding:24px 16px 80px} header{background:linear-gradient(135deg,var(--navy),#1e6091);color:white;border-radius:22px;padding:28px;box-shadow:0 12px 30px rgba(18,53,91,.22);margin-bottom:22px} h1{margin:0 0 8px;font-size:clamp(30px,4vw,48px);line-height:1.05} .sub{opacity:.92;font-size:18px} .toolbar{position:sticky;top:0;z-index:10;background:rgba(245,247,251,.94);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between} .scorebox{font-weight:800;color:var(--navy);font-size:20px} button{appearance:none;border:0;border-radius:14px;padding:12px 16px;font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 4px 12px rgba(15,23,42,.12)} .primary{background:var(--blue);color:#fff} .secondary{background:#e8eef8;color:var(--navy)} .danger{background:#fff1f1;color:#9f1239} .qcard{background:var(--card);border:1px solid var(--border);border-radius:22px;margin:18px 0;padding:22px;box-shadow:0 8px 24px rgba(15,23,42,.06)} .qtop{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:12px} .qnum{background:var(--navy);color:white;border-radius:999px;padding:7px 13px;font-weight:900;font-size:15px} .status{font-weight:800;color:var(--muted)} .stem{font-size:20px;font-weight:650;white-space:pre-line;margin:14px 0 18px} .choice{display:flex;gap:12px;align-items:flex-start;border:2px solid var(--border);border-radius:16px;padding:14px;margin:10px 0;background:#fbfdff;cursor:pointer} .choice:hover{border-color:#9cc5ea} .choice input{margin-top:5px;transform:scale(1.2)} .letter{font-weight:900;color:var(--navy);min-width:28px} .choice.correct{background:var(--green);border-color:var(--green-border)} .choice.incorrect{background:var(--red);border-color:var(--red-border)} .rationale{display:none;margin-top:16px;padding:15px;border-left:5px solid var(--blue);background:var(--light);border-radius:12px;white-space:pre-line} .graded .rationale{display:block} .missedOnly .qcard.correctCard{display:none} .hide{display:none} .meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:18px} .pill{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.26);padding:10px 12px;border-radius:14px;font-weight:700} @media(max-width:650px){body{font-size:16px} .stem{font-size:18px} header{padding:22px} .toolbar{position:static} button{width:100%} .buttons{width:100%;display:grid;gap:10px}}

<div class="toolbar"><div class="scorebox" id="scoreBox">Not graded yet</div><div class="buttons"><button class="primary" onclick="gradeExam()">Submit & Grade</button><button class="secondary" onclick="reviewMissed()">Review Missed Questions</button><button class="danger" onclick="resetExam()">Reset Exam</button></div></div>

<script>
const questions = [{"number": 1, "stem": "A 72-year-old man is brought to the emergency department after a witnessed cardiac arrest.\nReturn of spontaneous circulation is achieved after 8 minutes. He remains unresponsive with no gag reflex. The team decides to secure a definitive airway. During preparation for endotracheal intubation, the nurse asks which oxygen delivery device provides the highest fraction of inspired oxygen while preparations are underway. Which device and maximum FiO₂ are correct?", "choices": {"A": "Nasal cannula at 6 L/min — approximately 44% FiO₂", "B": "Simple face mask at 10 L/min — approximately 60% FiO₂", "C": "Non-rebreather mask with reservoir at 15 L/min — up to 90–100% FiO₂", "D": "Venturi mask set to 50% — exactly 50% FiO₂ with no variation", "E": "Partial rebreather mask at 10 L/min — approximately 80% FiO₂"}, "answer": "C", "correctText": "Non-rebreather mask with reservoir at 15 L/min — up to 90–100% FiO₂", "explanation": "The non-rebreather mask (NRB) with a reservoir bag delivers the highest FiO₂ of non-invasive devices\n(up to 90–100%) because one-way valves on the exhalation ports prevent room-air entrainment and a valve between the bag and mask prevents rebreathing of exhaled gas. The Venturi mask delivers a precise but lower FiO₂ (24–50%) and is designed for patients needing controlled oxygen (e.g., COPD).\nNasal cannula provides ~24–44% FiO₂. A simple face mask provides ~35–60%. The partial rebreather lacks the one-way valve between bag and mask, allowing some exhaled gas rebreathing, achieving\n~60–80% FiO₂."}, {"number": 2, "stem": "A 45-year-old man is found unresponsive at the scene of a motor vehicle collision. Emergency medical services arrive and note sonorous respirations consistent with upper airway obstruction from tongue displacement. The patient has a rigid cervical collar in place for suspected cervical spine injury. Which maneuver is most appropriate to initially open the airway in this patient?", "choices": {"A": "Head-tilt chin-lift maneuver", "B": "Jaw-thrust maneuver without head extension", "C": "Blind nasotracheal intubation", "D": "Immediate surgical cricothyrotomy", "E": "Heimlich maneuver to clear a presumed foreign body"}, "answer": "B", "correctText": "Jaw-thrust maneuver without head extension", "explanation": "In patients with suspected cervical spine injury, the jaw-thrust maneuver without head extension is the preferred technique for opening the airway, as it displaces the mandible anteriorly to relieve obstruction without requiring neck extension. The head-tilt chin-lift technique risks exacerbating a cervical spine injury by extending the neck and is contraindicated in this setting. Definitive airway management\n(intubation or surgical airway) may be needed subsequently, but initial basic maneuver is appropriate first."}, {"number": 3, "stem": "A 68-year-old woman with a decreased level of consciousness (GCS 8) arrives in the emergency department after a stroke. She is breathing spontaneously but has noisy, obstructed respirations.\nShe has an intact gag reflex. The team wishes to maintain airway patency while preparations for endotracheal intubation are made. Which airway adjunct is most appropriate?", "choices": {"A": "Oropharyngeal airway (OPA), because the gag reflex is intact", "B": "Laryngeal mask airway, as it is the standard first-line adjunct in conscious patients", "C": "Nasopharyngeal airway (NPA), as it is better tolerated in patients with an intact gag reflex", "D": "No adjunct; simply reposition the patient's head", "E": "Oropharyngeal airway, because it is safe regardless of gag reflex status"}, "answer": "C", "correctText": "Nasopharyngeal airway (NPA), as it is better tolerated in patients with", "explanation": "an intact gag reflex\nThe nasopharyngeal airway (NPA) is the preferred adjunct in patients with an intact or partially intact gag reflex because it is better tolerated and less likely to stimulate vomiting than the oropharyngeal airway (OPA). The OPA is contraindicated in conscious or semiconscious patients with an intact gag reflex because it can induce vomiting and laryngospasm. The LMA is a supraglottic device used when intubation fails or as a rescue airway, not as a first-line adjunct. Note: NPA is relatively contraindicated in suspected basilar skull fracture."}, {"number": 4, "stem": "A 55-year-old man with a known difficult airway (Mallampati class IV, short neck, retrognathia) is scheduled for elective surgery. After induction of general anesthesia, direct laryngoscopy fails twice. A video laryngoscope is attempted and also fails to achieve intubation. The patient is being ventilated adequately by bag-valve mask between attempts. Which of the following best describes the role of the laryngeal mask airway (LMA) in this scenario?", "choices": {"A": "The LMA provides a definitive, protected airway equivalent to endotracheal intubation", "B": "The LMA is contraindicated when bag-valve mask ventilation is adequate", "C": "The LMA can serve as a rescue airway to maintain oxygenation, though it does not protect against aspiration", "D": "The LMA is the preferred first-line airway device in all patients with difficult airways", "E": "The LMA is only appropriate in pediatric patients"}, "answer": "C", "correctText": "The LMA can serve as a rescue airway to maintain oxygenation, though", "explanation": "it does not protect against aspiration\nThe LMA is a supraglottic airway device that can serve as a rescue airway in the 'can't intubate' scenario, providing a conduit for ventilation and oxygenation. However, it does not provide a definitive protected airway because it does not sit within the trachea and does not reliably protect against aspiration of gastric contents. In a 'can't intubate, can't oxygenate' scenario, a surgical airway\n(cricothyrotomy) would be the next step. The LMA is useful as a bridge device but should not be considered equivalent to ETI."}, {"number": 5, "stem": "A 30-year-old man is intubated after a drug overdose. An endotracheal tube is placed, the cuff is inflated, and the tube is secured. Post-intubation assessment reveals breath sounds over the right lung but absent breath sounds over the left lung. Chest rise is asymmetric (right greater than left).\nOxygen saturation is 91% despite FiO₂ of 100%. Which of the following is the most likely cause and appropriate next step?", "choices": {"A": "Left-sided pneumothorax; perform needle decompression immediately", "B": "Right mainstem intubation; withdraw the tube 2–3 cm and reassess", "C": "Esophageal intubation; confirm with capnography and re-intubate", "D": "Mucus plug in the left bronchus; perform suction via the ETT", "E": "Equipment failure; replace the ETT with a larger tube"}, "answer": "B", "correctText": "Right mainstem intubation; withdraw the tube 2–3 cm and reassess", "explanation": "Absent breath sounds unilaterally after intubation, with asymmetric chest rise, is classic for right mainstem bronchus intubation. Because the right mainstem bronchus has a less acute angle from the trachea, tubes that are advanced too far preferentially enter the right side, resulting in left lung atelectasis and hypoxemia. Management is to withdraw the tube by 2–3 cm, reassess breath sounds bilaterally, and confirm position with end-tidal CO₂ and chest radiograph. Esophageal intubation would typically show no CO₂ on capnography and epigastric sounds with ventilation."}, {"number": 6, "stem": "A 19-year-old woman is brought to the operating room for an elective laparoscopic procedure.\nAfter induction of anesthesia, a laryngeal mask airway (LMA) is placed successfully. Shortly after insufflation of the abdomen with CO₂, the anesthesia provider notices increased airway pressures and decreased tidal volumes. Which of the following best explains this complication and an important limitation of the LMA?", "choices": {"A": "The LMA has dislodged into the esophagus, causing CO₂ accumulation", "B": "The LMA does not form a high-pressure seal and can lose its position when gastric or abdominal pressures rise, compromising ventilation", "C": "The LMA cuff has ruptured from the elevated CO₂ pressure", "D": "Laryngospasm has occurred due to the supraglottic position of the LMA", "E": "The LMA is causing tracheomalacia from prolonged cuff inflation"}, "answer": "B", "correctText": "The LMA does not form a high-pressure seal and can lose its position", "explanation": "when gastric or abdominal pressures rise, compromising ventilation\nA key limitation of the LMA is that it forms a low-pressure supraglottic seal and does not reliably maintain ventilation when airway pressures are elevated — such as during laparoscopy with pneumoperitoneum, obesity, or low lung compliance. Unlike an ETT with an inflated cuff sealing within the trachea, the LMA can become displaced and leak at higher pressures. This is why LMA use in high-risk aspiration patients (full stomach, bowel obstruction) or surgeries requiring elevated airway pressures is relatively contraindicated.\n■■ ASTHMA ■■"}, {"number": 7, "stem": "A 16-year-old girl with a history of asthma has symptoms approximately twice per week and is awakened by cough or wheezing two nights per month. Her activity is occasionally limited.\nSpirometry shows FEV₁/FVC 0.72 (normal >0.80 for age) and FEV₁ 78% predicted. She uses albuterol for relief about twice weekly. She has not required oral steroids in the past year.\nAccording to NAEPP classification, which severity category best describes her asthma, and what is the recommended initial controller therapy?", "choices": {"A": "Intermittent asthma; no daily controller therapy needed, albuterol as needed only", "B": "Mild persistent asthma; low-dose inhaled corticosteroid (ICS) daily", "C": "Moderate persistent asthma; low-dose ICS plus long-acting beta-agonist (LABA)", "D": "Severe persistent asthma; high-dose ICS plus LABA plus oral corticosteroids", "E": "Mild persistent asthma; leukotriene receptor antagonist (LTRA) as preferred first-line controller"}, "answer": "B", "correctText": "Mild persistent asthma; low-dose inhaled corticosteroid (ICS) daily", "explanation": "This patient has mild persistent asthma: symptoms more than twice weekly but less than daily, nighttime awakenings 3–4 times per month, and FEV₁ ≥80% predicted. Per NAEPP guidelines, the preferred Step 2 controller therapy is a low-dose inhaled corticosteroid. Intermittent asthma is characterized by symptoms ≤2 days/week, ≤2 nights/month, and normal FEV₁. LABA monotherapy without ICS is contraindicated in asthma due to increased mortality risk. LTRAs are an alternative, not preferred, controller at Step 2. Moderate persistent would require daily symptoms or more frequent nighttime awakenings."}, {"number": 8, "stem": "A 32-year-old woman with asthma presents with an acute exacerbation. Her peak expiratory flow\n(PEF) on arrival is 45% of her personal best. She is speaking in short phrases, is sitting upright, and has audible expiratory wheezing. RR is 26/min, HR is 112 bpm, SpO₂ is 91% on room air.\nShe is started on continuous nebulized albuterol, ipratropium, and IV methylprednisolone. After 1 hour, her PEF improves to 62% predicted. Which of the following is the most appropriate disposition decision at this time?", "choices": {"A": "Discharge with a prescription for albuterol; PEF over 60% indicates full recovery", "B": "Admit to the ICU, as any exacerbation requiring IV steroids mandates intensive care", "C": "Continue monitoring and reassess; a PEF of 60–80% after initial therapy indicates an incomplete response requiring further treatment before disposition", "D": "Discharge immediately because oxygen saturation is now above 90%", "E": "Discharge with oral corticosteroids; the patient has improved sufficiently"}, "answer": "C", "correctText": "Continue monitoring and reassess; a PEF of 60–80% after initial therapy", "explanation": "indicates an incomplete response requiring further treatment before disposition\nA post-treatment PEF of 40–69% of predicted represents an incomplete response to initial bronchodilator therapy, and these patients generally require continued treatment and observation before a safe disposition can be determined. PEF ≥70% with symptom resolution and good oxygenation typically supports discharge with appropriate outpatient therapy. PEF <40% after treatment or clinical deterioration (silent chest, altered mental status, rising PaCO₂) may warrant ICU admission. Discharge solely based on SpO₂ or short-term improvement is insufficient and risks premature release."}, {"number": 9, "stem": "A 26-year-old man with a history of severe asthma and two prior intubations is brought by EMS for progressive dyspnea over 6 hours. On arrival he cannot speak full sentences, is using accessory muscles, and is diaphoretic. RR is 34/min, HR 128 bpm, SpO₂ 88% on a non-rebreather mask.\nAfter 20 minutes of continuous bronchodilator therapy, auscultation reveals markedly diminished breath sounds bilaterally with no wheezing, and his mental status is declining. Which of the following best explains this ominous change?", "choices": {"A": "The bronchospasm has resolved and the patient is improving", "B": "Bilateral pneumothoraces have developed from aggressive nebulizer treatment", "C": "The disappearance of wheezing with markedly reduced air movement indicates near-fatal airflow obstruction and impending respiratory arrest", "D": "The patient has developed a hypersensitivity reaction to ipratropium", "E": "The patient is hyperventilating from anxiety, causing pseudoimprovement"}, "answer": "C", "correctText": "The disappearance of wheezing with markedly reduced air movement", "explanation": "indicates near-fatal airflow obstruction and impending respiratory arrest\nThe 'silent chest' — disappearance of wheezing with markedly diminished breath sounds and deteriorating mental status — is an ominous sign in asthma indicating such severe airflow obstruction that there is insufficient airflow to generate wheeze. This represents near-fatal status asthmaticus and should prompt immediate preparation for endotracheal intubation. Improvement in asthma is characterized by improved air entry, rising peak flow, decreasing respiratory rate, and improving mental status — not simply loss of wheeze. Bilateral pneumothoraces are a rare complication and would present with hyperresonance."}, {"number": 10, "stem": "A 29-year-old woman with moderate persistent asthma uses a daily medium-dose ICS/LABA combination inhaler and albuterol as needed. She reports using albuterol four times per week and waking with symptoms two nights per week. Her Asthma Control Test (ACT) score is 14 (score\n≥19 indicates well-controlled). Which of the following is the most appropriate next step in management according to asthma step therapy?", "choices": {"A": "Step down therapy; the patient is using LABA unnecessarily", "B": "Maintain current therapy and reassess in 6 months", "C": "Step up therapy; add a long-acting muscarinic antagonist (LAMA) or increase ICS dose", "D": "Discontinue the ICS and switch to a leukotriene receptor antagonist", "E": "Refer for allergy testing only; pharmacotherapy adjustments are premature"}, "answer": "C", "correctText": "Step up therapy; add a long-acting muscarinic antagonist (LAMA) or", "explanation": "increase ICS dose\nThis patient has poorly controlled asthma (ACT <19, frequent rescue inhaler use, frequent nighttime symptoms) despite medium-dose ICS/LABA therapy. Asthma step therapy dictates stepping up treatment when control is inadequate. At this step, options include increasing ICS dose, adding a LAMA\n(tiotropium), or considering biologic therapy (e.g., anti-IgE, anti-IL-5). Step-down therapy is only appropriate when asthma has been well-controlled for at least 3 months. Discontinuing ICS is dangerous and contraindicated. The GINA 2023 guidelines emphasize addressing modifiable risk factors (adherence, inhaler technique) before stepping up."}, {"number": 11, "stem": "A 22-year-old male college student presents with episodic wheezing and chest tightness that consistently occurs when he runs outdoors in cold weather. He notes symptoms also occur when he visits his friend who has multiple cats. He has no symptoms at rest and his FEV₁ between episodes is normal. Which of the following best identifies the asthma triggers present and the underlying pathophysiology?", "choices": {"A": "Exercise-induced bronchoconstriction from airway remodeling; allergen sensitization is not implicated", "B": "Cold dry air causes heat and water loss from airways, triggering bronchoconstriction; cat dander is an aeroallergen that triggers IgE-mediated mast cell degranulation", "C": "Cold air causes vasospasm of pulmonary arteries, not bronchospasm", "D": "Cat dander causes non-IgE-mediated complement activation, unrelated to standard asthma", "E": "Both triggers cause fixed airflow obstruction that would be evident on resting spirometry"}, "answer": "B", "correctText": "Cold dry air causes heat and water loss from airways, triggering", "explanation": "bronchoconstriction; cat dander is an aeroallergen that triggers IgE-mediated mast cell degranulation\nExercise-induced bronchoconstriction occurs due to hyperpnea causing heat and water loss from airway mucosa, triggering mast cell mediator release and bronchoconstriction; cold dry air exacerbates this mechanism. Allergic asthma (the most common phenotype) involves IgE-mediated sensitization to aeroallergens (cat dander, dust mites, pollen); re-exposure triggers mast cell degranulation with release of histamine, leukotrienes, and prostaglandins. Resting spirometry is typically normal between episodes in episodic allergic asthma, distinguishing it from fixed airflow obstruction of COPD."}, {"number": 12, "stem": "According to the 2023 GINA guidelines (contrasted with 2020 NAEPP guidelines), which of the following represents the most significant change in the preferred reliever strategy for adult patients with mild asthma?", "choices": {"A": "GINA 2023 recommends scheduled daily LABA as the preferred reliever therapy in mild asthma", "B": "GINA 2023 recommends as-needed low-dose ICS-formoterol as the preferred reliever strategy, replacing SABA monotherapy as needed, to reduce the risk of severe exacerbations", "C": "Both GINA 2023 and NAEPP 2020 recommend SABA-only as-needed therapy as the preferred treatment for mild asthma", "D": "GINA 2023 recommends ipratropium as the preferred reliever due to fewer cardiovascular side effects than SABAs", "E": "GINA 2023 eliminates the use of ICS in mild asthma and relies solely on LTRA therapy"}, "answer": "B", "correctText": "GINA 2023 recommends as-needed low-dose ICS-formoterol as the", "explanation": "preferred reliever strategy, replacing SABA monotherapy as needed, to reduce the risk of severe exacerbations\nA key distinction of GINA 2023 from NAEPP 2020 is that GINA recommends against SABA-only therapy as the preferred reliever even in mild asthma (Steps 1–2). Instead, GINA 2023 prefers as-needed low-dose ICS-formoterol (budesonide-formoterol) as the reliever because clinical trials\n(SYGMA 1 and 2) showed this reduces severe exacerbations compared to SABA alone, even with infrequent use. The rationale is that every time a patient uses rescue medication, they also receive an anti-inflammatory dose of ICS. NAEPP 2020 still includes SABA as an acceptable option, particularly in the U.S., partly due to regulatory differences in available formulations."}, {"number": 13, "stem": "A 44-year-old woman with severe persistent asthma on high-dose ICS/LABA presents to the emergency department with a severe exacerbation. ABG shows pH 7.38, PaCO₂ 42 mmHg,\nPaO₂ 68 mmHg. Her respiratory rate is 32/min and she is speaking in 1–2 word sentences. She has received two rounds of nebulized albuterol. Which aspect of the ABG result is most concerning and why?", "choices": {"A": "The normal pH indicates the patient is stable and does not require escalation of care", "B": "The PaCO₂ of 42 mmHg is normal but is paradoxically alarming in the context of severe tachypnea, suggesting the patient is fatiguing and losing her ability to maintain the expected compensatory hyperventilation", "C": "The PaO₂ of 68 mmHg confirms adequate oxygenation and no intervention is needed", "D": "The pH of 7.38 confirms metabolic alkalosis from excess beta-agonist use", "E": "A normal PaCO₂ in asthma exacerbation is expected and reassuring"}, "answer": "B", "correctText": "The PaCO₂ of 42 mmHg is normal but is paradoxically alarming in the", "explanation": "context of severe tachypnea, suggesting the patient is fatiguing and losing her ability to maintain the expected compensatory hyperventilation\nIn a severe asthma exacerbation, patients initially hyperventilate, producing a low PaCO₂ (respiratory alkalosis). A 'normal' PaCO₂ of 40–42 mmHg in a patient with a RR of 32/min and severe distress is paradoxically alarming — it indicates the patient can no longer maintain compensatory hyperventilation and is fatiguing. This is a pre-arrest pattern. A rising PaCO₂ (>45 mmHg) in this context represents imminent respiratory failure and should prompt consideration of intubation. This concept — the\n'normocapnic' trap in severe asthma — is a high-yield clinical pearl.\n\n■■ CHEST TUBE / NEEDLE DECOMPRESSION ■■"}, {"number": 14, "stem": "A 22-year-old unrestrained passenger is brought to the trauma bay after a high-speed motor vehicle collision. He is in severe respiratory distress. Vitals: BP 72/40, HR 138, RR 36, SpO₂ 74% on non-rebreather. Exam reveals absent breath sounds and hyperresonance on the left, tracheal deviation to the right, and distended neck veins. He is rapidly deteriorating. Which of the following is the most immediate life-saving intervention?", "choices": {"A": "Portable chest radiograph to confirm tension pneumothorax before intervening", "B": "Emergent endotracheal intubation and positive-pressure ventilation", "C": "Immediate needle decompression at the second intercostal space, midclavicular line on the left, followed by chest tube insertion", "D": "Bilateral chest tube insertion without prior needle decompression", "E": "Pericardiocentesis to relieve suspected cardiac tamponade"}, "answer": "C", "correctText": "Immediate needle decompression at the second intercostal space,", "explanation": "midclavicular line on the left, followed by chest tube insertion\nThis is a classic presentation of tension pneumothorax: hypotension, absent breath sounds with hyperresonance unilaterally, tracheal deviation away from the affected side, and distended neck veins.\nTension pneumothorax is a clinical diagnosis and a life-threatening emergency. Treatment must not be delayed for imaging. Immediate needle decompression (14–16 gauge catheter at 2nd ICS, MCL on the affected side) rapidly decompresses the tension, followed by definitive chest tube placement. Intubation with positive-pressure ventilation before decompression would worsen the tension physiology.\nTamponade would present with muffled heart sounds and equal breath sounds bilaterally."}, {"number": 15, "stem": "During a chest tube insertion for a right-sided hemothorax, the provider inserts the tube at the 5th intercostal space in the anterior axillary line. To avoid injuring the intercostal neurovascular bundle\n(artery, vein, and nerve), along which anatomical landmark should the tube be directed during insertion?", "choices": {"A": "Along the inferior border of the rib above the interspace", "B": "Through the center of the intercostal space", "C": "Over the superior border of the rib below the interspace", "D": "Directly through the periosteum of the nearest rib", "E": "Along the inferior border of the rib below the interspace"}, "answer": "C", "correctText": "Over the superior border of the rib below the interspace", "explanation": "The intercostal neurovascular bundle (vein, artery, nerve — 'VAN' from superior to inferior) runs in the costal groove along the inferior border of each rib. Therefore, to avoid injuring these structures, the chest tube or thoracentesis needle should be advanced over the superior border of the rib below the interspace of interest. Going along the inferior border of the upper rib risks direct injury to the neurovascular bundle. This principle applies to thoracentesis, chest tube insertion, and intercostal nerve blocks."}, {"number": 16, "stem": "A 21-year-old tall, thin man presents with sudden right-sided pleuritic chest pain and dyspnea starting at rest 3 hours ago. He has no prior history of lung disease or smoking. Vitals: BP 122/74,\nHR 102, RR 20, SpO₂ 94% on room air. Chest radiograph confirms a large right primary spontaneous pneumothorax (>2 cm apex-to-cupola). He is symptomatic but hemodynamically stable. Which of the following is the most appropriate management?", "choices": {"A": "Observation with supplemental oxygen alone; large pneumothoraces always resolve spontaneously", "B": "Needle aspiration or small-bore chest tube insertion with hospital admission", "C": "Immediate thoracoscopic surgery (VATS) for definitive repair without attempting simpler interventions", "D": "High-flow oxygen and discharge home with outpatient follow-up in 1 week", "E": "Immediate large-bore chest tube (28–32 Fr) because the pneumothorax is large"}, "answer": "B", "correctText": "Needle aspiration or small-bore chest tube insertion with hospital", "explanation": "admission\nA large primary spontaneous pneumothorax (≥2 cm or symptomatic) in a hemodynamically stable patient is treated with needle aspiration or small-bore chest tube (pigtail catheter). Simple observation alone may be appropriate for small (≤1 cm), minimally symptomatic primary spontaneous pneumothoraces. Supplemental oxygen accelerates reabsorption of pleural air but is not sufficient alone for large pneumothoraces. Large-bore tubes are generally reserved for hemothorax or traumatic pneumothorax. VATS is considered for recurrent or persistent pneumothorax, not initial management."}, {"number": 17, "stem": "A 68-year-old man with severe COPD (FEV₁ 32% predicted) presents with sudden worsening dyspnea and right-sided chest pain for 4 hours. He is on home oxygen 2 L/min. Vitals: HR 110, RR 28, BP 130/80, SpO₂ 84% on 2 L nasal cannula. Exam shows hyperresonance and decreased breath sounds on the right. Chest radiograph confirms a moderate secondary spontaneous pneumothorax with 2.5 cm apex-to-cupola distance, no mediastinal shift. Which management approach is most appropriate?", "choices": {"A": "Observation with supplemental oxygen alone, as in primary spontaneous pneumothorax guidelines", "B": "Chest tube (tube thoracostomy) placement and hospital admission", "C": "Needle aspiration alone with same-day discharge if successful", "D": "Immediate surgical repair given the patient's COPD", "E": "Increase home oxygen to 4 L/min and arrange outpatient follow-up in 48 hours"}, "answer": "B", "correctText": "Chest tube (tube thoracostomy) placement and hospital admission", "explanation": "Secondary spontaneous pneumothorax (SSP) — occurring in the setting of underlying lung disease — is managed more aggressively than primary spontaneous pneumothorax. Because patients with COPD\n(or other underlying lung disease) have severely limited pulmonary reserve, even a moderate pneumothorax can be life-threatening. SSP virtually always requires chest tube insertion and hospital admission. Simple observation is not appropriate except in cases of very small (≤1 cm) incidental SSP in a stable patient. Discharge after needle aspiration alone would be inappropriate for SSP."}, {"number": 18, "stem": "A 35-year-old restrained driver sustains blunt chest trauma in a motor vehicle collision. On arrival:\nBP 94/60, HR 128, RR 26, SpO₂ 88% on 15 L NRB. Exam shows dullness to percussion at the right base, decreased breath sounds on the right, and trachea midline. A FAST exam is negative.\nChest radiograph shows opacification of the right hemithorax without mediastinal shift. Which of the following is the most appropriate next step?", "choices": {"A": "CT chest to characterize the right hemithorax opacification before intervening", "B": "Needle decompression at the right 2nd ICS, MCL, for suspected tension pneumothorax", "C": "Tube thoracostomy on the right to drain the hemothorax", "D": "Pericardiocentesis for suspected hemopericardium", "E": "Aggressive fluid resuscitation alone pending further workup"}, "answer": "C", "correctText": "Tube thoracostomy on the right to drain the hemothorax", "explanation": "This patient has a traumatic hemothorax: dullness to percussion, decreased breath sounds, opacification of the hemithorax (not hyperresonance), and hemodynamic instability. The appropriate treatment is tube thoracostomy to drain the blood, which both treats the hemothorax and allows monitoring of ongoing blood loss (massive hemothorax — >1,500 mL initial output or >200 mL/hr for 4 hours — is an indication for thoracotomy). Needle decompression is for tension pneumothorax\n(hyperresonance, tracheal deviation, absent breath sounds). Tension pneumothorax presents with hyperresonance, not dullness."}, {"number": 19, "stem": "A 58-year-old man has a chest tube in place for a right-sided parapneumonic effusion. On post-insertion day 2, the nurse notes that the water-seal chamber shows no fluctuation (no tidaling) with breathing, and the patient complains of persistent dyspnea. A repeat chest radiograph shows the effusion remains largely undrained. The tube itself is confirmed to be in good position by imaging. Which of the following is the most likely cause of inadequate drainage?", "choices": {"A": "The chest tube has been placed correctly and the absence of fluctuation means the lung is fully expanded", "B": "The tube is kinked or clogged, preventing drainage; repositioning or flushing the tube may restore function", "C": "The effusion is a transudate and requires medical management with diuretics, not drainage", "D": "The absence of fluctuation indicates the tube is in the pleural space but the lung has re-expanded", "E": "Bilateral chest tubes are required for adequate drainage of unilateral effusions"}, "answer": "B", "correctText": "The tube is kinked or clogged, preventing drainage; repositioning or", "explanation": "flushing the tube may restore function\nIn a functioning chest tube, the water-seal chamber should fluctuate (tidal) with the patient's respiratory effort as pressure changes transmit through the system. Absence of tidaling combined with persistent undrained effusion and ongoing symptoms indicates the tube is blocked (clotted, kinked, or occluded).\nCorrective actions include repositioning the tube or gentle saline flushing. If the lung has fully expanded\n(tube is working properly), the pleural space is obliterated and tidaling also ceases — but this would be confirmed by chest radiograph showing lung re-expansion, not persistent effusion.\n■■ COPD ■■"}, {"number": 20, "stem": "A 62-year-old man with a 40-pack-year smoking history presents for a routine visit. He reports persistent exertional dyspnea (mMRC grade 2) and a productive morning cough for the past 3 years. Post-bronchodilator spirometry shows FEV₁/FVC 0.62 and FEV₁ 58% predicted. He had one moderate exacerbation in the past year (treated with steroids and antibiotics as an outpatient).\nHis blood eosinophil count is 220 cells/µL. According to the current GOLD ABE framework, what is the most appropriate initial maintenance regimen?", "choices": {"A": "Short-acting beta-agonist (SABA) as needed only", "B": "LAMA monotherapy", "C": "LABA + LAMA combination", "D": "LABA + ICS combination", "E": "LABA + LAMA + ICS triple therapy"}, "answer": "C", "correctText": "LABA + LAMA combination", "explanation": "Under the GOLD 2023 ABE framework, this patient is Group E (2+ moderate exacerbations or 1+ hospitalization per year). Wait — he had ONE moderate exacerbation, so he is Group B (high symptoms, low exacerbation risk), not Group E. Group B patients with significant symptoms (mMRC\n≥2) should receive dual bronchodilator therapy (LABA + LAMA) as initial therapy per the updated\nGOLD 2023 framework, which upgraded from LABA or LAMA monotherapy for Group B. ICS is not routinely added unless eosinophils ≥300 or there is significant asthma overlap with high exacerbation risk. LABA+ICS without LAMA is not preferred for COPD."}, {"number": 21, "stem": "A 70-year-old woman with severe COPD (FEV₁ 30% predicted) is admitted with an acute exacerbation. She is using accessory muscles, RR 28/min, SpO₂ 84% on room air. ABG on 2\nL/min O₂: pH 7.30, PaCO₂ 62 mmHg, PaO₂ 58 mmHg, HCO₂■ 30 mEq/L. She is started on controlled O₂, nebulized bronchodilators, and systemic corticosteroids. Despite these measures, she remains in moderate-to-severe respiratory distress with pH 7.31. Which intervention has the strongest evidence for avoiding intubation in this patient?", "choices": {"A": "Heliox (helium-oxygen) therapy to reduce airway resistance", "B": "Non-invasive positive pressure ventilation (BiPAP)", "C": "High-flow nasal cannula oxygen", "D": "Immediate endotracheal intubation and mechanical ventilation", "E": "Intravenous aminophylline infusion"}, "answer": "B", "correctText": "Non-invasive positive pressure ventilation (BiPAP)", "explanation": "Non-invasive positive pressure ventilation (NPPV/BiPAP) has the strongest evidence in acute hypercapnic exacerbations of COPD. Multiple randomized controlled trials (including the landmark\nPlant et al. trial) demonstrate that BiPAP reduces the need for intubation, decreases mortality, and shortens hospital stay in AECOPD with pH <7.35 and PaCO₂ >45 mmHg. It augments tidal volume, decreases work of breathing, and allows CO₂ washout. Contraindications include hemodynamic instability, inability to protect airway, uncooperativeness, or facial trauma. Intubation is reserved for those failing NPPV or with contraindications."}, {"number": 22, "stem": "A 55-year-old man with suspected COPD undergoes pulmonary function testing. Results show\nFEV₁/FVC 0.62 (post-bronchodilator), FEV₁ 55% predicted, total lung capacity (TLC) 130% predicted, residual volume (RV) 180% predicted, and diffusing capacity of the lung for carbon monoxide (DLCO) 55% predicted. His chest CT shows areas of hyperlucency with destruction of alveolar walls, predominantly in the upper lobes. Which subtype of COPD is most consistent with these findings, and what is the underlying anatomic abnormality?", "choices": {"A": "Chronic bronchitis; characterized by mucous gland hypertrophy and excess mucus production", "B": "Emphysema; characterized by permanent enlargement and destruction of air spaces distal to the terminal bronchiole with loss of alveolar walls", "C": "Asthma-COPD overlap; characterized by reversible airflow obstruction superimposed on fixed obstruction", "D": "Bronchiectasis; characterized by permanent dilation of bronchi with impaired mucociliary clearance", "E": "Chronic bronchitis; characterized by hypoxic vasoconstriction and polycythemia"}, "answer": "B", "correctText": "Emphysema; characterized by permanent enlargement and destruction", "explanation": "of air spaces distal to the terminal bronchiole with loss of alveolar walls\nEmphysema is defined pathologically as permanent enlargement of air spaces distal to the terminal bronchiole, with destruction of alveolar walls and without obvious fibrosis. Pulmonary function findings include obstructive pattern (low FEV₁/FVC), air trapping (elevated TLC and RV), and reduced DLCO\n(due to loss of alveolar-capillary surface area). CT shows hyperlucency and bullae. Upper-lobe predominant emphysema (centrilobular) is associated with cigarette smoking. Chronic bronchitis is defined clinically (productive cough ≥3 months/year for ≥2 consecutive years) and has less DLCO reduction. DLCO is typically preserved in chronic bronchitis."}, {"number": 23, "stem": "A 40-year-old man with minimal smoking history (5 pack-years) presents with progressive exertional dyspnea. Spirometry shows severe obstruction (FEV₁ 38% predicted, FEV₁/FVC 0.58). Chest CT shows panlobular emphysema with lower-lobe predominance. Liver biopsy from a workup for mildly elevated transaminases shows PAS-positive intracytoplasmic globules in hepatocytes. Serum α1-antitrypsin level is 25 mg/dL (normal 100–200 mg/dL). Which of the following best characterizes the pathophysiology of his lung disease?", "choices": {"A": "Excess neutrophil elastase destroys alveolar walls due to unopposed protease activity from\nα1-antitrypsin deficiency", "B": "Autoimmune destruction of alveolar basement membranes", "C": "Mucus hypersecretion leading to air trapping and emphysema", "D": "Pulmonary arterial hypertension leading to hypoxic alveolar destruction", "E": "Fibrotic replacement of alveolar walls from repeated infections"}, "answer": "A", "correctText": "Excess neutrophil elastase destroys alveolar walls due to unopposed", "explanation": "protease activity from α1-antitrypsin deficiency\nα1-Antitrypsin (AAT) is a serine protease inhibitor (serpin) that primarily inhibits neutrophil elastase in the lung. In AAT deficiency (most commonly the ZZ phenotype), unopposed neutrophil elastase destroys alveolar walls, causing emphysema. The lower-lobe predominance of panlobular emphysema distinguishes AAT-deficiency emphysema from smoking-related centrilobular upper-lobe emphysema.\nThe liver disease results from misfolded Z-AAT protein accumulating as PAS-positive globules in hepatocytes. Augmentation therapy (IV purified AAT) is available for patients with AAT deficiency and evidence of emphysema."}, {"number": 24, "stem": "A 52-year-old man with moderate COPD (FEV₁ 58% predicted) presents to your clinic for follow-up. He smokes 1 pack per day and has tried nicotine replacement therapy without success.\nHe is motivated to quit. Which pharmacologic agent has the strongest evidence for smoking cessation and has been shown to modify the natural course of COPD?", "choices": {"A": "Bupropion SR, as a dopamine/norepinephrine reuptake inhibitor that reduces craving", "B": "Varenicline, as a partial nicotinic acetylcholine receptor agonist with superior quit rates compared to bupropion and NRT", "C": "Short-acting nicotine replacement therapy alone (patch); most effective intervention", "D": "Nortriptyline; first-line pharmacotherapy for smoking cessation in COPD", "E": "Benzodiazepines to reduce anxiety-driven smoking"}, "answer": "B", "correctText": "Varenicline, as a partial nicotinic acetylcholine receptor agonist with", "explanation": "superior quit rates compared to bupropion and NRT\nVarenicline (Chantix) is a partial agonist at the α4β2 nicotinic acetylcholine receptor, reducing craving and withdrawal while also blocking nicotine's reinforcing effects. Meta-analyses show it has superior quit rates compared to both bupropion and nicotine replacement therapy. Smoking cessation is the single most important disease-modifying intervention in COPD, slowing the accelerated decline in\nFEV₁. A combination of pharmacotherapy and behavioral counseling provides the highest quit rates.\nBupropion is second-line; nortriptyline is a third-line agent. NRT in combination is effective but inferior to varenicline as monotherapy."}, {"number": 25, "stem": "A 66-year-old woman with severe COPD presents with 3 days of worsening dyspnea, increased sputum production with yellow-green discoloration, and low-grade fever. Vitals: HR 108, RR 24,\nSpO₂ 88% on room air. ABG: pH 7.33, PaCO₂ 55, PaO₂ 55 mmHg, HCO₂■ 28. Chest radiograph shows hyperinflation without focal infiltrate. She is started on controlled oxygen, bronchodilators, and BiPAP. Which of the following pharmacologic interventions has the strongest evidence for reducing treatment failure and shortening hospital stay in this acute exacerbation of\nCOPD?", "choices": {"A": "Systemic corticosteroids (e.g., prednisone 40 mg daily for 5 days)", "B": "Antibiotics targeting respiratory pathogens (e.g., azithromycin or doxycycline)", "C": "Intravenous magnesium sulfate", "D": "Both systemic corticosteroids AND antibiotics are independently supported by evidence and should both be given", "E": "Nebulized hypertonic saline to aid mucociliary clearance"}, "answer": "D", "correctText": "Both systemic corticosteroids AND antibiotics are independently", "explanation": "supported by evidence and should both be given\nBoth systemic corticosteroids and antibiotics have independent, strong evidence in AECOPD. Systemic glucocorticoids (e.g., prednisone 40 mg/day × 5 days, shown equivalent to 14 days by the REDUCE trial) reduce treatment failure, shorten hospital stay, and improve FEV₁. Antibiotics (azithromycin, doxycycline, amoxicillin-clavulanate) reduce treatment failure and mortality in moderate-to-severe exacerbations, particularly with purulent sputum (Anthonisen criteria). This patient has purulent sputum and pH <7.35, so both are indicated. Giving only one would be incomplete management."}, {"number": 26, "stem": "A 74-year-old man with very severe COPD (FEV₁ 22% predicted) is evaluated for long-term oxygen therapy. Resting room-air ABG: pH 7.38, PaO₂ 54 mmHg, PaCO₂ 52 mmHg, SpO₂ 87%. He has no evidence of heart failure. Which of the following is the primary indication for prescribing long-term oxygen therapy (LTOT), and what is the established mortality benefit?", "choices": {"A": "LTOT is indicated for dyspnea relief only; no mortality benefit has been demonstrated", "B": "LTOT is indicated when PaO₂ ≤55 mmHg (or SpO₂ ≤88%) at rest; LTOT ≥15 hours/day has been shown to improve survival in COPD with resting hypoxemia", "C": "LTOT is indicated only during sleep or exercise, not at rest", "D": "LTOT is indicated only when PaO₂ <40 mmHg", "E": "LTOT improves symptoms but has no effect on the course of disease or survival in COPD"}, "answer": "B", "correctText": "LTOT is indicated when PaO₂ ≤55 mmHg (or SpO₂ ≤88%) at rest; LTOT", "explanation": "≥15 hours/day has been shown to improve survival in COPD with resting hypoxemia\nLong-term oxygen therapy (≥15 hours/day) is indicated when resting PaO₂ ≤55 mmHg (or SpO₂\n≤88%) and has been shown in two landmark RCTs (MRC and NOTT trials) to improve survival in\nCOPD patients with resting hypoxemia. LTOT reduces pulmonary hypertension, polycythemia, and right heart failure. It is also indicated when PaO₂ 56–59 mmHg with evidence of cor pulmonale, polycythemia (Hct ≥55%), or pulmonary hypertension. The goal is to maintain SpO₂ ≥90%. Nocturnal or exercise-only oxygen has not been shown to improve mortality."}, {"number": 27, "stem": "A 60-year-old man with a 45-pack-year history and severe COPD presents with progressive bilateral lower extremity edema, abdominal fullness, and worsening dyspnea over 3 months. Exam reveals jugular venous distension, a prominent left parasternal heave, loud P2, hepatomegaly, and 3+ pitting edema. ECG shows right axis deviation and P-pulmonale. Echo shows RV hypertrophy and dilation, PASP 62 mmHg, normal LV function. Which mechanism best explains this patient's syndrome?", "choices": {"A": "High-output cardiac failure from severe anemia", "B": "Right ventricular failure secondary to pulmonary hypertension caused by chronic hypoxemia and lung disease (cor pulmonale)", "C": "Left ventricular systolic dysfunction with pulmonary venous hypertension transmitted to the right heart", "D": "Primary tricuspid regurgitation causing right ventricular volume overload", "E": "Constrictive pericarditis restricting ventricular filling"}, "answer": "B", "correctText": "Right ventricular failure secondary to pulmonary hypertension caused", "explanation": "by chronic hypoxemia and lung disease (cor pulmonale)\nCor pulmonale is right ventricular failure resulting from pulmonary hypertension caused by a primary disorder of the lungs or pulmonary vasculature, independent of left heart disease. In COPD, chronic hypoxia causes hypoxic pulmonary vasoconstriction, leading to increased pulmonary vascular resistance and pressure. Over time, the right ventricle hypertrophies and eventually fails, causing the clinical syndrome of cor pulmonale: JVD, peripheral edema, hepatomegaly, parasternal heave, and loud P2. The normal LV function and echo findings exclude left-sided heart failure (Group 2 PH) as the cause.\n■■ DVT / PULMONARY EMBOLISM ■■"}, {"number": 28, "stem": "A 48-year-old woman presents with sudden-onset dyspnea and right-sided pleuritic chest pain that began 2 hours ago, 5 days after a 12-hour flight. She has right calf swelling and tenderness. HR 116, RR 24, SpO₂ 91% on room air, BP 128/80. Her clinician calculates a Wells PE score of 8\n(high probability). Which is the most appropriate next diagnostic step?", "choices": {"A": "Order a D-dimer; if negative, no further imaging needed", "B": "Apply the PERC rule; if all criteria negative, no further testing required", "C": "Proceed directly to CT pulmonary angiography (CTPA) without D-dimer", "D": "Begin empiric anticoagulation and discharge without imaging", "E": "Obtain a V/Q scan as the preferred first-line test for PE"}, "answer": "C", "correctText": "Proceed directly to CT pulmonary angiography (CTPA) without D-dimer", "explanation": "In a patient with HIGH pretest probability (Wells ≥6), D-dimer testing is not appropriate: even a negative\nD-dimer in this setting does not adequately exclude PE (the negative predictive value is insufficient at high pretest probability). The correct approach is to proceed directly to CTPA, which is the gold-standard imaging test for PE. The PERC rule is only applicable when clinical suspicion is LOW; applying it in a high-probability patient is inappropriate and dangerous. D-dimer is most useful in LOW pretest probability settings to exclude PE and avoid unnecessary imaging."}, {"number": 29, "stem": "A 28-year-old healthy woman presents to the emergency department with 1 day of mild dyspnea and chest tightness after a 2-hour car ride. Vitals are normal: HR 82, RR 16, SpO₂ 98% on room air, BP 118/72. She has no prior history of DVT/PE, no recent surgery, no leg swelling, no hemoptysis, and no tachycardia. Her Wells PE score is 0 (low probability). Which of the following is the most appropriate next step?", "choices": {"A": "Proceed directly to CTPA because PE can present atypically", "B": "Apply the PERC rule; if all 8 criteria are negative, PE can be excluded without further testing", "C": "Order a D-dimer; if positive, proceed to CTPA", "D": "Admit for observation and serial troponins", "E": "Begin empiric anticoagulation while awaiting workup"}, "answer": "B", "correctText": "Apply the PERC rule; if all 8 criteria are negative, PE can be excluded", "explanation": "without further testing\nThe PERC (Pulmonary Embolism Rule-out Criteria) rule can be applied when pretest probability is\nLOW (≤1–2% per gestalt). If ALL 8 PERC criteria are negative (age <50, HR <100, SpO₂ ≥95%, no unilateral leg swelling, no hemoptysis, no recent trauma/surgery, no prior DVT/PE, no estrogen use),\nPE can be excluded without further testing, avoiding unnecessary radiation and contrast from CTPA.\nThis patient meets criteria for PERC application. If PERC-negative, no further workup is needed.\nD-dimer has a high false-positive rate in young patients and should only be ordered if PERC criteria are not all met."}, {"number": 30, "stem": "A 35-year-old woman on oral contraceptives presents with left leg pain and swelling for 2 days.\nDuplex Doppler ultrasonography of the left lower extremity shows a non-compressible segment of the left popliteal vein, confirming proximal DVT. She has no underlying hypercoagulable condition and no prior DVT/PE. She is otherwise healthy. Which of the following best describes the minimum duration of anticoagulation and the rationale for stopping it at that point?", "choices": {"A": "Indefinite anticoagulation; all DVTs require lifelong treatment", "B": "3 months; this is a provoked DVT (OCP use is a transient risk factor), and the risk of recurrence after a provoked event is lower than for unprovoked events", "C": "6 weeks only; proximal DVT requires less treatment than distal DVT", "D": "3 months followed by aspirin for secondary prevention indefinitely", "E": "Indefinite anticoagulation because the DVT is provoked by an ongoing risk factor (OCP use)"}, "answer": "B", "correctText": "3 months; this is a provoked DVT (OCP use is a transient risk factor),", "explanation": "and the risk of recurrence after a provoked event is lower than for unprovoked events\nThis is a provoked DVT: OCP use is a major transient hormonal risk factor. Current ACCP/ASH guidelines recommend at least 3 months of anticoagulation for a first provoked proximal DVT. After completing anticoagulation (and stopping the provoking factor — the OCP), the annualized recurrence risk drops to approximately 3% per year, making indefinite therapy unnecessary. By contrast, unprovoked DVT/PE has a recurrence risk of approximately 7–10% per year, and extended/indefinite therapy is often recommended. The OCP should be discontinued and alternative contraception discussed. Proximal DVT requires longer treatment than distal (calf) DVT, not shorter."}, {"number": 31, "stem": "A 65-year-old man is brought to the ED with acute dyspnea, diaphoresis, and near-syncope.\nVitals: BP 78/50, HR 138, RR 30, SpO₂ 84% on 15 L NRB. Bedside echocardiogram shows a severely dilated, hypokinetic right ventricle with D-sign (septal flattening). CTPA is rapidly obtained and confirms a large saddle pulmonary embolism with bilateral main pulmonary artery involvement. Which of the following is the most appropriate treatment for this patient?", "choices": {"A": "Anticoagulation with unfractionated heparin alone; systemic thrombolysis is never indicated", "B": "Systemic thrombolysis (e.g., IV alteplase 100 mg over 2 hours) given the hemodynamic instability, followed by anticoagulation", "C": "Immediate surgical embolectomy without attempting thrombolysis", "D": "Direct oral anticoagulant (DOAC) therapy alone; adequate for massive PE", "E": "Inferior vena cava filter placement as the primary treatment for massive PE"}, "answer": "B", "correctText": "Systemic thrombolysis (e.g., IV alteplase 100 mg over 2 hours) given", "explanation": "the hemodynamic instability, followed by anticoagulation\nThis patient has massive (high-risk) PE, defined by hemodynamic instability (systolic BP <90 mmHg) with evidence of RV dysfunction and failure. Systemic thrombolytic therapy (IV alteplase 100 mg over 2 hours) is the treatment of choice when there are no contraindications, as it rapidly restores pulmonary blood flow and reverses RV failure. Unfractionated heparin should also be initiated. Surgical embolectomy or catheter-directed therapy is reserved for patients with absolute contraindications to thrombolysis or when thrombolysis fails. DOACs are not appropriate in the acute setting for massive\nPE. IVC filter does not treat the existing clot."}, {"number": 32, "stem": "A 58-year-old man with stage IIIA non-small cell lung cancer presents with painful right calf swelling. Duplex ultrasound confirms a right popliteal DVT. He is scheduled to begin chemotherapy. His creatinine is 1.1 mg/dL. He has no active bleeding. Which anticoagulant is preferred for treatment of cancer-associated venous thromboembolism in this patient?", "choices": {"A": "Warfarin with target INR 2–3; well-studied in cancer patients", "B": "Enoxaparin (LMWH) alone; historical standard for cancer-associated DVT", "C": "Apixaban or rivaroxaban (DOAC); current guidelines favor DOACs over LMWH for most cancer-associated VTE without high GI/GU bleeding risk", "D": "Aspirin; adequate for DVT prophylaxis in cancer patients", "E": "Fondaparinux; preferred agent for cancer-associated VTE"}, "answer": "C", "correctText": "Apixaban or rivaroxaban (DOAC); current guidelines favor DOACs over", "explanation": "LMWH for most cancer-associated VTE without high GI/GU bleeding risk\nContemporary guidelines (ASCO, ITAC) have updated recommendations for cancer-associated VTE:\nDOACs (specifically apixaban and rivaroxaban) are now preferred over LMWH for most patients based on the ADAM-VTE, CARAVAGGIO, Hokusai-Cancer, and SELECT-D trials showing comparable or superior efficacy with similar bleeding rates. LMWH remains preferred in patients with high GI or GU bleeding risk (e.g., luminal GI tumors) due to increased mucosal bleeding with DOACs. Warfarin is problematic in cancer patients due to variable INR levels from drug interactions and poor oral intake."}, {"number": 33, "stem": "A 42-year-old woman with a history of unprovoked PE 2 years ago was treated with warfarin for 12 months and then discontinued. She now presents with recurrent acute-onset dyspnea and right-sided chest pain. CTPA confirms a new right lower lobe PE. She has no malignancy, no antiphospholipid syndrome, and no inherited thrombophilia. Which of the following best describes the recommended duration of anticoagulation for this second unprovoked PE?", "choices": {"A": "3 months; treat the same as a first provoked event", "B": "6 months, then reassess", "C": "Indefinite anticoagulation, given the high risk of recurrence after a second unprovoked PE", "D": "6 weeks of full anticoagulation followed by aspirin indefinitely", "E": "12 months, then re-evaluate with D-dimer testing"}, "answer": "C", "correctText": "Indefinite anticoagulation, given the high risk of recurrence after a", "explanation": "second unprovoked PE\nAfter a second unprovoked PE, the risk of recurrence without anticoagulation is very high (estimated 15–20% per year). Current ACCP and AHA guidelines recommend indefinite anticoagulation for patients with a second unprovoked VTE, provided bleeding risk is acceptable. The decision should incorporate shared decision-making about risks and benefits. Aspirin alone is inadequate as secondary prevention for VTE. A first unprovoked PE typically warrants at least 3 months with strong consideration for extended/indefinite therapy; a second unprovoked PE essentially mandates it."}, {"number": 34, "stem": "A 55-year-old woman presents with exertional dyspnea and lower extremity edema. She has a remote history of bilateral PE (approximately 3 years ago) treated with warfarin for 6 months. She was told anticoagulation was stopped and she was 'cured.' V/Q scan shows multiple bilateral mismatched perfusion defects in a pattern consistent with chronic PE. Right heart catheterization reveals mPAP 40 mmHg, PAWP 10 mmHg, PVR 7 Wood units. Which diagnosis and first-line treatment are most appropriate?", "choices": {"A": "Group 1 PAH; initiate endothelin receptor antagonist therapy", "B": "Chronic thromboembolic pulmonary hypertension (CTEPH); surgical pulmonary endarterectomy (PEA) for eligible patients", "C": "Recurrent acute PE; systemic thrombolysis", "D": "Cor pulmonale from COPD; optimize bronchodilator therapy", "E": "Pulmonary veno-occlusive disease; anticoagulation alone"}, "answer": "B", "correctText": "Chronic thromboembolic pulmonary hypertension (CTEPH); surgical", "explanation": "pulmonary endarterectomy (PEA) for eligible patients\nCTEPH (WHO Group 4 PH) occurs when organized thrombi obstruct the pulmonary vasculature and fail to fully resolve, causing progressive pulmonary hypertension. Diagnosis requires mPAP ≥25 mmHg,\nPAWP ≤15 mmHg (pre-capillary), and chronic perfusion defects ≥3 months after adequate anticoagulation. Pulmonary endarterectomy (PEA) is the treatment of choice for surgically accessible\nCTEPH and can be curative. For inoperable patients, riociguat (a soluble guanylate cyclase stimulator) is approved. All CTEPH patients require lifelong anticoagulation. Referral to a CTEPH center is essential.\n■■ PULMONARY HYPERTENSION ■■"}, {"number": 35, "stem": "A 35-year-old woman with systemic sclerosis presents with progressive exertional dyspnea over 18 months. She has Raynaud's phenomenon and telangiectasias. Vitals: BP 118/74, HR 92,\nSpO₂ 94% on room air. Echocardiogram estimates RVSP 62 mmHg. Right heart catheterization confirms: mPAP 46 mmHg, PAWP 10 mmHg, PVR 8 Wood units, cardiac output 4.0 L/min.\nPulmonary vasoreactivity testing is negative. Based on the WHO classification, which group does this patient belong to, and which class of medication targets a relevant pathway in this condition?", "choices": {"A": "Group 2 PH; diuretics and ACE inhibitors", "B": "Group 1 PAH (connective tissue disease-associated); endothelin receptor antagonists,\nPDE-5 inhibitors, or prostacyclin analogs", "C": "Group 3 PH; supplemental oxygen and treat underlying lung disease", "D": "Group 4 CTEPH; anticoagulation and surgical endarterectomy", "E": "Group 1 PAH; high-dose calcium channel blockers are first-line given the negative vasoreactivity test"}, "answer": "B", "correctText": "Group 1 PAH (connective tissue disease-associated); endothelin", "explanation": "receptor antagonists, PDE-5 inhibitors, or prostacyclin analogs\nThis patient has Group 1 PAH — specifically connective tissue disease-associated PAH (CTD-PAH), one of the most common forms after idiopathic PAH. Hemodynamic criteria confirm pre-capillary PH\n(mPAP ≥25, PAWP ≤15, elevated PVR). Approved therapies target three pathways: (1) endothelin pathway — endothelin receptor antagonists (ambrisentan, bosentan, macitentan); (2) nitric oxide pathway — PDE-5 inhibitors (sildenafil, tadalafil); (3) prostacyclin pathway — prostacyclin analogs\n(epoprostenol, iloprost). High-dose CCBs are ONLY indicated in the small subset (~10%) of patients who have a POSITIVE acute vasoreactivity test. This patient tested negative."}, {"number": 36, "stem": "A 52-year-old man with suspected pulmonary hypertension undergoes right heart catheterization.\nResults: right atrial pressure 12 mmHg (nl <8), mPAP 38 mmHg (nl <20), pulmonary artery wedge pressure (PAWP) 22 mmHg (nl ≤15), cardiac output 3.8 L/min, PVR 4.2 Wood units (nl <2 WU).\nTransthoracic echocardiogram shows an EF of 35% and grade 3 diastolic dysfunction. Which of the following correctly identifies the hemodynamic pattern and the most likely etiology?", "choices": {"A": "Pre-capillary PH (PAWP ≤15 mmHg); consistent with Group 1 PAH", "B": "Post-capillary PH (PAWP >15 mmHg); consistent with Group 2 PH due to left heart disease", "C": "Pre-capillary PH with normal left heart; consistent with Group 3 PH from lung disease", "D": "Normal hemodynamics; no intervention required", "E": "Combined pre- and post-capillary PH with isolated elevated PVR; suggests Group 4 CTEPH"}, "answer": "B", "correctText": "Post-capillary PH (PAWP >15 mmHg); consistent with Group 2 PH due", "explanation": "to left heart disease\nThis patient has post-capillary pulmonary hypertension: mPAP ≥25 mmHg AND PAWP >15 mmHg, indicating elevated left-sided filling pressures transmitted to the pulmonary vasculature. This is Group 2\nPH — pulmonary hypertension due to left heart disease (reduced EF with systolic dysfunction plus diastolic dysfunction). This is the most common form of PH overall. Treatment targets the underlying left heart disease (HFrEF therapy) rather than PAH-specific vasodilators, which can be harmful in\nGroup 2 by causing pulmonary edema. The elevated PVR suggests combined pre- and post-capillary component ('out-of-proportion' PH)."}, {"number": 37, "stem": "A 40-year-old woman with Group 1 idiopathic PAH undergoes acute vasoreactivity testing with inhaled nitric oxide during right heart catheterization. A positive response is defined as a decrease in mPAP ≥10 mmHg to an absolute mPAP <40 mmHg with maintained or improved cardiac output.\nHer response meets these criteria. Which therapy is uniquely appropriate for this vasoreactive subset that would be inappropriate for the majority of PAH patients?", "choices": {"A": "Intravenous epoprostenol", "B": "Combination ambrisentan + tadalafil", "C": "High-dose calcium channel blocker (e.g., amlodipine or diltiazem)", "D": "Riociguat", "E": "Subcutaneous treprostinil"}, "answer": "C", "correctText": "High-dose calcium channel blocker (e.g., amlodipine or diltiazem)", "explanation": "Acute vasoreactivity testing identifies the small subset (~10%) of PAH patients who have significant vasodilatory reserve. These patients can be treated with high-dose calcium channel blockers\n(amlodipine, diltiazem, or nifedipine) and have an excellent long-term prognosis if they maintain a sustained response. High-dose CCBs are not used in PAH patients who are non-vasoreactive because they can cause vasodilation and worsen right ventricular failure (afterload reduction in a non-responsive\nRV does not improve output). Other PAH therapies (endothelin antagonists, PDE-5 inhibitors, prostacyclins) are used in non-vasoreactive or CCB-failing vasoreactive patients."}, {"number": 38, "stem": "A 68-year-old man with severe COPD presents with progressive bilateral edema, jugular venous distension, a parasternal heave, and loud P2. Echocardiogram shows RV hypertrophy with RVSP 55 mmHg, normal LV function. He is on home O₂ 2 L/min but SpO₂ is 85% at rest. Which of the following WHO group does he belong to, and what is the most important first-line treatment?", "choices": {"A": "Group 1 PAH; initiate endothelin receptor antagonist", "B": "Group 3 PH from COPD/hypoxia; optimize oxygen therapy to maintain SpO₂ ≥90% as first-line intervention", "C": "Group 2 PH; treat with diuretics and ACE inhibitors", "D": "Group 5 PH; refer for transplant evaluation", "E": "Group 4 CTEPH; anticoagulate and evaluate for endarterectomy"}, "answer": "B", "correctText": "Group 3 PH from COPD/hypoxia; optimize oxygen therapy to maintain", "explanation": "SpO₂ ≥90% as first-line intervention\nThis is Group 3 PH — pulmonary hypertension due to chronic lung disease and/or hypoxia. The primary mechanism is hypoxic pulmonary vasoconstriction from chronic hypoxemia, leading to fixed vascular remodeling over time. The most important and evidence-based intervention is correction of hypoxemia with long-term oxygen therapy, which reduces pulmonary vasoconstriction and slows progression of PH. PAH-specific vasodilators (endothelin antagonists, PDE-5 inhibitors, prostacyclins) are generally NOT recommended in Group 3 PH outside of clinical trials, as they can worsen ventilation-perfusion matching and gas exchange."}, {"number": 39, "stem": "A 44-year-old woman is newly diagnosed with severe Group 1 PAH (idiopathic). Right heart catheterization: mPAP 52 mmHg, PAWP 8 mmHg, PVR 12 Wood units, CO 3.5 L/min. She is\nWHO functional class III (symptoms with less than ordinary activity). Vasoreactivity testing is negative. Which of the following best reflects current evidence-based initial therapy for this patient?", "choices": {"A": "Monotherapy with a PDE-5 inhibitor (sildenafil) alone", "B": "Initial combination therapy with an endothelin receptor antagonist (ERA) plus a PDE-5 inhibitor (e.g., ambrisentan + tadalafil), based on the AMBITION trial", "C": "High-dose calcium channel blocker therapy", "D": "Anticoagulation alone with warfarin", "E": "Intravenous epoprostenol reserved for WHO functional class IV patients only"}, "answer": "B", "correctText": "Initial combination therapy with an endothelin receptor antagonist", "explanation": "(ERA) plus a PDE-5 inhibitor (e.g., ambrisentan + tadalafil), based on the AMBITION trial\nThe AMBITION trial demonstrated that initial combination oral therapy with ambrisentan + tadalafil significantly reduced clinical failure events compared to either monotherapy in treatment-naive Group 1\nPAH patients. Current guidelines (AHA/ACC, ESC/ERS) recommend upfront combination oral therapy for newly diagnosed PAH in WHO FC II–III. High-dose CCBs are only for vasoreactive patients. IV epoprostenol is the gold-standard for FC IV or rapidly deteriorating patients. Monotherapy is now considered inferior initial approach for most PAH patients based on current evidence."}, {"number": 40, "stem": "A 70-year-old man with severe COPD, chronic hypoxemia, and right heart failure is admitted for an exacerbation. He has JVD, peripheral edema, and hepatomegaly. His echocardiogram shows severe RV dilation, RV systolic dysfunction, and elevated RVSP. LV function is normal. Which of the following statements correctly distinguishes cor pulmonale from left-sided heart failure as a cause of his right-sided findings?", "choices": {"A": "Cor pulmonale is caused by elevated left atrial pressure transmitted backward through the pulmonary circulation", "B": "Cor pulmonale refers to RV failure from pulmonary hypertension due to primary lung pathology, distinguishable by normal left heart function and elevated PAWP", "C": "Cor pulmonale refers to RV failure from pulmonary hypertension due to primary lung pathology, distinguishable by normal left heart function and normal PAWP (pre-capillary pattern)", "D": "Cor pulmonale and left heart failure both cause post-capillary pulmonary hypertension", "E": "Cor pulmonale is synonymous with Group 2 pulmonary hypertension"}, "answer": "C", "correctText": "Cor pulmonale refers to RV failure from pulmonary hypertension due to", "explanation": "primary lung pathology, distinguishable by normal left heart function and normal PAWP\n(pre-capillary pattern)\nCor pulmonale is defined as RV hypertrophy and eventual failure resulting from pulmonary hypertension caused by a primary disorder of the lungs, pulmonary vasculature, or chest wall — independent of left heart disease. On right heart catheterization, it produces a pre-capillary pattern: elevated mPAP with NORMAL PAWP (≤15 mmHg), reflecting that the problem originates in the pulmonary vasculature, not elevated left-sided pressures. Left heart failure produces post-capillary PH: elevated PAWP (>15 mmHg) reflecting elevated left atrial pressure. This distinction is critical for treatment selection.\n■■ PLEURAL DISORDERS ■■"}, {"number": 41, "stem": "A 58-year-old man with a history of heart failure presents with worsening dyspnea and bilateral lower extremity edema. On exam he has bilateral dullness to percussion at the lung bases.\nThoracentesis of the right-sided effusion yields straw-colored fluid with the following results: pleural fluid protein 1.8 g/dL, serum protein 7.2 g/dL, pleural fluid LDH 110 U/L, serum LDH 280\nU/L (normal upper limit 200 U/L). Which of the following correctly classifies this effusion using\nLight's criteria?", "choices": {"A": "Exudate; pleural/serum LDH ratio >0.6", "B": "Transudate; pleural/serum protein ratio <0.5 AND pleural/serum LDH ratio <0.6", "C": "Exudate; pleural fluid protein >3 g/dL", "D": "Transudate; LDH absolute value <200 U/L", "E": "Exudate; pleural/serum protein ratio >0.5"}, "answer": "B", "correctText": "Transudate; pleural/serum protein ratio <0.5 AND pleural/serum LDH", "explanation": "ratio <0.6\nLight's criteria classify an effusion as an EXUDATE if ANY of the following are present: (1) pleural/serum protein ratio >0.5, (2) pleural/serum LDH ratio >0.6, or (3) pleural fluid LDH >2/3 the upper limit of normal for serum LDH. In this case: protein ratio = 1.8/7.2 = 0.25 (<0.5); LDH ratio = 110/280 = 0.39 (<0.6); pleural LDH 110 < 2/3 of 200 = 133. None of the exudate criteria are met, so this is a TRANSUDATE, consistent with heart failure. Transudates are caused by altered hydrostatic/oncotic pressures (CHF, cirrhosis, nephrotic syndrome); exudates by inflammatory/infectious/malignant processes."}, {"number": 42, "stem": "A 62-year-old woman with a 50-pack-year smoking history presents with 6 weeks of progressive dyspnea, dull left-sided chest discomfort, and a 12-pound weight loss. Thoracentesis yields bloody fluid. Lab results: pleural/serum protein ratio 0.72, pleural/serum LDH ratio 0.85, pleural glucose 38 mg/dL (serum 98 mg/dL), pH 7.18. Cytology is pending. Which of the following correctly classifies the effusion and identifies the most likely etiology?", "choices": {"A": "Transudate; most likely heart failure given the large volume", "B": "Exudate; bloody appearance and low glucose in a smoker raises strong concern for malignancy; further workup with cytology and chest CT is warranted", "C": "Exudate; consistent with uncomplicated parapneumonic effusion; treat with antibiotics alone", "D": "Transudate; low glucose is from systemic hypoglycemia, not infection", "E": "Exudate; low pH confirms tuberculosis; initiate RIPE therapy"}, "answer": "B", "correctText": "Exudate; bloody appearance and low glucose in a smoker raises strong", "explanation": "concern for malignancy; further workup with cytology and chest CT is warranted\nThis is an exudate (protein ratio >0.5 and LDH ratio >0.6). Bloody exudative effusion with low glucose\n(<60 mg/dL) in a smoker with weight loss and progressive dyspnea is highly concerning for malignant pleural effusion (most commonly from lung cancer, also breast cancer, lymphoma). Low pleural glucose\n(<60) can be seen in malignancy, complicated parapneumonic effusion/empyema, TB, and rheumatoid pleuritis. The next steps are CT chest with contrast and pleural cytology. If cytology is negative (■60% sensitivity), video-assisted thoracoscopy (VATS) may be needed for tissue diagnosis."}, {"number": 43, "stem": "A 52-year-old man with moderate community-acquired pneumonia is admitted for IV antibiotics.\nOn day 3, despite clinical improvement in fever and leukocytosis, he develops new fever to 39.2°C and worsening right-sided chest pain. Repeat chest radiograph shows a new moderate right-sided pleural effusion. Thoracentesis yields cloudy fluid: WBC 28,000/µL (90% neutrophils), protein ratio 0.82, LDH ratio 0.91, glucose 28 mg/dL, pH 7.08. Gram stain shows gram-positive cocci in clusters. Which of the following is the most appropriate management?", "choices": {"A": "Continue antibiotics alone; the effusion will resolve with treatment of pneumonia", "B": "Thoracentesis drainage and continue current antibiotics; no chest tube needed", "C": "Chest tube insertion (tube thoracostomy) for drainage of empyema, plus antibiotic adjustment based on culture", "D": "Oral antibiotics and discharge; the patient is afebrile during the day", "E": "Thoracentesis with intrapleural fibrinolytic therapy before attempting chest tube"}, "answer": "C", "correctText": "Chest tube insertion (tube thoracostomy) for drainage of empyema,", "explanation": "plus antibiotic adjustment based on culture\nThis is a complicated parapneumonic effusion/empyema: gross pus (turbid fluid), pH <7.2, glucose <40 mg/dL, positive Gram stain. These criteria mandate drainage with chest tube insertion. Simple thoracentesis is inadequate for frank empyema. Antibiotics must cover the causative organism\n(gram-positive cocci in clusters suggests Staph aureus — consider MRSA coverage). Intrapleural fibrinolytics (tPA + DNase) are used for loculated empyemas not draining adequately through a chest tube (MIST2 trial), not as initial management. Failure to drain adequately may ultimately require VATS or open decortication."}, {"number": 44, "stem": "A 25-year-old man presents with acute onset right-sided chest pain and dyspnea while at rest. He is 6'3\" and weighs 155 lbs (BMI 19.4). Vitals: HR 96, RR 20, SpO₂ 95%. Exam shows hyperresonance and decreased breath sounds on the right. Chest radiograph confirms a right primary spontaneous pneumothorax with an apex-to-cupola distance of 1 cm. He has mild dyspnea only on exertion. Which of the following is the most appropriate management?", "choices": {"A": "Immediate chest tube insertion; all spontaneous pneumothoraces require chest tube", "B": "Supplemental oxygen, observation in the ED for 3–6 hours, and discharge if stable with close outpatient follow-up", "C": "Surgical pleurodesis during this initial presentation to prevent recurrence", "D": "Needle aspiration regardless of size or symptoms", "E": "Admit all spontaneous pneumothoraces for at least 72 hours of observation"}, "answer": "B", "correctText": "Supplemental oxygen, observation in the ED for 3–6 hours, and", "explanation": "discharge if stable with close outpatient follow-up\nA small primary spontaneous pneumothorax (≤1–2 cm apex-to-cupola, minimally symptomatic, hemodynamically stable) in a young patient without underlying lung disease can be managed conservatively with supplemental oxygen (which increases the rate of nitrogen reabsorption ~4-fold), observation in the ED, and discharge if stable. Intervention (aspiration or chest tube) is reserved for large pneumothoraces, increasing size, significant symptoms, or hemodynamic compromise.\nPleurodesis (VATS) is reserved for recurrence (≥2nd episode) or high-risk occupations. This is a high-yield distinction: small primary SP → observation; large or secondary SP → intervention."}, {"number": 45, "stem": "A 70-year-old woman presents with chest wall pain that worsens with deep inspiration and palpation of the costochondral junctions. She was recently treated for community-acquired pneumonia. Chest radiograph shows no pleural effusion and no infiltrate. ECG is normal.\nPalpation of the 2nd through 4th costochondral junctions on the left reproduces her pain. Which of the following is the most appropriate first-line treatment?", "choices": {"A": "Oral prednisone 40 mg daily for 5 days", "B": "NSAIDs (e.g., ibuprofen or naproxen) with local heat application as first-line pharmacotherapy", "C": "Immediate cardiac stress testing to exclude unstable angina", "D": "Opioid analgesics given the severity of chest wall pain", "E": "Surgical resection of the affected costal cartilages"}, "answer": "B", "correctText": "NSAIDs (e.g., ibuprofen or naproxen) with local heat application as", "explanation": "first-line pharmacotherapy\nCostochondritis is an inflammatory condition of the costochondral junctions presenting with chest wall pain reproducible on palpation of the affected junctions, and worsened by movement or deep inspiration. It is a clinical diagnosis. First-line evidence-based treatment is NSAIDs (ibuprofen, naproxen) for anti-inflammatory analgesia, along with local heat application. Topical NSAIDs or local corticosteroid injection may be used for refractory cases. Systemic steroids are generally not recommended as first-line. Opioids are unnecessary for this benign condition. Tietze syndrome is the variant with visible swelling of the costal cartilage."}, {"number": 46, "stem": "A 45-year-old man presents with sharp left-sided chest pain that worsens when lying flat and improves when leaning forward. He had a URI 2 weeks ago. Vitals: Temp 38.2°C, HR 96, BP 122/76, SpO₂ 98%. Exam reveals a friction rub best heard at the left sternal border. ECG shows diffuse ST elevation with saddle morphology and PR depression in multiple leads. Chest radiograph shows no effusion. Troponin is mildly elevated. Which of the following best characterizes the etiology of his chest pain and the appropriate management?", "choices": {"A": "Acute MI; proceed to emergent cardiac catheterization", "B": "Pleuritis from pneumonia; initiate antibiotics", "C": "Acute pericarditis, likely viral post-URI; NSAIDs plus colchicine as first-line therapy", "D": "Pulmonary embolism; initiate anticoagulation", "E": "Aortic dissection; emergent CT aortography"}, "answer": "C", "correctText": "Acute pericarditis, likely viral post-URI; NSAIDs plus colchicine as", "explanation": "first-line therapy\nThis presentation is classic for acute pericarditis: sharp positional chest pain (worse supine, better leaning forward), pericardial friction rub, diffuse saddle-shaped ST elevation with PR depression on\nECG, and preceding viral illness. Mild troponin elevation can occur with myopericarditis. First-line treatment per ESC guidelines is NSAIDs +
