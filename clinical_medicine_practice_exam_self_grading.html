 colchicine (shown to reduce recurrence by 50% in the\nCOPE and ICAP trials). Aspirin is preferred in post-MI pericarditis. The ECG pattern (diffuse ST elevation in multiple leads without reciprocal changes) differs from STEMI (focal ST elevation with reciprocal changes). Cardiac catheterization is not indicated for pericarditis."}, {"number": 47, "stem": "A 48-year-old woman with rheumatoid arthritis presents with dyspnea and left-sided chest pain.\nThoracentesis reveals: exudate by Light's criteria, pleural glucose 22 mg/dL (serum 96), pH 7.12,\nLDH 1,200 U/L (very elevated), milky appearance with cholesterol crystals on microscopy, negative cytology. RF is markedly elevated in the pleural fluid. Which of the following is the most likely diagnosis?", "choices": {"A": "Malignant pleural effusion from lung cancer", "B": "Chylothorax from thoracic duct injury", "C": "Rheumatoid pleuritis, characterized by very low glucose (≤30 mg/dL), low pH, high LDH, and cholesterol pseudochylothorax", "D": "Empyema from bacterial infection", "E": "Transudative effusion from hypoalbuminemia in RA"}, "answer": "C", "correctText": "Rheumatoid pleuritis, characterized by very low glucose (≤30 mg/dL),", "explanation": "low pH, high LDH, and cholesterol pseudochylothorax\nRheumatoid pleuritis is characterized by a distinctive biochemical pattern: very low pleural glucose (<30 mg/dL, often <20), low pH, very high LDH, and markedly elevated RF in the fluid. Long-standing rheumatoid effusions can develop cholesterol crystals (pseudochylothorax), producing a milky appearance — distinct from true chylothorax (which contains triglycerides, not cholesterol). The milky appearance with cholesterol crystals (not triglycerides) and the RA context clinch the diagnosis. True chylothorax results from thoracic duct disruption (malignancy, trauma, surgery) and demonstrates elevated triglycerides >110 mg/dL.\n■■ PNEUMONIA ■■"}, {"number": 48, "stem": "A 67-year-old man presents with 3 days of fever, productive cough with rust-colored sputum, and right-sided pleuritic chest pain. Vitals: Temp 39.2°C, HR 108, RR 22, BP 126/78, SpO₂ 93% on room air. He is alert and oriented. Labs: BUN 24 mg/dL, creatinine 1.1 mg/dL. Chest radiograph confirms a right lower lobe consolidation. What is his CURB-65 score, and what is the most appropriate disposition?", "choices": {"A": "CURB-65 = 0; outpatient management appropriate", "B": "CURB-65 = 1; outpatient management can be considered but individualize based on clinical judgment", "C": "CURB-65 = 2; consider hospitalization or close outpatient follow-up", "D": "CURB-65 = 3; hospitalization recommended, consider ICU evaluation", "E": "CURB-65 = 4; direct ICU admission"}, "answer": "C", "correctText": "CURB-65 = 2; consider hospitalization or close outpatient follow-up", "explanation": "CURB-65 scores 1 point each for: Confusion (no, 0), Urea/BUN >19 mg/dL (yes, BUN 24, +1), RR ≥30\n(no, RR 22, 0), low BP (SBP <90 or DBP ≤60) (no, 0), Age ≥65 (yes, +1). Total = 2. CURB-65 score 2 indicates moderate severity pneumonia with 30-day mortality approximately 9%. Hospitalization should be considered or the patient managed with close outpatient follow-up. Score 0–1 = low severity\n(outpatient); 2 = moderate (hospitalize); 3–5 = severe (hospitalize, score ≥4 consider ICU). The\nPSI/PORT score is an alternative that may be more sensitive."}, {"number": 49, "stem": "A 62-year-old man presents with 5 days of fever, non-productive cough, myalgias, headache, and confusion. He recently returned from a conference where he used the hotel spa. Vitals: Temp 39.8°C, HR 76 (relative bradycardia), RR 22, BP 126/78, SpO₂ 92%. Labs: Na 126 mEq/L, LDH 340 U/L, AST mildly elevated, serum and urine creatinine consistent with mild AKI. Chest radiograph shows a left lower lobe patchy infiltrate. He has not improved on azithromycin started 2 days ago. What pathogen and treatment are most appropriate?", "choices": {"A": "Streptococcus pneumoniae; switch to amoxicillin-clavulanate", "B": "Legionella pneumophila; switch to a respiratory fluoroquinolone (levofloxacin) or continue macrolide; confirm with urinary Legionella antigen", "C": "MRSA; add vancomycin", "D": "Mycoplasma pneumoniae; switch to doxycycline", "E": "Influenza A; initiate oseltamivir"}, "answer": "B", "correctText": "Legionella pneumophila; switch to a respiratory fluoroquinolone", "explanation": "(levofloxacin) or continue macrolide; confirm with urinary Legionella antigen\nThis presentation is classic for Legionella pneumophila: spa/hotel water exposure, high fever with relative bradycardia (Faget's sign), hyponatremia, elevated LDH and transaminases, headache, and confusion (extrapulmonary features). Legionella is an intracellular pathogen not covered by beta-lactams (lacks a typical cell wall target). First-line treatment is a respiratory fluoroquinolone\n(levofloxacin, moxifloxacin) or azithromycin. The urinary Legionella antigen test detects serogroup 1\n(most common) with high sensitivity/specificity and is the preferred rapid diagnostic. Macrolide failure here is likely related to dose or prior resistance, and escalation to fluoroquinolone is preferred for severe disease."}, {"number": 50, "stem": "A 55-year-old man with type 2 diabetes and COPD presents with 3 days of productive cough with purulent sputum, fever to 38.6°C, and mild dyspnea. Vitals: HR 90, RR 18, SpO₂ 95%, BP 138/84. Chest radiograph shows a right lower lobe consolidation. He is alert, tolerating oral intake, and has no recent hospitalization or antibiotic use. CURB-65 = 1. He is deemed appropriate for outpatient management. Which empiric antibiotic regimen is most appropriate?", "choices": {"A": "Amoxicillin 1 g three times daily alone", "B": "Azithromycin 500 mg day 1 then 250 mg daily alone", "C": "Levofloxacin 750 mg daily (respiratory fluoroquinolone monotherapy)", "D": "Trimethoprim-sulfamethoxazole DS twice daily", "E": "Amoxicillin-clavulanate plus a macrolide"}, "answer": "C", "correctText": "Levofloxacin 750 mg daily (respiratory fluoroquinolone monotherapy)", "explanation": "For outpatient CAP in a patient WITH comorbidities (diabetes, COPD), IDSA/ATS guidelines recommend either (1) a respiratory fluoroquinolone (levofloxacin, moxifloxacin) OR (2) a combination of a beta-lactam (amoxicillin-clavulanate, cefuroxime, or amoxicillin) plus a macrolide. Monotherapy with amoxicillin or azithromycin is reserved for patients without comorbidities. Patients with comorbidities have higher rates of drug-resistant S. pneumoniae and atypical pathogens, necessitating broader coverage. TMP-SMX is not recommended for CAP. Levofloxacin monotherapy is a convenient once-daily option with excellent bioavailability and coverage."}, {"number": 51, "stem": "A 23-year-old college student presents with 10 days of gradually worsening cough, low-grade fever, and malaise. He has been able to continue his daily activities despite feeling ill ('walking pneumonia'). Vitals: Temp 37.9°C, HR 82, SpO₂ 98%. Auscultation reveals scattered crackles bilaterally but the patient appears well. Chest radiograph shows bilateral diffuse patchy infiltrates.\nCold agglutinin titer is elevated. Sputum Gram stain is non-diagnostic. Which pathogen and treatment are most appropriate?", "choices": {"A": "Streptococcus pneumoniae; amoxicillin", "B": "Mycoplasma pneumoniae; azithromycin or doxycycline", "C": "Legionella pneumophila; levofloxacin", "D": "Staphylococcus aureus; vancomycin", "E": "Haemophilus influenzae; amoxicillin-clavulanate"}, "answer": "B", "correctText": "Mycoplasma pneumoniae; azithromycin or doxycycline", "explanation": "Mycoplasma pneumoniae is the classic cause of 'atypical' or 'walking' pneumonia in young adults and college students. Features include an insidious onset, mild systemic symptoms despite radiographic infiltrates, lack of a classic lobar consolidation pattern, and a non-diagnostic sputum Gram stain\n(Mycoplasma lacks a cell wall and does not Gram stain). Elevated cold agglutinins (anti-I IgM) support the diagnosis. Treatment is a macrolide (azithromycin) or doxycycline. Beta-lactams are ineffective because Mycoplasma lacks a cell wall. Fluoroquinolones are also active but reserved for more severe cases."}, {"number": 52, "stem": "A 70-year-old man with a history of alcohol use disorder presents with fever, shaking chills, and cough producing dark-red 'currant jelly' sputum. He appears acutely ill, has right upper lobe opacification on chest radiograph, and his WBC is 3,200/µL. Which pathogen is most likely, and why is this clinical presentation distinctive?", "choices": {"A": "Streptococcus pneumoniae; the most common CAP pathogen in all populations", "B": "Klebsiella pneumoniae; upper-lobe involvement with bulging fissure sign and bloody mucoid sputum is classic, particularly in patients with alcohol use disorder", "C": "Staphylococcus aureus; post-influenza pneumonia with cavitation", "D": "Pseudomonas aeruginosa; associated with bronchiectasis and immunosuppression", "E": "Mycoplasma pneumoniae; atypical walking pneumonia in the elderly"}, "answer": "B", "correctText": "Klebsiella pneumoniae; upper-lobe involvement with bulging fissure", "explanation": "sign and bloody mucoid sputum is classic, particularly in patients with alcohol use disorder\nKlebsiella pneumoniae classically causes an aggressive lobar pneumonia in patients with alcohol use disorder, diabetes, or debilitation. Hallmarks include: bloody mucoid ('currant jelly') sputum from hemorrhagic necrosis, upper lobe consolidation (unlike the lower lobe typical for S. pneumoniae), the\n'bulging fissure' sign on chest radiograph from a heavy, mucoid exudate, and leukopenia (unlike most bacterial pneumonias that cause leukocytosis). Klebsiella is a gram-negative encapsulated rod.\nTreatment requires IV cephalosporin or carbapenem; it has a high mortality rate. This presentation contrasts with aspiration pneumonia (dependent lobes, polymicrobial)."}, {"number": 53, "stem": "A 35-year-old previously healthy woman presents with 1 week of productive cough and fever following an influenza-like illness 2 weeks ago. She now has worsening dyspnea and hemoptysis.\nChest CT shows bilateral nodular infiltrates with early cavitation. Sputum Gram stain reveals gram-positive cocci in clusters. Which pathogen and management are most appropriate?", "choices": {"A": "Streptococcus pneumoniae; amoxicillin", "B": "Community-acquired MRSA (CA-MRSA); initiate vancomycin or linezolid", "C": "Mycoplasma pneumoniae; azithromycin", "D": "Legionella; levofloxacin and urine antigen testing", "E": "Aspergillus fumigatus; voriconazole"}, "answer": "B", "correctText": "Community-acquired MRSA (CA-MRSA); initiate vancomycin or", "explanation": "linezolid\nPost-influenza bacterial pneumonia with cavitation, hemoptysis, bilateral nodular-cavitary infiltrates, and gram-positive cocci in clusters in a previously healthy young adult is classic for community-acquired Staphylococcus aureus — particularly Panton-Valentine leukocidin (PVL)-positive\nCA-MRSA. This is a rapidly progressive, necrotizing pneumonia with high mortality. Because the organism may be MRSA (CA-MRSA rates vary by region), empiric coverage should include vancomycin or linezolid (linezolid has potential advantage of inhibiting toxin production). MSSA can be treated with nafcillin/oxacillin. S. aureus pneumonia following influenza is a classic board scenario."}, {"number": 54, "stem": "A 36-year-old man with HIV (CD4 count 68 cells/µL, not on ART) presents with 3 weeks of progressive dyspnea, non-productive cough, and low-grade fever. SpO₂ is 88% at rest on room air. Chest radiograph shows bilateral diffuse interstitial infiltrates. LDH is 620 U/L (normal <200).\nBronchoscopy with BAL is planned. Which pathogen is most likely, and what is the first-line treatment?", "choices": {"A": "Mycobacterium tuberculosis; RIPE therapy", "B": "Pneumocystis jirovecii (PCP); high-dose trimethoprim-sulfamethoxazole (TMP-SMX) plus adjunctive corticosteroids given the hypoxemia", "C": "Cytomegalovirus pneumonitis; ganciclovir", "D": "Cryptococcus neoformans; fluconazole", "E": "Histoplasma capsulatum; amphotericin B"}, "answer": "B", "correctText": "Pneumocystis jirovecii (PCP); high-dose", "explanation": "trimethoprim-sulfamethoxazole (TMP-SMX) plus adjunctive corticosteroids given the hypoxemia\nThis presentation is classic for Pneumocystis jirovecii pneumonia (PCP): HIV-positive patient with CD4\n<200, subacute onset, bilateral diffuse interstitial ('ground-glass') infiltrates, markedly elevated LDH, and profound hypoxemia. First-line treatment is high-dose TMP-SMX (15–20 mg/kg/day of TMP component) for 21 days. Adjunctive corticosteroids (prednisone) are indicated when PaO₂ <70 mmHg or A-a gradient >35, as they reduce inflammation and mortality. TMP-SMX prophylaxis is recommended when CD4 <200. Patients not on prophylaxis are at highest risk. CMV pneumonitis is less common and typically seen with CD4 <50."}, {"number": 55, "stem": "A 78-year-old woman with moderate dementia is in a nursing facility. She presents with 2 days of fever, increased secretions, and oxygen requirement. She has a history of recurrent aspiration events. Chest radiograph shows consolidation in the right lower lobe and posterior segment of the right upper lobe. Which organisms are most likely involved, and which antibiotic spectrum is most appropriate for aspiration pneumonia in a nursing home patient?", "choices": {"A": "Streptococcus pneumoniae alone; amoxicillin is sufficient", "B": "Polymicrobial including anaerobes and gram-negative organisms; coverage with amoxicillin-clavulanate, ampicillin-sulbactam, or piperacillin-tazobactam", "C": "Legionella pneumophila; levofloxacin", "D": "PCP; TMP-SMX", "E": "MRSA only; vancomycin monotherapy"}, "answer": "B", "correctText": "Polymicrobial including anaerobes and gram-negative organisms;", "explanation": "coverage with amoxicillin-clavulanate, ampicillin-sulbactam, or piperacillin-tazobactam\nAspiration pneumonia is typically polymicrobial, involving anaerobes (Bacteroides, Peptostreptococcus,\nFusobacterium), gram-positive organisms (S. pneumoniae, Streptococcus milleri), and in healthcare/nursing home settings, gram-negative organisms (Klebsiella, Pseudomonas, E. coli).\nLocation in dependent segments (posterior upper lobes and lower lobes in supine patients) is a clue.\nAntibiotic coverage must include anaerobes. In healthcare-associated settings, broader coverage for\nHCAP pathogens (gram-negatives including MRSA consideration) is appropriate.\nAmoxicillin-clavulanate provides anaerobic + gram-positive coverage; broader agents are used for more severe or healthcare-associated cases.\n■■ PULMONARY NEOPLASMS ■■"}, {"number": 56, "stem": "A 67-year-old man with a 50-pack-year history presents with 6 weeks of progressive cough, 12 lb weight loss, and confusion. Labs: Na 116 mEq/L, serum osmolality 242 mOsm/kg, urine osmolality 510 mOsm/kg, urine Na 58 mEq/L, TSH and morning cortisol normal. Chest CT shows a 4.5-cm central hilar mass. Which histologic subtype and paraneoplastic syndrome are most consistent with this presentation?", "choices": {"A": "Adenocarcinoma with hypercalcemia from PTHrP secretion", "B": "Squamous cell carcinoma with hypercalcemia", "C": "Small cell lung cancer with SIADH (syndrome of inappropriate antidiuretic hormone secretion)", "D": "Large cell carcinoma with gynecomastia", "E": "Carcinoid tumor with serotonin-mediated flushing"}, "answer": "C", "correctText": "Small cell lung cancer with SIADH (syndrome of inappropriate", "explanation": "antidiuretic hormone secretion)\nThis is classic for SCLC with SIADH. Small cell lung cancer is a centrally located, highly aggressive neuroendocrine tumor strongly associated with smoking. It is the lung cancer subtype most commonly associated with paraneoplastic endocrine syndromes, including SIADH (ectopic ADH secretion causing euvolemic hyponatremia) and Cushing syndrome (ectopic ACTH). The biochemical pattern confirms\nSIADH: low serum Na and osmolality, concentrated urine with inappropriate urine sodium excretion, with normal thyroid and adrenal function. Squamous cell carcinoma causes hypercalcemia via PTHrP.\nAdenocarcinoma is peripheral and occurs in nonsmokers or light smokers."}, {"number": 57, "stem": "A 62-year-old man with a 45-pack-year history presents with hemoptysis and weight loss. Chest\nCT reveals a central cavitating mass in the right hilum. Labs: serum calcium 12.6 mg/dL (normal 8.5–10.5), intact PTH 6 pg/mL (suppressed), PTHrP elevated. Which histologic subtype is most likely?", "choices": {"A": "Adenocarcinoma", "B": "Small cell carcinoma", "C": "Squamous cell carcinoma", "D": "Large cell carcinoma", "E": "Bronchoalveolar carcinoma"}, "answer": "C", "correctText": "Squamous cell carcinoma", "explanation": "Squamous cell carcinoma (SCC) of the lung is the subtype most commonly associated with hypercalcemia of malignancy, mediated by PTHrP (parathyroid hormone-related peptide) secretion — not true PTH (which is suppressed). SCC classically presents in central/hilar location, is associated with heavy smoking, and can cavitate. It may cause endobronchial obstruction leading to hemoptysis and post-obstructive pneumonia. Adenocarcinoma is peripheral, more common in women and nonsmokers.\nSmall cell is also central but causes SIADH/Cushing, not hypercalcemia. Large cell is a diagnosis of exclusion."}, {"number": 58, "stem": "A 56-year-old woman with a 35-pack-year history who quit smoking 8 years ago presents for a routine visit. She has no respiratory symptoms. Which of the following best describes the current\nUSPSTF criteria for lung cancer screening?", "choices": {"A": "Annual chest radiograph for all patients with >20 pack-year history", "B": "Annual low-dose CT (LDCT) for adults aged 50–80 years with a 20 pack-year history who currently smoke or quit within the past 15 years", "C": "Annual LDCT for all patients who have ever smoked", "D": "Sputum cytology every 2 years for patients with >30 pack-year history", "E": "LDCT only for patients with first-degree relatives with lung cancer"}, "answer": "B", "correctText": "Annual low-dose CT (LDCT) for adults aged 50–80 years with a 20", "explanation": "pack-year history who currently smoke or quit within the past 15 years\nThe 2021 USPSTF guidelines (updated from 2013) recommend annual LDCT for adults aged 50–80 years who have a 20 pack-year or more smoking history AND who currently smoke or have quit within the past 15 years. This expanded the previous criteria (55–80 years, 30 pack-years). This patient (age 56, 35 pack-years, quit 8 years ago) meets all criteria. The NLST (National Lung Screening Trial) demonstrated a 20% relative reduction in lung cancer mortality with LDCT vs. chest radiograph. Chest radiograph alone has not been shown to reduce lung cancer mortality and is not recommended for screening."}, {"number": 59, "stem": "A 58-year-old man presents with right shoulder pain, right arm weakness, and ptosis of the right eye with ipsilateral miosis and anhidrosis. He also reports hemoptysis and a 15-pound weight loss over 3 months. Chest CT reveals a right upper lobe mass involving the apex. Which of the following best describes this syndrome and its anatomic basis?", "choices": {"A": "Superior vena cava syndrome from extrinsic compression of the SVC by mediastinal lymph nodes", "B": "Pancoast (superior sulcus) tumor causing Horner syndrome by invasion of the cervical sympathetic chain, plus brachial plexopathy from C8–T1 nerve root involvement", "C": "Lambert-Eaton myasthenic syndrome from voltage-gated calcium channel antibodies", "D": "Dermatomyositis as a paraneoplastic syndrome", "E": "Trousseau's syndrome (migratory thrombophlebitis) from a hypercoagulable state"}, "answer": "B", "correctText": "Pancoast (superior sulcus) tumor causing Horner syndrome by", "explanation": "invasion of the cervical sympathetic chain, plus brachial plexopathy from C8–T1 nerve root involvement\nPancoast tumor (superior sulcus tumor) is a lung cancer arising at the lung apex that invades surrounding structures. It classically causes: Horner syndrome (ptosis, miosis, anhidrosis) from invasion of the cervical sympathetic chain (stellate ganglion); shoulder and arm pain/weakness from brachial plexus involvement (C8–T1); and may invade the subclavian artery or first ribs. The combination of Horner syndrome + arm pain/weakness in the setting of a superior sulcus mass is pathognomonic. SVC syndrome causes facial plethora, arm edema, and dilated neck veins.\nLambert-Eaton is a SCLC-related paraneoplastic syndrome affecting proximal muscle strength."}, {"number": 60, "stem": "A 48-year-old woman who has never smoked presents with a persistent cough and dyspnea over 2 months. CT shows a 3.2-cm peripheral right lower lobe mass with ground-glass opacity surrounding it. PET scan shows moderate FDG uptake. Biopsy confirms adenocarcinoma.\nMolecular testing reveals an EGFR exon 19 deletion. Which of the following best characterizes this lung cancer subtype and its management implication?", "choices": {"A": "Small cell lung cancer; initiate cisplatin-etoposide chemotherapy", "B": "Adenocarcinoma, the most common lung cancer subtype in women and nonsmokers, with\nEGFR mutation conferring sensitivity to EGFR tyrosine kinase inhibitors (e.g., osimertinib)", "C": "Squamous cell carcinoma with EGFR mutation; surgery is the only curative option", "D": "Carcinoid tumor; surgical resection without systemic therapy", "E": "Adenocarcinoma with KRAS mutation; standard chemotherapy is the preferred option"}, "answer": "B", "correctText": "Adenocarcinoma, the most common lung cancer subtype in women and", "explanation": "nonsmokers, with EGFR mutation conferring sensitivity to EGFR tyrosine kinase inhibitors\n(e.g., osimertinib)\nAdenocarcinoma is the most common subtype of NSCLC worldwide and the most common lung cancer in nonsmokers, women, and younger patients. It classically presents as a peripheral lesion. EGFR mutations (exon 19 deletion and exon 21 L858R) are the most common targetable mutations, occurring in ~15% of NSCLC in Western populations and up to 40–50% in East Asian populations.\nEGFR-mutated NSCLC responds dramatically to EGFR tyrosine kinase inhibitors; osimertinib\n(3rd-generation EGFR-TKI) is now first-line based on the FLAURA trial. Testing for EGFR, ALK, ROS1,\nBRAF, KRAS, MET, RET, and NTRK is now standard in advanced non-squamous NSCLC."}, {"number": 61, "stem": "A 64-year-old woman with a 30-pack-year history presents for follow-up after a CT scan performed for trauma incidentally identified a 7-mm solid, non-calcified pulmonary nodule in the right upper lobe. She has no symptoms and no prior CT for comparison. Which of the following best describes the management per Fleischner Society guidelines for this high-risk patient (smoking history)?", "choices": {"A": "Biopsy immediately; all solid nodules >6 mm require tissue sampling", "B": "CT follow-up at 3–6 months, then 18–24 months if no growth (high-risk patient with 6–8 mm solid nodule)", "C": "No follow-up needed; 7-mm nodules have virtually no malignant potential", "D": "Annual LDCT screening alone without specific follow-up for the identified nodule", "E": "PET scan immediately for any solid nodule >6 mm in a smoker"}, "answer": "B", "correctText": "CT follow-up at 3–6 months, then 18–24 months if no growth (high-risk", "explanation": "patient with 6–8 mm solid nodule)\nPer Fleischner Society 2017 guidelines for incidental solid pulmonary nodules in adults ≥35 years: For high-risk patients with a 6–8 mm solid nodule, the recommendation is CT follow-up at 3–6 months, then consider CT at 18–24 months. For low-risk patients with 6–8 mm, optional CT at 6–12 months. Nodules\n<6 mm in low-risk patients need no routine follow-up. PET-CT is appropriate for nodules >8–10 mm where malignancy probability is intermediate. Tissue sampling is considered for growing or PET-avid nodules. Size, morphology, location, and patient risk factors all influence management.\n■■ RESPIRATORY FAILURE / ARDS ■■"}, {"number": 62, "stem": "A 54-year-old woman with sepsis-related ARDS is intubated and mechanically ventilated. On\nFiO₂ 0.8 with PEEP 12 cmH₂O, her PaO₂ is 88 mmHg. Chest radiograph shows bilateral opacities. Echocardiogram confirms normal left ventricular function. According to the Berlin definition, what is her PaO₂/FiO₂ ratio and corresponding ARDS severity category?", "choices": {"A": "PaO₂/FiO₂ = 88; severe ARDS (<100)", "B": "PaO₂/FiO₂ = 110; moderate ARDS (100–200)", "C": "PaO₂/FiO₂ = 110; mild ARDS (200–300)", "D": "PaO₂/FiO₂ = 88; does not meet Berlin criteria", "E": "PaO₂/FiO₂ = 176; moderate ARDS"}, "answer": "B", "correctText": "PaO₂/FiO₂ = 110; moderate ARDS (100–200)", "explanation": "PaO₂/FiO₂ = 88 / 0.8 = 110. Per Berlin definition: Mild ARDS = PaO₂/FiO₂ 200–300 on PEEP/CPAP\n≥5 cmH₂O; Moderate = 100–200 on PEEP ≥5; Severe = <100 on PEEP ≥5. A ratio of 110 falls in the\nMODERATE ARDS category (100–200). Berlin criteria also require: onset within 1 week of known clinical insult or new/worsening respiratory symptoms; bilateral opacities on imaging not fully explained by other causes; respiratory failure not fully explained by cardiac failure/fluid overload. The PEEP requirement (≥5 cmH₂O) must be met for classification."}, {"number": 63, "stem": "A 61-year-old man with pneumonia-related ARDS is intubated. The team initiates ventilation at 6 mL/kg predicted body weight (PBW). Plateau pressure is 24 cmH₂O. Over 2 hours, PaCO₂ rises to 58 mmHg and pH falls to 7.27. A trainee suggests increasing tidal volume to 10 mL/kg PBW to normalize the PaCO₂. Which of the following best explains why this suggestion should be declined?", "choices": {"A": "Higher tidal volumes would cause auto-PEEP and air trapping in ARDS", "B": "Larger tidal volumes cause alveolar overdistension in the reduced aerated lung volume of\nARDS, worsening ventilator-induced lung injury (VILI) and increasing mortality", "C": "A pH of 7.27 requires immediate bicarbonate infusion, not ventilator adjustment", "D": "PaCO₂ of 58 will cause irreversible neurologic injury within minutes", "E": "Increasing tidal volume would lower plateau pressure below the safe threshold of 30 cmH₂O"}, "answer": "B", "correctText": "Larger tidal volumes cause alveolar overdistension in the reduced", "explanation": "aerated lung volume of ARDS, worsening ventilator-induced lung injury (VILI) and increasing mortality\nThe ARDSnet trial (ARMA, 2000) demonstrated that low tidal volume ventilation (6 mL/kg PBW, plateau pressure ≤30 cmH₂O) reduces mortality in ARDS by approximately 22% compared to 12 mL/kg PBW.\nThe mechanism: ARDS produces heterogeneous lung injury, leaving a reduced number of aerated alveoli ('baby lung'). Larger tidal volumes are distributed to this smaller lung volume, causing regional overdistension (volutrauma) and stress failure of alveolar walls, worsening VILI. The resulting permissive hypercapnia (tolerating PaCO₂ 45–70 and pH ≥7.15–7.20) is an acceptable trade-off for the mortality benefit of lung-protective ventilation."}, {"number": 64, "stem": "A 38-year-old woman with ARDS due to severe pancreatitis is intubated on lung-protective ventilation (6 mL/kg PBW, PEEP 14 cmH₂O, FiO₂ 1.0). Despite optimization of PEEP and FiO₂, her PaO₂/FiO₂ ratio remains 62 (severe ARDS). SpO₂ is 82%. Which of the following rescue maneuvers has the strongest evidence for improving oxygenation and reducing mortality in severe\nARDS?", "choices": {"A": "Inhaled nitric oxide; shown to reduce mortality in severe ARDS", "B": "High-frequency oscillatory ventilation (HFOV)", "C": "Prone positioning for ≥16 hours/day; shown to reduce mortality in severe ARDS (PROSEVA trial)", "D": "Intravenous methylprednisolone; first-line rescue therapy for refractory ARDS", "E": "Permissive hypercapnia alone with no additional ventilatory maneuvers"}, "answer": "C", "correctText": "Prone positioning for ≥16 hours/day; shown to reduce mortality in", "explanation": "severe ARDS (PROSEVA trial)\nProne positioning (≥16 hours/day) is the only rescue intervention shown in a high-quality RCT to reduce mortality in severe ARDS. The PROSEVA trial (2013) showed a 28-day mortality reduction from 33% to 16% with prone positioning in patients with PaO₂/FiO₂ <150. The mechanism includes redistribution of ventilation and perfusion, reducing dorsal atelectasis and VILI. Inhaled nitric oxide improves oxygenation but has not been shown to reduce mortality (meta-analyses). HFOV was shown to be\nHARMFUL in OSCILLATE trial. Corticosteroids have a narrow role in early ARDS but are not first-line rescue. ECMO (veno-venous) may be considered for refractory cases."}, {"number": 65, "stem": "A 75-year-old man with severe kyphoscoliosis and restrictive lung disease presents with worsening dyspnea at rest and morning headaches. Resting ABG: pH 7.32, PaCO₂ 68 mmHg,\nPaO₂ 58 mmHg, HCO₂■ 35 mEq/L, SpO₂ 88% on room air. Spirometry shows a restrictive pattern. Chest radiograph shows severe spinal deformity but no new infiltrates. Which type of respiratory failure is present, and what is the primary mechanism?", "choices": {"A": "Type 1 (hypoxemic) respiratory failure; low V/Q mismatch from parenchymal lung disease", "B": "Type 2 (hypercapnic) respiratory failure; inadequate alveolar ventilation due to chest wall restriction from kyphoscoliosis", "C": "Type 1 failure; diffusion impairment from fibrotic lung disease", "D": "Type 2 failure; CNS depression from chronic hypercapnia", "E": "Mixed Type 1 and 2 failure from bilateral pneumonia"}, "answer": "B", "correctText": "Type 2 (hypercapnic) respiratory failure; inadequate alveolar ventilation", "explanation": "due to chest wall restriction from kyphoscoliosis\nType 2 (hypercapnic/ventilatory) respiratory failure is defined by PaCO₂ >45 mmHg with inadequate alveolar ventilation as the mechanism. In this patient, severe kyphoscoliosis restricts chest wall expansion, leading to reduced tidal volume, impaired ventilation, and CO₂ retention. The elevated\nHCO₂■ (35 mEq/L) represents metabolic compensation for chronic hypercapnia. Type 1 failure is primarily hypoxemic (PaO₂ <60) with normal or low PaCO₂ — the hallmark is V/Q mismatch or shunt in parenchymal disease. The A-a gradient helps differentiate: in pure hypoventilation (Type 2), the A-a gradient is normal because the hypoventilation uniformly affects all alveoli."}, {"number": 66, "stem": "A 52-year-old man with a history of severe COPD exacerbation is admitted with acute hypercapnic respiratory failure. ABG: pH 7.30, PaCO₂ 65, PaO₂ 56. He is alert, cooperative, has no excessive secretions, and is hemodynamically stable. Which is the most appropriate initial ventilatory support strategy?", "choices": {"A": "Immediate endotracheal intubation to secure the airway", "B": "High-flow nasal cannula (HFNC) oxygen therapy", "C": "Non-invasive positive pressure ventilation (NPPV/BiPAP) — first-line in AECOPD with acute hypercapnic respiratory failure in cooperative patients without contraindications", "D": "Expectant management with supplemental oxygen and reassess in 4 hours", "E": "Helium-oxygen (heliox) therapy as first-line ventilatory support"}, "answer": "C", "correctText": "Non-invasive positive pressure ventilation (NPPV/BiPAP) — first-line in", "explanation": "AECOPD with acute hypercapnic respiratory failure in cooperative patients without contraindications\nNPPV (BiPAP) is the first-line ventilatory strategy for AECOPD with acute hypercapnic respiratory failure (pH 7.25–7.35) in appropriate patients. Multiple RCTs and meta-analyses demonstrate reduced intubation rates, ICU length of stay, and in-hospital mortality. Prerequisites include cooperative patient, ability to protect airway, no hemodynamic instability, no excessive secretions, and facial anatomy compatible with mask fit. Intubation is reserved for NPPV failure, contraindications, or pH <7.25 with rapid deterioration. HFNC is primarily indicated in hypoxemic (Type 1) failure; evidence in hypercapnic\nCOPD is less robust than NPPV."}, {"number": 67, "stem": "A 40-year-old woman with cystic fibrosis presents with 4 years of daily productive cough with large volumes of purulent sputum and recurrent pulmonary infections requiring hospitalization approximately 5 times per year. Chest HRCT shows dilated bronchi with a tram-track appearance and signet-ring sign. Spirometry shows mixed obstructive-restrictive pattern. Beyond airway clearance techniques and treating acute infections, which maintenance therapy has the strongest evidence for reducing exacerbation frequency in bronchiectasis?", "choices": {"A": "Chronic systemic corticosteroids", "B": "Daily inhaled corticosteroid monotherapy", "C": "Long-term macrolide therapy (e.g., azithromycin 3 times weekly)", "D": "Continuous oral fluoroquinolone prophylaxis", "E": "Daily doxycycline"}, "answer": "C", "correctText": "Long-term macrolide therapy (e.g., azithromycin 3 times weekly)", "explanation": "Long-term macrolide therapy (azithromycin 250–500 mg 3×/week or 500 mg daily) has the strongest evidence for reducing exacerbation frequency in bronchiectasis. Multiple RCTs (BAT, EMBRACE,\nBLESS) demonstrate significant reductions in exacerbation rates. The benefit is likely dual: direct antibacterial effect against common colonizers (Pseudomonas, H. influenzae) and immunomodulatory/anti-inflammatory properties. Baseline culture and NTM status should be checked before starting macrolides. Systemic corticosteroids have no evidence of benefit and significant side effects. Inhaled corticosteroids have limited evidence. Fluoroquinolone prophylaxis carries resistance risk and is not standard."}, {"number": 68, "stem": "A 29-year-old woman requires extracorporeal membrane oxygenation (ECMO) for refractory\nARDS with PaO₂/FiO₂ <60 despite maximal ventilatory support. She has no evidence of cardiac failure or hemodynamic instability. Which ECMO configuration is most appropriate for isolated respiratory failure, and what is the basic physiologic mechanism?", "choices": {"A": "Veno-arterial (VA) ECMO; supports both cardiac output and oxygenation by bypassing both heart and lungs", "B": "Veno-venous (VV) ECMO; removes CO₂ and adds O₂ to blood without providing cardiac support, appropriate for isolated respiratory failure", "C": "VA ECMO; preferred for all forms of ECMO because it also supports blood pressure", "D": "VV ECMO; provides cardiac support by unloading the right ventricle", "E": "Arterio-venous ECMO; used specifically for isolated hypoxemia without CO₂ retention"}, "answer": "B", "correctText": "Veno-venous (VV) ECMO; removes CO₂ and adds O₂ to blood without", "explanation": "providing cardiac support, appropriate for isolated respiratory failure\nIn veno-venous (VV) ECMO, blood is drained from a large vein (e.g., femoral vein), pumped through a membrane oxygenator where CO₂ is removed and O₂ added, and returned to the venous system\n(e.g., internal jugular vein). It provides gas exchange support without cardiac output support, making it appropriate for isolated respiratory failure with preserved cardiac function. Veno-arterial (VA) ECMO returns oxygenated blood to the arterial circulation, providing both cardiac and respiratory support — appropriate for cardiogenic shock or combined cardiorespiratory failure. The CESAR and EOLIA trials provided evidence for VV ECMO in severe ARDS.\n■■ RESPIRATORY INFECTIONS ■■"}, {"number": 69, "stem": "A 28-year-old previously healthy woman presents with 5 days of cough that has become productive of yellow sputum. The illness began with nasal congestion and sore throat. She is afebrile with normal vitals. Lung exam reveals no crackles or wheezes. No chest radiograph is obtained. She expects to receive antibiotics. Which of the following best describes the management and the rationale?", "choices": {"A": "Prescribe azithromycin; atypical pathogens require macrolide coverage", "B": "Prescribe amoxicillin; bacterial superinfection is likely given the purulent sputum", "C": "Symptomatic care only (cough suppressants, decongestants, NSAIDs); acute bronchitis is overwhelmingly viral and antibiotics provide no clinically meaningful benefit", "D": "Prescribe doxycycline; preferred antibiotic for acute bronchitis", "E": "Order chest radiograph before deciding; purulent sputum rules in pneumonia"}, "answer": "C", "correctText": "Symptomatic care only (cough suppressants, decongestants, NSAIDs);", "explanation": "acute bronchitis is overwhelmingly viral and antibiotics provide no clinically meaningful benefit\nAcute bronchitis is caused by viruses (rhinovirus, coronavirus, influenza, RSV) in >90% of cases.\nSputum purulence alone does not indicate bacterial infection — purulent sputum reflects airway inflammation and sloughed epithelial cells, not bacterial overgrowth. Multiple systematic reviews demonstrate that antibiotics provide no clinically meaningful benefit for acute bronchitis (minimal effect on duration: <1 day reduction), while increasing antibiotic resistance and adverse effects. Chest radiograph is indicated only if signs of pneumonia are present: high fever, tachycardia, tachypnea,\nSpO₂ <95%, or focal exam findings. Symptom management is appropriate treatment."}, {"number": 70, "stem": "A 15-year-old girl presents with 3 weeks of severe paroxysmal coughing fits ending in a high-pitched inspiratory whoop and post-tussive vomiting. She had a runny nose 2 weeks ago.\nNasopharyngeal PCR is positive for Bordetella pertussis. Her 6-week-old unvaccinated brother lives at home. Which of the following is the most accurate statement regarding management?", "choices": {"A": "Antibiotics are contraindicated once the paroxysmal phase begins due to bronchospasm risk", "B": "Antibiotic prophylaxis is unnecessary for household contacts if they appear well", "C": "Azithromycin should be given to reduce transmission to close contacts and the infant sibling; it has limited effect on symptom duration in the paroxysmal phase but reduces contagiousness", "D": "A respiratory fluoroquinolone is preferred over macrolides for pertussis in adolescents", "E": "Vaccination of the infant sibling should be delayed; neonatal pertussis is mild"}, "answer": "C", "correctText": "Azithromycin should be given to reduce transmission to close contacts", "explanation": "and the infant sibling; it has limited effect on symptom duration in the paroxysmal phase but reduces contagiousness\nOnce the paroxysmal phase has begun (typically >1 week after catarrhal onset), antibiotics do not significantly shorten symptom duration because bacterial damage to airway epithelium is complete.\nHowever, antibiotics (azithromycin or TMP-SMX as alternatives) DO reduce nasopharyngeal shedding and transmission to household contacts — critically important because unvaccinated infants <12 months can have severe and fatal pertussis. Azithromycin is first-line for pertussis prophylaxis in close contacts. The infant should receive prophylaxis immediately regardless of symptoms. DTaP vaccination cannot protect in time for this acute exposure."}, {"number": 71, "stem": "A 72-year-old man with COPD and heart failure presents in January with 2 days of fever to 39.4°C, severe myalgias, headache, and non-productive cough. He did not receive his annual influenza vaccine this year. Rapid influenza antigen test is positive for influenza A. He is hemodynamically stable with SpO₂ 92% on room air. Which of the following best describes appropriate management?", "choices": {"A": "Supportive care only; antivirals are only indicated in ICU patients", "B": "Oseltamivir (Tamiflu) 75 mg twice daily for 5 days; antivirals benefit high-risk patients\n(elderly, COPD, heart failure) when started within 48 hours of symptom onset", "C": "Antibiotics are required immediately to prevent bacterial superinfection", "D": "Inhaled zanamivir; preferred over oseltamivir for outpatients", "E": "Antivirals are not useful after symptom onset; initiate prophylaxis only for exposed household members"}, "answer": "B", "correctText": "Oseltamivir (Tamiflu) 75 mg twice daily for 5 days; antivirals benefit", "explanation": "high-risk patients (elderly, COPD, heart failure) when started within 48 hours of symptom onset\nOseltamivir (or alternatively zanamivir or baloxavir) reduces influenza severity, duration, and risk of complications when started within 48 hours of symptom onset. High-risk patients — adults ≥65, chronic cardiopulmonary disease (COPD, CHF), immunosuppression, pregnancy — benefit most from antiviral therapy and should be treated even if beyond 48 hours if hospitalized or severely ill. Oral oseltamivir is preferred for outpatients; IV peramivir or inhaled zanamivir are alternatives. Antibiotics are not indicated for uncomplicated influenza but should be added if bacterial superinfection (secondary bacterial pneumonia) is suspected."}, {"number": 72, "stem": "A 45-year-old man with obesity (BMI 38) and type 2 diabetes presents with 5 days of progressive dyspnea, cough, anosmia, and low-grade fever. SpO₂ is 88% on room air. Nasopharyngeal PCR confirms SARS-CoV-2 infection. Chest CT shows bilateral peripheral ground-glass opacities. He is admitted. Which of the following treatments has the strongest evidence for reducing mortality in hospitalized COVID-19 patients requiring supplemental oxygen?", "choices": {"A": "Hydroxychloroquine", "B": "Dexamethasone 6 mg daily for up to 10 days (RECOVERY trial)", "C": "Azithromycin for bacterial co-infection prophylaxis", "D": "Convalescent plasma for all hospitalized patients", "E": "Remdesivir alone without corticosteroids"}, "answer": "B", "correctText": "Dexamethasone 6 mg daily for up to 10 days (RECOVERY trial)", "explanation": "The RECOVERY trial (2020) demonstrated that dexamethasone 6 mg daily for up to 10 days significantly reduces mortality in hospitalized COVID-19 patients requiring supplemental oxygen or mechanical ventilation: 28-day mortality reduced from 26% to 23% in oxygen-requiring patients, and from 41% to 29% in mechanically ventilated patients. It is now WHO-recommended standard of care.\nHydroxychloroquine has been shown to provide no benefit and possible harm. Azithromycin showed no benefit in multiple trials. Remdesivir may reduce hospitalization duration but has not consistently shown mortality benefit. Immunomodulators (baricitinib, tocilizumab) have shown additional benefit in severe disease."}, {"number": 73, "stem": "A 5-year-old unvaccinated boy presents with 2 days of high fever, sore throat, drooling, and a muffled 'hot-potato' voice. He is sitting upright and leaning forward, appears toxic, and refuses to swallow. Airway examination reveals a cherry-red, swollen epiglottis on indirect laryngoscopy. HR 136, RR 32, SpO₂ 94%. Which of the following best describes the appropriate immediate management?", "choices": {"A": "Direct laryngoscopy to confirm diagnosis and obtain cultures in the ED", "B": "Send to radiology for lateral neck radiograph to confirm the 'thumbprint sign' before any intervention", "C": "Immediate airway securing in a controlled setting (operating room or ICU) by the most experienced provider available, followed by IV antibiotics covering H. influenzae type b", "D": "Oral penicillin and outpatient follow-up if the child can swallow", "E": "Nebulized epinephrine to reduce supraglottic swelling while antibiotics are initiated"}, "answer": "C", "correctText": "Immediate airway securing in a controlled setting (operating room or", "explanation": "ICU) by the most experienced provider available, followed by IV antibiotics covering H. influenzae type b\nEpiglottitis is a life-threatening upper airway emergency — particularly in children — characterized by rapid supraglottic edema that can cause complete airway obstruction. The classic presentation: abrupt onset, high fever, drooling, muffled voice, tripod positioning, and toxic appearance. Management priorities: do NOT agitate the child (agitation can precipitate acute obstruction), avoid instrumentation of the airway outside a controlled setting, and secure the airway emergently in the OR with anesthesia and ENT present. IV antibiotics covering H. influenzae type b (ceftriaxone) are then initiated. Since Hib vaccination, epiglottitis is less common in children but still occurs in unvaccinated patients."}, {"number": 74, "stem": "A 38-year-old man presents with 2 weeks of fever, productive cough, night sweats, and weight loss. He recently returned from caving in the Ohio River Valley. Chest CT shows mediastinal lymphadenopathy with calcifications and scattered small pulmonary nodules. Urine Histoplasma antigen is positive. CD4 count is normal. Which treatment is most appropriate for moderate pulmonary histoplasmosis?", "choices": {"A": "No antifungal treatment needed; histoplasmosis is self-limited in immunocompetent patients with mild disease", "B": "Itraconazole 200 mg three times daily for 3 days (loading dose), then 200 mg twice daily for 12 weeks", "C": "Amphotericin B deoxycholate as first-line for all forms of histoplasmosis", "D": "Fluconazole as preferred azole for pulmonary histoplasmosis", "E": "Voriconazole as first-line for pulmonary histoplasmosis"}, "answer": "B", "correctText": "Itraconazole 200 mg three times daily for 3 days (loading dose), then", "explanation": "200 mg twice daily for 12 weeks\nHistoplasma capsulatum is endemic to the Ohio and Mississippi River valleys (bird/bat droppings, cave soil). Mild acute pulmonary histoplasmosis is self-limited in immunocompetent patients.\nModerate-to-severe pulmonary histoplasmosis requires antifungal therapy: itraconazole (with loading dose) for 12 weeks is first-line for mild-to-moderate disease. Liposomal amphotericin B is first-line for severe/disseminated disease or in immunocompromised patients, followed by itraconazole step-down.\nFluconazole has poor efficacy against Histoplasma. Diagnosis is confirmed by urine or serum\nHistoplasma antigen (most sensitive test), culture, or histopathology."}, {"number": 75, "stem": "A 34-year-old woman presents with fever, fatigue, and a non-productive cough 3 weeks after a hiking trip through the San Joaquin Valley. Chest radiograph shows a right lower lobe infiltrate with hilar lymphadenopathy. She has developed erythema nodosum on her shins. Serology for\nCoccidioides IgM and IgG is positive. She is immunocompetent. Which of the following best describes management of primary pulmonary coccidioidomycosis in an immunocompetent host?", "choices": {"A": "Immediate amphotericin B for all patients with confirmed coccidioidomycosis", "B": "Most immunocompetent patients with mild primary pulmonary coccidioidomycosis recover without antifungal treatment; antifungals (fluconazole) are given if disease is severe, persistent, or in high-risk patients", "C": "Itraconazole is ineffective for coccidioidomycosis; voriconazole is required", "D": "Systemic corticosteroids to reduce the inflammatory response", "E": "No treatment and no follow-up needed"}, "answer": "B", "correctText": "Most immunocompetent patients with mild primary pulmonary", "explanation": "coccidioidomycosis recover without antifungal treatment; antifungals (fluconazole) are given if disease is severe, persistent, or in high-risk patients\nCoccidioides immitis/posadasii is endemic to the American Southwest (San Joaquin Valley, Arizona,\nTexas). Most immunocompetent individuals with primary pulmonary coccidioidomycosis recover spontaneously without antifungal therapy. Erythema nodosum is a reactive manifestation indicating a robust T-cell response and paradoxically a better prognosis. Antifungal treatment (fluconazole or itraconazole for 3–6 months) is recommended for severe or persistent disease, immunocompromised hosts, diabetes, pregnancy, or signs of dissemination. Amphotericin B is reserved for severe/disseminated CNS coccidioidomycosis. All patients should be monitored for dissemination, which can occur months later.\n■■ RESTRICTIVE LUNG DISEASE ■■"}, {"number": 76, "stem": "A 30-year-old African American woman presents with dry cough, exertional dyspnea, bilateral ankle swelling, and painful erythematous nodules on her shins. Vitals: Temp 38.0°C, SpO₂ 97%.\nCXR shows bilateral hilar lymphadenopathy without infiltrates. Labs: calcium 10.9, serum ACE 92\nU/L (nl 8–52). Transbronchial biopsy shows noncaseating granulomas with negative AFB stains.\nThe combination of bilateral hilar lymphadenopathy, erythema nodosum, and ankle periarthritis is recognized as a specific syndrome. Which of the following statements about its management is most accurate?", "choices": {"A": "Systemic corticosteroids must be started immediately in all patients with sarcoidosis at diagnosis", "B": "This syndrome (Löfgren syndrome) carries a high rate of spontaneous remission; NSAIDs and observation are first-line management", "C": "The elevated serum ACE alone confirms the diagnosis and biopsy is unnecessary", "D": "Caseating granulomas are the histologic hallmark of sarcoidosis", "E": "Hypercalcemia in sarcoidosis is caused by primary hyperparathyroidism"}, "answer": "B", "correctText": "This syndrome (Löfgren syndrome) carries a high rate of spontaneous", "explanation": "remission; NSAIDs and observation are first-line management\nLöfgren syndrome is an acute presentation of sarcoidosis: bilateral hilar lymphadenopathy + erythema nodosum + ankle periarthritis (± fever). It carries an excellent prognosis with >90% spontaneous remission within 1–2 years. First-line management is NSAIDs for symptomatic relief, not systemic corticosteroids. Steroids are reserved for organ-threatening disease (ocular, cardiac, neurologic, hypercalcemia unresponsive to other measures) or progressive pulmonary disease. Sarcoidosis is characterized by NON-caseating granulomas. Hypercalcemia results from 1-alpha hydroxylase activity in macrophages within granulomas, not from primary hyperparathyroidism."}, {"number": 77, "stem": "A 50-year-old man who worked as a sandblaster for 25 years presents with progressive exertional dyspnea and non-productive cough. He has never smoked. Chest radiograph shows small, rounded upper-lobe-predominant nodular opacities and bilateral hilar lymphadenopathy with peripheral 'eggshell' calcification. Pulmonary function shows a restrictive pattern with reduced\nDLCO. Which of the following is the most likely diagnosis, and what is the primary long-term risk associated with it?", "choices": {"A": "Asbestosis; increased risk of mesothelioma and lung cancer", "B": "Coal workers' pneumoconiosis; spontaneous regression of nodules", "C": "Silicosis; increased risk of tuberculosis and progressive massive fibrosis (conglomerate silicosis)", "D": "Hypersensitivity pneumonitis; reversible with antigen avoidance", "E": "Sarcoidosis; noncaseating granulomas treatable with steroids"}, "answer": "C", "correctText": "Silicosis; increased risk of tuberculosis and progressive massive", "explanation": "fibrosis (conglomerate silicosis)\nSilicosis results from inhaling crystalline silica dust (sandblasting, mining, quarrying, glassmaking).\nClassic CXR findings: small rounded opacities upper-lobe predominant, hilar lymphadenopathy with\n'eggshell' calcification (calcification at periphery of lymph nodes — pathognomonic for silicosis).\nSilicosis significantly increases the risk of pulmonary tuberculosis (silica impairs macrophage function), making annual TB screening essential. Progressive massive fibrosis (PMF/conglomerate silicosis) is a severe complication where nodules coalesce. Silicosis is also associated with autoimmune diseases\n(scleroderma, RA). Asbestosis features linear basal fibrosis and pleural plaques, not eggshell calcification."}, {"number": 78, "stem": "A 42-year-old man presents with chronic sinusitis, recurrent epistaxis, hemoptysis, and 3 weeks of worsening hematuria. BP 158/96, creatinine 3.2 mg/dL, urinalysis shows dysmorphic RBCs and\nRBC casts. Chest CT shows bilateral nodular-cavitary lesions. Which serologic result best supports the most likely diagnosis, and what is its mechanism compared to the principal alternative on the differential?", "choices": {"A": "Positive anti-GBM antibody; distinguishes from GPA by linear immunofluorescence rather than pauci-immune pattern", "B": "Positive c-ANCA (PR3-ANCA); distinguishes from anti-GBM disease, which targets basement membrane collagen and characteristically spares the upper airway", "C": "Positive p-ANCA (MPO-ANCA) with eosinophilia and asthma; consistent with eosinophilic\nGPA", "D": "Elevated serum ACE with hilar lymphadenopathy; consistent with sarcoid-related glomerulonephritis", "E": "Positive ANA with anti-dsDNA; consistent with lupus nephritis and pulmonary hemorrhage"}, "answer": "B", "correctText": "Positive c-ANCA (PR3-ANCA); distinguishes from anti-GBM disease,", "explanation": "which targets basement membrane collagen and characteristically spares the upper airway\nGranulomatosis with polyangiitis (GPA, formerly Wegener's) classically presents with the triad of upper respiratory tract (sinusitis, saddle-nose deformity, epistaxis), lower respiratory tract (nodular-cavitary lesions, hemoptysis), and renal disease (pauci-immune crescentic glomerulonephritis). c-ANCA\n(anti-PR3) is positive in ~90% of active GPA. Anti-GBM disease (Goodpasture syndrome) also causes pulmonary-renal syndrome but: shows linear IgG deposition along basement membranes on immunofluorescence, characteristically spares the upper airway (sinuses), and causes rapidly progressive glomerulonephritis. Treatment for GPA: rituximab or cyclophosphamide + glucocorticoids."}, {"number": 79, "stem": "A 52-year-old man with BMI 48 presents with excessive daytime sleepiness, morning headaches, and bilateral ankle edema. Vitals: SpO₂ 88% on room air, BP 152/90. ABG: pH 7.34, PaCO₂ 58 mmHg, PaO₂ 62 mmHg, HCO₂■ 31 mEq/L. Spirometry shows mildly reduced FVC with preserved FEV₁/FVC ratio and no obstruction. Polysomnography confirms sleep-disordered breathing. Which diagnosis best fits, and what is the mechanism of hypercapnia?", "choices": {"A": "COPD with cor pulmonale; airflow obstruction causing air trapping", "B": "Obesity hypoventilation syndrome (OHS); excess abdominal and thoracic adipose tissue mechanically impairs chest wall movement, reducing tidal volume and alveolar ventilation, causing chronic CO₂ retention", "C": "Central sleep apnea from brainstem lesion; absent respiratory drive", "D": "Idiopathic pulmonary fibrosis; stiff lungs causing CO₂ retention", "E": "Obstructive sleep apnea alone; the hypercapnia is episodic, not chronic"}, "answer": "B", "correctText": "Obesity hypoventilation syndrome (OHS); excess abdominal and", "explanation": "thoracic adipose tissue mechanically impairs chest wall movement, reducing tidal volume and alveolar ventilation, causing chronic CO₂ retention\nObesity hypoventilation syndrome (OHS/Pickwickian syndrome) is defined as obesity (BMI >30) + chronic daytime hypercapnia (PaCO₂ >45 mmHg) + sleep-disordered breathing, after excluding other causes of hypoventilation. The mechanism: excess abdominal and thoracic fat mechanically loads the chest wall, reduces functional residual capacity, and increases work of breathing, leading to chronic alveolar hypoventilation and CO₂ retention. The elevated HCO₂■ confirms chronic compensation.\nTreatment: weight loss and NPPV (BiPAP) are first-line — CPAP alone is often insufficient because it does not augment ventilation. Pure OSA patients maintain normal daytime PaCO₂."}, {"number": 80, "stem": "A 62-year-old man who worked as an insulation installer for 30 years presents with progressive exertional dyspnea, bibasilar crackles, and digital clubbing. Chest HRCT shows bilateral lower-lobe subpleural reticular opacities, traction bronchiectasis, and bilateral pleural plaques with partial calcification. Pulmonary function shows a restrictive pattern with reduced DLCO. Which diagnosis and its key associated risk are most appropriate?", "choices": {"A": "Silicosis; upper-lobe nodules and increased TB risk", "B": "Hypersensitivity pneumonitis; reversible with antigen removal", "C": "Asbestosis; bilateral basal fibrosis with pleural plaques, associated with significantly increased risk of malignant mesothelioma and lung cancer", "D": "Sarcoidosis; bilateral hilar lymphadenopathy and noncaseating granulomas", "E": "Idiopathic pulmonary fibrosis; not occupationally related"}, "answer": "C", "correctText": "Asbestosis; bilateral basal fibrosis with pleural plaques, associated", "explanation": "with significantly increased risk of malignant mesothelioma and lung cancer\nAsbestosis results from inhalation of asbestos fibers (insulation, shipbuilding, construction). Key features: bilateral basal subpleural fibrosis (similar to IPF but occupational history distinguishes), pleural plaques (pathognomonic for asbestos exposure — can be calcified), bibasilar crackles, clubbing, restrictive PFTs with reduced DLCO. Critical associations: malignant mesothelioma (pleural or peritoneal — directly caused by asbestos; there is no safe exposure level), and significantly increased risk of lung cancer (synergistic with smoking). Asbestosis causes lower-lobe fibrosis, contrasting with silicosis (upper-lobe nodules) and sarcoidosis."}, {"number": 81, "stem": "A 67-year-old man with a 30-pack-year history presents with 2 years of progressive exertional dyspnea, non-productive cough, and bilateral inspiratory 'Velcro' crackles at the lung bases. Digital clubbing is present. Chest HRCT shows bilateral lower-lobe peripheral honeycombing with traction bronchiectasis, and a subpleural reticular pattern. Surgical lung biopsy shows usual interstitial pneumonia (UIP) pattern. Which of the following antifibrotic agents is indicated for this condition?", "choices": {"A": "Systemic corticosteroids; first-line treatment for IPF based on the PANTHER trial", "B": "Pirfenidone or nintedanib; both slow disease progression in IPF by reducing the rate of FVC decline", "C": "Cyclophosphamide plus azathioprine; standard immunosuppressive regimen for IPF", "D": "N-acetylcysteine monotherapy; shown to preserve FVC in IPF", "E": "Azathioprine monotherapy; the safest long-term option for IPF"}, "answer": "B", "correctText": "Pirfenidone or nintedanib; both slow disease progression in IPF by", "explanation": "reducing the rate of FVC decline\nIdiopathic pulmonary fibrosis (IPF) is the most common and progressive idiopathic ILD. HRCT showing honeycombing with traction bronchiectasis in a subpleural, bibasilar distribution is characteristic of UIP pattern. The PANTHER trial showed that the triple therapy (prednisone + azathioprine + NAC) increased hospitalizations and mortality compared to placebo — corticosteroids and immunosuppressants are HARMFUL in IPF. Two antifibrotic agents are FDA-approved: pirfenidone\n(ASCEND, CAPACITY trials) and nintedanib (INPULSIS trial), both reducing FVC decline by ~50%.\nNeither reverses fibrosis but slows progression. Lung transplant remains the only potentially curative option."}, {"number": 82, "stem": "A 50-year-old farmer presents with recurrent episodes of fever, chills, cough, and dyspnea occurring 4–8 hours after exposure to stored hay. Symptoms resolve within 24–48 hours of leaving the farm but recur with each exposure. Chest HRCT shows bilateral diffuse ground-glass opacities and small centrilobular nodules. BAL shows lymphocytosis. Serum precipitins against thermophilic actinomycetes (Saccharopolyspora rectivirgula) are positive. Which diagnosis and management approach are most appropriate?", "choices": {"A": "Acute eosinophilic pneumonia; corticosteroids urgently required", "B": "Farmer's lung (hypersensitivity pneumonitis); antigen avoidance is the cornerstone of management, supplemented by corticosteroids in acute/severe episodes", "C": "Histoplasmosis; itraconazole therapy", "D": "Sarcoidosis; this presentation is consistent with Löfgren syndrome", "E": "Silicosis; remove from dusty farm environment and monitor"}, "answer": "B", "correctText": "Farmer's lung (hypersensitivity pneumonitis); antigen avoidance is the", "explanation": "cornerstone of management, supplemented by corticosteroids in acute/severe episodes\nFarmer's lung is a classic example of hypersensitivity pneumonitis (HP, also called extrinsic allergic alveolitis) caused by inhaling thermophilic actinomycete antigens from moldy hay. Recurrent episodes 4–8 hours after antigen exposure, with symptoms resolving upon removal, is pathognomonic for HP.\nBAL lymphocytosis and positive serum precipitins are supporting findings. The cornerstone of management is complete antigen avoidance, which can prevent progression to chronic fibrotic HP.\nCorticosteroids accelerate recovery in acute/severe episodes but do not alter long-term outcome if antigen exposure continues. Chronic HP can lead to irreversible fibrosis similar to IPF."}, {"number": 83, "stem": "A 55-year-old woman undergoes pulmonary function testing for progressive exertional dyspnea.\nResults: FVC 58% predicted, FEV₁ 62% predicted, FEV₁/FVC 0.84 (normal), TLC 62% predicted, RV 65% predicted, DLCO 52% predicted. Chest HRCT shows bilateral peripheral reticular opacities with honeycombing at the lung bases. Which pattern of lung disease does this\nPFT data reflect, and what does the reduced DLCO indicate?", "choices": {"A": "Obstructive pattern (FEV₁/FVC <0.70); airflow obstruction with air trapping", "B": "Restrictive pattern (reduced TLC, preserved FEV₁/FVC); reduced DLCO reflects loss of alveolar-capillary surface area from interstitial fibrosis", "C": "Mixed obstructive-restrictive pattern; both obstruction and restriction present", "D": "Normal lung function; FEV₁/FVC ratio is normal", "E": "Restrictive pattern from obesity; DLCO would be normal in chest wall restriction"}, "answer": "B", "correctText": "Restrictive pattern (reduced TLC, preserved FEV₁/FVC); reduced DLCO", "explanation": "reflects loss of alveolar-capillary surface area from interstitial fibrosis\nRestrictive lung disease is defined by reduced TLC (<80% predicted). Characteristic PFT pattern: reduced FVC, reduced TLC, NORMAL FEV₁/FVC ratio (≥0.70), reduced or normal RV. The preserved\nFEV₁/FVC ratio distinguishes restriction from obstruction. Reduced DLCO in the context of fibrotic ILD\n(honeycombing pattern) reflects destruction of alveolar walls and capillaries, reducing the available surface area for gas diffusion. In extrapulmonary restriction (obesity, kyphoscoliosis, neuromuscular disease), TLC is reduced but the DLCO is typically NORMAL or proportionately preserved, because the lung parenchyma and alveolar-capillary units are intact.\n\n■■ SLEEP DISORDERS ■■"}, {"number": 84, "stem": "A 20-year-old woman presents with 3 years of excessive daytime sleepiness despite adequate nighttime sleep. She reports sudden brief episodes of bilateral leg weakness triggered by laughter or excitement. She also experiences vivid dream-like images while falling asleep and brief inability to move upon awakening. BMI 22. Exam and vitals are normal. Which combination of findings most strongly confirms the most likely diagnosis?", "choices": {"A": "AHI ≥30 on polysomnography with oxygen desaturations", "B": "Mean sleep latency <8 minutes with ≥2 sleep-onset REM periods (SOREMPs) on MSLT, plus low CSF orexin (hypocretin-1 ≤110 pg/mL)", "C": "Periodic limb movement index >15 per hour on polysomnography", "D": "Serum ferritin <50 ng/mL with normal polysomnography", "E": "Prolonged sleep latency >30 minutes with frequent nocturnal arousals"}, "answer": "B", "correctText": "Mean sleep latency <8 minutes with ≥2 sleep-onset REM periods", "explanation": "(SOREMPs) on MSLT, plus low CSF orexin (hypocretin-1 ≤110 pg/mL)\nThis is classic narcolepsy with cataplexy (Type 1 narcolepsy): excessive daytime sleepiness, cataplexy\n(sudden bilateral loss of muscle tone triggered by strong emotion), hypnagogic hallucinations (vivid hallucinations while falling asleep), and sleep paralysis. Diagnostic criteria require mean sleep latency\n<8 min AND ≥2 SOREMPs on MSLT. Low CSF orexin (hypocretin-1) ≤110 pg/mL is pathognomonic and diagnostic for Type 1 narcolepsy (caused by autoimmune destruction of orexin-producing hypothalamic neurons). Treatment: sodium oxybate (gold standard for cataplexy and sleepiness), modafinil/armodafinil or stimulants for sleepiness. Pitolisant and solriamfetol are newer approved options."}, {"number": 85, "stem": "A 52-year-old man with BMI 34 presents with loud habitual snoring, witnessed apneas, morning headaches, and significant daytime sleepiness (Epworth score 17/24). His wife reports he stops breathing approximately 15 times per hour. Polysomnography confirms an AHI of 28 (moderate\nOSA) with oxygen desaturations to 82%. He has hypertension controlled on 2 agents. Which is the most appropriate first-line treatment?", "choices": {"A": "Oral appliance (mandibular advancement device) as first-line for moderate OSA", "B": "Continuous positive airway pressure (CPAP) therapy; the most effective treatment for OSA, reducing AHI and improving daytime symptoms, blood pressure, and quality of life", "C": "Weight loss alone; sufficient for moderate OSA", "D": "Uvulopalatopharyngoplasty (UPPP) as first-line surgical treatment", "E": "Supplemental nocturnal oxygen alone to treat desaturations"}, "answer": "B", "correctText": "Continuous positive airway pressure (CPAP) therapy; the most effective", "explanation": "treatment for OSA, reducing AHI and improving daytime symptoms, blood pressure, and quality of life\nCPAP is the first-line treatment for moderate-to-severe OSA (AHI ≥15). It maintains upper airway patency by delivering positive pressure to splint the airway open, eliminating apneas and hypopneas, improving oxygen saturation, and resolving daytime sleepiness. CPAP also reduces blood pressure\n(particularly important in this patient with hypertension) and cardiovascular risk. Oral appliances\n(MADs) are an alternative for mild-moderate OSA or CPAP-intolerant patients. Weight loss is important adjunctive therapy but insufficient alone for moderate OSA. Supplemental oxygen treats hypoxemia but does not prevent upper airway obstruction. Surgery (UPPP) has variable efficacy and is not first-line."}, {"number": 86, "stem": "A 68-year-old man with EF 28% (HFrEF) presents with fatigue and daytime somnolence. His wife reports he has breathing pauses followed by a waxing-and-waning crescendo-decrescendo pattern — he does not snore or gasp awake. BMI 24. Polysomnography confirms AHI 26 with absent respiratory effort during apneic events. Which feature most directly distinguishes his disorder from obstructive sleep apnea, and what is the primary underlying mechanism?", "choices": {"A": "OSA causes absent respiratory effort during apneas; CSA is distinguished by preserved effort", "B": "Central sleep apnea (Cheyne-Stokes respiration) is characterized by absent respiratory effort during apneas and crescendo-decrescendo breathing pattern; driven by oscillating ventilatory control in the setting of low cardiac output and pulmonary congestion", "C": "OSA resolves with positional therapy; CSA does not respond to any intervention", "D": "Loud snoring is present in CSA but absent in OSA", "E": "CSA is defined by AHI ≥30 only; AHI 26 does not meet criteria"}, "answer": "B", "correctText": "Central sleep apnea (Cheyne-Stokes respiration) is characterized by", "explanation": "absent respiratory effort during apneas and crescendo-decrescendo breathing pattern; driven by oscillating ventilatory control in the setting of low cardiac output and pulmonary congestion\nCentral sleep apnea (CSA) with Cheyne-Stokes respiration (CSR) is the most common form of CSA in heart failure. Key distinguishing features: ABSENT respiratory effort during apneic events (no chest/abdominal wall movement), crescendo-decrescendo breathing pattern (Cheyne-Stokes), no snoring. OSA is characterized by PERSISTENT respiratory effort with airway obstruction (snoring, gasping, arousal). The mechanism of CSR-CSA in HFrEF: low cardiac output causes oscillations in\nPaO₂ and PaCO₂ that overshoot and undershoot the apneic threshold, creating periodic breathing.\nManagement focuses on treating the underlying heart failure; CPAP/ASV can be trialed but ASV is contraindicated in EF <45%."}, {"number": 87, "stem": "A 7-year-old boy is brought to clinic because his parents are alarmed by episodes occurring 60–90 minutes after sleep onset in which he abruptly sits up screaming with diaphoresis, tachycardia, and dilated pupils. He is unresponsive to attempts to comfort him and returns to sleep within minutes. He has no recollection of the events the following morning. Neurologic exam is normal.\nHis parents are requesting medication. Which of the following is the most appropriate management?", "choices": {"A": "Initiate nightly clonazepam", "B": "Urgent EEG and levetiracetam for suspected nocturnal frontal lobe epilepsy", "C": "Parental reassurance and safety precautions; sleep terror disorder is benign, self-limited, and typically resolves by adolescence — medication is generally not indicated", "D": "Prazosin at bedtime for nightmare disorder", "E": "Polysomnography with CPAP titration for suspected OSA"}, "answer": "C", "correctText": "Parental reassurance and safety precautions; sleep terror disorder is", "explanation": "benign, self-limited, and typically resolves by adolescence — medication is generally not indicated\nSleep terror disorder (pavor nocturnus) is a NREM parasomnia occurring in Stage 3–4 (slow-wave) sleep, typically 60–90 minutes after sleep onset. Classic features: abrupt partial arousal with screaming, autonomic activation (diaphoresis, tachycardia, mydriasis), unresponsiveness to comforting, and NO dream recall or memory of the event in the morning (unlike nightmare disorder, which involves REM sleep, disturbing dream content, and full recall). Sleep terrors are common in children (prevalence 1–6%), have a strong familial component, and are self-limited, resolving by adolescence. Management is reassurance + safety (padded environment). Medications are rarely needed. Trigger factors include sleep deprivation and febrile illness."}, {"number": 88, "stem": "A 45-year-old woman presents with an irresistible urge to move her legs in the evening that worsens at rest and is partially relieved by walking. The sensation is described as crawling/creeping deep within her legs. She has difficulty falling asleep due to the discomfort. She has no other medical conditions and takes no medications. Serum ferritin is 28 ng/mL (normal 30–300 ng/mL). Which of the following is the most appropriate initial treatment?", "choices": {"A": "Ropinirole or pramipexole (dopamine agonist); first-line pharmacotherapy for RLS regardless of ferritin", "B": "Iron supplementation to raise ferritin >75 ng/mL; iron deficiency is a potentially correctable cause of RLS and should be addressed before initiating pharmacotherapy", "C": "Benzodiazepine (clonazepam) as first-line therapy", "D": "SSRIs; RLS has a serotonergic basis", "E": "Gabapentin as the only approved treatment for RLS"}, "answer": "B", "correctText": "Iron supplementation to raise ferritin >75 ng/mL; iron deficiency is a", "explanation": "potentially correctable cause of RLS and should be addressed before initiating pharmacotherapy\nRestless legs syndrome (RLS/Willis-Ekbom disease) is characterized by the urge to move the legs, often with uncomfortable sensations, worse at rest, worse in the evening/night, and partially relieved by movement. Iron deficiency is the most important potentially correctable cause: low serum ferritin impairs dopaminergic neurotransmission in the CNS. Current guidelines recommend checking ferritin and replacing iron (oral or IV) to target ferritin >75 ng/mL before initiating pharmacotherapy. If iron repletion is insufficient, dopamine agonists (ropinirole, pramipexole), alpha-2-delta ligands (gabapentin enacarbil, pregabalin), or low-dose opioids are used. SSRIs and TCAs can worsen RLS."}, {"number": 89, "stem": "A 34-year-old nurse works rotating day/night shifts. She reports difficulty sleeping during the day when working nights and difficulty staying awake during night shifts. She has developed irritability and impaired concentration. She takes no medications and uses alcohol occasionally to help her fall asleep. Which of the following best describes the diagnosis and appropriate management strategy?", "choices": {"A": "Obstructive sleep apnea; refer for polysomnography", "B": "Shift work disorder; sleep hygiene, strategic light exposure/avoidance, and melatonin can help align circadian rhythm; modafinil (or armodafinil) is approved for work-shift sleepiness", "C": "Insomnia disorder; prescribe zolpidem nightly", "D": "Narcolepsy; refer for MSLT", "E": "Idiopathic hypersomnia; stimulant therapy is first-line"}, "answer": "B", "correctText": "Shift work disorder; sleep hygiene, strategic light exposure/avoidance,", "explanation": "and melatonin can help align circadian rhythm; modafinil (or armodafinil) is approved for work-shift sleepiness\nShift work disorder is a circadian rhythm sleep-wake disorder in which work schedule conflicts with the internal circadian clock, causing insomnia during intended sleep periods and excessive sleepiness during work hours. Management includes: strategic bright light exposure (to advance or delay the circadian phase), avoiding light during the wake-sleep transition, consistent sleep schedules, and melatonin to facilitate sleep at the desired time. Modafinil and armodafinil are FDA-approved for shift work sleepiness. Alcohol as a sleep aid worsens sleep quality and architecture and should be discouraged. Zolpidem nightly is not appropriate for a situational circadian disorder.\n■■ STANDARD PRECAUTIONS ■■"}, {"number": 90, "stem": "A nurse sustains a deep percutaneous needlestick from a hollow-bore needle used to draw blood from a patient with known HIV who is not on antiretroviral therapy and has a high viral load\n(>100,000 copies/mL). The exposed worker completed hepatitis B vaccine with documented immunity. After immediately washing the wound with soap and water, what is the most appropriate next step?", "choices": {"A": "Administer hepatitis B immunoglobulin and a booster vaccine dose", "B": "Await the worker's baseline HIV antibody test before deciding on prophylaxis", "C": "No prophylaxis needed; skin exposure does not transmit HIV", "D": "Begin HIV post-exposure prophylaxis (PEP) with a 3-drug antiretroviral regimen as soon as possible, ideally within hours and no later than 72 hours", "E": "Begin 28-day PEP only if the worker's 6-week HIV test returns positive"}, "answer": "D", "correctText": "Begin HIV post-exposure prophylaxis (PEP) with a 3-drug antiretroviral", "explanation": "regimen as soon as possible, ideally within hours and no later than 72 hours\nHIV PEP must be initiated as soon as possible — ideally within hours of exposure — and no later than 72 hours, as efficacy decreases significantly with delay. Current CDC guidelines recommend a 28-day course of 3-drug combination ART (preferred: tenofovir/emtricitabine + raltegravir or dolutegravir) for high-risk exposures (hollow-bore needle with high viral load source). Waiting for baseline testing or post-exposure seroconversion is inappropriate and potentially harmful. The worker's documented HBV immunity means HBV immunoglobulin is unnecessary. PEP reduces transmission risk by approximately 80%."}, {"number": 91, "stem": "A 32-year-old man presents with fever, productive cough, and a chest radiograph showing right upper lobe cavitary lesion. Three sputum AFB smears are positive. Respiratory isolation is ordered. Which of the following correctly describes the required infection control measures?", "choices": {"A": "Standard room with door closed; surgical mask for healthcare workers", "B": "Airborne infection isolation room (AIIR) with negative pressure; healthcare workers must wear a fit-tested N95 (or higher) respirator upon entry", "C": "Contact precautions only; gown and gloves upon entry, no special mask required", "D": "Droplet precautions; standard surgical mask and face shield", "E": "No additional precautions until culture results confirm M. tuberculosis"}, "answer": "B", "correctText": "Airborne infection isolation room (AIIR) with negative pressure;", "explanation": "healthcare workers must wear a fit-tested N95 (or higher) respirator upon entry\nTuberculosis (and other airborne pathogens: measles, varicella/chickenpox, disseminated zoster) requires AIRBORNE precautions: placement in a negative-pressure airborne infection isolation room\n(AIIR) where air exhausts to the outside or through HEPA filtration, and healthcare workers must wear a fit-tested N95 respirator (not a surgical mask, which does not filter particles <5 µm). TB bacilli are transmitted as tiny aerosolized droplet nuclei that remain suspended in air. A surgical mask is appropriate for droplet precautions (influenza, pertussis). Contact precautions address direct contact transmission (MRSA, C. diff). Waiting for cultures to confirm before isolating would be dangerous — precautions begin on clinical suspicion."}, {"number": 92, "stem": "A healthcare student asks you to differentiate between transmission-based precautions. A patient is admitted with profuse watery diarrhea; another with influenza; a third with confirmed varicella.\nWhich of the following correctly matches each patient to the appropriate precaution type?", "choices": {"A": "Watery diarrhea: airborne; Influenza: contact; Varicella: droplet", "B": "Watery diarrhea: contact; Influenza: droplet; Varicella: airborne", "C": "All three: standard precautions only", "D": "Watery diarrhea: droplet; Influenza: airborne; Varicella: contact", "E": "All three require airborne precautions"}, "answer": "B", "correctText": "Watery diarrhea: contact; Influenza: droplet; Varicella: airborne", "explanation": "Transmission-based precautions are classified by route: CONTACT precautions (gown + gloves) for direct/indirect contact transmission — C. difficile (key: alcohol-based hand sanitizer is INEFFECTIVE; soap and water required), MRSA, VRE, wound infections. Profuse diarrhea suggests C. diff → contact.\nDROPLET precautions (surgical mask + standard room) for respiratory droplets >5 µm — influenza, pertussis, meningococcal disease, Group A strep pharyngitis. AIRBORNE precautions (N95 + negative-pressure AIIR) for particles ≤5 µm — TB, measles, varicella. Varicella can also spread via contact with vesicle fluid (combined airborne + contact precautions)."}, {"number": 93, "stem": "A medical student sustains a needlestick from a patient with known hepatitis B infection (HBsAg positive, HBeAg positive — high infectivity). The student has never received the hepatitis B vaccine series. Which of the following is the most appropriate immediate management?", "choices": {"A": "Hepatitis B vaccine series alone; begin the 3-dose series today", "B": "Hepatitis B immunoglobulin (HBIG) alone; no vaccine needed in the acute setting", "C": "HBIG administered as soon as possible (ideally within 24 hours) AND initiation of the hepatitis B vaccine series", "D": "No intervention needed; most adults clear HBV spontaneously", "E": "Await HBsAg result from the source patient before any intervention"}, "answer": "C", "correctText": "HBIG administered as soon as possible (ideally within 24 hours) AND", "explanation": "initiation of the hepatitis B vaccine series\nFor an unvaccinated person exposed to
