<script>
const questions = [{"number": 1, "stem": "A 68-year-old man with a long history of COPD presents to the ED with two days of worsening dyspnea and productive cough. His ABG on room air shows: pH 7.28, PaO2 52 mmHg, PaCO2 68 mmHg, HCO3 30 mEq/L. Which of the following best characterizes this patient's respiratory failure?", "choices": {"A": "Acute hypoxic respiratory failure only", "B": "Acute hypercapnic respiratory failure only", "C": "Acute-on-chronic hypercapnic respiratory failure with concurrent hypoxemia", "D": "Chronic hypercapnic respiratory failure with full compensation", "E": "Metabolic alkalosis causing respiratory depression"}, "answer": "C", "explanation": "This patient has both hypoxemia (PaO2 52 mmHg; threshold <60) and hypercapnia (PaCO2 68; threshold >50). The pH is 7.28 (acidemic), indicating an acute process, but the elevated bicarbonate (30 mEq/L) reflects chronic renal compensation — consistent with underlying COPD. This is the classic ABG picture of acute-on-chronic hypercapnic respiratory failure: chronically elevated HCO3 from the baseline disease, now decompensated by an acute infection, resulting in acidemia."}, {"number": 2, "stem": "A 22-year-old woman is found unresponsive after ingesting a large quantity of opioids at a party. EMS brings her to the ED. Her ABG shows: pH 7.18, PaO2 55 mmHg, PaCO2 72 mmHg, HCO3 22 mEq/L. What does the normal bicarbonate level in this ABG indicate about the nature of her respiratory failure?", "choices": {"A": "The kidneys have already fully compensated for the acidosis", "B": "This represents chronic hypercapnic respiratory failure", "C": "This is an acute process — there has been insufficient time for renal compensation", "D": "The bicarbonate level is irrelevant in hypercapnic failure", "E": "This is a primary metabolic alkalosis with respiratory compensation"}, "answer": "C", "explanation": "In acute respiratory failure, the pH is abnormal because there has been insufficient time for renal compensation. The kidneys require 3–5 days to retain bicarbonate in response to elevated PaCO2. This patient's HCO3 is 22 mEq/L (normal), confirming this is an acute event — opioid-induced respiratory depression causing acute hypercapnic respiratory failure. In chronic hypercapnic failure, HCO3 would be elevated (often >28–30) and pH would be near normal."}, {"number": 3, "stem": "A 55-year-old woman with systolic heart failure (EF 25%) presents with acute dyspnea, orthopnea, and bilateral leg swelling. SpO2 is 86% on room air. Exam shows elevated JVP, bilateral crackles, and 3+ pitting edema. CXR reveals cardiomegaly with bilateral pulmonary infiltrates. Which of the following best distinguishes this presentation from non-cardiogenic pulmonary edema?", "choices": {"A": "Presence of bilateral infiltrates on CXR", "B": "Elevated BNP, cardiomegaly on CXR, and volume-overloaded state reflecting increased hydrostatic pressure", "C": "Hypoxemia and tachypnea", "D": "Normal echocardiogram with reduced ejection fraction", "E": "Bilateral crackles on auscultation"}, "answer": "B", "explanation": "The key distinguishing features of cardiogenic pulmonary edema are: elevated BNP (reflecting ventricular wall stress), cardiomegaly on CXR, volume-overloaded state, elevated JVP, peripheral edema, and echocardiogram showing reduced EF or valvular disease. The underlying mechanism is increased hydrostatic pressure forcing fluid into the alveolar space. Non-cardiogenic pulmonary edema (e.g., ARDS) results from increased capillary permeability — BNP is usually normal and the heart is structurally normal."}, {"number": 4, "stem": "A 72-year-old man with acute decompensated heart failure presents with severe dyspnea and SpO2 82% on 6L nasal cannula. He is alert, oriented, and able to follow commands. He has no facial trauma and has not vomited. His BP is 180/100. After initiating supplemental oxygen, what is the most appropriate next respiratory intervention?", "choices": {"A": "Immediate intubation and mechanical ventilation", "B": "Noninvasive positive pressure ventilation (NIPPV/BiPAP)", "C": "Increase nasal cannula to 15 L/min", "D": "Needle decompression for suspected pneumothorax", "E": "IV furosemide alone without respiratory support escalation"}, "answer": "B", "explanation": "This alert, cooperative patient without contraindications is an ideal candidate for NIPPV (CPAP/BiPAP). NIPPV is indicated for moderate-to-severe respiratory distress and is the appropriate escalation before intubation. In acute cardiogenic pulmonary edema specifically, NIPPV reduces preload and afterload in addition to improving oxygenation. Immediate intubation is premature in an alert, cooperative patient. IV furosemide addresses the underlying cause but does not provide immediate respiratory support for severe hypoxemia."}, {"number": 5, "stem": "A 48-year-old man with alcohol use disorder presents with aspiration pneumonia, severe hypoxemia (SpO2 82% on NRB), and is minimally responsive with ongoing emesis. His respiratory rate is 36 and he is using accessory muscles. Which of the following represents the most important contraindication to NIPPV in this patient?", "choices": {"A": "Respiratory rate greater than 30", "B": "Active vomiting and inability to protect the airway", "C": "Low oxygen saturation despite NRB", "D": "History of alcohol use", "E": "Use of accessory muscles indicating fatigue"}, "answer": "B", "explanation": "Active vomiting is an absolute contraindication to NIPPV. The sealed mask used in NIPPV creates a dangerous situation if the patient vomits — aspiration is nearly certain with a mask held tightly against the face. Additional NIPPV contraindications include: cardiac or respiratory arrest, severe altered mental status (which this patient also has), inability to protect the airway, facial trauma/burns, and excessive secretions. This patient requires endotracheal intubation."}, {"number": 6, "stem": "A 60-year-old woman with COPD is in acute hypercapnic respiratory failure (pH 7.28, PaCO2 72 mmHg). She is awake, cooperative, and has no facial trauma or active emesis. She is placed on BiPAP but fails to improve after 1 hour — pH is now 7.22 and she is becoming increasingly somnolent. What is the most appropriate next step?", "choices": {"A": "Switch to CPAP and reassess in 2 hours", "B": "Proceed with endotracheal intubation", "C": "Increase supplemental oxygen via nasal cannula", "D": "Add IV bicarbonate to correct the acidosis", "E": "Continue BiPAP with sedation to reduce patient distress"}, "answer": "B", "explanation": "Patients who fail a trial of NIPPV require endotracheal intubation. Failure criteria include worsening pH/PaCO2, progressive mental status decline, inability to protect the airway, or hemodynamic instability. This patient's worsening acidemia (pH now 7.22) and somnolence indicate NIPPV is insufficient. Continuing NIPPV risks aspiration and respiratory arrest. Endotracheal intubation allows full ventilatory control and airway protection."}, {"number": 7, "stem": "A ventilated patient in the ICU is being managed for ARDS. The respiratory therapist reports the following ventilator settings: FiO2 60%, PEEP 10 cm H2O, tidal volume 520 mL, rate 18. The patient weighs 75 kg (ideal body weight). Which ventilator parameter is most inconsistent with a lung-protective strategy for ARDS?", "choices": {"A": "FiO2 60%", "B": "PEEP 10 cm H2O", "C": "Tidal volume 520 mL (approximately 6.9 mL/kg IBW)", "D": "Respiratory rate 18", "E": "All settings are appropriate for ARDS management"}, "answer": "C", "explanation": "Lung-protective ventilation for ARDS targets a tidal volume of 6 mL/kg of ideal body weight. For a 75 kg IBW patient, this equals 450 mL. This patient is receiving 520 mL — approximately 6.9 mL/kg — which exceeds the recommended target. Excessive tidal volumes cause volutrauma and worsen alveolar injury. PEEP at 10 cm H2O helps maintain alveolar recruitment, and FiO2 60% is appropriate for this severity of illness."}, {"number": 8, "stem": "A 38-year-old previously healthy man is admitted to the ICU after near-drowning. He develops worsening hypoxemia over 18 hours. CXR shows bilateral, diffuse infiltrates. His ABG on FiO2 70% shows PaO2 58 mmHg. PEEP is 8 cm H2O. BNP is normal, and echocardiogram shows preserved ejection fraction. Which of the following best describes his clinical syndrome and severity?", "choices": {"A": "Cardiogenic pulmonary edema — treat with diuretics", "B": "Mild ARDS — PF ratio approximately 83 mmHg", "C": "Moderate ARDS — PF ratio approximately 83 mmHg", "D": "Severe ARDS — PF ratio approximately 83 mmHg", "E": "Acute-on-chronic respiratory failure — treat underlying COPD"}, "answer": "D", "explanation": "ARDS is defined by: onset within 7 days of a clinical insult, bilateral radiographic opacities not explained by effusion/atelectasis, respiratory failure not fully explained by heart failure (supported by normal BNP and echo here), and PF ratio <300 with PEEP ≥5 cm H2O. PF ratio = PaO2/FiO2 = 58/0.70 = 83 mmHg. Severe ARDS is defined as PF ratio <100 mmHg. This patient's PF ratio of ~83 meets criteria for severe ARDS."}, {"number": 9, "stem": "An ICU team is calculating PF ratios to stage a patient's ARDS. The patient's most recent ABG shows PaO2 of 75 mmHg while receiving FiO2 of 50% via ventilator. What is this patient's PF ratio, and how is ARDS severity classified?", "choices": {"A": "PF ratio = 37.5; severe ARDS", "B": "PF ratio = 150; moderate ARDS", "C": "PF ratio = 150; mild ARDS", "D": "PF ratio = 375; below threshold for ARDS", "E": "PF ratio = 75; severe ARDS"}, "answer": "B", "explanation": "PF ratio = PaO2 / FiO2 = 75 / 0.50 = 150 mmHg. ARDS severity: mild = PF 200–300, moderate = PF 100–200, severe = PF <100. A PF ratio of 150 falls in the moderate ARDS range. Remember: FiO2 is expressed as a decimal for the calculation (50% = 0.50)."}, {"number": 10, "stem": "A 45-year-old with severe ARDS (PF ratio 68) remains profoundly hypoxic despite lung-protective ventilation with PEEP 16, FiO2 100%, and prone positioning for 16 hours per day. The intensivist considers additional rescue therapies. Regarding extracorporeal membrane oxygenation (ECMO) in this patient, which statement is most accurate?", "choices": {"A": "Veno-arterial (V-A) ECMO is the appropriate configuration for isolated respiratory failure", "B": "Veno-venous (V-V) ECMO provides both oxygenation/CO2 removal and cardiac support", "C": "Veno-venous (V-V) ECMO provides respiratory support; it has not been shown to decrease mortality in ARDS", "D": "ECMO is contraindicated in ARDS and is reserved for cardiogenic shock only", "E": "V-A ECMO oxygenates blood by draining from a vein and returning to a vein"}, "answer": "C", "explanation": "Veno-venous (V-V) ECMO is the correct configuration for isolated respiratory failure. Blood is drained from a central vein, oxygenated and CO2 removed by the membrane oxygenator, and returned to a central vein — bypassing the lungs. It does NOT provide cardiac support. Veno-arterial (V-A) ECMO is used for cardiac failure or combined cardiorespiratory failure — it drains from a vein and returns oxygenated blood to an artery, providing both respiratory and circulatory support. Despite its physiologic rationale, ECMO has not been shown to decrease mortality in ARDS."}, {"number": 11, "stem": "A 32-year-old woman with cystic fibrosis presents with a 3-week history of worsening productive cough with foul-smelling sputum, hemoptysis, and dyspnea. She has had four similar hospitalizations in the past two years. High-resolution CT chest shows bilateral dilated, thickened bronchi described as 'tram tracks.' Which of the following is the most accurate statement regarding her diagnosis and management?", "choices": {"A": "Her CT findings are diagnostic of ARDS — initiate lung-protective ventilation", "B": "She has bronchiectasis; cystic fibrosis is the most common cause; treatment includes antibiotics, airway clearance, and inhaled bronchodilators", "C": "The 'tram track' sign indicates tuberculosis — initiate four-drug anti-mycobacterial therapy", "D": "Preventive macrolide therapy has not been shown to reduce exacerbation frequency in bronchiectasis", "E": "PFTs in bronchiectasis most commonly show a restrictive pattern"}, "answer": "B", "explanation": "Bronchiectasis is characterized by permanent, abnormal dilation and destruction of bronchial walls, most commonly caused by cystic fibrosis (~50% of cases). The 'tram track' sign on HRCT reflects dilated, thickened bronchi. Treatment consists of antibiotics (for exacerbations), airway clearance techniques, and inhaled bronchodilators. In patients with recurrent exacerbations, preventive macrolide therapy has been shown to decrease exacerbation frequency. PFTs typically show an obstructive pattern, not restrictive."}, {"number": 12, "stem": "A 78-year-old nursing home resident with a history of CVA and known dysphagia is admitted with low-grade fever, foul-smelling sputum, and right lower lobe infiltrate. She is typically in a supine position. She is not on antibiotics. Which of the following best describes the microbiology and appropriate antibiotic strategy for her presentation?", "choices": {"A": "Gram-positive cocci in clusters — vancomycin monotherapy", "B": "Oral flora including anaerobes; if foul sputum, abscess, or necrotizing disease, add anaerobic coverage such as clindamycin or ampicillin-sulbactam", "C": "Pseudomonas aeruginosa — antipseudomonal coverage required for all community-acquired aspiration", "D": "Anaerobic coverage is always required regardless of clinical features", "E": "Aspiration pneumonitis requires immediate broad-spectrum antibiotics including anti-fungals PART 2: SLEEP DISORDERS"}, "answer": "B", "explanation": "Aspiration pneumonia in the supine position localizes to the superior segment of the right lower lobe, as the right mainstem bronchus is more vertical. The organisms involved are oral flora including anaerobes. Anaerobic coverage (clindamycin or ampicillin-sulbactam) is added when there is putrid sputum, abscess, empyema, or necrotizing pneumonia — not routinely for uncomplicated aspiration. Piperacillin-tazobactam already covers anaerobes if used. Hospital-acquired aspiration involves gram-negatives, Pseudomonas, and MRSA."}, {"number": 13, "stem": "A 28-year-old patient undergoes polysomnography. The sleep technician observes a period of sleep characterized by low-amplitude, mixed-frequency EEG activity without K-complexes or spindles, conjugate rapid eye movements, and low chin muscle tone. Which sleep stage is being recorded?", "choices": {"A": "N1 (Stage 1 NREM)", "B": "N2 (Stage 2 NREM)", "C": "N3 (Stage 3 NREM — slow wave sleep)", "D": "REM sleep", "E": "Drowsy wakefulness"}, "answer": "D", "explanation": "REM sleep is characterized by: conjugate rapid eye movements (REMs), low-amplitude mixed-frequency EEG (similar to N1) WITHOUT K-complexes or spindles, and low chin (skeletal muscle) tone — reflecting the muscle atonia of REM sleep. It comprises approximately 18–21% of total sleep time. The presence of rapid eye movements and muscle atonia uniquely identifies REM sleep on polysomnography."}, {"number": 14, "stem": "During a polysomnography lecture, a student asks about the EEG hallmarks of N2 sleep and N3 sleep. Which of the following correctly pairs each sleep stage with its defining EEG feature?", "choices": {"A": "N2: slow waves (0.5–2.0 Hz, amplitude >75 mV); N3: sleep spindles and K-complexes", "B": "N2: sleep spindles (11–16 Hz) and K-complexes; N3: high-amplitude slow wave activity (0.5–2.0 Hz)", "C": "N2: alpha waves (8–13 Hz); N3: rapid eye movements and muscle atonia", "D": "N2: beta waves; N3: sleep spindles maximal over central leads", "E": "N2 and N3 have identical EEG patterns; they are distinguished only by percentage of total sleep time"}, "answer": "B", "explanation": "N2 sleep is defined by the presence of sleep spindles (sinusoidal waves, 11–16 Hz, duration ≥0.5 sec, maximal over central leads) and K-complexes (well-delineated negative sharp wave followed by positive component, duration ≥0.5 sec, maximal in frontal leads). N3 (slow wave sleep) is defined by high-amplitude slow wave activity at 0.5–2.0 Hz with amplitude >75 mV over frontal regions. N3 is considered the 'homeostatic' sleep stage."}, {"number": 15, "stem": "A sleep medicine fellow is reviewing a normal adult polysomnogram. She notes the approximate percentage of total sleep time occupied by each stage. Which of the following correctly lists the approximate proportion of total sleep time for N2 and REM sleep in a healthy adult?", "choices": {"A": "N2: 10–15%; REM: 40–50%", "B": "N2: 56–66%; REM: 18–21%", "C": "N2: 30–35%; REM: 5–8%", "D": "N2: 5–17%; REM: 56–66%", "E": "N2: 18–21%; REM: 56–66%"}, "answer": "B", "explanation": "In a healthy adult, N2 sleep comprises approximately 56–66% of total sleep time — making it by far the dominant stage. REM sleep comprises approximately 18–21%. N1 (the lightest stage) is ~5–8%, and N3 (slow wave sleep) is ~5–17%. These proportions change with age; older adults have less N3 and REM sleep."}, {"number": 16, "stem": "A 52-year-old woman presents with difficulty initiating sleep three to four nights per week for the past five months. She reports lying awake worrying about not being able to fall asleep, and notes that she often falls asleep easily watching TV on the couch — but cannot sleep once she gets into bed. Which of the following best explains the behavioral mechanism contributing to her insomnia, and what is the first-line treatment?", "choices": {"A": "Hypocretin deficiency causing impaired sleep-wake regulation; treat with sodium oxybate", "B": "Conditioned arousal — her bed has become associated with wakefulness; first-line treatment is cognitive behavioral therapy for insomnia (CBT-I), including stimulus control", "C": "Primary central sleep apnea — obtain polysomnography and initiate CPAP", "D": "Circadian rhythm disorder — treat with melatonin and light therapy", "E": "Inadequate sleep hygiene alone; caffeine restriction will resolve the disorder"}, "answer": "B", "explanation": "This patient demonstrates classic conditioned (stimulus control) insomnia — her bed has become associated with wakefulness and arousal rather than sleep through repeated pairing. She can fall asleep easily outside the bedroom (TV couch) because that environment is not conditioned to wakefulness. First-line treatment is CBT-I, which includes: stimulus control (reestablishing bed as a sleep cue), sleep restriction therapy, relaxation training, and cognitive restructuring. Pharmacologic agents are second-line."}, {"number": 17, "stem": "A 42-year-old man with a history of heart failure presents to a sleep clinic reporting witnessed pauses in breathing during sleep, awakening short of breath, and daytime sleepiness. Polysomnography shows a central apnea index of 8 events/hour, with central events comprising 60% of all apneas, occurring in a crescendo-decrescendo pattern (cycle length 55 seconds). What is the most likely diagnosis, and what is the key pathophysiologic difference from obstructive sleep apnea?", "choices": {"A": "Obstructive sleep apnea — caused by pharyngeal muscle collapse; treat with CPAP", "B": "Cheyne-Stokes breathing/central sleep apnea — caused by high ventilatory drive and delayed chemoreceptor response in heart failure, without pharyngeal obstruction", "C": "Primary central sleep apnea — idiopathic, not associated with heart failure", "D": "Mixed apnea syndrome — treat with BiPAP without backup rate", "E": "Hypopnea syndrome — defined by 90% reduction in flow for at least 10 seconds"}, "answer": "B", "explanation": "This is central sleep apnea with Cheyne-Stokes breathing, most commonly associated with systolic heart failure. The key distinction from OSA: in OSA, respiratory effort persists (chest and abdominal belts show movement) despite upper airway obstruction. In CSA, respiratory effort is ABSENT — there is no drive from the respiratory centers. In Cheyne-Stokes breathing specifically, the mechanism is high ventilatory drive and delayed chemoreceptor response due to prolonged circulation time, causing PaCO2 to fall below the apneic threshold. The cycle length >40 seconds and crescendo-decrescendo pattern are hallmarks."}, {"number": 18, "stem": "A 54-year-old male with a BMI of 38 kg/m2, neck circumference of 45 cm, and known hypertension reports loud snoring, observed breathing pauses, and excessive daytime sleepiness. His bed partner says he appears to stop breathing multiple times each night. He is a male over age 50. Using the STOP-BANG tool, how many criteria does he meet, and what does this suggest?", "choices": {"A": "3 criteria — low risk for OSA", "B": "4 criteria — intermediate risk for OSA", "C": "5 criteria — high risk for OSA", "D": "6 criteria — high risk for OSA; diagnostic polysomnography is warranted", "E": "8 criteria — the maximum score; CPAP should be started empirically without testing"}, "answer": "D", "explanation": "STOP-BANG criteria: S = Snoring (YES), T = Tired/fatigue daily (not mentioned — NO), O = Observed apneas (YES), P = Pressure/hypertension (YES), B = BMI >35 (YES, BMI 38), A = Age >50 (YES), N = Neck >43 cm (YES, 45 cm), G = Gender male (YES). That is 6 of 8 criteria met (S, O, P, B, A, N, G — minus T). A score of 5–8 indicates high risk for OSA and warrants diagnostic evaluation (polysomnography or out-of-center sleep testing)."}, {"number": 19, "stem": "A 48-year-old woman is newly diagnosed with moderate OSA (AHI 22 events/hour) on polysomnography after presenting with daytime somnolence and witnessed apneas. She has no significant comorbidities. She is counseled on treatment options. Which of the following correctly describes the first-line treatment options for her OSA and an appropriate alternative?", "choices": {"A": "CPAP is first-line; surgical uvulopalatopharyngoplasty is equally effective as first-line", "B": "Positive airway pressure (PAP) therapy is first-line; oral appliance therapy is an appropriate alternative for mild-to-moderate OSA or PAP-intolerant patients", "C": "Oxygen supplementation via nasal cannula is first-line for moderate OSA", "D": "Zolpidem is first-line to improve sleep continuity and reduce apnea events", "E": "Weight loss alone is sufficient treatment for moderate OSA in non-obese patients"}, "answer": "B", "explanation": "PAP therapy (CPAP or auto-titrating CPAP) is the first-line treatment for OSA and is the most effective at eliminating disordered breathing events. An oral mandibular advancement appliance is first-line for mild-to-moderate OSA or as an alternative for patients intolerant to CPAP — improvement in functional outcomes and blood pressure is similar in magnitude to CPAP, though OA is not as effective at eliminating apneas. Surgical options (hypoglossal nerve stimulation, pharyngeal surgery) and weight loss are also used in appropriate patients."}, {"number": 20, "stem": "A 35-year-old male nurse presents with episodes of sudden muscle weakness triggered by laughing or excitement. He also reports vivid dream-like images as he falls asleep and brief inability to move when waking up. He has had irresistible urges to sleep throughout the day for the past 6 months, regardless of nighttime sleep duration. What is the underlying pathophysiology of this disorder, and what is the characteristic CSF finding?", "choices": {"A": "Dopamine deficiency in the substantia nigra; low dopamine metabolites in CSF", "B": "Hypothalamic hypocretin-1 (orexin) deficiency; CSF hypocretin-1 concentration ≤110 pg/mL", "C": "Adenosine accumulation causing excessive sleep pressure; elevated CSF adenosine", "D": "Serotonin excess causing REM dissociation; elevated CSF serotonin", "E": "Autoimmune destruction of the cholinergic REM-on neurons; elevated CSF acetylcholine"}, "answer": "B", "explanation": "This patient has Narcolepsy Type 1 (narcolepsy with cataplexy). The tetrad of narcolepsy includes: excessive daytime sleepiness, cataplexy (sudden muscle weakness triggered by strong positive emotion — here laughter), hypnagogic hallucinations (vivid images at sleep onset), and sleep paralysis. The underlying pathophysiology is deficiency of hypothalamic hypocretin-1 (orexin), likely from autoimmune destruction of hypocretin-producing neurons (associated with HLA DQB1*0602). Diagnostic CSF hypocretin-1 ≤110 pg/mL or <1/3 of normal mean values confirms the diagnosis."}, {"number": 21, "stem": "A 7-year-old boy is brought to the pediatrician because he wakes up screaming approximately 1–2 hours after falling asleep several nights per week. His parents report that during these episodes he appears terrified, is inconsolable, and has no memory of the event the next morning. He does not wake fully and returns to sleep quickly. What is this condition, during which sleep stage does it occur, and how should it be managed?", "choices": {"A": "Nightmare disorder — occurs during REM sleep; treat with image rehearsal therapy", "B": "Sleep terror disorder — occurs during N3 (slow wave/NREM) sleep; most cases are managed conservatively with reassurance and safety measures", "C": "REM sleep behavior disorder — occurs during REM sleep; treat with clonazepam", "D": "Nocturnal seizure — occurs during N2 sleep; initiate antiepileptic therapy", "E": "Sleepwalking — occurs during REM sleep; treat with benzodiazepines long-term"}, "answer": "B", "explanation": "Sleep terror disorder (also called pavor nocturnus) occurs during N3 (slow wave NREM) sleep, typically in the first third of the night. The child appears terrified, is difficult to console, has autonomic features (sweating, tachycardia), and has NO recall of the event. This distinguishes it from nightmare disorder (REM sleep, full waking with recall) and sleepwalking (complex motor behavior during N3, no recall). Management is largely conservative: parental reassurance, safety measures, and eliminating sleep deprivation triggers. Most cases resolve with age."}, {"number": 22, "stem": "A 32-year-old woman reports disturbing, vivid, and frightening dreams that occur in the second half of the night and cause her to wake with clear recall of the dream content. She feels anxious and has difficulty falling back asleep after these episodes. She has no other neurological symptoms. How does this presentation differ from sleep terror disorder, and what is the first-line treatment?", "choices": {"A": "This is sleep terror disorder — the same as sleep terrors; both occur in NREM sleep", "B": "This is nightmare disorder — it occurs during REM sleep, the patient wakes fully with complete dream recall; image rehearsal therapy is first-line", "C": "This is sleepwalking — occurs during NREM and is treated with clonazepam", "D": "This is narcolepsy with cataplexy — caused by hypocretin deficiency", "E": "This is hypnagogic hallucination — occurs at sleep onset, not during sleep"}, "answer": "B", "explanation": "Nightmare disorder involves disturbing, vivid dreams occurring during REM sleep (typically in the second half of the night when REM periods are longest). The key distinguishing features from sleep terrors: nightmares occur in REM sleep, the patient wakes FULLY with complete dream recall, and emotional distress persists after awakening. Sleep terrors occur in NREM (N3), the patient does not fully wake, and there is no recall. First-line treatment for nightmare disorder is image rehearsal therapy (IRT) — a cognitive technique in which the patient rehearses a modified, non-threatening version of the dream."}, {"number": 23, "stem": "A 45-year-old man reports an uncomfortable urge to move his legs in the evening that is worse at rest, partially relieved by walking, and significantly disrupts his ability to fall asleep. His ferritin level is 14 ng/mL (low). He has no neurologic deficits. What is the diagnosis, and what is a key first step in management given his lab result?", "choices": {"A": "Peripheral neuropathy — refer to neurology for EMG", "B": "Restless legs syndrome (RLS); iron deficiency can worsen or trigger RLS — iron supplementation should be initiated", "C": "Periodic limb movement disorder — initiate clonazepam", "D": "OSA with nocturnal leg discomfort — polysomnography and CPAP", "E": "Insomnia with anxiety — initiate CBT-I"}, "answer": "B", "explanation": "Restless legs syndrome (RLS) is characterized by: uncomfortable urge to move the legs (or arms), worse at rest, worse in the evening/night, partially or fully relieved by movement, and causing sleep disturbance. Iron deficiency is a well-established contributing factor to RLS, as iron is required for dopaminergic function in the CNS. A ferritin <50–75 ng/mL warrants iron supplementation as the first step. Pharmacologic options when iron repletion is insufficient include dopamine agonists (pramipexole, ropinirole) or alpha-2-delta ligands (gabapentin, pregabalin)."}, {"number": 24, "stem": "A 58-year-old man with a history of heavy alcohol use disorder presents reporting difficulty falling asleep and staying asleep, as well as vivid nightmares, since he stopped drinking 3 weeks ago. Prior to quitting, he regularly drank a bottle of wine each night to 'help him sleep.' Which sleep disorder diagnosis best accounts for his current symptoms, and what is the underlying mechanism?", "choices": {"A": "Primary insomnia — treat with zolpidem long-term", "B": "Substance or medication-induced sleep disorder — alcohol suppresses REM sleep during use; withdrawal produces REM rebound with nightmares and fragmented sleep", "C": "Narcolepsy type 2 — alcohol use unmasked hypocretin deficiency", "D": "Circadian rhythm disorder — alcohol disrupted his circadian clock", "E": "Obstructive sleep apnea — alcohol caused pharyngeal muscle collapse permanently"}, "answer": "B", "explanation": "Substance or medication-induced sleep disorder is the appropriate diagnosis when sleep disturbance is directly caused by a substance — either during use or withdrawal. Alcohol initially suppresses REM sleep and may appear to aid sleep onset, but it fragments sleep architecture and reduces restorative sleep quality. Upon withdrawal, REM rebound occurs — intense and frequent REM periods producing vivid nightmares, fragmented sleep, and insomnia. This is a classic and high-yield presentation. Treatment focuses on supportive care during withdrawal and addressing the underlying alcohol use disorder."}, {"number": 25, "stem": "A 9-year-old girl is observed walking through the house approximately 90 minutes after falling asleep. She appears awake but does not respond to her parents, has blank eyes, and has no memory of the event the next morning. Her parents report she had a stressful week at school. What is this diagnosis and what are the key management principles?", "choices": {"A": "Nightmare disorder — occurs in REM sleep; prescribe prazosin", "B": "Sleepwalking — occurs during N3 (NREM slow wave) sleep; management focuses on safety measures and reassurance; most cases resolve spontaneously", "C": "Sleep terror disorder — differentiated by the patient waking fully with recall", "D": "REM sleep behavior disorder — requires clonazepam immediately", "E": "Absence seizure — refer to neurology and initiate ethosuximide"}, "answer": "B", "explanation": "Sleepwalking (somnambulism) is a NREM parasomnia occurring during N3 slow wave sleep, typically in the first third of the night. The patient ambulates or performs complex behaviors while remaining in a sleep-like state — eyes are open but glassy, the patient is unresponsive, and there is no memory of the event. It is more common in children and often triggered by sleep deprivation or stress. Management centers on safety (removing hazards, door alarms), reassurance, and ensuring adequate sleep. Most cases in children resolve spontaneously. Benzodiazepines are reserved for persistent, dangerous episodes."}];
const exam = document.getElementById('exam');
function renderExam() {
  exam.innerHTML = '';
  questions.forEach(q => {
    const card = document.createElement('article');
    card.className = 'question-card';
    card.id = `q${q.number}`;
    const choices = Object.entries(q.choices).map(([letter,text]) => `
      <label class="choice" data-letter="${letter}">
        <input type="radio" name="q${q.number}" value="${letter}" />
        <span class="letter">${letter})</span>
        <span>${escapeHtml(text)}</span>
      </label>`).join('');
    card.innerHTML = `
      <div class="qhead"><span class="badge">Question ${q.number}</span></div>
      <div class="stem">${escapeHtml(q.stem)}</div>
      <div class="choices">${choices}</div>
      <div class="rationale" id="rationale-${q.number}"></div>`;
    exam.appendChild(card);
  });
}
function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
}
function gradeExam() {
  let correct = 0, unanswered = 0;
  questions.forEach(q => {
    const card = document.getElementById(`q${q.number}`);
    card.classList.remove('unanswered');
    const selected = document.querySelector(`input[name="q${q.number}"]:checked`);
    const selectedVal = selected ? selected.value : null;
    if (!selectedVal) { unanswered++; card.classList.add('unanswered'); }
    if (selectedVal === q.answer) correct++;
    card.querySelectorAll('.choice').forEach(label => {
      const letter = label.dataset.letter;
      label.classList.remove('correct','incorrect');
      if (letter === q.answer) label.classList.add('correct');
      if (selectedVal && letter === selectedVal && selectedVal !== q.answer) label.classList.add('incorrect');
    });
    const rat = document.getElementById(`rationale-${q.number}`);
    rat.style.display = 'block';
    rat.innerHTML = `<strong>Correct answer: ${q.answer}</strong><br>${escapeHtml(q.explanation || 'No rationale available.')}`;
  });
  const pct = Math.round((correct / questions.length) * 1000) / 10;
  const results = document.getElementById('results');
  results.style.display = 'block';
  results.innerHTML = `<h2>Exam Results</h2><div class="score">${correct} / ${questions.length} correct • ${pct}%</div><div>${unanswered} unanswered</div>`;
  results.scrollIntoView({behavior:'smooth', block:'start'});
}
function resetExam() {
  document.querySelectorAll('input[type="radio"]').forEach(i => i.checked = false);
  document.querySelectorAll('.choice').forEach(c => c.classList.remove('correct','incorrect'));
  document.querySelectorAll('.question-card').forEach(c => c.classList.remove('unanswered'));
  document.querySelectorAll('.rationale').forEach(r => { r.style.display='none'; r.innerHTML=''; });
  document.getElementById('results').style.display = 'none';
  window.scrollTo({top:0, behavior:'smooth'});
}
function reviewMissed() {
  const missed = questions.filter(q => {
    const selected = document.querySelector(`input[name="q${q.number}"]:checked`);
    return !selected || selected.value !== q.answer;
  });
  if (missed.length === 0) { alert('No missed questions to review.'); return; }
  const first = document.getElementById(`q${missed[0].number}`);
  first.scrollIntoView({behavior:'smooth', block:'center'});
  missed.forEach(q => document.getElementById(`q${q.number}`).classList.add('unanswered'));
}
renderExam();
</script>
