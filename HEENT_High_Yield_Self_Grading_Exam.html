asis (dark room) is acute angle-closure glaucoma, an emergency.", "objective": "Eye Obj 9 (Glaucoma)", "section": "Eye"}, {"number": 72, "options": [{"letter": "A", "text": "Allergic conjunctivitis"}, {"letter": "B", "text": "Acute angle-closure glaucoma"}, {"letter": "C", "text": "Anterior uveitis"}, {"letter": "D", "text": "Bacterial conjunctivitis"}, {"letter": "E", "text": "Viral conjunctivitis"}], "stem": "A 24-year-old contact-lens wearer presents with 3 days of a red right eye that is stuck shut with thick yellow crust each morning. She reports a gritty sensation but denies significant itching or pain, and her vision is unaffected. On exam there is unilateral conjunctival injection with mucopurulent discharge; the cornea is clear on fluorescein staining and there is no preauricular lymphadenopathy.\n\nWhat is the most likely diagnosis?", "answer": "D", "rationale": "Mucopurulent discharge with lids stuck shut in the morning, usually unilateral, without itching or a preauricular node, is characteristic of bacterial conjunctivitis (commonly Staph/Strep).", "objective": "Eye Obj 6 (Conjunctival Disorders)", "section": "Eye"}, {"number": 73, "options": [{"letter": "A", "text": "Oral antibiotics alone"}, {"letter": "B", "text": "Surgical removal"}, {"letter": "C", "text": "Topical antifungal drops"}, {"letter": "D", "text": "Observation with annual audiograms"}, {"letter": "E", "text": "Systemic corticosteroids"}], "stem": "A 30-year-old man with a long history of recurrent ear infections presents with chronic, painless, foul-smelling drainage from his left ear and gradual hearing loss. On otoscopy there is a retraction pocket in the superior tympanic membrane filled with white, keratinous, desquamated debris, and a pearly mass is visible behind the drum.\n\nWhat is the most appropriate definitive management?", "answer": "B", "rationale": "Painless foul otorrhea with a retraction pocket, keratin debris, and a pearly mass indicates cholesteatoma (trapped squamous epithelium eroding bone). CT confirms extent, and definitive treatment is surgical removal to prevent serious complications (e.g., intracranial spread).", "objective": "Ear Obj 4 (Middle Ear / Cholesteatoma)", "section": "Ear Disorders"}, {"number": 74, "options": [{"letter": "A", "text": "Topical antibiotic drops"}, {"letter": "B", "text": "Observation with follow-up in 1 week"}, {"letter": "C", "text": "Antihistamines and decongestants"}, {"letter": "D", "text": "ENT consultation with IV antibiotics and drainage (myringotomy)"}, {"letter": "E", "text": "Oral amoxicillin as an outpatient"}], "stem": "A 3-year-old boy who was inadequately treated for an ear infection over the past 2 weeks now presents with fever, ear pain, and swelling behind the ear. On exam the auricle is pushed forward and outward, and there is erythema, tenderness, and fluctuance over the mastoid process with loss of the postauricular crease. The tympanic membrane shows signs of acute otitis media.\n\nWhat is the most appropriate management?", "answer": "D", "rationale": "Postauricular swelling/erythema with a protruding auricle after inadequately treated AOM indicates acute mastoiditis. Management requires ENT consultation, IV antibiotics, and drainage (myringotomy +/- tympanostomy), with imaging if the presentation is atypical.", "objective": "Ear Obj 5 (Complications / Mastoiditis)", "section": "Ear Disorders"}, {"number": 75, "options": [{"letter": "A", "text": "Retinal detachment"}, {"letter": "B", "text": "Optic neuritis"}, {"letter": "C", "text": "Central retinal vein occlusion"}, {"letter": "D", "text": "Central retinal artery occlusion"}, {"letter": "E", "text": "Hypertensive emergency with papilledema"}], "stem": "A 68-year-old woman with hypertension, diabetes, and glaucoma has sudden painless loss of vision in her left eye. On fundoscopic exam there are diffuse retinal hemorrhages in all four quadrants ('blood and thunder' appearance), dilated tortuous veins, a swollen optic disc, and cotton-wool spots.\n\nWhat is the most likely diagnosis?", "answer": "C", "rationale": "Diffuse 'blood and thunder' hemorrhages with dilated veins, disc swelling, and cotton-wool spots indicate central retinal vein occlusion, associated with HTN, DM, and glaucoma. CRAO instead shows a pale retina with a cherry-red spot.", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "section": "Eye"}];
let current=0, answers=Array(questions.length).fill(null), locked=Array(questions.length).fill(false), reviewMode=false, reviewList=[];
const $=s=>document.querySelector(s);
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function render(){
 const q=questions[current];
 $('#questionView').style.display='block'; $('#results').classList.remove('show');
 $('#qnum').textContent=`Question ${q.number}`;
 $('#stem').textContent=q.stem;
 $('#progressText').textContent=reviewMode?`Missed ${reviewList.indexOf(current)+1} of ${reviewList.length}`:`${current+1} of ${questions.length}`;
 $('#barFill').style.width=`${((current+1)/questions.length)*100}%`;
 $('#reviewBanner').classList.toggle('show',reviewMode);
 const box=$('#options'); box.innerHTML='';
 q.options.forEach(o=>{const b=document.createElement('button');b.className='option';b.disabled=locked[current];b.innerHTML=`<span class="letter">${o.letter}</span><span>${esc(o.text)}</span>`;if(locked[current]){if(o.letter===q.answer)b.classList.add('correct');if(o.letter===answers[current]&&o.letter!==q.answer)b.classList.add('incorrect')}b.onclick=()=>choose(o.letter);box.appendChild(b)});
 const fb=$('#feedback');
 if(locked[current]){const ok=answers[current]===q.answer;fb.classList.add('show');fb.innerHTML=`<div class="verdict ${ok?'ok':'no'}">${ok?'Correct':'Incorrect'}</div><div><strong>Correct answer:</strong> ${q.answer}. ${esc(q.options.find(x=>x.letter===q.answer).text)}</div><div class="meta"><strong>Objective:</strong> ${esc(q.objective)}</div><div class="meta"><strong>Rationale:</strong> ${esc(q.rationale)}</div>`} else fb.classList.remove('show');
 const isLast=reviewMode?reviewList.indexOf(current)===reviewList.length-1:current===questions.length-1;
 $('#nextBtn').style.display=isLast?'none':'inline-block'; $('#submitBtn').style.display=(!reviewMode&&isLast)?'inline-block':'none';
 $('#nextBtn').disabled=!locked[current]; $('#submitBtn').disabled=!locked[current];
}
function choose(letter){if(locked[current])return;answers[current]=letter;locked[current]=true;render()}
function next(){if(reviewMode){let i=reviewList.indexOf(current);if(i<reviewList.length-1)current=reviewList[i+1]}else if(current<questions.length-1)current++;render();window.scrollTo({top:0,behavior:'smooth'})}
function submitExam(){
 const correct=questions.reduce((n,q,i)=>n+(answers[i]===q.answer),0), pct=Math.round(correct/questions.length*100);
 $('#questionView').style.display='none';$('#results').classList.add('show');$('#progressText').textContent='Exam complete';$('#barFill').style.width='100%';
 $('#scorePct').textContent=pct+'%';$('#scoreLine').textContent=`${correct} correct out of ${questions.length}`;
 const stats={};questions.forEach((q,i)=>{stats[q.section]??={c:0,t:0};stats[q.section].t++;if(answers[i]===q.answer)stats[q.section].c++});
 $('#sectionGrid').innerHTML=Object.entries(stats).map(([s,v])=>`<div class="sectionCard"><strong>${esc(s)}</strong><span>${Math.round(v.c/v.t*100)}%</span><div>${v.c} / ${v.t} correct</div></div>`).join('');
 reviewList=questions.map((q,i)=>answers[i]!==q.answer?i:null).filter(i=>i!==null);$('#reviewBtn').disabled=reviewList.length===0;
 window.scrollTo({top:0,behavior:'smooth'});
}
function reviewMissed(){if(!reviewList.length)return;reviewMode=true;current=reviewList[0];render();window.scrollTo({top:0,behavior:'smooth'})}
function resetExam(){answers.fill(null);locked.fill(false);current=0;reviewMode=false;reviewList=[];render();window.scrollTo({top:0,behavior:'smooth'})}
$('#nextBtn').onclick=next;$('#submitBtn').onclick=submitExam;$('#reviewBtn').onclick=reviewMissed;$('#resetBtn').onclick=resetExam;render();
</script></body></html>
