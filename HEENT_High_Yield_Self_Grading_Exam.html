<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HEENT High-Yield Practice Exam</title><style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#172033;--muted:#63708a;--purple:#6750a4;--purple2:#ede8fa;--green:#16784a;--greenbg:#e8f7ef;--red:#b42318;--redbg:#fdecea;--border:#dce3ee;--shadow:0 12px 35px rgba(27,39,73,.10)}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#eef2fb 0,#f8fafc 38%,#f4f7fb 100%);font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);font-size:18px;line-height:1.55}
.app{max-width:920px;margin:auto;padding:22px 16px 48px}.top{display:flex;justify-content:space-between;gap:18px;align-items:center;margin-bottom:16px}.brand h1{font-size:clamp(1.35rem,3vw,2rem);margin:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:.92rem}.progressText{white-space:nowrap;font-weight:750;color:var(--purple)}
.bar{height:9px;background:#dfe5f0;border-radius:99px;overflow:hidden;margin-bottom:20px}.bar>div{height:100%;width:0;background:var(--purple);transition:width .25s}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:clamp(20px,4vw,38px)}
.qnum{font-weight:800;color:var(--purple);font-size:.95rem;letter-spacing:.03em;text-transform:uppercase;margin-bottom:13px}.stem{font-size:clamp(1.05rem,2.4vw,1.28rem);font-weight:650;white-space:pre-line;margin-bottom:24px}
.options{display:grid;gap:12px}.option{width:100%;text-align:left;border:2px solid var(--border);background:#fff;border-radius:14px;padding:15px 16px;font:inherit;color:inherit;cursor:pointer;display:flex;gap:13px;align-items:flex-start;transition:.15s}.option:hover:not(:disabled){border-color:#a99bd1;background:#faf9ff;transform:translateY(-1px)}.option:disabled{cursor:default}.letter{flex:0 0 32px;height:32px;border-radius:50%;display:grid;place-items:center;background:#eef1f6;font-weight:800}.option.correct{border-color:var(--green);background:var(--greenbg)}.option.correct .letter{background:var(--green);color:#fff}.option.incorrect{border-color:var(--red);background:var(--redbg)}.option.incorrect .letter{background:var(--red);color:#fff}
.feedback{display:none;margin-top:22px;border-radius:14px;padding:17px 18px;background:#f5f3fb;border-left:5px solid var(--purple)}.feedback.show{display:block}.verdict{font-weight:850;font-size:1.08rem;margin-bottom:5px}.verdict.ok{color:var(--green)}.verdict.no{color:var(--red)}.meta{margin-top:10px;color:#39445b;font-size:.94rem}.meta strong{color:var(--ink)}
.actions{display:flex;gap:12px;justify-content:flex-end;margin-top:22px;flex-wrap:wrap}.btn{border:0;border-radius:12px;padding:13px 20px;font:inherit;font-weight:800;cursor:pointer}.btn.primary{background:var(--purple);color:#fff}.btn.secondary{background:#e9edf4;color:var(--ink)}.btn:disabled{opacity:.45;cursor:not-allowed}
.results{display:none}.results.show{display:block}.scoreHero{text-align:center;padding:10px 0 25px}.scorePct{font-size:clamp(3rem,10vw,5.5rem);font-weight:900;color:var(--purple);line-height:1}.scoreLine{font-size:1.15rem;font-weight:750;margin-top:8px}.sectionGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin:18px 0 26px}.sectionCard{border:1px solid var(--border);border-radius:14px;padding:15px;background:#fafbfe}.sectionCard strong{display:block}.sectionCard span{font-size:1.35rem;font-weight:900;color:var(--purple)}
.importReport{margin-top:22px;padding-top:16px;border-top:1px solid var(--border);font-size:.86rem;color:var(--muted)}
.reviewBanner{display:none;margin-bottom:14px;padding:10px 14px;border-radius:12px;background:#fff4e5;border:1px solid #ffd59a;font-weight:700}.reviewBanner.show{display:block}
@media(max-width:600px){body{font-size:16px}.app{padding:12px 10px 30px}.top{align-items:flex-start}.brand p{display:none}.card{border-radius:15px;padding:18px 14px}.option{padding:13px 11px}.actions .btn{flex:1}.progressText{font-size:.9rem}}
</style></head><body><main class="app"><header class="top"><div class="brand"><h1>HEENT High-Yield Practice Exam</h1><p>Single best answer • Self-grading board review</p></div><div id="progressText" class="progressText"></div></header><div class="bar"><div id="barFill"></div></div><div id="reviewBanner" class="reviewBanner">Reviewing missed questions</div><section id="questionView" class="card"><div id="qnum" class="qnum"></div><div id="stem" class="stem"></div><div id="options" class="options"></div><div id="feedback" class="feedback"></div><div class="actions"><button id="nextBtn" class="btn primary">Next</button><button id="submitBtn" class="btn primary">Submit Exam</button></div></section><section id="results" class="card results"><div class="scoreHero"><div id="scorePct" class="scorePct"></div><div id="scoreLine" class="scoreLine"></div></div><h2>Section Performance</h2><div id="sectionGrid" class="sectionGrid"></div><div class="actions"><button id="reviewBtn" class="btn primary">Review Missed Questions</button><button id="resetBtn" class="btn secondary">Reset Exam</button></div><div class="importReport"><strong>Import verification:</strong> 75 questions found • 75 questions imported • Questions not parsed: None</div></section></main><script>
const questions=[{"number": 1, "options": [{"letter": "A", "text": "Warm compresses and reassurance"}, {"letter": "B", "text": "Oral antihistamines"}, {"letter": "C", "text": "Topical antibiotic drops"}, {"letter": "D", "text": "Discharge home on oral amoxicillin-clavulanate"}, {"letter": "E", "text": "Admission for IV antibiotics and orbital CT imaging"}], "stem": "A 7-year-old boy presents with fever, a red swollen right eyelid, and eye pain. He had a cold last week. On exam he has proptosis, and eye movements are painful and restricted, with double vision on lateral gaze. Visual acuity is mildly decreased. There is significant periorbital erythema and edema.\n\nWhat is the most appropriate next step in management?", "answer": "E", "rationale": "Proptosis, painful/restricted extraocular movements, and diplopia indicate orbital (postseptal) cellulitis, most often from ethmoid sinusitis. This requires admission, IV antibiotics, and CT imaging. Preseptal cellulitis, by contrast, has no proptosis or EOM involvement.", "objective": "Eye Obj 8 (Infectious Orbit Disorders)", "section": "Eye"}, {"number": 2, "options": [{"letter": "A", "text": "Order a sinus CT"}, {"letter": "B", "text": "Prescribe amoxicillin-clavulanate"}, {"letter": "C", "text": "Prescribe a respiratory fluoroquinolone"}, {"letter": "D", "text": "Start intranasal corticosteroids and doxycycline"}, {"letter": "E", "text": "Explain that yellow-green discharge at this stage is normal and treat supportively; no antibiotics"}], "stem": "A 22-year-old man presents on day 3 of a cold with nasal congestion, sore throat, and cough. He is alarmed because his nasal discharge, initially clear, has turned thick and yellow-green. He is afebrile and otherwise well. He asks for an antibiotic.\n\nWhat is the most appropriate response?", "answer": "E", "rationale": "In a viral upper respiratory infection, discharge normally turns thick and yellow-green by day 2-3 from leukocyte recruitment; this does NOT indicate bacterial infection. Management is supportive without antibiotics.", "objective": "Nose Obj 1a (Viral Rhinitis)", "section": "Nose/Sinus"}, {"number": 3, "options": [{"letter": "A", "text": "Reassurance with no treatment"}, {"letter": "B", "text": "Oral amoxicillin"}, {"letter": "C", "text": "Emergent intubation"}, {"letter": "D", "text": "Corticosteroids and, if moderate-severe, nebulized epinephrine"}, {"letter": "E", "text": "IV ceftriaxone and ICU admission"}], "stem": "A 2-year-old presents in the fall with a barking, seal-like cough, hoarseness, and inspiratory stridor that is worse at night. He had a runny nose and low-grade fever for 2 days beforehand. He is not drooling and does not appear toxic. An AP neck film shows subglottic narrowing.\n\nWhat is the most appropriate treatment?", "answer": "D", "rationale": "A barking cough, stridor, and the 'steeple sign' (subglottic narrowing) indicate croup (parainfluenza). Treatment is corticosteroids, with nebulized epinephrine for moderate-to-severe cases.", "objective": "Oro C (Epiglottitis vs Croup)", "section": "Oropharynx"}, {"number": 4, "options": [{"letter": "A", "text": "Conductive hearing loss on the right"}, {"letter": "B", "text": "Sensorineural hearing loss on the right"}, {"letter": "C", "text": "Normal hearing"}, {"letter": "D", "text": "Sensorineural hearing loss on the left"}, {"letter": "E", "text": "Central auditory processing disorder"}], "stem": "A 45-year-old man presents with right-sided hearing loss. On the Weber test the tone lateralizes to the RIGHT (affected) ear. On the Rinne test on the right, bone conduction is greater than air conduction.\n\nThese findings are most consistent with which type of hearing loss?", "answer": "A", "rationale": "In conductive hearing loss, Weber lateralizes TO the affected ear and Rinne shows bone > air conduction on that side. Sensorineural loss instead lateralizes to the good ear with air > bone conduction.", "objective": "Cochleovestibular Obj 4 (Weber/Rinne)", "section": "Cochleovestibular"}, {"number": 5, "options": [{"letter": "A", "text": "Order allergy testing"}, {"letter": "B", "text": "Prescribe intranasal steroids and reassess in 3 months"}, {"letter": "C", "text": "Treat empirically for chronic sinusitis with antibiotics"}, {"letter": "D", "text": "Nasal endoscopy with biopsy and imaging"}, {"letter": "E", "text": "Cauterize the mass in clinic"}], "stem": "A 62-year-old woodworker with a long smoking history presents with several months of persistent UNILATERAL nasal obstruction and intermittent bloody nasal discharge. Recently he has noticed facial swelling and that his dentures no longer fit well. On exam there is a friable mass in the left nasal cavity.\n\nWhat is the most appropriate next step?", "answer": "D", "rationale": "Persistent UNILATERAL obstruction/epistaxis with facial swelling and ill-fitting dentures in a patient with occupational (wood dust) and smoking risk factors is concerning for sinonasal malignancy (most commonly SCC). Endoscopy with biopsy and imaging is needed.", "objective": "Nose Obj 1h (Malignant Nasal/Sinus Tumors) / Red Flags", "section": "Nose/Sinus"}, {"number": 6, "options": [{"letter": "A", "text": "Fusarium species; topical natamycin"}, {"letter": "B", "text": "Pseudomonas aeruginosa; topical fluoroquinolone (e.g., moxifloxacin)"}, {"letter": "C", "text": "Staphylococcus aureus; oral doxycycline"}, {"letter": "D", "text": "Acanthamoeba; topical chlorhexidine"}, {"letter": "E", "text": "Herpes simplex virus; oral acyclovir"}], "stem": "A 22-year-old woman who sleeps in her soft contact lenses presents with 1 day of severe pain, redness, and photophobia in her left eye. On slit-lamp exam there is a round white corneal infiltrate with an overlying epithelial defect that stains with fluorescein, plus a small layering of white cells in the anterior chamber.\n\nWhich organism must empiric therapy specifically cover, and what is the appropriate agent?", "answer": "B", "rationale": "A contact-lens wearer with a painful corneal ulcer and hypopyon has bacterial keratitis until proven otherwise; Pseudomonas must be covered with a topical fluoroquinolone. Contact-lens use is the key risk factor for Pseudomonas.", "objective": "Eye Obj 7 (Anterior Eye Disorders)", "section": "Eye"}, {"number": 7, "options": [{"letter": "A", "text": "Amoxicillin-clavulanate"}, {"letter": "B", "text": "Cephalexin"}, {"letter": "C", "text": "Ciprofloxacin"}, {"letter": "D", "text": "Trimethoprim-sulfamethoxazole"}, {"letter": "E", "text": "Azithromycin"}], "stem": "A 45-year-old man is diagnosed with acute bacterial rhinosinusitis based on 11 days of purulent discharge, unilateral facial pain, and fever. He has no drug allergies and no recent antibiotic use.\n\nWhat is the most appropriate first-line antibiotic?", "answer": "A", "rationale": "First-line therapy for acute bacterial rhinosinusitis is amoxicillin or amoxicillin-clavulanate. Doxycycline or a respiratory fluoroquinolone is reserved for penicillin-allergic patients.", "objective": "Nose Obj 1b/1c/3 (Rhinosinusitis)", "section": "Nose/Sinus"}, {"number": 8, "options": [{"letter": "A", "text": "Presence of purulent discharge from the lid margin"}, {"letter": "B", "text": "Chronic, nontender, rubbery character from granulomatous meibomian inflammation"}, {"letter": "C", "text": "Acute onset over 24-48 hours"}, {"letter": "D", "text": "Association with Staphylococcus aureus infection"}, {"letter": "E", "text": "Localization to an eyelash follicle"}], "stem": "A 41-year-old man reports a firm lump on his upper eyelid that has been slowly enlarging over the past 6 weeks. He denies pain, discharge, or vision change but notes a sensation of heaviness in the lid. He has a history of rosacea. On exam there is a discrete, nontender, rubbery nodule in the mid-portion of the tarsal plate, away from the lid margin. The overlying skin is normal.\n\nWhich feature best distinguishes this diagnosis from a hordeolum?", "answer": "B", "rationale": "A chalazion is a chronic granulomatous inflammation of a meibomian gland producing a nontender, rubbery, slow-growing nodule, in contrast to the acute, tender, infectious hordeolum.", "objective": "Eye Obj 4 (Eyelid Disorders)", "section": "Eye"}, {"number": 9, "options": [{"letter": "A", "text": "Retinoblastoma"}, {"letter": "B", "text": "Coats disease"}, {"letter": "C", "text": "Persistent fetal vasculature"}, {"letter": "D", "text": "Retinal detachment"}, {"letter": "E", "text": "Congenital cataract"}], "stem": "A 15-month-old boy is brought in after his parents noticed that in flash photographs one of his pupils appears white rather than red. On exam there is leukocoria with an absent red reflex in the affected eye, and mild strabismus. There is a family history of a similar childhood eye tumor.\n\nWhat is the most likely diagnosis?", "answer": "A", "rationale": "Leukocoria (white pupil / absent red reflex) in early childhood, especially with a family history, is retinoblastoma (chromosome 13q14) until proven otherwise. Early detection is critical (95-98% cure); priority is preserving life, then vision.", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "section": "Eye"}, {"number": 10, "options": [{"letter": "A", "text": "Ceftriaxone IM as first-line"}, {"letter": "B", "text": "Azithromycin"}, {"letter": "C", "text": "High-dose amoxicillin"}, {"letter": "D", "text": "Ciprofloxacin otic drops"}, {"letter": "E", "text": "Trimethoprim-sulfamethoxazole"}], "stem": "A 15-month-old girl presents with abrupt onset of fever, irritability, and ear-tugging that began within the last day. On pneumatic otoscopy the right tympanic membrane is bulging and erythematous with an absent light reflex and markedly reduced mobility.\n\nWhat is the most appropriate first-line antibiotic?", "answer": "C", "rationale": "Acute otitis media requires abrupt onset, a middle-ear effusion, and middle-ear inflammation (a bulging TM). In children <2 years, antibiotics are indicated; first-line is high-dose amoxicillin (amoxicillin-clavulanate if recent amoxicillin, treatment failure, or in adults).", "objective": "Ear Obj 4 (Middle Ear / AOM)", "section": "Ear Disorders"}, {"number": 11, "options": [{"letter": "A", "text": "Vasomotor (nonallergic) rhinitis"}, {"letter": "B", "text": "Chronic rhinosinusitis with polyps"}, {"letter": "C", "text": "Viral rhinitis"}, {"letter": "D", "text": "Allergic rhinitis"}, {"letter": "E", "text": "Acute bacterial rhinosinusitis"}], "stem": "A 68-year-old man reports several months of persistent clear rhinorrhea and nasal congestion that worsen with cold air, strong odors, and eating. He denies itching, sneezing, or ocular symptoms, and has no fever. Allergy skin testing is negative, and there is no infectious prodrome. The nasal mucosa appears essentially normal.\n\nWhat is the most likely diagnosis?", "answer": "A", "rationale": "Chronic clear rhinorrhea/congestion triggered by cold air, odors, and food, WITHOUT itching or sneezing and with negative allergy testing, is vasomotor rhinitis, a diagnosis of exclusion. Absence of itching/sneezing distinguishes it from allergic rhinitis.", "objective": "Nose Obj 1a/2 (Rhinitis)", "section": "Nose/Sinus"}, {"number": 12, "options": [{"letter": "A", "text": "Retinal detachment"}, {"letter": "B", "text": "Dry (nonexudative) age-related macular degeneration"}, {"letter": "C", "text": "Central retinal vein occlusion"}, {"letter": "D", "text": "Open-angle glaucoma"}, {"letter": "E", "text": "Diabetic retinopathy"}], "stem": "A 78-year-old Caucasian woman with a smoking history reports gradually worsening central vision over the past year, with straight lines appearing wavy when she reads. Peripheral vision is preserved. On fundoscopy there are yellowish deposits (drusen) in the macula bilaterally without hemorrhage. She notices distortion on an Amsler grid.\n\nWhat is the most likely diagnosis?", "answer": "B", "rationale": "Gradual central vision loss with drusen and Amsler-grid distortion, preserved peripheral vision, in an older Caucasian smoker, is dry age-related macular degeneration. Wet AMD instead causes sudden loss from neovascularization.", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "section": "Eye"}, {"number": 13, "options": [{"letter": "A", "text": "Oral antifungal"}, {"letter": "B", "text": "Topical antibiotic (with steroid) drops covering Pseudomonas and S. aureus, after aural toilet"}, {"letter": "C", "text": "Cerumenolytic drops only"}, {"letter": "D", "text": "Systemic fluoroquinolone"}, {"letter": "E", "text": "Oral amoxicillin"}], "stem": "A 17-year-old competitive swimmer presents with 3 days of right ear pain, itching, and scant discharge. He notes the pain worsens when he chews or when the ear is touched. On exam, pulling on the tragus and pinna elicits significant pain, and the ear canal is erythematous and edematous with debris; the tympanic membrane is difficult to visualize.\n\nWhat is the most appropriate treatment?", "answer": "B", "rationale": "Acute otitis externa ('swimmer's ear') with a positive tragal tug is treated with aural toilet and topical antimicrobial +/- steroid drops (e.g., ciprofloxacin-dexamethasone) covering Pseudomonas and S. aureus; a wick is placed if the canal is very swollen.", "objective": "Ear Obj 2 (External Auditory Canal)", "section": "Ear Disorders"}, {"number": 14, "options": [{"letter": "A", "text": "Laser iridotomy"}, {"letter": "B", "text": "Oral corticosteroids"}, {"letter": "C", "text": "Topical prostaglandin drops"}, {"letter": "D", "text": "Surgical lens extraction with intraocular lens implantation"}, {"letter": "E", "text": "Intravitreal anti-VEGF injections"}], "stem": "A 72-year-old man with a long smoking history reports gradually worsening, painless blurring of vision over 2 years, along with glare and halos around headlights that make night driving difficult. On exam the red reflex is diminished and there is a cloudy opacity of the lens. The eye is white and quiet with normal intraocular pressure.\n\nWhat is the definitive treatment?", "answer": "D", "rationale": "Gradual painless vision loss with glare/halos and a diminished red reflex indicates cataract. Definitive treatment is surgical fragmentation/removal of the lens with intraocular lens (IOL) implantation.", "objective": "Eye Obj 12 (Lens Disorders / Cataracts)", "section": "Eye"}, {"number": 15, "options": [{"letter": "A", "text": "Increased number of microaneurysms"}, {"letter": "B", "text": "Venous dilation"}, {"letter": "C", "text": "Cotton-wool spots"}, {"letter": "D", "text": "Neovascularization"}, {"letter": "E", "text": "More hard exudates"}], "stem": "A 54-year-old man with a 12-year history of type 2 diabetes presents for a routine eye screening. He is asymptomatic. On dilated fundoscopy you note dilated retinal veins, scattered microaneurysms, dot-and-blot hemorrhages, and hard exudates, but no new abnormal vessels.\n\nWhich finding, if it developed, would define progression to the proliferative stage?", "answer": "D", "rationale": "This is non-proliferative diabetic retinopathy. Neovascularization is the hallmark that defines proliferative diabetic retinopathy, treated with panretinal photocoagulation and/or anti-VEGF along with glycemic control.", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "section": "Eye"}, {"number": 16, "options": [{"letter": "A", "text": "Oral antibiotics alone with next-week follow-up"}, {"letter": "B", "text": "Observation and ice; it will resolve spontaneously"}, {"letter": "C", "text": "Prompt incision and drainage to prevent cartilage necrosis and saddle-nose deformity"}, {"letter": "D", "text": "Immediate closed reduction of a nasal fracture"}, {"letter": "E", "text": "Anterior nasal packing alone"}], "stem": "A 14-year-old boy is hit in the nose during a soccer game. He now has nasal congestion and pain. On intranasal exam you note a bluish, fluctuant, non-compressible swelling of the nasal septum bilaterally. There is minimal external deformity.\n\nWhat is the most appropriate management, and why is it urgent?", "answer": "C", "rationale": "A septal hematoma requires prompt incision and drainage because untreated blood between cartilage and perichondrium causes avascular necrosis of the cartilage and a saddle-nose deformity. Packing and antibiotics follow drainage.", "objective": "Nose Obj 1e/1f (Nasal Trauma & Septal Hematoma)", "section": "Nose/Sinus"}, {"number": 17, "options": [{"letter": "A", "text": "Topical moxifloxacin"}, {"letter": "B", "text": "Topical antihistamine/mast-cell-stabilizer drops"}, {"letter": "C", "text": "Topical natamycin"}, {"letter": "D", "text": "Intramuscular ceftriaxone"}, {"letter": "E", "text": "Oral valacyclovir"}], "stem": "A 27-year-old woman with a history of seasonal allergies presents with several weeks of bilateral itchy, red eyes with stringy, ropey white discharge. She reports significant tearing and rubbing. On exam there is bilateral conjunctival injection with chemosis, and eversion of the upper lids reveals large 'cobblestone' papillae. The cornea is clear.\n\nWhich treatment is most appropriate first-line?", "answer": "B", "rationale": "Bilateral itching with stringy discharge and cobblestone papillae in an atopic patient indicates allergic conjunctivitis. First-line therapy is antihistamine/mast-cell-stabilizer drops (with oral antihistamines as adjunct).", "objective": "Eye Obj 6 (Conjunctival Disorders)", "section": "Eye"}, {"number": 18, "options": [{"letter": "A", "text": "Needle aspiration or incision and drainage plus antibiotics"}, {"letter": "B", "text": "Reassurance and saltwater gargles"}, {"letter": "C", "text": "Oral penicillin and discharge"}, {"letter": "D", "text": "CT head without contrast and observation"}, {"letter": "E", "text": "Immediate tonsillectomy in clinic"}], "stem": "A 22-year-old man presents with several days of worsening unilateral sore throat, fever, and a muffled 'hot potato' voice. He is drooling and can barely open his mouth (trismus). On exam the right tonsil is displaced medially, and the uvula is deviated to the left, away from a bulging, fluctuant peritonsillar mass.\n\nWhat is the most appropriate management?", "answer": "A", "rationale": "Unilateral sore throat, trismus, muffled voice, and uvular deviation away from a fluctuant mass indicate a peritonsillar abscess (quinsy). Management is drainage (needle aspiration or I&D) plus antibiotics (e.g., ampicillin-sulbactam/clindamycin) after airway assessment.", "objective": "Oro A (Deep Neck Abscess)", "section": "Oropharynx"}, {"number": 19, "options": [{"letter": "A", "text": "Patch the eye tightly for 48 hours"}, {"letter": "B", "text": "Start oral acyclovir"}, {"letter": "C", "text": "Give a topical antibiotic and do not prescribe topical anesthetics for home use"}, {"letter": "D", "text": "Begin topical corticosteroid drops"}, {"letter": "E", "text": "Prescribe topical anesthetic drops for home use to control pain"}], "stem": "A 19-year-old man presents after a tree branch scratched his eye while hiking. He has a painful red right eye with tearing and photophobia. Instillation of a topical anesthetic dramatically relieves the pain. Fluorescein staining under cobalt-blue light reveals a linear area of uptake on the cornea, with no evidence of retained foreign body after lid eversion.\n\nWhich instruction is most important in the management plan?", "answer": "C", "rationale": "This is a corneal abrasion. Treat with a topical antibiotic; topical anesthetics must NOT be prescribed for home use because they are corneal-toxic and impair healing. Patching is generally avoided.", "objective": "Eye Obj 15 (Traumatic Eye Disorders)", "section": "Eye"}, {"number": 20, "options": [{"letter": "A", "text": "Ciliary flush"}, {"letter": "B", "text": "Sickle cell status"}, {"letter": "C", "text": "Mild eye pain"}, {"letter": "D", "text": "Presence of any blood in the anterior chamber"}, {"letter": "E", "text": "Photophobia"}], "stem": "A 26-year-old man presents after being punched in the eye. He has eye pain, photophobia, and blurry vision. On slit-lamp exam there is a visible layer of blood in the inferior anterior chamber, along with ciliary flush. He has sickle cell trait.\n\nWhich factor in this patient most strongly indicates the need for admission?", "answer": "B", "rationale": "This is a hyphema (blood in the anterior chamber). Admission criteria include elevated IOP, sickle cell disease/trait, hyphema >50%, and anticoagulation; sickle cell status raises the risk of complications (including glaucoma), warranting closer management.", "objective": "Eye Obj 15 (Traumatic Eye Disorders)", "section": "Eye"}, {"number": 21, "options": [{"letter": "A", "text": "Association with Candida"}, {"letter": "B", "text": "Higher rate of severe dysplasia or invasive carcinoma"}, {"letter": "C", "text": "Lower malignant potential"}, {"letter": "D", "text": "Ability to be scraped off easily"}, {"letter": "E", "text": "Spontaneous resolution"}], "stem": "A 66-year-old man with a heavy tobacco and alcohol history is found to have a velvety, well-demarcated red patch on the floor of his mouth on a routine dental exam. It is asymptomatic and cannot be wiped away. He has no other lesions.\n\nCompared with a white leukoplakic plaque, this red lesion is most notable for which characteristic?", "answer": "B", "rationale": "Erythroplakia (velvety red patch, often floor of mouth/ventral tongue) carries a HIGHER rate of severe dysplasia/invasive carcinoma than leukoplakia and warrants prompt biopsy.", "objective": "Oro A (Leukoplakia vs Erythroplakia)", "section": "Oropharynx"}, {"number": 22, "options": [{"letter": "A", "text": "Dacryocystitis"}, {"letter": "B", "text": "Dacryoadenitis"}, {"letter": "C", "text": "Hordeolum"}, {"letter": "D", "text": "Preseptal cellulitis"}, {"letter": "E", "text": "Orbital cellulitis"}], "stem": "A 52-year-old woman presents with 2 days of pain, redness, and swelling at the inner corner of her right eye. She reports tearing and notes that pressing near the area expresses pus. On exam there is erythema, edema, and warmth over the medial canthus below the medial canthal tendon, and gentle pressure over the lacrimal sac produces purulent material at the puncta.\n\nWhat is the most likely diagnosis?", "answer": "A", "rationale": "Inflammation of the lacrimal sac (inferomedial to the medial canthus) with erythema, epiphora, and purulent expression from the puncta is dacryocystitis, caused by nasolacrimal duct obstruction. Dacryoadenitis involves the lacrimal gland in the superolateral orbit.", "objective": "Eye Obj 5 (Lacrimal Disorders)", "section": "Eye"}, {"number": 23, "options": [{"letter": "A", "text": "Ganciclovir ophthalmic gel"}, {"letter": "B", "text": "Topical trifluridine"}, {"letter": "C", "text": "Oral acyclovir"}, {"letter": "D", "text": "Ophthalmology referral"}, {"letter": "E", "text": "Topical corticosteroids"}], "stem": "A 45-year-old man presents with a painful red right eye, foreign-body sensation, and photophobia for 2 days. He has had cold sores in the past. On slit-lamp exam after fluorescein instillation, there is a branching, dendritic epithelial lesion. Visual acuity is mildly reduced. No hypopyon is seen.\n\nWhich management should be specifically AVOIDED?", "answer": "E", "rationale": "A dendritic ulcer on fluorescein staining indicates HSV keratitis. Treatment is topical or oral antivirals; topical corticosteroids are contraindicated because they can worsen the infection and lead to corneal perforation.", "objective": "Eye Obj 7 (Anterior Eye Disorders)", "section": "Eye"}, {"number": 24, "options": [{"letter": "A", "text": "Nausea"}, {"letter": "B", "text": "The presence of vertigo"}, {"letter": "C", "text": "The presence of hearing loss (cochlear involvement)"}, {"letter": "D", "text": "Peripheral nystagmus"}, {"letter": "E", "text": "A viral prodrome"}], "stem": "A 40-year-old woman presents with several days of constant vertigo, nausea, and unsteadiness following a cold. In addition to the vertigo, she reports new hearing loss and tinnitus in the affected ear. Neurologic exam is otherwise normal, and nystagmus is peripheral in pattern.\n\nWhich feature distinguishes this condition from vestibular neuritis?", "answer": "C", "rationale": "Labyrinthitis is essentially vestibular neuritis PLUS cochlear involvement; the associated hearing loss is the key differentiator from vestibular neuritis, which spares hearing.", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "section": "Cochleovestibular"}, {"number": 25, "options": [{"letter": "A", "text": "Voice rest and reassurance"}, {"letter": "B", "text": "Oral antibiotics for laryngitis"}, {"letter": "C", "text": "Empiric proton pump inhibitor trial for 3 months"}, {"letter": "D", "text": "Allergy testing"}, {"letter": "E", "text": "Laryngoscopy with biopsy"}], "stem": "A 60-year-old man with a 40-pack-year smoking history and heavy alcohol use presents with persistent hoarseness for more than 6 weeks that is not improving. He also reports throat pain radiating to his ear and mild difficulty swallowing. He has an unintentional 10-pound weight loss.\n\nWhat is the most appropriate next step?", "answer": "E", "rationale": "Persistent hoarseness >2-3 weeks in a smoker/drinker, especially with referred otalgia, dysphagia, and weight loss, is concerning for laryngeal cancer. Laryngoscopy with biopsy is the definitive diagnostic step.", "objective": "Oro C (Laryngeal Cancer)", "section": "Oropharynx"}, {"number": 26, "options": [{"letter": "A", "text": "Keep the child calm, avoid oropharyngeal exam, and prepare for controlled airway management by skilled personnel"}, {"letter": "B", "text": "Immediately depress the tongue to inspect the oropharynx"}, {"letter": "C", "text": "Order a barium swallow"}, {"letter": "D", "text": "Obtain a throat culture in the clinic"}, {"letter": "E", "text": "Administer nebulized epinephrine and discharge"}], "stem": "An unvaccinated 4-year-old presents with rapid onset of high fever, severe sore throat, drooling, and muffled voice. He is sitting upright, leaning forward on his hands, with his chin thrust out, and is anxious and in respiratory distress. He has no cough.\n\nWhat is the most appropriate immediate action?", "answer": "A", "rationale": "This is epiglottitis (rapid high fever, drooling, distress, tripod/sniffing posture, no cough). Do NOT examine the oropharynx or agitate the child; secure the airway with skilled personnel (definitive diagnosis is laryngoscopy in the OR) and give IV ceftriaxone.", "objective": "Oro C (Epiglottitis vs Croup)", "section": "Oropharynx"}, {"number": 27, "options": [{"letter": "A", "text": "Subconjunctival hemorrhage"}, {"letter": "B", "text": "Episcleritis"}, {"letter": "C", "text": "Scleritis"}, {"letter": "D", "text": "Allergic conjunctivitis"}, {"letter": "E", "text": "Pinguecula"}], "stem": "A 38-year-old woman with rheumatoid arthritis presents with severe, boring pain in her left eye that wakes her at night and worsens with eye movement. She reports photophobia and decreased vision. On exam the sclera has a violaceous (bluish) hue with deep injection, and the pain is not relieved by topical phenylephrine, which fails to blanch the vessels.\n\nWhat is the most likely diagnosis?", "answer": "C", "rationale": "Deep boring pain (worse with EOMs), photophobia, decreased vision, a bluish scleral hue, and failure of phenylephrine to blanch the vessels indicate scleritis, which is frequently associated with systemic disease such as RA. Episcleritis is painless and blanches with phenylephrine.", "objective": "Eye Obj 10 (Inflammatory Eye Disorders)", "section": "Eye"}, {"number": 28, "options": [{"letter": "A", "text": "Systemic (or intratympanic) glucocorticoids"}, {"letter": "B", "text": "Decongestants and autoinsufflation"}, {"letter": "C", "text": "Cerumen removal"}, {"letter": "D", "text": "Observation for 3 months"}, {"letter": "E", "text": "Topical antibiotic drops"}], "stem": "A 46-year-old man awakens with sudden hearing loss in his left ear along with a feeling of ear blockage and tinnitus. He denies vertigo. Otoscopy is completely normal, and there is no cerumen or effusion. Weber lateralizes to the right (good) ear, and audiometry confirms a unilateral sensorineural hearing loss.\n\nWhat is the most appropriate initial treatment?", "answer": "A", "rationale": "Sudden sensorineural hearing loss (normal otoscopy, SNHL pattern) is a semi-emergency treated with glucocorticoids (systemic or intratympanic), often with an MRI to exclude retrocochlear pathology; hyperbaric oxygen may be added.", "objective": "Cochleovestibular Obj 5 (Management of HL)", "section": "Cochleovestibular"}, {"number": 29, "options": [{"letter": "A", "text": "A benign finding unrelated to the eye"}, {"letter": "B", "text": "Bacterial superinfection requiring IV antibiotics"}, {"letter": "C", "text": "Hutchinson's sign, predicting a high risk of ocular involvement"}, {"letter": "D", "text": "Trigeminal neuralgia"}, {"letter": "E", "text": "A contraindication to antiviral therapy"}], "stem": "A 68-year-old man presents with a painful, blistering rash across his right forehead and the tip of his nose, accompanied by eye pain and redness. On exam there are grouped vesicles in the V1 dermatome, including a lesion on the nasal tip. Slit-lamp exam shows punctate corneal lesions with a pseudodendritic pattern and mildly elevated intraocular pressure.\n\nThe vesicle on the tip of the nose is most significant because it indicates:", "answer": "C", "rationale": "Vesicles on the tip of the nose (Hutchinson's sign) reflect nasociliary nerve involvement and predict ocular involvement in herpes zoster ophthalmicus. Treat promptly with oral antivirals and refer.", "objective": "Eye Obj 7 (Anterior Eye Disorders)", "section": "Eye"}, {"number": 30, "options": [{"letter": "A", "text": "Cavernous sinus thrombosis"}, {"letter": "B", "text": "Cerebral artery aneurysm requiring emergent surgery"}, {"letter": "C", "text": "Ischemic (microvascular) cranial nerve III palsy"}, {"letter": "D", "text": "Myasthenia gravis"}, {"letter": "E", "text": "Compressive lesion such as a posterior communicating artery aneurysm"}], "stem": "A 63-year-old man with diabetes and hypertension presents with sudden double vision and a drooping right eyelid. On exam the right eye is deviated 'down and out' and the eyelid is ptotic. When you test the pupils, the right pupil is spared (reactive and equal to the left).\n\nThe pupillary sparing in this presentation most strongly suggests which underlying mechanism?", "answer": "C", "rationale": "A 'down and out' eye with ptosis is a CN III palsy. Pupil-sparing in a vasculopath (diabetes/HTN) suggests a microvascular/ischemic cause, because the parasympathetic pupillary fibers run peripherally and are typically affected by compressive (aneurysmal) lesions rather than ischemic ones.", "objective": "Eye Obj 11 (EOM Pathology & Amblyopia)", "section": "Eye"}, {"number": 31, "options": [{"letter": "A", "text": "Immediate tympanostomy tubes"}, {"letter": "B", "text": "Watchful waiting, since most cases resolve within 3 months"}, {"letter": "C", "text": "Oral corticosteroids"}, {"letter": "D", "text": "Systemic decongestants and antibiotics"}, {"letter": "E", "text": "High-dose amoxicillin"}], "stem": "A 5-year-old boy is brought in for follow-up after an ear infection several weeks ago. He now has no pain or fever, but his parents and teacher note he seems not to hear well and turns the television up. On pneumatic otoscopy the tympanic membrane is retracted and immobile with visible air-fluid levels behind it, but it is not bulging or erythematous.\n\nWhat is the most appropriate initial management?", "answer": "B", "rationale": "Otitis media with effusion (middle-ear fluid WITHOUT signs of acute infection; reduced TM mobility, air-fluid levels) is managed with watchful waiting for ~3 months, since 80-90% resolve. Antibiotics/steroids are not recommended; persistent effusion with hearing loss warrants tympanostomy tubes.", "objective": "Ear Obj 3 (Eustachian Tube / OME)", "section": "Ear Disorders"}, {"number": 32, "options": [{"letter": "A", "text": "Orbital cellulitis; inpatient IV antibiotics"}, {"letter": "B", "text": "Dacryoadenitis; observation"}, {"letter": "C", "text": "Cavernous sinus thrombosis; anticoagulation"}, {"letter": "D", "text": "Allergic reaction; antihistamines"}, {"letter": "E", "text": "Preseptal cellulitis; outpatient oral antibiotics"}], "stem": "A 5-year-old girl presents with unilateral eyelid redness, swelling, and mild tenderness that began after a scratch near the eye. She is afebrile and well-appearing. On exam the eyelid is erythematous and edematous, but there is no proptosis, extraocular movements are full and painless, and visual acuity is normal.\n\nWhat is the most likely diagnosis and appropriate setting for treatment?", "answer": "E", "rationale": "Eyelid/soft-tissue infection anterior to the orbital septum without proptosis or painful EOMs is preseptal cellulitis, managed with outpatient oral antibiotics. The absence of orbital signs distinguishes it from orbital cellulitis.", "objective": "Eye Obj 8 (Infectious Orbit Disorders)", "section": "Eye"}, {"number": 33, "options": [{"letter": "A", "text": "Intravitreal anti-VEGF injection"}, {"letter": "B", "text": "Oral prednisone taper as an outpatient"}, {"letter": "C", "text": "Lay the patient flat with ocular massage and high-flow oxygen"}, {"letter": "D", "text": "Topical timolol only and discharge"}, {"letter": "E", "text": "Laser photocoagulation the following week"}], "stem": "A 70-year-old man with hypertension, hyperlipidemia, and carotid disease experiences sudden, painless, profound loss of vision in his right eye. On exam there is a relative afferent pupillary defect. Fundoscopy shows a pale, edematous retina with a cherry-red spot at the fovea and 'box-car' segmentation of the retinal vessels.\n\nWhat is the most appropriate immediate management?", "answer": "C", "rationale": "Sudden painless monocular vision loss with a cherry-red spot, pale retina, and box-car vessels is central retinal artery occlusion (a 'stroke of the eye'). Emergent measures include lying flat, ocular massage, high-flow oxygen, and IOP-lowering; a work-up for embolic source and giant cell arteritis is essential.", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "section": "Eye"}, {"number": 34, "options": [{"letter": "A", "text": "It commonly causes permanent hearing loss"}, {"letter": "B", "text": "It can progress to airway compromise and spread into the mediastinum"}, {"letter": "C", "text": "It leads to cavernous sinus thrombosis in most cases"}, {"letter": "D", "text": "It always requires tonsillectomy"}, {"letter": "E", "text": "It causes facial nerve paralysis"}], "stem": "A 3-year-old boy presents with fever, refusal to eat, drooling, and neck stiffness with reluctance to extend his neck. He recently had pharyngitis. He appears ill and holds his neck rigidly. Lateral neck imaging shows widening of the prevertebral soft tissue, and CT with contrast confirms a fluid collection posterior to the pharynx.\n\nWhy is this considered the most dangerous deep neck infection?", "answer": "B", "rationale": "Retropharyngeal abscess (young children, neck stiffness/refusal to extend, drooling) is the most dangerous deep neck infection because it can obstruct the airway and spread into the mediastinum. Airway management and drainage with IV antibiotics are essential.", "objective": "Oro A (Deep Neck Abscess)", "section": "Oropharynx"}, {"number": 35, "options": [{"letter": "A", "text": "Immediate surgical tympanoplasty"}, {"letter": "B", "text": "Irrigation of the ear canal"}, {"letter": "C", "text": "Systemic corticosteroids"}, {"letter": "D", "text": "Oral amoxicillin for all cases"}, {"letter": "E", "text": "Keep the ear dry and observe, as most heal spontaneously (topical fluoroquinolone if infection)"}], "stem": "A 25-year-old man presents after cleaning his ear with a cotton swab and suddenly experiencing pain, decreased hearing, and a small amount of bloody drainage. On otoscopy there is a perforation of the pars tensa of the tympanic membrane. Weber lateralizes to the affected ear.\n\nWhat is the most appropriate management for an uncomplicated perforation?", "answer": "E", "rationale": "Most traumatic tympanic membrane perforations heal spontaneously over days to weeks; keep the ear dry and use topical fluoroquinolone drops if infection develops. Persistent non-healing perforations are referred for tympanoplasty.", "objective": "Ear Obj 4 (Middle Ear / TM Perforation)", "section": "Ear Disorders"}, {"number": 36, "options": [{"letter": "A", "text": "Oral glucocorticoids"}, {"letter": "B", "text": "Lifelong meclizine"}, {"letter": "C", "text": "Low-salt diet and a diuretic"}, {"letter": "D", "text": "Intratympanic gentamicin"}, {"letter": "E", "text": "Epley (canalith repositioning) maneuver"}], "stem": "A 58-year-old woman reports brief episodes of intense spinning that occur when she rolls over in bed or tips her head back to look up. Each episode lasts less than a minute and then resolves. She has no hearing loss or tinnitus. The Dix-Hallpike maneuver reproduces her vertigo with upbeat torsional nystagmus after a few seconds' latency that fatigues on repetition.\n\nWhat is the most appropriate treatment?", "answer": "E", "rationale": "Brief positional vertigo (<1 min) without hearing loss/tinnitus and a positive Dix-Hallpike is BPPV from displaced otoliths. The treatment is the Epley canalith repositioning maneuver.", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "section": "Cochleovestibular"}, {"number": 37, "options": [{"letter": "A", "text": "Tympanometry"}, {"letter": "B", "text": "Allergy testing"}, {"letter": "C", "text": "Monospot test"}, {"letter": "D", "text": "CT with contrast to evaluate for osseous erosion (skull-base osteomyelitis)"}, {"letter": "E", "text": "Reassurance and continue topical drops"}], "stem": "An 74-year-old man with poorly controlled diabetes presents with weeks of severe, deep left ear pain that is worst at night, along with foul purulent drainage that has not responded to topical antibiotic drops. On exam there is granulation tissue on the floor of the ear canal at the bony-cartilaginous junction. He has a low-grade fever.\n\nWhat is the most appropriate next diagnostic step?", "answer": "D", "rationale": "An elderly diabetic with severe nocturnal otalgia, canal-floor granulation tissue, and failure of topical therapy has malignant (necrotizing) otitis externa (Pseudomonas). CT with contrast evaluates for osseous erosion; treatment is prolonged dual antipseudomonal antibiotics.", "objective": "Ear Obj 2 (External Auditory Canal)", "section": "Ear Disorders"}, {"number": 38, "options": [{"letter": "A", "text": "Biopsy in the clinic"}, {"letter": "B", "text": "Preoperative embolization"}, {"letter": "C", "text": "Angiography"}, {"letter": "D", "text": "Surgical resection"}, {"letter": "E", "text": "Contrast CT/MRI imaging"}], "stem": "A 15-year-old boy presents with recurrent, sometimes profuse nosebleeds and progressive unilateral nasal obstruction over several months. On exam there is a firm mass in the posterior nasal cavity. A contrast CT shows a highly vascular mass arising near the sphenopalatine foramen.\n\nWhich management step is specifically contraindicated?", "answer": "A", "rationale": "This is a juvenile nasopharyngeal angiofibroma (adolescent male, recurrent epistaxis, vascular mass at the sphenopalatine foramen). Biopsy is contraindicated because of the risk of profuse bleeding; diagnosis relies on contrast imaging, with preoperative embolization before resection.", "objective": "Nose Obj 1g (Benign Nasal Tumors)", "section": "Nose/Sinus"}, {"number": 39, "options": [{"letter": "A", "text": "Benign paroxysmal positional vertigo"}, {"letter": "B", "text": "Labyrinthitis"}, {"letter": "C", "text": "Vestibular neuritis"}, {"letter": "D", "text": "Acoustic neuroma"}, {"letter": "E", "text": "Meniere disease"}], "stem": "A 42-year-old woman describes recurrent attacks of vertigo lasting from 30 minutes to several hours, accompanied by a roaring tinnitus, a sensation of fullness in her left ear, and fluctuating hearing loss. Between attacks she is well. Audiometry shows a low-to-mid frequency sensorineural hearing loss on the left.\n\nWhat is the most likely diagnosis?", "answer": "E", "rationale": "Episodic vertigo (20 min-24 h) WITH sensorineural hearing loss, tinnitus, and aural fullness is Meniere disease (endolymphatic hydrops). Management includes a low-salt diet, diuretics, and vestibular rehabilitation.", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "section": "Cochleovestibular"}, {"number": 40, "options": [{"letter": "A", "text": "Lumbar puncture without imaging"}, {"letter": "B", "text": "MR or CT venography"}, {"letter": "C", "text": "Carotid ultrasound"}, {"letter": "D", "text": "Non-contrast head CT only"}, {"letter": "E", "text": "Plain skull radiographs"}], "stem": "A 10-year-old with several days of poorly treated mastoiditis develops a new severe, progressive headache that is worse when lying flat and with Valsalva. He now has nausea, vomiting, and papilledema on fundoscopic exam. He is intermittently drowsy.\n\nWhat imaging study best confirms the suspected complication?", "answer": "B", "rationale": "A new progressive headache with raised-ICP signs in a patient with mastoiditis suggests cerebral venous sinus thrombosis (septic thrombosis of the lateral/sigmoid sinus). MR or CT venography confirms it; treatment is anticoagulation plus antibiotics for the underlying infection.", "objective": "Ear Obj 5 (Complications / CVST)", "section": "Ear Disorders"}, {"number": 41, "options": [{"letter": "A", "text": "Lid hygiene with warm compresses and dilute baby shampoo scrubs"}, {"letter": "B", "text": "Oral doxycycline for 6 weeks"}, {"letter": "C", "text": "Topical natamycin"}, {"letter": "D", "text": "Topical prednisolone acetate drops"}, {"letter": "E", "text": "Surgical lid margin resection"}], "stem": "A 58-year-old woman complains of chronic bilateral burning, itching, and red-rimmed eyelids that are worse in the mornings. She has a history of seborrheic dermatitis. On slit-lamp exam you see crusting and greasy scales clinging to the base of the eyelashes, with erythema of the anterior lid margins. Visual acuity and the conjunctiva are normal.\n\nWhat is the most appropriate first-line management?", "answer": "A", "rationale": "This is anterior blepharitis. First-line therapy is lid hygiene (warm compresses, baby shampoo scrubs); anti-staph antibiotic ointment is added only if it persists.", "objective": "Eye Obj 4 (Eyelid Disorders)", "section": "Eye"}, {"number": 42, "options": [{"letter": "A", "text": "Place a rigid eye shield (no pressure), give antiemetics/analgesia, and arrange emergent surgical repair"}, {"letter": "B", "text": "Irrigate the eye copiously and patch it firmly"}, {"letter": "C", "text": "Apply pressure to tamponade the bleeding"}, {"letter": "D", "text": "Discharge with topical antibiotics and next-day follow-up"}, {"letter": "E", "text": "Instill topical anesthetic and measure IOP with tonometry"}], "stem": "A 24-year-old man is struck in the eye by a fast-moving metal fragment while grinding metal without protective eyewear. He has severe pain and decreased vision. On exam the pupil is teardrop-shaped and pointing toward a corneal laceration, the anterior chamber appears shallow, and there is a subconjunctival hemorrhage. Intraocular pressure is low.\n\nWhat is the most appropriate immediate management?", "answer": "A", "rationale": "A teardrop pupil, shallow chamber, and low IOP after high-velocity injury indicate globe rupture. Protect the eye with a rigid shield (no pressure or manipulation), control nausea/pain, give antibiotics/tetanus prophylaxis, and obtain emergent surgical repair.", "objective": "Eye Obj 15 (Traumatic Eye Disorders)", "section": "Eye"}, {"number": 43, "options": [{"letter": "A", "text": "Antivirals"}, {"letter": "B", "text": "Analgesia plus an antibiotic such as penicillin VK (and dental referral/drainage)"}, {"letter": "C", "text": "Antibiotics alone without any drainage"}, {"letter": "D", "text": "Observation only"}, {"letter": "E", "text": "Antifungals"}], "stem": "A 40-year-old man with poor dental hygiene presents with 3 days of throbbing pain and swelling around a lower molar, along with fever. On exam there is a localized, fluctuant swelling of the gingiva ('gum boil'/parulis) adjacent to the tooth, with warmth and erythema and tender regional lymphadenopathy. He has no trismus or airway compromise.\n\nWhat is the most appropriate treatment for this localized abscess?", "answer": "B", "rationale": "A dental abscess is treated with analgesia and an antibiotic (penicillin VK, clindamycin, or amoxicillin-clavulanate), with incision and drainage for larger collections and dental referral. Watch for spread causing trismus, dysphagia, or airway compromise.", "objective": "Oro D (Dental Abscess)", "section": "Oropharynx"}, {"number": 44, "options": [{"letter": "A", "text": "Systemic corticosteroids"}, {"letter": "B", "text": "Oral acetazolamide alone"}, {"letter": "C", "text": "Warm compresses"}, {"letter": "D", "text": "Laser peripheral iridotomy"}, {"letter": "E", "text": "Topical latanoprost monotherapy"}], "stem": "A 66-year-old man is diagnosed with acute angle-closure glaucoma. His intraocular pressure is 58 mmHg. Ophthalmology has been called and is en route.\n\nWhat is the definitive treatment for this condition?", "answer": "D", "rationale": "Medical therapy (acetazolamide, timolol, apraclonidine, pilocarpine) temporizes by lowering IOP, but the definitive treatment for angle-closure glaucoma is laser peripheral iridotomy to relieve the pupillary block.", "objective": "Eye Obj 9 (Glaucoma)", "section": "Eye"}, {"number": 45, "options": [{"letter": "A", "text": "High-dose IV antihistamines alone"}, {"letter": "B", "text": "Oral prednisone taper as an outpatient"}, {"letter": "C", "text": "Reassurance; no intervention needed"}, {"letter": "D", "text": "Icatibant or C1 esterase inhibitor concentrate; stop the ACE inhibitor"}, {"letter": "E", "text": "Intramuscular epinephrine and it will resolve quickly"}], "stem": "A 58-year-old man who started lisinopril 3 weeks ago presents with progressive swelling of his lips and tongue over several hours. He has no urticaria, no itching, and no wheezing, but reports a sensation of throat tightness. His vital signs are stable and his airway is currently patent.\n\nAfter airway assessment, which treatment is most appropriate for this mechanism of angioedema?", "answer": "D", "rationale": "ACE-inhibitor angioedema is bradykinin-mediated and does NOT reliably respond to epinephrine, antihistamines, or steroids. Stop the ACE inhibitor and, in significant cases, consider icatibant or C1 inhibitor concentrate; airway protection is the priority.", "objective": "Oro A (Angioedema)", "section": "Oropharynx"}, {"number": 46, "options": [{"letter": "A", "text": "Candida albicans"}, {"letter": "B", "text": "Staphylococcus epidermidis"}, {"letter": "C", "text": "Pseudomonas aeruginosa"}, {"letter": "D", "text": "Escherichia coli"}, {"letter": "E", "text": "Group A Streptococcus"}], "stem": "A 22-year-old woman presents 5 days after getting a high cartilage ('helix') ear piercing with increasing redness, warmth, swelling, and severe pain of the upper ear. Notably, the earlobe is spared. The pain seems out of proportion to the exam, and the auricular landmarks are obscured by swelling.\n\nWhich organism must the chosen antibiotic cover?", "answer": "C", "rationale": "Perichondritis after high cartilage piercing spares the lobule (no cartilage) and is most commonly caused by Pseudomonas aeruginosa; empiric therapy is an oral fluoroquinolone (ciprofloxacin). Untreated, it causes cartilage necrosis and cauliflower ear.", "objective": "Ear Obj 1 (Auricle)", "section": "Ear Disorders"}, {"number": 47, "options": [{"letter": "A", "text": "Oral acyclovir"}, {"letter": "B", "text": "High-potency topical corticosteroid (e.g., triamcinolone in Orabase)"}, {"letter": "C", "text": "Systemic antibiotics"}, {"letter": "D", "text": "Oral fluconazole"}, {"letter": "E", "text": "Topical antifungal"}], "stem": "A 24-year-old woman presents with a painful sore inside her lower lip that appeared 2 days ago after she bit the area. On exam there is a small, round, shallow ulcer with a yellow-gray base and a surrounding erythematous halo on the non-keratinized mucosa. She has had similar lesions before that healed on their own in about a week.\n\nWhat is the most appropriate first-line treatment to speed healing?", "answer": "B", "rationale": "Aphthous ulcers (canker sores) are round shallow ulcers with a gray base and erythematous halo on non-keratinized mucosa. First-line therapy is an early high-potency topical corticosteroid (e.g., triamcinolone in Orabase, dexamethasone rinse).", "objective": "Oro A (Aphthous Ulcers)", "section": "Oropharynx"}, {"number": 48, "options": [{"letter": "A", "text": "Intravenous corticosteroids"}, {"letter": "B", "text": "Observation alone"}, {"letter": "C", "text": "Oral prednisone taper"}, {"letter": "D", "text": "Topical antibiotic drops"}, {"letter": "E", "text": "Intravitreal anti-VEGF"}], "stem": "A 28-year-old woman presents with a 3-day history of decreased vision in her right eye and pain that worsens when she moves the eye. She reports colors appear 'washed out.' On exam there is a relative afferent pupillary defect on the swinging-flashlight test. She has had a prior episode of transient limb numbness.\n\nWhat is the most appropriate treatment?", "answer": "A", "rationale": "Painful monocular vision loss with dyschromatopsia and a Marcus Gunn pupil is optic neuritis, strongly associated with multiple sclerosis. Treatment is IV corticosteroids; oral prednisone alone is avoided because it increases the recurrence rate.", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "section": "Eye"}, {"number": 49, "options": [{"letter": "A", "text": "Oral acyclovir"}, {"letter": "B", "text": "Topical moxifloxacin"}, {"letter": "C", "text": "Topical glucocorticoids plus a cycloplegic agent"}, {"letter": "D", "text": "Warm compresses and lid hygiene"}, {"letter": "E", "text": "Intramuscular ceftriaxone"}], "stem": "A 29-year-old man with a history of ankylosing spondylitis presents with a painful, red left eye, photophobia, and blurred vision for 2 days. On slit-lamp exam there is redness concentrated at the limbus (ciliary flush) and leukocytes (cells) visible in the anterior chamber. The pupil is somewhat small and irregular.\n\nWhat is the most appropriate treatment?", "answer": "C", "rationale": "Anterior uveitis/iritis (HLA-B27-associated, e.g., ankylosing spondylitis) presents with ciliary flush and anterior-chamber cells. Treatment is topical corticosteroids plus a cycloplegic (dilation relieves pain and prevents synechiae).", "objective": "Eye Obj 10 (Inflammatory Eye Disorders)", "section": "Eye"}, {"number": 50, "options": [{"letter": "A", "text": "Cautery (silver nitrate) of the visible bleeding vessel"}, {"letter": "B", "text": "Transfusion of packed red cells"}, {"letter": "C", "text": "Emergent CT angiography"}, {"letter": "D", "text": "Immediate ENT consult for arterial ligation"}, {"letter": "E", "text": "Posterior balloon packing and hospital admission"}], "stem": "A 16-year-old boy presents with a nosebleed after picking his nose. The bleeding is from the right naris only, and he is hemodynamically stable. On exam with a nasal speculum, you identify an active bleeding site on the anterior nasal septum.\n\nAfter failure of initial direct compression, which is the most appropriate next step for this anterior bleed?", "answer": "A", "rationale": "Most anterior epistaxis arises from Kiesselbach's plexus. After direct pressure and a topical vasoconstrictor fail, the next step is cautery (silver nitrate or electrocautery), followed by anterior packing if needed. Posterior bleeds require ENT and packing/admission.", "objective": "Nose Obj 1d (Epistaxis)", "section": "Nose/Sinus"}, {"number": 51, "options": [{"letter": "A", "text": "Topical antibiotic drops"}, {"letter": "B", "text": "Observation until age 10"}, {"letter": "C", "text": "Cataract extraction"}, {"letter": "D", "text": "Patching (occlusion) therapy of the better-seeing eye"}, {"letter": "E", "text": "Immediate strabismus surgery only"}], "stem": "A 4-year-old girl is brought in because one eye 'drifts.' Her mother notes the child seems to favor one eye. On exam, corneal light reflex is asymmetric and the cover/uncover test reveals a manifest deviation. Vision testing shows reduced acuity in the deviating eye despite a structurally normal eye with a clear cornea, lens, and retina.\n\nWhat is the most appropriate treatment to preserve vision in the affected eye?", "answer": "D", "rationale": "Strabismus has caused amblyopia (developmental cortical suppression of one eye without structural abnormality). Treatment is patching or penalization of the dominant eye to force use of the amblyopic eye; treatment is time-sensitive in early childhood.", "objective": "Eye Obj 11 (EOM Pathology & Amblyopia)", "section": "Eye"}, {"number": 52, "options": [{"letter": "A", "text": "Oral montelukast"}, {"letter": "B", "text": "Intranasal ipratropium"}, {"letter": "C", "text": "Oral first-generation antihistamine (diphenhydramine)"}, {"letter": "D", "text": "Oral pseudoephedrine"}, {"letter": "E", "text": "Intranasal glucocorticoid (e.g., fluticasone)"}], "stem": "A 26-year-old woman presents in the spring with recurrent bouts of sneezing, clear watery nasal discharge, and itchy, watery eyes. She notes her symptoms flare when she is outdoors around blooming grass. On exam the nasal turbinates appear pale and boggy with a bluish tinge, and there is cobblestoning of the posterior pharynx. She has faint dark circles under her eyes.\n\nWhich is the single most effective first-line medication for her condition?", "answer": "E", "rationale": "This is allergic rhinitis (itching, sneezing, pale/boggy turbinates, allergic shiners). The single most effective agent is an intranasal corticosteroid, which is especially good for congestion.", "objective": "Nose Obj 1a/2 (Rhinitis)", "section": "Nose/Sinus"}, {"number": 53, "options": [{"letter": "A", "text": "Emergent laser iridotomy"}, {"letter": "B", "text": "Intravitreal anti-VEGF injection"}, {"letter": "C", "text": "Systemic corticosteroids"}, {"letter": "D", "text": "Oral acetazolamide"}, {"letter": "E", "text": "Topical prostaglandin analog (latanoprost)"}], "stem": "A 60-year-old African American man with a family history of blindness is found on routine exam to have a cup-to-disc ratio of 0.7 in both eyes and peripheral visual-field loss on automated perimetry. He is asymptomatic and did not notice any change in his vision. His intraocular pressures are borderline elevated.\n\nWhich treatment is considered first-line for this condition?", "answer": "E", "rationale": "Optic-disc cupping with painless peripheral field loss is chronic open-angle glaucoma. First-line therapy is a topical prostaglandin analog (or beta-blocker), aiming for >25% IOP reduction.", "objective": "Eye Obj 9 (Glaucoma)", "section": "Eye"}, {"number": 54, "options": [{"letter": "A", "text": "Otosclerosis"}, {"letter": "B", "text": "Presbycusis"}, {"letter": "C", "text": "Meniere disease"}, {"letter": "D", "text": "Cholesteatoma"}, {"letter": "E", "text": "Acoustic neuroma"}], "stem": "A 32-year-old woman reports slowly progressive hearing loss over several years, worse for low-pitched sounds, along with tinnitus. She notes she hears better in noisy environments. Otoscopy is completely normal. Weber lateralizes to the affected ear, and Rinne shows bone conduction greater than air conduction on that side. Her mother had a similar problem.\n\nWhat is the most likely diagnosis?", "answer": "A", "rationale": "Progressive conductive hearing loss (Weber to the affected ear, Rinne BC>AC) with a NORMAL otoscopic exam, before age 40, often with a family history, is otosclerosis (stapes footplate fixation). Treatment is a hearing aid or stapedectomy.", "objective": "Ear Obj 4 (Middle Ear / Otosclerosis)", "section": "Ear Disorders"}, {"number": 55, "options": [{"letter": "A", "text": "Penicillin V or amoxicillin"}, {"letter": "B", "text": "Ceftriaxone IV"}, {"letter": "C", "text": "Supportive care only"}, {"letter": "D", "text": "Azithromycin"}, {"letter": "E", "text": "Oral acyclovir"}], "stem": "An 8-year-old girl presents with a sudden sore throat, fever to 39°C, and difficulty swallowing. She has no cough or runny nose. On exam there is tonsillar exudate, tender anterior cervical lymphadenopathy, and palatal petechiae. Her rapid antigen detection test is positive.\n\nWhat is the most appropriate first-line treatment?", "answer": "A", "rationale": "Sudden sore throat, fever, exudate, tender anterior nodes, and NO cough with a positive RADT indicate group A streptococcal pharyngitis. First-line treatment is penicillin V or amoxicillin (cephalexin/clindamycin if penicillin-allergic).", "objective": "Oro A (Pharyngitis / Centor)", "section": "Oropharynx"}, {"number": 56, "options": [{"letter": "A", "text": "Meniere disease"}, {"letter": "B", "text": "Vestibular neuritis"}, {"letter": "C", "text": "BPPV"}, {"letter": "D", "text": "Labyrinthitis"}, {"letter": "E", "text": "Cerebellar stroke"}], "stem": "A 35-year-old man develops sudden, severe, constant vertigo that has persisted for 2 days, with nausea and unsteadiness. He had a viral upper respiratory illness the week before. He has NO hearing loss and no tinnitus. Exam shows unidirectional horizontal nystagmus that beats away from the affected side and suppresses with visual fixation; there are no other neurologic deficits.\n\nWhat is the most likely diagnosis?", "answer": "B", "rationale": "Sudden prolonged vertigo (days) after a viral prodrome, WITHOUT hearing loss, with peripheral (unidirectional, fixation-suppressed) nystagmus, is vestibular neuritis. If hearing loss were also present, labyrinthitis would be the diagnosis.", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "section": "Cochleovestibular"}, {"number": 57, "options": [{"letter": "A", "text": "Surgical drainage"}, {"letter": "B", "text": "Topical antibiotic drops alone"}, {"letter": "C", "text": "Antivirals (valacyclovir) plus corticosteroids, with eye protection"}, {"letter": "D", "text": "Antifungal therapy"}, {"letter": "E", "text": "Oral fluoroquinolone"}], "stem": "A 62-year-old man presents with severe ear pain and a painful vesicular rash in and around his right ear canal. He has developed right-sided facial droop that does not spare the forehead, along with vertigo, hearing loss, and altered taste. He reports the pain preceded the rash.\n\nWhat is the most appropriate treatment?", "answer": "C", "rationale": "Herpes zoster oticus (Ramsay Hunt syndrome) is VZV reactivation in the geniculate ganglion causing ear vesicles, peripheral CN VII palsy, vertigo, and hearing loss. Treatment is antivirals (valacyclovir) plus corticosteroids, with eye care to protect the cornea.", "objective": "Ear Obj 2 (EAC) / Cochleovestibular Obj 6 (Ramsay Hunt)", "section": "Ear Disorders"}, {"number": 58, "options": [{"letter": "A", "text": "Topical antibiotic drops"}, {"letter": "B", "text": "Start oral prednisone"}, {"letter": "C", "text": "Reassurance and routine follow-up in 1 month"}, {"letter": "D", "text": "Immediate ophthalmology referral for surgical repair"}, {"letter": "E", "text": "Ocular massage and high-flow oxygen"}], "stem": "A 55-year-old highly myopic man presents with sudden onset of flashing lights and a shower of new floaters in his right eye, followed by a 'curtain' descending over part of his visual field. There is no pain or redness. On dilated exam, a portion of the retina appears elevated and billowing in the vitreous, and 'tobacco dust' is seen.\n\nWhat is the most appropriate next step?", "answer": "D", "rationale": "Flashes, new floaters, a curtain/shadow, Shafer's sign (tobacco dust), and an elevated retina indicate retinal detachment. This requires immediate ophthalmology referral for repair (cryotherapy/photocoagulation/surgery).", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "section": "Eye"}, {"number": 59, "options": [{"letter": "A", "text": "Presence of cough"}, {"letter": "B", "text": "Bilateral clear discharge"}, {"letter": "C", "text": "Symptom duration of 4 days"}, {"letter": "D", "text": "'Double sickening' - worsening after initial improvement"}, {"letter": "E", "text": "Absence of fever"}], "stem": "A 40-year-old woman has had facial pain and nasal congestion for 12 days. She initially began to improve around day 6 but then developed worsening unilateral maxillary pain, purulent nasal discharge, fever of 39.2°C, and pain in her upper molar teeth that worsens when she bends forward.\n\nWhich feature most supports acute bacterial (rather than viral) rhinosinusitis?", "answer": "D", "rationale": "Acute bacterial rhinosinusitis is suggested by symptoms >10 days without improvement, severe symptoms (fever >=39°C with purulence/facial pain), or 'double sickening' (worsening after initial improvement). First-line treatment is amoxicillin or amoxicillin-clavulanate.", "objective": "Nose Obj 1b/1c/3 (Rhinosinusitis)", "section": "Nose/Sinus"}, {"number": 60, "options": [{"letter": "A", "text": "Hearing aids"}, {"letter": "B", "text": "Systemic corticosteroids"}, {"letter": "C", "text": "Tympanostomy tubes"}, {"letter": "D", "text": "Topical antibiotics"}, {"letter": "E", "text": "Stapedectomy"}], "stem": "A 74-year-old man reports difficulty hearing, especially understanding speech in noisy restaurants, that has worsened gradually over years. His wife says he keeps the television volume high. Otoscopy is normal bilaterally. Audiometry shows symmetric, bilateral high-frequency sensorineural hearing loss.\n\nWhat is the most appropriate management?", "answer": "A", "rationale": "Symmetric bilateral high-frequency SNHL in an older adult with difficulty in noise is presbycusis (age-related, irreversible hair-cell loss). Management is amplification with hearing aids (cochlear implant if aids fail).", "objective": "Cochleovestibular Obj 5 (Presbycusis)", "section": "Cochleovestibular"}, {"number": 61, "options": [{"letter": "A", "text": "Sweat chloride test for cystic fibrosis"}, {"letter": "B", "text": "Allergy skin testing only"}, {"letter": "C", "text": "Nasal culture"}, {"letter": "D", "text": "Monospot test"}, {"letter": "E", "text": "Sinus CT only"}], "stem": "A 6-year-old boy presents with chronic bilateral nasal obstruction and diminished sense of smell. On anterior rhinoscopy you see pale, gelatinous, grape-like masses in both nasal cavities. He also has a history of recurrent respiratory infections and greasy stools.\n\nWhich test should be ordered given the patient's age and findings?", "answer": "A", "rationale": "Nasal polyps in a child mandate evaluation for cystic fibrosis (sweat chloride test), particularly with recurrent infections and steatorrhea. First-line treatment of polyps is intranasal corticosteroids.", "objective": "Nose Obj 1g (Benign Nasal Tumors)", "section": "Nose/Sinus"}, {"number": 62, "options": [{"letter": "A", "text": "Oral antibiotics alone"}, {"letter": "B", "text": "Warm compresses and observation"}, {"letter": "C", "text": "Ice and reassurance"}, {"letter": "D", "text": "Prompt incision/drainage or aspiration with a pressure dressing"}, {"letter": "E", "text": "Topical antibiotic ointment only"}], "stem": "A 20-year-old collegiate wrestler presents after blunt trauma to his ear during a match. On exam there is a tender, fluctuant, boggy swelling over the anterior auricle that obscures the normal cartilaginous contours. There is no laceration.\n\nWhat is the most appropriate management to prevent 'cauliflower ear'?", "answer": "D", "rationale": "An auricular hematoma must be drained promptly (I&D or aspiration) with a pressure dressing/bolster to prevent reaccumulation and avascular fibrocartilage overgrowth (cauliflower ear).", "objective": "Ear Obj 1 (Auricle)", "section": "Ear Disorders"}, {"number": 63, "options": [{"letter": "A", "text": "The lesion is painless and indurated"}, {"letter": "B", "text": "The lesion is a velvety red patch"}, {"letter": "C", "text": "It only occurs in immunocompetent hosts"}, {"letter": "D", "text": "The plaques cannot be removed by scraping"}, {"letter": "E", "text": "The plaques can be scraped off, leaving an erythematous base"}], "stem": "A 70-year-old man using an inhaled corticosteroid for COPD presents with white patches on his tongue and buccal mucosa and a burning sensation with altered taste. When you scrape the plaques with a tongue depressor, they come off, leaving an erythematous, mildly bleeding base.\n\nWhich feature best distinguishes this condition from leukoplakia?", "answer": "E", "rationale": "Oral candidiasis (thrush) plaques CAN be scraped off, revealing an erythematous, bleeding base - distinguishing it from leukoplakia, which cannot be scraped off. Rinsing after inhaler use helps prevent it; treat with topical or oral antifungals.", "objective": "Oro A (Oral Candidiasis)", "section": "Oropharynx"}, {"number": 64, "options": [{"letter": "A", "text": "Monospot test"}, {"letter": "B", "text": "Dix-Hallpike maneuver"}, {"letter": "C", "text": "Tympanometry"}, {"letter": "D", "text": "MRI of the internal auditory canals with contrast"}, {"letter": "E", "text": "Sinus CT"}], "stem": "A 55-year-old man reports gradually progressive hearing loss and tinnitus in his right ear over 2 years, with mild unsteadiness but no discrete vertigo attacks. Audiometry confirms a unilateral (asymmetric) sensorineural hearing loss. He has no external or middle-ear abnormalities on otoscopy.\n\nWhat is the most appropriate diagnostic test?", "answer": "D", "rationale": "Progressive UNILATERAL sensorineural hearing loss with tinnitus and compensated imbalance suggests an acoustic neuroma (vestibular schwannoma). MRI of the internal auditory canals with contrast is the diagnostic test of choice; unilateral/gradual SNHL always warrants MRI to exclude it.", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "section": "Cochleovestibular"}, {"number": 65, "options": [{"letter": "A", "text": "Dairy products"}, {"letter": "B", "text": "Dental procedures"}, {"letter": "C", "text": "Contact sports for 3-4 weeks due to splenic rupture risk"}, {"letter": "D", "text": "Sun exposure"}, {"letter": "E", "text": "Air travel"}], "stem": "A 19-year-old college student presents with a week of severe sore throat, marked fatigue, and low-grade fever. On exam there are enlarged tonsils with exudates, tender POSTERIOR cervical lymphadenopathy, and mild splenomegaly. A course of amoxicillin prescribed elsewhere produced a diffuse maculopapular rash.\n\nWhich complication should the patient be specifically counseled to avoid?", "answer": "C", "rationale": "Infectious mononucleosis (EBV) presents with posterior cervical adenopathy, fatigue, splenomegaly, and an amoxicillin-induced rash. Patients should avoid contact sports for 3-4 weeks because of the risk of splenic rupture.", "objective": "Oro A (Infectious Mononucleosis)", "section": "Oropharynx"}, {"number": 66, "options": [{"letter": "A", "text": "Reassurance and saline irrigation only"}, {"letter": "B", "text": "Intramuscular/intravenous ceftriaxone plus saline irrigation, treated as an emergency"}, {"letter": "C", "text": "Topical acyclovir gel"}, {"letter": "D", "text": "Topical erythromycin ointment alone"}, {"letter": "E", "text": "Oral azithromycin alone"}], "stem": "A newborn develops profuse, thick, hyperpurulent discharge from both eyes on day 3 of life. The mother had no prenatal care. On exam there is marked eyelid edema, copious purulent drainage, and chemosis. Gram stain of the discharge shows gram-negative intracellular diplococci. There is early corneal haze.\n\nWhat is the most appropriate management?", "answer": "B", "rationale": "Gonococcal conjunctivitis (gram-negative diplococci, hyperpurulent discharge) is an ophthalmologic emergency due to corneal perforation risk. Treatment is systemic ceftriaxone plus saline irrigation, with added chlamydia coverage.", "objective": "Eye Obj 6 (Conjunctival Disorders)", "section": "Eye"}, {"number": 67, "options": [{"letter": "A", "text": "Intralesional corticosteroid injection"}, {"letter": "B", "text": "Urgent incision and drainage in the operating room"}, {"letter": "C", "text": "Warm compresses applied several times daily"}, {"letter": "D", "text": "Topical antiviral (trifluridine) drops"}, {"letter": "E", "text": "Oral fluoroquinolone with orbital CT imaging"}], "stem": "A 34-year-old woman with poorly controlled type 2 diabetes presents with a 2-day history of a painful, red bump on her right lower eyelid. She reports it came on quickly and is exquisitely tender to touch. On exam there is a localized, erythematous, pus-pointing nodule at the lid margin near an eyelash follicle. There is no proptosis, and extraocular movements are painless and full. Visual acuity is normal.\n\nWhat is the most appropriate initial management?", "answer": "C", "rationale": "This is an external hordeolum (stye), an acute Staph aureus infection of an eyelash follicle/gland; diabetes is a risk factor. Warm compresses are the mainstay of treatment, with antibiotic ointment or I&D reserved for non-resolution.", "objective": "Eye Obj 4 (Eyelid Disorders)", "section": "Eye"}, {"number": 68, "options": [{"letter": "A", "text": "Candida albicans; fluconazole"}, {"letter": "B", "text": "Staphylococcus aureus; vancomycin"}, {"letter": "C", "text": "Herpes zoster; valacyclovir"}, {"letter": "D", "text": "Pseudomonas aeruginosa; ciprofloxacin"}, {"letter": "E", "text": "Group A Streptococcus; penicillin or amoxicillin"}], "stem": "A 45-year-old woman presents with abrupt onset of fever, chills, and a rapidly spreading, sharply demarcated, fiery-red, raised plaque involving her right ear, including the earlobe. The skin is warm and tender, and there is a well-defined, indurated border. She has tender preauricular lymphadenopathy.\n\nWhat is the most likely organism and appropriate first-line treatment?", "answer": "E", "rationale": "Erysipelas (a sharply demarcated, raised, fiery-red plaque involving the lobule with systemic symptoms) is usually caused by group A Streptococcus. First-line treatment is penicillin or amoxicillin. Lobule involvement helps distinguish it from perichondritis.", "objective": "Ear Obj 1 (Auricle)", "section": "Ear Disorders"}, {"number": 69, "options": [{"letter": "A", "text": "Bacterial sialadenitis"}, {"letter": "B", "text": "Peritonsillar abscess"}, {"letter": "C", "text": "Dental abscess"}, {"letter": "D", "text": "Sialolithiasis"}, {"letter": "E", "text": "Viral parotitis (mumps)"}], "stem": "A 55-year-old man reports recurrent pain and swelling under his jaw that predictably occurs at the start of meals and then gradually subsides afterward. On bimanual palpation of the floor of the mouth you feel a firm, discrete stone along the course of the submandibular (Wharton's) duct. There is no purulent discharge.\n\nWhat is the most likely diagnosis?", "answer": "D", "rationale": "Mealtime pain/swelling that subsides afterward ('mealtime syndrome') with a palpable stone in Wharton's duct is sialolithiasis, most commonly affecting the submandibular gland. Initial management is hydration, moist heat, massage/milking the duct, and sialogogues.", "objective": "Oro B (Salivary Glands)", "section": "Oropharynx"}, {"number": 70, "options": [{"letter": "A", "text": "Salicylates"}, {"letter": "B", "text": "Macrolides"}, {"letter": "C", "text": "Platinum-based chemotherapy"}, {"letter": "D", "text": "Loop diuretics"}, {"letter": "E", "text": "Aminoglycosides (e.g., gentamicin)"}], "stem": "A 70-year-old man hospitalized for a severe gram-negative infection is receiving an aminoglycoside antibiotic. Several days into therapy he reports new tinnitus, decreased hearing, and unsteadiness/oscillopsia when walking.\n\nWhich class of medication is the classic cause of BOTH cochlear and vestibular toxicity in this scenario?", "answer": "E", "rationale": "Aminoglycosides (e.g., gentamicin) are the classic ototoxins causing BOTH cochlear (hearing loss/tinnitus) and vestibular (imbalance/oscillopsia) toxicity by damaging hair cells/stereocilia.", "objective": "Cochleovestibular Obj 2 (Ototoxic Medications)", "section": "Cochleovestibular"}, {"number": 71, "options": [{"letter": "A", "text": "Central retinal artery occlusion"}, {"letter": "B", "text": "Anterior uveitis"}, {"letter": "C", "text": "Acute angle-closure glaucoma"}, {"letter": "D", "text": "Optic neuritis"}, {"letter": "E", "text": "Chronic open-angle glaucoma"}], "stem": "A 65-year-old hyperopic woman presents to the ED with sudden severe pain in her right eye, blurred vision, and halos around lights that began after she went into a dark movie theater. She is nauseated and vomiting. On exam the eye is red with a steamy (hazy) cornea, ciliary flush, and a mid-dilated, fixed, nonreactive pupil. The globe feels hard.\n\nWhat is the most likely diagnosis?", "answer": "C", "rationale": "Sudden painful red eye with halos, a steamy cornea, a mid-dilated fixed pupil, a hard globe, and nausea/vomiting after mydri
