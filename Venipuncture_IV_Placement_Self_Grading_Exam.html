<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Venipuncture & IV Placement Practice Exam</title>
<style>
:root {
  --bg:#f4f7fb; --card:#ffffff; --ink:#18212f; --muted:#667085;
  --accent:#3657d6; --accent2:#253fa8; --good:#16794b; --goodbg:#e9f8f0;
  --bad:#b42318; --badbg:#fdecea; --border:#d9e0ea; --shadow:0 10px 30px rgba(16,24,40,.08);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;line-height:1.5}
.shell{max-width:900px;margin:0 auto;padding:20px}
header{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:22px;padding:24px;box-shadow:var(--shadow);margin-bottom:18px}
header h1{margin:0 0 8px;font-size:clamp(1.55rem,4vw,2.2rem);line-height:1.15}
header p{margin:0;opacity:.92;font-size:1rem}
.progress-wrap{margin-top:18px;background:rgba(255,255,255,.23);height:10px;border-radius:999px;overflow:hidden}
.progress{height:100%;width:0;background:#fff;transition:width .25s ease}
.card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:clamp(18px,4vw,30px);box-shadow:var(--shadow)}
.topline{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px;color:var(--muted);font-weight:700}
.qnum{font-size:1.02rem}
.status{font-size:.95rem}
.stem{font-size:clamp(1.1rem,2.7vw,1.3rem);font-weight:700;white-space:pre-line;margin:0 0 20px}
.choices{display:grid;gap:12px}
.choice{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;background:#fff;border:2px solid var(--border);border-radius:15px;padding:14px 15px;font-size:1rem;cursor:pointer;transition:.15s ease}
.choice:hover{border-color:#9bacf0;transform:translateY(-1px)}
.choice .letter{flex:0 0 32px;height:32px;border-radius:50%;display:grid;place-items:center;background:#eef1f7;font-weight:800}
.choice.selected{border-color:var(--accent);background:#f2f5ff}
.choice.correct{border-color:var(--good);background:var(--goodbg)}
.choice.incorrect{border-color:var(--bad);background:var(--badbg)}
.choice:disabled{cursor:default;transform:none}
.feedback{display:none;margin-top:20px;padding:16px;border-radius:15px;border:1px solid var(--border);background:#f8fafc}
.feedback.show{display:block}
.feedback.good{border-color:#8bd3af;background:var(--goodbg)}
.feedback.bad{border-color:#f0a39d;background:var(--badbg)}
.feedback h3{margin:0 0 8px;font-size:1.05rem}
.feedback p{margin:6px 0}
.objective{font-weight:700}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
button.ctrl{appearance:none;border:0;border-radius:12px;padding:12px 18px;font-weight:800;font-size:1rem;cursor:pointer}
.primary{background:var(--accent);color:#fff}
.secondary{background:#e9edf5;color:#22304a}
.danger{background:#fff0ef;color:var(--bad)}
button.ctrl:disabled{opacity:.45;cursor:not-allowed}
.results{display:none}
.results.show{display:block}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0}
.metric{background:#f8fafc;border:1px solid var(--border);border-radius:15px;padding:16px;text-align:center}
.metric strong{display:block;font-size:1.7rem}
.topic-table{width:100%;border-collapse:collapse;margin-top:12px}
.topic-table th,.topic-table td{padding:12px;border-bottom:1px solid var(--border);text-align:left}
.topic-table th{color:var(--muted);font-size:.92rem}
.banner{padding:15px 17px;border-radius:15px;background:#eef2ff;border:1px solid #cbd4ff;margin-top:15px}
.small{font-size:.92rem;color:var(--muted)}
@media (max-width:640px){
  .shell{padding:10px}
  header,.card{border-radius:16px}
  header{padding:19px}
  .score-grid{grid-template-columns:1fr}
  .choice{padding:13px}
  .actions{display:grid;grid-template-columns:1fr}
  button.ctrl{width:100%}
  .topic-table{font-size:.92rem}
}
@media print{
  body{background:#fff}
  header,.actions{display:none!important}
  .card{box-shadow:none;border:0}
}
</style>
</head>
<body>
<div class="shell">
<header>
  <h1>Venipuncture & IV Placement Practice Exam</h1>
  <p>Clinical Medicine I • 20 Questions • Single Best Answer</p>
  <div class="progress-wrap"><div id="progress" class="progress"></div></div>
</header>

<main id="examCard" class="card">
  <div class="topline">
    <div id="qnum" class="qnum"></div>
    <div id="status" class="status"></div>
  </div>
  <div id="stem" class="stem"></div>
  <div id="choices" class="choices"></div>
  <div id="feedback" class="feedback"></div>
  <div class="actions">
    <button id="checkBtn" class="ctrl primary" onclick="checkAnswer()">Check Answer</button>
    <button id="nextBtn" class="ctrl secondary" onclick="nextQuestion()" disabled>Next</button>
    <button id="submitBtn" class="ctrl primary" onclick="submitExam()" style="display:none" disabled>Submit Exam</button>
  </div>
</main>

<section id="results" class="card results">
  <h2>Exam Results</h2>
  <div class="score-grid">
    <div class="metric"><span>Percent</span><strong id="percentScore">0%</strong></div>
    <div class="metric"><span>Correct</span><strong id="correctCount">0</strong></div>
    <div class="metric"><span>Total</span><strong id="totalCount">20</strong></div>
  </div>
  <div id="strengthBanner" class="banner"></div>
  <h3>Section Performance</h3>
  <div style="overflow-x:auto">
    <table class="topic-table">
      <thead><tr><th>Section</th><th>Correct</th><th>Total</th><th>Score</th></tr></thead>
      <tbody id="topicBody"></tbody>
    </table>
  </div>
  <div class="actions">
    <button class="ctrl primary" onclick="reviewMissed()">Review Missed Questions</button>
    <button class="ctrl secondary" onclick="restartExam()">Reset Exam</button>
  </div>
  <p class="small">All questions imported: 20 of 20. Unparsed questions: 0.</p>
</section>

<script>
const questions = [{"number": 1, "stem": "During IV insertion, a clinician gets a flash of blood but the catheter fails to thread. Frustrated, she partially withdraws the catheter off the needle and considers pushing the needle back through the catheter to re-establish position. Why is reinserting the needle into the catheter contraindicated?", "choices": [{"letter": "A", "text": "It is acceptable if done slowly"}, {"letter": "B", "text": "It can shear off the catheter tip, causing a catheter embolus"}, {"letter": "C", "text": "It always causes arterial puncture"}, {"letter": "D", "text": "It causes immediate vasovagal syncope"}, {"letter": "E", "text": "It dilutes the blood sample"}], "answer": "B", "rationale": "Never reinsert the needle into the catheter: the bevel can shear off the catheter tip and produce a catheter embolus. To reposition, hold BOTH the needle and the hub together and adjust as a unit.", "section": "IV Placement: Troubleshooting – NEVER rules", "topic": "IV Placement"}, {"number": 2, "stem": "A clinician is placing an IV in a small, superficial forearm vein. She sees a flash of blood in the flash chamber but the catheter will not advance off the needle. What is the most likely fix?", "choices": [{"letter": "A", "text": "Flatten (lower) the angle and advance the needle 2-5 mm to seat the catheter before threading"}, {"letter": "B", "text": "Release the tourniquet and attempt to flush"}, {"letter": "C", "text": "Increase the insertion angle to 45° and push harder"}, {"letter": "D", "text": "Withdraw the entire device and start over in a new vein"}, {"letter": "E", "text": "Remove the needle immediately and thread the catheter alone"}], "answer": "A", "rationale": "A flash without threading usually means the angle was not flattened and the catheter is not fully seated. Lower the angle and advance the needle 2-5 mm so the catheter tip is within the vein lumen, then thread. If already done, the vein may have been transfixed.", "section": "IV Placement: Insertion Steps", "topic": "IV Placement"}, {"number": 3, "stem": "A student is setting up for a straight-stick draw using a winged (butterfly) collection needle on a patient with a shallow median cubital vein. She has cleaned the site and is ready to insert. What is the correct insertion technique?", "choices": [{"letter": "A", "text": "Bevel up at roughly a 15° angle"}, {"letter": "B", "text": "Bevel down at a 45° angle"}, {"letter": "C", "text": "Bevel down at a 30° angle"}, {"letter": "D", "text": "Bevel up at a 45-60° angle"}, {"letter": "E", "text": "Perpendicular (90°) to the skin"}], "answer": "A", "rationale": "The needle is inserted bevel up. For a winged/butterfly needle a shallow angle of about 15° is used (15-30° generally); on vein entry there is decreased resistance and a flashback, after which the angle is reduced and the needle advanced slightly.", "section": "Venipuncture: Draw Technique / Materials", "topic": "Venipuncture"}, {"number": 4, "stem": "A dehydrated patient with a serum sodium of 158 mEq/L needs a maintenance fluid that will help lower the sodium gradually. The provider wants a hypotonic solution appropriate for hypernatremia. Which fluid best fits this goal?", "choices": [{"letter": "A", "text": "Normal saline (0.9%)"}, {"letter": "B", "text": "Lactated Ringer's"}, {"letter": "C", "text": "½ normal saline (0.45%)"}, {"letter": "D", "text": "D5 ½ NS (hypertonic)"}, {"letter": "E", "text": "Normal saline with 40 mEq KCl"}], "answer": "C", "rationale": "½ normal saline (0.45%) is hypotonic and is used for hypernatremia (and DKA). Normal saline and LR are isotonic and would not lower the sodium as effectively.", "section": "IV Placement: IV Fluid Solutions", "topic": "IV Placement"}, {"number": 5, "stem": "Shortly after the needle enters the arm, the clinician notices a rapidly enlarging, raised, bluish swelling at the puncture site, and blood flow into the tube slows. What is the most appropriate next step?", "choices": [{"letter": "A", "text": "Massage the site vigorously to disperse the blood"}, {"letter": "B", "text": "Reapply the tourniquet tightly and continue"}, {"letter": "C", "text": "Switch to a larger-gauge needle at the same site"}, {"letter": "D", "text": "Remove the needle and hold direct pressure over the site for about 15 minutes"}, {"letter": "E", "text": "Advance the needle further into the vein"}], "answer": "D", "rationale": "A rapidly forming swelling indicates a hematoma. Remove the needle immediately and hold direct pressure over the site for about 15 minutes; do not attempt to continue the draw at that site.", "section": "Venipuncture: Complications – Hematoma", "topic": "Venipuncture"}, {"number": 6, "stem": "A nurse is choosing a site for a peripheral IV in a patient likely to need access for several days. Both arms have suitable veins in the hand, forearm, and antecubital fossa. The nurse wants to preserve options for future attempts. Which site should generally be chosen first?", "choices": [{"letter": "A", "text": "The antecubital (most proximal) vein"}, {"letter": "B", "text": "The most distal/peripheral suitable vein"}, {"letter": "C", "text": "A vein on the same side as a prior mastectomy"}, {"letter": "D", "text": "The largest central vein available"}, {"letter": "E", "text": "A vein directly over the wrist joint"}], "answer": "B", "rationale": "Choose the most distal/peripheral suitable vein first; this preserves more proximal sites for later attempts if the first fails. Avoid joints/flexion points and impaired extremities.", "section": "IV Placement: Anatomy & Vein Selection", "topic": "IV Placement"}, {"number": 7, "stem": "A nurse needs to draw blood from a patient who has a continuous IV infusion running in the left forearm. The right arm has a suitable median cubital vein. The nurse is considering drawing just above the IV catheter for convenience. What is the most appropriate action?", "choices": [{"letter": "A", "text": "Stop the IV briefly and draw at the IV site"}, {"letter": "B", "text": "Draw from the right arm, opposite the IV"}, {"letter": "C", "text": "Draw a few centimeters above the running IV in the left arm"}, {"letter": "D", "text": "Use the IV catheter itself without flushing"}, {"letter": "E", "text": "Draw below the IV in the left arm"}], "answer": "B", "rationale": "Blood should never be drawn above a running IV because the specimen will be diluted/contaminated with infusate. Use the opposite arm (the right arm here) for an accurate sample.", "section": "Venipuncture: Cautions", "topic": "Venipuncture"}, {"number": 8, "stem": "A patient with major burns and hypovolemic shock requires aggressive fluid resuscitation. The team wants a balanced isotonic crystalloid containing electrolytes and a buffer, rather than plain saline. Which IV fluid is most appropriate?", "choices": [{"letter": "A", "text": "3% hypertonic saline"}, {"letter": "B", "text": "D5 ½ NS"}, {"letter": "C", "text": "½ normal saline (0.45%)"}, {"letter": "D", "text": "D5W (5% dextrose in water)"}, {"letter": "E", "text": "Lactated Ringer's"}], "answer": "E", "rationale": "Lactated Ringer's is an isotonic, electrolyte-balanced crystalloid with a lactate buffer, preferred for burns, shock, and metabolic acidosis. D5W and ½ NS are hypotonic and unsuitable for resuscitation.", "section": "IV Placement: IV Fluid Solutions", "topic": "IV Placement"}, {"number": 9, "stem": "During a difficult draw, the only easily palpable vein is on the medial aspect of the antecubital fossa. It is prominent but rolls easily and lies close to a pulsatile structure. The supervising provider cautions against using it unless no alternative exists. Why is the basilic vein considered the riskiest antecubital choice?", "choices": [{"letter": "A", "text": "It collapses immediately upon tourniquet release"}, {"letter": "B", "text": "It is located distal to the wrist"}, {"letter": "C", "text": "It lies very close to the brachial artery and median nerve and is poorly anchored"}, {"letter": "D", "text": "It cannot be used for blood cultures"}, {"letter": "E", "text": "It is too small to accommodate a 21-gauge needle"}], "answer": "C", "rationale": "The basilic vein is the most risky antecubital site because, although easy to palpate, it is poorly anchored and lies very close to the brachial artery and median nerve, raising the risk of arterial puncture and nerve injury.", "section": "Venipuncture: Anatomy – Vein Selection", "topic": "Venipuncture"}, {"number": 10, "stem": "A phlebotomy student is preparing to draw a CBC and BMP on a healthy 30-year-old man. Palpating the antecubital fossa, she identifies several veins and wants to choose the one that is best anchored, least painful, and least likely to bruise. Which vein is the preferred first choice?", "choices": [{"letter": "A", "text": "Great saphenous vein"}, {"letter": "B", "text": "Basilic vein"}, {"letter": "C", "text": "Dorsal metacarpal vein"}, {"letter": "D", "text": "Median cubital vein"}, {"letter": "E", "text": "Cephalic vein"}], "answer": "D", "rationale": "The median cubital vein is the first-choice venipuncture site: it is well anchored/stationary, usually the largest and most superficial vein in the antecubital fossa, least painful, and least likely to bruise, and it is not nestled among nerves and arteries.", "section": "Venipuncture: Anatomy – Vein Selection", "topic": "Venipuncture"}, {"number": 11, "stem": "A 25-year-old man arrives in the trauma bay after a motor vehicle collision, hypotensive and requiring rapid volume resuscitation and possible blood transfusion. The team asks you to place an IV that allows the fastest possible flow rates. Which catheter gauge is most appropriate?", "choices": [{"letter": "A", "text": "22 gauge"}, {"letter": "B", "text": "14-16 gauge"}, {"letter": "C", "text": "20 gauge"}, {"letter": "D", "text": "24 gauge"}, {"letter": "E", "text": "26 gauge"}], "answer": "B", "rationale": "A larger catheter has a smaller gauge number and faster flow. For trauma, blood products, and rapid fluid resuscitation, a 14-16 gauge (up to 18 g) catheter is preferred.", "section": "IV Placement: Catheter Gauge Sizing", "topic": "IV Placement"}, {"number": 12, "stem": "You are asked to start an IV on a 58-year-old woman scheduled for surgery. Her chart notes a left axillary lymph node dissection and chronic left-arm lymphedema. Her right arm has healthy, compressible veins. Where should the IV be placed?", "choices": [{"letter": "A", "text": "Right arm, avoiding the extremity with impaired circulation"}, {"letter": "B", "text": "A left-hand vein distal to the lymphedema"}, {"letter": "C", "text": "Left forearm, since it is closer to the surgical field"}, {"letter": "D", "text": "Defer and request a central line for all such patients"}, {"letter": "E", "text": "Either arm; lymphedema is not a contraindication"}], "answer": "A", "rationale": "An extremity with impaired circulation (mastectomy, axillary node dissection, lymphedema) is contraindicated for IV placement. Use the unaffected right arm.", "section": "IV Placement: Indications & Contraindications", "topic": "IV Placement"}, {"number": 13, "stem": "While attempting an antecubital draw, the clinician notes that the blood filling the tubing is unusually bright red and appears to pulse into the collection chamber. The patient reports throbbing at the site. What is the most appropriate management?", "choices": [{"letter": "A", "text": "Obtain the sample if needed, release the tourniquet, withdraw quickly, and hold firm pressure for 10 minutes"}, {"letter": "B", "text": "Advance the needle deeper to improve flow"}, {"letter": "C", "text": "Redirect the needle laterally to find a vein"}, {"letter": "D", "text": "Leave the needle in place and call for help before removing it"}, {"letter": "E", "text": "Continue the draw and apply a bandage with light pressure for 5 minutes"}], "answer": "A", "rationale": "Bright red, pulsatile blood indicates arterial puncture. Obtain the sample if needed, remove the tourniquet, withdraw the needle promptly, and hold firm direct pressure for about 10 minutes (longer than the usual venous 5 minutes) to prevent hematoma.", "section": "Venipuncture: Troubleshooting – Arterial Puncture", "topic": "Venipuncture"}, {"number": 14, "stem": "An IV has been running for an hour. The patient now reports pain and burning at the site. On exam the area around the catheter is swollen, cool, and firm, and the infusion is slowing. There is no blood return on aspiration. What is the most appropriate initial action?", "choices": [{"letter": "A", "text": "Flush vigorously with a large saline bolus"}, {"letter": "B", "text": "Reinsert the needle to reposition the catheter"}, {"letter": "C", "text": "Increase the infusion rate to push fluid past the blockage"}, {"letter": "D", "text": "Apply a tourniquet above the site and continue"}, {"letter": "E", "text": "Stop the infusion, remove the catheter, and reattempt proximal to the failed site"}], "answer": "E", "rationale": "Swelling, pain, coolness, and loss of blood return indicate extravasation (infusion into surrounding tissue from failed cannulation). Stop the infusion, remove the catheter, and reattempt at a site proximal to the failed one; caustic medications can cause tissue necrosis.", "section": "IV Placement: Complications – Extravasation", "topic": "IV Placement"}, {"number": 15, "stem": "A 62-year-old woman needs routine labs. She reports a right modified radical mastectomy with axillary lymph node dissection two years ago. Both antecubital fossae have palpable veins and intact skin. What is the most appropriate site selection?", "choices": [{"letter": "A", "text": "Perform an arterial puncture instead"}, {"letter": "B", "text": "Draw from either arm; prior mastectomy does not matter"}, {"letter": "C", "text": "Draw from the right arm since the veins are palpable"}, {"letter": "D", "text": "Draw from the left (contralateral) arm"}, {"letter": "E", "text": "Defer the draw and reschedule"}], "answer": "D", "rationale": "The upper extremity on the same side as a mastectomy (especially with axillary node dissection) is a contraindicated site due to lymphedema risk and impaired drainage. Use the contralateral (left) arm.", "section": "Venipuncture: Indications & Contraindications", "topic": "Venipuncture"}, {"number": 16, "stem": "A stable 45-year-old woman is admitted for IV antibiotics and maintenance fluids and may later need a CT with IV contrast. You want a versatile catheter suitable for blood or fluids at non-rapid rates that can also accommodate contrast if needed. Which gauge best fits this versatile role?", "choices": [{"letter": "A", "text": "14 gauge"}, {"letter": "B", "text": "24 gauge"}, {"letter": "C", "text": "22 gauge"}, {"letter": "D", "text": "20 gauge"}, {"letter": "E", "text": "16 gauge"}], "answer": "D", "rationale": "The 20-gauge catheter is the versatile choice: it handles blood and fluids at non-rapid rates and can be used for contrast (though not the preferred size for rapid contrast injection). 22 g is typically for children and 24 g for small infants.", "section": "IV Placement: Catheter Gauge Sizing", "topic": "IV Placement"}, {"number": 17, "stem": "Midway through a blood draw, a 19-year-old man becomes pale, diaphoretic, and lightheaded, and reports feeling like he might pass out. He is seated in a standard phlebotomy chair. What is the most appropriate immediate intervention?", "choices": [{"letter": "A", "text": "Continue the draw quickly before he faints"}, {"letter": "B", "text": "Place him in a seated forward-leaning position with head between knees only"}, {"letter": "C", "text": "Give him a caffeinated beverage"}, {"letter": "D", "text": "Have him stand up and walk to increase circulation"}, {"letter": "E", "text": "Lay him supine, lower his head, and elevate both legs above the trunk"}], "answer": "E", "rationale": "These are vasovagal presyncope symptoms. Place the patient supine, lower the head, and raise both legs above the trunk to restore cerebral perfusion. Prevention includes having the patient drink ~16 oz of water beforehand.", "section": "Venipuncture: Complications – Vasovagal Syncope", "topic": "Venipuncture"}, {"number": 18, "stem": "A clinician attempts a draw on a patient with difficult veins and is unsuccessful. A second attempt on a different vein also fails to yield blood. The patient is becoming anxious. What is the most appropriate next step?", "choices": [{"letter": "A", "text": "Reuse the original site immediately with a larger needle"}, {"letter": "B", "text": "Apply a tourniquet for 5 minutes to engorge the veins, then retry the same spot"}, {"letter": "C", "text": "Switch to an arterial puncture"}, {"letter": "D", "text": "Stop after the two unsuccessful attempts and ask a colleague for help"}, {"letter": "E", "text": "Attempt a third and fourth stick at the original site"}], "answer": "D", "rationale": "After two unsuccessful attempts, the clinician should stop and ask for help. A previously punctured site should not be reused until healed, and a tourniquet should never be left on longer than 1-2 minutes.", "section": "Venipuncture: Troubleshooting – Failed Attempts", "topic": "Venipuncture"}, {"number": 19, "stem": "A hospitalized patient has had the same peripheral IV in place for 4 days. The nurse is reviewing routine line care to reduce the risk of phlebitis and catheter-related infection, and the site currently looks intact. What is the recommended routine practice for the peripheral line?", "choices": [{"letter": "A", "text": "Leave it until it fails, regardless of duration"}, {"letter": "B", "text": "Flush with heparin every hour to keep it patent"}, {"letter": "C", "text": "Routinely change (resite) the peripheral line every 3-4 days"}, {"letter": "D", "text": "Change it only if the patient develops a fever"}, {"letter": "E", "text": "Replace it every 12 hours"}], "answer": "C", "rationale": "Peripheral IV lines should be routinely changed every 3-4 days to prevent infection and phlebitis; leaving a catheter in beyond about 72-96 hours increases the risk of local infection and thrombophlebitis.", "section": "IV Placement: Aftercare / Complications", "topic": "IV Placement"}, {"number": 20, "stem": "A clinician has just filled the final collection tube of a multi-tube venous draw. The tourniquet is still applied, and the needle remains in the vein. What is the correct sequence to finish safely?", "choices": [{"letter": "A", "text": "Release the tourniquet, remove the last tube from the holder, then withdraw the needle and place it in the sharps container"}, {"letter": "B", "text": "Remove the needle and recap it before disposal"}, {"letter": "C", "text": "Remove the needle first, then remove the last tube"}, {"letter": "D", "text": "Leave the tourniquet on until pressure has been held for 5 minutes"}, {"letter": "E", "text": "Withdraw the needle with the tube still attached, then release the tourniquet"}], "answer": "A", "rationale": "Release the tourniquet when the last tube finishes, then remove the tube from the holder BEFORE removing the needle, and immediately place the needle in the sharps container. Removing the needle with a tube still engaged risks a blood-flow/vacuum problem, and recapping is unsafe.", "section": "Venipuncture: Draw Technique", "topic": "Venipuncture"}];
let current = 0;
let responses = Array(questions.length).fill(null);
let graded = Array(questions.length).fill(false);
let reviewMode = false;
let reviewList = [];
let reviewPos = 0;

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function activeIndex(){
  return reviewMode ? reviewList[reviewPos] : current;
}

function renderQuestion(){
  const idx = activeIndex();
  const q = questions[idx];
  document.getElementById('results').classList.remove('show');
  document.getElementById('examCard').style.display='block';
  document.getElementById('qnum').textContent = reviewMode
    ? `Missed Question ${reviewPos+1} of ${reviewList.length}`
    : `Question ${idx+1} of ${questions.length}`;
  document.getElementById('status').textContent = graded[idx] ? 'Answered' : 'Not answered';
  document.getElementById('stem').textContent = q.stem;
  const choices = document.getElementById('choices');
  choices.innerHTML = '';
  q.choices.forEach(ch => {
    const b = document.createElement('button');
    b.className = 'choice';
    b.type = 'button';
    b.innerHTML = `<span class="letter">${ch.letter}</span><span>${esc(ch.text)}</span>`;
    if (responses[idx] === ch.letter) b.classList.add('selected');
    if (graded[idx]) {
      b.disabled = true;
      if (ch.letter === q.answer) b.classList.add('correct');
      if (responses[idx] === ch.letter && ch.letter !== q.answer) b.classList.add('incorrect');
    }
    b.onclick = () => selectChoice(ch.letter);
    choices.appendChild(b);
  });
  showFeedback(idx);
  const isLast = reviewMode ? reviewPos === reviewList.length-1 : current === questions.length-1;
  document.getElementById('checkBtn').style.display = graded[idx] ? 'none' : 'inline-block';
  document.getElementById('nextBtn').style.display = isLast ? 'none' : 'inline-block';
  document.getElementById('submitBtn').style.display = (!reviewMode && isLast) ? 'inline-block' : 'none';
  document.getElementById('nextBtn').disabled = !graded[idx];
  document.getElementById('submitBtn').disabled = !graded[idx];
  document.getElementById('checkBtn').disabled = responses[idx] === null;
  const prog = reviewMode ? ((reviewPos+1)/reviewList.length)*100 : ((current+1)/questions.length)*100;
  document.getElementById('progress').style.width = prog+'%';
}

function selectChoice(letter){
  const idx = activeIndex();
  if (graded[idx]) return;
  responses[idx] = letter;
  renderQuestion();
}

function checkAnswer(){
  const idx = activeIndex();
  if (responses[idx] === null) return;
  graded[idx] = true;
  renderQuestion();
}

function showFeedback(idx){
  const box = document.getElementById('feedback');
  if (!graded[idx]) {
    box.className='feedback';
    box.innerHTML='';
    return;
  }
  const q = questions[idx];
  const ok = responses[idx] === q.answer;
  box.className = 'feedback show ' + (ok ? 'good' : 'bad');
  box.innerHTML = `
    <h3>${ok ? 'Correct' : 'Incorrect'}</h3>
    <p><strong>Correct answer:</strong> ${q.answer}</p>
    <p class="objective"><strong>Objective:</strong> ${esc(q.section || 'Not specified')}</p>
    <p><strong>Rationale:</strong> ${esc(q.rationale || 'No rationale provided.')}</p>`;
}

function nextQuestion(){
  if (reviewMode) {
    reviewPos++;
  } else {
    current++;
  }
  renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

function submitExam(){
  const total = questions.length;
  const correct = questions.reduce((n,q,i)=> n + (responses[i]===q.answer ? 1:0),0);
  const pct = Math.round((correct/total)*100);
  document.getElementById('examCard').style.display='none';
  const results = document.getElementById('results');
  results.classList.add('show');
  document.getElementById('percentScore').textContent = pct+'%';
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('totalCount').textContent = total;

  const stats = {};
  questions.forEach((q,i)=>{
    if(!stats[q.topic]) stats[q.topic]={correct:0,total:0};
    stats[q.topic].total++;
    if(responses[i]===q.answer) stats[q.topic].correct++;
  });
  const rows = Object.entries(stats).map(([topic,s])=>({
    topic, correct:s.correct,total:s.total,pct:Math.round(100*s.correct/s.total)
  })).sort((a,b)=>b.pct-a.pct || a.topic.localeCompare(b.topic));
  document.getElementById('topicBody').innerHTML = rows.map(r =>
    `<tr><td>${esc(r.topic)}</td><td>${r.correct}</td><td>${r.total}</td><td>${r.pct}%</td></tr>`
  ).join('');
  const best = rows[0], weakest = rows[rows.length-1];
  document.getElementById('strengthBanner').innerHTML =
    `<strong>Strongest:</strong> ${esc(best.topic)} (${best.pct}%) &nbsp; • &nbsp; <strong>Weakest:</strong> ${esc(weakest.topic)} (${weakest.pct}%)`;
  document.getElementById('progress').style.width='100%';
  window.scrollTo({top:0,behavior:'smooth'});
}

function reviewMissed(){
  reviewList = questions.map((q,i)=>responses[i]!==q.answer ? i : -1).filter(i=>i>=0);
  if(reviewList.length===0){
    alert('No missed questions to review.');
    return;
  }
  reviewMode = true;
  reviewPos = 0;
  renderQuestion();
}

function restartExam(){
  if(!confirm('Reset the exam and clear all answers?')) return;
  current=0; responses=Array(questions.length).fill(null); graded=Array(questions.length).fill(false);
  reviewMode=false; reviewList=[]; reviewPos=0;
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
