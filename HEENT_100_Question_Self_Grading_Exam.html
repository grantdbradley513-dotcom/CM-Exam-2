t": "Supportive care without antibiotics", "rationale": "Acute viral rhinitis/rhinosinusitis is treated symptomatically. Antibiotics are not indicated without bacterial features.", "objective": "Nose & Sinus Disorders, Obj. 1a/1b", "topic": "Nose & Sinus Disorders"}, {"number": 89, "stem": "A 22-year-old woman who stores contact lenses in tap water presents with intense unilateral eye pain. The pain is much worse than expected from the initial examination. Slit-lamp evaluation later demonstrates a ring-shaped corneal infiltrate. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Viral conjunctivitis"}, {"letter": "B", "text": "Anterior uveitis"}, {"letter": "C", "text": "Acanthamoeba keratitis"}, {"letter": "D", "text": "Episcleritis"}, {"letter": "E", "text": "Acute angle-closure glaucoma"}], "correct": "C", "answerText": "Acanthamoeba keratitis", "rationale": "Water exposure with contact lenses, pain out of proportion, and a ring infiltrate are classic for Acanthamoeba keratitis.", "objective": "External Eye Disorders, Obj. 7", "topic": "External Eye Disorders"}, {"number": 90, "stem": "A 35-year-old man with ankylosing spondylitis presents with eye pain, photophobia, and blurred vision. Examination shows ciliary flush, and slit-lamp examination reveals leukocytes in the anterior chamber. Which initial treatment is most appropriate?", "options": [{"letter": "A", "text": "Oral antihistamines"}, {"letter": "B", "text": "Topical antiviral therapy only"}, {"letter": "C", "text": "Topical prednisolone plus a cycloplegic"}, {"letter": "D", "text": "Laser photocoagulation"}, {"letter": "E", "text": "Warm compresses"}], "correct": "C", "answerText": "Topical prednisolone plus a cycloplegic", "rationale": "Anterior uveitis is treated with topical glucocorticoids and cycloplegic dilation to reduce pain and prevent posterior synechiae.", "objective": "External Eye Disorders, Obj. 10", "topic": "External Eye Disorders"}, {"number": 91, "stem": "A 52-year-old woman with rheumatoid arthritis reports deep boring eye pain that radiates to her temple and worsens with eye movement. She has photophobia, decreased visual acuity, and a bluish hue to the sclera. Phenylephrine does not blanch the involved vessels. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Blepharitis"}, {"letter": "B", "text": "Scleritis"}, {"letter": "C", "text": "Allergic conjunctivitis"}, {"letter": "D", "text": "Subconjunctival hemorrhage"}, {"letter": "E", "text": "Episcleritis"}], "correct": "B", "answerText": "Scleritis", "rationale": "Severe boring pain, systemic autoimmune association, decreased vision, and nonblanching deep vessels indicate scleritis.", "objective": "External Eye Disorders, Obj. 10", "topic": "External Eye Disorders"}, {"number": 92, "stem": "A 2-year-old has fever, irritability, and ear pain. Otoscopy shows a bulging, opaque tympanic membrane with decreased mobility. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Otitis externa"}, {"letter": "B", "text": "Cerumen impaction"}, {"letter": "C", "text": "Otosclerosis"}, {"letter": "D", "text": "Otitis media with effusion"}, {"letter": "E", "text": "Acute otitis media"}], "correct": "E", "answerText": "Acute otitis media", "rationale": "A bulging tympanic membrane with acute symptoms is the key finding in acute otitis media.", "objective": "Ear Disorders, Obj. 4", "topic": "Ear Disorders"}, {"number": 93, "stem": "A 72-year-old hyperopic woman develops sudden severe right-eye pain and blurred vision after taking an over-the-counter decongestant. She sees halos around lights and has nausea. Examination shows a firm globe, steamy cornea, ciliary flush, and a mid-dilated nonreactive pupil. What is the next best step?", "options": [{"letter": "A", "text": "Discharge with artificial tears"}, {"letter": "B", "text": "Emergent ophthalmology treatment with acetazolamide and laser iridotomy"}, {"letter": "C", "text": "Patch the eye for 24 hours"}, {"letter": "D", "text": "Begin erythromycin ointment"}, {"letter": "E", "text": "Schedule outpatient cataract surgery"}], "correct": "B", "answerText": "Emergent ophthalmology treatment with acetazolamide and laser iridotomy", "rationale": "This is acute angle-closure glaucoma, an ophthalmologic emergency. Rapid IOP reduction and definitive peripheral iridotomy are required.", "objective": "External Eye Disorders, Obj. 9", "topic": "External Eye Disorders"}, {"number": 94, "stem": "A 26-year-old construction worker is struck by a high-velocity metal fragment. He has decreased vision, a teardrop-shaped pupil, and extrusion of ocular contents. What is the next best step?", "options": [{"letter": "A", "text": "Apply topical anesthetic and discharge"}, {"letter": "B", "text": "Remove the object at bedside"}, {"letter": "C", "text": "Measure IOP with tonometry"}, {"letter": "D", "text": "Place a rigid eye shield, avoid pressure, and obtain emergent ophthalmology consultation"}, {"letter": "E", "text": "Patch both eyes tightly"}], "correct": "D", "answerText": "Place a rigid eye shield, avoid pressure, and obtain emergent ophthalmology consultation", "rationale": "These are signs of open-globe rupture. Avoid manipulation or tonometry, shield the eye, provide systemic antibiotics and antiemetics, and arrange emergency repair.", "objective": "External Eye Disorders, Obj. 15", "topic": "External Eye Disorders"}, {"number": 95, "stem": "A 6-year-old has fever, irritability, painful diffuse gingivitis, and multiple vesicles and ulcers throughout the mouth. Several days earlier, a family member had a cold sore. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Primary herpetic gingivostomatitis"}, {"letter": "B", "text": "Aphthous stomatitis"}, {"letter": "C", "text": "Peritonsillar abscess"}, {"letter": "D", "text": "Leukoplakia"}, {"letter": "E", "text": "Oral candidiasis"}], "correct": "A", "answerText": "Primary herpetic gingivostomatitis", "rationale": "Primary HSV infection in children causes fever, diffuse gingivitis, and widespread painful oral vesicles and ulcers.", "objective": "Diseases of the Oropharynx, Oral Cavity & Pharynx", "topic": "Diseases of the Oropharynx"}, {"number": 96, "stem": "A patient has right-sided conductive hearing loss. Weber testing lateralizes to the right ear, and Rinne testing on the right shows bone conduction greater than air conduction. Which underlying problem is most consistent?", "options": [{"letter": "A", "text": "Multiple sclerosis"}, {"letter": "B", "text": "Presbycusis"}, {"letter": "C", "text": "Aminoglycoside toxicity"}, {"letter": "D", "text": "Cerumen impaction"}, {"letter": "E", "text": "Acoustic neuroma"}], "correct": "D", "answerText": "Cerumen impaction", "rationale": "Conductive loss lateralizes Weber to the affected ear and produces an abnormal Rinne test with BC greater than AC; cerumen is a common cause.", "objective": "Cochleovestibular Disorders, Obj. 3/4", "topic": "Cochleovestibular Disorders"}, {"number": 97, "stem": "A 33-year-old with chronic rhinosinusitis has bilateral pale translucent nasal masses and decreased smell. He also has asthma and sensitivity to aspirin. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Juvenile angiofibroma"}, {"letter": "B", "text": "Nasal polyps"}, {"letter": "C", "text": "Septal hematoma"}, {"letter": "D", "text": "Inverted papilloma"}, {"letter": "E", "text": "Squamous cell carcinoma"}], "correct": "B", "answerText": "Nasal polyps", "rationale": "Bilateral pale polyps are associated with chronic inflammation, asthma, and aspirin-exacerbated respiratory disease.", "objective": "Nose & Sinus Disorders, Obj. 1g", "topic": "Nose & Sinus Disorders"}, {"number": 98, "stem": "A 42-year-old patient meets clinical criteria for uncomplicated acute bacterial rhinosinusitis. He has no recent antibiotics and no severe penicillin allergy. Which initial antimicrobial is preferred?", "options": [{"letter": "A", "text": "Amoxicillin-clavulanate"}, {"letter": "B", "text": "Azithromycin"}, {"letter": "C", "text": "Topical mupirocin"}, {"letter": "D", "text": "Metronidazole alone"}, {"letter": "E", "text": "Ciprofloxacin"}], "correct": "A", "answerText": "Amoxicillin-clavulanate", "rationale": "Amoxicillin-clavulanate is standard first-line therapy for uncomplicated ABRS because it covers common respiratory pathogens and beta-lactamase producers.", "objective": "Nose & Sinus Disorders, Obj. 1b/1c", "topic": "Nose & Sinus Disorders"}, {"number": 99, "stem": "A 2-month-old infant has persistent tearing from one eye but is otherwise well. Pressure over the lacrimal sac causes reflux through the punctum. There is no fever or surrounding cellulitis. What is the best initial management?", "options": [{"letter": "A", "text": "Nasolacrimal duct massage"}, {"letter": "B", "text": "Orbital CT"}, {"letter": "C", "text": "Topical steroid drops"}, {"letter": "D", "text": "IV vancomycin"}, {"letter": "E", "text": "Immediate dacryocystorhinostomy"}], "correct": "A", "answerText": "Nasolacrimal duct massage", "rationale": "Congenital dacryostenosis is initially managed with lacrimal sac massage; persistent obstruction may later require probing.", "objective": "External Eye Disorders, Obj. 5", "topic": "External Eye Disorders"}, {"number": 100, "stem": "A 58-year-old experiences brief spinning episodes lasting less than a minute when rolling over in bed. There is no hearing loss or neurologic deficit. Dix-Hallpike testing reproduces symptoms with fatigable torsional nystagmus. What is the best treatment?", "options": [{"letter": "A", "text": "IV antibiotics"}, {"letter": "B", "text": "Cochlear implant"}, {"letter": "C", "text": "Epley canalith-repositioning maneuver"}, {"letter": "D", "text": "Low-salt diet alone"}, {"letter": "E", "text": "Long-term meclizine therapy"}], "correct": "C", "answerText": "Epley canalith-repositioning maneuver", "rationale": "BPPV causes brief positional vertigo without hearing loss and responds to canalith repositioning.", "objective": "Cochleovestibular Disorders, Obj. 6", "topic": "Cochleovestibular Disorders"}];
let current=0, submitted=false, reviewMode=false, reviewIndices=[];
const state=questions.map(()=>({selected:null,locked:false}));
const $=id=>document.getElementById(id);
function activeIndices(){return reviewMode?reviewIndices:questions.map((_,i)=>i)}
function realIndex(){return reviewMode?reviewIndices[current]:current}
function render(){
 const idx=realIndex(),q=questions[idx],s=state[idx],indices=activeIndices();
 $('qNumber').textContent=`Question ${reviewMode?current+1:q.number} of ${indices.length}`;
 $('answeredCount').textContent=`${state.filter(x=>x.locked).length} answered`;
 $('stem').textContent=q.stem; $('options').innerHTML='';
 q.options.forEach(opt=>{const b=document.createElement('button');b.className='option';b.disabled=s.locked||submitted;b.innerHTML=`<span class="letter">${opt.letter}</span><span>${escapeHtml(opt.text)}</span>`;
  if(s.selected===opt.letter)b.classList.add('selected');
  if(s.locked||submitted){if(opt.letter===q.correct)b.classList.add('correct');if(s.selected===opt.letter&&opt.letter!==q.correct)b.classList.add('incorrect')}
  b.onclick=()=>selectAnswer(idx,opt.letter);$('options').appendChild(b)});
 showFeedback(q,s); $('prevBtn').disabled=current===0; const isLast=current===indices.length-1;
 $('nextBtn').classList.toggle('hidden',isLast); $('submitBtn').classList.toggle('hidden',!isLast||reviewMode);
 $('submitBtn').disabled=!state.every(x=>x.locked);
 $('progressBar').style.width=`${((current+1)/indices.length)*100}%`; $('statusPill').textContent=reviewMode?`${indices.length} Missed`:`${questions.length} Questions`;
}
function escapeHtml(v){return v.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function selectAnswer(idx,letter){if(state[idx].locked||submitted)return;state[idx].selected=letter;state[idx].locked=true;render()}
function showFeedback(q,s){const f=$('feedback');f.className='feedback';if(!s.locked&&!submitted)return;const good=s.selected===q.correct;f.classList.add('show',good?'good':'bad');$('feedbackTitle').textContent=good?'Correct':'Incorrect';$('rationale').textContent=`Correct answer: ${q.correct} — ${q.answerText}. ${q.rationale}`;$('objective').textContent=`Objective: ${q.objective}`}
$('nextBtn').onclick=()=>{if(current<activeIndices().length-1){current++;render();scrollToTop()}};
$('prevBtn').onclick=()=>{if(current>0){current--;render();scrollToTop()}};
$('submitBtn').onclick=submitExam;
function submitExam(){if(!state.every(x=>x.locked))return;submitted=true;const correct=questions.reduce((n,q,i)=>n+(state[i].selected===q.correct),0);$('percentScore').textContent=Math.round(correct/questions.length*100)+'%';$('rawScore').textContent=`${correct} correct out of ${questions.length}`;
 const groups={};questions.forEach((q,i)=>{groups[q.topic]??={correct:0,total:0};groups[q.topic].total++;if(state[i].selected===q.correct)groups[q.topic].correct++});const rows=Object.entries(groups).map(([topic,v])=>({topic,...v,pct:Math.round(v.correct/v.total*100)})).sort((a,b)=>b.pct-a.pct||a.topic.localeCompare(b.topic));$('analyticsBody').innerHTML=rows.map((r,i)=>`<tr><td>${escapeHtml(r.topic)}</td><td>${r.correct} / ${r.total}</td><td>${r.pct}%</td><td class="strength">${i===0?'Strongest':i===rows.length-1?'Weakest':'—'}</td></tr>`).join('');$('questionView').classList.add('hidden');$('resultsView').classList.add('show');$('progressBar').style.width='100%';$('statusPill').textContent='Completed';scrollToTop()}
$('reviewMissedBtn').onclick=()=>{reviewIndices=questions.map((q,i)=>state[i].selected===q.correct?null:i).filter(i=>i!==null);if(!reviewIndices.length){alert('No missed questions to review.');return}reviewMode=true;current=0;$('resultsView').classList.remove('show');$('questionView').classList.remove('hidden');$('reviewBanner').classList.add('show');render();scrollToTop()};
$('restartBtn').onclick=()=>{if(!confirm('Reset all answers and start over?'))return;state.forEach(s=>{s.selected=null;s.locked=false});current=0;submitted=false;reviewMode=false;reviewIndices=[];$('resultsView').classList.remove('show');$('questionView').classList.remove('hidden');$('reviewBanner').classList.remove('show');render();scrollToTop()};
function scrollToTop(){window.scrollTo({top:0,behavior:'smooth'})}
render();
</script>
</body></html>
