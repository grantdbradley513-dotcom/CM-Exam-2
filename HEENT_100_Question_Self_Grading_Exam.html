<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>HEENT High-Yield Practice Exam</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#152238;--muted:#607086;--line:#d9e2ee;--navy:#173b67;--blue:#2d6cdf;--green:#17864b;--greenbg:#e9f8ef;--red:#c43a3a;--redbg:#fff0f0;--purple:#6d4bc3;--shadow:0 14px 38px rgba(23,59,103,.10)}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#edf3fb 0,#f7f9fc 280px);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);font-size:18px;line-height:1.55}
button,input{font:inherit} .shell{max-width:940px;margin:auto;padding:22px 16px 50px} .topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:14px} .brand{font-weight:800;color:var(--navy);letter-spacing:.1px} .pill{background:#e8eef8;color:var(--navy);border-radius:999px;padding:7px 12px;font-weight:700;font-size:.88rem}
.progress-track{height:10px;background:#dfe7f1;border-radius:999px;overflow:hidden;margin:10px 0 20px} .progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .25s ease}
.card{background:var(--card);border:1px solid rgba(217,226,238,.95);border-radius:20px;box-shadow:var(--shadow);padding:clamp(20px,4vw,38px)} .qmeta{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:.92rem;font-weight:700;margin-bottom:18px} .stem{font-size:clamp(1.08rem,2.4vw,1.30rem);font-weight:650;line-height:1.58;margin:0 0 24px;white-space:pre-wrap}
.options{display:grid;gap:12px} .option{width:100%;text-align:left;border:2px solid var(--line);background:#fff;color:var(--ink);border-radius:14px;padding:14px 16px;display:flex;gap:13px;align-items:flex-start;cursor:pointer;transition:.15s ease} .option:hover:not(:disabled){border-color:#8baee5;transform:translateY(-1px)} .letter{display:grid;place-items:center;flex:0 0 34px;height:34px;border-radius:50%;background:#edf2f9;color:var(--navy);font-weight:800} .option.selected{border-color:var(--blue);background:#f1f6ff} .option.correct{border-color:var(--green);background:var(--greenbg)} .option.incorrect{border-color:var(--red);background:var(--redbg)} .option:disabled{cursor:default}
.feedback{display:none;margin-top:20px;border-radius:14px;padding:16px 18px;border-left:5px solid} .feedback.show{display:block} .feedback.good{background:var(--greenbg);border-color:var(--green)} .feedback.bad{background:var(--redbg);border-color:var(--red)} .feedback-title{font-weight:850;margin-bottom:5px} .objective{margin-top:10px;color:#4e5f73;font-size:.94rem}
.controls{display:flex;justify-content:space-between;gap:12px;margin-top:22px;flex-wrap:wrap} .btn{border:0;border-radius:12px;padding:12px 18px;font-weight:800;cursor:pointer} .btn-primary{background:var(--navy);color:#fff} .btn-secondary{background:#e8eef7;color:var(--navy)} .btn-accent{background:var(--purple);color:#fff} .btn:disabled{opacity:.45;cursor:not-allowed}
.results{display:none} .results.show{display:block} .scorebox{text-align:center;padding:8px 0 24px} .score{font-size:clamp(3rem,9vw,5.2rem);line-height:1;font-weight:900;color:var(--navy)} .scoreline{color:var(--muted);font-weight:700;margin-top:10px} .analytics{width:100%;border-collapse:collapse;margin-top:14px;font-size:.96rem} .analytics th,.analytics td{padding:11px 9px;border-bottom:1px solid var(--line);text-align:left} .analytics th{color:var(--muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.06em} .strength{font-weight:800} .report{margin-top:24px;background:#f6f8fb;border:1px solid var(--line);border-radius:14px;padding:15px;color:#526176;font-size:.9rem} .hidden{display:none!important}
.review-banner{display:none;background:#fff6dd;border:1px solid #f0d27a;border-radius:12px;padding:10px 14px;margin-bottom:14px;font-weight:750;color:#6e5614} .review-banner.show{display:block}
@media(max-width:600px){body{font-size:16px}.shell{padding:12px 10px 35px}.card{border-radius:15px;padding:18px 14px}.option{padding:12px 10px}.controls .btn{flex:1 1 42%}.analytics{font-size:.83rem}.analytics th,.analytics td{padding:9px 5px}}
@media print{body{background:#fff}.controls,.progress-track,.topbar{display:none}.card{box-shadow:none;border:0}}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar"><div class="brand">HEENT High-Yield Practice Exam</div><div class="pill" id="statusPill">100 Questions</div></div>
  <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
  <div class="review-banner" id="reviewBanner">Reviewing missed questions</div>
  <main class="card" id="examCard">
    <div id="questionView">
      <div class="qmeta"><span id="qNumber"></span><span id="answeredCount"></span></div>
      <p class="stem" id="stem"></p>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"><div class="feedback-title" id="feedbackTitle"></div><div id="rationale"></div><div class="objective" id="objective"></div></div>
      <div class="controls"><button class="btn btn-secondary" id="prevBtn">Previous</button><button class="btn btn-primary" id="nextBtn">Next</button><button class="btn btn-accent hidden" id="submitBtn">Submit Exam</button></div>
    </div>
    <section class="results" id="resultsView">
      <div class="scorebox"><div class="score" id="percentScore"></div><div class="scoreline" id="rawScore"></div></div>
      <h2>Section Performance</h2><table class="analytics"><thead><tr><th>Section</th><th>Correct</th><th>Score</th><th>Performance</th></tr></thead><tbody id="analyticsBody"></tbody></table>
      <div class="controls"><button class="btn btn-accent" id="reviewMissedBtn">Review Missed Questions</button><button class="btn btn-secondary" id="restartBtn">Reset Exam</button></div>
      <div class="report"><strong>Import Verification</strong><br>Questions found: 100<br>Questions imported: 100<br>Questions that could not be parsed: None</div>
    </section>
  </main>
</div>
<script>
const questions=[{"number": 1, "stem": "A 60-year-old patient with long-standing diabetes has progressive visual blurring. Fundoscopy shows microaneurysms, dot-blot hemorrhages, and hard exudates without neovascularization. Which stage is most likely?", "options": [{"letter": "A", "text": "Wet macular degeneration"}, {"letter": "B", "text": "Proliferative diabetic retinopathy"}, {"letter": "C", "text": "Hypertensive emergency retinopathy"}, {"letter": "D", "text": "Central retinal vein occlusion"}, {"letter": "E", "text": "Nonproliferative diabetic retinopathy"}], "correct": "E", "answerText": "Nonproliferative diabetic retinopathy", "rationale": "Microaneurysms, intraretinal hemorrhages, and hard exudates without neovascularization indicate nonproliferative diabetic retinopathy.", "objective": "External Eye Disorders, Obj. 14", "topic": "External Eye Disorders"}, {"number": 2, "stem": "A 12-year-old with recurrent ear infections has chronic foul-smelling otorrhea and conductive hearing loss. Otoscopy shows a pearly white keratinous mass in a retraction pocket. What is the definitive treatment?", "options": [{"letter": "A", "text": "Observation only"}, {"letter": "B", "text": "Long-term antihistamines"}, {"letter": "C", "text": "Surgical removal"}, {"letter": "D", "text": "Epley maneuver"}, {"letter": "E", "text": "Cochlear implantation as first step"}], "correct": "C", "answerText": "Surgical removal", "rationale": "A cholesteatoma is a destructive keratinizing lesion that requires surgical eradication to prevent ossicular and intracranial complications.", "objective": "Ear Disorders, Obj. 4", "topic": "Ear Disorders"}, {"number": 3, "stem": "A 59-year-old man develops ptosis, a dilated pupil, and an eye positioned down and out. He also reports a new severe headache. Which cranial nerve is affected?", "options": [{"letter": "A", "text": "CN IV"}, {"letter": "B", "text": "CN III"}, {"letter": "C", "text": "CN V1"}, {"letter": "D", "text": "CN VII"}, {"letter": "E", "text": "CN VI"}], "correct": "B", "answerText": "CN III", "rationale": "A third-nerve palsy impairs most extraocular movements and parasympathetic pupillary constriction, producing a down-and-out eye, ptosis, and mydriasis.", "objective": "External Eye Disorders, Obj. 11", "topic": "External Eye Disorders"}, {"number": 4, "stem": "A 39-year-old develops continuous severe vertigo, nausea, and unidirectional horizontal nystagmus after a viral illness. Hearing is normal, and there are no focal neurologic deficits. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Labyrinthitis"}, {"letter": "B", "text": "Vestibular neuritis"}, {"letter": "C", "text": "Cerebellar stroke"}, {"letter": "D", "text": "BPPV"}, {"letter": "E", "text": "Meniere disease"}], "correct": "B", "answerText": "Vestibular neuritis", "rationale": "Vestibular neuritis causes acute prolonged peripheral vertigo without hearing loss, often after a viral syndrome.", "objective": "Cochleovestibular Disorders, Obj. 6", "topic": "Cochleovestibular Disorders"}, {"number": 5, "stem": "A 33-year-old woman has slowly progressive conductive hearing loss, normal otoscopy, and a family history of similar symptoms. Audiometry shows an air-bone gap. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Vestibular neuritis"}, {"letter": "B", "text": "Otosclerosis"}, {"letter": "C", "text": "Noise-induced hearing loss"}, {"letter": "D", "text": "Presbycusis"}, {"letter": "E", "text": "Acoustic neuroma"}], "correct": "B", "answerText": "Otosclerosis", "rationale": "Otosclerosis causes stapes fixation and progressive conductive hearing loss with a normal-appearing tympanic membrane.", "objective": "Ear Disorders, Obj. 4", "topic": "Ear Disorders"}, {"number": 6, "stem": "A 34-year-old woman scratches her eye while gardening. She has tearing, photophobia, and foreign-body sensation. Fluorescein staining shows a linear epithelial defect, and pain improves after a topical anesthetic in the clinic. Which discharge plan is appropriate?", "options": [{"letter": "A", "text": "No follow-up despite contact-lens use"}, {"letter": "B", "text": "Topical anesthetic every two hours at home"}, {"letter": "C", "text": "Topical steroid monotherapy"}, {"letter": "D", "text": "Immediate laser photocoagulation"}, {"letter": "E", "text": "Topical erythromycin and no home topical anesthetic"}], "correct": "E", "answerText": "Topical erythromycin and no home topical anesthetic", "rationale": "Corneal abrasions are treated with prophylactic topical antibiotics and pain control. Topical anesthetics should not be prescribed for home use because of corneal toxicity.", "objective": "External Eye Disorders, Obj. 15", "topic": "External Eye Disorders"}, {"number": 7, "stem": "A 45-year-old factory worker reports gradual bilateral difficulty hearing high-pitched speech and chronic tinnitus. He has worked around loud machinery for 20 years without consistent ear protection. Otoscopy is normal. Which pattern is most likely on audiometry?", "options": [{"letter": "A", "text": "Unilateral conductive loss with a large air-bone gap"}, {"letter": "B", "text": "Normal thresholds at all frequencies"}, {"letter": "C", "text": "Fluctuating unilateral mixed loss"}, {"letter": "D", "text": "Bilateral high-frequency sensorineural hearing loss"}, {"letter": "E", "text": "Low-frequency conductive loss only"}], "correct": "D", "answerText": "Bilateral high-frequency sensorineural hearing loss", "rationale": "Chronic noise exposure damages cochlear hair cells and typically causes bilateral high-frequency SNHL.", "objective": "Cochleovestibular Disorders, Obj. 1", "topic": "Cochleovestibular Disorders"}, {"number": 8, "stem": "A 15-year-old has rapid swelling of the lateral upper eyelid after a viral syndrome. Examination shows an S-shaped ptosis, chemosis, and a tender preauricular node. Which structure is inflamed?", "options": [{"letter": "A", "text": "Lacrimal gland"}, {"letter": "B", "text": "Lacrimal sac"}, {"letter": "C", "text": "Optic disc"}, {"letter": "D", "text": "Ciliary body"}, {"letter": "E", "text": "Meibomian gland"}], "correct": "A", "answerText": "Lacrimal gland", "rationale": "Dacryoadenitis involves the superolateral lacrimal gland and can produce S-shaped ptosis and lateral upper-lid swelling.", "objective": "External Eye Disorders, Obj. 5", "topic": "External Eye Disorders"}, {"number": 9, "stem": "A 19-year-old with seasonal symptoms reports intense nasal itching, sneezing, clear rhinorrhea, and itchy watery eyes. Examination shows pale boggy turbinates and allergic shiners. Which medication is the most effective first-line controller?", "options": [{"letter": "A", "text": "Topical nasal antibiotic"}, {"letter": "B", "text": "Oral acyclovir"}, {"letter": "C", "text": "Systemic antifungal"}, {"letter": "D", "text": "Oral amoxicillin"}, {"letter": "E", "text": "Intranasal corticosteroid"}], "correct": "E", "answerText": "Intranasal corticosteroid", "rationale": "Allergic rhinitis is IgE-mediated, and intranasal corticosteroids provide the best overall symptom control.", "objective": "Nose & Sinus Disorders, Obj. 1a", "topic": "Nose & Sinus Disorders"}, {"number": 10, "stem": "A 24-year-old contact-lens wearer presents with unilateral eye pain, photophobia, and redness after sleeping in her lenses. Visual acuity is reduced, and slit-lamp examination shows a round white corneal infiltrate with a small hypopyon. Which empiric treatment is most appropriate?", "options": [{"letter": "A", "text": "Topical antihistamine drops"}, {"letter": "B", "text": "Topical corticosteroid monotherapy"}, {"letter": "C", "text": "Warm compresses alone"}, {"letter": "D", "text": "Oral amoxicillin"}, {"letter": "E", "text": "Topical moxifloxacin with urgent ophthalmology referral"}], "correct": "E", "answerText": "Topical moxifloxacin with urgent ophthalmology referral", "rationale": "Contact-lens use raises concern for bacterial keratitis, especially Pseudomonas. Intensive topical fluoroquinolone therapy and urgent ophthalmology evaluation are indicated.", "objective": "External Eye Disorders, Obj. 7", "topic": "External Eye Disorders"}, {"number": 11, "stem": "A 29-year-old develops ear pressure and muffled hearing during a viral upper respiratory infection. The tympanic membrane is retracted, and there is no fever or purulent middle-ear fluid. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Cholesteatoma"}, {"letter": "B", "text": "Mastoiditis"}, {"letter": "C", "text": "Eustachian tube dysfunction"}, {"letter": "D", "text": "Malignant otitis externa"}, {"letter": "E", "text": "Acute otitis media"}], "correct": "C", "answerText": "Eustachian tube dysfunction", "rationale": "Negative middle-ear pressure from impaired Eustachian tube ventilation causes fullness, popping, and a retracted tympanic membrane.", "objective": "Ear Disorders, Obj. 3", "topic": "Ear Disorders"}, {"number": 12, "stem": "A 34-year-old begins lisinopril and develops rapid swelling of the lips and tongue without urticaria. His voice is muffled, and he has difficulty handling secretions. What is the immediate priority?", "options": [{"letter": "A", "text": "Topical nystatin"}, {"letter": "B", "text": "Reassurance only"}, {"letter": "C", "text": "Airway assessment and protection"}, {"letter": "D", "text": "Oral penicillin"}, {"letter": "E", "text": "Dental extraction"}], "correct": "C", "answerText": "Airway assessment and protection", "rationale": "Angioedema involving the tongue or larynx can rapidly obstruct the airway. Airway management takes priority over diagnostic testing or medications.", "objective": "Diseases of the Oropharynx, Oral Cavity & Pharynx", "topic": "Diseases of the Oropharynx"}, {"number": 13, "stem": "A 67-year-old man with heavy tobacco and alcohol use has a nonhealing ulcer on the tongue, referred ear pain, and a firm cervical node. What is the most appropriate next step?", "options": [{"letter": "A", "text": "Urgent biopsy and head-and-neck cancer evaluation"}, {"letter": "B", "text": "Oral antihistamines"}, {"letter": "C", "text": "Warm salt-water rinses for six months"}, {"letter": "D", "text": "Empiric antifungal therapy only"}, {"letter": "E", "text": "Reassurance"}], "correct": "A", "answerText": "Urgent biopsy and head-and-neck cancer evaluation", "rationale": "A persistent ulcer, referred otalgia, and cervical adenopathy are concerning for oral squamous cell carcinoma.", "objective": "Diseases of the Oropharynx, Oral Cavity & Pharynx", "topic": "Diseases of the Oropharynx"}, {"number": 14, "stem": "A 58-year-old highly myopic man sees flashes of light followed by numerous floaters and a curtain descending across his visual field. He has no eye pain. What is the next best step?", "options": [{"letter": "A", "text": "Perform laser iridotomy"}, {"letter": "B", "text": "Start oral antihistamines"}, {"letter": "C", "text": "Reassure and schedule routine follow-up"}, {"letter": "D", "text": "Treat with topical antibiotics"}, {"letter": "E", "text": "Urgent ophthalmology evaluation for retinal detachment repair"}], "correct": "E", "answerText": "Urgent ophthalmology evaluation for retinal detachment repair", "rationale": "Flashes, floaters, and a curtain-like field defect indicate retinal detachment, which requires urgent repair to prevent permanent vision loss.", "objective": "External Eye Disorders, Obj. 14", "topic": "External Eye Disorders"}, {"number": 15, "stem": "A 38-year-old awakens with sudden unilateral hearing loss that developed over several hours. Otoscopy is normal, and tuning-fork testing suggests sensorineural loss. What is the next best step?", "options": [{"letter": "A", "text": "Urgent corticosteroid treatment and audiology/ENT evaluation"}, {"letter": "B", "text": "Perform Epley maneuver"}, {"letter": "C", "text": "Treat with topical antibiotics"}, {"letter": "D", "text": "Remove cerumen"}, {"letter": "E", "text": "Wait three months for spontaneous recovery"}], "correct": "A", "answerText": "Urgent corticosteroid treatment and audiology/ENT evaluation", "rationale": "Sudden sensorineural hearing loss is an otologic emergency. Early corticosteroids and urgent specialist assessment improve the chance of recovery.", "objective": "Cochleovestibular Disorders, Obj. 5", "topic": "Cochleovestibular Disorders"}, {"number": 16, "stem": "A 61-year-old smoker has unilateral nasal obstruction, bloody discharge, facial numbness, and diplopia. Symptoms have progressed for two months. Which action is most appropriate?", "options": [{"letter": "A", "text": "Urgent ENT referral and imaging for sinonasal malignancy"}, {"letter": "B", "text": "Start antihistamines and reassess in one year"}, {"letter": "C", "text": "Treat as viral rhinitis"}, {"letter": "D", "text": "Perform nasal packing only"}, {"letter": "E", "text": "Use saline irrigation alone"}], "correct": "A", "answerText": "Urgent ENT referral and imaging for sinonasal malignancy", "rationale": "Unilateral obstruction with bleeding, cranial neuropathy, or facial numbness is a red flag for sinonasal cancer.", "objective": "Nose & Sinus Disorders, Obj. 1h", "topic": "Nose & Sinus Disorders"}, {"number": 17, "stem": "A 66-year-old man develops sudden painless monocular blindness. Fundoscopy shows retinal pallor with a cherry-red spot. Symptoms began 45 minutes ago. Which intervention is most appropriate while arranging emergent ophthalmology and stroke evaluation?", "options": [{"letter": "A", "text": "Topical erythromycin"}, {"letter": "B", "text": "Warm compresses"}, {"letter": "C", "text": "Immediate ocular massage and IOP-lowering measures"}, {"letter": "D", "text": "Elective cataract surgery"}, {"letter": "E", "text": "Oral acyclovir"}], "correct": "C", "answerText": "Immediate ocular massage and IOP-lowering measures", "rationale": "Central retinal artery occlusion is an ocular stroke. Immediate attempts to restore perfusion and an emergency vascular evaluation are warranted.", "objective": "External Eye Disorders, Obj. 14", "topic": "External Eye Disorders"}, {"number": 18, "stem": "A 58-year-old man has progressive unilateral nasal obstruction and intermittent epistaxis. Endoscopy shows a unilateral papillomatous mass arising from the lateral nasal wall. Which feature makes this lesion clinically important?", "options": [{"letter": "A", "text": "It always resolves spontaneously"}, {"letter": "B", "text": "It can recur and is associated with squamous cell carcinoma"}, {"letter": "C", "text": "It occurs only in adolescent boys"}, {"letter": "D", "text": "It never requires imaging"}, {"letter": "E", "text": "It is caused by acute bacterial infection"}], "correct": "B", "answerText": "It can recur and is associated with squamous cell carcinoma", "rationale": "Inverted papilloma is benign but locally aggressive, recurrent, and associated with synchronous or subsequent squamous cell carcinoma.", "objective": "Nose & Sinus Disorders, Obj. 1g", "topic": "Nose & Sinus Disorders"}, {"number": 19, "stem": "A 15-year-old boy has recurrent brisk unilateral epistaxis and progressive nasal obstruction. Examination reveals a vascular nasopharyngeal mass. What is the most appropriate diagnostic approach?", "options": [{"letter": "A", "text": "Obtain imaging and avoid biopsy because of hemorrhage risk"}, {"letter": "B", "text": "Reassure that it is a nasal polyp"}, {"letter": "C", "text": "Begin oral antibiotics"}, {"letter": "D", "text": "Perform immediate office biopsy"}, {"letter": "E", "text": "Treat with intranasal steroids only"}], "correct": "A", "answerText": "Obtain imaging and avoid biopsy because of hemorrhage risk", "rationale": "Juvenile nasopharyngeal angiofibroma occurs in adolescent males and is highly vascular; biopsy can cause severe hemorrhage.", "objective": "Nose & Sinus Disorders, Obj. 1g", "topic": "Nose & Sinus Disorders"}, {"number": 20, "stem": "A 30-year-old with recent otitis and mastoid pain develops severe headache, papilledema, and focal neurologic symptoms. Imaging reveals a dural venous sinus thrombus. Which complication has occurred?", "options": [{"letter": "A", "text": "Acute angle-closure glaucoma"}, {"letter": "B", "text": "Cerebral venous sinus thrombosis"}, {"letter": "C", "text": "Aphthous stomatitis"}, {"letter": "D", "text": "Nasal polyposis"}, {"letter": "E", "text": "Vestibular neuritis"}], "correct": "B", "answerText": "Cerebral venous sinus thrombosis", "rationale": "Middle-ear and mastoid infection can spread intracranially and cause cerebral venous sinus thrombosis.", "objective": "Ear Disorders, Obj. 5", "topic": "Ear Disorders"}, {"number": 21, "stem": "A 79-year-old woman with known macular degeneration develops sudden worsening of central vision. Fundoscopy shows subretinal blood and neovascular changes. Which treatment has the best evidence for preserving vision?", "options": [{"letter": "A", "text": "Oral prednisone alone"}, {"letter": "B", "text": "Topical timolol"}, {"letter": "C", "text": "Corneal transplantation"}, {"letter": "D", "text": "Intravitreal anti-VEGF injections"}, {"letter": "E", "text": "Patching"}], "correct": "D", "answerText": "Intravitreal anti-VEGF injections", "rationale": "Wet AMD results from choroidal neovascularization and is treated with intravitreal anti-VEGF therapy.", "objective": "External Eye Disorders, Obj. 14", "topic": "External Eye Disorders"}, {"number": 22, "stem": "A 28-year-old man presents with anterior epistaxis after vigorous nose blowing. He is hemodynamically stable, and the bleeding site is visible on the anterior septum. What should be done first?", "options": [{"letter": "A", "text": "Firm compression of the soft nose while leaning forward"}, {"letter": "B", "text": "Begin IV antibiotics"}, {"letter": "C", "text": "Immediate posterior packing"}, {"letter": "D", "text": "Emergent arterial embolization"}, {"letter": "E", "text": "Tilt the head back and swallow blood"}], "correct": "A", "answerText": "Firm compression of the soft nose while leaning forward", "rationale": "Most epistaxis is anterior. Initial management is continuous direct pressure to the soft nose with the patient leaning forward.", "objective": "Nose & Sinus Disorders, Obj. 1d", "topic": "Nose & Sinus Disorders"}, {"number": 23, "stem": "A 44-year-old has recurrent episodes of vertigo lasting two hours with fluctuating unilateral hearing loss, tinnitus, and aural fullness. Neurologic examination is normal between attacks. Which initial long-term strategy is most appropriate?", "options": [{"letter": "A", "text": "High-dose IV antibiotics"}, {"letter": "B", "text": "Low-salt diet and diuretic-based management"}, {"letter": "C", "text": "Epley maneuver only"}, {"letter": "D", "text": "Long-term benzodiazepines as sole therapy"}, {"letter": "E", "text": "Immediate cochlear implantation"}], "correct": "B", "answerText": "Low-salt diet and diuretic-based management", "rationale": "The episodic vertigo plus fluctuating hearing loss, tinnitus, and fullness indicates Meniere disease. Salt restriction and diuretics are common preventive measures.", "objective": "Cochleovestibular Disorders, Obj. 6", "topic": "Cochleovestibular Disorders"}, {"number": 24, "stem": "A 39-year-old woman has painful oral burning and bilateral lacy white reticular lesions on the buccal mucosa. The lesions have persisted for months. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Aphthous ulcer"}, {"letter": "B", "text": "Dental abscess"}, {"letter": "C", "text": "Herpes labialis"}, {"letter": "D", "text": "Oral candidiasis"}, {"letter": "E", "text": "Oral lichen planus"}], "correct": "E", "answerText": "Oral lichen planus", "rationale": "Bilateral Wickham-like lacy white striae are characteristic of oral lichen planus.", "objective": "Diseases of the Oropharynx, Oral Cavity & Pharynx", "topic": "Diseases of the Oropharynx"}, {"number": 25, "stem": "A 16-year-old presents one day after nasal trauma with worsening obstruction and pain. Examination shows a soft, fluctuant, bilateral swelling of the nasal septum. What is the next best step?", "options": [{"letter": "A", "text": "Routine follow-up in six weeks"}, {"letter": "B", "text": "Observation for spontaneous resolution"}, {"letter": "C", "text": "Urgent incision and drainage with antibiotics"}, {"letter": "D", "text": "Nasal steroid spray"}, {"letter": "E", "text": "Intranasal antihistamine"}], "correct": "C", "answerText": "Urgent incision and drainage with antibiotics", "rationale": "A septal hematoma can cause cartilage necrosis and saddle-nose deformity. It requires urgent drainage and antimicrobial coverage.", "objective": "Nose & Sinus Disorders, Obj. 1e/1f", "topic": "Nose & Sinus Disorders"}, {"number": 26, "stem": "A 48-year-old develops severe ear pain followed by vesicles in the external canal and ipsilateral facial paralysis. He also reports vertigo and hearing change. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Ramsay Hunt syndrome"}, {"letter": "B", "text": "Perichondritis"}, {"letter": "C", "text": "Bell palsy without zoster"}, {"letter": "D", "text": "Meniere disease"}, {"letter": "E", "text": "Acute otitis media"}], "correct": "A", "answerText": "Ramsay Hunt syndrome", "rationale": "Herpes zoster oticus causes painful ear vesicles with peripheral CN VII palsy and may involve CN VIII.", "objective": "Ear Disorders, Obj. 2", "topic": "Ear Disorders"}, {"number": 27, "stem": "A 52-year-old has unilateral tinnitus and slowly progressive hearing loss. He later develops imbalance and reduced corneal reflex on the same side. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Acute otitis externa"}, {"letter": "B", "text": "Vestibular schwannoma"}, {"letter": "C", "text": "BPPV"}, {"letter": "D", "text": "Cerumen impaction"}, {"letter": "E", "text": "Viral rhinitis"}], "correct": "B", "answerText": "Vestibular schwannoma", "rationale": "Progressive unilateral SNHL and tinnitus with later cranial-nerve findings suggest a vestibular schwannoma.", "objective": "Cochleovestibular Disorders, Obj. 1/4", "topic": "Cochleovestibular Disorders"}, {"number": 28, "stem": "A 19-year-old college student wakes with both eyes watery and red after several classmates developed similar symptoms. He has a mild sore throat and a tender preauricular node but no photophobia or vision loss. Examination shows diffuse conjunctival injection without corneal staining. What is the best management?", "options": [{"letter": "A", "text": "Immediate IV ceftriaxone"}, {"letter": "B", "text": "Emergent laser iridotomy"}, {"letter": "C", "text": "Supportive care, hygiene, and cold compresses"}, {"letter": "D", "text": "Oral clindamycin"}, {"letter": "E", "text": "Topical corticosteroids"}], "correct": "C", "answerText": "Supportive care, hygiene, and cold compresses", "rationale": "Adenoviral conjunctivitis is highly contagious but usually self-limited. Supportive care and strict hand hygiene are appropriate.", "objective": "External Eye Disorders, Obj. 6", "topic": "External Eye Disorders"}, {"number": 29, "stem": "A 40-year-old develops continuous vertigo after an upper respiratory infection. Unlike a patient with vestibular neuritis, she also has new unilateral sensorineural hearing loss. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Labyrinthitis"}, {"letter": "B", "text": "Meniere disease"}, {"letter": "C", "text": "BPPV"}, {"letter": "D", "text": "Orthostatic hypotension"}, {"letter": "E", "text": "Acoustic neuroma"}], "correct": "A", "answerText": "Labyrinthitis", "rationale": "Labyrinthitis resembles vestibular neuritis but includes cochlear involvement and hearing loss.", "objective": "Cochleovestibular Disorders, Obj. 6", "topic": "Cochleovestibular Disorders"}, {"number": 30, "stem": "A 45-year-old patient recently completed broad-spectrum antibiotics and now has oral burning with removable white plaques over an erythematous base. Which treatment is appropriate for uncomplicated disease?", "options": [{"letter": "A", "text": "Incision and drainage"}, {"letter": "B", "text": "Epinephrine"}, {"letter": "C", "text": "IM benzathine penicillin"}, {"letter": "D", "text": "Topical nystatin"}, {"letter": "E", "text": "Oral acyclovir"}], "correct": "D", "answerText": "Topical nystatin", "rationale": "Scrapable white plaques after antibiotics indicate oral candidiasis, which can be treated with topical nystatin when uncomplicated.", "objective": "Diseases of the Oropharynx, Oral Cavity & Pharynx", "topic": "Diseases of the Oropharynx"}, {"number": 31, "stem": "A 76-year-old hypertensive patient has persistent heavy bleeding into the posterior pharynx with no visible anterior source. Anterior pressure and topical vasoconstrictor fail. What is the next best step?", "options": [{"letter": "A", "text": "Apply warm compresses"}, {"letter": "B", "text": "Start oral antihistamines"}, {"letter": "C", "text": "Posterior packing and urgent ENT management"}, {"letter": "D", "text": "Schedule elective allergy testing"}, {"letter": "E", "text": "Discharge with saline spray"}], "correct": "C", "answerText": "Posterior packing and urgent ENT management", "rationale": "Posterior epistaxis is often brisk, difficult to visualize, and requires posterior packing, monitoring, and ENT involvement.", "objective": "Nose & Sinus Disorders, Obj. 1d", "topic": "Nose & Sinus Disorders"}, {"number": 32, "stem": "A 56-year-old woman has painful erythema, warmth, and swelling below the medial canthus with purulent material expressed from the punctum. She also has excessive tearing. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Dacryoadenitis"}, {"letter": "B", "text": "Hordeolum"}, {"letter": "C", "text": "Dacryocystitis"}, {"letter": "D", "text": "Orbital cellulitis"}, {"letter": "E", "text": "Chalazion"}], "correct": "C", "answerText": "Dacryocystitis", "rationale": "Tender swelling over the lacrimal sac with purulent reflux and epiphora indicates dacryocystitis due to nasolacrimal obstruction.", "objective": "External Eye Disorders, Obj. 5", "topic": "External Eye Disorders"}, {"number": 33, "stem": "A 17-year-old wrestler develops a tender fluctuant swelling of the pinna after repeated trauma. The ear canal and tympanic membrane are normal. What is the best management?", "options": [{"letter": "A", "text": "Topical antifungal drops"}, {"letter": "B", "text": "Observation only"}, {"letter": "C", "text": "Prompt drainage and compression dressing"}, {"letter": "D", "text": "Myringotomy"}, {"letter": "E", "text": "Oral antihistamines"}], "correct": "C", "answerText": "Prompt drainage and compression dressing", "rationale": "An auricular hematoma must be drained and compressed to prevent cartilage necrosis and cauliflower ear.", "objective": "Ear Disorders, Obj. 1", "topic": "Ear Disorders"}, {"number": 34, "stem": "A 49-year-old woman with headaches and transient visual obscurations has bilateral optic-disc swelling. Visual acuity is initially preserved. Which next step is most appropriate?", "options": [{"letter": "A", "text": "Schedule routine refraction"}, {"letter": "B", "text": "Start topical prostaglandin drops"}, {"letter": "C", "text": "Urgent evaluation for elevated intracranial pressure, including neuroimaging"}, {"letter": "D", "text": "Begin warm compresses"}, {"letter": "E", "text": "Treat as bacterial conjunctivitis"}], "correct": "C", "answerText": "Urgent evaluation for elevated intracranial pressure, including neuroimaging", "rationale": "Bilateral papilledema implies elevated intracranial pressure and requires urgent investigation before lumbar puncture.", "objective": "External Eye Disorders, Obj. 14", "topic": "External Eye Disorders"}, {"number": 35, "stem": "A 24-year-old has severe unilateral sore throat, fever, drooling, trismus, and a muffled hot-potato voice. The uvula is deviated away from a swollen tonsillar pillar. What is the next best step after airway assessment?", "options": [{"letter": "A", "text": "Treat with antihistamines only"}, {"letter": "B", "text": "Perform blind throat swabbing repeatedly"}, {"letter": "C", "text": "Discharge without treatment"}, {"letter": "D", "text": "Give topical nystatin"}, {"letter": "E", "text": "Drain the abscess and give antibiotics"}], "correct": "E", "answerText": "Drain the abscess and give antibiotics", "rationale": "A peritonsillar abscess requires drainage plus antimicrobial therapy after ensuring airway stability.", "objective": "Diseases of the Oropharynx, Deep Neck Infection", "topic": "Diseases of the Oropharynx"}, {"number": 36, "stem": "A 12-year-old has fever, sore throat, tonsillar exudates, and tender anterior cervical nodes. He has no cough. Which is the best next step according to a testing-based approach?", "options": [{"letter": "A", "text": "Treat with nystatin"}, {"letter": "B", "text": "Perform immediate tonsillectomy"}, {"letter": "C", "text": "Perform a rapid antigen detection test for group A streptococcus"}, {"letter": "D", "text": "Order a sinus CT"}, {"letter": "E", "text": "Diagnose viral pharyngitis without testing"}], "correct": "C", "answerText": "Perform a rapid antigen detection test for group A streptococcus", "rationale": "The presentation raises the Centor score and warrants GAS testing; positive cases are treated to reduce complications and transmission.", "objective": "Diseases of the Oropharynx, Pharyngitis", "topic": "Diseases of the Oropharynx"}, {"number": 37, "stem": "A 68-year-old man experiences a painless curtain-like loss of vision in one eye lasting five minutes, followed by complete recovery. He has carotid bruits and vascular risk factors. What is the most important next step?", "options": [{"letter": "A", "text": "Routine eye examination in one year"}, {"letter": "B", "text": "Topical antibiotics"}, {"letter": "C", "text": "Urgent TIA and carotid evaluation"}, {"letter": "D", "text": "Oral antihistamines"}, {"letter": "E", "text": "Warm compresses"}], "correct": "C", "answerText": "Urgent TIA and carotid evaluation", "rationale": "Amaurosis fugax is transient retinal ischemia and should be treated as a TIA with urgent vascular evaluation.", "objective": "External Eye Disorders, Obj. 14", "topic": "External Eye Disorders"}, {"number": 38, "stem": "A 76-year-old has gradual symmetric high-frequency sensorineural hearing loss that interferes with conversation. There is no reversible cause. Which intervention is the usual first rehabilitative option?", "options": [{"letter": "A", "text": "Myringotomy tubes"}, {"letter": "B", "text": "Hearing aids"}, {"letter": "C", "text": "Topical ciprofloxacin"}, {"letter": "D", "text": "Epley maneuver"}, {"letter": "E", "text": "Mastoidectomy"}], "correct": "B", "answerText": "Hearing aids", "rationale": "Hearing aids are first-line rehabilitation for many patients with irreversible mild-to-severe sensorineural hearing loss.", "objective": "Cochleovestibular Disorders, Obj. 5", "topic": "Cochleovestibular Disorders"}, {"number": 39, "stem": "A 21-year-old develops a single shallow, painful ulcer with a gray base and erythematous halo on the inner lower lip. He has no fever, vesicles, or skin lesions. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Leukoplakia"}, {"letter": "B", "text": "Aphthous ulcer"}, {"letter": "C", "text": "Primary herpetic gingivostomatitis"}, {"letter": "D", "text": "Oral cancer"}, {"letter": "E", "text": "Thrush"}], "correct": "B", "answerText": "Aphthous ulcer", "rationale": "Aphthous ulcers are painful, shallow, nonvesicular lesions on nonkeratinized mucosa and are usually self-limited.", "objective": "Diseases of the Oropharynx, Oral Cavity & Pharynx", "topic": "Diseases of the Oropharynx"}, {"number": 40, "stem": "A 47-year-old woman has episodic watery rhinorrhea triggered by cold air, perfume, and spicy foods. Allergy testing is negative, and she has no itching or seasonal pattern. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Vasomotor rhinitis"}, {"letter": "B", "text": "Allergic rhinitis"}, {"letter": "C", "text": "Nasal polyposis"}, {"letter": "D", "text": "CSF rhinorrhea"}, {"letter": "E", "text": "Acute bacterial rhinosinusitis"}], "correct": "A", "answerText": "Vasomotor rhinitis", "rationale": "Nonallergic vasomotor rhinitis is triggered by irritants, weather, or foods and lacks itching or positive allergy testing.", "objective": "Nose & Sinus Disorders, Obj. 1a/2", "topic": "Nose & Sinus Disorders"}, {"number": 41, "stem": "A 38-year-old woman with Sjogren syndrome reports chronic gritty eyes and intermittent blurred vision. Slit-lamp examination shows bilateral punctate epithelial erosions. Which test directly assesses tear production?", "options": [{"letter": "A", "text": "Ishihara plates"}, {"letter": "B", "text": "Amsler grid"}, {"letter": "C", "text": "Schirmer test"}, {"letter": "D", "text": "Gonioscopy"}, {"letter": "E", "text": "Cover-uncover test"}], "correct": "C", "answerText": "Schirmer test", "rationale": "The Schirmer test uses filter paper to measure tear production and supports the diagnosis of keratoconjunctivitis sicca.", "objective": "External Eye Disorders, Obj. 3", "topic": "External Eye Disorders"}, {"number": 42, "stem": "A 4-year-old has fever, neck stiffness, drooling, and refuses to extend the neck. The child appears toxic, and a lateral neck image shows widening of the prevertebral space. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Retropharyngeal abscess"}, {"letter": "B", "text": "Peritonsillar abscess"}, {"letter": "C", "text": "Viral laryngitis"}, {"letter": "D", "text": "Croup"}, {"letter": "E", "text": "Aphthous ulcer"}], "correct": "A", "answerText": "Retropharyngeal abscess", "rationale": "Young age, neck stiffness, drooling, and prevertebral widening indicate a retropharyngeal abscess, which can threaten the airway.", "objective": "Diseases of the Oropharynx, Deep Neck Infection", "topic": "Diseases of the Oropharynx"}, {"number": 43, "stem": "A 3-year-old inserts a button battery into the external auditory canal. The child is uncomfortable, and the battery is visible. What is the next best step?", "options": [{"letter": "A", "text": "Observe for spontaneous extrusion"}, {"letter": "B", "text": "Immediate removal"}, {"letter": "C", "text": "Irrigate repeatedly at home"}, {"letter": "D", "text": "Begin antihistamines"}, {"letter": "E", "text": "Wait one week for ENT follow-up"}], "correct": "B", "answerText": "Immediate removal", "rationale": "Button batteries can cause rapid liquefaction necrosis and require urgent removal; irrigation may worsen injury or complicate removal.", "objective": "Ear Disorders, Obj. 2", "topic": "Ear Disorders"}, {"number": 44, "stem": "During caloric testing, warm water placed in the right ear produces a fast phase of nystagmus toward the right. Which mnemonic explains this expected response?", "options": [{"letter": "A", "text": "COWS: cold opposite, warm same"}, {"letter": "B", "text": "SOAP for tinnitus"}, {"letter": "C", "text": "FAST for stroke"}, {"letter": "D", "text": "Rinne positive means conductive loss"}, {"letter": "E", "text": "LR6 SO4, rest 3"}], "correct": "A", "answerText": "COWS: cold opposite, warm same", "rationale": "The fast phase of caloric-induced nystagmus is opposite with cold irrigation and same-sided with warm irrigation.", "objective": "Cochleovestibular Disorders, Obj. 6", "topic": "Cochleovestibular Disorders"}, {"number": 45, "stem": "A 4-year-old has decreased hearing after a recent cold. Otoscopy shows a dull, retracted tympanic membrane with an air-fluid level but no bulging, marked pain, or fever. What is the best initial management?", "options": [{"letter": "A", "text": "Observation with hearing follow-up"}, {"letter": "B", "text": "Systemic antipseudomonal therapy"}, {"letter": "C", "text": "Cochlear implantation"}, {"letter": "D", "text": "Emergency mastoidectomy"}, {"letter": "E", "text": "Immediate antibiotics for acute bacterial infection"}], "correct": "A", "answerText": "Observation with hearing follow-up", "rationale": "Otitis media with effusion has middle-ear fluid without acute inflammation and is usually observed initially.", "objective": "Ear Disorders, Obj. 3", "topic": "Ear Disorders"}, {"number": 46, "stem": "A 51-year-old has nasal obstruction, facial pressure, reduced smell, and mucopurulent drainage for four months. Symptoms persist despite repeated short courses of decongestants. Which test is most useful to objectively confirm chronic rhinosinusitis?", "options": [{"letter": "A", "text": "Tonometry"}, {"letter": "B", "text": "Noncontrast CT of the sinuses or nasal endoscopy"}, {"letter": "C", "text": "Routine chest radiograph"}, {"letter": "D", "text": "Lumbar puncture"}, {"letter": "E", "text": "Carotid ultrasound"}], "correct": "B", "answerText": "Noncontrast CT of the sinuses or nasal endoscopy", "rationale": "CRS requires at least 12 weeks of symptoms plus objective evidence of sinonasal inflammation on CT or endoscopy.", "objective": "Nose & Sinus Disorders, Obj. 1b/1c/3", "topic": "Nose & Sinus Disorders"}, {"number": 47, "stem": "A 64-year-old has progressive asymmetric sensorineural hearing loss and unilateral tinnitus. Otoscopy is normal, and audiometry confirms no air-bone gap. Which diagnostic study is most appropriate?", "options": [{"letter": "A", "text": "Noncontrast sinus CT"}, {"letter": "B", "text": "Chest radiograph"}, {"letter": "C", "text": "MRI of the internal auditory canals with contrast"}, {"letter": "D", "text": "Tympanocentesis"}, {"letter": "E", "text": "No further workup"}], "correct": "C", "answerText": "MRI of the internal auditory canals with contrast", "rationale": "Unilateral or asymmetric progressive SNHL requires MRI to exclude vestibular schwannoma or other retrocochlear pathology.", "objective": "Cochleovestibular Disorders, Obj. 4", "topic": "Cochleovestibular Disorders"}, {"number": 48, "stem": "A 43-year-old woman has a localized sector of painless ocular redness discovered that morning. Vision is normal, and she has no photophobia. The superficial vessels blanch after phenylephrine administration. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Orbital cellulitis"}, {"letter": "B", "text": "Episcleritis"}, {"letter": "C", "text": "Bacterial keratitis"}, {"letter": "D", "text": "Anterior uveitis"}, {"letter": "E", "text": "Scleritis"}], "correct": "B", "answerText": "Episcleritis", "rationale": "Episcleritis is usually mild, painless, vision-sparing, and characterized by vessels that blanch with phenylephrine.", "objective": "External Eye Disorders, Obj. 10", "topic": "External Eye Disorders"}, {"number": 49, "stem": "A patient with chronic middle-ear disease develops new ipsilateral facial weakness. Which mechanism is most concerning?", "options": [{"letter": "A", "text": "Benign positional vertigo"}, {"letter": "B", "text": "Inflammatory or erosive involvement of CN VII in the temporal bone"}, {"letter": "C", "text": "Dry eye syndrome"}, {"letter": "D", "text": "Isolated allergic rhinitis"}, {"letter": "E", "text": "Simple cerumen impaction"}], "correct": "B", "answerText": "Inflammatory or erosive involvement of CN VII in the temporal bone", "rationale": "Middle-ear infection or cholesteatoma can involve the facial nerve canal and cause facial paralysis, a serious complication.", "objective": "Ear Disorders, Obj. 5", "topic": "Ear Disorders"}, {"number": 50, "stem": "A 46-year-old immunocompromised patient reports painless floaters and reduced visual acuity. Fundoscopy shows inflammatory foci involving the choroid and retina, and vitreous cells are present. Which feature most clearly distinguishes this condition from anterior uveitis?", "options": [{"letter": "A", "text": "Redness at the limbus"}, {"letter": "B", "text": "Association with systemic disease"}, {"letter": "C", "text": "Improvement with cycloplegia"}, {"letter": "D", "text": "Presence of photophobia"}, {"letter": "E", "text": "Leukocytes in the vitreous rather than the anterior chamber"}], "correct": "E", "answerText": "Leukocytes in the vitreous rather than the anterior chamber", "rationale": "Posterior uveitis produces painless floaters and vitreous cells, whereas anterior uveitis produces painful ciliary flush and anterior-chamber cells.", "objective": "External Eye Disorders, Obj. 10", "topic": "External Eye Disorders"}, {"number": 51, "stem": "A 7-year-old boy has unilateral eyelid erythema and swelling after an upper respiratory infection. He is afebrile, visual acuity is intact, and extraocular movements are full and painless. There is no proptosis. Which outpatient therapy is most appropriate?", "options": [{"letter": "A", "text": "IV vancomycin plus ceftriaxone"}, {"letter": "B", "text": "Oral amoxicillin-clavulanate"}, {"letter": "C", "text": "No treatment"}, {"letter": "D", "text": "Emergent lateral canthotomy"}, {"letter": "E", "text": "Topical acyclovir"}], "correct": "B", "answerText": "Oral amoxicillin-clavulanate", "rationale": "The absence of proptosis and painful or restricted EOMs supports preseptal cellulitis. Uncomplicated cases can be treated as an outpatient with oral amoxicillin-clavulanate.", "objective": "External Eye Disorders, Obj. 8", "topic": "External Eye Disorders"}, {"number": 52, "stem": "A 24-year-old develops severe pinna pain and swelling several days after a cartilage piercing. The cartilaginous auricle is erythematous, but the earlobe is spared. Which organism should empiric therapy cover?", "options": [{"letter": "A", "text": "Streptococcus pyogenes only"}, {"letter": "B", "text": "Candida albicans"}, {"letter": "C", "text": "Pseudomonas aeruginosa"}, {"letter": "D", "text": "Epstein-Barr virus"}, {"letter": "E", "text": "Mycoplasma pneumoniae"}], "correct": "C", "answerText": "Pseudomonas aeruginosa", "rationale": "Perichondritis after cartilage trauma commonly involves Pseudomonas and characteristically spares the lobule.", "objective": "Ear Disorders, Obj. 1", "topic": "Ear Disorders"}, {"number": 53, "stem": "A 20-year-old with unrecognized EBV infection receives amoxicillin for presumed strep throat and develops a diffuse maculopapular rash. What is the best interpretation?", "options": [{"letter": "A", "text": "This is typical of gonococcal infection"}, {"letter": "B", "text": "This requires lifelong avoidance of all beta-lactams"}, {"letter": "C", "text": "This rash is strongly associated with aminopenicillin use during infectious mononucleosis"}, {"letter": "D", "text": "This proves anaphylaxis"}, {"letter": "E", "text": "This confirms scarlet fever"}], "correct": "C", "answerText": "This rash is strongly associated with aminopenicillin use during infectious mononucleosis", "rationale": "A diffuse rash after amoxicillin is common in EBV mononucleosis and does not necessarily indicate a permanent IgE-mediated penicillin allergy.", "objective": "Diseases of the Oropharynx, Infectious Mononucleosis", "topic": "Diseases of the Oropharynx"}, {"number": 54, "stem": "A 42-year-old has recurrent submandibular pain and swelling during meals that resolves afterward. There is no fever, and a small hard mass is palpable in Wharton duct. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Sialolithiasis"}, {"letter": "B", "text": "Peritonsillar abscess"}, {"letter": "C", "text": "Viral parotitis"}, {"letter": "D", "text": "Oral candidiasis"}, {"letter": "E", "text": "Laryngitis"}], "correct": "A", "answerText": "Sialolithiasis", "rationale": "Meal-triggered salivary pain and swelling with a palpable duct stone indicate sialolithiasis.", "objective": "Diseases of the Oropharynx, Salivary Glands", "topic": "Diseases of the Oropharynx"}, {"number": 55, "stem": "A 17-year-old is hit in the eye with a baseball. Slit-lamp examination shows a horizontal layer of blood in the anterior chamber. He has mild photophobia but no globe rupture. Which complication must be monitored closely?", "options": [{"letter": "A", "text": "Pterygium"}, {"letter": "B", "text": "Rebleeding with elevated intraocular pressure"}, {"letter": "C", "text": "Amblyopia"}, {"letter": "D", "text": "Chronic dacryostenosis"}, {"letter": "E", "text": "Allergic conjunctivitis"}], "correct": "B", "answerText": "Rebleeding with elevated intraocular pressure", "rationale": "Hyphema may rebleed and obstruct aqueous outflow, causing elevated IOP and vision-threatening complications.", "objective": "External Eye Disorders, Obj. 15", "topic": "External Eye Disorders"}, {"number": 56, "stem": "A 29-year-old woman develops painful monocular vision loss over two days. Color vision is reduced, and pain worsens with eye movement. The fundus may initially appear normal. What is the most appropriate initial therapy for severe optic neuritis?", "options": [{"letter": "A", "text": "Laser iridotomy"}, {"letter": "B", "text": "Oral antihistamines"}, {"letter": "C", "text": "Topical erythromycin"}, {"letter": "D", "text": "Intravitreal anti-VEGF"}, {"letter": "E", "text": "High-dose IV corticosteroids"}], "correct": "E", "answerText": "High-dose IV corticosteroids", "rationale": "Optic neuritis classically causes painful vision loss and impaired color vision. High-dose IV steroids can accelerate visual recovery and should prompt evaluation for demyelinating disease.", "objective": "External Eye Disorders, Obj. 14", "topic": "External Eye Disorders"}, {"number": 57, "stem": "A 74-year-old smoker reports gradual bilateral distortion of central vision. An Amsler grid appears wavy, and fundoscopy shows drusen without hemorrhage. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Dry age-related macular degeneration"}, {"letter": "B", "text": "Open-angle glaucoma"}, {"letter": "C", "text": "Wet age-related macular degeneration"}, {"letter": "D", "text": "Retinal detachment"}, {"letter": "E", "text": "Central retinal artery occlusion"}], "correct": "A", "answerText": "Dry age-related macular degeneration", "rationale": "Gradual central visual distortion with drusen and no neovascular bleeding is typical of dry AMD.", "objective": "External Eye Disorders, Obj. 14", "topic": "External Eye Disorders"}, {"number": 58, "stem": "A 31-year-old woman is struck in the eye by a racquetball. She has diplopia on upward gaze and numbness over the ipsilateral cheek. The globe is intact. Which injury is most likely?", "options": [{"letter": "A", "text": "Globe rupture"}, {"letter": "B", "text": "Corneal abrasion"}, {"letter": "C", "text": "Hyphema"}, {"letter": "D", "text": "Retinal vein occlusion"}, {"letter": "E", "text": "Orbital blowout fracture"}], "correct": "E", "answerText": "Orbital blowout fracture", "rationale": "Restricted upward gaze from inferior rectus entrapment and infraorbital numbness suggest an orbital floor blowout fracture.", "objective": "External Eye Disorders, Obj. 15", "topic": "External Eye Disorders"}, {"number": 59, "stem": "A 55-year-old woman has a velvety red patch on the floor of the mouth. It is painless and does not scrape off. Compared with leukoplakia, which statement is most accurate?", "options": [{"letter": "A", "text": "It is caused by HSV"}, {"letter": "B", "text": "It needs no biopsy"}, {"letter": "C", "text": "It is treated with antihistamines"}, {"letter": "D", "text": "Erythroplakia is usually candidiasis"}, {"letter": "E", "text": "Erythroplakia has a higher likelihood of severe dysplasia or carcinoma"}], "correct": "E", "answerText": "Erythroplakia has a higher likelihood of severe dysplasia or carcinoma", "rationale": "Erythroplakia carries a higher malignant potential than leukoplakia and requires prompt biopsy.", "objective": "Diseases of the Oropharynx, Oral Cavity & Pharynx", "topic": "Diseases of the Oropharynx"}, {"number": 60, "stem": "A 69-year-old man reports gradual painless blurring, glare while driving at night, and halos around lights. Examination shows loss of the red reflex and lens opacity. Which treatment restores vision most effectively?", "options": [{"letter": "A", "text": "Topical prostaglandin analog"}, {"letter": "B", "text": "Oral acetazolamide"}, {"letter": "C", "text": "Patching of the stronger eye"}, {"letter": "D", "text": "Intravitreal corticosteroid"}, {"letter": "E", "text": "Cataract extraction with intraocular lens placement"}], "correct": "E", "answerText": "Cataract extraction with intraocular lens placement", "rationale": "Cataracts cause gradual painless vision loss and glare. Definitive treatment is surgical lens removal and intraocular lens replacement.", "objective": "External Eye Disorders, Obj. 12", "topic": "External Eye Disorders"}, {"number": 61, "stem": "A 19-year-old swimmer has severe ear pain, pruritus, and scant otorrhea. Manipulation of the tragus and pinna is very painful, and the canal is edematous. Which treatment is most appropriate?", "options": [{"letter": "A", "text": "Cochlear implant"}, {"letter": "B", "text": "Topical antibiotic drops with or without steroid and water precautions"}, {"letter": "C", "text": "Oral amoxicillin alone"}, {"letter": "D", "text": "Mastoidectomy"}, {"letter": "E", "text": "Intranasal antihistamine"}], "correct": "B", "answerText": "Topical antibiotic drops with or without steroid and water precautions", "rationale": "Acute otitis externa is treated primarily with topical antimicrobial drops, canal care, analgesia, and keeping the ear dry.", "objective": "Ear Disorders, Obj. 2", "topic": "Ear Disorders"}, {"number": 62, "stem": "An 8-year-old girl with recent ethmoid sinusitis develops fever, proptosis, diplopia, and painful restricted extraocular movements. CT shows orbital fat stranding and inflamed extraocular muscles. What is the next best step?", "options": [{"letter": "A", "text": "Oral antihistamines and discharge"}, {"letter": "B", "text": "Observation for 48 hours"}, {"letter": "C", "text": "Topical erythromycin ointment"}, {"letter": "D", "text": "Warm compresses only"}, {"letter": "E", "text": "Hospital admission for IV vancomycin plus broad gram-positive/negative coverage"}], "correct": "E", "answerText": "Hospital admission for IV vancomycin plus broad gram-positive/negative coverage", "rationale": "Orbital cellulitis requires admission, IV antibiotics, imaging, and specialty evaluation because of risks such as abscess, blindness, and cavernous sinus thrombosis.", "objective": "External Eye Disorders, Obj. 8", "topic": "External Eye Disorders"}, {"number": 63, "stem": "A 36-year-old has nasal obstruction, purulent drainage, and maxillary pressure for 12 days without improvement. He developed fever and worsening pain after initially improving from a cold. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Vasomotor rhinitis"}, {"letter": "B", "text": "Acute bacterial rhinosinusitis"}, {"letter": "C", "text": "Acute viral rhinosinusitis"}, {"letter": "D", "text": "Allergic rhinitis"}, {"letter": "E", "text": "Chronic rhinosinusitis"}], "correct": "B", "answerText": "Acute bacterial rhinosinusitis", "rationale": "Persistent symptoms over 10 days or double worsening support ABRS rather than a viral infection.", "objective": "Nose & Sinus Disorders, Obj. 1b/1c", "topic": "Nose & Sinus Disorders"}, {"number": 64, "stem": "A 28-year-old sexually active man presents with rapidly progressive unilateral eye redness and copious thick purulent drainage. Gram stain shows intracellular gram-negative diplococci. Corneal infiltrates are present. Which treatment is most appropriate?", "options": [{"letter": "A", "text": "IM ceftriaxone plus topical fluoroquinolone and saline irrigation"}, {"letter": "B", "text": "Oral amoxicillin alone"}, {"letter": "C", "text": "Cold compresses only"}, {"letter": "D", "text": "Topical prednisolone alone"}, {"letter": "E", "text": "Topical erythromycin alone"}], "correct": "A", "answerText": "IM ceftriaxone plus topical fluoroquinolone and saline irrigation", "rationale": "Gonococcal conjunctivitis can rapidly perforate the cornea. Systemic ceftriaxone, topical therapy, irrigation, chlamydial coverage, and emergency ophthalmology care are required.", "objective": "External Eye Disorders, Obj. 6", "topic": "External Eye Disorders"}, {"number": 65, "stem": "A 3-year-old has bilateral acute otitis media with fever and moderate otalgia. There is no penicillin allergy. Which initial antibiotic is preferred when treatment is indicated?", "options": [{"letter": "A", "text": "Oral ciprofloxacin"}, {"letter": "B", "text": "Metronidazole alone"}, {"letter": "C", "text": "IV vancomycin"}, {"letter": "D", "text": "Topical nystatin"}, {"letter": "E", "text": "High-dose amoxicillin"}], "correct": "E", "answerText": "High-dose amoxicillin", "rationale": "High-dose amoxicillin is first-line therapy for uncomplicated AOM when antibiotics are indicated, unless recent use or other factors favor amoxicillin-clavulanate.", "objective": "Ear Disorders, Obj. 4", "topic": "Ear Disorders"}, {"number": 66, "stem": "A 20-year-old is struck in the nose during basketball. He has nasal tenderness and deformity but no septal collection, CSF leak, or airway compromise. Which statement about management is most accurate?", "options": [{"letter": "A", "text": "Assess for septal hematoma now and arrange reduction after swelling decreases"}, {"letter": "B", "text": "Immediate blind nasal packing is mandatory"}, {"letter": "C", "text": "Perform lumbar puncture"}, {"letter": "D", "text": "No follow-up is needed"}, {"letter": "E", "text": "Start IV antifungals"}], "correct": "A", "answerText": "Assess for septal hematoma now and arrange reduction after swelling decreases", "rationale": "Every nasal trauma evaluation must exclude septal hematoma. Uncomplicated fractures are often reduced after edema subsides but before healing fixes the deformity.", "objective": "Nose & Sinus Disorders, Obj. 1e/1f", "topic": "Nose & Sinus Disorders"}, {"number": 67, "stem": "A 68-year-old man with poorly controlled diabetes has weeks of severe nocturnal otalgia and purulent drainage despite topical therapy. Granulation tissue is present at the bony-cartilaginous junction of the canal. What is the next best step?", "options": [{"letter": "A", "text": "Reassure and continue cotton swabs"}, {"letter": "B", "text": "Urgent ENT evaluation and systemic antipseudomonal therapy"}, {"letter": "C", "text": "Perform Epley maneuver"}, {"letter": "D", "text": "Treat with oral antihistamines"}, {"letter": "E", "text": "Use cerumenolytics only"}], "correct": "B", "answerText": "Urgent ENT evaluation and systemic antipseudomonal therapy", "rationale": "Malignant otitis externa is an invasive Pseudomonas infection in older diabetic or immunocompromised patients and can cause skull-base osteomyelitis.", "objective": "Ear Disorders, Obj. 2", "topic": "Ear Disorders"}, {"number": 68, "stem": "A 30-year-old man has unilateral eye redness, foreign-body sensation, and photophobia. Fluorescein staining reveals a branching dendritic epithelial defect. He reports recurrent oral cold sores. Which medication should be avoided because it can worsen this disorder?", "options": [{"letter": "A", "text": "Topical corticosteroids"}, {"letter": "B", "text": "Oral acyclovir"}, {"letter": "C", "text": "Trifluridine drops"}, {"letter": "D", "text": "Ganciclovir gel"}, {"letter": "E", "text": "Lubricating tears"}], "correct": "A", "answerText": "Topical corticosteroids", "rationale": "Dendritic ulcers indicate HSV keratitis. Topical steroids can enhance viral replication and worsen corneal disease unless directed by ophthalmology for a specific indication.", "objective": "External Eye Disorders, Obj. 7", "topic": "External Eye Disorders"}, {"number": 69, "stem": "A 3-year-old has a barking cough, inspiratory stridor, hoarseness, and low-grade fever that worsens at night. The child is not drooling and can swallow. Which treatment is most appropriate?", "options": [{"letter": "A", "text": "Oral penicillin only"}, {"letter": "B", "text": "Immediate throat examination with a tongue depressor"}, {"letter": "C", "text": "Nystatin swish and swallow"}, {"letter": "D", "text": "Dexamethasone, with nebulized epinephrine if moderate to severe"}, {"letter": "E", "text": "Dental extraction"}], "correct": "D", "answerText": "Dexamethasone, with nebulized epinephrine if moderate to severe", "rationale": "Croup is treated with corticosteroids; nebulized epinephrine is added for significant stridor or respiratory distress.", "objective": "Diseases of the Oropharynx, Larynx", "topic": "Diseases of the Oropharynx"}, {"number": 70, "stem": "A 71-year-old man with severe hypertension reports headache and blurred vision. Fundoscopy shows arteriovenous nicking, cotton-wool spots, flame hemorrhages, and optic-disc edema. What does optic-disc edema in this setting indicate?", "options": [{"letter": "A", "text": "Dry macular degeneration"}, {"letter": "B", "text": "Normal age-related change"}, {"letter": "C", "text": "Viral retinitis"}, {"letter": "D", "text": "Simple chronic open-angle glaucoma"}, {"letter": "E", "text": "Hypertensive emergency requiring immediate blood-pressure reduction"}], "correct": "E", "answerText": "Hypertensive emergency requiring immediate blood-pressure reduction", "rationale": "Papilledema with severe hypertensive retinal changes indicates malignant hypertension and end-organ damage.", "objective": "External Eye Disorders, Obj. 14", "topic": "External Eye Disorders"}, {"number": 71, "stem": "A 67-year-old woman presents for a routine eye examination and reports slowly worsening difficulty seeing objects to either side while driving. She denies pain, redness, or abrupt visual change. Fundoscopy shows increased optic cup-to-disc ratios bilaterally, and automated perimetry confirms peripheral field loss. Which treatment is most appropriate as initial chronic therapy?", "options": [{"letter": "A", "text": "Emergent laser iridotomy"}, {"letter": "B", "text": "Topical latanoprost"}, {"letter": "C", "text": "Topical prednisolone acetate"}, {"letter": "D", "text": "Intravitreal anti-VEGF"}, {"letter": "E", "text": "Oral acyclovir"}], "correct": "B", "answerText": "Topical latanoprost", "rationale": "Chronic open-angle glaucoma is typically painless and causes gradual peripheral loss with optic-disc cupping. A topical prostaglandin analog is first-line therapy to lower IOP.", "objective": "External Eye Disorders, Obj. 9", "topic": "External Eye Disorders"}, {"number": 72, "stem": "A 17-year-old has profound fatigue, fever, exudative pharyngitis, posterior cervical lymphadenopathy, and splenomegaly. A heterophile antibody test is positive. Which counseling is most important?", "options": [{"letter": "A", "text": "Return to sports tomorrow"}, {"letter": "B", "text": "Use aspirin for fever"}, {"letter": "C", "text": "Start long-term corticosteroids routinely"}, {"letter": "D", "text": "Avoid contact sports because of splenic rupture risk"}, {"letter": "E", "text": "Begin amoxicillin immediately"}], "correct": "D", "answerText": "Avoid contact sports because of splenic rupture risk", "rationale": "Infectious mononucleosis can cause splenomegaly and rupture. Activity restriction is essential until the spleen is no longer enlarged and risk has passed.", "objective": "Diseases of the Oropharynx, Infectious Mononucleosis", "topic": "Diseases of the Oropharynx"}, {"number": 73, "stem": "A hospitalized patient receiving gentamicin develops oscillopsia, imbalance, and hearing difficulty. Which structure is most likely injured by this medication?", "options": [{"letter": "A", "text": "Facial nerve nucleus only"}, {"letter": "B", "text": "Tympanic membrane only"}, {"letter": "C", "text": "Cochlear hair cells and vestibular apparatus"}, {"letter": "D", "text": "Eustachian tube cartilage"}, {"letter": "E", "text": "External auditory canal skin"}], "correct": "C", "answerText": "Cochlear hair cells and vestibular apparatus", "rationale": "Aminoglycosides can cause both cochlear and vestibular toxicity through hair-cell injury.", "objective": "Cochleovestibular Disorders, Obj. 2", "topic": "Cochleovestibular Disorders"}, {"number": 74, "stem": "A 5-year-old child has a constant inward deviation of the left eye. The corneal light reflex is asymmetric, and the cover-uncover test confirms strabismus. What is the primary reason to treat promptly?", "options": [{"letter": "A", "text": "Prevent acute angle-closure glaucoma"}, {"letter": "B", "text": "Reduce intracranial pressure"}, {"letter": "C", "text": "Treat bacterial infection"}, {"letter": "D", "text": "Prevent amblyopia from cortical suppression"}, {"letter": "E", "text": "Prevent retinal vein occlusion"}], "correct": "D", "answerText": "Prevent amblyopia from cortical suppression", "rationale": "Untreated childhood strabismus can cause the brain to suppress input from one eye, leading to permanent amblyopia.", "objective": "External Eye Disorders, Obj. 11", "topic": "External Eye Disorders"}, {"number": 75, "stem": "A 70-year-old has acute vertigo, vertical nystagmus, dysarthria, and limb dysmetria. Symptoms do not lessen with visual fixation. What is the next best step?", "options": [{"letter": "A", "text": "Perform cerumen irrigation"}, {"letter": "B", "text": "Treat as BPPV with Epley maneuver"}, {"letter": "C", "text": "Treat as Meniere disease"}, {"letter": "D", "text": "Discharge with meclizine only"}, {"letter": "E", "text": "Emergency stroke evaluation"}], "correct": "E", "answerText": "Emergency stroke evaluation", "rationale": "Vertical or direction-changing nystagmus and focal neurologic deficits indicate a central cause such as posterior-circulation stroke.", "objective": "Cochleovestibular Disorders, Obj. 6", "topic": "Cochleovestibular Disorders"}, {"number": 76, "stem": "A patient with acute peripheral vertigo is prescribed meclizine. Which counseling is most appropriate?", "options": [{"letter": "A", "text": "It should be combined with aminoglycosides"}, {"letter": "B", "text": "It restores lost cochlear hair cells"}, {"letter": "C", "text": "Take it indefinitely to prevent recurrence"}, {"letter": "D", "text": "Use it only short term because prolonged vestibular suppression delays central compensation"}, {"letter": "E", "text": "It treats bacterial otitis media"}], "correct": "D", "answerText": "Use it only short term because prolonged vestibular suppression delays central compensation", "rationale": "Vestibular suppressants can relieve severe acute symptoms but chronic use interferes with central compensation.", "objective": "Cochleovestibular Disorders, Obj. 6", "topic": "Cochleovestibular Disorders"}, {"number": 77, "stem": "A 59-year-old smoker has progressive hoarseness for six weeks, dysphagia, and an enlarging neck node. Which next step is most appropriate?", "options": [{"letter": "A", "text": "Use intranasal antihistamines"}, {"letter": "B", "text": "Start nystatin"}, {"letter": "C", "text": "Treat as viral laryngitis indefinitely"}, {"letter": "D", "text": "Reassure without follow-up"}, {"letter": "E", "text": "Urgent laryngoscopy and biopsy"}], "correct": "E", "answerText": "Urgent laryngoscopy and biopsy", "rationale": "Persistent hoarseness with tobacco exposure and cervical adenopathy is concerning for laryngeal cancer.", "objective": "Diseases of the Oropharynx, Larynx", "topic": "Diseases of the Oropharynx"}, {"number": 78, "stem": "A 63-year-old woman reports sudden painless blurry vision in one eye. Fundoscopy shows diffuse retinal hemorrhages, dilated tortuous veins, and optic-disc edema. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Retinal detachment"}, {"letter": "B", "text": "Central retinal vein occlusion"}, {"letter": "C", "text": "Central retinal artery occlusion"}, {"letter": "D", "text": "Papilledema"}, {"letter": "E", "text": "Optic neuritis"}], "correct": "B", "answerText": "Central retinal vein occlusion", "rationale": "The blood-and-thunder appearance with venous engorgement and diffuse hemorrhages is characteristic of central retinal vein occlusion.", "objective": "External Eye Disorders, Obj. 14", "topic": "External Eye Disorders"}, {"number": 79, "stem": "A patient with chronic rhinosinusitis develops eyelid edema, proptosis, and painful eye movements. Which complication should be suspected?", "options": [{"letter": "A", "text": "Vasomotor rhinitis"}, {"letter": "B", "text": "Orbital cellulitis"}, {"letter": "C", "text": "Cerumen impaction"}, {"letter": "D", "text": "Allergic conjunctivitis"}, {"letter": "E", "text": "Simple viral rhinitis"}], "correct": "B", "answerText": "Orbital cellulitis", "rationale": "Proptosis and painful restricted EOMs indicate spread of sinus infection into the orbit, a vision-threatening complication.", "objective": "Nose & Sinus Disorders, Obj. 3", "topic": "Nose & Sinus Disorders"}, {"number": 80, "stem": "A 9-year-old has fever, malaise, and bilateral parotid swelling that began two days after a viral prodrome. No pus is expressed from the duct. Which complication should be discussed in a postpubertal male?", "options": [{"letter": "A", "text": "Orchitis"}, {"letter": "B", "text": "Septal hematoma"}, {"letter": "C", "text": "Angle-closure glaucoma"}, {"letter": "D", "text": "Mastoiditis"}, {"letter": "E", "text": "Retinal detachment"}], "correct": "A", "answerText": "Orchitis", "rationale": "Viral parotitis from mumps can cause orchitis, particularly in postpubertal males.", "objective": "Diseases of the Oropharynx, Salivary Glands", "topic": "Diseases of the Oropharynx"}, {"number": 81, "stem": "A 62-year-old smoker has a persistent white plaque on the lateral tongue that cannot be scraped off. It is painless and has been present for two months. What is the next best step?", "options": [{"letter": "A", "text": "Incise and drain"}, {"letter": "B", "text": "Reassure because it is always benign"}, {"letter": "C", "text": "Treat with nystatin and no follow-up"}, {"letter": "D", "text": "Start amoxicillin"}, {"letter": "E", "text": "Biopsy to evaluate for dysplasia or malignancy"}], "correct": "E", "answerText": "Biopsy to evaluate for dysplasia or malignancy", "rationale": "Nonscrapable leukoplakia is a potentially premalignant lesion and warrants biopsy, especially with tobacco exposure.", "objective": "Diseases of the Oropharynx, Oral Cavity & Pharynx", "topic": "Diseases of the Oropharynx"}, {"number": 82, "stem": "A 61-year-old has severe bilateral sensorineural hearing loss with poor speech discrimination despite appropriately fitted hearing aids. Which intervention may provide benefit?", "options": [{"letter": "A", "text": "Intranasal steroids"}, {"letter": "B", "text": "Cerumen irrigation"}, {"letter": "C", "text": "Cochlear implantation"}, {"letter": "D", "text": "Canal wall debridement"}, {"letter": "E", "text": "Tympanoplasty"}], "correct": "C", "answerText": "Cochlear implantation", "rationale": "Cochlear implants may help severe-to-profound SNHL when hearing aids provide inadequate speech understanding.", "objective": "Cochleovestibular Disorders, Obj. 5", "topic": "Cochleovestibular Disorders"}, {"number": 83, "stem": "A 41-year-old landscaper develops severe eye pain after a plant fragment strikes his cornea. Several days later, slit-lamp examination shows a feathery-edged stromal infiltrate and hypopyon. Which therapy best targets the likely cause?", "options": [{"letter": "A", "text": "Topical natamycin"}, {"letter": "B", "text": "Intravitreal anti-VEGF"}, {"letter": "C", "text": "Topical timolol"}, {"letter": "D", "text": "Oral doxycycline only"}, {"letter": "E", "text": "Topical olopatadine"}], "correct": "A", "answerText": "Topical natamycin", "rationale": "Vegetative trauma plus a feathery infiltrate suggests fungal keratitis, commonly Fusarium. Topical antifungal therapy such as natamycin and urgent referral are appropriate.", "objective": "External Eye Disorders, Obj. 7", "topic": "External Eye Disorders"}, {"number": 84, "stem": "A 32-year-old teacher has hoarseness after several days of an upper respiratory infection. She has no stridor, dysphagia, neck mass, or smoking history. Which management is most appropriate?", "options": [{"letter": "A", "text": "Voice rest, hydration, and supportive care"}, {"letter": "B", "text": "Emergency cricothyrotomy"}, {"letter": "C", "text": "Tonsillectomy"}, {"letter": "D", "text": "Immediate laryngeal biopsy"}, {"letter": "E", "text": "Broad-spectrum IV antibiotics"}], "correct": "A", "answerText": "Voice rest, hydration, and supportive care", "rationale": "Acute laryngitis is usually viral and self-limited; supportive care and voice rest are appropriate when red flags are absent.", "objective": "Diseases of the Oropharynx, Larynx", "topic": "Diseases of the Oropharynx"}, {"number": 85, "stem": "A child with recent acute otitis media develops fever, postauricular erythema and tenderness, and outward displacement of the pinna. Which diagnosis is most likely?", "options": [{"letter": "A", "text": "Mastoiditis"}, {"letter": "B", "text": "Erysipelas"}, {"letter": "C", "text": "Dacryocystitis"}, {"letter": "D", "text": "BPPV"}, {"letter": "E", "text": "Otitis externa"}], "correct": "A", "answerText": "Mastoiditis", "rationale": "Postauricular inflammation and protrusion of the auricle after AOM indicate mastoiditis, which requires urgent IV antibiotics and ENT assessment.", "objective": "Ear Disorders, Obj. 5", "topic": "Ear Disorders"}, {"number": 86, "stem": "A 5-year-old with high fever sits leaning forward, drools, and has a muffled voice and inspiratory stridor. The child appears anxious and toxic. What is the next best step?", "options": [{"letter": "A", "text": "Give only inhaled albuterol"}, {"letter": "B", "text": "Discharge with cough medicine"}, {"letter": "C", "text": "Inspect the throat forcefully in clinic"}, {"letter": "D", "text": "Obtain a throat culture before any intervention"}, {"letter": "E", "text": "Secure the airway in a controlled setting and give IV antibiotics"}], "correct": "E", "answerText": "Secure the airway in a controlled setting and give IV antibiotics", "rationale": "Epiglottitis is an airway emergency. Avoid agitation and forceful oropharyngeal examination; controlled airway management and IV antibiotics are required.", "objective": "Diseases of the Oropharynx, Larynx", "topic": "Diseases of the Oropharynx"}, {"number": 87, "stem": "A 58-year-old dehydrated postoperative patient develops painful unilateral swelling near the angle of the jaw. Purulent material can be expressed from Stensen duct. Which management is most appropriate?", "options": [{"letter": "A", "text": "Hydration, gland massage, sialogogues, and antistaphylococcal antibiotics"}, {"letter": "B", "text": "Laser iridotomy"}, {"letter": "C", "text": "Intranasal corticosteroid"}, {"letter": "D", "text": "Observation without hydration"}, {"letter": "E", "text": "Topical antifungal only"}], "correct": "A", "answerText": "Hydration, gland massage, sialogogues, and antistaphylococcal antibiotics", "rationale": "Acute bacterial sialadenitis often occurs with dehydration and causes tender gland swelling with purulent duct drainage.", "objective": "Diseases of the Oropharynx, Salivary Glands", "topic": "Diseases of the Oropharynx"}, {"number": 88, "stem": "A 23-year-old develops nasal congestion, sneezing, watery rhinorrhea, and sore throat for three days. He has mild fatigue but no facial pain, high fever, or double worsening. Examination shows erythematous nasal mucosa. Which management is most appropriate?", "options": [{"letter": "A", "text": "Endoscopic sinus surgery"}, {"letter": "B", "text": "Amoxicillin-clavulanate for 10 days"}, {"letter": "C", "text": "IM ceftriaxone"}, {"letter": "D", "text": "Supportive care without antibiotics"}, {"letter": "E", "text": "Urgent sinus CT"}], "correct": "D", "answerTex
