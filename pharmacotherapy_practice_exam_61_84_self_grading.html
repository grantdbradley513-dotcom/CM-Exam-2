<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pharmacotherapy Practice Exam Questions 61-84</title>
<style>
:root { --bg:#eef3f8; --card:#ffffff; --ink:#102033; --muted:#5f6b7a; --line:#d8e1ec; --accent:#1d6f9f; --accent2:#0f766e; --green:#d9f7e6; --greenBorder:#159947; --red:#ffe1e1; --redBorder:#c62828; --gold:#fff4cc; }
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:linear-gradient(180deg,#e7f0f7 0%,var(--bg) 240px);color:var(--ink);line-height:1.45;font-size:18px} .wrap{max-width:980px;margin:0 auto;padding:24px 16px 44px} header{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:0 8px 28px rgba(16,32,51,.08);margin-bottom:18px} h1{font-size:clamp(1.65rem,4vw,2.6rem);margin:0 0 8px;color:#0e4660} .subtitle{color:var(--muted);font-weight:650;margin-bottom:14px} .stats{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px} .pill{background:#edf8fb;border:1px solid #b9dce9;color:#12485d;border-radius:999px;padding:7px 12px;font-size:.95rem;font-weight:700} .toolbar{position:sticky;top:0;z-index:10;background:rgba(238,243,248,.94);backdrop-filter:blur(8px);padding:12px 0;margin-bottom:12px} .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center} button{border:0;border-radius:12px;padding:12px 16px;font-weight:800;font-size:1rem;cursor:pointer;background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(29,111,159,.2)} button.secondary{background:#fff;color:#17445a;border:1px solid var(--line)} button.warning{background:#b45309} button:active{transform:translateY(1px)} #scoreBox{display:none;background:var(--card);border:2px solid #bcd8e7;border-radius:16px;padding:14px 16px;margin:12px 0;font-size:1.08rem;font-weight:750} .question{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;margin:16px 0;box-shadow:0 8px 22px rgba(16,32,51,.055)} .qtop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px} .qnum{font-weight:900;color:#0e4660} .stem{font-size:1.12rem;font-weight:700} .choices{display:grid;gap:10px;margin-top:14px} label.choice{display:flex;gap:12px;align-items:flex-start;border:2px solid var(--line);border-radius:14px;padding:13px;background:#fbfdff;cursor:pointer} label.choice:hover{border-color:#9cc8dc;background:#f4fbfe} input[type=radio]{transform:scale(1.2);margin-top:4px} .letter{font-weight:900;min-width:1.5rem;color:#17445a} .correct{background:var(--green)!important;border-color:var(--greenBorder)!important} .incorrect{background:var(--red)!important;border-color:var(--redBorder)!important} .answerLine{display:none;margin-top:14px;padding:12px 14px;border-radius:12px;background:var(--gold);border:1px solid #f1d878;font-weight:750} .rationale{display:none;margin-top:8px;color:var(--muted);font-size:.98rem} .missedOnly .question.correctQ{display:none} footer{color:var(--muted);font-size:.95rem;text-align:center;margin-top:24px} @media (max-width:640px){body{font-size:17px} header,.question{padding:18px} .bar button{width:100%} .qtop{display:block}}
</style>
</head>
<body>
<div class="wrap" id="app">
<header>
<h1>Pharmacotherapy Practice Exam</h1>
<div class="subtitle">Questions 61-84 · Single best answer · Self-grading</div>
<div class="stats"><span class="pill">Questions found: 24</span><span class="pill">Questions imported: 24</span><span class="pill">Unparsed: 0</span></div>
</header>
<div class="toolbar"><div class="bar"><button onclick="gradeExam()">Submit & Grade</button><button class="secondary" onclick="resetExam()">Reset Exam</button><button class="warning" onclick="toggleMissed()" id="missedBtn">Review Missed Questions</button></div><div id="scoreBox"></div></div>
<main id="questions"></main>
<footer>Imported from uploaded PDF. Answer key detected in source PDF and used for grading.</footer>
</div>
<script>
const questions = [{"number": 61, "stem": "A patient is receiving pyrazinamide for active tuberculosis. Which laboratory value should be monitored during therapy?", "choices": [{"letter": "A", "text": "INR"}, {"letter": "B", "text": "Uric acid"}, {"letter": "C", "text": "Troponin"}, {"letter": "D", "text": "TSH"}, {"letter": "E", "text": "BNP"}], "answer": "B"}, {"number": 62, "stem": "A patient develops a femoral vein DVT but has a very high risk of bleeding that makes anticoagulation unsafe. What is the most appropriate treatment?", "choices": [{"letter": "A", "text": "Apixaban"}, {"letter": "B", "text": "Warfarin"}, {"letter": "C", "text": "Aspirin"}, {"letter": "D", "text": "IVC filter"}, {"letter": "E", "text": "Clopidogrel"}], "answer": "D"}, {"number": 63, "stem": "A patient with active tuberculosis is eligible for a shortened 4-month treatment regimen. Which regimen is appropriate?", "choices": [{"letter": "A", "text": "Isoniazid + Rifapentine + Moxifloxacin + Pyrazinamide"}, {"letter": "B", "text": "Isoniazid + Rifampin only"}, {"letter": "C", "text": "Rifampin + Ethambutol"}, {"letter": "D", "text": "Pyrazinamide only"}, {"letter": "E", "text": "Ethambutol only"}], "answer": "A"}, {"number": 64, "stem": "A 50-year-old man with a penicillin allergy is diagnosed with uncomplicated outpatient community-acquired pneumonia. Which antibiotic is most appropriate?", "choices": [{"letter": "A", "text": "Amoxicillin"}, {"letter": "B", "text": "Cefepime"}, {"letter": "C", "text": "Doxycycline"}, {"letter": "D", "text": "Piperacillin/Tazobactam"}, {"letter": "E", "text": "Meropenem"}], "answer": "C"}, {"number": 65, "stem": "A patient with a CrCl of 22 mL/min requires anticoagulation. Which medications should generally be avoided?", "choices": [{"letter": "A", "text": "Warfarin"}, {"letter": "B", "text": "Unfractionated Heparin"}, {"letter": "C", "text": "LMWH with adjustment"}, {"letter": "D", "text": "Oral Factor Xa inhibitors and direct thrombin inhibitors"}, {"letter": "E", "text": "Aspirin"}], "answer": "D"}, {"number": 66, "stem": "A patient develops pneumonia after being hospitalized for 3 days and was placed on a ventilator yesterday. What type of pneumonia is this?", "choices": [{"letter": "A", "text": "Community-acquired pneumonia"}, {"letter": "B", "text": "Hospital-acquired pneumonia"}, {"letter": "C", "text": "Ventilator-associated pneumonia"}, {"letter": "D", "text": "Aspiration pneumonia"}, {"letter": "E", "text": "Atypical pneumonia"}], "answer": "B"}, {"number": 67, "stem": "A patient taking antibiotics for pneumonia asks what can be used for fever and body aches. Which medication is preferred?", "choices": [{"letter": "A", "text": "Guaifenesin"}, {"letter": "B", "text": "Acetaminophen"}, {"letter": "C", "text": "Montelukast"}, {"letter": "D", "text": "Albuterol"}, {"letter": "E", "text": "Rifampin"}], "answer": "B"}, {"number": 68, "stem": "A patient develops pneumonia after 5 days in the hospital and has been mechanically ventilated for the past 3 days. What type of pneumonia is this?", "choices": [{"letter": "A", "text": "Ventilator-associated pneumonia"}, {"letter": "B", "text": "Hospital-acquired pneumonia"}, {"letter": "C", "text": "Community-acquired pneumonia"}, {"letter": "D", "text": "Aspiration pneumonia"}, {"letter": "E", "text": "Fungal pneumonia"}], "answer": "A"}, {"number": 69, "stem": "A patient with pneumonia reports bothersome thick mucus production. Which medication may help?", "choices": [{"letter": "A", "text": "Acetaminophen"}, {"letter": "B", "text": "Dextromethorphan"}, {"letter": "C", "text": "Guaifenesin"}, {"letter": "D", "text": "Albuterol"}, {"letter": "E", "text": "Prednisone"}], "answer": "C"}, {"number": 70, "stem": "A patient with COPD who was hospitalized one month ago presents with community-acquired pneumonia. What is the most appropriate treatment plan?", "choices": [{"letter": "A", "text": "Community-acquired pneumonia antibiotics plus corticosteroids if needed for COPD exacerbation"}, {"letter": "B", "text": "TB therapy"}, {"letter": "C", "text": "Vancomycin only"}, {"letter": "D", "text": "Observation"}, {"letter": "E", "text": "Antifungal therapy"}], "answer": "A"}, {"number": 71, "stem": "A patient with CrCl of 25 mL/min develops a DVT. Which anticoagulation strategy is preferred?", "choices": [{"letter": "A", "text": "Apixaban"}, {"letter": "B", "text": "Rivaroxaban"}, {"letter": "C", "text": "LMWH with dose adjustment or unfractionated heparin"}, {"letter": "D", "text": "Dabigatran"}, {"letter": "E", "text": "Edoxaban"}], "answer": "C"}, {"number": 72, "stem": "A patient taking warfarin asks which substances may significantly interact with the medication. Which is an example?", "choices": [{"letter": "A", "text": "Metformin"}, {"letter": "B", "text": "TMP-SMX"}, {"letter": "C", "text": "Cetirizine"}, {"letter": "D", "text": "Albuterol"}, {"letter": "E", "text": "Omeprazole"}], "answer": "B"}, {"number": 73, "stem": "A hospitalized patient with pneumonia meets admission criteria and has risk factors for Pseudomonas infection. Which additional agent should be considered?", "choices": [{"letter": "A", "text": "Doxycycline"}, {"letter": "B", "text": "Azithromycin"}, {"letter": "C", "text": "Piperacillin/Tazobactam"}, {"letter": "D", "text": "Amoxicillin"}, {"letter": "E", "text": "Linezolid"}], "answer": "C"}, {"number": 74, "stem": "A patient develops pneumonia after spending 3 days in the hospital. What classification best describes this infection?", "choices": [{"letter": "A", "text": "Community-acquired pneumonia"}, {"letter": "B", "text": "Hospital-acquired pneumonia"}, {"letter": "C", "text": "Ventilator-associated pneumonia"}, {"letter": "D", "text": "Aspiration pneumonia"}, {"letter": "E", "text": "Walking pneumonia"}], "answer": "B"}, {"number": 75, "stem": "A 50-year-old man with a penicillin allergy is diagnosed with uncomplicated outpatient pneumonia. Which medication is preferred?", "choices": [{"letter": "A", "text": "Doxycycline"}, {"letter": "B", "text": "Amoxicillin"}, {"letter": "C", "text": "Cefepime"}, {"letter": "D", "text": "Piperacillin/Tazobactam"}, {"letter": "E", "text": "Meropenem"}], "answer": "A"}, {"number": 76, "stem": "A patient develops major bleeding while receiving unfractionated heparin. Which antidote should be administered?", "choices": [{"letter": "A", "text": "Vitamin K"}, {"letter": "B", "text": "Idarucizumab"}, {"letter": "C", "text": "Protamine sulfate"}, {"letter": "D", "text": "Andexanet alfa"}, {"letter": "E", "text": "PCC"}], "answer": "C"}, {"number": 77, "stem": "A patient with pneumonia requires admission and was recently hospitalized for a complicated UTI. Which additional medication should be added for MRSA coverage?", "choices": [{"letter": "A", "text": "Piperacillin/Tazobactam"}, {"letter": "B", "text": "Cefepime"}, {"letter": "C", "text": "Azithromycin"}, {"letter": "D", "text": "Vancomycin or Linezolid"}, {"letter": "E", "text": "Doxycycline"}], "answer": "D"}, {"number": 78, "stem": "A patient is starting rivaroxaban for treatment of DVT. Which counseling point is most important?", "choices": [{"letter": "A", "text": "Stop therapy when symptoms improve"}, {"letter": "B", "text": "Double doses if a dose is missed"}, {"letter": "C", "text": "Do not stop abruptly due to increased thrombotic risk"}, {"letter": "D", "text": "Take with vitamin K supplements"}, {"letter": "E", "text": "Avoid all exercise"}], "answer": "C"}, {"number": 79, "stem": "A patient is being evaluated for possible pulmonary embolism. Why might unfractionated heparin be chosen instead of LMWH initially?", "choices": [{"letter": "A", "text": "Faster onset of anticoagulation"}, {"letter": "B", "text": "Better oral absorption"}, {"letter": "C", "text": "Lower bleeding risk"}, {"letter": "D", "text": "Less monitoring"}, {"letter": "E", "text": "Longer duration"}], "answer": "A"}, {"number": 80, "stem": "A healthy 45-year-old man is diagnosed with uncomplicated outpatient community-acquired pneumonia. Which antibiotic is recommended?", "choices": [{"letter": "A", "text": "Azithromycin"}, {"letter": "B", "text": "Doxycycline"}, {"letter": "C", "text": "Amoxicillin"}, {"letter": "D", "text": "Cefepime"}, {"letter": "E", "text": "Meropenem"}], "answer": "C"}, {"number": 81, "stem": "A patient with diabetes is prescribed outpatient therapy for community-acquired pneumonia. Assuming clinical improvement, what is the recommended duration of therapy?", "choices": [{"letter": "A", "text": "3 days"}, {"letter": "B", "text": "5 days"}, {"letter": "C", "text": "7 days"}, {"letter": "D", "text": "10 days"}, {"letter": "E", "text": "14 days"}], "answer": "B"}, {"number": 82, "stem": "A patient with a new DVT is being evaluated for treatment with LMWH. Which condition is a contraindication?", "choices": [{"letter": "A", "text": "Controlled hypertension"}, {"letter": "B", "text": "Stable COPD"}, {"letter": "C", "text": "Active bleeding"}, {"letter": "D", "text": "Hyperlipidemia"}, {"letter": "E", "text": "Hypothyroidism"}], "answer": "C"}, {"number": 83, "stem": "A 55-year-old man with diabetes and CKD presents with community-acquired pneumonia. His CURB-65 score does not indicate admission. Which outpatient antibiotic regimen is preferred?", "choices": [{"letter": "A", "text": "Amoxicillin/Clavulanate plus Doxycycline"}, {"letter": "B", "text": "Doxycycline only"}, {"letter": "C", "text": "Azithromycin only"}, {"letter": "D", "text": "Cefepime"}, {"letter": "E", "text": "Meropenem"}], "answer": "A"}, {"number": 84, "stem": "A patient with severe renal dysfunction requires long-term anticoagulation. Why might warfarin be preferred over a DOAC?", "choices": [{"letter": "A", "text": "Faster onset"}, {"letter": "B", "text": "No monitoring needed"}, {"letter": "C", "text": "Severe renal dysfunction"}, {"letter": "D", "text": "Fewer interactions"}, {"letter": "E", "text": "Better adherence"}], "answer": "C"}];
let graded=false, missedMode=false;
const qWrap=document.getElementById('questions');
function esc(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function render(){
 qWrap.innerHTML=questions.map((q,idx)=>`<section class="question" id="q${q.number}" data-q="${q.number}"><div class="qtop"><div class="qnum">Question ${q.number}</div><div class="stem">${esc(q.stem)}</div></div><div class="choices">${q.choices.map(c=>`<label class="choice" data-letter="${c.letter}"><input type="radio" name="q${q.number}" value="${c.letter}"><span class="letter">${c.letter}.</span><span>${esc(c.text)}</span></label>`).join('')}</div><div class="answerLine" id="ans${q.number}"></div><div class="rationale" id="rat${q.number}"></div></section>`).join('');
}
function gradeExam(){
 let correct=0, answered=0;
 questions.forEach(q=>{
   const sec=document.getElementById('q'+q.number); sec.classList.remove('correctQ');
   const selected=document.querySelector(`input[name="q${q.number}"]:checked`);
   sec.querySelectorAll('.choice').forEach(l=>l.classList.remove('correct','incorrect'));
   const correctLabel=sec.querySelector(`.choice[data-letter="${q.answer}"]`); if(correctLabel) correctLabel.classList.add('correct');
   if(selected){ answered++; if(selected.value===q.answer){correct++; sec.classList.add('correctQ');} else {sec.querySelector(`.choice[data-letter="${selected.value}"]`).classList.add('incorrect');} }
   const correctChoice=q.choices.find(c=>c.letter===q.answer);
   document.getElementById('ans'+q.number).style.display='block';
   document.getElementById('ans'+q.number).innerHTML=`Correct answer: <strong>${q.answer}. ${esc(correctChoice?correctChoice.text:'')}</strong>`;
 });
 const pct=Math.round((correct/questions.length)*1000)/10;
 const box=document.getElementById('scoreBox'); box.style.display='block'; box.innerHTML=`Score: ${correct} / ${questions.length} correct (${pct}%) · Answered: ${answered} / ${questions.length}`;
 graded=true; window.scrollTo({top:0,behavior:'smooth'});
}
function resetExam(){document.querySelectorAll('input[type=radio]').forEach(i=>i.checked=false);document.querySelectorAll('.choice').forEach(l=>l.classList.remove('correct','incorrect'));document.querySelectorAll('.answerLine,.rationale').forEach(e=>e.style.display='none');document.querySelectorAll('.question').forEach(s=>s.classList.remove('correctQ'));document.getElementById('scoreBox').style.display='none';document.getElementById('app').classList.remove('missedOnly');missedMode=false;document.getElementById('missedBtn').textContent='Review Missed Questions';graded=false;window.scrollTo({top:0,behavior:'smooth'});}
function toggleMissed(){if(!graded) gradeExam(); missedMode=!missedMode; document.getElementById('app').classList.toggle('missedOnly',missedMode); document.getElementById('missedBtn').textContent=missedMode?'Show All Questions':'Review Missed Questions';}
render();
</script>
</body>
</html>
