<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pharmacotherapy Practice Exam Questions 21-40</title>
<style>
:root{--bg:#f6f8fb;--card:#ffffff;--ink:#172033;--muted:#64748b;--blue:#2563eb;--blue2:#1d4ed8;--green:#dcfce7;--green-border:#16a34a;--red:#fee2e2;--red-border:#dc2626;--line:#e2e8f0;--amber:#fff7ed;}
*{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#eef4ff 0%,var(--bg) 220px);color:var(--ink);font-size:18px;line-height:1.5}.wrap{max-width:980px;margin:0 auto;padding:28px 16px 56px}.hero{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:0 18px 50px rgba(15,23,42,.08);margin-bottom:22px}.kicker{font-weight:800;color:var(--blue);letter-spacing:.04em;text-transform:uppercase;font-size:13px}h1{margin:.2rem 0 .5rem;font-size:clamp(28px,5vw,44px);line-height:1.05}.sub{color:var(--muted);font-size:18px}.toolbar{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}.btn{border:0;border-radius:999px;padding:13px 18px;font-size:16px;font-weight:800;cursor:pointer;background:#e2e8f0;color:#0f172a}.btn.primary{background:var(--blue);color:white}.btn.primary:hover{background:var(--blue2)}.btn:disabled{opacity:.55;cursor:not-allowed}.score{display:none;margin-top:18px;padding:18px;border-radius:18px;background:#eff6ff;border:1px solid #bfdbfe;font-weight:800}.score small{display:block;color:var(--muted);font-weight:600;margin-top:4px}.question{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:22px;margin:18px 0;box-shadow:0 12px 28px rgba(15,23,42,.055)}.qhead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.badge{background:#dbeafe;color:#1e40af;border-radius:999px;padding:7px 13px;font-weight:900;font-size:14px}.stem{font-size:20px;font-weight:750;margin:0 0 16px}.choice{display:flex;align-items:flex-start;gap:12px;border:2px solid var(--line);border-radius:16px;padding:14px 14px;margin:10px 0;cursor:pointer;background:#fff;transition:.15s}.choice:hover{border-color:#93c5fd;background:#f8fbff}.choice input{margin-top:5px;transform:scale(1.2)}.choice .letter{font-weight:900;min-width:26px}.choice.correct{background:var(--green);border-color:var(--green-border)}.choice.incorrect{background:var(--red);border-color:var(--red-border)}.choice.unanswered-missed{background:var(--amber);border-color:#f59e0b}.answerbox{display:none;margin-top:14px;border-left:5px solid var(--blue);background:#f8fafc;padding:14px;border-radius:12px}.answerbox b{color:#0f172a}.hidden{display:none!important}.footer-note{color:var(--muted);text-align:center;margin-top:28px;font-size:14px}@media(max-width:640px){body{font-size:17px}.hero,.question{padding:18px;border-radius:18px}.toolbar{display:grid;grid-template-columns:1fr}.btn{width:100%}.stem{font-size:18px}.choice{padding:13px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="kicker">Self-Grading Medical Board Review</div>
    <h1>Pharmacotherapy Practice Exam</h1>
    <div class="sub">Questions 21-40 • Single best answer • 20 questions</div>
    <div class="toolbar">
      <button class="btn primary" onclick="gradeExam()">Submit & Grade</button>
      <button class="btn" onclick="resetExam()">Reset Exam</button>
      <button class="btn" onclick="reviewMissed()" id="reviewBtn" disabled>Review Missed Questions</button>
    </div>
    <div id="score" class="score"></div>
  </section>
  <main id="exam"></main>
  <div class="footer-note">Imported from Pharmacotherapy Practice Exam (Questions 21-40). Answer key found in PDF and used for grading.</div>
</div>
<script>
const questions = [{"number": 21, "stem": "A 68-year-old man taking warfarin for atrial fibrillation asks about substances that may affect his INR. Which of the following is a known interaction with warfarin?", "choices": [{"letter": "A", "text": "Metformin"}, {"letter": "B", "text": "TMP-SMX"}, {"letter": "C", "text": "Albuterol"}, {"letter": "D", "text": "Acetaminophen only"}, {"letter": "E", "text": "Levothyroxine"}], "answer": "B", "rationale": "TMP-SMX is a known clinically important warfarin interaction that can increase INR/bleeding risk."}, {"number": 22, "stem": "A 52-year-old woman is being treated for community-acquired pneumonia and asks what she can take for fever and body aches. Which is most appropriate?", "choices": [{"letter": "A", "text": "Acetaminophen"}, {"letter": "B", "text": "Rifampin"}, {"letter": "C", "text": "Guaifenesin"}, {"letter": "D", "text": "Ipratropium"}, {"letter": "E", "text": "Ethambutol"}], "answer": "A", "rationale": "Acetaminophen is appropriate symptomatic treatment for fever and body aches."}, {"number": 23, "stem": "A patient with an acute iliac vein DVT has no bleeding risk. The PA wants rapid anticoagulation. Which treatment is most appropriate?", "choices": [{"letter": "A", "text": "Warfarin"}, {"letter": "B", "text": "Aspirin"}, {"letter": "C", "text": "Unfractionated heparin"}, {"letter": "D", "text": "Clopidogrel"}, {"letter": "E", "text": "Dabigatran"}], "answer": "C", "rationale": "Unfractionated heparin provides rapid anticoagulation for acute DVT."}, {"number": 24, "stem": "A patient is diagnosed with tuberculous meningitis. Which RIPE medication is generally not used because of poor CNS penetration?", "choices": [{"letter": "A", "text": "Isoniazid"}, {"letter": "B", "text": "Rifampin"}, {"letter": "C", "text": "Pyrazinamide"}, {"letter": "D", "text": "Ethambutol"}, {"letter": "E", "text": "Pyridoxine"}], "answer": "D", "rationale": "Ethambutol has poor CNS penetration and is generally not used for TB meningitis."}, {"number": 25, "stem": "A patient develops pneumonia after being hospitalized for 3 days. What type of pneumonia is this?", "choices": [{"letter": "A", "text": "Community-acquired pneumonia"}, {"letter": "B", "text": "Ventilator-associated pneumonia"}, {"letter": "C", "text": "Hospital-acquired pneumonia"}, {"letter": "D", "text": "Aspiration pneumonia"}, {"letter": "E", "text": "Atypical pneumonia"}], "answer": "C", "rationale": "Pneumonia developing after at least 48 hours of hospitalization is hospital-acquired pneumonia."}, {"number": 26, "stem": "A 20-year-old woman has asthma symptoms twice monthly. According to GINA Step 2, which therapy is recommended?", "choices": [{"letter": "A", "text": "As-needed low-dose Budesonide/Formoterol"}, {"letter": "B", "text": "Tiotropium"}, {"letter": "C", "text": "Montelukast"}, {"letter": "D", "text": "Prednisone"}, {"letter": "E", "text": "Salmeterol"}], "answer": "A", "rationale": "GINA Step 2 includes as-needed low-dose budesonide/formoterol."}, {"number": 27, "stem": "A patient is starting apixaban for treatment of DVT. What counseling point is most important?", "choices": [{"letter": "A", "text": "Take with vitamin K"}, {"letter": "B", "text": "Stop medication when symptoms improve"}, {"letter": "C", "text": "Avoid all exercise"}, {"letter": "D", "text": "Do not stop abruptly due to thrombosis risk"}, {"letter": "E", "text": "Double doses if one is missed"}], "answer": "D", "rationale": "Abruptly stopping apixaban can increase thrombotic risk."}, {"number": 28, "stem": "A patient with stable COPD needs a rescue inhaler for intermittent dyspnea. Which medication is appropriate?", "choices": [{"letter": "A", "text": "Umeclidinium"}, {"letter": "B", "text": "Albuterol"}, {"letter": "C", "text": "Montelukast"}, {"letter": "D", "text": "Fluticasone"}, {"letter": "E", "text": "Prednisone"}], "answer": "B", "rationale": "Albuterol is a short-acting beta agonist used as a rescue inhaler."}, {"number": 29, "stem": "A patient with CrCl of 22 mL/min develops a DVT. Which anticoagulant strategy is most appropriate?", "choices": [{"letter": "A", "text": "Standard-dose LMWH"}, {"letter": "B", "text": "Apixaban"}, {"letter": "C", "text": "LMWH with dose adjustment or unfractionated heparin"}, {"letter": "D", "text": "Aspirin"}, {"letter": "E", "text": "Clopidogrel"}], "answer": "C", "rationale": "Severe renal dysfunction requires LMWH dose adjustment or use of unfractionated heparin."}, {"number": 30, "stem": "A patient with diabetes is prescribed outpatient treatment for community-acquired pneumonia. What is the recommended duration of therapy if clinically improving?", "choices": [{"letter": "A", "text": "3 days"}, {"letter": "B", "text": "5 days"}, {"letter": "C", "text": "7 days"}, {"letter": "D", "text": "10 days"}, {"letter": "E", "text": "14 days"}], "answer": "B", "rationale": "If clinically improving, typical CAP treatment duration is 5 days."}, {"number": 31, "stem": "A patient with pneumonia complains of thick mucus and asks for an expectorant. Which medication is most appropriate?", "choices": [{"letter": "A", "text": "Dextromethorphan"}, {"letter": "B", "text": "Acetaminophen"}, {"letter": "C", "text": "Albuterol"}, {"letter": "D", "text": "Guaifenesin"}, {"letter": "E", "text": "Montelukast"}], "answer": "D", "rationale": "Guaifenesin is an expectorant used to help loosen thick mucus."}, {"number": 32, "stem": "A patient has a distal DVT that requires anticoagulation and has a low bleeding risk. Which initial therapy is preferred?", "choices": [{"letter": "A", "text": "Aspirin"}, {"letter": "B", "text": "Low-molecular-weight heparin"}, {"letter": "C", "text": "Clopidogrel"}, {"letter": "D", "text": "No treatment"}, {"letter": "E", "text": "Warfarin alone"}], "answer": "B", "rationale": "Low-molecular-weight heparin is an appropriate preferred initial therapy when anticoagulation is required and bleeding risk is low."}, {"number": 33, "stem": "A patient with asthma continues to have symptoms despite Step 2 therapy. According to GINA Step 3, which treatment is recommended?", "choices": [{"letter": "A", "text": "Albuterol only"}, {"letter": "B", "text": "Tiotropium"}, {"letter": "C", "text": "Maintenance low-dose Budesonide/Formoterol"}, {"letter": "D", "text": "Prednisone"}, {"letter": "E", "text": "Montelukast"}], "answer": "C", "rationale": "GINA Step 3 recommends maintenance low-dose budesonide/formoterol."}, {"number": 34, "stem": "A patient is receiving ethambutol as part of TB treatment. What monitoring is required?", "choices": [{"letter": "A", "text": "Weekly ECGs"}, {"letter": "B", "text": "Monthly vision testing"}, {"letter": "C", "text": "Daily CBCs"}, {"letter": "D", "text": "Pulmonary function testing"}, {"letter": "E", "text": "INR monitoring"}], "answer": "B", "rationale": "Ethambutol can cause optic toxicity, so monthly vision testing is required."}, {"number": 35, "stem": "A patient remains severely symptomatic despite high-level asthma therapy and now meets GINA Step 5 criteria. What medication should be added?", "choices": [{"letter": "A", "text": "Montelukast"}, {"letter": "B", "text": "Albuterol"}, {"letter": "C", "text": "Tiotropium"}, {"letter": "D", "text": "Ipratropium"}, {"letter": "E", "text": "Salmeterol"}], "answer": "C", "rationale": "Tiotropium, a LAMA, may be added at GINA Step 5."}, {"number": 36, "stem": "A patient has a low Wells score for pulmonary embolism. What is the next step in evaluation?", "choices": [{"letter": "A", "text": "CT pulmonary angiography"}, {"letter": "B", "text": "Begin anticoagulation"}, {"letter": "C", "text": "D-dimer only"}, {"letter": "D", "text": "Apply PERC criteria"}, {"letter": "E", "text": "Echocardiogram"}], "answer": "D", "rationale": "With low Wells score, apply PERC criteria to determine whether further testing is needed."}, {"number": 37, "stem": "A patient develops significant bleeding while receiving unfractionated heparin. What antidote should be administered?", "choices": [{"letter": "A", "text": "Vitamin K"}, {"letter": "B", "text": "Idarucizumab"}, {"letter": "C", "text": "Andexanet alfa"}, {"letter": "D", "text": "Protamine sulfate"}, {"letter": "E", "text": "PCC"}], "answer": "D", "rationale": "Protamine sulfate reverses unfractionated heparin."}, {"number": 38, "stem": "A 24-year-old woman presents to the emergency department with an acute asthma exacerbation and oxygen saturation of 89%. Which treatment is most appropriate?", "choices": [{"letter": "A", "text": "Montelukast only"}, {"letter": "B", "text": "Albuterol, oxygen if needed, and systemic corticosteroids"}, {"letter": "C", "text": "Tiotropium only"}, {"letter": "D", "text": "Isoniazid"}, {"letter": "E", "text": "Observation only"}], "answer": "B", "rationale": "Acute asthma exacerbation with hypoxemia is treated with albuterol, oxygen as needed, and systemic corticosteroids."}, {"number": 39, "stem": "A patient with stable COPD requires a rescue inhaler but has a history of tachycardia with albuterol. Which medication is preferred?", "choices": [{"letter": "A", "text": "Levalbuterol"}, {"letter": "B", "text": "Formoterol"}, {"letter": "C", "text": "Tiotropium"}, {"letter": "D", "text": "Fluticasone"}, {"letter": "E", "text": "Montelukast"}], "answer": "A", "rationale": "Levalbuterol may be preferred when tachycardia occurs with albuterol."}, {"number": 40, "stem": "A patient is starting RIPE therapy for active tuberculosis. Which monitoring plan is most appropriate?", "choices": [{"letter": "A", "text": "Monthly INR only"}, {"letter": "B", "text": "CBC only"}, {"letter": "C", "text": "Vision testing only"}, {"letter": "D", "text": "LFTs, hepatitis testing, CBC, BMP, uric acid, and monthly vision testing"}, {"letter": "E", "text": "Daily chest radiographs"}], "answer": "D", "rationale": "RIPE therapy monitoring includes LFTs, hepatitis testing, CBC, BMP, uric acid, and monthly vision testing."}];
const exam = document.getElementById('exam');
function esc(s){return String(s).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function renderExam(){
  exam.innerHTML = questions.map((q, idx) => `
    <section class="question" id="q${q.number}" data-q="${q.number}">
      <div class="qhead"><span class="badge">Question ${q.number}</span><span class="badge">${idx+1} / ${questions.length}</span></div>
      <p class="stem">${esc(q.stem)}</p>
      <div class="choices">
        ${q.choices.map(c => `
          <label class="choice" data-letter="${c.letter}">
            <input type="radio" name="q${q.number}" value="${c.letter}">
            <span class="letter">${c.letter}.</span>
            <span>${esc(c.text)}</span>
          </label>`).join('')}
      </div>
      <div class="answerbox" id="answer-q${q.number}"></div>
    </section>`).join('');
}
function gradeExam(){
  let correct = 0;
  const missed = [];
  questions.forEach(q => {
    const section = document.getElementById(`q${q.number}`);
    section.classList.remove('hidden');
    const selected = document.querySelector(`input[name="q${q.number}"]:checked`);
    const selectedVal = selected ? selected.value : null;
    const answerChoice = q.choices.find(c => c.letter === q.answer);
    section.querySelectorAll('.choice').forEach(label => {
      label.classList.remove('correct','incorrect','unanswered-missed');
      const letter = label.dataset.letter;
      if(letter === q.answer) label.classList.add('correct');
      if(selectedVal && letter === selectedVal && selectedVal !== q.answer) label.classList.add('incorrect');
    });
    if(selectedVal === q.answer){ correct++; }
    else { missed.push(q.number); if(!selectedVal) section.querySelector(`[data-letter="${q.answer}"]`).classList.add('unanswered-missed'); }
    const box = document.getElementById(`answer-q${q.number}`);
    box.style.display = 'block';
    box.innerHTML = `<b>Correct answer: ${q.answer}. ${esc(answerChoice.text)}</b><br>${esc(q.rationale || 'No rationale provided in the source PDF.')}`;
  });
  const pct = Math.round((correct / questions.length) * 1000) / 10;
  const score = document.getElementById('score');
  score.style.display = 'block';
  score.innerHTML = `Score: ${correct} / ${questions.length} correct (${pct}%)<small>${missed.length ? 'Missed: ' + missed.join(', ') : 'No missed questions.'}</small>`;
  document.getElementById('reviewBtn').disabled = missed.length === 0;
  window.missedQuestions = missed;
  score.scrollIntoView({behavior:'smooth', block:'center'});
}
function resetExam(){
  document.querySelectorAll('input[type="radio"]').forEach(i => i.checked = false);
  document.querySelectorAll('.choice').forEach(c => c.classList.remove('correct','incorrect','unanswered-missed'));
  document.querySelectorAll('.answerbox').forEach(b => {b.style.display='none'; b.innerHTML='';});
  document.querySelectorAll('.question').forEach(q => q.classList.remove('hidden'));
  document.getElementById('score').style.display = 'none';
  document.getElementById('reviewBtn').disabled = true;
  window.missedQuestions = [];
  window.scrollTo({top:0, behavior:'smooth'});
}
function reviewMissed(){
  const missed = window.missedQuestions || [];
  if(!missed.length) return;
  document.querySelectorAll('.question').forEach(section => {
    const n = Number(section.dataset.q);
    section.classList.toggle('hidden', !missed.includes(n));
  });
  document.getElementById('score').scrollIntoView({behavior:'smooth', block:'center'});
}
renderExam();
</script>
</body>
</html>
