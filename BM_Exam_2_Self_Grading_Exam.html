<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Behavioral Medicine Exam 2: Self-Grading Practice Exam</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --ink: #172033;
      --muted: #64748b;
      --line: #dbe4f0;
      --accent: #1f5f9f;
      --accent-2: #0f766e;
      --green-bg: #dcfce7;
      --green-border: #16a34a;
      --green-text: #14532d;
      --red-bg: #fee2e2;
      --red-border: #dc2626;
      --red-text: #7f1d1d;
      --warn-bg: #fff7ed;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(31,95,159,0.15), transparent 34rem),
        linear-gradient(180deg, #eef4fb 0%, var(--bg) 38%, #f9fbfd 100%);
      color: var(--ink);
      line-height: 1.55;
      font-size: 18px;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 22px; }
    header {
      padding: 22px 0 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 18px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: clamp(1.65rem, 3.5vw, 2.5rem); letter-spacing: -0.035em; color: #10213f; }
    .subtitle { color: var(--muted); margin-top: 6px; font-size: 1rem; }
    .score-pill {
      background: #10213f;
      color: white;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: var(--shadow);
    }
    .dashboard {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 16px 0 18px;
    }
    .stat {
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(219,228,240,0.95);
      border-radius: 18px;
      padding: 14px 15px;
      box-shadow: 0 8px 24px rgba(15,23,42,0.06);
    }
    .stat .label { color: var(--muted); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 800; }
    .stat .value { font-size: 1.35rem; font-weight: 900; margin-top: 3px; }
    .progress-bar { width: 100%; height: 12px; background: #dbeafe; border-radius: 999px; overflow: hidden; border: 1px solid #bfdbfe; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width 0.25s ease; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 32px);
    }
    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #e0f2fe;
      color: #075985;
      border: 1px solid #bae6fd;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.86rem;
      font-weight: 850;
      margin-bottom: 16px;
    }
    .q-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 10px;
    }
    .q-num { font-size: 1rem; color: var(--muted); font-weight: 900; letter-spacing: 0.03em; }
    .stem { font-size: clamp(1.04rem, 1.8vw, 1.22rem); font-weight: 650; margin: 10px 0 22px; color: #111827; }
    .options { display: grid; gap: 12px; }
    .option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: start;
      padding: 15px 16px;
      border: 2px solid var(--line);
      border-radius: 18px;
      background: #fbfdff;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }
    .option:hover { transform: translateY(-1px); border-color: #93c5fd; }
    .option input { margin-top: 5px; transform: scale(1.2); }
    .option .letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: #eaf2ff;
      color: #1d4ed8;
      font-weight: 900;
      margin-right: 4px;
      flex-shrink: 0;
    }
    .option .text { display: block; padding-top: 2px; }
    .option.selected { border-color: var(--accent); background: #eff6ff; }
    .option.correct { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); }
    .option.incorrect { border-color: var(--red-border); background: var(--red-bg); color: var(--red-text); }
    .feedback {
      display: none;
      margin-top: 22px;
      padding: 18px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid var(--line);
    }
    .feedback.show { display: block; }
    .feedback h3 { margin: 0 0 10px; font-size: 1.05rem; }
    .objective { margin-top: 12px; padding: 12px; border-left: 5px solid var(--accent); background: #eff6ff; border-radius: 12px; }
    .rationale { margin-top: 12px; padding: 12px; border-left: 5px solid var(--accent-2); background: #f0fdfa; border-radius: 12px; }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
      justify-content: space-between;
    }
    .left-buttons, .right-buttons { display: flex; flex-wrap: wrap; gap: 10px; }
    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      color: #10213f;
      background: #e2e8f0;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .primary { background: var(--accent); color: white; }
    .danger { background: #fee2e2; color: #991b1b; }
    .success { background: #d1fae5; color: #065f46; }
    .ghost { background: white; border: 1px solid var(--line); }
    .score-card {
      display: none;
      margin: 18px 0;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid #bfdbfe;
      background: linear-gradient(135deg, #eff6ff, #f0fdfa);
    }
    .score-card.show { display: block; }
    .score-card .big { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 950; letter-spacing: -0.045em; }
    .review-banner {
      display: none;
      margin: 14px 0;
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--warn-bg);
      border: 1px solid #fed7aa;
      color: #9a3412;
      font-weight: 850;
    }
    .review-banner.show { display: block; }
    .import-report {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }
    .missed-list { margin-top: 12px; display: none; }
    .missed-list.show { display: block; }
    .missed-list a { display: inline-block; margin: 5px; padding: 7px 10px; border-radius: 999px; background: #fee2e2; color: #7f1d1d; font-weight: 800; text-decoration: none; }
    @media (max-width: 720px) {
      body { font-size: 17px; }
      .wrap { padding: 14px; }
      .dashboard { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .buttons { display: grid; }
      .left-buttons, .right-buttons { display: grid; grid-template-columns: 1fr 1fr; }
      button { width: 100%; }
      .option { padding: 14px; }
    }
    @media (max-width: 430px) {
      .dashboard { grid-template-columns: 1fr; }
      .left-buttons, .right-buttons { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Behavioral Medicine Exam 2: Self-Grading Practice Exam</h1>
        <div class="subtitle">Single best answer • One question at a time • Board-review style</div>
      </div>
      <div class="score-pill" id="scorePill">Not graded</div>
    </header>

    <div class="dashboard" aria-label="exam status">
      <div class="stat"><div class="label">Question</div><div class="value" id="qCounter">1 / 75</div></div>
      <div class="stat"><div class="label">Answered</div><div class="value" id="answeredCounter">0 / 75</div></div>
      <div class="stat"><div class="label">Correct</div><div class="value" id="correctCounter">-</div></div>
      <div class="stat"><div class="label">Percent</div><div class="value" id="percentCounter">-</div></div>
    </div>
    <div class="progress-bar" aria-hidden="true"><div class="progress-fill" id="progressFill"></div></div>

    <div class="score-card" id="scoreCard">
      <div class="big" id="scoreBig">0%</div>
      <div id="scoreDetail">0 correct / 75 questions</div>
      <div class="missed-list" id="missedList"></div>
    </div>

    <div class="review-banner" id="reviewBanner">Reviewing missed questions only.</div>

    <main class="card" id="examCard">
      <div class="q-head">
        <div class="q-num" id="qNum">Question 1</div>
        <div class="q-num" id="modeLabel">Full Exam</div>
      </div>
      <div class="section-tag" id="sectionTag"></div>
      <div class="stem" id="stem"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="buttons">
        <div class="left-buttons">
          <button class="ghost" id="prevBtn" type="button">Previous</button>
          <button class="ghost" id="nextBtn" type="button">Next</button>
        </div>
        <div class="right-buttons">
          <button class="primary" id="gradeBtn" type="button">Submit & Grade</button>
          <button class="success" id="reviewBtn" type="button">Review Missed Questions</button>
          <button class="danger" id="resetBtn" type="button">Reset Exam</button>
        </div>
      </div>
    </main>

    <div class="import-report" id="importReport"></div>
  </div>

  <script>
    const questions = [{"number": 1, "section": "Trauma and Stressor-Related Disorders", "stem": "A 29-year-old woman comes to primary care 4 months after being sexually assaulted. She says she has recurrent, unwanted images of the assault, wakes from nightmares, and avoids the street where it happened. She has stopped seeing friends, feels detached from her partner, and startles whenever someone walks behind her. She denies current substance use and has no prior psychiatric diagnosis. Which diagnosis is most likely?", "choices": [{"letter": "A", "text": "Adjustment disorder with anxiety"}, {"letter": "B", "text": "Panic disorder"}, {"letter": "C", "text": "Acute stress disorder"}, {"letter": "D", "text": "Prolonged grief disorder"}, {"letter": "E", "text": "Post-traumatic stress disorder"}], "correct": "E", "correctText": "Post-traumatic stress disorder", "objective": "Trauma and Stressor-Related Disorders Obj. 1a and Obj. 3.", "rationale": "PTSD requires trauma exposure plus intrusion, avoidance, negative mood/cognition, and hyperarousal lasting more than 1 month with impairment. ASD has the same symptom pattern but is limited to 3 days to 1 month after the trauma."}, {"number": 2, "section": "Trauma and Stressor-Related Disorders", "stem": "A 36-year-old man is evaluated 12 days after a motor vehicle crash in which another driver died at the scene. Since the crash, he has intrusive images of the accident, avoids driving near the intersection, has insomnia, and becomes panicky when he hears sirens. He is missing work because he cannot get into a car. He has no psychosis, mania, or substance use. What is the most appropriate first-line treatment?", "choices": [{"letter": "A", "text": "Sertraline monotherapy as first-line treatment"}, {"letter": "B", "text": "Long-term benzodiazepine therapy"}, {"letter": "C", "text": "Trauma-focused cognitive behavioral therapy"}, {"letter": "D", "text": "Supportive reassurance only until symptoms exceed 6 months"}, {"letter": "E", "text": "Prazosin for nightmares as initial monotherapy"}], "correct": "C", "correctText": "Trauma-focused cognitive behavioral therapy", "objective": "Trauma and Stressor-Related Disorders Obj. 1b and Obj. 7.", "rationale": "This is acute stress disorder because symptoms occur 3 days to 1 month after trauma. Trauma-focused CBT is first-line and is preferred over medication for ASD."}, {"number": 3, "section": "Trauma and Stressor-Related Disorders", "stem": "A 19-year-old college student presents 6 weeks after moving away from home for the first time. She reports tearfulness, insomnia, and difficulty concentrating after starting school, but she denies anhedonia, suicidal ideation, panic attacks, trauma exposure, hallucinations, or substance use. Her symptoms began within the first month of the transition and are impairing her classes, but she does not meet criteria for major depressive disorder or generalized anxiety disorder. What is the most likely diagnosis?", "choices": [{"letter": "A", "text": "Persistent depressive disorder"}, {"letter": "B", "text": "Illness anxiety disorder"}, {"letter": "C", "text": "Adjustment disorder with mixed anxiety and depressed mood"}, {"letter": "D", "text": "Post-traumatic stress disorder"}, {"letter": "E", "text": "Acute stress disorder"}], "correct": "C", "correctText": "Adjustment disorder with mixed anxiety and depressed mood", "objective": "Trauma and Stressor-Related Disorders Obj. 1c and Obj. 3.", "rationale": "Adjustment disorder involves emotional or behavioral symptoms within 3 months of an identifiable stressor, with distress out of proportion or impairment, and it is a diagnosis of exclusion. The stressor does not need to be a traumatic event."}, {"number": 4, "section": "Trauma and Stressor-Related Disorders", "stem": "A 44-year-old firefighter has been irritable and emotionally numb for months after repeated exposure to fatal accident scenes. He reports nightmares, avoiding certain roads, and exaggerated startle. During a primary care visit, his clinician wants to use the Primary Care PTSD Screen. Which opening question is the most appropriate first step before scoring the 5 symptom items?", "choices": [{"letter": "A", "text": "Have you ever had 4 or more days of decreased need for sleep and increased goal-directed activity?"}, {"letter": "B", "text": "During the past 2 weeks, how often have you had little interest or pleasure in doing things?"}, {"letter": "C", "text": "Have you ever experienced a serious accident, assault, disaster, war, or seen someone killed or badly injured?"}, {"letter": "D", "text": "Do you ever hear voices when no one is around?"}, {"letter": "E", "text": "Have you used alcohol or drugs more than you intended in the past year?"}], "correct": "C", "correctText": "Have you ever experienced a serious accident, assault, disaster, war, or seen someone killed or badly injured?", "objective": "Trauma and Stressor-Related Disorders Obj. 6.", "rationale": "The PC-PTSD-5 begins with a trauma exposure gate question. If the patient has not experienced a qualifying traumatic event, the screen is scored as zero and stopped."}, {"number": 5, "section": "Trauma and Stressor-Related Disorders", "stem": "A 31-year-old veteran has chronic PTSD treated with trauma-focused therapy and sertraline. Intrusive memories and avoidance have improved, but he continues to wake several nights per week from severe trauma-related nightmares. He denies current suicidal ideation or substance use. Blood pressure is normal and he has no history of syncope. Which medication is most appropriate to add for the residual symptom?", "choices": [{"letter": "A", "text": "Haloperidol"}, {"letter": "B", "text": "Lithium"}, {"letter": "C", "text": "Buspirone"}, {"letter": "D", "text": "Lorazepam"}, {"letter": "E", "text": "Prazosin"}], "correct": "E", "correctText": "Prazosin", "objective": "Trauma and Stressor-Related Disorders Obj. 7.", "rationale": "Prazosin, an alpha-blocker, may be added for PTSD-related nightmares that persist despite SSRI plus psychotherapy. Sertraline and paroxetine are first-line SSRIs for core PTSD symptoms."}, {"number": 6, "section": "Trauma and Stressor-Related Disorders", "stem": "A 47-year-old man witnessed a coworker die in an industrial accident. For 3 weeks he had nightmares and avoided the workplace, then his symptoms improved. Two months later, after returning to the same building, he developed persistent flashbacks, detachment, irritability, and hypervigilance that have now lasted 7 months. He is missing work and drinking more alcohol to sleep. Which PTSD specifier best applies?", "choices": [{"letter": "A", "text": "With anxious distress only"}, {"letter": "B", "text": "With catatonia"}, {"letter": "C", "text": "Delayed expression"}, {"letter": "D", "text": "Brief psychotic episode"}, {"letter": "E", "text": "Persistent adjustment disorder"}], "correct": "C", "correctText": "Delayed expression", "objective": "Trauma and Stressor-Related Disorders Obj. 1a.", "rationale": "Delayed expression is used when full PTSD criteria are not met until at least 6 months after the traumatic event. Symptoms may begin earlier, but the full syndrome emerges later."}, {"number": 7, "section": "Trauma and Stressor-Related Disorders", "stem": "A 22-year-old woman presents after a sexual assault 2 months ago. She reports dissociative flashbacks, avoids reminders, feels persistently guilty, and has insomnia and exaggerated startle. She says she sometimes thinks she would be better off dead but denies a plan. She also drinks heavily most nights to sleep. What is the best next step in management?", "choices": [{"letter": "A", "text": "Challenge the accuracy of her trauma memory during the visit"}, {"letter": "B", "text": "Provide only reassurance because symptoms often resolve spontaneously"}, {"letter": "C", "text": "Refer urgently for mental health evaluation while assessing safety and substance use"}, {"letter": "D", "text": "Start stimulant therapy for impaired concentration"}, {"letter": "E", "text": "Delay referral until symptoms persist for 6 additional months"}], "correct": "C", "correctText": "Refer urgently for mental health evaluation while assessing safety and substance use", "objective": "Trauma and Stressor-Related Disorders Obj. 8, Obj. 9, and Obj. 10.", "rationale": "PTSD with suicidality, comorbid substance use, severe impairment, or persistent symptoms needs referral and safety assessment. Trauma care should validate the patient and avoid confrontational or blaming approaches."}, {"number": 8, "section": "Trauma and Stressor-Related Disorders", "stem": "A 40-year-old woman is diagnosed with breast cancer and begins missing work because she is overwhelmed, tearful, and preoccupied with the diagnosis. Symptoms began 6 weeks after the diagnosis and are impairing her relationships. She denies traumatic exposure, intrusive memories, avoidance of trauma reminders, mania, psychosis, and suicidal ideation. Which treatment approach is most appropriate?", "choices": [{"letter": "A", "text": "Antipsychotic therapy for at least 6 months"}, {"letter": "B", "text": "Psychotherapy focused on coping with the stressor"}, {"letter": "C", "text": "Hospitalization for involuntary treatment"}, {"letter": "D", "text": "No treatment because distress after illness is always normal"}, {"letter": "E", "text": "Prazosin plus prolonged exposure therapy"}], "correct": "B", "correctText": "Psychotherapy focused on coping with the stressor", "objective": "Trauma and Stressor-Related Disorders Obj. 1c and Obj. 2.", "rationale": "Adjustment disorder commonly follows illness, divorce, job loss, or transitions and is treated with psychotherapy; most patients return to prior function. It is not automatically normal if distress is out of proportion or impairing."}, {"number": 9, "section": "Trauma and Stressor-Related Disorders", "stem": "A 35-year-old man develops PTSD after being kidnapped for several days. He had close exposure to the trauma, little social support, and a prior history of major depression. Another patient in the clinic had a brief trauma exposure but strong family support and no psychiatric history. Which factor most strongly worsens the first patient's risk for PTSD compared with the second?", "choices": [{"letter": "A", "text": "Male sex rather than female sex"}, {"letter": "B", "text": "Late onset of symptoms after age 35"}, {"letter": "C", "text": "High socioeconomic status"}, {"letter": "D", "text": "Absence of childhood trauma"}, {"letter": "E", "text": "Severity, duration, and proximity of the trauma exposure Psychotic Disorders"}], "correct": "E", "correctText": "Severity, duration, and proximity of the trauma exposure Psychotic Disorders", "objective": "Trauma and Stressor-Related Disorders Obj. 1a.", "rationale": "PTSD risk factor in the guide is the severity, duration, and proximity of exposure to the actual trauma. Poor support and prior mood/anxiety disorders also increase risk."}, {"number": 10, "section": "Psychotic Disorders", "stem": "A 28-year-old woman is brought to the emergency department 9 days after delivering her first child. Her partner says she abruptly began claiming that the baby is an angel sent to judge the family and has not slept for 2 nights. She has no prior psychiatric history, urine drug screen is negative, and basic labs are normal. Symptoms resolve completely within 2 weeks with treatment and support. Which diagnosis best fits the time course?", "choices": [{"letter": "A", "text": "Schizoaffective disorder"}, {"letter": "B", "text": "Schizophreniform disorder"}, {"letter": "C", "text": "Brief psychotic disorder with postpartum onset"}, {"letter": "D", "text": "Delusional disorder"}, {"letter": "E", "text": "Schizophrenia"}], "correct": "C", "correctText": "Brief psychotic disorder with postpartum onset", "objective": "Approach to Understanding Schizophrenia and other Psychotic Disorders Obj. 1a and Obj. 3.", "rationale": "Brief psychotic disorder is sudden psychosis lasting less than 1 month with complete return to baseline, after excluding substances and medical causes. Postpartum onset is a recognized specifier."}, {"number": 11, "section": "Psychotic Disorders", "stem": "A 20-year-old college student has had 10 weeks of auditory hallucinations, persecutory delusions, and disorganized speech. His roommate says he was previously social and high functioning but has become confused and frightened by his symptoms. He has not used substances, and thyroid studies, electrolytes, glucose, and liver tests are normal. He is still able to maintain some class attendance. What is the most likely diagnosis?", "choices": [{"letter": "A", "text": "Delusional disorder"}, {"letter": "B", "text": "Brief psychotic disorder"}, {"letter": "C", "text": "Schizophrenia"}, {"letter": "D", "text": "Schizophreniform disorder"}, {"letter": "E", "text": "Schizoid personality disorder"}], "correct": "D", "correctText": "Schizophreniform disorder", "objective": "Approach to Understanding Schizophrenia and other Psychotic Disorders Obj. 1b and Obj. 3.", "rationale": "Schizophreniform disorder has schizophrenia-like psychosis lasting 1 to 6 months, and functional impairment is not required. This duration is too long for brief psychotic disorder and too short for schizophrenia."}, {"number": 12, "section": "Psychotic Disorders", "stem": "A 24-year-old man is brought by his mother for progressive social withdrawal, poor hygiene, and failing grades over the past 9 months. For the past 3 months he has heard voices commenting on his actions and believes classmates are inserting thoughts into his mind. On exam, he has flat affect, sparse speech, poor insight, and impaired functioning. Urine drug screen and medical workup are negative. Which diagnosis is most likely?", "choices": [{"letter": "A", "text": "Paranoid personality disorder"}, {"letter": "B", "text": "Brief psychotic disorder"}, {"letter": "C", "text": "Delusional disorder"}, {"letter": "D", "text": "Schizophreniform disorder"}, {"letter": "E", "text": "Schizophrenia"}], "correct": "E", "correctText": "Schizophrenia", "objective": "Approach to Understanding Schizophrenia and other Psychotic Disorders Obj. 1c and Obj. 3.", "rationale": "Schizophrenia requires at least 2 psychotic symptoms with at least 1 month of active symptoms, total duration more than 6 months, and functional decline after excluding medical/substance causes."}, {"number": 13, "section": "Psychotic Disorders", "stem": "A 33-year-old woman has recurrent manic and major depressive episodes with psychosis. Her family reports that for most of the 3-year illness she has had mood episodes, but there have also been several 3-week periods when she heard voices and believed coworkers were poisoning her despite normal mood, sleep, and energy. She has no substance use and medical evaluation is unrevealing. Which diagnosis best explains this pattern?", "choices": [{"letter": "A", "text": "Brief psychotic disorder"}, {"letter": "B", "text": "Bipolar I disorder with psychotic features"}, {"letter": "C", "text": "Schizophrenia with mood symptoms"}, {"letter": "D", "text": "Delusional disorder"}, {"letter": "E", "text": "Schizoaffective disorder"}], "correct": "E", "correctText": "Schizoaffective disorder", "objective": "Approach to Understanding Schizophrenia and other Psychotic Disorders Obj. 1d and Obj. 4.", "rationale": "Schizoaffective disorder requires schizophrenia criteria plus full mood episodes for the majority of the illness and at least 2 weeks of psychosis without mood symptoms. If psychosis occurs only during mood episodes, a mood disorder with psychotic features is more likely."}, {"number": 14, "section": "Psychotic Disorders", "stem": "A 46-year-old man is convinced that his neighbor has installed cameras to monitor him. He is well groomed, speaks logically, continues working successfully, and has no hallucinations, disorganized speech, negative symptoms, mania, or major depression. He has held this belief for 18 months and refuses to consider alternative explanations. Which diagnosis is most likely?", "choices": [{"letter": "A", "text": "Paranoid schizophrenia"}, {"letter": "B", "text": "Schizotypal personality disorder"}, {"letter": "C", "text": "Delusional disorder, persecutory type"}, {"letter": "D", "text": "Illness anxiety disorder"}, {"letter": "E", "text": "Paranoid personality disorder"}], "correct": "C", "correctText": "Delusional disorder, persecutory type", "objective": "Approach to Understanding Schizophrenia and other Psychotic Disorders Obj. 1e.", "rationale": "Delusional disorder involves at least 1 delusion lasting at least 1 month without meeting schizophrenia criteria and without marked functional impairment. Persecutory delusions are the most common type."}, {"number": 15, "section": "Psychotic Disorders", "stem": "A 52-year-old man is brought to clinic by his wife because he believes she is unfaithful despite no evidence. He has become angry, checks her phone repeatedly, and recently threatened the person he thinks is involved. He is otherwise functioning at work and has no disorganized speech, hallucinations, or negative symptoms. What is the most important immediate clinical consideration?", "choices": [{"letter": "A", "text": "Avoid asking about violence to preserve rapport"}, {"letter": "B", "text": "Diagnose schizophrenia because all delusions imply schizophrenia"}, {"letter": "C", "text": "Assess risk of harm to others and consider hospitalization if impulse control is poor"}, {"letter": "D", "text": "Reassure the spouse that jealous delusions are usually harmless"}, {"letter": "E", "text": "Start group psychotherapy as the first intervention"}], "correct": "C", "correctText": "Assess risk of harm to others and consider hospitalization if impulse control is poor", "objective": "Approach to Understanding Schizophrenia and other Psychotic Disorders Obj. 1e and Obj. 8.", "rationale": "Jealous-type delusional disorder can create safety risk. The guide emphasizes assessing SI/HI and hospitalizing delusional disorder patients for poor impulse control, extreme impairment, or needed workup."}, {"number": 16, "section": "Psychotic Disorders", "stem": "A 21-year-old man presents with new hallucinations and disorganized speech for 2 weeks. His family reports abrupt onset after several days of insomnia. He is afebrile with no focal neurologic deficits, but this is his first episode. Before labeling the illness as a primary psychotic disorder, which initial workup is most appropriate?", "choices": [{"letter": "A", "text": "Urine drug screen, pregnancy test when applicable, electrolytes/glucose, liver tests, and thyroid studies"}, {"letter": "B", "text": "No laboratory testing because psychosis is diagnosed clinically"}, {"letter": "C", "text": "Genetic testing for dopamine receptor variants"}, {"letter": "D", "text": "Lumbar puncture for every patient before psychiatric referral"}, {"letter": "E", "text": "Neuropsychological testing only"}], "correct": "A", "correctText": "Urine drug screen, pregnancy test when applicable, electrolytes/glucose, liver tests, and thyroid studies", "objective": "Approach to Understanding Schizophrenia and other Psychotic Disorders Obj. 1a and Obj. 8.", "rationale": "New psychosis requires evaluation for organic, substance-induced, and medical causes. The study guide lists UDS, pregnancy test when applicable, electrolytes, glucose, LFTs, and thyroid studies for brief psychotic presentations."}, {"number": 17, "section": "Psychotic Disorders", "stem": "A 26-year-old man with schizophrenia is no longer hearing voices after starting an antipsychotic, but he remains socially withdrawn, has minimal speech, shows little facial expression, and lacks motivation to look for work. His family asks why these symptoms are harder to treat and why he remains impaired. Which symptom group is being described?", "choices": [{"letter": "A", "text": "Negative symptoms"}, {"letter": "B", "text": "Panic symptoms"}, {"letter": "C", "text": "Positive symptoms"}, {"letter": "D", "text": "Obsessions"}, {"letter": "E", "text": "Manic symptoms"}], "correct": "A", "correctText": "Negative symptoms", "objective": "Approach to Understanding Schizophrenia and other Psychotic Disorders Obj. 2.", "rationale": "Affective flattening, alogia, avolition, anhedonia, and asociality are negative symptoms. Cognitive symptoms may cause the longest-lasting impairment, but the signs listed are negative symptoms."}, {"number": 18, "section": "Psychotic Disorders", "stem": "A 23-year-old hospitalized patient with schizophrenia stands motionless for long periods, maintains uncomfortable postures, repeats the examiner's words, and allows his arm to remain in the position where it is placed. He has eaten very little for several days. Which complication is most important to monitor for in this subtype?", "choices": [{"letter": "A", "text": "Malnutrition and exhaustion"}, {"letter": "B", "text": "Serotonin syndrome"}, {"letter": "C", "text": "Wernicke encephalopathy from alcohol withdrawal"}, {"letter": "D", "text": "Lithium toxicity"}, {"letter": "E", "text": "Refeeding syndrome from binge eating"}], "correct": "A", "correctText": "Malnutrition and exhaustion", "objective": "Approach to Understanding Schizophrenia and other Psychotic Disorders Obj. 5.", "rationale": "Catatonic schizophrenia is associated with waxy flexibility, rigidity, stupor, echolalia/mutism, and posturing. Medical risks include malnutrition, exhaustion, and hyperpyrexia."}, {"number": 19, "section": "Psychotic Disorders", "stem": "A 31-year-old man with schizophrenia has persistent hallucinations despite adequate trials of two second-generation antipsychotics and supervised adherence. He has required repeated hospitalizations but is not currently intoxicated or delirious. His psychiatrist is considering a medication specifically for treatment-resistant disease. Which medication is most appropriate?", "choices": [{"letter": "A", "text": "Clozapine"}, {"letter": "B", "text": "Buspirone"}, {"letter": "C", "text": "Sertraline"}, {"letter": "D", "text": "Methylphenidate"}, {"letter": "E", "text": "Prazosin"}], "correct": "A", "correctText": "Clozapine", "objective": "Approach to Understanding Schizophrenia and other Psychotic Disorders Obj. 1c and Obj. 8.", "rationale": "Second-generation antipsychotics are first-line for schizophrenia. Clozapine, sometimes with ECT, is used for treatment-resistant schizophrenia."}, {"number": 20, "section": "Psychotic Disorders", "stem": "A 27-year-old man with schizophrenia has been hospitalized twice after stopping oral antipsychotics. When taking medication, he can live with family and work part-time; when off medication, he becomes paranoid and stops sleeping. His family asks what strategy may reduce relapse related to nonadherence. Which option best addresses this issue?", "choices": [{"letter": "A", "text": "Benzodiazepine monotherapy"}, {"letter": "B", "text": "Stopping medication once hallucinations resolve"}, {"letter": "C", "text": "Long-acting injectable antipsychotic"}, {"letter": "D", "text": "Avoiding family involvement to reduce dependence"}, {"letter": "E", "text": "Psychotherapy without medication"}], "correct": "C", "correctText": "Long-acting injectable antipsychotic", "objective": "Approach to Understanding Schizophrenia and other Psychotic Disorders Obj. 6 and Obj. 7.", "rationale": "Adherence strongly affects relapse in schizophrenia; relapse is much higher off medication. Long-acting injectable antipsychotics are used when adherence is a major barrier."}, {"number": 21, "section": "Psychotic Disorders", "stem": "A 62-year-old woman with no psychiatric history reports seeing small animals crawling on her walls and smelling smoke when there is none. Her family also notes fluctuating confusion, new tremor, and recent medication changes. She has no prior history of schizophrenia or mood disorder. Which feature most suggests a medical or neurologic cause rather than a primary psychotic disorder?", "choices": [{"letter": "A", "text": "Persecutory delusions with intact occupational function"}, {"letter": "B", "text": "Flat affect and social withdrawal beginning in adolescence"}, {"letter": "C", "text": "A fixed false belief lasting more than 1 month"}, {"letter": "D", "text": "Visual and olfactory hallucinations with new neurologic changes"}, {"letter": "E", "text": "Auditory voices commenting on behavior in a young adult"}], "correct": "D", "correctText": "Visual and olfactory hallucinations with new neurologic changes", "objective": "Approach to Understanding Schizophrenia and other Psychotic Disorders Obj. 2 and Obj. 8.", "rationale": "Auditory hallucinations are most common in primary psychotic disorders; visual, tactile, olfactory, or gustatory hallucinations should raise concern for medical/substance causes, especially with neurologic changes."}, {"number": 22, "section": "Psychotic Disorders", "stem": "A 29-year-old woman develops acute psychosis over 2 weeks after a major job loss. She had excellent premorbid functioning, prominent hallucinations and delusions, and a depressed mood but no negative symptoms. She has strong family support and agrees to treatment. Which factor in this case is associated with a better prognosis in schizophrenia-spectrum illness?", "choices": [{"letter": "A", "text": "Early insidious onset without a trigger"}, {"letter": "B", "text": "Single status with poor support"}, {"letter": "C", "text": "Prominent negative symptoms"}, {"letter": "D", "text": "Late, acute onset with an obvious precipitant"}, {"letter": "E", "text": "Multiple prior relapses and assaultiveness"}], "correct": "D", "correctText": "Late, acute onset with an obvious precipitant", "objective": "Approach to Understanding Schizophrenia and other Psychotic Disorders Obj. 6.", "rationale": "Better prognosis is associated with late and acute onset, clear precipitant, good premorbid functioning, mood symptoms, marriage/social support, positive symptoms, and female sex. Poor prognosis includes early insidious onset, poor support, negative/neurologic signs, and relapses."}, {"number": 23, "section": "Psychotic Disorders", "stem": "A 34-year-old man with schizophrenia is found wandering in traffic because he believes cars cannot hurt him. He has stopped eating, is responding to internal stimuli, and threatens staff who approach him. His outpatient antipsychotic has not controlled symptoms. What is the most appropriate disposition?", "choices": [{"letter": "A", "text": "Referral to a support group without medical treatment"}, {"letter": "B", "text": "Routine outpatient psychotherapy in 3 months"}, {"letter": "C", "text": "Emergency psychiatric hospitalization"}, {"letter": "D", "text": "Reassurance and discharge with family only"}, {"letter": "E", "text": "Primary care follow-up after symptoms resolve spontaneously Somatic Symptom and Related Disorders"}], "correct": "C", "correctText": "Emergency psychiatric hospitalization", "objective": "Approach to Understanding Schizophrenia and other Psychotic Disorders Obj. 8.", "rationale": "Danger to self or others, suicidality, severe symptoms, catatonia with medical compromise, or treatment failure requires emergency/inpatient escalation. Psychosis management must include safety, not just symptom labeling."}, {"number": 24, "section": "Somatic Symptom and Related Disorders", "stem": "A 24-year-old woman has a 5-year history of severe abdominal pain, pelvic pain, dizziness, fatigue, and intermittent nausea. She has seen multiple specialists and had repeated normal imaging and laboratory tests. She spends hours each day researching symptoms and remains convinced a serious disease is being missed, despite reassurance. The symptoms themselves are prominent and distressing. Which diagnosis is most likely?", "choices": [{"letter": "A", "text": "Somatic symptom disorder"}, {"letter": "B", "text": "Illness anxiety disorder"}, {"letter": "C", "text": "Functional neurological symptom disorder"}, {"letter": "D", "text": "Factitious disorder"}, {"letter": "E", "text": "Malingering"}], "correct": "A", "correctText": "Somatic symptom disorder", "objective": "Somatic Symptom Disorder and Related Disorders Obj. 1a and Obj. 2.", "rationale": "Somatic symptom disorder involves at least one distressing somatic symptom plus excessive thoughts, feelings, or behaviors about symptoms for at least 6 months. Illness anxiety disorder has absent or only mild somatic symptoms."}, {"number": 25, "section": "Somatic Symptom and Related Disorders", "stem": "A 32-year-old man repeatedly checks his neck for lymph nodes and schedules frequent visits because he fears lymphoma. He has no weight loss, fever, night sweats, abnormal exam findings, or significant physical symptoms. His feared illness changes every few months, and the preoccupation has persisted for 8 months. Which diagnosis best fits?", "choices": [{"letter": "A", "text": "Body dysmorphic disorder"}, {"letter": "B", "text": "Delusional disorder, somatic type"}, {"letter": "C", "text": "Somatic symptom disorder"}, {"letter": "D", "text": "Functional neurological symptom disorder"}, {"letter": "E", "text": "Illness anxiety disorder"}], "correct": "E", "correctText": "Illness anxiety disorder", "objective": "Somatic Symptom Disorder and Related Disorders Obj. 1b and Obj. 2.", "rationale": "Illness anxiety disorder is preoccupation with having or acquiring serious illness, high health anxiety, and excessive checking or avoidance for at least 6 months, with absent or mild somatic symptoms."}, {"number": 26, "section": "Somatic Symptom and Related Disorders", "stem": "A 19-year-old woman develops sudden right-leg weakness after an intense argument with her parents. Neurologic exam shows weakness on direct testing but normal strength when the contralateral leg is tested, consistent with Hoover sign. MRI and basic neurologic workup are unrevealing. She is distressed and denies faking symptoms. What is the most likely diagnosis?", "choices": [{"letter": "A", "text": "Acute stress disorder"}, {"letter": "B", "text": "Malingering"}, {"letter": "C", "text": "Factitious disorder"}, {"letter": "D", "text": "Somatic symptom disorder"}, {"letter": "E", "text": "Functional neurological symptom disorder"}], "correct": "E", "correctText": "Functional neurological symptom disorder", "objective": "Somatic Symptom Disorder and Related Disorders Obj. 1c and Obj. 3.", "rationale": "FNSD involves motor or sensory neurologic symptoms incompatible with recognized neurologic disease and not intentionally produced. Hoover sign supports functional leg weakness."}, {"number": 27, "section": "Somatic Symptom and Related Disorders", "stem": "A 27-year-old patient has recurrent seizure-like episodes in clinic. During events there is no tongue biting, incontinence, or injury, and episodes are prolonged with variable movements. Routine neurologic exam is normal, but the patient is distressed and wants answers. Which test is considered the gold standard to evaluate this suspected condition?", "choices": [{"letter": "A", "text": "Urine drug screen only"}, {"letter": "B", "text": "Video EEG monitoring"}, {"letter": "C", "text": "Lumbar puncture for every episode"}, {"letter": "D", "text": "Serum prolactin alone"}, {"letter": "E", "text": "Head CT without contrast only"}], "correct": "B", "correctText": "Video EEG monitoring", "objective": "Somatic Symptom Disorder and Related Disorders Obj. 1c and Obj. 4.", "rationale": "Psychogenic nonepileptic seizures are a presentation of FNSD. Video EEG is the gold standard for functional seizures, and a neurologic workup should be completed first."}, {"number": 28, "section": "Somatic Symptom and Related Disorders", "stem": "A 36-year-old nurse is admitted repeatedly for unexplained hypoglycemia. Staff find insulin syringes hidden in her bag, and pharmacy records show she has obtained insulin despite not having diabetes. She appears eager to undergo additional tests and becomes upset when discharge is discussed. There is no lawsuit, disability claim, or request for drugs. Which diagnosis is most likely?", "choices": [{"letter": "A", "text": "Functional neurological symptom disorder"}, {"letter": "B", "text": "Factitious disorder"}, {"letter": "C", "text": "Illness anxiety disorder"}, {"letter": "D", "text": "Somatic symptom disorder"}, {"letter": "E", "text": "Malingering"}], "correct": "B", "correctText": "Factitious disorder", "objective": "Somatic Symptom Disorder and Related Disorders Obj. 1d and Obj. 3.", "rationale": "Factitious disorder involves conscious production or induction of illness to occupy the sick role, without external reward. Healthcare background and self-administering insulin are classic clues in the guide."}, {"number": 29, "section": "Somatic Symptom and Related Disorders", "stem": "A 41-year-old incarcerated man reports severe back pain after learning that a medical diagnosis could delay his court hearing. He gives a detailed story, refuses parts of the exam, and exam findings are inconsistent with observed movement. He asks specifically for opioids and a letter excusing him from trial. Which diagnosis or classification is most likely if medical causes are excluded?", "choices": [{"letter": "A", "text": "Factitious disorder"}, {"letter": "B", "text": "Illness anxiety disorder"}, {"letter": "C", "text": "Somatic symptom disorder"}, {"letter": "D", "text": "Malingering"}, {"letter": "E", "text": "Functional neurological symptom disorder"}], "correct": "D", "correctText": "Malingering", "objective": "Somatic Symptom Disorder and Related Disorders Obj. 1e and Obj. 3.", "rationale": "Malingering is intentional symptom production motivated by external secondary gain, such as avoiding work, obtaining drugs, or evading prosecution. It is not a mental disorder; it is a V-code."}, {"number": 30, "section": "Somatic Symptom and Related Disorders", "stem": "A 2-year-old child has repeated hospitalizations for unexplained infections and bleeding. Symptoms occur only when the mother is present and stop when the child is observed away from her. The mother has a medical background and seems unusually pleased with invasive testing. What is the next best step?", "choices": [{"letter": "A", "text": "Report suspected child abuse and involve protective/legal resources"}, {"letter": "B", "text": "Discharge the child because testing is normal"}, {"letter": "C", "text": "Diagnose malingering in the child"}, {"letter": "D", "text": "Confront the mother angrily at bedside to force a confession"}, {"letter": "E", "text": "Offer reassurance and schedule routine follow-up only"}], "correct": "A", "correctText": "Report suspected child abuse and involve protective/legal resources", "objective": "Somatic Symptom Disorder and Related Disorders Obj. 1d and Obj. 5.", "rationale": "Factitious disorder by proxy is intentional production of illness in another person under one's care and is child abuse. Red flags include symptoms abating without perpetrator access and a caregiver welcoming invasive tests."}, {"number": 31, "section": "Somatic Symptom and Related Disorders", "stem": "A 22-year-old woman presents with chronic fatigue, diffuse pain, episodic dizziness, and abdominal discomfort for several years. She has anxiety and a history of childhood trauma. Before diagnosing a somatic symptom-related disorder, which approach is most appropriate?", "choices": [{"letter": "A", "text": "Tell her the symptoms are imaginary because tests are often normal"}, {"letter": "B", "text": "Avoid screening for depression or anxiety"}, {"letter": "C", "text": "Send her to multiple specialists without a primary clinician coordinating care"}, {"letter": "D", "text": "Assume malingering because symptoms involve multiple systems"}, {"letter": "E", "text": "Rule out plausible medical illnesses such as thyroid disease, MS, SLE, Lyme disease, or myasthenia gravis"}], "correct": "E", "correctText": "Rule out plausible medical illnesses such as thyroid disease, MS, SLE, Lyme disease, or myasthenia gravis", "objective": "Somatic Symptom Disorder and Related Disorders Obj. 4.", "rationale": "The broad differential begins by ruling out real medical disease, especially when symptoms are vague or multisystem. Psychiatric diagnoses and other somatic-spectrum disorders remain in the differential."}, {"number": 32, "section": "Somatic Symptom and Related Disorders", "stem": "A patient with somatic symptom disorder has had multiple normal workups and becomes upset whenever clinicians say nothing is wrong. He requests another CT scan for chronic abdominal pain. Which management strategy best reduces iatrogenic harm while maintaining care?", "choices": [{"letter": "A", "text": "Order every requested test so he feels believed"}, {"letter": "B", "text": "Tell him psychiatric referral means the symptoms are not real"}, {"letter": "C", "text": "Use confrontation to prove the symptoms are psychological"}, {"letter": "D", "text": "Discharge him from the practice to stop reinforcing symptoms"}, {"letter": "E", "text": "Establish one primary care clinician, schedule regular visits, validate suffering, and avoid unnecessary testing"}], "correct": "E", "correctText": "Establish one primary care clinician, schedule regular visits, validate suffering, and avoid unnecessary testing", "objective": "Somatic Symptom Disorder and Related Disorders Obj. 1a and Obj. 5.", "rationale": "SSD management centers on one PCP, regular scheduled visits, evidence-based exams, validation of suffering, and avoiding unnecessary tests/procedures. The goal is reducing iatrogenic harm, not abandoning the patient."}, {"number": 33, "section": "Somatic Symptom and Related Disorders", "stem": "A patient with functional neurological symptom disorder becomes tearful after a clinician says, 'Your symptoms are all in your head.' The patient has sudden aphonia after a stressful event, normal laryngoscopy, and no evidence of intentional falsification. Which communication strategy would have been most appropriate?", "choices": [{"letter": "A", "text": "Accuse the patient of faking to obtain attention"}, {"letter": "B", "text": "Explain that the symptoms are real and involve nervous system function, while coordinating neurology and behavioral health care"}, {"letter": "C", "text": "Refuse neurology referral because the cause is psychological"}, {"letter": "D", "text": "Tell the patient the symptoms are imaginary to prevent reinforcement"}, {"letter": "E", "text": "Start antipsychotic treatment for all conversion symptoms"}], "correct": "B", "correctText": "Explain that the symptoms are real and involve nervous system function, while coordinating neurology and behavioral health care", "objective": "Somatic Symptom Disorder and Related Disorders Obj. 1c and Obj. 5.", "rationale": "FNSD symptoms should not be described as imaginary because that can worsen symptoms. Initial management includes neurologic evaluation and multidisciplinary care with PT/SLP/OT and psychology when needed."}, {"number": 34, "section": "Somatic Symptom and Related Disorders", "stem": "A 29-year-old man with illness anxiety disorder is reassured by a normal exam for only a few days before he begins checking again for signs of cancer. He avoids exercise because he interprets normal tachycardia as heart disease. Which treatment combination is most appropriate?", "choices": [{"letter": "A", "text": "Immediate inpatient psychiatric hospitalization in all cases"}, {"letter": "B", "text": "Antipsychotic monotherapy until the feared illness resolves"}, {"letter": "C", "text": "SSRI plus cognitive behavioral therapy with regular primary care reassurance visits"}, {"letter": "D", "text": "Repeated imaging at every visit to eliminate uncertainty"}, {"letter": "E", "text": "No scheduled follow-up because reassurance reinforces the fear"}], "correct": "C", "correctText": "SSRI plus cognitive behavioral therapy with regular primary care reassurance visits", "objective": "Somatic Symptom Disorder and Related Disorders Obj. 1b.", "rationale": "Illness anxiety disorder treatment includes CBT, often an SSRI, and regular PCP visits/exams for reassurance while building coping. Avoiding the patient can worsen fear of abandonment."}, {"number": 35, "section": "Somatic Symptom and Related Disorders", "stem": "A 25-year-old woman with psychogenic nonepileptic seizures asks about prognosis. Her neurologic workup is negative, and she has begun CBT, but she continues to have episodes under stress. Which presentation has the worst prognosis among functional neurological symptoms listed in the guide?", "choices": [{"letter": "A", "text": "Functional blindness"}, {"letter": "B", "text": "Psychogenic nonepileptic seizures"}, {"letter": "C", "text": "Transient aphonia"}, {"letter": "D", "text": "Globus sensation"}, {"letter": "E", "text": "Functional paralysis"}], "correct": "B", "correctText": "Psychogenic nonepileptic seizures", "objective": "Somatic Symptom Disorder and Related Disorders Obj. 1c.", "rationale": "FNSD may resolve spontaneously, but relapse is common. The study guide identifies psychogenic nonepileptic seizures as having the worst prognosis, while paralysis, aphonia, and blindness have better prognosis."}, {"number": 36, "section": "Somatic Symptom and Related Disorders", "stem": "A 30-year-old woman hospitalized for unexplained bleeding is found to have been secretly taking anticoagulants. When the team raises concerns directly, she threatens to leave against medical advice. What is the best communication approach?", "choices": [{"letter": "A", "text": "Ignore the behavior because factitious disorder is harmless"}, {"letter": "B", "text": "Offer disability paperwork to reduce symptoms"}, {"letter": "C", "text": "Use a nonaccusatory approach focused on safety, morbidity reduction, and coordinated PCP-psychiatry care"}, {"letter": "D", "text": "Treat as malingering unless an external incentive is absent"}, {"letter": "E", "text": "Publicly confront her with proof so she cannot deny it Psychotherapy 101"}], "correct": "C", "correctText": "Use a nonaccusatory approach focused on safety, morbidity reduction, and coordinated PCP-psychiatry care", "objective": "Somatic Symptom Disorder and Related Disorders Obj. 1d and Obj. 5.", "rationale": "Factitious disorder management focuses on reducing morbidity and mortality, addressing underlying emotional needs, and coordinating care. Accusatory confrontation can lead to AMA discharge or flight from care."}, {"number": 37, "section": "Psychotherapy 101", "stem": "A 42-year-old man with panic symptoms asks whether therapy means talking endlessly about childhood. He wants a structured, time-limited treatment focused on identifying catastrophic thoughts, changing avoidance behaviors, and practicing coping skills. Which psychotherapy modality best matches this request?", "choices": [{"letter": "A", "text": "Classical psychoanalysis"}, {"letter": "B", "text": "Supportive therapy without skills practice"}, {"letter": "C", "text": "Existential-humanistic therapy only"}, {"letter": "D", "text": "Cognitive behavioral therapy"}, {"letter": "E", "text": "Family systems therapy only"}], "correct": "D", "correctText": "Cognitive behavioral therapy", "objective": "Psychotherapy 101 Obj. 6 and Obj. 7.", "rationale": "CBT links thoughts, feelings, and behaviors and uses present-oriented, structured, time-limited work to identify and challenge maladaptive thinking while building coping skills. It is one of the most researched manualized therapies."}, {"number": 38, "section": "Psychotherapy 101", "stem": "A 25-year-old woman with borderline personality disorder has recurrent self-harm, intense anger, fear of abandonment, and chaotic relationships. She says she wants practical skills to tolerate crises, regulate emotions, and communicate more effectively. Which psychotherapy has the best evidence for this presentation?", "choices": [{"letter": "A", "text": "Couples therapy as monotherapy"}, {"letter": "B", "text": "Psychoanalysis as the only evidence-based option"}, {"letter": "C", "text": "No psychotherapy because medication is curative"}, {"letter": "D", "text": "Exposure and response prevention"}, {"letter": "E", "text": "Dialectical behavior therapy"}], "correct": "E", "correctText": "Dialectical behavior therapy", "objective": "Psychotherapy 101 Obj. 7; Personality Disorders Obj. 7.", "rationale": "DBT is a specialized evidence-supported CBT for borderline personality disorder. Core skills include mindfulness, distress tolerance, emotion regulation, and interpersonal effectiveness, often delivered through individual and group work."}, {"number": 39, "section": "Psychotherapy 101", "stem": "A patient with major depression needs psychotherapy but also may need medication management because symptoms are severe and recurrent. The primary care PA is explaining provider roles. Which referral option can both prescribe psychiatric medication and provide psychotherapy?", "choices": [{"letter": "A", "text": "School psychologist only"}, {"letter": "B", "text": "Licensed professional counselor"}, {"letter": "C", "text": "Licensed marriage and family therapist"}, {"letter": "D", "text": "Psychiatrist or psychiatric nurse practitioner"}, {"letter": "E", "text": "Licensed clinical social worker"}], "correct": "D", "correctText": "Psychiatrist or psychiatric nurse practitioner", "objective": "Psychotherapy 101 Obj. 4 and Obj. 8.", "rationale": "Psychiatrists and psychiatric NPs can prescribe medication and may provide psychotherapy. Psychologists and master's-level clinicians provide therapy but generally cannot prescribe medication in this guide."}, {"number": 40, "section": "Psychotherapy 101", "stem": "A 16-year-old reports excessive worry, restlessness, poor concentration, insomnia, and GI upset for several months. The clinician wants a brief screening tool for generalized anxiety symptoms during the psychotherapy intake process. Which tool is most appropriate?", "choices": [{"letter": "A", "text": "Brief Trauma Questionnaire"}, {"letter": "B", "text": "HITS"}, {"letter": "C", "text": "PHQ-2 only"}, {"letter": "D", "text": "PCL-5"}, {"letter": "E", "text": "GAD-7"}], "correct": "E", "correctText": "GAD-7", "objective": "Psychotherapy 101 Obj. 2.", "rationale": "The GAD-7 screens for generalized anxiety symptoms and may also screen other anxiety presentations. PCL-5 and BTQ are trauma tools, PHQ tools screen depression, and HITS screens IPV."}, {"number": 41, "section": "Psychotherapy 101", "stem": "A patient says, 'Therapy is only for crazy people, it will last forever, and my employer will find out.' The clinician wants to correct misconceptions without shaming him. Which response is most accurate?", "choices": [{"letter": "A", "text": "Therapy can help many problems, most evidence-supported treatments are time-limited, and therapy is bound by confidentiality rules"}, {"letter": "B", "text": "Therapy works only if it focuses on blaming childhood caregivers"}, {"letter": "C", "text": "Talking with friends is proven equivalent to empirically supported therapy"}, {"letter": "D", "text": "Therapy should be avoided for medical conditions or behavior change"}, {"letter": "E", "text": "Therapy is only useful when medication fails and has no confidentiality protections"}], "correct": "A", "correctText": "Therapy can help many problems, most evidence-supported treatments are time-limited, and therapy is bound by confidentiality rules", "objective": "Psychotherapy 101 Obj. 3.", "rationale": "The guide highlights myths that therapy is only for 'crazy people,' endless, or not confidential. In reality, it helps a wide range of issues, many empirically supported treatments are time-limited, and confidentiality rules apply."}, {"number": 42, "section": "Psychotherapy 101", "stem": "A 55-year-old man with COPD continues smoking. He is defensive when told to quit but agrees to talk if the clinician does not lecture him. The PA asks permission to discuss smoking, reflects his ambivalence, uses a readiness ruler, and asks him to name reasons he might want change. Which approach is being used?", "choices": [{"letter": "A", "text": "Free association"}, {"letter": "B", "text": "Flooding exposure"}, {"letter": "C", "text": "Classical conditioning only"}, {"letter": "D", "text": "Interpretation of transference"}, {"letter": "E", "text": "Motivational interviewing style techniques"}], "correct": "E", "correctText": "Motivational interviewing style techniques", "objective": "Psychotherapy 101 Obj. 6 and Obj. 8.", "rationale": "MI-style techniques include asking permission, expressing empathy, reflecting, normalizing, decisional balancing, readiness rulers, and eliciting the patient's own change talk. They are useful for behavior change and ambivalence."}, {"number": 43, "section": "Psychotherapy 101", "stem": "A 48-year-old patient in therapy notices that conflicts with supervisors resemble conflicts with a critical parent. The therapist explores early attachment, unconscious patterns, defenses, and the therapeutic relationship itself as a vehicle for insight. Which modality is this?", "choices": [{"letter": "A", "text": "Psychodynamic psychotherapy"}, {"letter": "B", "text": "Behavioral health consultation only"}, {"letter": "C", "text": "Exposure therapy"}, {"letter": "D", "text": "Dialectical behavior therapy"}, {"letter": "E", "text": "Motivational interviewing only"}], "correct": "A", "correctText": "Psychodynamic psychotherapy", "objective": "Psychotherapy 101 Obj. 6 and Obj. 7.", "rationale": "Psychodynamic therapy focuses on how past childhood experiences, attachment, unconscious processes, and relational patterns shape current struggles. The therapeutic relationship can be central to change."}, {"number": 44, "section": "Psychotherapy 101", "stem": "A 60-year-old patient with diabetes has poor medication adherence, insomnia, grief after retirement, and worsening stress headaches. He denies suicidality but wants help changing habits and coping with chronic disease. Which statement about psychotherapy referral is most appropriate?", "choices": [{"letter": "A", "text": "Psychotherapy should be avoided unless the patient refuses medication"}, {"letter": "B", "text": "Therapy cannot help with medical adherence or sleep disturbance"}, {"letter": "C", "text": "Psychotherapy is only indicated for psychotic disorders"}, {"letter": "D", "text": "Only athletes and performers benefit from therapy for behavior change"}, {"letter": "E", "text": "Referral may be beneficial for chronic disease management, adherence, stress-related symptoms, grief, and behavior change Domestic Violence and IPV"}], "correct": "E", "correctText": "Referral may be beneficial for chronic disease management, adherence, stress-related symptoms, grief, and behavior change Domestic Violence and IPV", "objective": "Psychotherapy 101 Obj. 5 and Obj. 8.", "rationale": "chotherapy referral indications beyond psychiatric diagnoses, including chronic disease management, medical adherence, stress-related symptoms, sleep disturbance, bereavement, and behavior change."}, {"number": 45, "section": "Domestic Violence and IPV", "stem": "A 28-year-old pregnant woman presents with headaches and pelvic pain. Her partner answers questions for her, refuses to leave the room, and says she is clumsy when asked about bruises on her arms. She appears intimidated and says little. What is the safest screening step?", "choices": [{"letter": "A", "text": "Give written IPV materials only to the partner"}, {"letter": "B", "text": "Screen the patient alone in a private setting using a calm, nonjudgmental approach"}, {"letter": "C", "text": "Call law enforcement before speaking with the patient"}, {"letter": "D", "text": "Avoid screening because pregnancy-related pain is common"}, {"letter": "E", "text": "Ask the partner directly whether he is abusive while he remains in the room"}], "correct": "B", "correctText": "Screen the patient alone in a private setting using a calm, nonjudgmental approach", "objective": "Understanding Domestic Violence and IPV Obj. 4 and Obj. 5.", "rationale": "IPV screening should be done with the patient alone, never in front of the companion. Trauma-informed screening uses privacy, confidentiality, open-ended questions, and a calm nonjudgmental tone."}, {"number": 46, "section": "Domestic Violence and IPV", "stem": "A 34-year-old competent adult discloses that her current partner has shoved her and controls her finances. She denies immediate danger, weapons in the home, child involvement, and injuries requiring mandated weapon reporting. She does not want police contacted today. What is the clinician's general responsibility?", "choices": [{"letter": "A", "text": "Mandatorily report all competent adult IPV to police in every case"}, {"letter": "B", "text": "Refuse to document because she declined police involvement"}, {"letter": "C", "text": "Threaten child removal to motivate her to leave"}, {"letter": "D", "text": "Respect adult autonomy and confidentiality while offering resources, safety planning, and follow-up"}, {"letter": "E", "text": "Tell her to return only after she decides to leave"}], "correct": "D", "correctText": "Respect adult autonomy and confidentiality while offering resources, safety planning, and follow-up", "objective": "Understanding Domestic Violence and IPV Obj. 6 and Obj. 7.", "rationale": "Competent adult IPV is generally not mandated to report in the guide, although state-specific exceptions may apply. Clinicians should support autonomy, offer resources, assess safety, and avoid threats or coercion."}, {"number": 47, "section": "Domestic Violence and IPV", "stem": "A 7-year-old is brought for abdominal pain and anxiety. During a private interview, the child says he often sees his mother's boyfriend hit and choke her and has been threatened when he cries. There is no immediate life-threatening injury in the office. What is the clinician required to do in Georgia according to the guide?", "choices": [{"letter": "A", "text": "Only provide the national hotline number and no report"}, {"letter": "B", "text": "Ask the caregiver's permission before reporting"}, {"letter": "C", "text": "Wait until the child confirms the same story at a second visit"}, {"letter": "D", "text": "Do not report unless the child has visible bruises"}, {"letter": "E", "text": "Report suspected child abuse or exposure to IPV to DFCS within 24 hours of initial suspicion"}], "correct": "E", "correctText": "Report suspected child abuse or exposure to IPV to DFCS within 24 hours of initial suspicion", "objective": "Understanding Domestic Violence and IPV Obj. 6.", "rationale": "Child abuse or exposure to IPV is mandated to report. The guide states Georgia mandated reporters must report suspected child abuse/neglect within 24 hours of initial suspicion, with emergency danger directed to 911."}, {"number": 48, "section": "Domestic Violence and IPV", "stem": "A 31-year-old pregnant patient reports that her partner's controlling behavior has recently escalated to threats, destroying property, and pushing her. She is ashamed and says he is only angry because of stress. Which counseling point is most accurate?", "choices": [{"letter": "A", "text": "Pregnancy protects against escalation of partner violence"}, {"letter": "B", "text": "Leaving immediately without a safety plan is always the safest option"}, {"letter": "C", "text": "IPV is usually an isolated anger episode that resolves after birth"}, {"letter": "D", "text": "IPV is about power and control and often begins or worsens during pregnancy"}, {"letter": "E", "text": "Economic control is not considered part of abuse"}], "correct": "D", "correctText": "IPV is about power and control and often begins or worsens during pregnancy", "objective": "Understanding Domestic Violence and IPV Obj. 2 and Obj. 3.", "rationale": "The guide frames abuse as power and control, not isolated anger, and notes that violence often starts or increases during pregnancy. Safety planning is essential because danger can rise around leaving."}, {"number": 49, "section": "Domestic Violence and IPV", "stem": "An emergency clinician wants a brief, validated screen for IPV in an adult patient with vague abdominal pain and a controlling partner. The screen asks about being Hurt, Insulted, Threatened, and Screamed at. Which tool is being used?", "choices": [{"letter": "A", "text": "PCL-5"}, {"letter": "B", "text": "CAGE"}, {"letter": "C", "text": "PHQ-15"}, {"letter": "D", "text": "GAD-7"}, {"letter": "E", "text": "HITS"}], "correct": "E", "correctText": "HITS", "objective": "Understanding Domestic Violence and IPV Obj. 5.", "rationale": "HITS is a brief 4-item IPV screen addressing Hurt, Insult, Threaten, and Scream. PHQ-15 is a somatic symptom burden screen, and PCL-5 is a PTSD checklist."}, {"number": 50, "section": "Domestic Violence and IPV", "stem": "A 39-year-old adult IPV survivor says she wants to leave tonight but fears her partner will kill her if he finds out. There are firearms in the home, and he has threatened suicide if she leaves. Which response best reflects trauma-informed care?", "choices": [{"letter": "A", "text": "Avoid discussing weapons because it may increase fear"}, {"letter": "B", "text": "Focus only on couples counseling with the abusive partner"}, {"letter": "C", "text": "Make a safety plan and connect her with DV advocacy/shelter resources, recognizing danger rises around leaving"}, {"letter": "D", "text": "Advise her to leave immediately without planning because leaving always lowers homicide risk"}, {"letter": "E", "text": "Tell her to confront the partner publicly so others can witness it"}], "correct": "C", "correctText": "Make a safety plan and connect her with DV advocacy/shelter resources, recognizing danger rises around leaving", "objective": "Understanding Domestic Violence and IPV Obj. 7 and Obj. 8.", "rationale": "The guide emphasizes safety planning, DV advocacy/shelter resources, and the fact that homicide risk rises sharply after leaving. Firearms and threats require careful danger assessment and referral."}, {"number": 51, "section": "Domestic Violence and IPV", "stem": "A 45-year-old patient has recurrent headaches, chronic pelvic pain, fatigue, and abdominal complaints without a clear medical cause. She has missed appointments and seems anxious when her partner is present. Which clinical clue should prompt IPV screening?", "choices": [{"letter": "A", "text": "A normal blood pressure reading"}, {"letter": "B", "text": "Requesting routine preventive care"}, {"letter": "C", "text": "Stable employment and good sleep"}, {"letter": "D", "text": "Recurrent vague or unexplained somatic complaints"}, {"letter": "E", "text": "A single episode of viral gastroenteritis"}], "correct": "D", "correctText": "Recurrent vague or unexplained somatic complaints", "objective": "Understanding Domestic Violence and IPV Obj. 4.", "rationale": "Somatization is a key red flag for IPV in the guide, including recurrent vague or unexplained complaints such as headaches, abdominal/pelvic pain, chronic pain, and fatigue."}, {"number": 52, "section": "Domestic Violence and IPV", "stem": "A patient discloses IPV but is not ready to leave. She asks what help exists besides police involvement. The clinician discusses safety planning, counseling, local shelters, legal advocacy, emergency housing, and hotlines. Which referral is most directly tailored to IPV-specific needs?", "choices": [{"letter": "A", "text": "Routine couples counseling with the abusive partner"}, {"letter": "B", "text": "Domestic violence advocacy program or shelter service"}, {"letter": "C", "text": "Inpatient psychiatric admission for all IPV disclosures"}, {"letter": "D", "text": "Neurology referral as the only intervention"}, {"letter": "E", "text": "Fitness coaching only Personality Disorders"}], "correct": "B", "correctText": "Domestic violence advocacy program or shelter service", "objective": "Understanding Domestic Violence and IPV Obj. 7 and Obj. 8.", "rationale": "DV advocacy and shelters provide safety planning, legal advocacy, emergency housing, and resource navigation. Behavioral health can help with PTSD, depression, anxiety, trauma, and suicidality, but IPV-specific advocacy is central."}, {"number": 53, "section": "Personality Disorders", "stem": "A 24-year-old man has a lifelong pattern of suspiciousness. He believes coworkers are trying to humiliate him, interprets benign comments as hidden insults, refuses to confide in friends, and bears grudges for years. His speech is logical, and he has no hallucinations, disorganized behavior, or fixed bizarre delusion. Which personality disorder is most likely?", "choices": [{"letter": "A", "text": "Delusional disorder"}, {"letter": "B", "text": "Schizotypal personality disorder"}, {"letter": "C", "text": "Borderline personality disorder"}, {"letter": "D", "text": "Paranoid personality disorder"}, {"letter": "E", "text": "Schizoid personality disorder"}], "correct": "D", "correctText": "Paranoid personality disorder", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 4.", "rationale": "Paranoid personality disorder is pervasive distrust and suspiciousness with others' motives interpreted as malicious. It differs from delusional disorder by being a longstanding personality pattern rather than a single fixed delusion."}, {"number": 54, "section": "Personality Disorders", "stem": "A 31-year-old software engineer prefers solitary work, has little interest in dating, lacks close friends other than a sibling, and is indifferent to praise or criticism. He does not feel lonely and does not want more relationships. He has no hallucinations, delusions, or magical thinking. Which diagnosis is most likely?", "choices": [{"letter": "A", "text": "Autism spectrum disorder"}, {"letter": "B", "text": "Dependent personality disorder"}, {"letter": "C", "text": "Avoidant personality disorder"}, {"letter": "D", "text": "Schizotypal personality disorder"}, {"letter": "E", "text": "Schizoid personality disorder"}], "correct": "E", "correctText": "Schizoid personality disorder", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 4.", "rationale": "Schizoid personality disorder involves detachment from social relationships and restricted emotional expression; the patient does not desire close relationships. Avoidant personality disorder patients want relationships but avoid them from fear of rejection."}, {"number": 55, "section": "Personality Disorders", "stem": "A 22-year-old woman wears unusual clothing, believes she can sense future events, and often thinks strangers' conversations have special meaning for her. She has few close friends and appears anxious and odd during the interview. She denies sustained hallucinations or a fixed delusional system. Which personality disorder is most likely?", "choices": [{"letter": "A", "text": "Narcissistic personality disorder"}, {"letter": "B", "text": "Delusional disorder"}, {"letter": "C", "text": "Schizotypal personality disorder"}, {"letter": "D", "text": "Paranoid personality disorder"}, {"letter": "E", "text": "Schizoid personality disorder"}], "correct": "C", "correctText": "Schizotypal personality disorder", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 4.", "rationale": "Schizotypal personality disorder features eccentric behavior, cognitive/perceptual distortions, ideas of reference, magical thinking, and discomfort with close relationships. It does not meet criteria for schizophrenia or delusional disorder."}, {"number": 56, "section": "Personality Disorders", "stem": "A 35-year-old man is evaluated after repeated arrests for fraud and assault. School records show truancy, stealing, fights, and fire-setting before age 15. He lies easily, shows no remorse, and says victims are 'stupid for trusting me.' He has no manic episode or psychosis. Which diagnosis is most likely?", "choices": [{"letter": "A", "text": "Narcissistic personality disorder"}, {"letter": "B", "text": "Intermittent explosive disorder"}, {"letter": "C", "text": "Paranoid personality disorder"}, {"letter": "D", "text": "Antisocial personality disorder"}, {"letter": "E", "text": "Borderline personality disorder"}], "correct": "D", "correctText": "Antisocial personality disorder", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 4.", "rationale": "Antisocial personality disorder involves violation of others' rights, deceitfulness, impulsivity/aggression, irresponsibility, and lack of remorse, with evidence of conduct disorder before age 15."}, {"number": 57, "section": "Personality Disorders", "stem": "A 24-year-old woman presents after superficial cutting when her partner did not answer texts. She alternates between calling the clinician the only person who understands her and accusing the nurse of trying to abandon her. She reports chronic emptiness, intense anger, unstable relationships, and transient paranoia under stress. Which psychotherapy is most specifically recommended?", "choices": [{"letter": "A", "text": "No psychotherapy because medication is curative"}, {"letter": "B", "text": "Dialectical behavior therapy"}, {"letter": "C", "text": "Psychoanalysis only for 10 years"}, {"letter": "D", "text": "Exposure and response prevention"}, {"letter": "E", "text": "Couples therapy with the partner as first-line monotherapy"}], "correct": "B", "correctText": "Dialectical behavior therapy", "objective": "Approach to Understanding Personality Disorders Obj. 5, Obj. 6, and Obj. 7.", "rationale": "Borderline personality disorder presents with instability, self-harm, fear of abandonment, splitting, anger, emptiness, and transient stress-related paranoia. DBT is the evidence-supported specialized CBT for BPD."}, {"number": 58, "section": "Personality Disorders", "stem": "A 27-year-old actor comes to clinic wearing dramatic clothing and gives an exaggerated, colorful account of symptoms but few concrete details. He becomes flirtatious, says the PA is now his closest friend after one visit, and appears uncomfortable when attention shifts away from him. His emotions shift rapidly and seem shallow. Which personality disorder is most likely?", "choices": [{"letter": "A", "text": "Histrionic personality disorder"}, {"letter": "B", "text": "Borderline personality disorder"}, {"letter": "C", "text": "Avoidant personality disorder"}, {"letter": "D", "text": "Dependent personality disorder"}, {"letter": "E", "text": "Narcissistic personality disorder"}], "correct": "A", "correctText": "Histrionic personality disorder", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 4.", "rationale": "Histrionic personality disorder involves excessive emotionality and attention-seeking, including seductive/provocative behavior, theatricality, impressionistic speech, and perceiving relationships as more intimate than they are."}, {"number": 59, "section": "Personality Disorders", "stem": "A 42-year-old executive demands to be seen before all other patients because he is 'too important to wait.' He exaggerates his accomplishments, expects special treatment, exploits coworkers, lacks empathy for staff, and becomes enraged by minor criticism. He denies fear of abandonment, self-harm, or legal problems. Which diagnosis is most likely?", "choices": [{"letter": "A", "text": "Antisocial personality disorder"}, {"letter": "B", "text": "Borderline personality disorder"}, {"letter": "C", "text": "Obsessive-compulsive personality disorder"}, {"letter": "D", "text": "Narcissistic personality disorder"}, {"letter": "E", "text": "Histrionic personality disorder"}], "correct": "D", "correctText": "Narcissistic personality disorder", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 4.", "rationale": "Narcissistic personality disorder is marked by grandiosity, need for admiration, entitlement, interpersonal exploitation, lack of empathy, envy, and arrogance. It is less impulsive/legalistic than antisocial and less chaotic/suicidal than borderline."}, {"number": 60, "section": "Personality Disorders", "stem": "A 26-year-old woman wants close friendships but avoids social events unless she is certain she will be liked. She sees herself as socially inept, fears ridicule, and is hypersensitive to criticism. She has no lack of desire for relationships and no odd beliefs. Which diagnosis is most likely?", "choices": [{"letter": "A", "text": "Dependent personality disorder"}, {"letter": "B", "text": "Paranoid personality disorder"}, {"letter": "C", "text": "Social anxiety limited to performance only"}, {"letter": "D", "text": "Avoidant personality disorder"}, {"letter": "E", "text": "Schizoid personality disorder"}], "correct": "D", "correctText": "Avoidant personality disorder", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 4.", "rationale": "Avoidant personality disorder involves social inhibition, feelings of inadequacy, and hypersensitivity to rejection. The key distinction from schizoid personality disorder is that avoidant patients desire relationships but avoid them due to fear of rejection."}, {"number": 61, "section": "Personality Disorders", "stem": "A 30-year-old woman cannot make everyday decisions without repeated reassurance from her partner. She stays in an unhealthy relationship because she feels helpless alone and urgently seeks a new caretaker whenever a relationship ends. She avoids disagreeing because she fears losing support. Which diagnosis is most likely?", "choices": [{"letter": "A", "text": "Borderline personality disorder"}, {"letter": "B", "text": "Avoidant personality disorder"}, {"letter": "C"
