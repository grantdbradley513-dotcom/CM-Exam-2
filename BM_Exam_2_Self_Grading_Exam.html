, "text": "Histrionic personality disorder"}, {"letter": "D", "text": "Dependent personality disorder"}, {"letter": "E", "text": "Schizoid personality disorder"}], "correct": "D", "correctText": "Dependent personality disorder", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 4.", "rationale": "Dependent personality disorder is excessive need to be cared for, causing submissive/clinging behavior and fear of separation. Patients struggle with decisions, independence, disagreement, and being alone."}, {"number": 62, "section": "Personality Disorders", "stem": "A 45-year-old accountant spends so much time checking formatting, lists, and rules that he misses deadlines. He refuses to delegate unless tasks are done exactly his way, saves broken objects 'just in case,' and is rigid about spending money. He believes these traits are necessary and denies intrusive unwanted obsessions. Which diagnosis is most likely?", "choices": [{"letter": "A", "text": "Obsessive-compulsive personality disorder"}, {"letter": "B", "text": "Obsessive-compulsive disorder"}, {"letter": "C", "text": "Narcissistic personality disorder"}, {"letter": "D", "text": "Autism spectrum disorder"}, {"letter": "E", "text": "Illness anxiety disorder"}], "correct": "A", "correctText": "Obsessive-compulsive personality disorder", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 4.", "rationale": "OCPD involves ego-syntonic perfectionism, orderliness, control, rigidity, difficulty delegating, and miserliness. OCD involves ego-dystonic obsessions/compulsions that are distressing and time-consuming."}, {"number": 63, "section": "Personality Disorders", "stem": "A patient with borderline personality disorder praises one clinician as perfect and tells another that he is cruel and incompetent. She threatens self-harm when boundaries are set. The team wants to prevent being divided into 'good' and 'bad' staff. Which strategy is most appropriate?", "choices": [{"letter": "A", "text": "Avoid discussing suicidal statements because they are manipulative"}, {"letter": "B", "text": "Promise unlimited access to prevent abandonment fear"}, {"letter": "C", "text": "Discharge her from care if she becomes angry"}, {"letter": "D", "text": "Set clear, consistent boundaries and coordinate communication across the whole care team"}, {"letter": "E", "text": "Assign each staff member to respond differently so she can choose whom she trusts"}], "correct": "D", "correctText": "Set clear, consistent boundaries and coordinate communication across the whole care team", "objective": "Approach to Understanding Personality Disorders Obj. 5 and Obj. 6.", "rationale": "BPD commonly challenges clinicians through splitting, crises, abandonment sensitivity, anger, and self-harm. Effective engagement includes consistent boundaries, team communication, validation, and calm nonreactive responses."}, {"number": 64, "section": "Personality Disorders", "stem": "A 38-year-old man with narcissistic personality disorder asks which medication will cure his personality disorder. He has no major depression, anxiety disorder, psychosis, or substance use disorder. Which counseling point is most accurate?", "choices": [{"letter": "A", "text": "No treatment can improve functioning"}, {"letter": "B", "text": "Psychotherapy is the mainstay; medications treat associated symptoms but are not curative for personality disorders"}, {"letter": "C", "text": "SSRIs cure narcissistic traits even without depression or anxiety"}, {"letter": "D", "text": "Benzodiazepines are first-line long-term treatment for all cluster B disorders"}, {"letter": "E", "text": "A second-generation antipsychotic cures most personality disorders"}], "correct": "B", "correctText": "Psychotherapy is the mainstay; medications treat associated symptoms but are not curative for personality disorders", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 8.", "rationale": "General treatment for personality disorders is psychotherapy to improve perceptions, responses, flexibility, self-awareness, and functioning. Medications are not curative and are used only for underlying or associated symptoms."}, {"number": 65, "section": "Personality Disorders", "stem": "A 29-year-old patient with a longstanding personality disorder says, 'I am not the problem; everyone else needs to change.' He sees his behavior as acceptable and shows little insight or interest in treatment. Which pair of terms best describes this typical pattern in personality disorders?", "choices": [{"letter": "A", "text": "Ego-dystonic and autoplastic"}, {"letter": "B", "text": "Intrusive and compulsive"}, {"letter": "C", "text": "Ego-syntonic and alloplastic"}, {"letter": "D", "text": "Dissociative and catatonic"}, {"letter": "E", "text": "Cyclothymic and alexithymic"}], "correct": "C", "correctText": "Ego-syntonic and alloplastic", "objective": "Approach to Understanding Personality Disorders Obj. 1.", "rationale": "Personality disorder traits are often ego-syntonic, meaning acceptable to the person, and alloplastic, meaning the patient tries to change the environment rather than the self. This contributes to limited insight and treatment resistance."}, {"number": 66, "section": "Personality Disorders", "stem": "A 33-year-old man with schizoid personality disorder is referred after workplace conflict. He is aloof, quiet, and uncomfortable with social interaction but has no psychosis or dangerous behavior. Which treatment is most appropriate if he is willing to engage?", "choices": [{"letter": "A", "text": "Psychotherapy focused on improving social interactions and functioning"}, {"letter": "B", "text": "DBT as mandatory first-line for all cluster A disorders"}, {"letter": "C", "text": "Antipsychotic medication as curative monotherapy"}, {"letter": "D", "text": "Exposure to trauma memories"}, {"letter": "E", "text": "Involuntary hospitalization for all patients with social detachment"}], "correct": "A", "correctText": "Psychotherapy focused on improving social interactions and functioning", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 8.", "rationale": "Psychotherapy is the treatment of choice for schizoid and other personality disorders, although engagement may be difficult. Medications do not cure personality disorders."}, {"number": 67, "section": "Personality Disorders", "stem": "A 25-year-old woman with avoidant personality disorder wants to make friends but avoids group projects because she fears criticism. She is nervous and eager to please during the interview. Which treatment plan is most consistent with the guide?", "choices": [{"letter": "A", "text": "Mandatory inpatient care to force social exposure"}, {"letter": "B", "text": "Clozapine for rejection sensitivity"}, {"letter": "C", "text": "No treatment because avoidant patients do not desire relationships"}, {"letter": "D", "text": "Couples therapy with a controlling partner as first-line"}, {"letter": "E", "text": "Psychotherapy, potentially including group or assertiveness training, with medication only for comorbid anxiety or depression"}], "correct": "E", "correctText": "Psychotherapy, potentially including group or assertiveness training, with medication only for comorbid anxiety or depression", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 8.", "rationale": "Avoidant personality disorder treatment includes individual therapy, group therapy, and assertiveness training; medications may help associated anxiety or depression. Avoidant patients desire relationships but fear rejection."}, {"number": 68, "section": "Personality Disorders", "stem": "A 40-year-old patient with dependent personality disorder cannot act independently at work and remains in an abusive relationship because she fears being alone. She becomes depressed when a caretaker threatens to leave. Which prognosis/course statement is most accurate?", "choices": [{"letter": "A", "text": "With treatment, prognosis is often favorable, but occupational independence and abusive relationships are common challenges"}, {"letter": "B", "text": "Treatment is ineffective because all dependent traits are psychotic"}, {"letter": "C", "text": "The disorder always progresses to schizophrenia"}, {"letter": "D", "text": "Medication alone is curative"}, {"letter": "E", "text": "Patients usually have no relationship impairment"}], "correct": "A", "correctText": "With treatment, prognosis is often favorable, but occupational independence and abusive relationships are common challenges", "objective": "Approach to Understanding Personality Disorders Obj. 3.", "rationale": "Dependent personality disorder can impair occupational functioning because patients struggle to act independently, and patients may be prone to abusive relationships. With treatment, prognosis is described as favorable."}, {"number": 69, "section": "Personality Disorders", "stem": "A student is organizing personality disorders by cluster for a board review sheet. One cluster is described as odd or eccentric and includes patients who are suspicious, detached, or eccentric with perceptual distortions. Which set belongs to that cluster?", "choices": [{"letter": "A", "text": "Paranoid, schizoid, and schizotypal"}, {"letter": "B", "text": "Somatic symptom, illness anxiety, and conversion disorder"}, {"letter": "C", "text": "Antisocial, borderline, histrionic, and narcissistic"}, {"letter": "D", "text": "Avoidant, dependent, and obsessive-compulsive"}, {"letter": "E", "text": "Schizophrenia, schizoaffective, and delusional disorder"}], "correct": "A", "correctText": "Paranoid, schizoid, and schizotypal", "objective": "Approach to Understanding Personality Disorders Obj. 2 and Obj. 4.", "rationale": "Cluster A personality disorders are odd/eccentric and include paranoid, schizoid, and schizotypal personality disorders. Cluster B is dramatic/erratic; Cluster C is anxious/fearful."}, {"number": 70, "section": "Personality Disorders", "stem": "A 50-year-old man has long been suspicious of coworkers, reads hidden threats into neutral comments, and bears grudges. However, he does not have a single fixed, well-systematized delusion and his suspiciousness has been pervasive across relationships since early adulthood. Which feature best distinguishes paranoid personality disorder from delusional disorder in this case?", "choices": [{"letter": "A", "text": "Pervasive longstanding suspicious personality pattern rather than one or more fixed delusions"}, {"letter": "B", "text": "A required history of conduct disorder"}, {"letter": "C", "text": "Symptoms lasting less than 1 month"}, {"letter": "D", "text": "Complete absence of interpersonal impairment"}, {"letter": "E", "text": "Presence of visual hallucinations"}], "correct": "A", "correctText": "Pervasive longstanding suspicious personality pattern rather than one or more fixed delusions", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 4.", "rationale": "Paranoid personality disorder is a chronic interpersonal style of distrust and suspicion. Delusional disorder centers on one or more fixed delusions for at least 1 month without schizophrenia criteria and without marked impairment."}, {"number": 71, "section": "Personality Disorders", "stem": "A 23-year-old man with odd beliefs tells the clinician that numbers on license plates are coded messages for him, but he can consider that this may not be true. He has social anxiety that does not improve with familiarity, constricted affect, and few close relationships. Which finding supports schizotypal personality disorder rather than schizoid personality disorder?", "choices": [{"letter": "A", "text": "No desire for close relationships"}, {"letter": "B", "text": "Indifference to praise and criticism only"}, {"letter": "C", "text": "A stable fixed delusion with no insight"}, {"letter": "D", "text": "Ideas of reference and magical thinking"}, {"letter": "E", "text": "Absence of cognitive or perceptual distortions"}], "correct": "D", "correctText": "Ideas of reference and magical thinking", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 4.", "rationale": "Schizotypal personality disorder includes cognitive/perceptual distortions such as ideas of reference, odd beliefs, and magical thinking. Schizoid personality disorder is detachment without the odd beliefs or perceptual distortions."}, {"number": 72, "section": "Personality Disorders", "stem": "A 46-year-old woman spends 5 hours rewriting a short work email because it is not 'perfect enough' and misses the deadline. She insists coworkers follow her exact method and becomes anxious when the interview does not proceed in a highly structured way. She views her standards as correct and useful. Which feature favors OCPD over OCD?", "choices": [{"letter": "A", "text": "The patient has true hallucinations and delusions"}, {"letter": "B", "text": "Traits are ego-syntonic and focused on perfectionism/control rather than unwanted obsessions and compulsions"}, {"letter": "C", "text": "Symptoms are always episodic and last less than 1 month"}, {"letter": "D", "text": "The behavior is motivated by external financial gain"}, {"letter": "E", "text": "The patient recognizes the thoughts as irrational and wants them gone"}], "correct": "B", "correctText": "Traits are ego-syntonic and focused on perfectionism/control rather than unwanted obsessions and compulsions", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 4.", "rationale": "OCPD traits are ego-syntonic and involve rigid perfectionism, order, and control at the expense of efficiency. OCD is ego-dystonic with intrusive obsessions and compulsions that the patient finds distressing."}, {"number": 73, "section": "Personality Disorders", "stem": "A 21-year-old woman with borderline personality disorder tells the PA she will cut herself if the PA does not call her every night. She is angry but denies a current suicide plan. What is the best response style?", "choices": [{"letter": "A", "text": "Agree to unlimited contact to prevent abandonment fear"}, {"letter": "B", "text": "Punish the patient by terminating care immediately"}, {"letter": "C", "text": "Argue with the patient until she admits she is overreacting"}, {"letter": "D", "text": "Ignore the statement because BPD threats are always manipulative"}, {"letter": "E", "text": "Take the self-harm statement seriously, assess risk, validate emotion, and maintain consistent boundaries"}], "correct": "E", "correctText": "Take the self-harm statement seriously, assess risk, validate emotion, and maintain consistent boundaries", "objective": "Approach to Understanding Personality Disorders Obj. 5 and Obj. 6.", "rationale": "BPD self-harm and suicidal statements require careful risk assessment, but clinicians should stay calm, nonreactive, validating, and consistent with boundaries. Overreacting or underreacting can worsen splitting and instability."}, {"number": 74, "section": "Personality Disorders", "stem": "A 58-year-old man with narcissistic personality disorder becomes increasingly depressed as he ages and loses status at work. He remains entitled and has fragile self-esteem, but now feels humiliated by younger coworkers. Which course feature is most consistent with this personality disorder?", "choices": [{"letter": "A", "text": "Difficulty handling aging and vulnerability to midlife crisis or depression"}, {"letter": "B", "text": "Resolution with a single SSRI dose"}, {"letter": "C", "text": "Progression to catatonia in most cases"}, {"letter": "D", "text": "Better functioning when social support is lost"}, {"letter": "E", "text": "Rapid spontaneous remission after 1 month"}], "correct": "A", "correctText": "Difficulty handling aging and vulnerability to midlife crisis or depression", "objective": "Approach to Understanding Personality Disorders Obj. 3.", "rationale": "Narcissistic personality disorder is chronic and difficult to treat; patients may handle aging poorly, cling to youth, and be vulnerable to midlife crisis or depression. Psychotherapy is treatment, with antidepressants only if depression is present."}, {"number": 75, "section": "Personality Disorders", "stem": "A 37-year-old woman with histrionic traits is dramatic and attention-seeking but has no recurrent self-harm, no chronic emptiness, and no brief stress-related psychosis. Another patient has unstable relationships, self-harm, intense fear of abandonment, and splitting. Which feature most strongly points to borderline rather than histrionic personality disorder?", "choices": [{"letter": "A", "text": "Use of physical appearance to draw attention"}, {"letter": "B", "text": "Discomfort when not the center of attention"}, {"letter": "C", "text": "Seductive behavior and theatrical speech"}, {"letter": "D", "text": "Suggestibility and rapidly shifting shallow emotions"}, {"letter": "E", "text": "Recurrent self-harm and brief stress-related paranoid or psychotic symptoms"}], "correct": "E", "correctText": "Recurrent self-harm and brief stress-related paranoid or psychotic symptoms", "objective": "Approach to Understanding Personality Disorders Obj. 3 and Obj. 4.", "rationale": "Histrionic and borderline personality disorders can both be dramatic and emotionally intense, but borderline is more associated with recurrent self-harm, suicidality, splitting, fear of abandonment, and brief stress-related psychotic symptoms."}];
    const importReport = {"questions_found": 75, "questions_imported": 75, "expected_questions": 75, "unparsed_questions": [], "answer_key_entries_found": 75, "missing_answer_key_entries": [], "choice_parse_issues": [], "correct_letter_issues": []};
    let current = 0;
    let reviewMode = false;
    let reviewIndices = [];
    let graded = false;
    let answers = Array(questions.length).fill(null);

    const els = {
      qCounter: document.getElementById('qCounter'),
      answeredCounter: document.getElementById('answeredCounter'),
      correctCounter: document.getElementById('correctCounter'),
      percentCounter: document.getElementById('percentCounter'),
      progressFill: document.getElementById('progressFill'),
      scorePill: document.getElementById('scorePill'),
      scoreCard: document.getElementById('scoreCard'),
      scoreBig: document.getElementById('scoreBig'),
      scoreDetail: document.getElementById('scoreDetail'),
      missedList: document.getElementById('missedList'),
      reviewBanner: document.getElementById('reviewBanner'),
      qNum: document.getElementById('qNum'),
      modeLabel: document.getElementById('modeLabel'),
      sectionTag: document.getElementById('sectionTag'),
      stem: document.getElementById('stem'),
      options: document.getElementById('options'),
      feedback: document.getElementById('feedback'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      gradeBtn: document.getElementById('gradeBtn'),
      reviewBtn: document.getElementById('reviewBtn'),
      resetBtn: document.getElementById('resetBtn'),
      importReport: document.getElementById('importReport')
    };

    function activeList() {
      return reviewMode ? reviewIndices : questions.map((_, i) => i);
    }

    function activeQuestionIndex() {
      const list = activeList();
      return list[current] ?? 0;
    }

    function answeredCount() {
      return answers.filter(Boolean).length;
    }

    function gradeStats() {
      let correct = 0;
      const missed = [];
      questions.forEach((q, i) => {
        if (answers[i] === q.correct) correct++;
        else missed.push(i);
      });
      const percent = Math.round((correct / questions.length) * 1000) / 10;
      return { correct, missed, percent };
    }

    function updateStatus() {
      const list = activeList();
      const displayPos = Math.min(current + 1, list.length || 1);
      els.qCounter.textContent = `${displayPos} / ${list.length || questions.length}`;
      els.answeredCounter.textContent = `${answeredCount()} / ${questions.length}`;
      els.progressFill.style.width = `${(displayPos / (list.length || questions.length)) * 100}%`;
      if (graded) {
        const stats = gradeStats();
        els.correctCounter.textContent = `${stats.correct} / ${questions.length}`;
        els.percentCounter.textContent = `${stats.percent}%`;
        els.scorePill.textContent = `${stats.percent}%`;
        els.scoreCard.classList.add('show');
        els.scoreBig.textContent = `${stats.percent}%`;
        els.scoreDetail.textContent = `${stats.correct} correct / ${questions.length} questions`;
        renderMissedList(stats.missed);
      } else {
        els.correctCounter.textContent = '-';
        els.percentCounter.textContent = '-';
        els.scorePill.textContent = 'Not graded';
        els.scoreCard.classList.remove('show');
      }
      els.reviewBanner.classList.toggle('show', reviewMode);
      els.modeLabel.textContent = reviewMode ? 'Missed Review' : 'Full Exam';
      els.reviewBtn.disabled = !graded || gradeStats().missed.length === 0;
    }

    function renderMissedList(missed) {
      if (!graded || missed.length === 0) {
        els.missedList.classList.remove('show');
        els.missedList.innerHTML = '';
        return;
      }
      els.missedList.classList.add('show');
      els.missedList.innerHTML = '<strong>Missed:</strong> ';
      missed.forEach(idx => {
        const a = document.createElement('a');
        a.href = '#examCard';
        a.textContent = `Q${questions[idx].number}`;
        a.addEventListener('click', (e) => {
          e.preventDefault();
          reviewMode = true;
          reviewIndices = missed;
          current = reviewIndices.indexOf(idx);
          render();
        });
        els.missedList.appendChild(a);
      });
    }

    function render() {
      const list = activeList();
      if (reviewMode && list.length === 0) {
        reviewMode = false;
        current = 0;
      }
      const qi = activeQuestionIndex();
      const q = questions[qi];
      els.qNum.textContent = `Question ${q.number}`;
      els.sectionTag.textContent = q.section;
      els.stem.textContent = q.stem;
      els.options.innerHTML = '';

      q.choices.forEach(choice => {
        const label = document.createElement('label');
        label.className = 'option';
        if (answers[qi] === choice.letter) label.classList.add('selected');
        if (graded) {
          if (choice.letter === q.correct) label.classList.add('correct');
          if (answers[qi] === choice.letter && choice.letter !== q.correct) label.classList.add('incorrect');
        }

        const input = document.createElement('input');
        input.type = 'radio';
        input.name = `question-${qi}`;
        input.value = choice.letter;
        input.checked = answers[qi] === choice.letter;
        input.disabled = graded;
        input.addEventListener('change', () => {
          answers[qi] = choice.letter;
          render();
        });

        const textWrap = document.createElement('span');
        const letter = document.createElement('span');
        letter.className = 'letter';
        letter.textContent = choice.letter;
        const text = document.createElement('span');
        text.className = 'text';
        text.textContent = choice.text;
        textWrap.appendChild(letter);
        textWrap.appendChild(text);

        label.appendChild(input);
        label.appendChild(textWrap);
        els.options.appendChild(label);
      });

      if (graded) {
        const selected = answers[qi];
        const isCorrect = selected === q.correct;
        els.feedback.classList.add('show');
        els.feedback.innerHTML = '';
        const h = document.createElement('h3');
        h.textContent = isCorrect ? 'Correct' : (selected ? 'Incorrect' : 'Unanswered');
        els.feedback.appendChild(h);

        const correctP = document.createElement('div');
        correctP.innerHTML = `<strong>Correct answer:</strong> ${q.correct}. ${escapeHtml(q.correctText || choiceText(q, q.correct))}`;
        els.feedback.appendChild(correctP);

        if (q.objective) {
          const obj = document.createElement('div');
          obj.className = 'objective';
          obj.innerHTML = `<strong>Objective:</strong> ${escapeHtml(q.objective)}`;
          els.feedback.appendChild(obj);
        }
        if (q.rationale) {
          const rat = document.createElement('div');
          rat.className = 'rationale';
          rat.innerHTML = `<strong>Rationale:</strong> ${escapeHtml(q.rationale)}`;
          els.feedback.appendChild(rat);
        }
      } else {
        els.feedback.classList.remove('show');
        els.feedback.innerHTML = '';
      }

      els.prevBtn.disabled = current === 0;
      els.nextBtn.disabled = current >= list.length - 1;
      updateStatus();
    }

    function choiceText(q, letter) {
      const c = q.choices.find(x => x.letter === letter);
      return c ? c.text : '';
    }

    function escapeHtml(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    els.prevBtn.addEventListener('click', () => { if (current > 0) { current--; render(); } });
    els.nextBtn.addEventListener('click', () => {
      const list = activeList();
      if (current < list.length - 1) { current++; render(); }
    });
    els.gradeBtn.addEventListener('click', () => {
      graded = true;
      reviewMode = false;
      current = 0;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    els.reviewBtn.addEventListener('click', () => {
      const stats = gradeStats();
      if (!graded || stats.missed.length === 0) return;
      reviewMode = true;
      reviewIndices = stats.missed;
      current = 0;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    els.resetBtn.addEventListener('click', () => {
      answers = Array(questions.length).fill(null);
      graded = false;
      reviewMode = false;
      reviewIndices = [];
      current = 0;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' && !els.prevBtn.disabled) els.prevBtn.click();
      if (e.key === 'ArrowRight' && !els.nextBtn.disabled) els.nextBtn.click();
    });

    els.importReport.textContent = `Verification: ${importReport.questions_found} questions found • ${importReport.questions_imported} imported • Unparsed: ${importReport.unparsed_questions.length ? importReport.unparsed_questions.join(', ') : 'None'} • Answer key entries: ${importReport.answer_key_entries_found}.`;
    render();
  </script>
