<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pharmacotherapy Practice Exam Questions 41-60</title>
<style>
:root { --bg:#f4f7fb; --card:#ffffff; --ink:#172033; --muted:#657085; --line:#d9e2ef; --accent:#2563eb; --accent2:#0f766e; --good:#dcfce7; --good-border:#16a34a; --bad:#fee2e2; --bad-border:#dc2626; --warn:#fff7ed; }
* { box-sizing:border-box; }
body { margin:0; font-family: Arial, Helvetica, sans-serif; background:linear-gradient(180deg,#eef5ff 0%, var(--bg) 240px); color:var(--ink); line-height:1.5; }
header { padding:28px 18px 14px; text-align:center; }
h1 { margin:0; font-size:clamp(1.55rem,4vw,2.4rem); letter-spacing:-.03em; }
.subtitle { margin-top:8px; color:var(--muted); font-size:1rem; }
.wrap { max-width:980px; margin:0 auto; padding:14px 14px 40px; }
.panel { background:var(--card); border:1px solid var(--line); border-radius:20px; box-shadow:0 12px 30px rgba(15,23,42,.08); padding:18px; margin-bottom:18px; }
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:12px; }
.stat { background:#f8fafc; border:1px solid var(--line); border-radius:14px; padding:14px; text-align:center; }
.stat b { display:block; font-size:1.5rem; color:var(--accent); }
.controls { display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
button { border:0; border-radius:999px; padding:12px 18px; font-size:1rem; font-weight:700; cursor:pointer; color:white; background:var(--accent); box-shadow:0 4px 12px rgba(37,99,235,.22); }
button.secondary { background:#475569; }
button.ghost { background:#0f766e; }
button:disabled { opacity:.55; cursor:not-allowed; }
.question-card { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:20px; margin:16px 0; box-shadow:0 8px 18px rgba(15,23,42,.05); }
.qtop { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; }
.badge { background:#dbeafe; color:#1e40af; border-radius:999px; padding:5px 10px; font-weight:800; font-size:.9rem; white-space:nowrap; }
.qtext { font-size:1.12rem; font-weight:700; margin:8px 0 14px; }
.choice { display:flex; gap:12px; align-items:flex-start; border:2px solid var(--line); border-radius:14px; padding:12px; margin:10px 0; cursor:pointer; background:#fff; }
.choice:hover { border-color:#93c5fd; }
.choice input { margin-top:4px; transform:scale(1.15); }
.letter { font-weight:900; min-width:24px; color:#334155; }
.choice.correct { background:var(--good); border-color:var(--good-border); }
.choice.incorrect { background:var(--bad); border-color:var(--bad-border); }
.answer-note { display:none; margin-top:12px; border-left:5px solid var(--accent2); background:#f0fdfa; padding:12px; border-radius:10px; }
.graded .answer-note { display:block; }
.hidden { display:none !important; }
.progress { height:10px; background:#e2e8f0; border-radius:999px; overflow:hidden; margin-top:12px; }
.progress > div { height:100%; width:0%; background:var(--accent2); transition:.2s; }
.footer-note { color:var(--muted); text-align:center; font-size:.95rem; margin-top:18px; }
@media(max-width:700px) { .stats { grid-template-columns:1fr; } .panel,.question-card { border-radius:16px; padding:15px; } button { width:100%; } .controls { display:grid; grid-template-columns:1fr; } }
@media print { button,.controls,.progress { display:none; } body { background:#fff; } .question-card,.panel { box-shadow:none; break-inside:avoid; } }
</style>
</head>
<body>
<header>
<h1>Pharmacotherapy Practice Exam</h1>
<div class="subtitle">Questions 41-60 | Self-Grading Board-Review Style</div>
</header>
<main class="wrap">
<section class="panel" id="scorePanel">
<div><strong>Instructions:</strong> Select one best answer for each question, then submit to grade.</div>
<div class="progress"><div id="progressBar"></div></div>
<div class="stats">
<div class="stat"><span>Score</span><b id="scoreText">-</b></div>
<div class="stat"><span>Percent</span><b id="percentText">-</b></div>
<div class="stat"><span>Imported</span><b>20/20</b></div>
</div>
<div class="controls">
<button id="gradeBtn">Submit & Grade</button>
<button class="secondary" id="resetBtn">Reset Exam</button>
<button class="ghost" id="missedBtn" disabled>Review Missed Questions</button>
<button class="secondary" id="showAllBtn">Show All Questions</button>
</div>
</section>
<section id="questions"></section>
<div class="footer-note">Import verification: Questions found 20 | Questions imported 20 | Could not parse: None</div>
</main>
<script>
const questions = [{"number": 41, "question": "A 70-year-old man with atrial fibrillation develops a posterior tibial vein DVT. He previously had a DVT and has no significant bleeding risk. Which anticoagulant is most appropriate?", "choices": [["A", "Warfarin"], ["B", "Aspirin"], ["C", "Clopidogrel"], ["D", "IVC filter"], ["E", "No treatment"]], "answer": "A", "rationale": ""}, {"number": 42, "question": "A pregnant woman is diagnosed with active tuberculosis. Which treatment regimen is recommended?", "choices": [["A", "Isoniazid + Rifampin + Ethambutol for 2 months, then Isoniazid + Rifampin for 7 months"], ["B", "Rifampin alone"], ["C", "Pyrazinamide alone"], ["D", "Ethambutol alone"], ["E", "No treatment until delivery"]], "answer": "A", "rationale": ""}, {"number": 43, "question": "A patient with severe asthma remains uncontrolled despite high-dose ICS-LABA therapy and now meets GINA Step 5 criteria. Which controller medication should be added?", "choices": [["A", "Albuterol"], ["B", "Tiotropium"], ["C", "Montelukast"], ["D", "Ipratropium"], ["E", "Salmeterol"]], "answer": "B", "rationale": ""}, {"number": 44, "question": "A patient presents with signs of a pulmonary embolism. Why might unfractionated heparin be preferred over LMWH initially?", "choices": [["A", "Lower bleeding risk"], ["B", "Oral administration"], ["C", "Faster onset of anticoagulation"], ["D", "Less monitoring"], ["E", "Better adherence"]], "answer": "C", "rationale": ""}, {"number": 45, "question": "A patient with an unprovoked anterior tibial vein DVT has no contraindications to anticoagulation. Which treatment is most appropriate?", "choices": [["A", "Apixaban for 3 months"], ["B", "Aspirin"], ["C", "Clopidogrel"], ["D", "Observation only"], ["E", "IVC filter"]], "answer": "A", "rationale": ""}, {"number": 46, "question": "A 28-year-old woman arrives at the emergency department with a severe asthma exacerbation and worsening respiratory distress. Which treatment approach is most appropriate?", "choices": [["A", "Montelukast only"], ["B", "SABA + SAMA, systemic corticosteroids, oxygen, consider magnesium and advanced support"], ["C", "Tiotropium only"], ["D", "Observation only"], ["E", "Oral antihistamines"]], "answer": "B", "rationale": ""}, {"number": 47, "question": "A patient develops pneumonia after 3 days in the hospital and was placed on a ventilator yesterday. What type of pneumonia is this?", "choices": [["A", "Ventilator-associated pneumonia"], ["B", "Community-acquired pneumonia"], ["C", "Aspiration pneumonia"], ["D", "Hospital-acquired pneumonia"], ["E", "Atypical pneumonia"]], "answer": "D", "rationale": ""}, {"number": 48, "question": "A patient with asthma remains symptomatic despite Step 3 treatment. According to GINA Step 4, which regimen is recommended?", "choices": [["A", "Maintenance medium-dose Budesonide/Formoterol"], ["B", "Albuterol only"], ["C", "Tiotropium only"], ["D", "Montelukast"], ["E", "Prednisone"]], "answer": "A", "rationale": ""}, {"number": 49, "question": "A patient with stable COPD requires rescue therapy but develops tremors with albuterol. Which medication is preferred?", "choices": [["A", "Ipratropium"], ["B", "Formoterol"], ["C", "Levalbuterol"], ["D", "Tiotropium"], ["E", "Montelukast"]], "answer": "C", "rationale": ""}, {"number": 50, "question": "A patient with HIV is diagnosed with active tuberculosis. In addition to standard treatment, what modification is typically required?", "choices": [["A", "Shorten treatment by 3 months"], ["B", "Add corticosteroids indefinitely"], ["C", "Add ethambutol permanently"], ["D", "Extend treatment by an additional 3 months"], ["E", "Avoid rifampin"]], "answer": "D", "rationale": ""}, {"number": 51, "question": "A woman of childbearing age is being treated for active tuberculosis. What counseling point is important?", "choices": [["A", "Avoid becoming pregnant during treatment"], ["B", "Avoid dairy products"], ["C", "Stop treatment when symptoms improve"], ["D", "Avoid exercise"], ["E", "Take vitamin K"]], "answer": "A", "rationale": ""}, {"number": 52, "question": "A 76-year-old inpatient with cancer develops a muscular vein DVT and cannot receive anticoagulation because of a high bleeding risk. Which intervention is most appropriate?", "choices": [["A", "Warfarin"], ["B", "Apixaban"], ["C", "IVC filter"], ["D", "Aspirin"], ["E", "Clopidogrel"]], "answer": "C", "rationale": ""}, {"number": 53, "question": "A patient with asthma has difficulty using inhalers consistently because of poor technique and adherence issues. Which medication may be considered?", "choices": [["A", "Montelukast"], ["B", "Tiotropium"], ["C", "Albuterol"], ["D", "Ipratropium"], ["E", "Formoterol"]], "answer": "A", "rationale": ""}, {"number": 54, "question": "A pregnant patient is receiving isoniazid for active tuberculosis. Which supplement should also be prescribed?", "choices": [["A", "Vitamin K"], ["B", "Folic acid"], ["C", "Pyridoxine"], ["D", "Calcium"], ["E", "Vitamin D"]], "answer": "C", "rationale": ""}, {"number": 55, "question": "A patient presents with an acute COPD exacerbation. Which medication regimen is most appropriate initially?", "choices": [["A", "Montelukast"], ["B", "SABA and/or SAMA"], ["C", "Tiotropium only"], ["D", "ICS only"], ["E", "Prednisone only"]], "answer": "B", "rationale": ""}, {"number": 56, "question": "A patient with pneumonia meets admission criteria and was recently hospitalized for a complicated UTI. Which additional antibiotic should be considered for MRSA coverage?", "choices": [["A", "Doxycycline"], ["B", "Amoxicillin"], ["C", "Ceftriaxone"], ["D", "Vancomycin or Linezolid"], ["E", "Azithromycin"]], "answer": "D", "rationale": ""}, {"number": 57, "question": "A patient with COPD was hospitalized one month ago and now presents with community-acquired pneumonia. Which treatment is most appropriate?", "choices": [["A", "TB therapy"], ["B", "Community-acquired pneumonia antibiotics plus corticosteroids if needed for COPD exacerbation"], ["C", "Observation only"], ["D", "Antifungal therapy"], ["E", "Vancomycin alone"]], "answer": "B", "rationale": ""}, {"number": 58, "question": "A patient continues to have severe asthma symptoms despite appropriate ICS therapy. How should this asthma severity be classified and treated?", "choices": [["A", "Mild intermittent; albuterol"], ["B", "Moderate persistent; montelukast"], ["C", "Severe persistent; add biologic therapy such as omalizumab or dupilumab"], ["D", "Exercise-induced asthma only"], ["E", "COPD overlap"]], "answer": "C", "rationale": ""}, {"number": 59, "question": "A newly diagnosed COPD patient meets GOLD Group A criteria. Which controller medication strategy is recommended?", "choices": [["A", "LABA or LAMA monotherapy"], ["B", "LABA/LAMA combination"], ["C", "Triple therapy"], ["D", "ICS alone"], ["E", "SABA only"]], "answer": "A", "rationale": ""}, {"number": 60, "question": "A patient is prescribed isoniazid for tuberculosis treatment. What additional medication should routinely be given?", "choices": [["A", "Vitamin K"], ["B", "Pyridoxine"], ["C", "Calcium carbonate"], ["D", "Folic acid"], ["E", "Magnesium oxide"]], "answer": "B", "rationale": ""}];
let reviewMissedOnly = false;
const container = document.getElementById('questions');
function esc(s) { return String(s).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function render() {
  container.innerHTML = '';
  questions.forEach((q, idx) => {
    const card = document.createElement('article');
    card.className = 'question-card';
    card.id = 'q' + q.number;
    card.dataset.number = q.number;
    card.innerHTML = `<div class="qtop"><span class="badge">Question ${q.number}</span><span class="badge">Single best answer</span></div><div class="qtext">${esc(q.question)}</div>` +
      q.choices.map(([letter, text]) => `<label class="choice" data-letter="${letter}"><input type="radio" name="q${q.number}" value="${letter}"><span class="letter">${letter}.</span><span>${esc(text)}</span></label>`).join('') +
      `<div class="answer-note"><strong>Correct answer:</strong> <span class="correct-answer"></span><br><strong>Rationale:</strong> <span class="rationale">No rationale was provided in the PDF.</span></div>`;
    container.appendChild(card);
  });
  attachProgress();
}
function attachProgress() {
  document.querySelectorAll('input[type=radio]').forEach(input => input.addEventListener('change', updateProgress));
  updateProgress();
}
function updateProgress() {
  const answered = questions.filter(q => document.querySelector(`input[name="q${q.number}"]:checked`)).length;
  document.getElementById('progressBar').style.width = (answered / questions.length * 100) + '%';
}
function grade() {
  let correct = 0;
  document.body.classList.add('graded');
  questions.forEach(q => {
    const selected = document.querySelector(`input[name="q${q.number}"]:checked`);
    const card = document.getElementById('q' + q.number);
    card.classList.add('graded');
    const answerText = q.choices.find(c => c[0] === q.answer)?.[1] || '';
    card.querySelector('.correct-answer').textContent = `${q.answer}. ${answerText}`;
    card.querySelectorAll('.choice').forEach(label => {
      const letter = label.dataset.letter;
      label.classList.remove('correct','incorrect');
      if (letter === q.answer) label.classList.add('correct');
      if (selected && letter === selected.value && letter !== q.answer) label.classList.add('incorrect');
    });
    if (selected && selected.value === q.answer) correct++;
    card.dataset.correct = selected && selected.value === q.answer ? 'true' : 'false';
  });
  const pct = Math.round((correct / questions.length) * 1000) / 10;
  document.getElementById('scoreText').textContent = `${correct} / ${questions.length}`;
  document.getElementById('percentText').textContent = pct + '%';
  document.getElementById('missedBtn').disabled = false;
  document.getElementById('scorePanel').scrollIntoView({behavior:'smooth', block:'start'});
}
function resetExam() {
  document.querySelectorAll('input[type=radio]').forEach(i => { i.checked = false; });
  document.querySelectorAll('.choice').forEach(c => c.classList.remove('correct','incorrect'));
  document.querySelectorAll('.question-card').forEach(c => { c.classList.remove('graded','hidden'); delete c.dataset.correct; });
  document.body.classList.remove('graded');
  document.getElementById('scoreText').textContent = '-';
  document.getElementById('percentText').textContent = '-';
  document.getElementById('missedBtn').disabled = true;
  document.getElementById('missedBtn').textContent = 'Review Missed Questions';
  reviewMissedOnly = false;
  updateProgress();
  window.scrollTo({top:0, behavior:'smooth'});
}
function reviewMissed() {
  reviewMissedOnly = !reviewMissedOnly;
  document.querySelectorAll('.question-card').forEach(card => {
    card.classList.toggle('hidden', reviewMissedOnly && card.dataset.correct === 'true');
  });
  document.getElementById('missedBtn').textContent = reviewMissedOnly ? 'Show All Questions' : 'Review Missed Questions';
}
document.getElementById('gradeBtn').addEventListener('click', grade);
document.getElementById('resetBtn').addEventListener('click', resetExam);
document.getElementById('missedBtn').addEventListener('click', reviewMissed);
document.getElementById('showAllBtn').addEventListener('click', () => { reviewMissedOnly=false; document.querySelectorAll('.question-card').forEach(c=>c.classList.remove('hidden')); document.getElementById('missedBtn').textContent='Review Missed Questions'; });
render();
</script>
</body>
</html>
