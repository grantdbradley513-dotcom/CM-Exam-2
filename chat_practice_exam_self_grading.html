<title>Chat Practice Exam - Self-Grading</title>
<style>
:root{--navy:#12355b;--blue:#1f78b4;--light:#eef6ff;--border:#c8d7e6;--green:#d9f7df;--green-border:#27a844;--red:#fde1e1;--red-border:#d93025;--text:#1f2937;--muted:#667085;}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#f4f8fb;color:var(--text);line-height:1.55;font-size:18px}
header{background:linear-gradient(135deg,var(--navy),#23669a);color:white;padding:28px 18px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.15)}
header h1{margin:0;font-size:clamp(1.6rem,4vw,2.4rem)} header p{margin:.35rem 0 0;opacity:.95}
.container{max-width:980px;margin:0 auto;padding:20px}
.toolbar{position:sticky;top:0;z-index:5;background:white;border:1px solid var(--border);border-radius:18px;padding:16px;margin:18px 0;box-shadow:0 4px 18px rgba(31,65,114,.08);display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between}
button{border:0;border-radius:999px;padding:12px 18px;font-weight:800;font-size:16px;cursor:pointer;background:var(--blue);color:white;box-shadow:0 3px 8px rgba(31,120,180,.22)}
button.secondary{background:#e8eef5;color:#17324d} button.warn{background:#31445d} button:hover{filter:brightness(.97)}
.score{font-weight:900;color:var(--navy);font-size:1.1rem}
.question-card{background:white;border:1px solid var(--border);border-radius:18px;margin:18px 0;overflow:hidden;box-shadow:0 4px 18px rgba(31,65,114,.07)}
.q-head{background:var(--navy);color:white;padding:12px 18px;font-weight:900;display:flex;justify-content:space-between;gap:12px}
.q-body{padding:18px} .stem{font-weight:650;margin-bottom:14px;white-space:pre-wrap}
.choice{display:flex;gap:12px;align-items:flex-start;border:2px solid #e2eaf3;background:#fbfdff;border-radius:14px;padding:12px;margin:10px 0;cursor:pointer;transition:.15s}
.choice:hover{border-color:#9fc5e8;background:#f2f8ff} .choice input{margin-top:6px;transform:scale(1.2)} .label{font-weight:900;color:var(--navy);min-width:28px}
.choice.correct{background:var(--green);border-color:var(--green-border)} .choice.incorrect{background:var(--red);border-color:var(--red-border)}
.feedback{display:none;margin-top:14px;padding:12px;border-radius:12px;background:#f7fafc;border-left:5px solid var(--blue);font-weight:650}
.feedback.show{display:block} .unanswered{outline:3px solid #f59e0b}
.footer-note{text-align:center;color:var(--muted);padding:30px 0}
@media(max-width:640px){body{font-size:17px} .container{padding:12px} .toolbar{position:static} button{width:100%} .q-head{display:block}}
</style></head>

const exam=document.getElementById('exam');
function renderExam(){
 exam.innerHTML='';
 questions.forEach(q=>{
  const card=document.createElement('article'); card.className='question-card'; card.id='q'+q.number;
  card.innerHTML=`<div class="q-head"><span>Question ${q.number}</span><span>Single Best Answer</span></div><div class="q-body"><div class="stem">${escapeHtml(q.stem)}</div><div class="choices">${q.choices.map(c=>`<label class="choice" data-label="${c.label}"><input type="radio" name="q${q.number}" value="${c.label}"><span class="label">${c.label}.</span><span>${escapeHtml(c.text)}</span></label>`).join('')}</div><div class="feedback" id="fb${q.number}"></div></div>`;
  exam.appendChild(card);
 });
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function gradeExam(){
 let correct=0, answered=0, missed=[];
 questions.forEach(q=>{
  const card=document.getElementById('q'+q.number); card.classList.remove('unanswered');
  const selected=document.querySelector(`input[name="q${q.number}"]:checked`);
  const labels=card.querySelectorAll('.choice'); labels.forEach(l=>l.classList.remove('correct','incorrect'));
  labels.forEach(l=>{ if(l.dataset.label===q.answer) l.classList.add('correct'); });
  if(selected){answered++; if(selected.value===q.answer) correct++; else {missed.push(q.number); selected.closest('.choice').classList.add('incorrect');} } else {missed.push(q.number); card.classList.add('unanswered');}
  const fb=document.getElementById('fb'+q.number); fb.classList.add('show');
  const selectedText=selected ? selected.value : 'No answer selected';
  fb.innerHTML=`Correct answer: <strong>${q.answer}. ${escapeHtml(q.answerText)}</strong>${q.explanation ? '<br><br>'+escapeHtml(q.explanation) : ''}`;
 });
 const pct=Math.round((correct/questions.length)*1000)/10;
 document.getElementById('scoreBox').textContent=`Score: ${correct} / ${questions.length} (${pct}%)`;
 window.missedQuestions=missed;
 window.scrollTo({top:0,behavior:'smooth'});
}
function reviewMissed(){
 if(!window.missedQuestions) gradeExam();
 const missed=window.missedQuestions||[];
 if(missed.length===0){alert('No missed questions.'); return;}
 document.getElementById('q'+missed[0]).scrollIntoView({behavior:'smooth',block:'start'});
}
function resetExam(){
 document.querySelectorAll('input[type="radio"]').forEach(i=>i.checked=false);
 document.querySelectorAll('.choice').forEach(c=>c.classList.remove('correct','incorrect'));
 document.querySelectorAll('.feedback').forEach(f=>f.classList.remove('show'));
 document.querySelectorAll('.question-card').forEach(c=>c.classList.remove('unanswered'));
 document.getElementById('scoreBox').textContent='Not graded yet'; window.missedQuestions=null; window.scrollTo({top:0,behavior:'smooth'});
}
renderExam();
</script></body></html>
