<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HEENT High-Yield Self-Grading Exam</title><style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#172033;--muted:#60708a;--line:#dce4ef;--brand:#3157d5;--brand2:#243fa8;--good:#117a45;--goodbg:#e9f8ef;--bad:#b3261e;--badbg:#fdecea;--warn:#8a5600;--shadow:0 10px 30px rgba(31,50,88,.09)}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:18px;line-height:1.5}
header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.header-inner{max-width:1120px;margin:auto;padding:14px 22px;display:flex;align-items:center;gap:18px;justify-content:space-between}.title{font-weight:800;font-size:20px}.progress-wrap{flex:1;max-width:440px}.progress-label{font-size:13px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:5px}.bar{height:8px;background:#e7ecf4;border-radius:99px;overflow:hidden}.bar>div{height:100%;background:var(--brand);width:0;transition:.25s}
main{max-width:1120px;margin:28px auto;padding:0 22px 60px}.intro,.results,.question-card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.intro{padding:25px;margin-bottom:20px}.intro h1{margin:0 0 8px;font-size:30px}.intro p{margin:0;color:var(--muted)}
.page-grid{display:grid;gap:20px}.question-card{padding:25px}.q-label{display:inline-flex;align-items:center;background:#eef2ff;color:var(--brand2);font-weight:800;border-radius:999px;padding:5px 11px;font-size:14px;margin-bottom:14px}.stem{font-weight:650;white-space:pre-line;margin-bottom:18px}.options{display:grid;gap:11px}.option{width:100%;text-align:left;border:2px solid var(--line);background:#fff;border-radius:13px;padding:14px 15px;font:inherit;color:inherit;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:.15s}.option:hover:not(:disabled){border-color:#9aace9;background:#f8f9ff}.option:disabled{cursor:default}.letter{flex:0 0 30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#edf1f7;font-weight:800;font-size:15px}.option.correct{border-color:var(--good);background:var(--goodbg)}.option.incorrect{border-color:var(--bad);background:var(--badbg)}.option.correct .letter{background:var(--good);color:#fff}.option.incorrect .letter{background:var(--bad);color:#fff}
.feedback{display:none;margin-top:16px;border-radius:12px;padding:15px 17px;border-left:5px solid}.feedback.show{display:block}.feedback.good{background:var(--goodbg);border-color:var(--good)}.feedback.bad{background:var(--badbg);border-color:var(--bad)}.feedback-title{font-weight:850;margin-bottom:5px}.meta{font-size:15px;color:#46546a;margin-top:8px}.meta strong{color:var(--ink)}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:24px}.btn{border:0;border-radius:12px;padding:13px 20px;font:inherit;font-weight:800;cursor:pointer}.btn-primary{background:var(--brand);color:#fff}.btn-primary:hover{background:var(--brand2)}.btn-secondary{background:#e7ecf4;color:var(--ink)}.btn:disabled{opacity:.45;cursor:not-allowed}.results{padding:28px;display:none}.results.show{display:block}.score-big{font-size:46px;font-weight:900;margin:4px 0}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:13px;margin:20px 0}.metric{padding:16px;border:1px solid var(--line);border-radius:13px}.metric b{font-size:25px;display:block}.topic-table{width:100%;border-collapse:collapse;margin-top:12px}.topic-table th,.topic-table td{text-align:left;padding:11px;border-bottom:1px solid var(--line)}.topic-table th{font-size:14px;color:var(--muted)}.review-note{color:var(--muted);font-size:15px}.hidden{display:none!important}
@media(max-width:700px){body{font-size:17px}.header-inner{padding:12px 15px}.title{font-size:16px}.progress-wrap{max-width:180px}main{padding:0 12px 40px;margin-top:15px}.intro,.question-card,.results{border-radius:14px;padding:18px}.intro h1{font-size:24px}.nav{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 25%);padding-top:25px}.btn{padding:12px 15px}.score-big{font-size:38px}}
@media print{header,.nav,.intro{display:none!important}body{background:#fff}.question-card,.results{box-shadow:none;break-inside:avoid}.page-grid{display:block}.question-card{margin-bottom:16px}}
</style></head>
<body><header><div class="header-inner"><div class="title">HEENT Practice Exam</div><div class="progress-wrap"><div class="progress-label"><span id="pageLabel">Set 1 of 75</span><span id="answeredLabel">0 / 225 answered</span></div><div class="bar"><div id="progressBar"></div></div></div></div></header>
<main><section class="intro" id="intro"><h1>HEENT High-Yield Practice Exam</h1><p>75 linked clinical cases • 225 total questions • Three questions per set</p></section><section id="exam"><div class="page-grid" id="pageGrid"></div><div class="nav"><button class="btn btn-secondary" id="prevBtn">Previous</button><button class="btn btn-primary" id="nextBtn">Next</button></div></section><section class="results" id="results"></section></main>
<script>
const questions=[{"id": "1", "number": 1, "suffix": "", "stem": "A 7-year-old boy presents with fever, a red swollen right eyelid, and eye pain. He had a cold last week. On exam he has proptosis, and eye movements are painful and restricted, with double vision on lateral gaze. Visual acuity is mildly decreased. There is significant periorbital erythema and edema.\nWhat is the most appropriate next step in management?", "options": [{"letter": "A", "text": "Warm compresses and reassurance"}, {"letter": "B", "text": "Oral antihistamines"}, {"letter": "C", "text": "Topical antibiotic drops"}, {"letter": "D", "text": "Discharge home on oral amoxicillin-clavulanate"}, {"letter": "E", "text": "Admission for IV antibiotics and orbital CT imaging"}], "correct": "E", "rationale": "Proptosis, painful/restricted extraocular movements, and diplopia indicate orbital (postseptal) cellulitis, most often from ethmoid sinusitis. This requires admission, IV antibiotics, and CT imaging. Preseptal cellulitis, by contrast, has no proptosis or EOM involvement.", "objective": "Eye Obj 8 (Infectious Orbit Disorders)", "topic": "Eye"}, {"id": "1a", "number": 1, "suffix": "a", "stem": "This management is for which diagnosis?", "options": [{"letter": "A", "text": "Dacryocystitis"}, {"letter": "B", "text": "Preseptal cellulitis"}, {"letter": "C", "text": "Cavernous sinus thrombosis"}, {"letter": "D", "text": "Orbital (postseptal) cellulitis"}], "correct": "D", "rationale": "Orbital (postseptal) cellulitis", "objective": "Eye Obj 8 (Infectious Orbit Disorders)", "topic": "Eye"}, {"id": "1b", "number": 1, "suffix": "b", "stem": "What is the most common underlying source of this infection?", "options": [{"letter": "A", "text": "A dental abscess"}, {"letter": "B", "text": "A conjunctival infection"}, {"letter": "C", "text": "Ethmoid sinusitis"}, {"letter": "D", "text": "Dacryoadenitis"}], "correct": "C", "rationale": "Ethmoid sinusitis", "objective": "Eye Obj 8 (Infectious Orbit Disorders)", "topic": "Eye"}, {"id": "2", "number": 2, "suffix": "", "stem": "A 22-year-old man presents on day 3 of a cold with nasal congestion, sore throat, and cough. He is alarmed because his nasal discharge, initially clear, has turned thick and yellow-green. He is afebrile and otherwise well. He asks for an antibiotic.\nWhat is the most appropriate response?", "options": [{"letter": "A", "text": "Order a sinus CT"}, {"letter": "B", "text": "Prescribe amoxicillin-clavulanate"}, {"letter": "C", "text": "Prescribe a respiratory fluoroquinolone"}, {"letter": "D", "text": "Start intranasal corticosteroids and doxycycline"}, {"letter": "E", "text": "Explain that yellow-green discharge at this stage is normal and treat supportively; no antibiotics"}], "correct": "E", "rationale": "In a viral upper respiratory infection, discharge normally turns thick and yellow-green by day 2-3 from leukocyte recruitment; this does NOT indicate bacterial infection. Management is supportive without antibiotics.", "objective": "Nose Obj 1a (Viral Rhinitis)", "topic": "Nose & Sinus"}, {"id": "2a", "number": 2, "suffix": "a", "stem": "What is the diagnosis and most common organism?", "options": [{"letter": "A", "text": "Allergic rhinitis — IgE/pollen"}, {"letter": "B", "text": "Influenza — influenza virus"}, {"letter": "C", "text": "Bacterial rhinosinusitis — S. pneumoniae"}, {"letter": "D", "text": "Viral rhinitis — rhinovirus"}], "correct": "D", "rationale": "Viral rhinitis — rhinovirus", "objective": "Nose Obj 1a (Viral Rhinitis)", "topic": "Nose & Sinus"}, {"id": "2b", "number": 2, "suffix": "b", "stem": "When should you suspect a secondary bacterial infection?", "options": [{"letter": "A", "text": "When discharge turns yellow-green"}, {"letter": "B", "text": "Fever on day 1"}, {"letter": "C", "text": "Symptoms lasting >10 days or worsening"}, {"letter": "D", "text": "When a cough develops"}], "correct": "C", "rationale": "Symptoms lasting >10 days or worsening", "objective": "Nose Obj 1a (Viral Rhinitis)", "topic": "Nose & Sinus"}, {"id": "3", "number": 3, "suffix": "", "stem": "A 2-year-old presents in the fall with a barking, seal-like cough, hoarseness, and inspiratory stridor that is worse at night. He had a runny nose and low-grade fever for 2 days beforehand. He is not drooling and does not appear toxic. An AP neck film shows subglottic narrowing.\nWhat is the most appropriate treatment?", "options": [{"letter": "A", "text": "Reassurance with no treatment"}, {"letter": "B", "text": "Oral amoxicillin"}, {"letter": "C", "text": "Emergent intubation"}, {"letter": "D", "text": "Corticosteroids and, if moderate-severe, nebulized epinephrine"}, {"letter": "E", "text": "IV ceftriaxone and ICU admission"}], "correct": "D", "rationale": "A barking cough, stridor, and the 'steeple sign' (subglottic narrowing) indicate croup (parainfluenza). Treatment is corticosteroids, with nebulized epinephrine for moderate-to-severe cases.", "objective": "Oro C (Epiglottitis vs Croup)", "topic": "Oropharynx"}, {"id": "3a", "number": 3, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Epiglottitis"}, {"letter": "B", "text": "Bacterial tracheitis"}, {"letter": "C", "text": "Bronchiolitis"}, {"letter": "D", "text": "Croup"}], "correct": "D", "rationale": "Croup", "objective": "Oro C (Epiglottitis vs Croup)", "topic": "Oropharynx"}, {"id": "3b", "number": 3, "suffix": "b", "stem": "What organism causes it?", "options": [{"letter": "A", "text": "H. influenzae type b"}, {"letter": "B", "text": "Strep pyogenes"}, {"letter": "C", "text": "Respiratory syncytial virus"}, {"letter": "D", "text": "Parainfluenza virus"}], "correct": "D", "rationale": "Parainfluenza virus", "objective": "Oro C (Epiglottitis vs Croup)", "topic": "Oropharynx"}, {"id": "4", "number": 4, "suffix": "", "stem": "A 45-year-old man presents with right-sided hearing loss. On the Weber test the tone lateralizes to the RIGHT (affected) ear. On the Rinne test on the right, bone conduction is greater than air conduction.\nThese findings are most consistent with which type of hearing loss?", "options": [{"letter": "A", "text": "Conductive hearing loss on the right"}, {"letter": "B", "text": "Sensorineural hearing loss on the right"}, {"letter": "C", "text": "Normal hearing"}, {"letter": "D", "text": "Sensorineural hearing loss on the left"}, {"letter": "E", "text": "Central auditory processing disorder"}], "correct": "A", "rationale": "In conductive hearing loss, Weber lateralizes TO the affected ear and Rinne shows bone > air conduction on that side. Sensorineural loss instead lateralizes to the good ear with air > bone conduction.", "objective": "Cochleovestibular Obj 4 (Weber/Rinne)", "topic": "Cochleovestibular"}, {"id": "4a", "number": 4, "suffix": "a", "stem": "Which are common causes of this (conductive) type of loss?", "options": [{"letter": "A", "text": "Acoustic neuroma"}, {"letter": "B", "text": "Presbycusis and noise exposure"}, {"letter": "C", "text": "Cerumen, otosclerosis, TM perforation"}, {"letter": "D", "text": "Ototoxic drugs"}], "correct": "C", "rationale": "Cerumen, otosclerosis, TM perforation", "objective": "Cochleovestibular Obj 4 (Weber/Rinne)", "topic": "Cochleovestibular"}, {"id": "4b", "number": 4, "suffix": "b", "stem": "In sensorineural loss, which way does Weber lateralize?", "options": [{"letter": "A", "text": "To the affected ear"}, {"letter": "B", "text": "It cannot be tested"}, {"letter": "C", "text": "To the good (unaffected) ear"}, {"letter": "D", "text": "Midline in all cases"}], "correct": "C", "rationale": "To the good (unaffected) ear", "objective": "Cochleovestibular Obj 4 (Weber/Rinne)", "topic": "Cochleovestibular"}, {"id": "5", "number": 5, "suffix": "", "stem": "A 62-year-old woodworker with a long smoking history presents with several months of persistent UNILATERAL nasal obstruction and intermittent bloody nasal discharge. Recently he has noticed facial swelling and that his dentures no longer fit well. On exam there is a friable mass in the left nasal cavity.\nWhat is the most appropriate next step?", "options": [{"letter": "A", "text": "Order allergy testing"}, {"letter": "B", "text": "Prescribe intranasal steroids and reassess in 3 months"}, {"letter": "C", "text": "Treat empirically for chronic sinusitis with antibiotics"}, {"letter": "D", "text": "Nasal endoscopy with biopsy and imaging"}, {"letter": "E", "text": "Cauterize the mass in clinic"}], "correct": "D", "rationale": "Persistent UNILATERAL obstruction/epistaxis with facial swelling and ill-fitting dentures in a patient with occupational (wood dust) and smoking risk factors is concerning for sinonasal malignancy (most commonly SCC). Endoscopy with biopsy and imaging is needed.", "objective": "Nose Obj 1h (Malignant Nasal/Sinus Tumors) / Red Flags", "topic": "Nose & Sinus"}, {"id": "5a", "number": 5, "suffix": "a", "stem": "What is the most likely diagnosis and histology?", "options": [{"letter": "A", "text": "Sinonasal squamous cell carcinoma"}, {"letter": "B", "text": "Inverted papilloma"}, {"letter": "C", "text": "Nasal polyps"}, {"letter": "D", "text": "Juvenile angiofibroma"}], "correct": "A", "rationale": "Sinonasal squamous cell carcinoma", "objective": "Nose Obj 1h (Malignant Nasal/Sinus Tumors) / Red Flags", "topic": "Nose & Sinus"}, {"id": "5b", "number": 5, "suffix": "b", "stem": "What are the key risk factors?", "options": [{"letter": "A", "text": "Contact-lens use"}, {"letter": "B", "text": "A recent viral URI"}, {"letter": "C", "text": "Wood dust/nickel exposure and smoking"}, {"letter": "D", "text": "Cold-water exposure"}], "correct": "C", "rationale": "Wood dust/nickel exposure and smoking", "objective": "Nose Obj 1h (Malignant Nasal/Sinus Tumors) / Red Flags", "topic": "Nose & Sinus"}, {"id": "6", "number": 6, "suffix": "", "stem": "A 22-year-old woman who sleeps in her soft contact lenses presents with 1 day of severe pain, redness, and photophobia in her left eye. On slit-lamp exam there is a round white corneal infiltrate with an overlying epithelial defect that stains with fluorescein, plus a small layering of white cells in the anterior chamber.\nWhich organism must empiric therapy specifically cover, and what is\nthe appropriate agent?", "options": [{"letter": "A", "text": "Fusarium species; topical natamycin"}, {"letter": "B", "text": "Pseudomonas aeruginosa; topical fluoroquinolone (e.g., moxifloxacin)"}, {"letter": "C", "text": "Staphylococcus aureus; oral doxycycline"}, {"letter": "D", "text": "Acanthamoeba; topical chlorhexidine"}, {"letter": "E", "text": "Herpes simplex virus; oral acyclovir"}], "correct": "B", "rationale": "A contact-lens wearer with a painful corneal ulcer and hypopyon has bacterial keratitis until proven otherwise; Pseudomonas must be covered with a topical fluoroquinolone. Contact-lens use is the key risk factor for Pseudomonas.", "objective": "Eye Obj 7 (Anterior Eye Disorders)", "topic": "Eye"}, {"id": "6a", "number": 6, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Episcleritis"}, {"letter": "B", "text": "Viral conjunctivitis"}, {"letter": "C", "text": "Pterygium"}, {"letter": "D", "text": "Bacterial keratitis / corneal ulcer"}], "correct": "D", "rationale": "Bacterial keratitis / corneal ulcer", "objective": "Eye Obj 7 (Anterior Eye Disorders)", "topic": "Eye"}, {"id": "6b", "number": 6, "suffix": "b", "stem": "What is the layer of white cells in the anterior chamber called?", "options": [{"letter": "A", "text": "Dendrite"}, {"letter": "B", "text": "Ciliary flush"}, {"letter": "C", "text": "Hyphema"}, {"letter": "D", "text": "Hypopyon"}], "correct": "D", "rationale": "Hypopyon", "objective": "Eye Obj 7 (Anterior Eye Disorders)", "topic": "Eye"}, {"id": "7", "number": 7, "suffix": "", "stem": "A 45-year-old man is diagnosed with acute bacterial rhinosinusitis based on 11 days of purulent discharge, unilateral facial pain, and fever. He has no drug allergies and no recent antibiotic use.\nWhat is the most appropriate first-line antibiotic?", "options": [{"letter": "A", "text": "Amoxicillin-clavulanate"}, {"letter": "B", "text": "Cephalexin"}, {"letter": "C", "text": "Ciprofloxacin"}, {"letter": "D", "text": "Trimethoprim-sulfamethoxazole"}, {"letter": "E", "text": "Azithromycin"}], "correct": "A", "rationale": "First-line therapy for acute bacterial rhinosinusitis is amoxicillin or amoxicillin-clavulanate. Doxycycline or a respiratory fluoroquinolone is reserved for penicillin-allergic patients.", "objective": "Nose Obj 1b/1c/3 (Rhinosinusitis)", "topic": "Nose & Sinus"}, {"id": "7a", "number": 7, "suffix": "a", "stem": "Which three organisms most commonly cause community ABRS?", "options": [{"letter": "A", "text": "Rhinovirus, adenovirus, RSV"}, {"letter": "B", "text": "Pseudomonas, E. coli, Klebsiella"}, {"letter": "C", "text": "S. pneumoniae, H. influenzae, M. catarrhalis"}, {"letter": "D", "text": "S. aureus and S. epidermidis"}], "correct": "C", "rationale": "S. pneumoniae, H. influenzae, M. catarrhalis", "objective": "Nose Obj 1b/1c/3 (Rhinosinusitis)", "topic": "Nose & Sinus"}, {"id": "7b", "number": 7, "suffix": "b", "stem": "What is the alternative if the patient is penicillin-allergic?", "options": [{"letter": "A", "text": "Cephalexin"}, {"letter": "B", "text": "Azithromycin as first choice"}, {"letter": "C", "text": "Amoxicillin-clavulanate"}, {"letter": "D", "text": "Doxycycline or a respiratory fluoroquinolone"}], "correct": "D", "rationale": "Doxycycline or a respiratory fluoroquinolone", "objective": "Nose Obj 1b/1c/3 (Rhinosinusitis)", "topic": "Nose & Sinus"}, {"id": "8", "number": 8, "suffix": "", "stem": "A 41-year-old man reports a firm lump on his upper eyelid that has been slowly enlarging over the past 6 weeks. He denies pain, discharge, or vision change but notes a sensation of heaviness in the lid. He has a history of rosacea. On exam there is a discrete, nontender, rubbery nodule in the mid-portion of the tarsal plate, away from the lid margin. The overlying skin is normal.\nWhich feature best distinguishes this diagnosis from a hordeolum?", "options": [{"letter": "A", "text": "Presence of purulent discharge from the lid margin"}, {"letter": "B", "text": "Chronic, nontender, rubbery character from granulomatous meibomian inflammation"}, {"letter": "C", "text": "Acute onset over 24-48 hours"}, {"letter": "D", "text": "Association with Staphylococcus aureus infection"}, {"letter": "E", "text": "Localization to an eyelash follicle"}], "correct": "B", "rationale": "A chalazion is a chronic granulomatous inflammation of a meibomian gland producing a nontender, rubbery, slow-growing nodule, in contrast to the acute, tender, infectious hordeolum.", "objective": "Eye Obj 4 (Eyelid Disorders)", "topic": "Eye"}, {"id": "8a", "number": 8, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Chalazion"}, {"letter": "B", "text": "Hordeolum"}, {"letter": "C", "text": "Basal cell carcinoma"}, {"letter": "D", "text": "Blepharitis"}], "correct": "A", "rationale": "Chalazion", "objective": "Eye Obj 4 (Eyelid Disorders)", "topic": "Eye"}, {"id": "8b", "number": 8, "suffix": "b", "stem": "What is the first-line treatment?", "options": [{"letter": "A", "text": "Intralesional steroid as first step"}, {"letter": "B", "text": "Warm compresses / lid hygiene"}, {"letter": "C", "text": "Oral antibiotics"}, {"letter": "D", "text": "Immediate surgical excision"}], "correct": "B", "rationale": "Warm compresses / lid hygiene", "objective": "Eye Obj 4 (Eyelid Disorders)", "topic": "Eye"}, {"id": "9", "number": 9, "suffix": "", "stem": "A 15-month-old boy is brought in after his parents noticed that in flash photographs one of his pupils appears white rather than red. On exam there is leukocoria with an absent red reflex in the affected eye, and mild strabismus. There is a family history of a similar childhood eye tumor.\nWhat is the most likely diagnosis?", "options": [{"letter": "A", "text": "Retinoblastoma"}, {"letter": "B", "text": "Coats disease"}, {"letter": "C", "text": "Persistent fetal vasculature"}, {"letter": "D", "text": "Retinal detachment"}, {"letter": "E", "text": "Congenital cataract"}], "correct": "A", "rationale": "Leukocoria (white pupil / absent red reflex) in early childhood, especially with a family history, is retinoblastoma (chromosome 13q14) until proven otherwise. Early detection is critical (95-98% cure); priority is preserving life, then vision.", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "9a", "number": 9, "suffix": "a", "stem": "What is the genetic association?", "options": [{"letter": "A", "text": "Chromosome 5 (APC)"}, {"letter": "B", "text": "Chromosome 22 (NF-2)"}, {"letter": "C", "text": "Chromosome 17 (NF-1)"}, {"letter": "D", "text": "Chromosome 13 (13q14)"}], "correct": "D", "rationale": "Chromosome 13 (13q14)", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "9b", "number": 9, "suffix": "b", "stem": "What is the first diagnostic step?", "options": [{"letter": "A", "text": "Excisional biopsy of the tumor"}, {"letter": "B", "text": "Lumbar puncture"}, {"letter": "C", "text": "Ocular ultrasound, then MRI"}, {"letter": "D", "text": "Fluorescein angiography"}], "correct": "C", "rationale": "Ocular ultrasound, then MRI", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "10", "number": 10, "suffix": "", "stem": "A 15-month-old girl presents with abrupt onset of fever, irritability, and ear-tugging that began within the last day. On pneumatic otoscopy the right tympanic membrane is bulging and erythematous with an absent light reflex and markedly reduced mobility.\nWhat is the most appropriate first-line antibiotic?", "options": [{"letter": "A", "text": "Ceftriaxone IM as first-line"}, {"letter": "B", "text": "Azithromycin"}, {"letter": "C", "text": "High-dose amoxicillin"}, {"letter": "D", "text": "Ciprofloxacin otic drops"}, {"letter": "E", "text": "Trimethoprim-sulfamethoxazole"}], "correct": "C", "rationale": "Acute otitis media requires abrupt onset, a middle-ear effusion, and middle-ear inflammation (a bulging TM). In children <2 years, antibiotics are indicated; first-line is high-dose amoxicillin (amoxicillin-clavulanate if recent amoxicillin, treatment failure, or in adults).", "objective": "Ear Obj 4 (Middle Ear / AOM)", "topic": "Ear Disorders"}, {"id": "10a", "number": 10, "suffix": "a", "stem": "Which three criteria are required to diagnose AOM?", "options": [{"letter": "A", "text": "Effusion with a normal TM"}, {"letter": "B", "text": "Fever plus otalgia only"}, {"letter": "C", "text": "A red TM alone"}, {"letter": "D", "text": "Acute onset, middle-ear effusion, middle-ear inflammation"}], "correct": "D", "rationale": "Acute onset, middle-ear effusion, middle-ear inflammation", "objective": "Ear Obj 4 (Middle Ear / AOM)", "topic": "Ear Disorders"}, {"id": "10b", "number": 10, "suffix": "b", "stem": "What organisms most commonly cause it?", "options": [{"letter": "A", "text": "S. pneumoniae, H. influenzae, M. catarrhalis"}, {"letter": "B", "text": "Pseudomonas and S. aureus"}, {"letter": "C", "text": "Parainfluenza only"}, {"letter": "D", "text": "Candida"}], "correct": "A", "rationale": "S. pneumoniae, H. influenzae, M. catarrhalis", "objective": "Ear Obj 4 (Middle Ear / AOM)", "topic": "Ear Disorders"}, {"id": "11", "number": 11, "suffix": "", "stem": "A 68-year-old man reports several months of persistent clear rhinorrhea and nasal congestion that worsen with cold air, strong odors, and eating. He denies itching, sneezing, or ocular symptoms, and has no fever. Allergy skin testing is negative, and there is no infectious prodrome. The nasal mucosa appears essentially normal.\nWhat is the most likely diagnosis?", "options": [{"letter": "A", "text": "Vasomotor (nonallergic) rhinitis"}, {"letter": "B", "text": "Chronic rhinosinusitis with polyps"}, {"letter": "C", "text": "Viral rhinitis"}, {"letter": "D", "text": "Allergic rhinitis"}, {"letter": "E", "text": "Acute bacterial rhinosinusitis"}], "correct": "A", "rationale": "Chronic clear rhinorrhea/congestion triggered by cold air, odors, and food, WITHOUT itching or sneezing and with negative allergy testing, is vasomotor rhinitis, a diagnosis of exclusion. Absence of itching/sneezing distinguishes it from allergic rhinitis.", "objective": "Nose Obj 1a/2 (Rhinitis)", "topic": "Nose & Sinus"}, {"id": "11a", "number": 11, "suffix": "a", "stem": "What single feature distinguishes this from allergic rhinitis?", "options": [{"letter": "A", "text": "Absence of itching and sneezing"}, {"letter": "B", "text": "Nasal congestion"}, {"letter": "C", "text": "Response to antihistamines"}, {"letter": "D", "text": "Presence of clear rhinorrhea"}], "correct": "A", "rationale": "Absence of itching and sneezing", "objective": "Nose Obj 1a/2 (Rhinitis)", "topic": "Nose & Sinus"}, {"id": "11b", "number": 11, "suffix": "b", "stem": "What is the first-line treatment?", "options": [{"letter": "A", "text": "Trigger avoidance + intranasal antihistamine or steroid"}, {"letter": "B", "text": "Systemic steroids"}, {"letter": "C", "text": "Immunotherapy first"}, {"letter": "D", "text": "Oral antibiotics"}], "correct": "A", "rationale": "Trigger avoidance + intranasal antihistamine or steroid", "objective": "Nose Obj 1a/2 (Rhinitis)", "topic": "Nose & Sinus"}, {"id": "12", "number": 12, "suffix": "", "stem": "A 78-year-old Caucasian woman with a smoking history reports gradually worsening central vision over the past year, with straight lines appearing wavy when she reads. Peripheral vision is preserved. On fundoscopy there are yellowish deposits (drusen) in the macula bilaterally without hemorrhage. She notices distortion on an Amsler grid.\nWhat is the most likely diagnosis?", "options": [{"letter": "A", "text": "Retinal detachment"}, {"letter": "B", "text": "Dry (nonexudative) age-related macular degeneration"}, {"letter": "C", "text": "Central retinal vein occlusion"}, {"letter": "D", "text": "Open-angle glaucoma"}, {"letter": "E", "text": "Diabetic retinopathy"}], "correct": "B", "rationale": "Gradual central vision loss with drusen and Amsler-grid distortion, preserved peripheral vision, in an older Caucasian smoker, is dry age-related macular degeneration. Wet AMD instead causes sudden loss from neovascularization.", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "12a", "number": 12, "suffix": "a", "stem": "How does WET AMD differ in presentation?", "options": [{"letter": "A", "text": "Gradual peripheral loss"}, {"letter": "B", "text": "Transient vision loss"}, {"letter": "C", "text": "A painful red eye"}, {"letter": "D", "text": "Sudden central loss from neovascularization"}], "correct": "D", "rationale": "Sudden central loss from neovascularization", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "12b", "number": 12, "suffix": "b", "stem": "What is the management?", "options": [{"letter": "A", "text": "Systemic steroids"}, {"letter": "B", "text": "Antibiotic drops"}, {"letter": "C", "text": "Anti-VEGF, AREDS vitamins, smoking cessation"}, {"letter": "D", "text": "Laser iridotomy"}], "correct": "C", "rationale": "Anti-VEGF, AREDS vitamins, smoking cessation", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "13", "number": 13, "suffix": "", "stem": "A 17-year-old competitive swimmer presents with 3 days of right ear pain, itching, and scant discharge. He notes the pain worsens when he chews or when the ear is touched. On exam, pulling on the tragus and pinna elicits significant pain, and the ear canal is erythematous and edematous with debris; the tympanic membrane is difficult to visualize.\nWhat is the most appropriate treatment?", "options": [{"letter": "A", "text": "Oral antifungal"}, {"letter": "B", "text": "Topical antibiotic (with steroid) drops covering Pseudomonas and S. aureus, after aural toilet"}, {"letter": "C", "text": "Cerumenolytic drops only"}, {"letter": "D", "text": "Systemic fluoroquinolone"}, {"letter": "E", "text": "Oral amoxicillin"}], "correct": "B", "rationale": "Acute otitis externa ('swimmer's ear') with a positive tragal tug is treated with aural toilet and topical antimicrobial +/- steroid drops (e.g., ciprofloxacin-dexamethasone) covering Pseudomonas and S. aureus; a wick is placed if the canal is very swollen.", "objective": "Ear Obj 2 (External Auditory Canal)", "topic": "Ear Disorders"}, {"id": "13a", "number": 13, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Malignant otitis externa"}, {"letter": "B", "text": "Acute otitis externa"}, {"letter": "C", "text": "Acute otitis media"}, {"letter": "D", "text": "Cerumen impaction"}], "correct": "B", "rationale": "Acute otitis externa", "objective": "Ear Obj 2 (External Auditory Canal)", "topic": "Ear Disorders"}, {"id": "13b", "number": 13, "suffix": "b", "stem": "Which two organisms are most common?", "options": [{"letter": "A", "text": "S. pneumoniae and H. influenzae"}, {"letter": "B", "text": "Strep pyogenes and anaerobes"}, {"letter": "C", "text": "Pseudomonas aeruginosa and S. aureus"}, {"letter": "D", "text": "Candida and Aspergillus"}], "correct": "C", "rationale": "Pseudomonas aeruginosa and S. aureus", "objective": "Ear Obj 2 (External Auditory Canal)", "topic": "Ear Disorders"}, {"id": "14", "number": 14, "suffix": "", "stem": "A 72-year-old man with a long smoking history reports gradually worsening, painless blurring of vision over 2 years, along with glare and halos around headlights that make night driving difficult. On exam the red reflex is diminished and there is a cloudy opacity of the lens. The eye is white and quiet with normal intraocular pressure.\nWhat is the definitive treatment?", "options": [{"letter": "A", "text": "Laser iridotomy"}, {"letter": "B", "text": "Oral corticosteroids"}, {"letter": "C", "text": "Topical prostaglandin drops"}, {"letter": "D", "text": "Surgical lens extraction with intraocular lens implantation"}, {"letter": "E", "text": "Intravitreal anti-VEGF injections"}], "correct": "D", "rationale": "Gradual painless vision loss with glare/halos and a diminished red reflex indicates cataract. Definitive treatment is surgical fragmentation/removal of the lens with intraocular lens (IOL) implantation.", "objective": "Eye Obj 12 (Lens Disorders / Cataracts)", "topic": "Eye"}, {"id": "14a", "number": 14, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Corneal ulcer"}, {"letter": "B", "text": "Macular degeneration"}, {"letter": "C", "text": "Open-angle glaucoma"}, {"letter": "D", "text": "Cataract"}], "correct": "D", "rationale": "Cataract", "objective": "Eye Obj 12 (Lens Disorders / Cataracts)", "topic": "Eye"}, {"id": "14b", "number": 14, "suffix": "b", "stem": "What are the key risk factors?", "options": [{"letter": "A", "text": "Contact-lens use"}, {"letter": "B", "text": "HLA-B27"}, {"letter": "C", "text": "Age, smoking, corticosteroids, diabetes"}, {"letter": "D", "text": "Cold-water exposure"}], "correct": "C", "rationale": "Age, smoking, corticosteroids, diabetes", "objective": "Eye Obj 12 (Lens Disorders / Cataracts)", "topic": "Eye"}, {"id": "15", "number": 15, "suffix": "", "stem": "A 54-year-old man with a 12-year history of type 2 diabetes presents for a routine eye screening. He is asymptomatic. On dilated fundoscopy you note dilated retinal veins, scattered microaneurysms, dot-and-blot hemorrhages, and hard exudates, but no new abnormal vessels.\nWhich finding, if it developed, would define progression to the\nproliferative stage?", "options": [{"letter": "A", "text": "Increased number of microaneurysms"}, {"letter": "B", "text": "Venous dilation"}, {"letter": "C", "text": "Cotton-wool spots"}, {"letter": "D", "text": "Neovascularization"}, {"letter": "E", "text": "More hard exudates"}], "correct": "D", "rationale": "This is non-proliferative diabetic retinopathy. Neovascularization is the hallmark that defines proliferative diabetic retinopathy, treated with panretinal photocoagulation and/or anti-VEGF along with glycemic control.", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "15a", "number": 15, "suffix": "a", "stem": "What stage is currently described?", "options": [{"letter": "A", "text": "Central retinal vein occlusion"}, {"letter": "B", "text": "Proliferative diabetic retinopathy"}, {"letter": "C", "text": "Non-proliferative diabetic retinopathy"}, {"letter": "D", "text": "Hypertensive retinopathy"}], "correct": "C", "rationale": "Non-proliferative diabetic retinopathy", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "15b", "number": 15, "suffix": "b", "stem": "What is the treatment for the proliferative stage?", "options": [{"letter": "A", "text": "Panretinal photocoagulation and/or anti-VEGF"}, {"letter": "B", "text": "Observation only"}, {"letter": "C", "text": "Topical timolol"}, {"letter": "D", "text": "Systemic steroids"}], "correct": "A", "rationale": "Panretinal photocoagulation and/or anti-VEGF", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "16", "number": 16, "suffix": "", "stem": "A 14-year-old boy is hit in the nose during a soccer game. He now has nasal congestion and pain. On intranasal exam you note a bluish, fluctuant, non-compressible swelling of the nasal septum bilaterally. There is minimal external deformity.\nWhat is the most appropriate management, and why is it urgent?", "options": [{"letter": "A", "text": "Oral antibiotics alone with next-week follow-up"}, {"letter": "B", "text": "Observation and ice; it will resolve spontaneously"}, {"letter": "C", "text": "Prompt incision and drainage to prevent cartilage necrosis and saddle-nose deformity"}, {"letter": "D", "text": "Immediate closed reduction of a nasal fracture"}, {"letter": "E", "text": "Anterior nasal packing alone"}], "correct": "C", "rationale": "A septal hematoma requires prompt incision and drainage because untreated blood between cartilage and perichondrium causes avascular necrosis of the cartilage and a saddle-nose deformity. Packing and antibiotics follow drainage.", "objective": "Nose Obj 1e/1f (Nasal Trauma & Septal Hematoma)", "topic": "Nose & Sinus"}, {"id": "16a", "number": 16, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Anterior epistaxis"}, {"letter": "B", "text": "Septal hematoma"}, {"letter": "C", "text": "Nasal polyp"}, {"letter": "D", "text": "Nasal bone fracture"}], "correct": "B", "rationale": "Septal hematoma", "objective": "Nose Obj 1e/1f (Nasal Trauma & Septal Hematoma)", "topic": "Nose & Sinus"}, {"id": "16b", "number": 16, "suffix": "b", "stem": "What complication results if it is left untreated?", "options": [{"letter": "A", "text": "Cartilage necrosis → saddle-nose deformity"}, {"letter": "B", "text": "CSF rhinorrhea"}, {"letter": "C", "text": "Orbital cellulitis"}, {"letter": "D", "text": "Permanent anosmia"}], "correct": "A", "rationale": "Cartilage necrosis → saddle-nose deformity", "objective": "Nose Obj 1e/1f (Nasal Trauma & Septal Hematoma)", "topic": "Nose & Sinus"}, {"id": "17", "number": 17, "suffix": "", "stem": "A 27-year-old woman with a history of seasonal allergies presents with several weeks of bilateral itchy, red eyes with stringy, ropey white discharge. She reports significant tearing and rubbing. On exam there is bilateral conjunctival injection with chemosis, and eversion of the upper lids reveals large 'cobblestone' papillae. The cornea is clear.\nWhich treatment is most appropriate first-line?", "options": [{"letter": "A", "text": "Topical moxifloxacin"}, {"letter": "B", "text": "Topical antihistamine/mast-cell-stabilizer drops"}, {"letter": "C", "text": "Topical natamycin"}, {"letter": "D", "text": "Intramuscular ceftriaxone"}, {"letter": "E", "text": "Oral valacyclovir"}], "correct": "B", "rationale": "Bilateral itching with stringy discharge and cobblestone papillae in an atopic patient indicates allergic conjunctivitis. First-line therapy is antihistamine/mast-cell-stabilizer drops (with oral antihistamines as adjunct).", "objective": "Eye Obj 6 (Conjunctival Disorders)", "topic": "Eye"}, {"id": "17a", "number": 17, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Allergic conjunctivitis"}, {"letter": "B", "text": "Bacterial conjunctivitis"}, {"letter": "C", "text": "Viral conjunctivitis"}, {"letter": "D", "text": "Anterior uveitis"}], "correct": "A", "rationale": "Allergic conjunctivitis", "objective": "Eye Obj 6 (Conjunctival Disorders)", "topic": "Eye"}, {"id": "17b", "number": 17, "suffix": "b", "stem": "What is the underlying mechanism?", "options": [{"letter": "A", "text": "Bacterial infection"}, {"letter": "B", "text": "Viral infection"}, {"letter": "C", "text": "IgE-mediated hypersensitivity"}, {"letter": "D", "text": "Autoimmune (HLA-B27)"}], "correct": "C", "rationale": "IgE-mediated hypersensitivity", "objective": "Eye Obj 6 (Conjunctival Disorders)", "topic": "Eye"}, {"id": "18", "number": 18, "suffix": "", "stem": "A 22-year-old man presents with several days of worsening unilateral sore throat, fever, and a muffled 'hot potato' voice. He is drooling and can barely open his mouth (trismus). On exam the right tonsil is displaced medially, and the uvula is deviated to the left, away from a bulging, fluctuant peritonsillar mass.\nWhat is the most appropriate management?", "options": [{"letter": "A", "text": "Needle aspiration or incision and drainage plus antibiotics"}, {"letter": "B", "text": "Reassurance and saltwater gargles"}, {"letter": "C", "text": "Oral penicillin and discharge"}, {"letter": "D", "text": "CT head without contrast and observation"}, {"letter": "E", "text": "Immediate tonsillectomy in clinic"}], "correct": "A", "rationale": "Unilateral sore throat, trismus, muffled voice, and uvular deviation away from a fluctuant mass indicate a peritonsillar abscess (quinsy). Management is drainage (needle aspiration or I&D) plus antibiotics (e.g., ampicillin-sulbactam/clindamycin) after airway assessment.", "objective": "Oro A (Deep Neck Abscess)", "topic": "Oropharynx"}, {"id": "18a", "number": 18, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Retropharyngeal abscess"}, {"letter": "B", "text": "Epiglottitis"}, {"letter": "C", "text": "Peritonsillar abscess"}, {"letter": "D", "text": "Mononucleosis"}], "correct": "C", "rationale": "Peritonsillar abscess", "objective": "Oro A (Deep Neck Abscess)", "topic": "Oropharynx"}, {"id": "18b", "number": 18, "suffix": "b", "stem": "What must be assessed first, and what organisms are typical?", "options": [{"letter": "A", "text": "Nothing urgent; GAS only"}, {"letter": "B", "text": "Airway; Pseudomonas only"}, {"letter": "C", "text": "Nothing; Candida"}, {"letter": "D", "text": "Airway first; polymicrobial (Strep, S. aureus, anaerobes)"}], "correct": "D", "rationale": "Airway first; polymicrobial (Strep, S. aureus, anaerobes)", "objective": "Oro A (Deep Neck Abscess)", "topic": "Oropharynx"}, {"id": "19", "number": 19, "suffix": "", "stem": "A 19-year-old man presents after a tree branch scratched his eye while hiking. He has a painful red right eye with tearing and photophobia. Instillation of a topical anesthetic dramatically relieves the pain. Fluorescein staining under cobalt-blue light reveals a linear area of uptake on the cornea, with no evidence of retained foreign body after lid eversion.\nWhich instruction is most important in the management plan?", "options": [{"letter": "A", "text": "Patch the eye tightly for 48 hours"}, {"letter": "B", "text": "Start oral acyclovir"}, {"letter": "C", "text": "Give a topical antibiotic and do not prescribe topical anesthetics for home use"}, {"letter": "D", "text": "Begin topical corticosteroid drops"}, {"letter": "E", "text": "Prescribe topical anesthetic drops for home use to control pain"}], "correct": "C", "rationale": "This is a corneal abrasion. Treat with a topical antibiotic; topical anesthetics must NOT be prescribed for home use because they are corneal-toxic and impair healing. Patching is generally avoided.", "objective": "Eye Obj 15 (Traumatic Eye Disorders)", "topic": "Eye"}, {"id": "19a", "number": 19, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Corneal ulcer"}, {"letter": "B", "text": "Corneal abrasion"}, {"letter": "C", "text": "HSV keratitis"}, {"letter": "D", "text": "Conjunctivitis"}], "correct": "B", "rationale": "Corneal abrasion", "objective": "Eye Obj 15 (Traumatic Eye Disorders)", "topic": "Eye"}, {"id": "19b", "number": 19, "suffix": "b", "stem": "What is the diagnostic test?", "options": [{"letter": "A", "text": "Fluorescein stain under cobalt-blue light"}, {"letter": "B", "text": "Tonometry"}, {"letter": "C", "text": "Schirmer's test"}, {"letter": "D", "text": "Gonioscopy"}], "correct": "A", "rationale": "Fluorescein stain under cobalt-blue light", "objective": "Eye Obj 15 (Traumatic Eye Disorders)", "topic": "Eye"}, {"id": "20", "number": 20, "suffix": "", "stem": "A 26-year-old man presents after being punched in the eye. He has eye pain, photophobia, and blurry vision. On slit-lamp exam there is a visible layer of blood in the inferior anterior chamber, along with ciliary flush. He has sickle cell trait.\nWhich factor in this patient most strongly indicates the need for\nadmission?", "options": [{"letter": "A", "text": "Ciliary flush"}, {"letter": "B", "text": "Sickle cell status"}, {"letter": "C", "text": "Mild eye pain"}, {"letter": "D", "text": "Presence of any blood in the anterior chamber"}, {"letter": "E", "text": "Photophobia"}], "correct": "B", "rationale": "This is a hyphema (blood in the anterior chamber). Admission criteria include elevated IOP, sickle cell disease/trait, hyphema >50%, and anticoagulation; sickle cell status raises the risk of complications (including glaucoma), warranting closer management.", "objective": "Eye Obj 15 (Traumatic Eye Disorders)", "topic": "Eye"}, {"id": "20a", "number": 20, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Hypopyon"}, {"letter": "B", "text": "Hyphema"}, {"letter": "C", "text": "Globe rupture"}, {"letter": "D", "text": "Subconjunctival hemorrhage"}], "correct": "B", "rationale": "Hyphema", "objective": "Eye Obj 15 (Traumatic Eye Disorders)", "topic": "Eye"}, {"id": "20b", "number": 20, "suffix": "b", "stem": "What is the feared complication?", "options": [{"letter": "A", "text": "Endophthalmitis"}, {"letter": "B", "text": "Cataract"}, {"letter": "C", "text": "Retinal detachment"}, {"letter": "D", "text": "Glaucoma (elevated IOP)"}], "correct": "D", "rationale": "Glaucoma (elevated IOP)", "objective": "Eye Obj 15 (Traumatic Eye Disorders)", "topic": "Eye"}, {"id": "21", "number": 21, "suffix": "", "stem": "A 66-year-old man with a heavy tobacco and alcohol history is found to have a velvety, well-demarcated red patch on the floor of his mouth on a routine dental exam. It is asymptomatic and cannot be wiped away. He has no other lesions.\nCompared with a white leukoplakic plaque, this red lesion is most\nnotable for which characteristic?", "options": [{"letter": "A", "text": "Association with Candida"}, {"letter": "B", "text": "Higher rate of severe dysplasia or invasive carcinoma"}, {"letter": "C", "text": "Lower malignant potential"}, {"letter": "D", "text": "Ability to be scraped off easily"}, {"letter": "E", "text": "Spontaneous resolution"}], "correct": "B", "rationale": "Erythroplakia (velvety red patch, often floor of mouth/ventral tongue) carries a HIGHER rate of severe dysplasia/invasive carcinoma than leukoplakia and warrants prompt biopsy.", "objective": "Oro A (Leukoplakia vs Erythroplakia)", "topic": "Oropharynx"}, {"id": "21a", "number": 21, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Candidiasis"}, {"letter": "B", "text": "Leukoplakia"}, {"letter": "C", "text": "Erythroplakia"}, {"letter": "D", "text": "Oral lichen planus"}], "correct": "C", "rationale": "Erythroplakia", "objective": "Oro A (Leukoplakia vs Erythroplakia)", "topic": "Oropharynx"}, {"id": "21b", "number": 21, "suffix": "b", "stem": "What is the next step?", "options": [{"letter": "A", "text": "Antifungal therapy"}, {"letter": "B", "text": "Reassurance"}, {"letter": "C", "text": "Prompt biopsy"}, {"letter": "D", "text": "Scrape and observe"}], "correct": "C", "rationale": "Prompt biopsy", "objective": "Oro A (Leukoplakia vs Erythroplakia)", "topic": "Oropharynx"}, {"id": "22", "number": 22, "suffix": "", "stem": "A 52-year-old woman presents with 2 days of pain, redness, and swelling at the inner corner of her right eye. She reports tearing and notes that pressing near the area expresses pus. On exam there is erythema, edema, and warmth over the medial canthus below the medial canthal tendon, and gentle pressure over the lacrimal sac produces purulent material at the puncta.\nWhat is the most likely diagnosis?", "options": [{"letter": "A", "text": "Dacryocystitis"}, {"letter": "B", "text": "Dacryoadenitis"}, {"letter": "C", "text": "Hordeolum"}, {"letter": "D", "text": "Preseptal cellulitis"}, {"letter": "E", "text": "Orbital cellulitis"}], "correct": "A", "rationale": "Inflammation of the lacrimal sac (inferomedial to the medial canthus) with erythema, epiphora, and purulent expression from the puncta is dacryocystitis, caused by nasolacrimal duct obstruction. Dacryoadenitis involves the lacrimal gland in the superolateral orbit.", "objective": "Eye Obj 5 (Lacrimal Disorders)", "topic": "Eye"}, {"id": "22a", "number": 22, "suffix": "a", "stem": "What is the underlying cause?", "options": [{"letter": "A", "text": "A conjunctival infection"}, {"letter": "B", "text": "A lacrimal gland tumor"}, {"letter": "C", "text": "Meibomian gland dysfunction"}, {"letter": "D", "text": "Nasolacrimal duct obstruction"}], "correct": "D", "rationale": "Nasolacrimal duct obstruction", "objective": "Eye Obj 5 (Lacrimal Disorders)", "topic": "Eye"}, {"id": "22b", "number": 22, "suffix": "b", "stem": "What is the treatment in an adult?", "options": [{"letter": "A", "text": "Immediate enucleation"}, {"letter": "B", "text": "Oral antibiotics (clindamycin/Augmentin)"}, {"letter": "C", "text": "Warm compress only, no antibiotics"}, {"letter": "D", "text": "Topical antivirals"}], "correct": "B", "rationale": "Oral antibiotics (clindamycin/Augmentin)", "objective": "Eye Obj 5 (Lacrimal Disorders)", "topic": "Eye"}, {"id": "23", "number": 23, "suffix": "", "stem": "A 45-year-old man presents with a painful red right eye, foreign-body sensation, and photophobia for 2 days. He has had cold sores in the past. On slit-lamp exam after fluorescein instillation, there is a branching, dendritic epithelial lesion. Visual acuity is mildly reduced. No hypopyon is seen.\nWhich management should be specifically AVOIDED?", "options": [{"letter": "A", "text": "Ganciclovir ophthalmic gel"}, {"letter": "B", "text": "Topical trifluridine"}, {"letter": "C", "text": "Oral acyclovir"}, {"letter": "D", "text": "Ophthalmology referral"}, {"letter": "E", "text": "Topical corticosteroids"}], "correct": "E", "rationale": "A dendritic ulcer on fluorescein staining indicates HSV keratitis. Treatment is topical or oral antivirals; topical corticosteroids are contraindicated because they can worsen the infection and lead to corneal perforation.", "objective": "Eye Obj 7 (Anterior Eye Disorders)", "topic": "Eye"}, {"id": "23a", "number": 23, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Bacterial keratitis"}, {"letter": "B", "text": "HSV (dendritic) keratitis"}, {"letter": "C", "text": "Acanthamoeba keratitis"}, {"letter": "D", "text": "Herpes zoster ophthalmicus"}], "correct": "B", "rationale": "HSV (dendritic) keratitis", "objective": "Eye Obj 7 (Anterior Eye Disorders)", "topic": "Eye"}, {"id": "23b", "number": 23, "suffix": "b", "stem": "What IS the appropriate treatment?", "options": [{"letter": "A", "text": "Topical natamycin"}, {"letter": "B", "text": "Topical trifluridine/ganciclovir or oral acyclovir"}, {"letter": "C", "text": "Intravitreal anti-VEGF"}, {"letter": "D", "text": "Topical corticosteroids"}], "correct": "B", "rationale": "Topical trifluridine/ganciclovir or oral acyclovir", "objective": "Eye Obj 7 (Anterior Eye Disorders)", "topic": "Eye"}, {"id": "24", "number": 24, "suffix": "", "stem": "A 40-year-old woman presents with several days of constant vertigo, nausea, and unsteadiness following a cold. In addition to the vertigo, she reports new hearing loss and tinnitus in the affected ear. Neurologic exam is otherwise normal, and nystagmus is peripheral in pattern.\nWhich feature distinguishes this condition from vestibular neuritis?", "options": [{"letter": "A", "text": "Nausea"}, {"letter": "B", "text": "The presence of vertigo"}, {"letter": "C", "text": "The presence of hearing loss (cochlear involvement)"}, {"letter": "D", "text": "Peripheral nystagmus"}, {"letter": "E", "text": "A viral prodrome"}], "correct": "C", "rationale": "Labyrinthitis is essentially vestibular neuritis PLUS cochlear involvement; the associated hearing loss is the key differentiator from vestibular neuritis, which spares hearing.", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "24a", "number": 24, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "BPPV"}, {"letter": "B", "text": "Vestibular neuritis"}, {"letter": "C", "text": "Ménière disease"}, {"letter": "D", "text": "Labyrinthitis"}], "correct": "D", "rationale": "Labyrinthitis", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "24b", "number": 24, "suffix": "b", "stem": "What is the treatment?", "options": [{"letter": "A", "text": "Epley maneuver"}, {"letter": "B", "text": "Low-salt diet + diuretic"}, {"letter": "C", "text": "Glucocorticoids, symptomatic care, vestibular rehab"}, {"letter": "D", "text": "Antibiotics"}], "correct": "C", "rationale": "Glucocorticoids, symptomatic care, vestibular rehab", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "25", "number": 25, "suffix": "", "stem": "A 60-year-old man with a 40-pack-year smoking history and heavy alcohol use presents with persistent hoarseness for more than 6 weeks that is not improving. He also reports throat pain radiating to his ear and mild difficulty swallowing. He has an unintentional 10-pound weight loss.\nWhat is the most appropriate next step?", "options": [{"letter": "A", "text": "Voice rest and reassurance"}, {"letter": "B", "text": "Oral antibiotics for laryngitis"}, {"letter": "C", "text": "Empiric proton pump inhibitor trial for 3 months"}, {"letter": "D", "text": "Allergy testing"}, {"letter": "E", "text": "Laryngoscopy with biopsy"}], "correct": "E", "rationale": "Persistent hoarseness >2-3 weeks in a smoker/drinker, especially with referred otalgia, dysphagia, and weight loss, is concerning for laryngeal cancer. Laryngoscopy with biopsy is the definitive diagnostic step.", "objective": "Oro C (Laryngeal Cancer)", "topic": "Oropharynx"}, {"id": "25a", "number": 25, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Laryngopharyngeal reflux"}, {"letter": "B", "text": "Laryngeal cancer (SCC)"}, {"letter": "C", "text": "Laryngitis"}, {"letter": "D", "text": "Vocal cord nodules"}], "correct": "B", "rationale": "Laryngeal cancer (SCC)", "objective": "Oro C (Laryngeal Cancer)", "topic": "Oropharynx"}, {"id": "25b", "number": 25, "suffix": "b", "stem": "What are the main risk factors?", "options": [{"letter": "A", "text": "Cold-water exposure"}, {"letter": "B", "text": "Contact-lens use"}, {"letter": "C", "text": "Aminoglycosides"}, {"letter": "D", "text": "Tobacco, alcohol, HPV-16"}], "correct": "D", "rationale": "Tobacco, alcohol, HPV-16", "objective": "Oro C (Laryngeal Cancer)", "topic": "Oropharynx"}, {"id": "26", "number": 26, "suffix": "", "stem": "An unvaccinated 4-year-old presents with rapid onset of high fever, severe sore throat, drooling, and muffled voice. He is sitting upright, leaning forward on his hands, with his chin thrust out, and is anxious and in respiratory distress. He has no cough.\nWhat is the most appropriate immediate action?", "options": [{"letter": "A", "text": "Keep the child calm, avoid oropharyngeal exam, and prepare for controlled airway management by skilled personnel"}, {"letter": "B", "text": "Immediately depress the tongue to inspect the oropharynx"}, {"letter": "C", "text": "Order a barium swallow"}, {"letter": "D", "text": "Obtain a throat culture in the clinic"}, {"letter": "E", "text": "Administer nebulized epinephrine and discharge"}], "correct": "A", "rationale": "This is epiglottitis (rapid high fever, drooling, distress, tripod/sniffing posture, no cough). Do NOT examine the oropharynx or agitate the child; secure the airway with skilled personnel (definitive diagnosis is laryngoscopy in the OR) and give IV ceftriaxone.", "objective": "Oro C (Epiglottitis vs Croup)", "topic": "Oropharynx"}, {"id": "26a", "number": 26, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Peritonsillar abscess"}, {"letter": "B", "text": "Croup"}, {"letter": "C", "text": "Retropharyngeal abscess"}, {"letter": "D", "text": "Epiglottitis"}], "correct": "D", "rationale": "Epiglottitis", "objective": "Oro C (Epiglottitis vs Croup)", "topic": "Oropharynx"}, {"id": "26b", "number": 26, "suffix": "b", "stem": "What is the classic organism and the antibiotic?", "options": [{"letter": "A", "text": "Parainfluenza; supportive care"}, {"letter": "B", "text": "GAS; penicillin only"}, {"letter": "C", "text": "Pseudomonas; ciprofloxacin"}, {"letter": "D", "text": "H. influenzae type b; IV ceftriaxone"}], "correct": "D", "rationale": "H. influenzae type b; IV ceftriaxone", "objective": "Oro C (Epiglottitis vs Croup)", "topic": "Oropharynx"}, {"id": "27", "number": 27, "suffix": "", "stem": "A 38-year-old woman with rheumatoid arthritis presents with severe, boring pain in her left eye that wakes her at night and worsens with eye movement. She reports photophobia and decreased vision. On exam the sclera has a violaceous (bluish) hue with deep injection, and the pain is not relieved by topical phenylephrine, which fails to blanch the vessels.\nWhat is the most likely diagnosis?", "options": [{"letter": "A", "text": "Subconjunctival hemorrhage"}, {"letter": "B", "text": "Episcleritis"}, {"letter": "C", "text": "Scleritis"}, {"letter": "D", "text": "Allergic conjunctivitis"}, {"letter": "E", "text": "Pinguecula"}], "correct": "C", "rationale": "Deep boring pain (worse with EOMs), photophobia, decreased vision, a bluish scleral hue, and failure of phenylephrine to blanch the vessels indicate scleritis, which is frequently associated with systemic disease such as RA. Episcleritis is painless and blanches with phenylephrine.", "objective": "Eye Obj 10 (Inflammatory Eye Disorders)", "topic": "Eye"}, {"id": "27a", "number": 27, "suffix": "a", "stem": "What systemic diseases is this associated with?", "options": [{"letter": "A", "text": "Rheumatoid arthritis / SLE"}, {"letter": "B", "text": "Multiple sclerosis"}, {"letter": "C", "text": "Graves disease"}, {"letter": "D", "text": "Ankylosing spondylitis (HLA-B27)"}], "correct": "A", "rationale": "Rheumatoid arthritis / SLE", "objective": "Eye Obj 10 (Inflammatory Eye Disorders)", "topic": "Eye"}, {"id": "27b", "number": 27, "suffix": "b", "stem": "What is the treatment?", "options": [{"letter": "A", "text": "Treat underlying disease + NSAIDs/systemic steroids"}, {"letter": "B", "text": "Phenylephrine drops"}, {"letter": "C", "text": "Warm compresses only"}, {"letter": "D", "text": "Topical antibiotics"}], "correct": "A", "rationale": "Treat underlying disease + NSAIDs/systemic steroids", "objective": "Eye Obj 10 (Inflammatory Eye Disorders)", "topic": "Eye"}, {"id": "28", "number": 28, "suffix": "", "stem": "A 46-year-old man awakens with sudden hearing loss in his left ear along with a feeling of ear blockage and tinnitus. He denies vertigo. Otoscopy is completely normal, and there is no cerumen or effusion. Weber lateralizes to the right (good) ear, and audiometry confirms a unilateral sensorineural hearing loss.\nWhat is the most appropriate initial treatment?", "options": [{"letter": "A", "text": "Systemic (or intratympanic) glucocorticoids"}, {"letter": "B", "text": "Decongestants and autoinsufflation"}, {"letter": "C", "text": "Cerumen removal"}, {"letter": "D", "text": "Observation for 3 months"}, {"letter": "E", "text": "Topical antibiotic drops"}], "correct": "A", "rationale": "Sudden sensorineural hearing loss (normal otoscopy, SNHL pattern) is a semi-emergency treated with glucocorticoids (systemic or intratympanic), often with an MRI to exclude retrocochlear pathology; hyperbaric oxygen may be added.", "objective": "Cochleovestibular Obj 5 (Management of HL)", "topic": "Cochleovestibular"}, {"id": "28a", "number": 28, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Otitis media with effusion"}, {"letter": "B", "text": "Sudden sensorineural hearing loss"}, {"letter": "C", "text": "Cerumen impaction"}, {"letter": "D", "text": "Otosclerosis"}], "correct": "B", "rationale": "Sudden sensorineural hearing loss", "objective": "Cochleovestibular Obj 5 (Management of HL)", "topic": "Cochleovestibular"}, {"id": "28b", "number": 28, "suffix": "b", "stem": "What imaging should be obtained, and why?", "options": [{"letter": "A", "text": "MRI to exclude retrocochlear pathology"}, {"letter": "B", "text": "Sinus CT"}, {"letter": "C", "text": "CT for cholesteatoma"}, {"letter": "D", "text": "No imaging is needed"}], "correct": "A", "rationale": "MRI to exclude retrocochlear pathology", "objective": "Cochleovestibular Obj 5 (Management of HL)", "topic": "Cochleovestibular"}, {"id": "29", "number": 29, "suffix": "", "stem": "A 68-year-old man presents with a painful, blistering rash across his right forehead and the tip of his nose, accompanied by eye pain and redness. On exam there are grouped vesicles in the V1 dermatome, including a lesion on the nasal tip. Slit-lamp exam shows punctate corneal lesions with a pseudodendritic pattern and mildly elevated intraocular pressure.\nThe vesicle on the tip of the nose is most significant because it\nindicates:", "options": [{"letter": "A", "text": "A benign finding unrelated to the eye"}, {"letter": "B", "text": "Bacterial superinfection requiring IV antibiotics"}, {"letter": "C", "text": "Hutchinson's sign, predicting a high risk of ocular involvement"}, {"letter": "D", "text": "Trigeminal neuralgia"}, {"letter": "E", "text": "A contraindication to antiviral therapy"}], "correct": "C", "rationale": "Vesicles on the tip of the nose (Hutchinson's sign) reflect nasociliary nerve involvement and predict ocular involvement in herpes zoster ophthalmicus. Treat promptly with oral antivirals and refer.", "objective": "Eye Obj 7 (Anterior Eye Disorders)", "topic": "Eye"}, {"id": "29a", "number": 29, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Herpes zoster ophthalmicus"}, {"letter": "B", "text": "HSV keratitis"}, {"letter": "C", "text": "Bacterial keratitis"}, {"letter": "D", "text": "Preseptal cellulitis"}], "correct": "A", "rationale": "Herpes zoster ophthalmicus", "objective": "Eye Obj 7 (Anterior Eye Disorders)", "topic": "Eye"}, {"id": "29b", "number": 29, "suffix": "b", "stem": "What is the treatment and time window?", "options": [{"letter": "A", "text": "Topical steroids"}, {"letter": "B", "text": "IV antibiotics"}, {"letter": "C", "text": "Observation"}, {"letter": "D", "text": "Oral antivirals within 72 hours"}], "correct": "D", "rationale": "Oral antivirals within 72 hours", "objective": "Eye Obj 7 (Anterior Eye Disorders)", "topic": "Eye"}, {"id": "30", "number": 30, "suffix": "", "stem": "A 63-year-old man with diabetes and hypertension presents with sudden double vision and a drooping right eyelid. On exam the right eye is deviated 'down and out' and the eyelid is ptotic. When you test the pupils, the right pupil is spared (reactive and equal to the left).\nThe pupillary sparing in this presentation most strongly suggests\nwhich underlying mechanism?", "options": [{"letter": "A", "text": "Cavernous sinus thrombosis"}, {"letter": "B", "text": "Cerebral artery aneurysm requiring emergent surgery"}, {"letter": "C", "text": "Ischemic (microvascular) cranial nerve III palsy"}, {"letter": "D", "text": "Myasthenia gravis"}, {"letter": "E", "text": "Compressive lesion such as a posterior communicating artery aneurysm"}], "correct": "C", "rationale": "A 'down and out' eye with ptosis is a CN III palsy. Pupil-sparing in a vasculopath (diabetes/HTN) suggests a microvascular/ischemic cause, because the parasympathetic pupillary fibers run peripherally and are typically affected by compressive (aneurysmal) lesions rather than ischemic ones.", "objective": "Eye Obj 11 (EOM Pathology & Amblyopia)", "topic": "Eye"}, {"id": "30a", "number": 30, "suffix": "a", "stem": "What would a pupil-INVOLVING CN III palsy suggest instead?", "options": [{"letter": "A", "text": "Myasthenia gravis"}, {"letter": "B", "text": "Horner syndrome"}, {"letter": "C", "text": "Microvascular ischemia"}, {"letter": "D", "text": "A posterior communicating artery aneurysm (compressive)"}], "correct": "D", "rationale": "A posterior communicating artery aneurysm (compressive)", "objective": "Eye Obj 11 (EOM Pathology & Amblyopia)", "topic": "Eye"}, {"id": "30b", "number": 30, "suffix": "b", "stem": "What is the appropriate workup?", "options": [{"letter": "A", "text": "Lumbar puncture only"}, {"letter": "B", "text": "MRI ± contrast (and CTA/MRA)"}, {"letter": "C", "text": "Tonometry"}, {"letter": "D", "text": "Carotid ultrasound"}], "correct": "B", "rationale": "MRI ± contrast (and CTA/MRA)", "objective": "Eye Obj 11 (EOM Pathology & Amblyopia)", "topic": "Eye"}, {"id": "31", "number": 31, "suffix": "", "stem": "A 5-year-old boy is brought in for follow-up after an ear infection several weeks ago. He now has no pain or fever, but his parents and teacher note he seems not to hear well and turns the television up. On pneumatic otoscopy the tympanic membrane is retracted and immobile with visible air-fluid levels behind it, but it is not bulging or erythematous.\nWhat is the most appropriate initial management?", "options": [{"letter": "A", "text": "Immediate tympanostomy tubes"}, {"letter": "B", "text": "Watchful waiting, since most cases resolve within 3 months"}, {"letter": "C", "text": "Oral corticosteroids"}, {"letter": "D", "text": "Systemic decongestants and antibiotics"}, {"letter": "E", "text": "High-dose amoxicillin"}], "correct": "B", "rationale": "Otitis media with effusion (middle-ear fluid WITHOUT signs of acute infection; reduced TM mobility, air-fluid levels) is managed with watchful waiting for ~3 months, since 80-90% resolve. Antibiotics/steroids are not recommended; persistent effusion with hearing loss warrants tympanostomy tubes.", "objective": "Ear Obj 3 (Eustachian Tube / OME)", "topic": "Ear Disorders"}, {"id": "31a", "number": 31, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Acute otitis media"}, {"letter": "B", "text": "Cholesteatoma"}, {"letter": "C", "text": "Otosclerosis"}, {"letter": "D", "text": "Otitis media with effusion"}], "correct": "D", "rationale": "Otitis media with effusion", "objective": "Ear Obj 3 (Eustachian Tube / OME)", "topic": "Ear Disorders"}, {"id": "31b", "number": 31, "suffix": "b", "stem": "What is the next step if it persists >3 months with hearing loss?", "options": [{"letter": "A", "text": "Continue observation indefinitely"}, {"letter": "B", "text": "Systemic steroids"}, {"letter": "C", "text": "Tympanostomy tubes"}, {"letter": "D", "text": "Oral antibiotics"}], "correct": "C", "rationale": "Tympanostomy tubes", "objective": "Ear Obj 3 (Eustachian Tube / OME)", "topic": "Ear Disorders"}, {"id": "32", "number": 32, "suffix": "", "stem": "A 5-year-old girl presents with unilateral eyelid redness, swelling, and mild tenderness that began after a scratch near the eye. She is afebrile and well-appearing. On exam the eyelid is erythematous and edematous, but there is no proptosis, extraocular movements are full and painless, and visual acuity is normal.\nWhat is the most likely diagnosis and appropriate setting for\ntreatment?", "options": [{"letter": "A", "text": "Orbital cellulitis; inpatient IV antibiotics"}, {"letter": "B", "text": "Dacryoadenitis; observation"}, {"letter": "C", "text": "Cavernous sinus thrombosis; anticoagulation"}, {"letter": "D", "text": "Allergic reaction; antihistamines"}, {"letter": "E", "text": "Preseptal cellulitis; outpatient oral antibiotics"}], "correct": "E", "rationale": "Eyelid/soft-tissue infection anterior to the orbital septum without proptosis or painful EOMs is preseptal cellulitis, managed with outpatient oral antibiotics. The absence of orbital signs distinguishes it from orbital cellulitis.", "objective": "Eye Obj 8 (Infectious Orbit Disorders)", "topic": "Eye"}, {"id": "32a", "number": 32, "suffix": "a", "stem": "What sign distinguishes this from orbital cellulitis?", "options": [{"letter": "A", "text": "Fever"}, {"letter": "B", "text": "Any eyelid swelling"}, {"letter": "C", "text": "No proptosis; painless, full EOMs"}, {"letter": "D", "text": "Eyelid erythema"}], "correct": "C", "rationale": "No proptosis; painless, full EOMs", "objective": "Eye Obj 8 (Infectious Orbit Disorders)", "topic": "Eye"}, {"id": "32b", "number": 32, "suffix": "b", "stem": "What are the common organisms from a skin source?", "options": [{"letter": "A", "text": "S. aureus and S. pyogenes"}, {"letter": "B", "text": "Pseudomonas"}, {"letter": "C", "text": "Candida"}, {"letter": "D", "text": "Ethmoid sinus flora"}], "correct": "A", "rationale": "S. aureus and S. pyogenes", "objective": "Eye Obj 8 (Infectious Orbit Disorders)", "topic": "Eye"}, {"id": "33", "number": 33, "suffix": "", "stem": "A 70-year-old man with hypertension, hyperlipidemia, and carotid disease experiences sudden, painless, profound loss of vision in his right eye. On exam there is a relative afferent pupillary defect. Fundoscopy shows a pale, edematous retina with a cherry-red spot at the fovea and 'box-car' segmentation of the retinal vessels.\nWhat is the most appropriate immediate management?", "options": [{"letter": "A", "text": "Intravitreal anti-VEGF injection"}, {"letter": "B", "text": "Oral prednisone taper as an outpatient"}, {"letter": "C", "text": "Lay the patient flat with ocular massage and high-flow oxygen"}, {"letter": "D", "text": "Topical timolol only and discharge"}, {"letter": "E", "text": "Laser photocoagulation the following week"}], "correct": "C", "rationale": "Sudden painless monocular vision loss with a cherry-red spot, pale retina, and box-car vessels is central retinal artery occlusion (a 'stroke of the eye'). Emergent measures include lying flat, ocular massage, high-flow oxygen, and IOP-lowering; a work-up for embolic source and giant cell arteritis is essential.", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "33a", "number": 33, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Optic neuritis"}, {"letter": "B", "text": "Central retinal artery occlusion"}, {"letter": "C", "text": "Retinal detachment"}, {"letter": "D", "text": "Central retinal vein occlusion"}], "correct": "B", "rationale": "Central retinal artery occlusion", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "33b", "number": 33, "suffix": "b", "stem": "What is the most common cause?", "options": [{"letter": "A", "text": "Retinal neovascularization"}, {"letter": "B", "text": "Hypertensive vascular damage"}, {"letter": "C", "text": "Thromboembolism from carotid atherosclerosis"}, {"letter": "D", "text": "Autoimmune demyelination"}], "correct": "C", "rationale": "Thromboembolism from carotid atherosclerosis", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "34", "number": 34, "suffix": "", "stem": "A 3-year-old boy presents with fever, refusal to eat, drooling, and neck stiffness with reluctance to extend his neck. He recently had pharyngitis. He appears ill and holds his neck rigidly. Lateral neck imaging shows widening of the prevertebral soft tissue, and CT with contrast confirms a fluid collection posterior to the pharynx.\nWhy is this considered the most dangerous deep neck infection?", "options": [{"letter": "A", "text": "It commonly causes permanent hearing loss"}, {"letter": "B", "text": "It can progress to airway compromise and spread into the mediastinum"}, {"letter": "C", "text": "It leads to cavernous sinus thrombosis in most cases"}, {"letter": "D", "text": "It always requires tonsillectomy"}, {"letter": "E", "text": "It causes facial nerve paralysis"}], "correct": "B", "rationale": "Retropharyngeal abscess (young children, neck stiffness/refusal to extend, drooling) is the most dangerous deep neck infection because it can obstruct the airway and spread into the mediastinum. Airway management and drainage with IV antibiotics are essential.", "objective": "Oro A (Deep Neck Abscess)", "topic": "Oropharynx"}, {"id": "34a", "number": 34, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Peritonsillar abscess"}, {"letter": "B", "text": "Epiglottitis"}, {"letter": "C", "text": "Retropharyngeal abscess"}, {"letter": "D", "text": "Ludwig angina"}], "correct": "C", "rationale": "Retropharyngeal abscess", "objective": "Oro A (Deep Neck Abscess)", "topic": "Oropharynx"}, {"id": "34b", "number": 34, "suffix": "b", "stem": "What is the first priority and the confirmatory imaging?", "options": [{"letter": "A", "text": "MRI brain"}, {"letter": "B", "text": "Throat culture"}, {"letter": "C", "text": "Barium swallow"}, {"letter": "D", "text": "Airway first; CT neck with IV contrast"}], "correct": "D", "rationale": "Airway first; CT neck with IV contrast", "objective": "Oro A (Deep Neck Abscess)", "topic": "Oropharynx"}, {"id": "35", "number": 35, "suffix": "", "stem": "A 25-year-old man presents after cleaning his ear with a cotton swab and suddenly experiencing pain, decreased hearing, and a small amount of bloody drainage. On otoscopy there is a perforation of the pars tensa of the tympanic membrane. Weber lateralizes to the affected ear.\nWhat is the most appropriate management for an uncomplicated\nperforation?", "options": [{"letter": "A", "text": "Immediate surgical tympanoplasty"}, {"letter": "B", "text": "Irrigation of the ear canal"}, {"letter": "C", "text": "Systemic corticosteroids"}, {"letter": "D", "text": "Oral amoxicillin for all cases"}, {"letter": "E", "text": "Keep the ear dry and observe, as most heal spontaneously (topical fluoroquinolone if infection)"}], "correct": "E", "rationale": "Most traumatic tympanic membrane perforations heal spontaneously over days to weeks; keep the ear dry and use topical fluoroquinolone drops if infection develops. Persistent non-healing perforations are referred for tympanoplasty.", "objective": "Ear Obj 4 (Middle Ear / TM Perforation)", "topic": "Ear Disorders"}, {"id": "35a", "number": 35, "suffix": "a", "stem": "Which way does Weber lateralize here?", "options": [{"letter": "A", "text": "To the affected (perforated) ear"}, {"letter": "B", "text": "Neither ear"}, {"letter": "C", "text": "To the good ear"}, {"letter": "D", "text": "Midline"}], "correct": "A", "rationale": "To the affected (perforated) ear", "objective": "Ear Obj 4 (Middle Ear / TM Perforation)", "topic": "Ear Disorders"}, {"id": "35b", "number": 35, "suffix": "b", "stem": "What is the next step if it does not heal?", "options": [{"letter": "A", "text": "Systemic steroids"}, {"letter": "B", "text": "Refer for tympanoplasty"}, {"letter": "C", "text": "Irrigate the canal"}, {"letter": "D", "text": "Oral amoxicillin"}], "correct": "B", "rationale": "Refer for tympanoplasty", "objective": "Ear Obj 4 (Middle Ear / TM Perforation)", "topic": "Ear Disorders"}, {"id": "36", "number": 36, "suffix": "", "stem": "A 58-year-old woman reports brief episodes of intense spinning that occur when she rolls over in bed or tips her head back to look up. Each episode lasts less than a minute and then resolves. She has no hearing loss or tinnitus. The Dix-Hallpike maneuver reproduces her vertigo with upbeat torsional nystagmus after a few seconds' latency that fatigues on repetition.\nWhat is the most appropriate treatment?", "options": [{"letter": "A", "text": "Oral glucocorticoids"}, {"letter": "B", "text": "Lifelong meclizine"}, {"letter": "C", "text": "Low-salt diet and a diuretic"}, {"letter": "D", "text": "Intratympanic gentamicin"}, {"letter": "E", "text": "Epley (canalith repositioning) maneuver"}], "correct": "E", "rationale": "Brief positional vertigo (<1 min) without hearing loss/tinnitus and a positive Dix-Hallpike is BPPV from displaced otoliths. The treatment is the Epley canalith repositioning maneuver.", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "36a", "number": 36, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Vestibular neuritis"}, {"letter": "B", "text": "Ménière disease"}, {"letter": "C", "text": "Labyrinthitis"}, {"letter": "D", "text": "BPPV"}], "correct": "D", "rationale": "BPPV", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "36b", "number": 36, "suffix": "b", "stem": "What is the diagnostic maneuver and pathophysiology?", "options": [{"letter": "A", "text": "Caloric testing; endolymphatic hydrops"}, {"letter": "B", "text": "Romberg; cerebellar lesion"}, {"letter": "C", "text": "Dix-Hallpike; otolith in posterior semicircular canal"}, {"letter": "D", "text": "MRI; acoustic neuroma"}], "correct": "C", "rationale": "Dix-Hallpike; otolith in posterior semicircular canal", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "37", "number": 37, "suffix": "", "stem": "An 74-year-old man with poorly controlled diabetes presents with weeks of severe, deep left ear pain that is worst at night, along with foul purulent drainage that has not responded to topical antibiotic drops. On exam there is granulation tissue on the floor of the ear canal at the bony-cartilaginous junction. He has a low-grade fever.\nWhat is the most appropriate next diagnostic step?", "options": [{"letter": "A", "text": "Tympanometry"}, {"letter": "B", "text": "Allergy testing"}, {"letter": "C", "text": "Monospot test"}, {"letter": "D", "text": "CT with contrast to evaluate for osseous erosion (skull-base osteomyelitis)"}, {"letter": "E", "text": "Reassurance and continue topical drops"}], "correct": "D", "rationale": "An elderly diabetic with severe nocturnal otalgia, canal-floor granulation tissue, and failure of topical therapy has malignant (necrotizing) otitis externa (Pseudomonas). CT with contrast evaluates for osseous erosion; treatment is prolonged dual antipseudomonal antibiotics.", "objective": "Ear Obj 2 (External Auditory Canal)", "topic": "Ear Disorders"}, {"id": "37a", "number": 37, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Cholesteatoma"}, {"letter": "B", "text": "Mastoiditis"}, {"letter": "C", "text": "Malignant (necrotizing) otitis externa"}, {"letter": "D", "text": "Acute otitis externa"}], "correct": "C", "rationale": "Malignant (necrotizing) otitis externa", "objective": "Ear Obj 2 (External Auditory Canal)", "topic": "Ear Disorders"}, {"id": "37b", "number": 37, "suffix": "b", "stem": "What is the organism and treatment?", "options": [{"letter": "A", "text": "Candida; antifungal"}, {"letter": "B", "text": "Pseudomonas; prolonged dual antipseudomonal IV"}, {"letter": "C", "text": "GAS; penicillin"}, {"letter": "D", "text": "S. aureus; topical drops"}], "correct": "B", "rationale": "Pseudomonas; prolonged dual antipseudomonal IV", "objective": "Ear Obj 2 (External Auditory Canal)", "topic": "Ear Disorders"}, {"id": "38", "number": 38, "suffix": "", "stem": "A 15-year-old boy presents with recurrent, sometimes profuse nosebleeds and progressive unilateral nasal obstruction over several months. On exam there is a firm mass in the posterior nasal cavity. A contrast CT shows a highly vascular mass arising near the sphenopalatine foramen.\nWhich management step is specifically contraindicated?", "options": [{"letter": "A", "text": "Biopsy in the clinic"}, {"letter": "B", "text": "Preoperative embolization"}, {"letter": "C", "text": "Angiography"}, {"letter": "D", "text": "Surgical resection"}, {"letter": "E", "text": "Contrast CT/MRI imaging"}], "correct": "A", "rationale": "This is a juvenile nasopharyngeal angiofibroma (adolescent male, recurrent epistaxis, vascular mass at the sphenopalatine foramen). Biopsy is contraindicated because of the risk of profuse bleeding; diagnosis relies on contrast imaging, with preoperative embolization before resection.", "objective": "Nose Obj 1g (Benign Nasal Tumors)", "topic": "Nose & Sinus"}, {"id": "38a", "number": 38, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Sinonasal SCC"}, {"letter": "B", "text": "Juvenile nasopharyngeal angiofibroma"}, {"letter": "C", "text": "Inverted papilloma"}, {"l
