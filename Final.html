etter": "D", "text": "Nasal polyp"}], "correct": "B", "rationale": "Juvenile nasopharyngeal angiofibroma", "objective": "Nose Obj 1g (Benign Nasal Tumors)", "topic": "Nose & Sinus"}, {"id": "38b", "number": 38, "suffix": "b", "stem": "Who gets it, and what is the treatment?", "options": [{"letter": "A", "text": "Children; antibiotics"}, {"letter": "B", "text": "Infants; observation"}, {"letter": "C", "text": "Elderly women; radiation only"}, {"letter": "D", "text": "Adolescent males; embolization then resection"}], "correct": "D", "rationale": "Adolescent males; embolization then resection", "objective": "Nose Obj 1g (Benign Nasal Tumors)", "topic": "Nose & Sinus"}, {"id": "39", "number": 39, "suffix": "", "stem": "A 42-year-old woman describes recurrent attacks of vertigo lasting from 30 minutes to several hours, accompanied by a roaring tinnitus, a sensation of fullness in her left ear, and fluctuating hearing loss. Between attacks she is well. Audiometry shows a low-to-mid frequency sensorineural hearing loss on the left.\nWhat is the most likely diagnosis?", "options": [{"letter": "A", "text": "Benign paroxysmal positional vertigo"}, {"letter": "B", "text": "Labyrinthitis"}, {"letter": "C", "text": "Vestibular neuritis"}, {"letter": "D", "text": "Acoustic neuroma"}, {"letter": "E", "text": "Meniere disease"}], "correct": "E", "rationale": "Episodic vertigo (20 min-24 h) WITH sensorineural hearing loss, tinnitus, and aural fullness is Meniere disease (endolymphatic hydrops). Management includes a low-salt diet, diuretics, and vestibular rehabilitation.", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "39a", "number": 39, "suffix": "a", "stem": "What is the treatment?", "options": [{"letter": "A", "text": "Epley maneuver"}, {"letter": "B", "text": "Immediate surgery"}, {"letter": "C", "text": "Antibiotics"}, {"letter": "D", "text": "Low-salt diet, diuretics, vestibular rehab"}], "correct": "D", "rationale": "Low-salt diet, diuretics, vestibular rehab", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "39b", "number": 39, "suffix": "b", "stem": "What is the pathophysiology?", "options": [{"letter": "A", "text": "Otolith displacement"}, {"letter": "B", "text": "Viral vestibular-nerve inflammation"}, {"letter": "C", "text": "Stapes fixation"}, {"letter": "D", "text": "Endolymphatic hydrops"}], "correct": "D", "rationale": "Endolymphatic hydrops", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "40", "number": 40, "suffix": "", "stem": "A 10-year-old with several days of poorly treated mastoiditis develops a new severe, progressive headache that is worse when lying flat and with Valsalva. He now has nausea, vomiting, and papilledema on fundoscopic exam. He is intermittently drowsy.\nWhat imaging study best confirms the suspected complication?", "options": [{"letter": "A", "text": "Lumbar puncture without imaging"}, {"letter": "B", "text": "MR or CT venography"}, {"letter": "C", "text": "Carotid ultrasound"}, {"letter": "D", "text": "Non-contrast head CT only"}, {"letter": "E", "text": "Plain skull radiographs"}], "correct": "B", "rationale": "A new progressive headache with raised-ICP signs in a patient with mastoiditis suggests cerebral venous sinus thrombosis (septic thrombosis of the lateral/sigmoid sinus). MR or CT venography confirms it; treatment is anticoagulation plus antibiotics for the underlying infection.", "objective": "Ear Obj 5 (Complications / CVST)", "topic": "Ear Disorders"}, {"id": "40a", "number": 40, "suffix": "a", "stem": "What is the complication/diagnosis?", "options": [{"letter": "A", "text": "Cerebral venous sinus thrombosis"}, {"letter": "B", "text": "Brain abscess"}, {"letter": "C", "text": "Bacterial meningitis"}, {"letter": "D", "text": "Bell palsy"}], "correct": "A", "rationale": "Cerebral venous sinus thrombosis", "objective": "Ear Obj 5 (Complications / CVST)", "topic": "Ear Disorders"}, {"id": "40b", "number": 40, "suffix": "b", "stem": "What is the treatment?", "options": [{"letter": "A", "text": "Diuretics only"}, {"letter": "B", "text": "Anticoagulation + antibiotics"}, {"letter": "C", "text": "Observation"}, {"letter": "D", "text": "Antivirals"}], "correct": "B", "rationale": "Anticoagulation + antibiotics", "objective": "Ear Obj 5 (Complications / CVST)", "topic": "Ear Disorders"}, {"id": "41", "number": 41, "suffix": "", "stem": "A 58-year-old woman complains of chronic bilateral burning, itching, and red-rimmed eyelids that are worse in the mornings. She has a history of seborrheic dermatitis. On slit-lamp exam you see crusting and greasy scales clinging to the base of the eyelashes, with erythema of the anterior lid margins. Visual acuity and the conjunctiva are normal.\nWhat is the most appropriate first-line management?", "options": [{"letter": "A", "text": "Lid hygiene with warm compresses and dilute baby shampoo scrubs"}, {"letter": "B", "text": "Oral doxycycline for 6 weeks"}, {"letter": "C", "text": "Topical natamycin"}, {"letter": "D", "text": "Topical prednisolone acetate drops"}, {"letter": "E", "text": "Surgical lid margin resection"}], "correct": "A", "rationale": "This is anterior blepharitis. First-line therapy is lid hygiene (warm compresses, baby shampoo scrubs); anti-staph antibiotic ointment is added only if it persists.", "objective": "Eye Obj 4 (Eyelid Disorders)", "topic": "Eye"}, {"id": "41a", "number": 41, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Hordeolum"}, {"letter": "B", "text": "(Anterior) blepharitis"}, {"letter": "C", "text": "Dacryocystitis"}, {"letter": "D", "text": "Chalazion"}], "correct": "B", "rationale": "(Anterior) blepharitis", "objective": "Eye Obj 4 (Eyelid Disorders)", "topic": "Eye"}, {"id": "41b", "number": 41, "suffix": "b", "stem": "What is added if lid hygiene fails?", "options": [{"letter": "A", "text": "Anti-staph antibiotic ointment"}, {"letter": "B", "text": "Surgical resection"}, {"letter": "C", "text": "Oral steroids"}, {"letter": "D", "text": "Topical antifungal"}], "correct": "A", "rationale": "Anti-staph antibiotic ointment", "objective": "Eye Obj 4 (Eyelid Disorders)", "topic": "Eye"}, {"id": "42", "number": 42, "suffix": "", "stem": "A 24-year-old man is struck in the eye by a fast-moving metal fragment while grinding metal without protective eyewear. He has severe pain and decreased vision. On exam the pupil is teardrop-shaped and pointing toward a corneal laceration, the anterior chamber appears shallow, and there is a subconjunctival hemorrhage. Intraocular pressure is low.\nWhat is the most appropriate immediate management?", "options": [{"letter": "A", "text": "Place a rigid eye shield (no pressure), give antiemetics/analgesia, and arrange emergent surgical repair"}, {"letter": "B", "text": "Irrigate the eye copiously and patch it firmly"}, {"letter": "C", "text": "Apply pressure to tamponade the bleeding"}, {"letter": "D", "text": "Discharge with topical antibiotics and next-day follow-up"}, {"letter": "E", "text": "Instill topical anesthetic and measure IOP with tonometry"}], "correct": "A", "rationale": "A teardrop pupil, shallow chamber, and low IOP after high-velocity injury indicate globe rupture. Protect the eye with a rigid shield (no pressure or manipulation), control nausea/pain, give antibiotics/tetanus prophylaxis, and obtain emergent surgical repair.", "objective": "Eye Obj 15 (Traumatic Eye Disorders)", "topic": "Eye"}, {"id": "42a", "number": 42, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Globe rupture"}, {"letter": "B", "text": "Orbital blowout fracture"}, {"letter": "C", "text": "Hyphema"}, {"letter": "D", "text": "Corneal abrasion"}], "correct": "A", "rationale": "Globe rupture", "objective": "Eye Obj 15 (Traumatic Eye Disorders)", "topic": "Eye"}, {"id": "42b", "number": 42, "suffix": "b", "stem": "What confirmatory test is used?", "options": [{"letter": "A", "text": "Tonometry"}, {"letter": "B", "text": "Phenylephrine test"}, {"letter": "C", "text": "Seidel test"}, {"letter": "D", "text": "Schirmer's test"}], "correct": "C", "rationale": "Seidel test", "objective": "Eye Obj 15 (Traumatic Eye Disorders)", "topic": "Eye"}, {"id": "43", "number": 43, "suffix": "", "stem": "A 40-year-old man with poor dental hygiene presents with 3 days of throbbing pain and swelling around a lower molar, along with fever. On exam there is a localized, fluctuant swelling of the gingiva ('gum boil'/parulis) adjacent to the tooth, with warmth and erythema and tender regional lymphadenopathy. He has no trismus or airway compromise.\nWhat is the most appropriate treatment for this localized abscess?", "options": [{"letter": "A", "text": "Antivirals"}, {"letter": "B", "text": "Analgesia plus an antibiotic such as penicillin VK (and dental referral/drainage)"}, {"letter": "C", "text": "Antibiotics alone without any drainage"}, {"letter": "D", "text": "Observation only"}, {"letter": "E", "text": "Antifungals"}], "correct": "B", "rationale": "A dental abscess is treated with analgesia and an antibiotic (penicillin VK, clindamycin, or amoxicillin-clavulanate), with incision and drainage for larger collections and dental referral. Watch for spread causing trismus, dysphagia, or airway compromise.", "objective": "Oro D (Dental Abscess)", "topic": "Oropharynx"}, {"id": "43a", "number": 43, "suffix": "a", "stem": "When is incision & drainage required?", "options": [{"letter": "A", "text": "Only if afebrile"}, {"letter": "B", "text": "Never"}, {"letter": "C", "text": "For larger collections/abscesses"}, {"letter": "D", "text": "In all cases immediately"}], "correct": "C", "rationale": "For larger collections/abscesses", "objective": "Oro D (Dental Abscess)", "topic": "Oropharynx"}, {"id": "43b", "number": 43, "suffix": "b", "stem": "What warning signs indicate dangerous spread?", "options": [{"letter": "A", "text": "Mild gum bleeding"}, {"letter": "B", "text": "Tooth sensitivity"}, {"letter": "C", "text": "Trismus, dysphagia, airway compromise"}, {"letter": "D", "text": "Bad breath"}], "correct": "C", "rationale": "Trismus, dysphagia, airway compromise", "objective": "Oro D (Dental Abscess)", "topic": "Oropharynx"}, {"id": "44", "number": 44, "suffix": "", "stem": "A 66-year-old man is diagnosed with acute angle-closure glaucoma. His intraocular pressure is 58 mmHg. Ophthalmology has been called and is en route.\nWhat is the definitive treatment for this condition?", "options": [{"letter": "A", "text": "Systemic corticosteroids"}, {"letter": "B", "text": "Oral acetazolamide alone"}, {"letter": "C", "text": "Warm compresses"}, {"letter": "D", "text": "Laser peripheral iridotomy"}, {"letter": "E", "text": "Topical latanoprost monotherapy"}], "correct": "D", "rationale": "Medical therapy (acetazolamide, timolol, apraclonidine, pilocarpine) temporizes by lowering IOP, but the definitive treatment for angle-closure glaucoma is laser peripheral iridotomy to relieve the pupillary block.", "objective": "Eye Obj 9 (Glaucoma)", "topic": "Eye"}, {"id": "44a", "number": 44, "suffix": "a", "stem": "Which agents temporize by lowering IOP before the definitive procedure?", "options": [{"letter": "A", "text": "A prostaglandin analog alone"}, {"letter": "B", "text": "Acetazolamide + timolol/apraclonidine/pilocarpine"}, {"letter": "C", "text": "Warm compresses"}, {"letter": "D", "text": "Mydriatic drops"}], "correct": "B", "rationale": "Acetazolamide + timolol/apraclonidine/pilocarpine", "objective": "Eye Obj 9 (Glaucoma)", "topic": "Eye"}, {"id": "44b", "number": 44, "suffix": "b", "stem": "What is the gold-standard diagnostic test?", "options": [{"letter": "A", "text": "Tonometry alone"}, {"letter": "B", "text": "Slit lamp only"}, {"letter": "C", "text": "Fundoscopy"}, {"letter": "D", "text": "Gonioscopy"}], "correct": "D", "rationale": "Gonioscopy", "objective": "Eye Obj 9 (Glaucoma)", "topic": "Eye"}, {"id": "45", "number": 45, "suffix": "", "stem": "A 58-year-old man who started lisinopril 3 weeks ago presents with progressive swelling of his lips and tongue over several hours. He has no urticaria, no itching, and no wheezing, but reports a sensation of throat tightness. His vital signs are stable and his airway is currently patent.\nAfter airway assessment, which treatment is most appropriate for this\nmechanism of angioedema?", "options": [{"letter": "A", "text": "High-dose IV antihistamines alone"}, {"letter": "B", "text": "Oral prednisone taper as an outpatient"}, {"letter": "C", "text": "Reassurance; no intervention needed"}, {"letter": "D", "text": "Icatibant or C1 esterase inhibitor concentrate; stop the ACE inhibitor"}, {"letter": "E", "text": "Intramuscular epinephrine and it will resolve quickly"}], "correct": "D", "rationale": "ACE-inhibitor angioedema is bradykinin-mediated and does NOT reliably respond to epinephrine, antihistamines, or steroids. Stop the ACE inhibitor and, in significant cases, consider icatibant or C1 inhibitor concentrate; airway protection is the priority.", "objective": "Oro A (Angioedema)", "topic": "Oropharynx"}, {"id": "45a", "number": 45, "suffix": "a", "stem": "What is the mediator of this angioedema?", "options": [{"letter": "A", "text": "Complement C3"}, {"letter": "B", "text": "IgE"}, {"letter": "C", "text": "Bradykinin"}, {"letter": "D", "text": "Histamine"}], "correct": "C", "rationale": "Bradykinin", "objective": "Oro A (Angioedema)", "topic": "Oropharynx"}, {"id": "45b", "number": 45, "suffix": "b", "stem": "What else must be done?", "options": [{"letter": "A", "text": "Start antihistamines only"}, {"letter": "B", "text": "Stop the ACE inhibitor; protect the airway"}, {"letter": "C", "text": "No change needed"}, {"letter": "D", "text": "Give epinephrine and discharge"}], "correct": "B", "rationale": "Stop the ACE inhibitor; protect the airway", "objective": "Oro A (Angioedema)", "topic": "Oropharynx"}, {"id": "46", "number": 46, "suffix": "", "stem": "A 22-year-old woman presents 5 days after getting a high cartilage ('helix') ear piercing with increasing redness, warmth, swelling, and severe pain of the upper ear. Notably, the earlobe is spared. The pain seems out of proportion to the exam, and the auricular landmarks are obscured by swelling.\nWhich organism must the chosen antibiotic cover?", "options": [{"letter": "A", "text": "Candida albicans"}, {"letter": "B", "text": "Staphylococcus epidermidis"}, {"letter": "C", "text": "Pseudomonas aeruginosa"}, {"letter": "D", "text": "Escherichia coli"}, {"letter": "E", "text": "Group A Streptococcus"}], "correct": "C", "rationale": "Perichondritis after high cartilage piercing spares the lobule (no cartilage) and is most commonly caused by Pseudomonas aeruginosa; empiric therapy is an oral fluoroquinolone (ciprofloxacin). Untreated, it causes cartilage necrosis and cauliflower ear.", "objective": "Ear Obj 1 (Auricle)", "topic": "Ear Disorders"}, {"id": "46a", "number": 46, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Otitis externa"}, {"letter": "B", "text": "Perichondritis"}, {"letter": "C", "text": "Auricular hematoma"}, {"letter": "D", "text": "Erysipelas"}], "correct": "B", "rationale": "Perichondritis", "objective": "Ear Obj 1 (Auricle)", "topic": "Ear Disorders"}, {"id": "46b", "number": 46, "suffix": "b", "stem": "What is the first-line antibiotic?", "options": [{"letter": "A", "text": "Fluconazole"}, {"letter": "B", "text": "Vancomycin"}, {"letter": "C", "text": "Penicillin"}, {"letter": "D", "text": "Oral fluoroquinolone (ciprofloxacin)"}], "correct": "D", "rationale": "Oral fluoroquinolone (ciprofloxacin)", "objective": "Ear Obj 1 (Auricle)", "topic": "Ear Disorders"}, {"id": "47", "number": 47, "suffix": "", "stem": "A 24-year-old woman presents with a painful sore inside her lower lip that appeared 2 days ago after she bit the area. On exam there is a small, round, shallow ulcer with a yellow-gray base and a surrounding erythematous halo on the non-keratinized mucosa. She has had similar lesions before that healed on their own in about a week.\nWhat is the most appropriate first-line treatment to speed healing?", "options": [{"letter": "A", "text": "Oral acyclovir"}, {"letter": "B", "text": "High-potency topical corticosteroid (e.g., triamcinolone in Orabase)"}, {"letter": "C", "text": "Systemic antibiotics"}, {"letter": "D", "text": "Oral fluconazole"}, {"letter": "E", "text": "Topical antifungal"}], "correct": "B", "rationale": "Aphthous ulcers (canker sores) are round shallow ulcers with a gray base and erythematous halo on non-keratinized mucosa. First-line therapy is an early high-potency topical corticosteroid (e.g., triamcinolone in Orabase, dexamethasone rinse).", "objective": "Oro A (Aphthous Ulcers)", "topic": "Oropharynx"}, {"id": "47a", "number": 47, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Erythroplakia"}, {"letter": "B", "text": "Herpes labialis"}, {"letter": "C", "text": "Aphthous ulcer (canker sore)"}, {"letter": "D", "text": "Oral candidiasis"}], "correct": "C", "rationale": "Aphthous ulcer (canker sore)", "objective": "Oro A (Aphthous Ulcers)", "topic": "Oropharynx"}, {"id": "47b", "number": 47, "suffix": "b", "stem": "What triggers/deficiencies are associated?", "options": [{"letter": "A", "text": "Stress and B12/folate/iron deficiency"}, {"letter": "B", "text": "Aminoglycosides"}, {"letter": "C", "text": "Smoking only"}, {"letter": "D", "text": "Sun exposure"}], "correct": "A", "rationale": "Stress and B12/folate/iron deficiency", "objective": "Oro A (Aphthous Ulcers)", "topic": "Oropharynx"}, {"id": "48", "number": 48, "suffix": "", "stem": "A 28-year-old woman presents with a 3-day history of decreased vision in her right eye and pain that worsens when she moves the eye. She reports colors appear 'washed out.' On exam there is a relative afferent pupillary defect on the swinging-flashlight test. She has had a prior episode of transient limb numbness.\nWhat is the most appropriate treatment?", "options": [{"letter": "A", "text": "Intravenous corticosteroids"}, {"letter": "B", "text": "Observation alone"}, {"letter": "C", "text": "Oral prednisone taper"}, {"letter": "D", "text": "Topical antibiotic drops"}, {"letter": "E", "text": "Intravitreal anti-VEGF"}], "correct": "A", "rationale": "Painful monocular vision loss with dyschromatopsia and a Marcus Gunn pupil is optic neuritis, strongly associated with multiple sclerosis. Treatment is IV corticosteroids; oral prednisone alone is avoided because it increases the recurrence rate.", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "48a", "number": 48, "suffix": "a", "stem": "What is the diagnosis and its association?", "options": [{"letter": "A", "text": "Optic neuritis; multiple sclerosis"}, {"letter": "B", "text": "Cataract; aging"}, {"letter": "C", "text": "Papilledema; raised ICP"}, {"letter": "D", "text": "CRAO; carotid disease"}], "correct": "A", "rationale": "Optic neuritis; multiple sclerosis", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "48b", "number": 48, "suffix": "b", "stem": "Why is oral prednisone alone avoided?", "options": [{"letter": "A", "text": "It causes glaucoma"}, {"letter": "B", "text": "It increases the recurrence rate"}, {"letter": "C", "text": "It is too expensive"}, {"letter": "D", "text": "It has no effect"}], "correct": "B", "rationale": "It increases the recurrence rate", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "49", "number": 49, "suffix": "", "stem": "A 29-year-old man with a history of ankylosing spondylitis presents with a painful, red left eye, photophobia, and blurred vision for 2 days. On slit-lamp exam there is redness concentrated at the limbus (ciliary flush) and leukocytes (cells) visible in the anterior chamber. The pupil is somewhat small and irregular.\nWhat is the most appropriate treatment?", "options": [{"letter": "A", "text": "Oral acyclovir"}, {"letter": "B", "text": "Topical moxifloxacin"}, {"letter": "C", "text": "Topical glucocorticoids plus a cycloplegic agent"}, {"letter": "D", "text": "Warm compresses and lid hygiene"}, {"letter": "E", "text": "Intramuscular ceftriaxone"}], "correct": "C", "rationale": "Anterior uveitis/iritis (HLA-B27-associated, e.g., ankylosing spondylitis) presents with ciliary flush and anterior-chamber cells. Treatment is topical corticosteroids plus a cycloplegic (dilation relieves pain and prevents synechiae).", "objective": "Eye Obj 10 (Inflammatory Eye Disorders)", "topic": "Eye"}, {"id": "49a", "number": 49, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Conjunctivitis"}, {"letter": "B", "text": "Angle-closure glaucoma"}, {"letter": "C", "text": "Scleritis"}, {"letter": "D", "text": "Anterior uveitis / iritis"}], "correct": "D", "rationale": "Anterior uveitis / iritis", "objective": "Eye Obj 10 (Inflammatory Eye Disorders)", "topic": "Eye"}, {"id": "49b", "number": 49, "suffix": "b", "stem": "What is the classic systemic association?", "options": [{"letter": "A", "text": "Rheumatoid arthritis"}, {"letter": "B", "text": "Hypertension"}, {"letter": "C", "text": "Diabetes"}, {"letter": "D", "text": "HLA-B27 (ankylosing spondylitis)"}], "correct": "D", "rationale": "HLA-B27 (ankylosing spondylitis)", "objective": "Eye Obj 10 (Inflammatory Eye Disorders)", "topic": "Eye"}, {"id": "50", "number": 50, "suffix": "", "stem": "A 16-year-old boy presents with a nosebleed after picking his nose. The bleeding is from the right naris only, and he is hemodynamically stable. On exam with a nasal speculum, you identify an active bleeding site on the anterior nasal septum.\nAfter failure of initial direct compression, which is the most\nappropriate next step for this anterior bleed?", "options": [{"letter": "A", "text": "Cautery (silver nitrate) of the visible bleeding vessel"}, {"letter": "B", "text": "Transfusion of packed red cells"}, {"letter": "C", "text": "Emergent CT angiography"}, {"letter": "D", "text": "Immediate ENT consult for arterial ligation"}, {"letter": "E", "text": "Posterior balloon packing and hospital admission"}], "correct": "A", "rationale": "Most anterior epistaxis arises from Kiesselbach's plexus. After direct pressure and a topical vasoconstrictor fail, the next step is cautery (silver nitrate or electrocautery), followed by anterior packing if needed. Posterior bleeds require ENT and packing/admission.", "objective": "Nose Obj 1d (Epistaxis)", "topic": "Nose & Sinus"}, {"id": "50a", "number": 50, "suffix": "a", "stem": "Which vascular plexus is the usual source of anterior bleeds?", "options": [{"letter": "A", "text": "The internal carotid"}, {"letter": "B", "text": "Woodruff's plexus"}, {"letter": "C", "text": "Kiesselbach's plexus"}, {"letter": "D", "text": "The sphenopalatine artery"}], "correct": "C", "rationale": "Kiesselbach's plexus", "objective": "Nose Obj 1d (Epistaxis)", "topic": "Nose & Sinus"}, {"id": "50b", "number": 50, "suffix": "b", "stem": "How does management of a POSTERIOR bleed differ?", "options": [{"letter": "A", "text": "Simple pinch pressure"}, {"letter": "B", "text": "Silver-nitrate cautery in clinic"}, {"letter": "C", "text": "No treatment"}, {"letter": "D", "text": "ENT referral, balloon packing, admission"}], "correct": "D", "rationale": "ENT referral, balloon packing, admission", "objective": "Nose Obj 1d (Epistaxis)", "topic": "Nose & Sinus"}, {"id": "51", "number": 51, "suffix": "", "stem": "A 4-year-old girl is brought in because one eye 'drifts.' Her mother notes the child seems to favor one eye. On exam, corneal light reflex is asymmetric and the cover/uncover test reveals a manifest deviation. Vision testing shows reduced acuity in the deviating eye despite a structurally normal eye with a clear cornea, lens, and retina.\nWhat is the most appropriate treatment to preserve vision in the\naffected eye?", "options": [{"letter": "A", "text": "Topical antibiotic drops"}, {"letter": "B", "text": "Observation until age 10"}, {"letter": "C", "text": "Cataract extraction"}, {"letter": "D", "text": "Patching (occlusion) therapy of the better-seeing eye"}, {"letter": "E", "text": "Immediate strabismus surgery only"}], "correct": "D", "rationale": "Strabismus has caused amblyopia (developmental cortical suppression of one eye without structural abnormality). Treatment is patching or penalization of the dominant eye to force use of the amblyopic eye; treatment is time-sensitive in early childhood.", "objective": "Eye Obj 11 (EOM Pathology & Amblyopia)", "topic": "Eye"}, {"id": "51a", "number": 51, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Refractive error only"}, {"letter": "B", "text": "Strabismus alone"}, {"letter": "C", "text": "Amblyopia"}, {"letter": "D", "text": "Cataract"}], "correct": "C", "rationale": "Amblyopia", "objective": "Eye Obj 11 (EOM Pathology & Amblyopia)", "topic": "Eye"}, {"id": "51b", "number": 51, "suffix": "b", "stem": "Why is treatment time-sensitive?", "options": [{"letter": "A", "text": "The eye becomes structurally damaged"}, {"letter": "B", "text": "The brain suppresses one eye → cortex underdevelops in childhood"}, {"letter": "C", "text": "The lens hardens"}, {"letter": "D", "text": "The optic nerve atrophies"}], "correct": "B", "rationale": "The brain suppresses one eye → cortex underdevelops in childhood", "objective": "Eye Obj 11 (EOM Pathology & Amblyopia)", "topic": "Eye"}, {"id": "52", "number": 52, "suffix": "", "stem": "A 26-year-old woman presents in the spring with recurrent bouts of sneezing, clear watery nasal discharge, and itchy, watery eyes. She notes her symptoms flare when she is outdoors around blooming grass. On exam the nasal turbinates appear pale and boggy with a bluish tinge, and there is cobblestoning of the posterior pharynx. She has faint dark circles under her eyes.\nWhich is the single most effective first-line medication for her\ncondition?", "options": [{"letter": "A", "text": "Oral montelukast"}, {"letter": "B", "text": "Intranasal ipratropium"}, {"letter": "C", "text": "Oral first-generation antihistamine (diphenhydramine)"}, {"letter": "D", "text": "Oral pseudoephedrine"}, {"letter": "E", "text": "Intranasal glucocorticoid (e.g., fluticasone)"}], "correct": "E", "rationale": "This is allergic rhinitis (itching, sneezing, pale/boggy turbinates, allergic shiners). The single most effective agent is an intranasal corticosteroid, which is especially good for congestion.", "objective": "Nose Obj 1a/2 (Rhinitis)", "topic": "Nose & Sinus"}, {"id": "52a", "number": 52, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Vasomotor rhinitis"}, {"letter": "B", "text": "Allergic rhinitis"}, {"letter": "C", "text": "Chronic sinusitis"}, {"letter": "D", "text": "Viral rhinitis"}], "correct": "B", "rationale": "Allergic rhinitis", "objective": "Nose Obj 1a/2 (Rhinitis)", "topic": "Nose & Sinus"}, {"id": "52b", "number": 52, "suffix": "b", "stem": "What are the classic exam findings?", "options": [{"letter": "A", "text": "Grape-like polyps"}, {"letter": "B", "text": "Pale/boggy turbinates, allergic shiners, cobblestoning"}, {"letter": "C", "text": "Purulent discharge"}, {"letter": "D", "text": "Erythematous engorged mucosa"}], "correct": "B", "rationale": "Pale/boggy turbinates, allergic shiners, cobblestoning", "objective": "Nose Obj 1a/2 (Rhinitis)", "topic": "Nose & Sinus"}, {"id": "53", "number": 53, "suffix": "", "stem": "A 60-year-old African American man with a family history of blindness is found on routine exam to have a cup-to-disc ratio of 0.7 in both eyes and peripheral visual-field loss on automated perimetry. He is asymptomatic and did not notice any change in his vision. His intraocular pressures are borderline elevated.\nWhich treatment is considered first-line for this condition?", "options": [{"letter": "A", "text": "Emergent laser iridotomy"}, {"letter": "B", "text": "Intravitreal anti-VEGF injection"}, {"letter": "C", "text": "Systemic corticosteroids"}, {"letter": "D", "text": "Oral acetazolamide"}, {"letter": "E", "text": "Topical prostaglandin analog (latanoprost)"}], "correct": "E", "rationale": "Optic-disc cupping with painless peripheral field loss is chronic open-angle glaucoma. First-line therapy is a topical prostaglandin analog (or beta-blocker), aiming for >25% IOP reduction.", "objective": "Eye Obj 9 (Glaucoma)", "topic": "Eye"}, {"id": "53a", "number": 53, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Acute angle-closure glaucoma"}, {"letter": "B", "text": "Macular degeneration"}, {"letter": "C", "text": "Cataract"}, {"letter": "D", "text": "Chronic open-angle glaucoma"}], "correct": "D", "rationale": "Chronic open-angle glaucoma", "objective": "Eye Obj 9 (Glaucoma)", "topic": "Eye"}, {"id": "53b", "number": 53, "suffix": "b", "stem": "What is the treatment goal and hallmark finding?", "options": [{"letter": "A", "text": "Reduced drusen"}, {"letter": "B", "text": ">25% IOP reduction; increased cup:disc ratio"}, {"letter": "C", "text": "Normalized color vision"}, {"letter": "D", "text": "Fully restored peripheral fields"}], "correct": "B", "rationale": ">25% IOP reduction; increased cup:disc ratio", "objective": "Eye Obj 9 (Glaucoma)", "topic": "Eye"}, {"id": "54", "number": 54, "suffix": "", "stem": "A 32-year-old woman reports slowly progressive hearing loss over several years, worse for low-pitched sounds, along with tinnitus. She notes she hears better in noisy environments. Otoscopy is completely normal. Weber lateralizes to the affected ear, and Rinne shows bone conduction greater than air conduction on that side. Her mother had a similar problem.\nWhat is the most likely diagnosis?", "options": [{"letter": "A", "text": "Otosclerosis"}, {"letter": "B", "text": "Presbycusis"}, {"letter": "C", "text": "Meniere disease"}, {"letter": "D", "text": "Cholesteatoma"}, {"letter": "E", "text": "Acoustic neuroma"}], "correct": "A", "rationale": "Progressive conductive hearing loss (Weber to the affected ear, Rinne BC>AC) with a NORMAL otoscopic exam, before age 40, often with a family history, is otosclerosis (stapes footplate fixation). Treatment is a hearing aid or stapedectomy.", "objective": "Ear Obj 4 (Middle Ear / Otosclerosis)", "topic": "Ear Disorders"}, {"id": "54a", "number": 54, "suffix": "a", "stem": "What is the pathophysiology?", "options": [{"letter": "A", "text": "Endolymphatic hydrops"}, {"letter": "B", "text": "Cochlear hair-cell loss"}, {"letter": "C", "text": "Fixation of the stapes footplate"}, {"letter": "D", "text": "Otolith displacement"}], "correct": "C", "rationale": "Fixation of the stapes footplate", "objective": "Ear Obj 4 (Middle Ear / Otosclerosis)", "topic": "Ear Disorders"}, {"id": "54b", "number": 54, "suffix": "b", "stem": "What is the treatment?", "options": [{"letter": "A", "text": "Tympanostomy tubes"}, {"letter": "B", "text": "Hearing aid or stapedectomy"}, {"letter": "C", "text": "Epley maneuver"}, {"letter": "D", "text": "Antibiotics"}], "correct": "B", "rationale": "Hearing aid or stapedectomy", "objective": "Ear Obj 4 (Middle Ear / Otosclerosis)", "topic": "Ear Disorders"}, {"id": "55", "number": 55, "suffix": "", "stem": "An 8-year-old girl presents with a sudden sore throat, fever to 39°C, and difficulty swallowing. She has no cough or runny nose. On exam there is tonsillar exudate, tender anterior cervical lymphadenopathy, and palatal petechiae. Her rapid antigen detection test is positive.\nWhat is the most appropriate first-line treatment?", "options": [{"letter": "A", "text": "Penicillin V or amoxicillin"}, {"letter": "B", "text": "Ceftriaxone IV"}, {"letter": "C", "text": "Supportive care only"}, {"letter": "D", "text": "Azithromycin"}, {"letter": "E", "text": "Oral acyclovir"}], "correct": "A", "rationale": "Sudden sore throat, fever, exudate, tender anterior nodes, and NO cough with a positive RADT indicate group A streptococcal pharyngitis. First-line treatment is penicillin V or amoxicillin (cephalexin/clindamycin if penicillin-allergic).", "objective": "Oro A (Pharyngitis / Centor)", "topic": "Oropharynx"}, {"id": "55a", "number": 55, "suffix": "a", "stem": "What is the diagnosis and organism?", "options": [{"letter": "A", "text": "Diphtheria"}, {"letter": "B", "text": "Viral pharyngitis"}, {"letter": "C", "text": "Mononucleosis (EBV)"}, {"letter": "D", "text": "GAS pharyngitis (Strep pyogenes)"}], "correct": "D", "rationale": "GAS pharyngitis (Strep pyogenes)", "objective": "Oro A (Pharyngitis / Centor)", "topic": "Oropharynx"}, {"id": "55b", "number": 55, "suffix": "b", "stem": "What is the confirmatory test and PCN-allergic alternative?", "options": [{"letter": "A", "text": "Monospot; azithromycin"}, {"letter": "B", "text": "No test; supportive care"}, {"letter": "C", "text": "Throat culture (gold standard); cephalexin/clindamycin"}, {"letter": "D", "text": "Gram stain; vancomycin"}], "correct": "C", "rationale": "Throat culture (gold standard); cephalexin/clindamycin", "objective": "Oro A (Pharyngitis / Centor)", "topic": "Oropharynx"}, {"id": "56", "number": 56, "suffix": "", "stem": "A 35-year-old man develops sudden, severe, constant vertigo that has persisted for 2 days, with nausea and unsteadiness. He had a viral upper respiratory illness the week before. He has NO hearing loss and no tinnitus. Exam shows unidirectional horizontal nystagmus that beats away from the affected side and suppresses with visual fixation; there are no other neurologic deficits.\nWhat is the most likely diagnosis?", "options": [{"letter": "A", "text": "Meniere disease"}, {"letter": "B", "text": "Vestibular neuritis"}, {"letter": "C", "text": "BPPV"}, {"letter": "D", "text": "Labyrinthitis"}, {"letter": "E", "text": "Cerebellar stroke"}], "correct": "B", "rationale": "Sudden prolonged vertigo (days) after a viral prodrome, WITHOUT hearing loss, with peripheral (unidirectional, fixation-suppressed) nystagmus, is vestibular neuritis. If hearing loss were also present, labyrinthitis would be the diagnosis.", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "56a", "number": 56, "suffix": "a", "stem": "What is the treatment?", "options": [{"letter": "A", "text": "Antibiotics"}, {"letter": "B", "text": "Epley maneuver"}, {"letter": "C", "text": "Glucocorticoids ± antivirals; vestibular rehab"}, {"letter": "D", "text": "Low-salt diet + diuretic"}], "correct": "C", "rationale": "Glucocorticoids ± antivirals; vestibular rehab", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "56b", "number": 56, "suffix": "b", "stem": "What single finding would change the diagnosis to labyrinthitis?", "options": [{"letter": "A", "text": "Hearing loss"}, {"letter": "B", "text": "Facial droop"}, {"letter": "C", "text": "A positional trigger"}, {"letter": "D", "text": "Tinnitus with fullness"}], "correct": "A", "rationale": "Hearing loss", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "57", "number": 57, "suffix": "", "stem": "A 62-year-old man presents with severe ear pain and a painful vesicular rash in and around his right ear canal. He has developed right-sided facial droop that does not spare the forehead, along with vertigo, hearing loss, and altered taste. He reports the pain preceded the rash.\nWhat is the most appropriate treatment?", "options": [{"letter": "A", "text": "Surgical drainage"}, {"letter": "B", "text": "Topical antibiotic drops alone"}, {"letter": "C", "text": "Antivirals (valacyclovir) plus corticosteroids, with eye protection"}, {"letter": "D", "text": "Antifungal therapy"}, {"letter": "E", "text": "Oral fluoroquinolone"}], "correct": "C", "rationale": "Herpes zoster oticus (Ramsay Hunt syndrome) is VZV reactivation in the geniculate ganglion causing ear vesicles, peripheral CN VII palsy, vertigo, and hearing loss. Treatment is antivirals (valacyclovir) plus corticosteroids, with eye care to protect the cornea.", "objective": "Ear Obj 2 (EAC) / Cochleovestibular Obj 6 (Ramsay Hunt)", "topic": "Ear Disorders"}, {"id": "57a", "number": 57, "suffix": "a", "stem": "What is the diagnosis and virus?", "options": [{"letter": "A", "text": "Bell palsy; idiopathic"}, {"letter": "B", "text": "Ramsay Hunt (herpes zoster oticus); VZV"}, {"letter": "C", "text": "Otitis externa; Pseudomonas"}, {"letter": "D", "text": "Cholesteatoma; none"}], "correct": "B", "rationale": "Ramsay Hunt (herpes zoster oticus); VZV", "objective": "Ear Obj 2 (EAC) / Cochleovestibular Obj 6 (Ramsay Hunt)", "topic": "Ear Disorders"}, {"id": "57b", "number": 57, "suffix": "b", "stem": "Which two cranial nerves are involved?", "options": [{"letter": "A", "text": "CN V and VII"}, {"letter": "B", "text": "CN III and IV"}, {"letter": "C", "text": "CN IX and X"}, {"letter": "D", "text": "CN VII and CN VIII"}], "correct": "D", "rationale": "CN VII and CN VIII", "objective": "Ear Obj 2 (EAC) / Cochleovestibular Obj 6 (Ramsay Hunt)", "topic": "Ear Disorders"}, {"id": "58", "number": 58, "suffix": "", "stem": "A 55-year-old highly myopic man presents with sudden onset of flashing lights and a shower of new floaters in his right eye, followed by a 'curtain' descending over part of his visual field. There is no pain or redness. On dilated exam, a portion of the retina appears elevated and billowing in the vitreous, and 'tobacco dust' is seen.\nWhat is the most appropriate next step?", "options": [{"letter": "A", "text": "Topical antibiotic drops"}, {"letter": "B", "text": "Start oral prednisone"}, {"letter": "C", "text": "Reassurance and routine follow-up in 1 month"}, {"letter": "D", "text": "Immediate ophthalmology referral for surgical repair"}, {"letter": "E", "text": "Ocular massage and high-flow oxygen"}], "correct": "D", "rationale": "Flashes, new floaters, a curtain/shadow, Shafer's sign (tobacco dust), and an elevated retina indicate retinal detachment. This requires immediate ophthalmology referral for repair (cryotherapy/photocoagulation/surgery).", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "58a", "number": 58, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Vitreous hemorrhage"}, {"letter": "B", "text": "Posterior uveitis"}, {"letter": "C", "text": "CRAO"}, {"letter": "D", "text": "Retinal detachment"}], "correct": "D", "rationale": "Retinal detachment", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "58b", "number": 58, "suffix": "b", "stem": "What are the classic signs and a key risk factor?", "options": [{"letter": "A", "text": "Cherry-red spot; carotid disease"}, {"letter": "B", "text": "Drusen; smoking"}, {"letter": "C", "text": "Flashes, floaters, curtain, Shafer's sign; myopia"}, {"letter": "D", "text": "Blood-and-thunder hemorrhages; HTN"}], "correct": "C", "rationale": "Flashes, floaters, curtain, Shafer's sign; myopia", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "59", "number": 59, "suffix": "", "stem": "A 40-year-old woman has had facial pain and nasal congestion for 12 days. She initially began to improve around day 6 but then developed worsening unilateral maxillary pain, purulent nasal discharge, fever of 39.2°C, and pain in her upper molar teeth that worsens when she bends forward.\nWhich feature most supports acute bacterial (rather than viral)\nrhinosinusitis?", "options": [{"letter": "A", "text": "Presence of cough"}, {"letter": "B", "text": "Bilateral clear discharge"}, {"letter": "C", "text": "Symptom duration of 4 days"}, {"letter": "D", "text": "'Double sickening' - worsening after initial improvement"}, {"letter": "E", "text": "Absence of fever"}], "correct": "D", "rationale": "Acute bacterial rhinosinusitis is suggested by symptoms >10 days without improvement, severe symptoms (fever >=39°C with purulence/facial pain), or 'double sickening' (worsening after initial improvement). First-line treatment is amoxicillin or amoxicillin-clavulanate.", "objective": "Nose Obj 1b/1c/3 (Rhinosinusitis)", "topic": "Nose & Sinus"}, {"id": "59a", "number": 59, "suffix": "a", "stem": "What other criteria also support a bacterial cause?", "options": [{"letter": "A", "text": "Duration of only 4 days"}, {"letter": "B", "text": "Symptoms >10 days, or severe (fever ≥39°C + purulence ≥3 d)"}, {"letter": "C", "text": "Presence of a cough"}, {"letter": "D", "text": "Bilateral clear discharge"}], "correct": "B", "rationale": "Symptoms >10 days, or severe (fever ≥39°C + purulence ≥3 d)", "objective": "Nose Obj 1b/1c/3 (Rhinosinusitis)", "topic": "Nose & Sinus"}, {"id": "59b", "number": 59, "suffix": "b", "stem": "What is the first-line antibiotic?", "options": [{"letter": "A", "text": "Ciprofloxacin"}, {"letter": "B", "text": "Cephalexin"}, {"letter": "C", "text": "Amoxicillin ± clavulanate"}, {"letter": "D", "text": "Azithromycin"}], "correct": "C", "rationale": "Amoxicillin ± clavulanate", "objective": "Nose Obj 1b/1c/3 (Rhinosinusitis)", "topic": "Nose & Sinus"}, {"id": "60", "number": 60, "suffix": "", "stem": "A 74-year-old man reports difficulty hearing, especially understanding speech in noisy restaurants, that has worsened gradually over years. His wife says he keeps the television volume high. Otoscopy is normal bilaterally. Audiometry shows symmetric, bilateral high-frequency sensorineural hearing loss.\nWhat is the most appropriate management?", "options": [{"letter": "A", "text": "Hearing aids"}, {"letter": "B", "text": "Systemic corticosteroids"}, {"letter": "C", "text": "Tympanostomy tubes"}, {"letter": "D", "text": "Topical antibiotics"}, {"letter": "E", "text": "Stapedectomy"}], "correct": "A", "rationale": "Symmetric bilateral high-frequency SNHL in an older adult with difficulty in noise is presbycusis (age-related, irreversible hair-cell loss). Management is amplification with hearing aids (cochlear implant if aids fail).", "objective": "Cochleovestibular Obj 5 (Presbycusis)", "topic": "Cochleovestibular"}, {"id": "60a", "number": 60, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Ménière disease"}, {"letter": "B", "text": "Noise-induced hearing loss"}, {"letter": "C", "text": "Otosclerosis"}, {"letter": "D", "text": "Presbycusis"}], "correct": "D", "rationale": "Presbycusis", "objective": "Cochleovestibular Obj 5 (Presbycusis)", "topic": "Cochleovestibular"}, {"id": "60b", "number": 60, "suffix": "b", "stem": "What is the characteristic audiometric pattern?", "options": [{"letter": "A", "text": "Fluctuating low-mid SNHL"}, {"letter": "B", "text": "An isolated air-bone gap"}, {"letter": "C", "text": "Bilateral, symmetric, high-frequency SNHL"}, {"letter": "D", "text": "Unilateral low-frequency conductive loss"}], "correct": "C", "rationale": "Bilateral, symmetric, high-frequency SNHL", "objective": "Cochleovestibular Obj 5 (Presbycusis)", "topic": "Cochleovestibular"}, {"id": "61", "number": 61, "suffix": "", "stem": "A 6-year-old boy presents with chronic bilateral nasal obstruction and diminished sense of smell. On anterior rhinoscopy you see pale, gelatinous, grape-like masses in both nasal cavities. He also has a history of recurrent respiratory infections and greasy stools.\nWhich test should be ordered given the patient's age and findings?", "options": [{"letter": "A", "text": "Sweat chloride test for cystic fibrosis"}, {"letter": "B", "text": "Allergy skin testing only"}, {"letter": "C", "text": "Nasal culture"}, {"letter": "D", "text": "Monospot test"}, {"letter": "E", "text": "Sinus CT only"}], "correct": "A", "rationale": "Nasal polyps in a child mandate evaluation for cystic fibrosis (sweat chloride test), particularly with recurrent infections and steatorrhea. First-line treatment of polyps is intranasal corticosteroids.", "objective": "Nose Obj 1g (Benign Nasal Tumors)", "topic": "Nose & Sinus"}, {"id": "61a", "number": 61, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Angiofibroma"}, {"letter": "B", "text": "Nasal polyps (sinonasal polyposis)"}, {"letter": "C", "text": "A foreign body"}, {"letter": "D", "text": "Inverted papilloma"}], "correct": "B", "rationale": "Nasal polyps (sinonasal polyposis)", "objective": "Nose Obj 1g (Benign Nasal Tumors)", "topic": "Nose & Sinus"}, {"id": "61b", "number": 61, "suffix": "b", "stem": "What is the first-line treatment and the adult triad to know?", "options": [{"letter": "A", "text": "Intranasal steroids; Samter's triad (asthma + polyps + ASA)"}, {"letter": "B", "text": "Antihistamines; Virchow triad"}, {"letter": "C", "text": "Surgery first; Charcot triad"}, {"letter": "D", "text": "Antibiotics; Reye triad"}], "correct": "A", "rationale": "Intranasal steroids; Samter's triad (asthma + polyps + ASA)", "objective": "Nose Obj 1g (Benign Nasal Tumors)", "topic": "Nose & Sinus"}, {"id": "62", "number": 62, "suffix": "", "stem": "A 20-year-old collegiate wrestler presents after blunt trauma to his ear during a match. On exam there is a tender, fluctuant, boggy swelling over the anterior auricle that obscures the normal cartilaginous contours. There is no laceration.\nWhat is the most appropriate management to prevent 'cauliflower\near'?", "options": [{"letter": "A", "text": "Oral antibiotics alone"}, {"letter": "B", "text": "Warm compresses and observation"}, {"letter": "C", "text": "Ice and reassurance"}, {"letter": "D", "text": "Prompt incision/drainage or aspiration with a pressure dressing"}, {"letter": "E", "text": "Topical antibiotic ointment only"}], "correct": "D", "rationale": "An auricular hematoma must be drained promptly (I&D or aspiration) with a pressure dressing/bolster to prevent reaccumulation and avascular fibrocartilage overgrowth (cauliflower ear).", "objective": "Ear Obj 1 (Auricle)", "topic": "Ear Disorders"}, {"id": "62a", "number": 62, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Perichondritis"}, {"letter": "B", "text": "Auricular hematoma"}, {"letter": "C", "text": "Erysipelas"}, {"letter": "D", "text": "Cellulitis"}], "correct": "B", "rationale": "Auricular hematoma", "objective": "Ear Obj 1 (Auricle)", "topic": "Ear Disorders"}, {"id": "62b", "number": 62, "suffix": "b", "stem": "What complication occurs if it is not drained?", "options": [{"letter": "A", "text": "Saddle-nose deformity"}, {"letter": "B", "text": "Hearing loss"}, {"letter": "C", "text": "Cauliflower ear"}, {"letter": "D", "text": "Facial palsy"}], "correct": "C", "rationale": "Cauliflower ear", "objective": "Ear Obj 1 (Auricle)", "topic": "Ear Disorders"}, {"id": "63", "number": 63, "suffix": "", "stem": "A 70-year-old man using an inhaled corticosteroid for COPD presents with white patches on his tongue and buccal mucosa and a burning sensation with altered taste. When you scrape the plaques with a tongue depressor, they come off, leaving an erythematous, mildly bleeding base.\nWhich feature best distinguishes this condition from leukoplakia?", "options": [{"letter": "A", "text": "The lesion is painless and indurated"}, {"letter": "B", "text": "The lesion is a velvety red patch"}, {"letter": "C", "text": "It only occurs in immunocompetent hosts"}, {"letter": "D", "text": "The plaques cannot be removed by scraping"}, {"letter": "E", "text": "The plaques can be scraped off, leaving an erythematous base"}], "correct": "E", "rationale": "Oral candidiasis (thrush) plaques CAN be scraped off, revealing an erythematous, bleeding base - distinguishing it from leukoplakia, which cannot be scraped off. Rinsing after inhaler use helps prevent it; treat with topical or oral antifungals.", "objective": "Oro A (Oral Candidiasis)", "topic": "Oropharynx"}, {"id": "63a", "number": 63, "suffix": "a", "stem": "What is the diagnosis and organism?", "options": [{"letter": "A", "text": "Lichen planus; autoimmune"}, {"letter": "B", "text": "Leukoplakia; tobacco"}, {"letter": "C", "text": "Oral candidiasis; Candida albicans"}, {"letter": "D", "text": "Erythroplakia; HPV"}], "correct": "C", "rationale": "Oral candidiasis; Candida albicans", "objective": "Oro A (Oral Candidiasis)", "topic": "Oropharynx"}, {"id": "63b", "number": 63, "suffix": "b", "stem": "What is the treatment?", "options": [{"letter": "A", "text": "Excisional biopsy"}, {"letter": "B", "text": "Antibiotics"}, {"letter": "C", "text": "Topical antifungal or oral fluconazole"}, {"letter": "D", "text": "A topical steroid"}], "correct": "C", "rationale": "Topical antifungal or oral fluconazole", "objective": "Oro A (Oral Candidiasis)", "topic": "Oropharynx"}, {"id": "64", "number": 64, "suffix": "", "stem": "A 55-year-old man reports gradually progressive hearing loss and tinnitus in his right ear over 2 years, with mild unsteadiness but no discrete vertigo attacks. Audiometry confirms a unilateral (asymmetric) sensorineural hearing loss. He has no external or middle-ear abnormalities on otoscopy.\nWhat is the most appropriate diagnostic test?", "options": [{"letter": "A", "text": "Monospot test"}, {"letter": "B", "text": "Dix-Hallpike maneuver"}, {"letter": "C", "text": "Tympanometry"}, {"letter": "D", "text": "MRI of the internal auditory canals with contrast"}, {"letter": "E", "text": "Sinus CT"}], "correct": "D", "rationale": "Progressive UNILATERAL sensorineural hearing loss with tinnitus and compensated imbalance suggests an acoustic neuroma (vestibular schwannoma). MRI of the internal auditory canals with contrast is the diagnostic test of choice; unilateral/gradual SNHL always warrants MRI to exclude it.", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "64a", "number": 64, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Cholesteatoma"}, {"letter": "B", "text": "Acoustic neuroma (vestibular schwannoma)"}, {"letter": "C", "text": "Ménière disease"}, {"letter": "D", "text": "Presbycusis"}], "correct": "B", "rationale": "Acoustic neuroma (vestibular schwannoma)", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "64b", "number": 64, "suffix": "b", "stem": "What genetic condition is it associated with?", "options": [{"letter": "A", "text": "Trisomy 21"}, {"letter": "B", "text": "Chromosome 13q14"}, {"letter": "C", "text": "Neurofibromatosis type 2 (NF-2)"}, {"letter": "D", "text": "Neurofibromatosis type 1"}], "correct": "C", "rationale": "Neurofibromatosis type 2 (NF-2)", "objective": "Cochleovestibular Obj 6 (Peripheral Vertigo)", "topic": "Cochleovestibular"}, {"id": "65", "number": 65, "suffix": "", "stem": "A 19-year-old college student presents with a week of severe sore throat, marked fatigue, and low-grade fever. On exam there are enlarged tonsils with exudates, tender POSTERIOR cervical lymphadenopathy, and mild splenomegaly. A course of amoxicillin prescribed elsewhere produced a diffuse maculopapular rash.\nWhich complication should the patient be specifically counseled to\navoid?", "options": [{"letter": "A", "text": "Dairy products"}, {"letter": "B", "text": "Dental procedures"}, {"letter": "C", "text": "Contact sports for 3-4 weeks due to splenic rupture risk"}, {"letter": "D", "text": "Sun exposure"}, {"letter": "E", "text": "Air travel"}], "correct": "C", "rationale": "Infectious mononucleosis (EBV) presents with posterior cervical adenopathy, fatigue, splenomegaly, and an amoxicillin-induced rash. Patients should avoid contact sports for 3-4 weeks because of the risk of splenic rupture.", "objective": "Oro A (Infectious Mononucleosis)", "topic": "Oropharynx"}, {"id": "65a", "number": 65, "suffix": "a", "stem": "What is the diagnosis and organism?", "options": [{"letter": "A", "text": "Infectious mononucleosis; EBV"}, {"letter": "B", "text": "CMV mononucleosis; CMV"}, {"letter": "C", "text": "Strep pharyngitis; GAS"}, {"letter": "D", "text": "Diphtheria; C. diphtheriae"}], "correct": "A", "rationale": "Infectious mononucleosis; EBV", "objective": "Oro A (Infectious Mononucleosis)", "topic": "Oropharynx"}, {"id": "65b", "number": 65, "suffix": "b", "stem": "What tests confirm it?", "options": [{"letter": "A", "text": "Sweat chloride test"}, {"letter": "B", "text": "Gram stain"}, {"letter": "C", "text": "Throat culture only"}, {"letter": "D", "text": "Monospot, EBV serologies, atypical lymphocytes, ↑LFTs"}], "correct": "D", "rationale": "Monospot, EBV serologies, atypical lymphocytes, ↑LFTs", "objective": "Oro A (Infectious Mononucleosis)", "topic": "Oropharynx"}, {"id": "66", "number": 66, "suffix": "", "stem": "A newborn develops profuse, thick, hyperpurulent discharge from both eyes on day 3 of life. The mother had no prenatal care. On exam there is marked eyelid edema, copious purulent drainage, and chemosis. Gram stain of the discharge shows gram-negative intracellular diplococci. There is early corneal haze.\nWhat is the most appropriate management?", "options": [{"letter": "A", "text": "Reassurance and saline irrigation only"}, {"letter": "B", "text": "Intramuscular/intravenous ceftriaxone plus saline irrigation, treated as an emergency"}, {"letter": "C", "text": "Topical acyclovir gel"}, {"letter": "D", "text": "Topical erythromycin ointment alone"}, {"letter": "E", "text": "Oral azithromycin alone"}], "correct": "B", "rationale": "Gonococcal conjunctivitis (gram-negative diplococci, hyperpurulent discharge) is an ophthalmologic emergency due to corneal perforation risk. Treatment is systemic ceftriaxone plus saline irrigation, with added chlamydia coverage.", "objective": "Eye Obj 6 (Conjunctival Disorders)", "topic": "Eye"}, {"id": "66a", "number": 66, "suffix": "a", "stem": "What is the organism and Gram-stain appearance?", "options": [{"letter": "A", "text": "N. gonorrhoeae; gram-negative diplococci"}, {"letter": "B", "text": "Chlamydia; no organisms on stain"}, {"letter": "C", "text": "S. aureus; gram-positive cocci"}, {"letter": "D", "text": "Pseudomonas; gram-negative rods"}], "correct": "A", "rationale": "N. gonorrhoeae; gram-negative diplococci", "objective": "Eye Obj 6 (Conjunctival Disorders)", "topic": "Eye"}, {"id": "66b", "number": 66, "suffix": "b", "stem": "What additional coverage is required, and why?", "options": [{"letter": "A", "text": "Antiviral for HSV"}, {"letter": "B", "text": "Antifungal for Candida"}, {"letter": "C", "text": "None is needed"}, {"letter": "D", "text": "Azithromycin/doxycycline for chlamydia co-infection"}], "correct": "D", "rationale": "Azithromycin/doxycycline for chlamydia co-infection", "objective": "Eye Obj 6 (Conjunctival Disorders)", "topic": "Eye"}, {"id": "67", "number": 67, "suffix": "", "stem": "A 34-year-old woman with poorly controlled type 2 diabetes presents with a 2-day history of a painful, red bump on her right lower eyelid. She reports it came on quickly and is exquisitely tender to touch. On exam there is a localized, erythematous, pus-pointing nodule at the lid margin near an eyelash follicle. There is no proptosis, and extraocular movements are painless and full. Visual acuity is normal.\nWhat is the most appropriate initial management?", "options": [{"letter": "A", "text": "Intralesional corticosteroid injection"}, {"letter": "B", "text": "Urgent incision and drainage in the operating room"}, {"letter": "C", "text": "Warm compresses applied several times daily"}, {"letter": "D", "text": "Topical antiviral (trifluridine) drops"}, {"letter": "E", "text": "Oral fluoroquinolone with orbital CT imaging"}], "correct": "C", "rationale": "This is an external hordeolum (stye), an acute Staph aureus infection of an eyelash follicle/gland; diabetes is a risk factor. Warm compresses are the mainstay of treatment, with antibiotic ointment or I&D reserved for non-resolution.", "objective": "Eye Obj 4 (Eyelid Disorders)", "topic": "Eye"}, {"id": "67a", "number": 67, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "External hordeolum (stye)"}, {"letter": "B", "text": "Preseptal cellulitis"}, {"letter": "C", "text": "Blepharitis"}, {"letter": "D", "text": "Chalazion"}], "correct": "A", "rationale": "External hordeolum (stye)", "objective": "Eye Obj 4 (Eyelid Disorders)", "topic": "Eye"}, {"id": "67b", "number": 67, "suffix": "b", "stem": "What is the causative organism?", "options": [{"letter": "A", "text": "Strep pyogenes"}, {"letter": "B", "text": "Pseudomonas"}, {"letter": "C", "text": "Candida"}, {"letter": "D", "text": "Staphylococcus aureus"}], "correct": "D", "rationale": "Staphylococcus aureus", "objective": "Eye Obj 4 (Eyelid Disorders)", "topic": "Eye"}, {"id": "68", "number": 68, "suffix": "", "stem": "A 45-year-old woman presents with abrupt onset of fever, chills, and a rapidly spreading, sharply demarcated, fiery-red, raised plaque involving her right ear, including the earlobe. The skin is warm and tender, and there is a well-defined, indurated border. She has tender preauricular lymphadenopathy.\nWhat is the most likely organism and appropriate first-line\ntreatment?", "options": [{"letter": "A", "text": "Candida albicans; fluconazole"}, {"letter": "B", "text": "Staphylococcus aureus; vancomycin"}, {"letter": "C", "text": "Herpes zoster; valacyclovir"}, {"letter": "D", "text": "Pseudomonas aeruginosa; ciprofloxacin"}, {"letter": "E", "text": "Group A Streptococcus; penicillin or amoxicillin"}], "correct": "E", "rationale": "Erysipelas (a sharply demarcated, raised, fiery-red plaque involving the lobule with systemic symptoms) is usually caused by group A Streptococcus. First-line treatment is penicillin or amoxicillin. Lobule involvement helps distinguish it from perichondritis.", "objective": "Ear Obj 1 (Auricle)", "topic": "Ear Disorders"}, {"id": "68a", "number": 68, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Erysipelas"}, {"letter": "B", "text": "Perichondritis"}, {"letter": "C", "text": "Contact dermatitis"}, {"letter": "D", "text": "Auricular hematoma"}], "correct": "A", "rationale": "Erysipelas", "objective": "Ear Obj 1 (Auricle)", "topic": "Ear Disorders"}, {"id": "68b", "number": 68, "suffix": "b", "stem": "What feature distinguishes it from perichondritis?", "options": [{"letter": "A", "text": "It spares the earlobe"}, {"letter": "B", "text": "It involves the earlobe (perichondritis spares it)"}, {"letter": "C", "text": "It is caused by Pseudomonas"}, {"letter": "D", "text": "Pain out of proportion to exam"}], "correct": "B", "rationale": "It involves the earlobe (perichondritis spares it)", "objective": "Ear Obj 1 (Auricle)", "topic": "Ear Disorders"}, {"id": "69", "number": 69, "suffix": "", "stem": "A 55-year-old man reports recurrent pain and swelling under his jaw that predictably occurs at the start of meals and then gradually subsides afterward. On bimanual palpation of the floor of the mouth you feel a firm, discrete stone along the course of the submandibular (Wharton's) duct. There is no purulent discharge.\nWhat is the most likely diagnosis?", "options": [{"letter": "A", "text": "Bacterial sialadenitis"}, {"letter": "B", "text": "Peritonsillar abscess"}, {"letter": "C", "text": "Dental abscess"}, {"letter": "D", "text": "Sialolithiasis"}, {"letter": "E", "text": "Viral parotitis (mumps)"}], "correct": "D", "rationale": "Mealtime pain/swelling that subsides afterward ('mealtime syndrome') with a palpable stone in Wharton's duct is sialolithiasis, most commonly affecting the submandibular gland. Initial management is hydration, moist heat, massage/milking the duct, and sialogogues.", "objective": "Oro B (Salivary Glands)", "topic": "Oropharynx"}, {"id": "69a", "number": 69, "suffix": "a", "stem": "Which gland and duct are most commonly involved?", "options": [{"letter": "A", "text": "Parotid gland (Stensen's duct)"}, {"letter": "B", "text": "Submandibular gland (Wharton's duct)"}, {"letter": "C", "text": "Sublingual gland"}, {"letter": "D", "text": "Lacrimal gland"}], "correct": "B", "rationale": "Submandibular gland (Wharton's duct)", "objective": "Oro B (Salivary Glands)", "topic": "Oropharynx"}, {"id": "69b", "number": 69, "suffix": "b", "stem": "What is the initial management?", "options": [{"letter": "A", "text": "Antivirals"}, {"letter": "B", "text": "IV antibiotics"}, {"letter": "C", "text": "Hydration, moist heat, massage, sialogogues"}, {"letter": "D", "text": "Immediate surgery"}], "correct": "C", "rationale": "Hydration, moist heat, massage, sialogogues", "objective": "Oro B (Salivary Glands)", "topic": "Oropharynx"}, {"id": "70", "number": 70, "suffix": "", "stem": "A 70-year-old man hospitalized for a severe gram-negative infection is receiving an aminoglycoside antibiotic. Several days into therapy he reports new tinnitus, decreased hearing, and unsteadiness/oscillopsia when walking.\nWhich class of medication is the classic cause of BOTH cochlear and\nvestibular toxicity in this scenario?", "options": [{"letter": "A", "text": "Salicylates"}, {"letter": "B", "text": "Macrolides"}, {"letter": "C", "text": "Platinum-based chemotherapy"}, {"letter": "D", "text": "Loop diuretics"}, {"letter": "E", "text": "Aminoglycosides (e.g., gentamicin)"}], "correct": "E", "rationale": "Aminoglycosides (e.g., gentamicin) are the classic ototoxins causing BOTH cochlear (hearing loss/tinnitus) and vestibular (imbalance/oscillopsia) toxicity by damaging hair cells/stereocilia.", "objective": "Cochleovestibular Obj 2 (Ototoxic Medications)", "topic": "Cochleovestibular"}, {"id": "70a", "number": 70, "suffix": "a", "stem": "What is the mechanism of injury?", "options": [{"letter": "A", "text": "Ossicular fixation"}, {"letter": "B", "text": "Endolymph overproduction"}, {"letter": "C", "text": "Eustachian tube dysfunction"}, {"letter": "D", "text": "Damage to cochlear hair cells/stereocilia and vestibular apparatus"}], "correct": "D", "rationale": "Damage to cochlear hair cells/stereocilia and vestibular apparatus", "objective": "Cochleovestibular Obj 2 (Ototoxic Medications)", "topic": "Cochleovestibular"}, {"id": "70b", "number": 70, "suffix": "b", "stem": "Which two systems are affected?", "options": [{"letter": "A", "text": "Neither (conductive)"}, {"letter": "B", "text": "Both cochlear and vestibular"}, {"letter": "C", "text": "Cochlear only"}, {"letter": "D", "text": "Vestibular only"}], "correct": "B", "rationale": "Both cochlear and vestibular", "objective": "Cochleovestibular Obj 2 (Ototoxic Medications)", "topic": "Cochleovestibular"}, {"id": "71", "number": 71, "suffix": "", "stem": "A 65-year-old hyperopic woman presents to the ED with sudden severe pain in her right eye, blurred vision, and halos around lights that began after she went into a dark movie theater. She is nauseated and vomiting. On exam the eye is red with a steamy (hazy) cornea, ciliary flush, and a mid-dilated, fixed, nonreactive pupil. The globe feels hard.\nWhat is the most likely diagnosis?", "options": [{"letter": "A", "text": "Central retinal artery occlusion"}, {"letter": "B", "text": "Anterior uveitis"}, {"letter": "C", "text": "Acute angle-closure glaucoma"}, {"letter": "D", "text": "Optic neuritis"}, {"letter": "E", "text": "Chronic open-angle glaucoma"}], "correct": "C", "rationale": "Sudden painful red eye with halos, a steamy cornea, a mid-dilated fixed pupil, a hard globe, and nausea/vomiting after mydriasis (dark room) is acute angle-closure glaucoma, an emergency.", "objective": "Eye Obj 9 (Glaucoma)", "topic": "Eye"}, {"id": "71a", "number": 71, "suffix": "a", "stem": "What triggered this, and which refractive error predisposes?", "options": [{"letter": "A", "text": "Mydriasis (dark room); hyperopia"}, {"letter": "B", "text": "Bright light; myopia"}, {"letter": "C", "text": "Trauma; astigmatism"}, {"letter": "D", "text": "Reading; presbyopia"}], "correct": "A", "rationale": "Mydriasis (dark room); hyperopia", "objective": "Eye Obj 9 (Glaucoma)", "topic": "Eye"}, {"id": "71b", "number": 71, "suffix": "b", "stem": "What is the immediate and the definitive treatment?", "options": [{"letter": "A", "text": "Anti-VEGF injection"}, {"letter": "B", "text": "Prostaglandin drops only"}, {"letter": "C", "text": "Warm compresses"}, {"letter": "D", "text": "Acetazolamide + drops → laser iridotomy"}], "correct": "D", "rationale": "Acetazolamide + drops → laser iridotomy", "objective": "Eye Obj 9 (Glaucoma)", "topic": "Eye"}, {"id": "72", "number": 72, "suffix": "", "stem": "A 24-year-old contact-lens wearer presents with 3 days of a red right eye that is stuck shut with thick yellow crust each morning. She reports a gritty sensation but denies significant itching or pain, and her vision is unaffected. On exam there is unilateral conjunctival injection with mucopurulent discharge; the cornea is clear on fluorescein staining and there is no preauricular lymphadenopathy.\nWhat is the most likely diagnosis?", "options": [{"letter": "A", "text": "Allergic conjunctivitis"}, {"letter": "B", "text": "Acute angle-closure glaucoma"}, {"letter": "C", "text": "Anterior uveitis"}, {"letter": "D", "text": "Bacterial conjunctivitis"}, {"letter": "E", "text": "Viral conjunctivitis"}], "correct": "D", "rationale": "Mucopurulent discharge with lids stuck shut in the morning, usually unilateral, without itching or a preauricular node, is characteristic of bacterial conjunctivitis (commonly Staph/Strep).", "objective": "Eye Obj 6 (Conjunctival Disorders)", "topic": "Eye"}, {"id": "72a", "number": 72, "suffix": "a", "stem": "What is the first-line treatment?", "options": [{"letter": "A", "text": "Erythromycin or trimethoprim-polymyxin B drops"}, {"letter": "B", "text": "A topical antihistamine"}, {"letter": "C", "text": "Warm compresses only"}, {"letter": "D", "text": "Oral acyclovir"}], "correct": "A", "rationale": "Erythromycin or trimethoprim-polymyxin B drops", "objective": "Eye Obj 6 (Conjunctival Disorders)", "topic": "Eye"}, {"id": "72b", "number": 72, "suffix": "b", "stem": "This patient wears contacts — what organism must be covered, and with what?", "options": [{"letter": "A", "text": "Pseudomonas; a fluoroquinolone"}, {"letter": "B", "text": "Fungal; natamycin"}, {"letter": "C", "text": "Adenovirus; supportive care"}, {"letter": "D", "text": "Staph; doxycycline"}], "correct": "A", "rationale": "Pseudomonas; a fluoroquinolone", "objective": "Eye Obj 6 (Conjunctival Disorders)", "topic": "Eye"}, {"id": "73", "number": 73, "suffix": "", "stem": "A 30-year-old man with a long history of recurrent ear infections presents with chronic, painless, foul-smelling drainage from his left ear and gradual hearing loss. On otoscopy there is a retraction pocket in the superior tympanic membrane filled with white, keratinous, desquamated debris, and a pearly mass is visible behind the drum.\nWhat is the most appropriate definitive management?", "options": [{"letter": "A", "text": "Oral antibiotics alone"}, {"letter": "B", "text": "Surgical removal"}, {"letter": "C", "text": "Topical antifungal drops"}, {"letter": "D", "text": "Observation with annual audiograms"}, {"letter": "E", "text": "Systemic corticosteroids"}], "correct": "B", "rationale": "Painless foul otorrhea with a retraction pocket, keratin debris, and a pearly mass indicates cholesteatoma (trapped squamous epithelium eroding bone). CT confirms extent, and definitive treatment is surgical removal to prevent serious complications (e.g., intracranial spread).", "objective": "Ear Obj 4 (Middle Ear / Cholesteatoma)", "topic": "Ear Disorders"}, {"id": "73a", "number": 73, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Otosclerosis"}, {"letter": "B", "text": "Acoustic neuroma"}, {"letter": "C", "text": "Cholesteatoma"}, {"letter": "D", "text": "Chronic otitis media alone"}], "correct": "C", "rationale": "Cholesteatoma", "objective": "Ear Obj 4 (Middle Ear / Cholesteatoma)", "topic": "Ear Disorders"}, {"id": "73b", "number": 73, "suffix": "b", "stem": "What confirms its extent, and why is it dangerous?", "options": [{"letter": "A", "text": "MRI; it is benign with no risk"}, {"letter": "B", "text": "CT; it erodes bone → CNS complications (abscess/meningitis)"}, {"letter": "C", "text": "Audiogram; it self-limits"}, {"letter": "D", "text": "X-ray; it is cosmetic only"}], "correct": "B", "rationale": "CT; it erodes bone → CNS complications (abscess/meningitis)", "objective": "Ear Obj 4 (Middle Ear / Cholesteatoma)", "topic": "Ear Disorders"}, {"id": "74", "number": 74, "suffix": "", "stem": "A 3-year-old boy who was inadequately treated for an ear infection over the past 2 weeks now presents with fever, ear pain, and swelling behind the ear. On exam the auricle is pushed forward and outward, and there is erythema, tenderness, and fluctuance over the mastoid process with loss of the postauricular crease. The tympanic membrane shows signs of acute otitis media.\nWhat is the most appropriate management?", "options": [{"letter": "A", "text": "Topical antibiotic drops"}, {"letter": "B", "text": "Observation with follow-up in 1 week"}, {"letter": "C", "text": "Antihistamines and decongestants"}, {"letter": "D", "text": "ENT consultation with IV antibiotics and drainage (myringotomy)"}, {"letter": "E", "text": "Oral amoxicillin as an outpatient"}], "correct": "D", "rationale": "Postauricular swelling/erythema with a protruding auricle after inadequately treated AOM indicates acute mastoiditis. Management requires ENT consultation, IV antibiotics, and drainage (myringotomy +/- tympanostomy), with imaging if the presentation is atypical.", "objective": "Ear Obj 5 (Complications / Mastoiditis)", "topic": "Ear Disorders"}, {"id": "74a", "number": 74, "suffix": "a", "stem": "What is the diagnosis?", "options": [{"letter": "A", "text": "Cellulitis"}, {"letter": "B", "text": "Acute mastoiditis"}, {"letter": "C", "text": "Otitis externa"}, {"letter": "D", "text": "Cholesteatoma"}], "correct": "B", "rationale": "Acute mastoiditis", "objective": "Ear Obj 5 (Complications / Mastoiditis)", "topic": "Ear Disorders"}, {"id": "74b", "number": 74, "suffix": "b", "stem": "What is the hallmark exam sign and the common organisms?", "options": [{"letter": "A", "text": "Ear vesicles; VZV"}, {"letter": "B", "text": "Protruding auricle, loss of postauricular crease; S. pneumoniae/pyogenes/aureus"}, {"letter": "C", "text": "Tragal tenderness; Pseudomonas"}, {"letter": "D", "text": "Pearly mass; Candida"}], "correct": "B", "rationale": "Protruding auricle, loss of postauricular crease; S. pneumoniae/pyogenes/aureus", "objective": "Ear Obj 5 (Complications / Mastoiditis)", "topic": "Ear Disorders"}, {"id": "75", "number": 75, "suffix": "", "stem": "A 68-year-old woman with hypertension, diabetes, and glaucoma has sudden painless loss of vision in her left eye. On fundoscopic exam there are diffuse retinal hemorrhages in all four quadrants ('blood and thunder' appearance), dilated tortuous veins, a swollen optic disc, and cotton-wool spots.\nWhat is the most likely diagnosis?", "options": [{"letter": "A", "text": "Retinal detachment"}, {"letter": "B", "text": "Optic neuritis"}, {"letter": "C", "text": "Central retinal vein occlusion"}, {"letter": "D", "text": "Central retinal artery occlusion"}, {"letter": "E", "text": "Hypertensive emergency with papilledema"}], "correct": "C", "rationale": "Diffuse 'blood and thunder' hemorrhages with dilated veins, disc swelling, and cotton-wool spots indicate central retinal vein occlusion, associated with HTN, DM, and glaucoma. CRAO instead shows a pale retina with a cherry-red spot.", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "75a", "number": 75, "suffix": "a", "stem": "What is the treatment?", "options": [{"letter": "A", "text": "Anti-VEGF or laser for macular edema"}, {"letter": "B", "text": "Ocular massage + high-flow oxygen"}, {"letter": "C", "text": "Laser iridotomy"}, {"letter": "D", "text": "IV steroids"}], "correct": "A", "rationale": "Anti-VEGF or laser for macular edema", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}, {"id": "75b", "number": 75, "suffix": "b", "stem": "How does a CRAO fundus differ from this?", "options": [{"letter": "A", "text": "Pale retina with a cherry-red spot"}, {"letter": "B", "text": "Drusen"}, {"letter": "C", "text": "Blood-and-thunder hemorrhages"}, {"letter": "D", "text": "Disc swelling from raised ICP"}], "correct": "A", "rationale": "Pale retina with a cherry-red spot", "objective": "Eye Obj 14 (Posterior Eye & Retinopathy)", "topic": "Eye"}];
const state={page:0,answers:{},reviewMissed:false};
const totalPages=75;
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function pageQuestions(page){const n=page+1;return questions.filter(q=>q.number===n)}
function renderPage(){
 document.getElementById('results').classList.remove('show');document.getElementById('exam').classList.remove('hidden');
 const qs=state.reviewMissed?questions.filter(q=>state.answers[q.id]&&state.answers[q.id]!==q.correct):pageQuestions(state.page);
 const grid=document.getElementById('pageGrid');grid.innerHTML='';
 if(state.reviewMissed){qs.forEach(q=>grid.appendChild(card(q)));document.getElementById('pageLabel').textContent='Review Missed';document.getElementById('prevBtn').classList.add('hidden');document.getElementById('nextBtn').textContent='Back to Results';}
 else{qs.forEach(q=>grid.appendChild(card(q)));document.getElementById('pageLabel').textContent=`Set ${state.page+1} of ${totalPages}`;document.getElementById('prevBtn').classList.toggle('hidden',state.page===0);document.getElementById('nextBtn').textContent=state.page===totalPages-1?'Submit Exam':'Next';}
 updateProgress();window.scrollTo({top:0,behavior:'smooth'});
}
function card(q){
 const art=document.createElement('article');art.className='question-card';art.id='q-'+q.id;
 art.innerHTML=`<div class="q-label">Question ${esc(q.id.toUpperCase())}</div><div class="stem">${esc(q.stem)}</div><div class="options"></div><div class="feedback"></div>`;
 const opts=art.querySelector('.options');
 q.options.forEach(o=>{const b=document.createElement('button');b.className='option';b.innerHTML=`<span class="letter">${o.letter}</span><span>${esc(o.text)}</span>`;b.onclick=()=>choose(q,o.letter,art);opts.appendChild(b)});
 if(state.answers[q.id]) applyFeedback(q,state.answers[q.id],art);
 return art;
}
function choose(q,letter,art){if(state.answers[q.id])return;state.answers[q.id]=letter;applyFeedback(q,letter,art);updateProgress()}
function applyFeedback(q,selected,art){
 const buttons=[...art.querySelectorAll('.option')];buttons.forEach((b,i)=>{b.disabled=true;const l=q.options[i].letter;if(l===q.correct)b.classList.add('correct');if(l===selected&&l!==q.correct)b.classList.add('incorrect')});
 const good=selected===q.correct, f=art.querySelector('.feedback');f.className='feedback show '+(good?'good':'bad');
 const correctOpt=q.options.find(o=>o.letter===q.correct);
 f.innerHTML=`<div class="feedback-title">${good?'Correct':'Incorrect'}</div>${good?'':`<div><strong>Correct answer:</strong> ${q.correct}. ${esc(correctOpt?.text||'')}</div>`}<div class="meta"><strong>Rationale:</strong> ${esc(q.rationale||'No rationale provided.')}</div><div class="meta"><strong>Objective:</strong> ${esc(q.objective||'Not specified')}</div>`;
}
function updateProgress(){const n=Object.keys(state.answers).length;document.getElementById('answeredLabel').textContent=`${n} / ${questions.length} answered`;document.getElementById('progressBar').style.width=(n/questions.length*100)+'%'}
function submitExam(){
 const correct=questions.filter(q=>state.answers[q.id]===q.correct).length, answered=Object.keys(state.answers).length, pct=Math.round(correct/questions.length*1000)/10;
 const by={};questions.forEach(q=>{by[q.topic]??={c:0,t:0};by[q.topic].t++;if(state.answers[q.id]===q.correct)by[q.topic].c++});
 const rows=Object.entries(by).filter(([k])=>k!=='Other').sort((a,b)=>(b[1].c/b[1].t)-(a[1].c/a[1].t)).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${v.c} / ${v.t}</td><td>${Math.round(v.c/v.t*1000)/10}%</td></tr>`).join('');
 const missed=questions.length-correct;
 const r=document.getElementById('results');r.innerHTML=`<h2>Exam Results</h2><div class="score-big">${pct}%</div><div class="result-grid"><div class="metric"><b>${correct} / ${questions.length}</b>Correct</div><div class="metric"><b>${missed}</b>Missed / unanswered</div><div class="metric"><b>${answered}</b>Answered</div></div><h3>Performance by section</h3><table class="topic-table"><thead><tr><th>Section</th><th>Score</th><th>Percent</th></tr></thead><tbody>${rows}</tbody></table><div class="nav"><button class="btn btn-secondary" id="resetBtn">Reset Exam</button><button class="btn btn-primary" id="reviewBtn" ${missed===0?'disabled':''}>Review Missed Questions</button></div><p class="review-note">Unanswered questions count as incorrect in the final score.</p>`;
 document.getElementById('exam').classList.add('hidden');document.getElementById('intro').classList.add('hidden');r.classList.add('show');document.getElementById('pageLabel').textContent='Results';
 document.getElementById('resetBtn').onclick=resetExam;document.getElementById('reviewBtn').onclick=()=>{state.reviewMissed=true;renderPage()};window.scrollTo({top:0,behavior:'smooth'});
}
function resetExam(){if(!confirm('Reset all answers and restart the exam?'))return;state.page=0;state.answers={};state.reviewMissed=false;document.getElementById('intro').classList.remove('hidden');renderPage()}
document.getElementById('prevBtn').onclick=()=>{state.page=Math.max(0,state.page-1);renderPage()};
document.getElementById('nextBtn').onclick=()=>{if(state.reviewMissed){state.reviewMissed=false;submitExam();return}if(state.page===totalPages-1)submitExam();else{state.page++;renderPage()}};
renderPage();
</script></body></html>
