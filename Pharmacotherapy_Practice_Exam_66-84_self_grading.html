<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pharmacotherapy Practice Exam Questions 66–84</title>
<style>
:root {
  --bg:#f4f7fb; --card:#ffffff; --ink:#102033; --muted:#5d6b7c;
  --blue:#1d4ed8; --blue2:#dbeafe; --green:#dcfce7; --green-border:#22c55e;
  --red:#fee2e2; --red-border:#ef4444; --gray:#e5e7eb; --shadow:0 14px 35px rgba(15,23,42,.10);
}
* { box-sizing: border-box; }
body {
  margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:linear-gradient(180deg,#eff6ff 0%, var(--bg) 220px); color:var(--ink);
  line-height:1.55;
}
header {
  padding:28px 18px 18px; text-align:center;
}
header h1 { margin:0; font-size:clamp(1.6rem,4vw,2.5rem); letter-spacing:-.03em; }
header p { margin:8px auto 0; max-width:760px; color:var(--muted); font-size:1.05rem; }
.container { max-width:980px; margin:0 auto; padding:18px; }
.panel {
  background:var(--card); border:1px solid #e7edf7; border-radius:22px; box-shadow:var(--shadow);
  padding:clamp(16px,3vw,28px); margin-bottom:18px;
}
.stats {
  display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin:12px 0 0;
}
.pill {
  background:var(--blue2); color:#1e3a8a; padding:8px 12px; border-radius:999px; font-weight:700;
}
.question-card {
  background:var(--card); border:1px solid #e7edf7; border-radius:20px; padding:22px;
  margin:18px 0; box-shadow:0 8px 22px rgba(15,23,42,.06);
}
.qhead { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
.qnum { font-weight:900; color:var(--blue); font-size:1.05rem; }
.qtext { font-size:1.12rem; font-weight:650; margin:8px 0 16px; }
.choice {
  display:flex; align-items:flex-start; gap:10px; padding:13px 14px; border:2px solid var(--gray);
  border-radius:14px; margin:10px 0; cursor:pointer; background:#fff; transition:.15s ease;
}
.choice:hover { border-color:#93c5fd; background:#f8fbff; }
.choice input { margin-top:4px; transform:scale(1.15); }
.choice .letter { font-weight:900; min-width:26px; color:#334155; }
.choice.correct { background:var(--green); border-color:var(--green-border); }
.choice.incorrect { background:var(--red); border-color:var(--red-border); }
.feedback {
  display:none; margin-top:13px; padding:13px 15px; border-radius:14px; background:#f8fafc; border:1px solid #dbe3ef;
  color:#334155; font-weight:650;
}
.feedback.show { display:block; }
.buttons {
  position:sticky; bottom:0; z-index:10; background:rgba(244,247,251,.92); backdrop-filter: blur(8px);
  border-top:1px solid #dbe3ef; padding:14px 0; margin-top:16px;
}
.button-row { max-width:980px; margin:0 auto; padding:0 18px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
button {
  appearance:none; border:0; border-radius:999px; padding:13px 18px; font-size:1rem; font-weight:850;
  cursor:pointer; box-shadow:0 8px 18px rgba(15,23,42,.10);
}
.primary { background:var(--blue); color:white; }
.secondary { background:#fff; color:#1e293b; border:1px solid #cbd5e1; }
.result {
  display:none; text-align:center; padding:18px; border-radius:18px; background:#eef6ff; border:1px solid #bfdbfe;
  margin-bottom:18px;
}
.result.show { display:block; }
.result strong { font-size:1.55rem; color:#1d4ed8; }
.unanswered { outline:3px solid #fbbf24; }
@media (max-width:640px) {
  .container { padding:10px; }
  .question-card { padding:16px; border-radius:16px; }
  .choice { padding:12px; }
  button { width:100%; }
}
</style>
</head>
<body>
<header>
  <h1>Pharmacotherapy Practice Exam Questions 66–84</h1>
  <p>Self-grading medical board-review style practice exam. Select the single best answer for each question.</p>
  <div class="stats">
    <span class="pill">19 questions</span>
    <span class="pill">Single best answer</span>
    <span class="pill">Pulmonology • Infectious Disease • Anticoagulation</span>
  </div>
</header>

<main class="container">
  <section id="result" class="result"></section>
  <section id="exam"></section>
</main>

<div class="buttons">
  <div class="button-row">
    <button class="primary" onclick="gradeExam()">Submit & Grade</button>
    <button class="secondary" onclick="resetExam()">Reset Exam</button>
    <button class="secondary" onclick="reviewMissed()">Review Missed Questions</button>
  </div>
</div>

<script>
const questions = [{"number": 66, "question": "A 62-year-old man with a recent stroke is admitted to the hospital and intubated on hospital day 3 due to declining mental status. The following morning (less than 48 hours on mechanical ventilation) he develops fever, increased sputum production, and a new infiltrate on chest X-ray. What type of pneumonia has he developed?", "choices": {"A": "Hospital-acquired pneumonia (HAP)", "B": "Pneumocystis jirovecii pneumonia (PCP)", "C": "Ventilator-associated pneumonia (VAP)", "D": "Community-acquired pneumonia (CAP)", "E": "Aspiration pneumonia"}, "answer": "A", "rationale": "Correct answer: Hospital-acquired pneumonia (HAP)"}, {"number": 67, "question": "A 51-year-old man is prescribed azithromycin and amoxicillin/clavulanate for community-acquired pneumonia. He calls the clinic later that day reporting pleuritic chest pain and persistent fever and asks what he can take at home for relief. What is the most appropriate recommendation?", "choices": {"A": "Aspirin 325 mg", "B": "Naproxen sodium", "C": "Ibuprofen", "D": "Acetaminophen (Tylenol)", "E": "Codeine"}, "answer": "D", "rationale": "Correct answer: Acetaminophen (Tylenol)"}, {"number": 68, "question": "A 75-year-old woman is admitted to the medical ICU for septic shock and placed on mechanical ventilation on hospital day 2. On hospital day 5 (3 days on the ventilator), she develops worsening hypoxia, fever, leukocytosis, and a new bilateral infiltrate on chest X-ray. What type of pneumonia has she developed?", "choices": {"A": "Hospital-acquired pneumonia (HAP)", "B": "Community-acquired pneumonia (CAP)", "C": "Opportunistic fungal pneumonia", "D": "Aspiration pneumonia", "E": "Ventilator-associated pneumonia (VAP)"}, "answer": "E", "rationale": "Correct answer: Ventilator-associated pneumonia (VAP)"}, {"number": 69, "question": "A 47-year-old woman being treated for community-acquired pneumonia calls the office reporting that her cough is very productive with thick secretions she cannot clear. She asks for an over-the-counter option to loosen the mucus and make it easier to expectorate. What should you recommend?", "choices": {"A": "Dextromethorphan", "B": "Diphenhydramine", "C": "Benzonatate", "D": "Guaifenesin", "E": "Pseudoephedrine"}, "answer": "D", "rationale": "Correct answer: Guaifenesin"}, {"number": 70, "question": "A 68-year-old man with COPD was hospitalized one month ago for an elective procedure. He now presents to urgent care with 3 days of productive cough, fever, and a new pulmonary infiltrate on chest X-ray. His symptoms do not meet CURB-65 admission criteria. What is the most appropriate treatment?", "choices": {"A": "LABA/LAMA escalation only, no antibiotics", "B": "Community-acquired pneumonia antibiotics plus corticosteroids if needed for COPD exacerbation", "C": "RIPE therapy pending TB workup", "D": "Watchful waiting with chest X-ray in one week", "E": "Vancomycin plus piperacillin/tazobactam"}, "answer": "B", "rationale": "Correct answer: Community-acquired pneumonia antibiotics plus corticosteroids if needed for COPD exacerbation"}, {"number": 71, "question": "A 79-year-old woman with CKD stage 4 (creatinine clearance 24 mL/min) presents with an acute DVT requiring anticoagulation. Which anticoagulant is most appropriate given her renal function?", "choices": {"A": "Apixaban at standard dose", "B": "LMWH with dose adjustment or unfractionated heparin (UFH)", "C": "Dabigatran", "D": "Rivaroxaban at standard dose", "E": "Fondaparinux"}, "answer": "B", "rationale": "Correct answer: LMWH with dose adjustment or unfractionated heparin (UFH)"}, {"number": 72, "question": "A 71-year-old man on warfarin for mechanical heart valve replacement is seen in clinic for INR management. During counseling, you review substances that can significantly alter his INR. Which of the following is correctly identified as a substance that interacts with warfarin?", "choices": {"A": "Calcium carbonate antacid", "B": "Metformin", "C": "Lisinopril", "D": "Acetaminophen 325 mg daily", "E": "Metronidazole"}, "answer": "E", "rationale": "Correct answer: Metronidazole"}, {"number": 73, "question": "A 72-year-old man with structural lung disease and a prior respiratory culture positive for Pseudomonas aeruginosa is hospitalized with severe pneumonia meeting CURB-65 admission criteria. He is started on standard inpatient CAP therapy. What antibiotic should be added to provide anti-pseudomonal coverage?", "choices": {"A": "Azithromycin", "B": "Cefepime", "C": "Doxycycline", "D": "Trimethoprim/sulfamethoxazole", "E": "Vancomycin"}, "answer": "B", "rationale": "Correct answer: Cefepime"}, {"number": 74, "question": "A 58-year-old man is admitted to the hospital for elective hip replacement. On hospital day 3, he develops fever, a productive cough, and a new left lower lobe infiltrate on chest X-ray. He has never been on mechanical ventilation. What type of pneumonia has he developed?", "choices": {"A": "Hospital-acquired pneumonia (HAP)", "B": "Aspiration pneumonia", "C": "Ventilator-associated pneumonia (VAP)", "D": "Community-acquired pneumonia (CAP)", "E": "Pneumocystis jirovecii pneumonia (PCP)"}, "answer": "A", "rationale": "Correct answer: Hospital-acquired pneumonia (HAP)"}, {"number": 75, "question": "A 50-year-old otherwise healthy man presents to urgent care with productive cough, fever of 38.9°C, and a right lower lobe infiltrate consistent with community-acquired pneumonia. He reports a history of anaphylaxis to penicillin. His CURB-65 score is 0. What is the most appropriate antibiotic?", "choices": {"A": "Amoxicillin/clavulanate", "B": "Levofloxacin", "C": "Amoxicillin", "D": "Cefdinir", "E": "Doxycycline"}, "answer": "E", "rationale": "Correct answer: Doxycycline"}, {"number": 76, "question": "A 55-year-old man receiving an unfractionated heparin infusion for acute pulmonary embolism develops sudden onset hemoptysis with a supratherapeutic aPTT. The decision is made to urgently reverse his anticoagulation. What medication should be administered?", "choices": {"A": "Andexanet alfa", "B": "Protamine sulfate", "C": "Fresh frozen plasma (FFP)", "D": "Idarucizumab (Praxbind)", "E": "Vitamin K (phytonadione)"}, "answer": "B", "rationale": "Correct answer: Protamine sulfate"}, {"number": 77, "question": "A 67-year-old woman presents with fever, purulent cough, and a new lobar consolidation. Her CURB-65 score is 3, meeting criteria for hospital admission. She was hospitalized 3 weeks ago and received broad-spectrum IV antibiotics for a urinary tract infection. The team is concerned about MRSA. What antibiotic should be added?", "choices": {"A": "Piperacillin/tazobactam", "B": "Metronidazole", "C": "Azithromycin", "D": "Doxycycline", "E": "Vancomycin or linezolid"}, "answer": "E", "rationale": "Correct answer: Vancomycin or linezolid"}, {"number": 78, "question": "A 64-year-old man with atrial fibrillation is being started on rivaroxaban for stroke prevention. What is the most important counseling point you should emphasize regarding this medication?", "choices": {"A": "Avoid all foods containing vitamin K", "B": "Do not stop the medication abruptly due to increased thrombotic risk", "C": "Aspirin can be safely substituted if a dose is missed", "D": "Take it on an empty stomach only", "E": "Have your INR checked weekly"}, "answer": "B", "rationale": "Correct answer: Do not stop the medication abruptly due to increased thrombotic risk"}, {"number": 79, "question": "A 48-year-old man with a suspected massive pulmonary embolism causing hemodynamic instability is being evaluated for anticoagulation. The PA is deciding between unfractionated heparin and LMWH. What is the primary advantage of unfractionated heparin over LMWH in this emergent situation?", "choices": {"A": "Fewer drug-drug interactions", "B": "Faster onset of anticoagulation and ability to reverse rapidly", "C": "Longer duration of action reduces dosing frequency", "D": "No laboratory monitoring required", "E": "Lower cost per dose"}, "answer": "B", "rationale": "Correct answer: Faster onset of anticoagulation and ability to reverse rapidly"}, {"number": 80, "question": "A 45-year-old otherwise healthy man presents to urgent care with 5 days of fever, chills, and productive cough. Chest X-ray reveals a left lower lobe infiltrate consistent with community-acquired pneumonia. He has no drug allergies, no comorbidities, and his CURB-65 score is 0. What is the most appropriate antibiotic?", "choices": {"A": "Doxycycline", "B": "Levofloxacin", "C": "Azithromycin", "D": "Amoxicillin/clavulanate", "E": "Amoxicillin"}, "answer": "E", "rationale": "Correct answer: Amoxicillin"}, {"number": 81, "question": "A 57-year-old man with type 2 diabetes is diagnosed with community-acquired pneumonia and started on appropriate outpatient antibiotics. He asks his PA how many days he needs to take the medication. What is the recommended minimum duration of treatment?", "choices": {"A": "7 days", "B": "10 days", "C": "14 days", "D": "5 days", "E": "3 days"}, "answer": "D", "rationale": "Correct answer: 5 days"}, {"number": 82, "question": "A 52-year-old woman with a new pulmonary embolism is being evaluated for anticoagulation. Before prescribing heparin or LMWH, the PA reviews her history for contraindications. Which of the following is a contraindication to heparin or LMWH therapy?", "choices": {"A": "Recent spinal cord surgery", "B": "Hypertension", "C": "Hypothyroidism", "D": "CKD stage 2 (eGFR 72 mL/min)", "E": "Type 2 diabetes mellitus"}, "answer": "A", "rationale": "Correct answer: Recent spinal cord surgery"}, {"number": 83, "question": "A 55-year-old woman with diabetes mellitus and chronic kidney disease presents to the emergency department with 3 days of fever, chills, and productive cough. Chest X-ray confirms pneumonia. Her CURB-65 score is 1, below the threshold for hospital admission. What is the most appropriate outpatient antibiotic regimen?", "choices": {"A": "Azithromycin monotherapy", "B": "Levofloxacin monotherapy", "C": "Vancomycin plus piperacillin/tazobactam", "D": "Amoxicillin/clavulanate plus doxycycline", "E": "Amoxicillin monotherapy"}, "answer": "D", "rationale": "Correct answer: Amoxicillin/clavulanate plus doxycycline"}, {"number": 84, "question": "A 76-year-old man with atrial fibrillation and end-stage renal disease (eGFR 9 mL/min on hemodialysis) requires anticoagulation for stroke prevention. His nephrologist recommends warfarin rather than a direct oral anticoagulant. What is the primary reason warfarin is preferred in this patient?", "choices": {"A": "Warfarin has fewer drug interactions than DOACs", "B": "Warfarin is significantly less expensive", "C": "Severe renal dysfunction makes DOACs unsafe or poorly studied", "D": "Warfarin requires no therapeutic monitoring", "E": "Warfarin has a shorter half-life than DOACs"}, "answer": "C", "rationale": "Correct answer: Severe renal dysfunction makes DOACs unsafe or poorly studied"}];

function renderExam() {
  const exam = document.getElementById('exam');
  exam.innerHTML = questions.map((q, idx) => `
    <article class="question-card" id="qcard-${q.number}">
      <div class="qhead">
        <div class="qnum">Question ${q.number}</div>
        <div class="pill">${idx+1} / ${questions.length}</div>
      </div>
      <div class="qtext">${escapeHtml(q.question)}</div>
      <div class="choices">
        ${Object.entries(q.choices).map(([letter, text]) => `
          <label class="choice" data-q="${q.number}" data-letter="${letter}">
            <input type="radio" name="q${q.number}" value="${letter}">
            <span class="letter">${letter}.</span>
            <span>${escapeHtml(text)}</span>
          </label>
        `).join('')}
      </div>
      <div class="feedback" id="fb-${q.number}"></div>
    </article>
  `).join('');
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function gradeExam() {
  let correct = 0;
  let unanswered = 0;
  document.querySelectorAll('.choice').forEach(el => el.classList.remove('correct','incorrect'));
  document.querySelectorAll('.question-card').forEach(el => el.classList.remove('unanswered'));

  questions.forEach(q => {
    const selected = document.querySelector(`input[name="q${q.number}"]:checked`);
    const card = document.getElementById(`qcard-${q.number}`);
    const fb = document.getElementById(`fb-${q.number}`);
    const correctChoice = document.querySelector(`.choice[data-q="${q.number}"][data-letter="${q.answer}"]`);
    if (correctChoice) correctChoice.classList.add('correct');

    if (!selected) {
      unanswered++;
      card.classList.add('unanswered');
      fb.innerHTML = `Unanswered. Correct answer: <strong>${q.answer}</strong>. ${escapeHtml(q.rationale)}`;
      fb.classList.add('show');
      return;
    }

    if (selected.value === q.answer) {
      correct++;
      fb.innerHTML = `Correct. ${escapeHtml(q.rationale)}`;
    } else {
      const wrongChoice = document.querySelector(`.choice[data-q="${q.number}"][data-letter="${selected.value}"]`);
      if (wrongChoice) wrongChoice.classList.add('incorrect');
      fb.innerHTML = `Incorrect. You selected <strong>${selected.value}</strong>. Correct answer: <strong>${q.answer}</strong>. ${escapeHtml(q.rationale)}`;
    }
    fb.classList.add('show');
  });

  const percent = Math.round((correct / questions.length) * 100);
  const result = document.getElementById('result');
  result.innerHTML = `<strong>${correct} / ${questions.length} correct</strong><br>${percent}% score${unanswered ? ` • ${unanswered} unanswered` : ''}`;
  result.classList.add('show');
  window.scrollTo({top:0, behavior:'smooth'});
}

function resetExam() {
  document.querySelectorAll('input[type="radio"]').forEach(i => i.checked = false);
  document.querySelectorAll('.choice').forEach(el => el.classList.remove('correct','incorrect'));
  document.querySelectorAll('.feedback').forEach(el => { el.classList.remove('show'); el.innerHTML=''; });
  document.querySelectorAll('.question-card').forEach(el => { el.classList.remove('unanswered'); el.style.display=''; });
  document.getElementById('result').classList.remove('show');
  window.scrollTo({top:0, behavior:'smooth'});
}

function reviewMissed() {
  let anyMissed = false;
  questions.forEach(q => {
    const selected = document.querySelector(`input[name="q${q.number}"]:checked`);
    const card = document.getElementById(`qcard-${q.number}`);
    if (!selected || selected.value !== q.answer) {
      card.style.display = '';
      anyMissed = true;
    } else {
      card.style.display = 'none';
    }
  });
  if (!anyMissed) {
    document.querySelectorAll('.question-card').forEach(el => el.style.display = '');
    alert('No missed questions to review.');
  }
}

renderExam();
</script>
</body>
</html>
