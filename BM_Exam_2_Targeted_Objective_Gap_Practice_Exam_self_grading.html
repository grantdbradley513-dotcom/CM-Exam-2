<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Behavioral Medicine Exam 2 - Targeted Objective Gap Practice Exam</title>
  <style>
    :root {
      --bg: #eef4f8;
      --card: #ffffff;
      --ink: #182433;
      --muted: #617287;
      --blue: #1f5f8b;
      --blue2: #0e3d61;
      --line: #d9e5ee;
      --green: #197446;
      --green-bg: #e8f6ef;
      --red: #a32626;
      --red-bg: #fdecec;
      --gold: #916c11;
      --gold-bg: #fff6dc;
      --shadow: 0 18px 50px rgba(11, 48, 78, 0.12);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top left, #dbeef8 0, transparent 32rem), linear-gradient(180deg, #f7fbfe 0%, var(--bg) 100%);
      line-height: 1.55;
      font-size: 18px;
    }
    .app { max-width: 980px; margin: 0 auto; padding: 22px 16px 40px; }
    header {
      background: linear-gradient(135deg, var(--blue2), var(--blue));
      color: white;
      border-radius: var(--radius);
      padding: 26px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 12px;
      z-index: 5;
    }
    h1 { margin: 0 0 6px; font-size: clamp(1.65rem, 4vw, 2.4rem); line-height: 1.12; letter-spacing: -0.03em; }
    .subtitle { opacity: 0.92; font-size: 1rem; margin-bottom: 18px; }
    .topbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
    .pillrow { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.22); font-weight: 700; font-size: .92rem;
    }
    .progress-wrap { margin-top: 14px; background: rgba(255,255,255,.18); height: 12px; border-radius: 999px; overflow: hidden; }
    .progress { height: 100%; width: 0; background: #fff; border-radius: 999px; transition: width .25s ease; }
    main { margin-top: 18px; }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: clamp(18px, 3vw, 30px); box-shadow: var(--shadow);
    }
    .question-meta { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; color: var(--muted); font-weight: 800; }
    .review-badge { display: none; background: var(--gold-bg); color: var(--gold); border: 1px solid #f2d775; padding: 6px 10px; border-radius: 999px; font-size: .9rem; }
    .review-mode .review-badge { display: inline-flex; }
    .stem { font-size: clamp(1.1rem, 2.5vw, 1.28rem); font-weight: 760; margin-bottom: 18px; }
    .options { display: grid; gap: 12px; }
    label.option {
      display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: start;
      border: 2px solid var(--line); border-radius: 18px; padding: 14px 15px;
      cursor: pointer; background: #fbfdff; transition: border-color .15s ease, background .15s ease, transform .12s ease;
    }
    label.option:hover { border-color: #a8c9de; transform: translateY(-1px); }
    input[type="radio"] { width: 22px; height: 22px; margin-top: 3px; accent-color: var(--blue); }
    .opt-text { display: block; }
    .opt-letter { font-weight: 900; color: var(--blue2); margin-right: 6px; }
    label.correct { border-color: var(--green); background: var(--green-bg); }
    label.incorrect { border-color: var(--red); background: var(--red-bg); }
    label.unselected-wrong { opacity: .74; }
    .feedback { display: none; margin-top: 18px; border-radius: 18px; border: 1px solid var(--line); overflow: hidden; background: #f9fcff; }
    .graded .feedback { display: block; }
    .feedback .row { padding: 15px 16px; border-top: 1px solid var(--line); }
    .feedback .row:first-child { border-top: none; }
    .feedback strong { color: var(--blue2); }
    .result-banner { font-weight: 900; }
    .result-banner.correctText { color: var(--green); }
    .result-banner.incorrectText { color: var(--red); }
    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .controls-wide { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    button {
      border: none; border-radius: 16px; padding: 13px 16px; font-weight: 900; font-size: 1rem;
      cursor: pointer; transition: transform .12s ease, opacity .15s ease, background .15s ease;
      min-height: 48px;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .primary { background: var(--blue); color: #fff; }
    .secondary { background: #e5eef5; color: var(--blue2); }
    .danger { background: #f8e3e3; color: var(--red); }
    .gold { background: var(--gold-bg); color: var(--gold); }
    .summary { display: none; margin-top: 16px; }
    .summary.show { display: block; }
    .score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 16px 0; }
    .score-box { padding: 16px; border: 1px solid var(--line); background: #fbfdff; border-radius: 18px; text-align: center; }
    .score-big { display: block; font-size: 2rem; font-weight: 950; color: var(--blue2); line-height: 1.05; }
    details.report { margin-top: 16px; border: 1px solid var(--line); border-radius: 18px; background: #fbfdff; padding: 12px 16px; }
    details.report summary { cursor: pointer; font-weight: 900; color: var(--blue2); }
    .report-list { margin: 10px 0 0; padding-left: 20px; color: var(--muted); }
    @media (max-width: 700px) {
      body { font-size: 17px; }
      header { position: static; padding: 21px; }
      .controls { grid-template-columns: 1fr; }
      .score-grid { grid-template-columns: 1fr; }
      .topbar { align-items: stretch; }
      .pillrow { width: 100%; }
      .pill { flex: 1 1 auto; justify-content: center; }
      .controls-wide button { flex: 1 1 100%; }
    }
    @media print {
      header { position: static; }
      .controls, .controls-wide { display: none; }
      .card, header { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="app" id="appRoot">
    <header>
      <h1 id="examTitle"></h1>
      <div class="subtitle" id="examSubtitle"></div>
      <div class="topbar">
        <div class="pillrow">
          <span class="pill" id="progressText">Question 1 / 25</span>
          <span class="pill" id="answeredText">Answered 0 / 25</span>
          <span class="pill" id="scoreText">Not graded</span>
        </div>
      </div>
      <div class="progress-wrap" aria-label="Progress"><div class="progress" id="progressBar"></div></div>
    </header>

    <main>
      <section class="card" id="questionCard" aria-live="polite">
        <div class="question-meta">
          <span id="questionMeta"></span>
          <span class="review-badge">Reviewing missed questions</span>
        </div>
        <div class="stem" id="stem"></div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
        <div class="controls">
          <button class="secondary" id="prevBtn" type="button">Previous</button>
          <button class="secondary" id="nextBtn" type="button">Next</button>
        </div>
        <div class="controls-wide">
          <button class="primary" id="gradeBtn" type="button">Submit & Grade</button>
          <button class="gold" id="missedBtn" type="button">Review Missed Questions</button>
          <button class="secondary" id="allBtn" type="button">Show All Questions</button>
          <button class="danger" id="resetBtn" type="button">Reset Exam</button>
        </div>
      </section>

      <section class="card summary" id="summaryCard">
        <h2 style="margin-top:0">Score Report</h2>
        <div class="score-grid">
          <div class="score-box"><span class="score-big" id="summaryPercent">0%</span><span>Percent score</span></div>
          <div class="score-box"><span class="score-big" id="summaryCorrect">0/25</span><span>Number correct</span></div>
          <div class="score-box"><span class="score-big" id="summaryMissed">0</span><span>Missed questions</span></div>
        </div>
        <details class="report" open>
          <summary>Import Verification</summary>
          <ul class="report-list" id="importReport"></ul>
        </details>
      </section>
    </main>
  </div>

  <script id="exam-data" type="application/json">{"title": "Behavioral Medicine Exam 2 - Targeted Objective Gap Practice Exam", "subtitle": "Targeted add-on exam: previously uncovered/lightly covered objectives", "questions": [{"number": 1, "stem": "A 29-year-old woman comes to clinic 6 weeks after witnessing a violent assault in a parking lot. She says she has felt emotionally numb, avoids the store where it happened, and startles whenever someone walks behind her. She asks why the event is affecting her so strongly because she was not physically injured. Which description best captures the concept being assessed before deciding whether she meets criteria for a trauma- or stressor-related disorder?", "options": [{"letter": "A", "text": "A normal bereavement process after any emotionally painful loss"}, {"letter": "B", "text": "A transient state of mental strain that causes physiologic arousal but no behavioral change"}, {"letter": "C", "text": "A disordered psychiatric or behavioral state resulting from severe mental or emotional stress or physical injury, often tied to a horrific event or experience"}, {"letter": "D", "text": "A fixed false belief that persists despite contradictory evidence"}, {"letter": "E", "text": "A maladaptive personality pattern that begins in adolescence and remains stable over time"}], "answer": "C", "rationale": "Trauma is not limited to direct physical injury. In the study guide, trauma is described as a disordered psychiatric or behavioral state resulting from severe mental/emotional stress or physical injury, usually tied to a horrific event or experience.", "objective": "Trauma and Stressor-Related Disorders - Objective 4: Define trauma."}, {"number": 2, "stem": "A PA is teaching students how to recognize trauma exposure in behavioral medicine. Several patients report major life stressors. Which patient has the clearest exposure that should immediately raise concern for a trauma-related disorder such as ASD or PTSD rather than only an adjustment reaction?", "options": [{"letter": "A", "text": "A 22-year-old who was present when a coworker was shot and killed during a robbery"}, {"letter": "B", "text": "A 41-year-old who feels overwhelmed after being passed over for a promotion"}, {"letter": "C", "text": "A 19-year-old who is homesick after moving away for college"}, {"letter": "D", "text": "A 36-year-old who has persistent sadness after a mutual breakup"}, {"letter": "E", "text": "A 64-year-old who is worried about retirement finances"}], "answer": "A", "rationale": "PTSD/ASD-level trauma involves actual or threatened death, serious injury, or sexual violence, either directly, witnessed, learned about in a close person, or through repeated exposure to aversive details. The other choices are important stressors but are more consistent with non-traumatic stressors used in adjustment disorder questions.", "objective": "Trauma and Stressor-Related Disorders - Objective 4: Define trauma."}, {"number": 3, "stem": "A 42-year-old man has made six visits in 4 months for abdominal pain, headaches, insomnia, and irritability. Basic medical evaluation has been unrevealing. He appears guarded and becomes tearful when asked about sleep, saying, 'I just don't feel safe anywhere anymore.' He denies alcohol misuse and does not meet full criteria for major depressive disorder. What is the best next step in the primary-care visit?", "options": [{"letter": "A", "text": "Tell him that the symptoms are imaginary because testing has been normal"}, {"letter": "B", "text": "Start an antipsychotic because guarded behavior suggests a psychotic disorder"}, {"letter": "C", "text": "Refer directly for a personality-disorder evaluation without asking about trauma"}, {"letter": "D", "text": "Use a trauma-informed approach to ask about traumatic experiences and screen for trauma-related symptoms"}, {"letter": "E", "text": "Reassure him that trauma is unlikely unless he reports fear as the dominant emotion"}], "answer": "D", "rationale": "The study guide emphasizes that traumatic experiences and trauma history can underlie many primary-care presentations, so clinicians should screen and ask. The clinician should validate symptoms and continue appropriate medical evaluation, not dismiss symptoms as imaginary.", "objective": "Trauma and Stressor-Related Disorders - Objective 5: Recognize trauma history underlying primary-care presentations."}, {"number": 4, "stem": "A 16-year-old boy survived a serious motor vehicle collision 2 months ago. His mother says he has stopped playing basketball, snaps at teachers, has been in two fights, and says he feels 'nothing' most days. He denies panic attacks and says he is not afraid of cars. Which statement is most accurate?", "options": [{"letter": "A", "text": "A trauma-related reaction is unlikely because fear and anxiety are required as the dominant symptoms"}, {"letter": "B", "text": "Trauma reactions may present with anhedonia, dysphoria, anger, or aggression rather than only fear and anxiety"}, {"letter": "C", "text": "The presentation is diagnostic of conduct disorder because the symptoms began after age 15"}, {"letter": "D", "text": "The presentation is normal adolescent development and should not be screened further"}, {"letter": "E", "text": "Trauma screening is only appropriate if the patient directly asks for mental-health care"}], "answer": "B", "rationale": "Trauma responses can be atypical and may include anhedonia, dysphoria, anger, or aggression. Lack of obvious fear does not rule out clinically important trauma-related symptoms.", "objective": "Trauma and Stressor-Related Disorders -Objective 5: Recognize trauma history underlying primary-care presentations."}, {"number": 5, "stem": "A 34-year-old combat veteran screens positive on the PC-PTSD-5. He reports nightmares and avoidance but denies suicidal ideation, homicidal ideation, mania, psychosis, or substance withdrawal. He says he is not ready for medication but would consider trauma-focused counseling and peer support. Which resource plan is most appropriate?", "options": [{"letter": "A", "text": "Reassure him that a positive screen is diagnostic and no additional assessment is needed"}, {"letter": "B", "text": "Recommend only unstructured internet forums because formal trauma programs worsen avoidance"}, {"letter": "C", "text": "Refer him only to inpatient psychiatry because all positive PTSD screens require hospitalization"}, {"letter": "D", "text": "Advise him to avoid discussing the trauma until symptoms have fully resolved on their own"}, {"letter": "E", "text": "Offer mental-health referral for structured assessment/trauma-focused therapy and connect him with veteran-specific or local/national support resources"}], "answer": "E", "rationale": "A positive screen should lead to further assessment and appropriate referral. The study guide specifically lists local/national support groups and VA/veteran services as self-help/referral resources for trauma-related disorders.", "objective": "Trauma and Stressor-Related Disorders - Objective 9: Identify resources for self-help and referral."}, {"number": 6, "stem": "A 31-year-old woman presents 2 months after a sexual assault. She has intrusive memories, avoids leaving home, drinks nightly to sleep, and says, 'I don't know how much longer I can handle this.' She has no current plan but admits passive suicidal thoughts. Which management plan best fits the PA's role in trauma-related care?", "options": [{"letter": "A", "text": "Schedule routine follow-up in 6 months because PTSD cannot be treated until symptoms persist for 1 year"}, {"letter": "B", "text": "Prescribe prazosin as monotherapy and avoid discussing safety because it may worsen symptoms"}, {"letter": "C", "text": "Assess safety, provide support and crisis resources, and refer for trauma-focused psychotherapy with psychiatric evaluation as needed"}, {"letter": "D", "text": "Tell her to use only peer support groups because medications and therapy are not evidence based"}, {"letter": "E", "text": "Focus only on legal reporting and avoid discussing mental-health symptoms"}], "answer": "C", "rationale": "Persistent or severe symptoms, substance use, and suicide risk warrant referral and safety assessment. Trauma-focused psychotherapy and pharmacotherapy may be indicated, and advocacy includes support, safety, education, and resources.", "objective": "Trauma and Stressor-Related Disorders - Objectives 8-10, especially Objective 9: Resources/referral."}, {"number": 7, "stem": "A 38-year-old firefighter reports repeated exposure to fatal accident scenes. On the PC-PTSD-5, he answers yes to unwanted memories, avoidance, hypervigilance, emotional numbness, and guilt. He asks whether the screening result means he definitely has PTSD. What is the best response?", "options": [{"letter": "A", "text": "The screen suggests probable PTSD and should be followed by further assessment, preferably a structured interview or mental-health referral"}, {"letter": "B", "text": "The result confirms PTSD, so no additional clinical assessment is needed"}, {"letter": "C", "text": "The screen is negative unless the trauma involved direct personal injury"}, {"letter": "D", "text": "The screen is useful only in military veterans and should be ignored in first responders"}, {"letter": "E", "text": "The best next step is to avoid discussing trauma because repeated exposure is expected in his job"}], "answer": "A", "rationale": "The PC-PTSD-5 is a screening tool, not a final diagnosis. A positive screen should prompt further structured assessment and appropriate referral.", "objective": "Trauma and Stressor-Related Disorders - Objective 9: Self-help/referral resources; reinforces Objective 6."}, {"number": 8, "stem": "A patient discloses that she was assaulted last year and now avoids medical visits because she feels ashamed and worries clinicians will blame her. She is not in immediate danger and denies suicidal ideation. Which response best demonstrates trauma-informed advocacy in primary care?", "options": [{"letter": "A", "text": "Challenge her avoidance by asking for detailed descriptions of the assault during the first visit"}, {"letter": "B", "text": "Explain that shame is irrational because the event is in the past"}, {"letter": "C", "text": "Advise her to return only after she is ready to stop avoiding reminders"}, {"letter": "D", "text": "Validate her experience, assess safety, normalize common trauma reactions, and offer counseling/support resources"}, {"letter": "E", "text": "Avoid mentioning the trauma again because primary care should not address psychosocial history"}], "answer": "D", "rationale": "Advocacy includes support and safety, validation, education about common trauma reactions, encouraging discussion without forcing details, and referral/resources when needed. This approach also helps reduce avoidance of care.", "objective": "Trauma and Stressor-Related Disorders - Objective 8-9: Advocacy and resources."}, {"number": 9, "stem": "A 25-year-old man with schizophrenia is stable on a long-acting injectable antipsychotic but is unemployed, intermittently homeless, and socially isolated. He has no acute psychosis or suicidal ideation today. Which plan best reflects advocacy for a patient with a psychotic disorder rather than only symptom control?", "options": [{"letter": "A", "text": "Increase the antipsychotic dose until he obtains a job independently"}, {"letter": "B", "text": "Connect him with social work for housing/benefits, vocational rehabilitation, social-skills support, and community resources while continuing psychiatric care"}, {"letter": "C", "text": "Discharge him from follow-up because lack of hallucinations means functional recovery is complete"}, {"letter": "D", "text": "Recommend avoiding community programs because they increase stigma"}, {"letter": "E", "text": "Refer only to neurology because functional impairment is usually caused by occult seizure disorder"}], "answer": "B", "rationale": "Psychosis advocacy includes supporting housing, employment, and social participation - not just treating hallucinations or delusions. Social work/community resources and vocational rehabilitation are appropriate parts of care.", "objective": "Psychotic Disorders - Objective 7: Develop advocacy skills for persons with psychosis/psychotic disorders."}, {"number": 10, "stem": "A Latino college student reports hearing whispers when alone and says professors are intentionally ignoring him because of his accent. A clinician quickly labels the patient as paranoid and noncompliant without exploring cultural context, discrimination, language barriers, or collateral information. Which principle is most important for the PA to apply?", "options": [{"letter": "A", "text": "Psychotic disorders should not be assessed in patients from minority groups because misdiagnosis is common"}, {"letter": "B", "text": "Cultural stressors should replace the mental-status exam in the diagnostic process"}, {"letter": "C", "text": "The patient should be referred only to law enforcement because persecutory ideas predict violence"}, {"letter": "D", "text": "All concerns about discrimination should be treated as delusions until proven otherwise"}, {"letter": "E", "text": "Use culturally sensitive assessment to reduce misdiagnosis while still evaluating symptoms, safety, function, and possible psychosis"}], "answer": "E", "rationale": "The study guide notes that Black and Latino patients are more often misdiagnosed, so culturally sensitive care is part of advocacy. This does not mean ignoring symptoms; it means assessing them in context.", "objective": "Psychotic Disorders -Objective 7: Advocacy for persons with psychosis/psychotic disorders."}, {"number": 11, "stem": "The parents of a 20-year-old recently diagnosed with schizophrenia ask where they can learn about the illness, family support, legal advocacy, and community resources. Which recommendation best matches the resources emphasized for psychotic disorders?", "options": [{"letter": "A", "text": "NAMI, Treatment Advocacy Center, SAMHSA/PAIMI, and schizophrenia-focused advocacy organizations"}, {"letter": "B", "text": "Only a general fitness program because psychosis advocacy should avoid family education"}, {"letter": "C", "text": "A domestic-violence shelter hotline as the primary psychosis education resource"}, {"letter": "D", "text": "The PC-PTSD-5 website as the main family-support organization for schizophrenia"}, {"letter": "E", "text": "A detoxification program regardless of whether substance use is present"}], "answer": "A", "rationale": "The psychosis advocacy section lists resources such as NAMI, Treatment Advocacy Center, SAMHSA PAIMI, Hope for Schizophrenia, and Schizophrenia & Psychosis Action Alliance. Family education and support are part of advocacy.", "objective": "Psychotic Disorders - Objective 7: Advocacy/resources."}, {"number": 12, "stem": "A hospital committee is designing a community program for people with chronic psychotic disorders. One member argues the program should focus only on acute hallucinations and delusions because social needs are outside medicine. Which response best reflects high-yield advocacy content?", "options": [{"letter": "A", "text": "Social participation should be avoided because it worsens relapse risk"}, {"letter": "B", "text": "Advocacy should be limited to prescribing antipsychotics because schizophrenia has no social consequences"}, {"letter": "C", "text": "Housing and employment are useful only after all negative symptoms are gone"}, {"letter": "D", "text": "Psychotic disorders are major causes of disability, and providers should support housing, employment, and social participation"}, {"letter": "E", "text": "Community support is contraindicated because homelessness is unrelated to psychosis"}], "answer": "D", "rationale": "The study guide identifies psychotic disorders as a leading cause of disability and highlights increased homelessness/incarceration. Advocacy includes practical supports for housing, employment, and social participation.", "objective": "Psychotic Disorders - Objective 7: Advocacy."}, {"number": 13, "stem": "A 24-year-old with schizophrenia has stopped medication several times because he forgets appointments and has limited family support. His mother asks what can reduce future relapse while also helping him function. Which plan is most consistent with family-focused advocacy?", "options": [{"letter": "A", "text": "Avoid involving family because family support has no prognostic value"}, {"letter": "B", "text": "Tell the family relapse is unrelated to adherence and cannot be modified"}, {"letter": "C", "text": "Discuss adherence strategies such as long-acting injectables, involve supportive family when appropriate, and connect him to psychosocial/community supports"}, {"letter": "D", "text": "Use only benzodiazepines because antipsychotics do not affect relapse"}, {"letter": "E", "text": "Recommend stopping all services once acute hallucinations resolve"}], "answer": "C", "rationale": "Adherence is a major relapse factor, and family/social support is protective. Advocacy can include LAIs, family involvement, psychosocial supports, and community resources.", "objective": "Psychotic Disorders - Objective 7: Advocacy; also strengthens Objective 6 family/prognosis concepts."}, {"number": 14, "stem": "A student asks for the most accurate definition of psychotherapy before observing a clinic session. Which answer is best?", "options": [{"letter": "A", "text": "Any conversation with a friend that makes the patient feel understood"}, {"letter": "B", "text": "The informed, intentional application of clinical methods and interpersonal stances from established psychological principles to help modify behaviors, cognitions, emotions, or personal characteristics"}, {"letter": "C", "text": "A medication-management visit focused on changing neurotransmitter levels"}, {"letter": "D", "text": "A diagnostic label applied when patients have medically unexplained symptoms"}, {"letter": "E", "text": "A crisis-only intervention reserved for patients with psychosis or suicidal ideation"}], "answer": "B", "rationale": "This matches the psychotherapy definition in the study guide. It is intentional, principle-based, relational clinical work aimed at modifying thoughts, feelings, behaviors, and functioning.", "objective": "Psychotherapy 101 - Objective 1: Define psychotherapy."}, {"number": 15, "stem": "A 45-year-old man with anxiety says, 'I don't get therapy. Isn't it just paying someone to listen while I vent?' Which explanation best describes psychotherapy in patient-friendly language?", "options": [{"letter": "A", "text": "It is mainly a way to prove that symptoms are not real"}, {"letter": "B", "text": "It is a legal interview used to determine disability or criminal responsibility"}, {"letter": "C", "text": "It is an unstructured supportive conversation with no treatment goals"}, {"letter": "D", "text": "It is useful only when medication has failed for several years"}, {"letter": "E", "text": "It is a skilled, intentional treatment that uses the therapist-patient relationship to modify thoughts, feelings, and behaviors so the patient can function better"}], "answer": "E", "rationale": "The plain-language definition in the study guide describes psychotherapy as skilled, intentional treatment to modify thoughts, feelings, and behavior and improve functioning. It is not just venting or informal advice.", "objective": "Psychotherapy 101 - Objective 1: Define psychotherapy."}, {"number": 16, "stem": "A patient agrees to psychotherapy after her PA explains that she will talk openly with an objective, nonjudgmental professional and work collaboratively on patterns that affect her relationships and coping. Which core element of psychotherapy is the PA emphasizing?", "options": [{"letter": "A", "text": "A collaborative therapeutic relationship used to improve thoughts, feelings, behaviors, and function"}, {"letter": "B", "text": "A one-time diagnostic test that replaces the mental-status examination"}, {"letter": "C", "text": "A mandatory intervention that requires disclosure to the patient's employer"}, {"letter": "D", "text": "A treatment that is effective only if the therapist gives direct orders"}, {"letter": "E", "text": "A medication-free approach that should never be combined with pharmacotherapy"}], "answer": "A", "rationale": "Psychotherapy is collaborative and built on the therapist-patient relationship. The goal is improved functioning through work with feelings, thoughts, and behaviors.", "objective": "Psychotherapy 101 - Objective 1: Define psychotherapy."}, {"number": 17, "stem": "A 28-year-old patient asks why therapy is different from motivational quotes, prayer, or advice from a supportive friend. Which distinction is most accurate?", "options": [{"letter": "A", "text": "Therapy is identical to social support, but costs more because it occurs in a clinic"}, {"letter": "B", "text": "Therapy is only a place to receive reassurance and should not target behavior change"}, {"letter": "C", "text": "Therapy avoids emotions and focuses only on medical testing"}, {"letter": "D", "text": "Therapy intentionally applies established clinical methods to help modify cognitions, emotions, behaviors, or personal characteristics in a desired direction"}, {"letter": "E", "text": "Therapy is useful only for patients who have severe mental illness and no social support"}], "answer": "D", "rationale": "Psychotherapy is intentionally grounded in established psychological principles and clinical methods. Supportive relationships can be helpful, but psychotherapy is a structured clinical treatment.", "objective": "Psychotherapy 101 - Objective 1: Define psychotherapy."}, {"number": 18, "stem": "A 32-year-old woman reports that her former boyfriend repeatedly threatens her, tracks her location, and pressures her s ence."}, {"number": 20, "stem": "During a Georgia-focused lecture, a student asks what is included in family violence. Which answer best matches the legal concept emphasized in the study guide?", "options": [{"letter": "A", "text": "Only repeated physical assault between spouses"}, {"letter": "B", "text": "Only sexual violence between current partners"}, {"letter": "C", "text": "Only verbal arguments between people living together"}, {"letter": "D", "text": "Any psychological distress after a family argument, including normal discipline"}, {"letter": "E", "text": "Certain felonies or offenses such as battery, assault, stalking, property damage, unlawful restraint, or trespass between household members, excluding reasonable parental discipline"}], "answer": "E", "rationale": "The study guide defines Georgia family violence as specified felony or listed offenses between household members and notes that reasonable parental corporal punishment/discipline is excluded. It is broader than spouse-only assault.", "objective": "Domestic Violence/IPV - Objective 1: Define DV, IPV, and Family Violence."}, {"number": 21, "stem": "A PA is documenting a case involving a husband who controls his spouse's finances, isolates her from friends, and threatens to harm himself if she leaves. There has been no physical assault. Which documentation statement is most accurate?", "options": [{"letter": "A", "text": "This cannot be IPV because no physical injury occurred"}, {"letter": "B", "text": "This can be IPV because psychological harm and coercive control by a current or former partner are included"}, {"letter": "C", "text": "This should be documented only as work stress unless there is a police report"}, {"letter": "D", "text": "This is family violence only if the patient is a child or vulnerable adult"}, {"letter": "E", "text": "This is normal marital conflict because threats are directed toward himself rather than the patient"}], "answer": "B", "rationale": "IPV includes psychological harm by a current or former partner, not only physical injury. Coercion, threats, isolation, and economic abuse are methods of power and control.", "objective": "Domestic Violence/IPV - Objective 1: Define DV/IPV; reinforces perpetrator methods."}, {"number": 22, "stem": "A 27-year-old pregnant patient says her partner has begun checking her phone, preventing her from seeing her sister, and threatening to take the baby if she leaves. He has not hit her. Which framework best explains these behaviors?", "options": [{"letter": "A", "text": "The behaviors are normal jealousy unless they cause physical injury"}, {"letter": "B", "text": "The behaviors are most consistent with a psychotic disorder in the victim"}, {"letter": "C", "text": "The behaviors represent adjustment disorder because pregnancy is a stressor"}, {"letter": "D", "text": "They are methods of power and control within IPV/domestic violence, including isolation, threats, and use of children"}, {"letter": "E", "text": "They should be ignored until the patient asks directly for a shelter referral"}], "answer": "D", "rationale": "The IPV section emphasizes that abuse is about power and control, using tactics such as isolation, coercion/threats, and using children. IPV can begin or worsen during pregnancy and does not require physical assault to be clinically important.", "objective": "Domestic Violence/IPV - Objective 1; strengthens Objective 3 content through definitions."}, {"number": 23, "stem": "A 39-year-old patient presents for chronic pelvic pain, fatigue, poor sleep, and frequent missed work. Multiple prior evaluations have been unrevealing. She becomes anxious when asked about safety and says she has learned not to talk about 'things from home.' Which approach best reflects the trauma objective that was under-tested in the first exam?", "options": [{"letter": "A", "text": "Avoid trauma questions because somatic complaints are unrelated to past experiences"}, {"letter": "B", "text": "Tell her that primary care cannot address trauma history and refer only for more imaging"}, {"letter": "C", "text": "Recognize that trauma history can underlie primary-care presentations and ask about safety/trauma in a private, supportive, nonjudgmental manner"}, {"letter": "D", "text": "Diagnose PTSD immediately without assessing duration, symptoms, or impairment"}, {"letter": "E", "text": "Ask the partner to stay in the room so collateral information is available"}], "answer": "C", "rationale": "The study guide states that traumatic experiences and history of trauma underlie many primary-care presentations, so clinicians should screen and ask. Privacy and a nonjudgmental approach are especially important when safety or IPV is possible.", "objective": "Trauma and Stressor-Related Disorders - Objective 5: Trauma history in primary care."}, {"number": 24, "stem": "A 30-year-old patient with PTSD symptoms after a workplace shooting has no current suicidal ideation, no psychosis, and stable housing. She asks what options exist besides medication. Which recommendation best addresses the self-help/referral objective?", "options": [{"letter": "A", "text": "Avoid all trauma discussion because exposure-based approaches are never used"}, {"letter": "B", "text": "Offer referral for trauma-focused psychotherapy and provide local/national support resources or support groups, with medication referral if symptoms are severe or persistent"}, {"letter": "C", "text": "Recommend only benzodiazepines because therapy has no role in trauma-related disorders"}, {"letter": "D", "text": "Explain that primary care should not provide mental-health resources unless hospitalization is required"}, {"letter": "E", "text": "Tell her that support groups are appropriate only for veterans"}], "answer": "B", "rationale": "Trauma resources include local/national support groups and mental-health specialists for trauma-focused psychotherapy. Medication management can be added when appropriate, but psychotherapy and support resources are valid options.", "objective": "Trauma and Stressor-Related Disorders - Objective 9: Identify self-help and referral resources."}, {"number": 25, "stem": "A 46-year-old man with chronic schizophrenia sees primary care for weight gain and diabetes after years of antipsychotic treatment. He is psychiatrically stable but socially isolated and wants help reconnecting with work. Which interdisciplinary plan best represents psychosis advocacy?", "options": [{"letter": "A", "text": "Stop antipsychotic treatment without psychiatry input because medical comorbidity always outweighs relapse prevention"}, {"letter": "B", "text": "Focus only on A1c because primary care has no role in functional recovery"}, {"letter": "C", "text": "Refer to inpatient psychiatry even though he has no danger to self/others and no acute decompensation"}, {"letter": "D", "text": "Provide a list of shelters only if he becomes homeless, but otherwise avoid social needs"}, {"letter": "E", "text": "Coordinate primary care for metabolic comorbidities, psychiatry for medication management, and social work/community resources for employment, benefits, and social participation"}], "answer": "E", "rationale": "Advocacy for psychosis includes medical care, psychiatric treatment, and practical support for social participation, housing, benefits, and vocational functioning. The study guide emphasizes that providers must address function, not just symptoms.", "objective": "Psychotic Disorders - Objective 7: Advocacy for psychosis/psychotic disorders."}], "report": {"questionsFoundInPDF": 25, "questionsImported": 25, "questionsNotParsed": ["None"], "answerKeyDetected": true, "sourceFile": "BM_Exam_2_Targeted_Objective_Gap_Practice_Exam.pdf"}}</script>
  <script>
    const data = JSON.parse(document.getElementById('exam-data').textContent);
    const questions = data.questions;
    const state = {
      index: 0,
      answers: {},
      graded: false,
      reviewMissed: false,
      missedNumbers: []
    };

    const els = {
      root: document.getElementById('appRoot'),
      title: document.getElementById('examTitle'),
      subtitle: document.getElementById('examSubtitle'),
      progressText: document.getElementById('progressText'),
      answeredText: document.getElementById('answeredText'),
      scoreText: document.getElementById('scoreText'),
      progressBar: document.getElementById('progressBar'),
      questionMeta: document.getElementById('questionMeta'),
      stem: document.getElementById('stem'),
      options: document.getElementById('options'),
      feedback: document.getElementById('feedback'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      gradeBtn: document.getElementById('gradeBtn'),
      missedBtn: document.getElementById('missedBtn'),
      allBtn: document.getElementById('allBtn'),
      resetBtn: document.getElementById('resetBtn'),
      summaryCard: document.getElementById('summaryCard'),
      summaryPercent: document.getElementById('summaryPercent'),
      summaryCorrect: document.getElementById('summaryCorrect'),
      summaryMissed: document.getElementById('summaryMissed'),
      importReport: document.getElementById('importReport')
    };

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function activeList() {
      if (!state.reviewMissed) return questions.map((_, i) => i);
      return state.missedNumbers.map(num => questions.findIndex(q => q.number === num)).filter(i => i >= 0);
    }

    function currentQuestion() {
      return questions[state.index];
    }

    function answeredCount() {
      return Object.keys(state.answers).length;
    }

    function computeScore() {
      let correct = 0;
      const missed = [];
      for (const q of questions) {
        if (state.answers[q.number] === q.answer) correct += 1;
        else missed.push(q.number);
      }
      const percent = Math.round((correct / questions.length) * 100);
      return { correct, total: questions.length, percent, missed };
    }

    function updateTop() {
      const q = currentQuestion();
      const list = activeList();
      const reviewPosition = list.indexOf(state.index) + 1;
      const qPos = state.reviewMissed ? reviewPosition : state.index + 1;
      const qTotal = state.reviewMissed ? list.length : questions.length;
      els.progressText.textContent = `Question ${qPos} / ${qTotal}`;
      els.answeredText.textContent = `Answered ${answeredCount()} / ${questions.length}`;
      if (state.graded) {
        const s = computeScore();
        els.scoreText.textContent = `${s.percent}% • ${s.correct}/${s.total} correct`;
      } else {
        els.scoreText.textContent = 'Not graded';
      }
      const progress = state.reviewMissed ? (qTotal ? (qPos / qTotal) * 100 : 0) : ((state.index + 1) / questions.length) * 100;
      els.progressBar.style.width = `${progress}%`;
    }

    function renderReport() {
      const r = data.report;
      const items = [
        `Number of questions found: ${r.questionsFoundInPDF}`,
        `Number imported: ${r.questionsImported}`,
        `Answer key detected: ${r.answerKeyDetected ? 'Yes' : 'No'}`,
        `Questions that could not be parsed: ${Array.isArray(r.questionsNotParsed) ? r.questionsNotParsed.join('; ') : r.questionsNotParsed}`
      ];
      els.importReport.innerHTML = items.map(i => `<li>${escapeHTML(i)}</li>`).join('');
    }

    function renderQuestion() {
      const q = currentQuestion();
      els.root.classList.toggle('review-mode', state.reviewMissed);
      document.getElementById('questionCard').classList.toggle('graded', state.graded);
      els.questionMeta.textContent = `Question ${q.number}`;
      els.stem.textContent = q.stem;
      els.options.innerHTML = '';

      for (const opt of q.options) {
        const id = `q${q.number}_${opt.letter}`;
        const selected = state.answers[q.number] === opt.letter;
        const label = document.createElement('label');
        label.className = 'option';
        if (state.graded) {
          if (opt.letter === q.answer) label.classList.add('correct');
          if (selected && opt.letter !== q.answer) label.classList.add('incorrect');
          if (!selected && opt.letter !== q.answer) label.classList.add('unselected-wrong');
        }
        label.innerHTML = `
          <input type="radio" name="q${q.number}" id="${id}" value="${opt.letter}" ${selected ? 'checked' : ''} ${state.graded ? 'disabled' : ''} />
          <span class="opt-text"><span class="opt-letter">${opt.letter}.</span>${escapeHTML(opt.text)}</span>
        `;
        label.querySelector('input').addEventListener('change', (e) => {
          state.answers[q.number] = e.target.value;
          updateTop();
        });
        els.options.appendChild(label);
      }

      if (state.graded) {
        const selected = state.answers[q.number];
        const correct = selected === q.answer;
        const answerObj = q.options.find(o => o.letter === q.answer);
        els.feedback.innerHTML = `
          <div class="row result-banner ${correct ? 'correctText' : 'incorrectText'}">${correct ? 'Correct' : 'Incorrect'}${selected ? ` • You selected ${selected}` : ' • No answer selected'}</div>
          <div class="row"><strong>Correct answer:</strong> ${q.answer}. ${escapeHTML(answerObj ? answerObj.text : '')}</div>
          <div class="row"><strong>Objective:</strong> ${escapeHTML(q.objective || 'Not listed')}</div>
          <div class="row"><strong>Rationale:</strong> ${escapeHTML(q.rationale || 'No rationale available')}</div>
        `;
      } else {
        els.feedback.innerHTML = '';
      }

      const list = activeList();
      const pos = list.indexOf(state.index);
      els.prevBtn.disabled = state.reviewMissed ? pos <= 0 : state.index === 0;
      els.nextBtn.disabled = state.reviewMissed ? pos >= list.length - 1 : state.index === questions.length - 1;
      updateTop();
    }

    function move(delta) {
      if (state.reviewMissed) {
        const list = activeList();
        const pos = list.indexOf(state.index);
        const nextPos = Math.min(Math.max(pos + delta, 0), list.length - 1);
        if (list[nextPos] !== undefined) state.index = list[nextPos];
      } else {
        state.index = Math.min(Math.max(state.index + delta, 0), questions.length - 1);
      }
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function gradeExam() {
      state.graded = true;
      const s = computeScore();
      state.missedNumbers = s.missed;
      els.summaryCard.classList.add('show');
      els.summaryPercent.textContent = `${s.percent}%`;
      els.summaryCorrect.textContent = `${s.correct}/${s.total}`;
      els.summaryMissed.textContent = String(s.missed.length);
      renderQuestion();
      els.summaryCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function reviewMissed() {
      if (!state.graded) {
        gradeExam();
      }
      const s = computeScore();
      state.missedNumbers = s.missed;
      if (state.missedNumbers.length === 0) {
        alert('No missed questions to review.');
        return;
      }
      state.reviewMissed = true;
      state.index = questions.findIndex(q => q.number === state.missedNumbers[0]);
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showAll() {
      state.reviewMissed = false;
      renderQuestion();
    }

    function resetExam() {
      if (!confirm('Reset the exam and clear all answers?')) return;
      state.index = 0;
      state.answers = {};
      state.graded = false;
      state.reviewMissed = false;
      state.missedNumbers = [];
      els.summaryCard.classList.remove('show');
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    els.title.textContent = data.title;
    els.subtitle.textContent = data.subtitle;
    els.prevBtn.addEventListener('click', () => move(-1));
    els.nextBtn.addEventListener('click', () => move(1));
    els.gradeBtn.addEventListener('click', gradeExam);
    els.missedBtn.addEventListener('click', reviewMissed);
    els.allBtn.addEventListener('click', showAll);
    els.resetBtn.addEventListener('click', resetExam);
    renderReport();
    renderQuestion();
  </script>
</body>
</html>
