<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pharmacotherapy Practice Exam 1-20</title>
<style>
:root { --bg:#f5f7fb; --card:#ffffff; --ink:#172033; --muted:#637083; --accent:#2563eb; --accent2:#1e40af; --green:#d1fae5; --green-border:#10b981; --red:#fee2e2; --red-border:#ef4444; --line:#e5e7eb; }
* { box-sizing:border-box; }
body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; }
header { background:linear-gradient(135deg,#1e3a8a,#2563eb); color:white; padding:28px 18px; }
.header-inner { max-width:980px; margin:0 auto; }
h1 { margin:0 0 6px; font-size:clamp(1.6rem,4vw,2.5rem); }
.subtitle { opacity:.92; font-size:1rem; }
main { max-width:980px; margin:22px auto; padding:0 14px 44px; }
.toolbar, .score-card { background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:0 8px 24px rgba(15,23,42,.06); padding:16px; margin-bottom:18px; }
.toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; }
button { border:0; border-radius:12px; padding:12px 16px; font-weight:700; font-size:1rem; cursor:pointer; transition:.15s transform,.15s opacity; }
button:hover { transform:translateY(-1px); }
.primary { background:var(--accent); color:white; }
.secondary { background:#e0e7ff; color:#1e3a8a; }
.neutral { background:#eef2f7; color:#334155; }
.question-card { background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:0 8px 24px rgba(15,23,42,.06); padding:20px; margin-bottom:18px; }
.qnum { display:inline-block; background:#dbeafe; color:#1e40af; font-weight:800; padding:5px 10px; border-radius:999px; margin-bottom:10px; }
.stem { font-size:1.08rem; font-weight:650; margin:6px 0 15px; }
.option { display:flex; gap:10px; align-items:flex-start; border:2px solid var(--line); border-radius:14px; padding:12px; margin:10px 0; cursor:pointer; background:#fff; }
.option input { margin-top:5px; transform:scale(1.2); }
.option .letter { font-weight:800; min-width:1.5rem; }
.option.correct { background:var(--green); border-color:var(--green-border); }
.option.incorrect { background:var(--red); border-color:var(--red-border); }
.feedback { display:none; margin-top:12px; padding:12px; border-radius:12px; background:#f8fafc; border:1px solid var(--line); color:#334155; }
.feedback.show { display:block; }
.score-card { display:none; }
.score-card.show { display:block; }
.score-big { font-size:2rem; font-weight:900; color:#1e40af; margin:0; }
.missed-only .question-card.correct-question { display:none; }
.footer-note { color:var(--muted); font-size:.92rem; margin-top:18px; }
@media (max-width:640px) { .toolbar { align-items:stretch; } .toolbar div { width:100%; display:grid; gap:8px; } button { width:100%; } .question-card { padding:16px; } }
</style>
</head>
<body>
<header><div class="header-inner"><h1>Pharmacotherapy Practice Exam</h1><div class="subtitle">Questions 1-20 · Self-Grading HTML Exam</div></div></header>
<main id="app">
<section class="toolbar">
  <strong>Choose one answer per question, then submit.</strong>
  <div>
    <button class="primary" onclick="gradeExam()">Submit & Grade</button>
    <button class="secondary" onclick="reviewMissed()">Review Missed Questions</button>
    <button class="neutral" onclick="resetExam()">Reset Exam</button>
  </div>
</section>
<section id="score" class="score-card"></section>
<section id="questions"></section>
<p class="footer-note">Imported from PDF. Correct answers are based on the answer key included in the PDF.</p>
</main>
<script>
const questions = [{"number": 1, "stem": "A 63-year-old man presents with unilateral leg swelling and pain. Ultrasound confirms an acute popliteal vein DVT. He has no history of bleeding and no contraindications to anticoagulation. What is the most appropriate treatment?", "options": [{"letter": "A", "text": "Aspirin"}, {"letter": "B", "text": "Serial ultrasound surveillance"}, {"letter": "C", "text": "Apixaban"}, {"letter": "D", "text": "Inferior vena cava filter"}, {"letter": "E", "text": "Clopidogrel"}], "answer": "C", "rationale": ""}, {"number": 2, "stem": "A 72-year-old woman is being evaluated for anticoagulation after a new DVT. Which of the following is a contraindication to heparin or low-molecular-weight heparin therapy?", "options": [{"letter": "A", "text": "Active bleeding"}, {"letter": "B", "text": "Controlled hypertension"}, {"letter": "C", "text": "Hyperlipidemia"}, {"letter": "D", "text": "Stable COPD"}, {"letter": "E", "text": "Hypothyroidism"}], "answer": "A", "rationale": ""}, {"number": 3, "stem": "A 68-year-old patient with COPD continues to experience dyspnea despite current therapy. Which bronchodilator regimen would provide the greatest bronchodilation?", "options": [{"letter": "A", "text": "Formoterol"}, {"letter": "B", "text": "Montelukast"}, {"letter": "C", "text": "Montelukast + Formoterol"}, {"letter": "D", "text": "Formoterol + Tiotropium"}, {"letter": "E", "text": "Albuterol"}], "answer": "D", "rationale": ""}, {"number": 4, "stem": "A 42-year-old man has a positive IGRA, abnormal chest radiograph, and sputum culture confirming active tuberculosis. What is the next best step?", "options": [{"letter": "A", "text": "Begin corticosteroids"}, {"letter": "B", "text": "Obtain drug susceptibility testing or use local resistance patterns"}, {"letter": "C", "text": "Repeat IGRA"}, {"letter": "D", "text": "Discontinue evaluation"}, {"letter": "E", "text": "Treat as latent TB"}], "answer": "B", "rationale": ""}, {"number": 5, "stem": "A patient with COPD meets GOLD Group E criteria. Which maintenance regimen is recommended?", "options": [{"letter": "A", "text": "Albuterol alone"}, {"letter": "B", "text": "Tiotropium alone"}, {"letter": "C", "text": "Fluticasone alone"}, {"letter": "D", "text": "Umeclidinium/Vilanterol"}, {"letter": "E", "text": "Montelukast"}], "answer": "D", "rationale": ""}, {"number": 6, "stem": "A 38-year-old woman is diagnosed with latent tuberculosis infection. Which regimen is recommended to reduce progression to active disease?", "options": [{"letter": "A", "text": "Amoxicillin"}, {"letter": "B", "text": "Rifampin for 4 months"}, {"letter": "C", "text": "Azithromycin"}, {"letter": "D", "text": "Ceftriaxone"}, {"letter": "E", "text": "Doxycycline"}], "answer": "B", "rationale": ""}, {"number": 7, "stem": "A patient with COPD meets GOLD Group B criteria. Which controller regimen is preferred?", "options": [{"letter": "A", "text": "Umeclidinium/Vilanterol"}, {"letter": "B", "text": "Albuterol only"}, {"letter": "C", "text": "Fluticasone only"}, {"letter": "D", "text": "Montelukast"}, {"letter": "E", "text": "Prednisone"}], "answer": "A", "rationale": ""}, {"number": 8, "stem": "A 19-year-old woman has infrequent asthma symptoms occurring less than twice monthly. According to GINA Step 1, which treatment is preferred?", "options": [{"letter": "A", "text": "Tiotropium"}, {"letter": "B", "text": "Daily prednisone"}, {"letter": "C", "text": "As-needed low-dose Budesonide/Formoterol"}, {"letter": "D", "text": "Montelukast"}, {"letter": "E", "text": "Salmeterol"}], "answer": "C", "rationale": ""}, {"number": 9, "stem": "A hospitalized patient develops pneumonia after being mechanically ventilated for 3 days. What type of pneumonia is this?", "options": [{"letter": "A", "text": "Community-acquired pneumonia"}, {"letter": "B", "text": "Ventilator-associated pneumonia"}, {"letter": "C", "text": "Aspiration pneumonia"}, {"letter": "D", "text": "Atypical pneumonia"}, {"letter": "E", "text": "Walking pneumonia"}], "answer": "B", "rationale": ""}, {"number": 10, "stem": "A 55-year-old man with diabetes and CKD presents with community-acquired pneumonia. His CURB-65 score does not require admission. Which outpatient regimen is most appropriate?", "options": [{"letter": "A", "text": "Amoxicillin/Clavulanate + Doxycycline"}, {"letter": "B", "text": "Azithromycin alone"}, {"letter": "C", "text": "Levofloxacin only"}, {"letter": "D", "text": "Ceftriaxone IM"}, {"letter": "E", "text": "Doxycycline alone"}], "answer": "A", "rationale": ""}, {"number": 11, "stem": "A patient with severe renal dysfunction requires long-term anticoagulation. Why might warfarin be chosen instead of a DOAC?", "options": [{"letter": "A", "text": "Faster onset"}, {"letter": "B", "text": "Fewer interactions"}, {"letter": "C", "text": "Better efficacy in obesity"}, {"letter": "D", "text": "Severe renal dysfunction"}, {"letter": "E", "text": "No monitoring required"}], "answer": "D", "rationale": ""}, {"number": 12, "stem": "A patient is found to have an isolated posterior tibial vein DVT with no risk factors for extension. What is the preferred management?", "options": [{"letter": "A", "text": "Immediate thrombolysis"}, {"letter": "B", "text": "Apixaban indefinitely"}, {"letter": "C", "text": "Serial ultrasound surveillance"}, {"letter": "D", "text": "Warfarin plus heparin bridge"}, {"letter": "E", "text": "IVC filter"}], "answer": "C", "rationale": ""}, {"number": 13, "stem": "A patient with COPD meets Group B criteria. Which controller medication class combination is preferred?", "options": [{"letter": "A", "text": "ICS alone"}, {"letter": "B", "text": "LABA/LAMA combination"}, {"letter": "C", "text": "SABA only"}, {"letter": "D", "text": "LAMA only"}, {"letter": "E", "text": "Leukotriene modifier"}], "answer": "B", "rationale": ""}, {"number": 14, "stem": "A healthy 45-year-old man is diagnosed with uncomplicated outpatient community-acquired pneumonia. Which antibiotic is recommended?", "options": [{"letter": "A", "text": "Cefepime"}, {"letter": "B", "text": "Piperacillin/Tazobactam"}, {"letter": "C", "text": "Azithromycin"}, {"letter": "D", "text": "Amoxicillin"}, {"letter": "E", "text": "Meropenem"}], "answer": "D", "rationale": ""}, {"number": 15, "stem": "A pregnant woman is being treated for active tuberculosis. Which medication is generally avoided?", "options": [{"letter": "A", "text": "Rifampin"}, {"letter": "B", "text": "Ethambutol"}, {"letter": "C", "text": "Pyrazinamide"}, {"letter": "D", "text": "Isoniazid"}, {"letter": "E", "text": "Pyridoxine"}], "answer": "C", "rationale": ""}, {"number": 16, "stem": "A patient with COPD meets GOLD Group E criteria and has eosinophils >300 cells/µL. Which regimen is preferred?", "options": [{"letter": "A", "text": "Albuterol only"}, {"letter": "B", "text": "Budesonide/Formoterol"}, {"letter": "C", "text": "Umeclidinium only"}, {"letter": "D", "text": "Trelegy Ellipta"}, {"letter": "E", "text": "Montelukast"}], "answer": "D", "rationale": ""}, {"number": 17, "stem": "A patient with pneumonia requires admission and has risk factors for Pseudomonas infection. Which agent should be added?", "options": [{"letter": "A", "text": "Amoxicillin"}, {"letter": "B", "text": "Piperacillin/Tazobactam"}, {"letter": "C", "text": "Doxycycline"}, {"letter": "D", "text": "Azithromycin"}, {"letter": "E", "text": "Linezolid"}], "answer": "B", "rationale": ""}, {"number": 18, "stem": "A patient with advanced liver disease and renal insufficiency (Cr >2 mg/dL) is receiving TB therapy. Which medications may require dose reduction?", "options": [{"letter": "A", "text": "Rifampin and Isoniazid"}, {"letter": "B", "text": "Isoniazid and Pyridoxine"}, {"letter": "C", "text": "Pyrazinamide and Ethambutol"}, {"letter": "D", "text": "Rifapentine and Rifampin"}, {"letter": "E", "text": "Amoxicillin and Clavulanate"}], "answer": "C", "rationale": ""}, {"number": 19, "stem": "A patient with a peroneal vein DVT is initially observed, but repeat ultrasound shows extension toward a proximal vein. What is the next step?", "options": [{"letter": "A", "text": "Continue observation only"}, {"letter": "B", "text": "Start aspirin"}, {"letter": "C", "text": "Assess bleeding risk and anticoagulate if appropriate"}, {"letter": "D", "text": "Stop follow-up"}, {"letter": "E", "text": "Compression stockings only"}], "answer": "C", "rationale": ""}, {"number": 20, "stem": "A patient with exercise-induced asthma wants medication before a known trigger. Which option is appropriate prophylaxis?", "options": [{"letter": "A", "text": "Cromolyn"}, {"letter": "B", "text": "Tiotropium"}, {"letter": "C", "text": "Prednisone"}, {"letter": "D", "text": "Isoniazid"}, {"letter": "E", "text": "Umeclidinium"}], "answer": "A", "rationale": ""}];
const container = document.getElementById('questions');
function renderQuestions() {
  container.innerHTML = questions.map(q => `
    <article class="question-card" id="qcard-${q.number}" data-question="${q.number}">
      <div class="qnum">Question ${q.number}</div>
      <div class="stem">${escapeHtml(q.stem)}</div>
      <div class="options">
        ${q.options.map(o => `
          <label class="option" id="q${q.number}-${o.letter}">
            <input type="radio" name="q${q.number}" value="${o.letter}" />
            <span class="letter">${o.letter}.</span>
            <span>${escapeHtml(o.text)}</span>
          </label>
        `).join('')}
      </div>
      <div class="feedback" id="feedback-${q.number}"></div>
    </article>
  `).join('');
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
function gradeExam() {
  let correct = 0;
  questions.forEach(q => {
    const selected = document.querySelector(`input[name="q${q.number}"]:checked`);
    const selectedValue = selected ? selected.value : null;
    const card = document.getElementById(`qcard-${q.number}`);
    card.classList.remove('correct-question');
    q.options.forEach(o => document.getElementById(`q${q.number}-${o.letter}`).classList.remove('correct','incorrect'));
    const correctOption = q.options.find(o => o.letter === q.answer);
    document.getElementById(`q${q.number}-${q.answer}`).classList.add('correct');
    if (selectedValue && selectedValue !== q.answer) document.getElementById(`q${q.number}-${selectedValue}`).classList.add('incorrect');
    if (selectedValue === q.answer) { correct++; card.classList.add('correct-question'); }
    const fb = document.getElementById(`feedback-${q.number}`);
    fb.classList.add('show');
    fb.innerHTML = `<strong>Correct answer:</strong> ${q.answer}. ${escapeHtml(correctOption ? correctOption.text : '')}`;
  });
  const pct = Math.round((correct / questions.length) * 1000) / 10;
  const score = document.getElementById('score');
  score.classList.add('show');
  score.innerHTML = `<p class="score-big">${correct} / ${questions.length} correct (${pct}%)</p>`;
  document.body.classList.remove('missed-only');
  score.scrollIntoView({behavior:'smooth', block:'start'});
}
function resetExam() {
  document.querySelectorAll('input[type="radio"]').forEach(i => i.checked = false);
  document.querySelectorAll('.option').forEach(o => o.classList.remove('correct','incorrect'));
  document.querySelectorAll('.feedback').forEach(f => { f.classList.remove('show'); f.innerHTML=''; });
  document.querySelectorAll('.question-card').forEach(c => c.classList.remove('correct-question'));
  document.getElementById('score').classList.remove('show');
  document.getElementById('score').innerHTML = '';
  document.body.classList.remove('missed-only');
  window.scrollTo({top:0, behavior:'smooth'});
}
function reviewMissed() {
  if (!document.getElementById('score').classList.contains('show')) gradeExam();
  document.body.classList.add('missed-only');
  document.getElementById('questions').scrollIntoView({behavior:'smooth'});
}
renderQuestions();
</script>
</body>
</html>
