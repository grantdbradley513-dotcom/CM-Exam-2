<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Pulmonology Pharmacotherapy Practice Exam</title>
<style>
:root { --bg:#f5f7fb; --card:#fff; --ink:#1f2937; --muted:#64748b; --line:#d8e0ea; --blue:#2563eb; --green:#dcfce7; --green-border:#16a34a; --red:#fee2e2; --red-border:#dc2626; }
* { box-sizing: border-box; }
body { margin:0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background:var(--bg); color:var(--ink); line-height:1.55; }
header { background:linear-gradient(135deg,#0f172a,#1d4ed8); color:#fff; padding:28px 18px; text-align:center; }
header h1 { margin:0; font-size:clamp(1.45rem,4vw,2.25rem); }
header p { margin:8px 0 0; opacity:.9; }
main { max-width: 980px; margin: 0 auto; padding: 20px; }
.toolbar, .scorebox { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; box-shadow:0 8px 24px rgba(15,23,42,.06); margin-bottom:18px; }
.toolbar { display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
.progress { font-weight:700; color:#334155; }
button { border:0; border-radius:12px; padding:12px 16px; font-weight:800; cursor:pointer; font-size:1rem; }
.primary { background:var(--blue); color:white; }
.secondary { background:#e2e8f0; color:#0f172a; }
.danger { background:#fee2e2; color:#991b1b; }
.question-card { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:22px; margin-bottom:18px; box-shadow:0 10px 28px rgba(15,23,42,.07); }
.qnum { color:var(--blue); font-weight:900; text-transform:uppercase; letter-spacing:.05em; font-size:.86rem; margin-bottom:8px; }
.question-text { font-size:1.16rem; font-weight:750; margin-bottom:16px; }
.choice { display:flex; gap:12px; align-items:flex-start; padding:13px; border:1.5px solid var(--line); border-radius:14px; margin:10px 0; background:#fff; cursor:pointer; }
.choice:hover { border-color:#93c5fd; }
.choice input { margin-top:4px; transform:scale(1.15); }
.choice.correct { background:var(--green); border-color:var(--green-border); }
.choice.incorrect { background:var(--red); border-color:var(--red-border); }
.answer-note { display:none; margin-top:14px; padding:14px; border-radius:14px; background:#f8fafc; border:1px dashed #94a3b8; }
.answer-note.show { display:block; }
.scorebox { display:none; }
.scorebox.show { display:block; }
.scorebig { font-size:1.7rem; font-weight:900; margin:0 0 6px; }
.missed-list { margin-top:10px; }
@media (max-width:640px) { main { padding:14px; } .toolbar { display:block; } .toolbar button { width:100%; margin-top:10px; } .question-card { padding:17px; } }
</style>
</head>
<body>
<header>
<h1>Pulmonology Pharmacotherapy Practice Exam</h1>
<p>Self-grading board-review style exam • Single best answer</p>
</header>
<main>
<section class='toolbar'>
  <div class='progress' id='progress'>20 questions</div>
  <div>
    <button class='primary' onclick='gradeExam()'>Submit & Grade</button>
    <button class='secondary' onclick='reviewMissed()'>Review Missed Questions</button>
    <button class='danger' onclick='resetExam()'>Reset Exam</button>
  </div>
</section>
<section class='scorebox' id='scorebox'></section>
<form id='examForm'></form>
</main>
<script>
const questions = [{"number": 1, "question": "Which medication is most associated with orange-red body fluids, hepatotoxicity, and major drug interactions?", "choices": {"A": "Pyrazinamide", "B": "Rifampin", "C": "Isoniazid", "D": "Ethambutol"}, "answer": "B", "explanation": "Rationale not provided in the PDF."}, {"number": 2, "question": "Which medication is most associated with peripheral neuropathy and hepatotoxicity?", "choices": {"A": "Pyrazinamide", "B": "Isoniazid", "C": "Ethambutol", "D": "Rifampin"}, "answer": "B", "explanation": "Rationale not provided in the PDF."}, {"number": 3, "question": "Which medication is most associated with optic neuritis, decreased visual acuity, and red-green color blindness?", "choices": {"A": "Rifampin", "B": "Ethambutol", "C": "Pyrazinamide", "D": "Isoniazid"}, "answer": "B", "explanation": "Rationale not provided in the PDF."}, {"number": 4, "question": "Which medication is most associated with hyperuricemia, gout flares, and hepatotoxicity?", "choices": {"A": "Rifampin", "B": "Ethambutol", "C": "Isoniazid", "D": "Pyrazinamide"}, "answer": "D", "explanation": "Rationale not provided in the PDF."}, {"number": 5, "question": "Which medication is most associated with tachycardia, palpitations, tremor, and hypokalemia?", "choices": {"A": "Albuterol", "B": "Montelukast", "C": "Ipratropium", "D": "Tiotropium"}, "answer": "A", "explanation": "Rationale not provided in the PDF."}, {"number": 6, "question": "Which medication is most associated with oral candidiasis, dysphonia, and cough?", "choices": {"A": "Montelukast", "B": "Ipratropium", "C": "Fluticasone", "D": "Albuterol"}, "answer": "C", "explanation": "Rationale not provided in the PDF."}, {"number": 7, "question": "Which medication is most associated with drowsiness, dizziness, and nausea?", "choices": {"A": "Dextromethorphan", "B": "Guaifenesin", "C": "Benzonatate", "D": "Codeine"}, "answer": "A", "explanation": "Rationale not provided in the PDF."}, {"number": 8, "question": "Which medication is most associated with constipation, drowsiness, and nausea?", "choices": {"A": "Benzonatate", "B": "Codeine", "C": "Guaifenesin", "D": "Dextromethorphan"}, "answer": "B", "explanation": "Rationale not provided in the PDF."}, {"number": 9, "question": "Which medication is most associated with numbness of the mouth and throat if chewed?", "choices": {"A": "Guaifenesin", "B": "Benzonatate", "C": "Codeine", "D": "Dextromethorphan"}, "answer": "B", "explanation": "Rationale not provided in the PDF."}, {"number": 10, "question": "Which medication is most associated with nausea, vomiting, and dizziness?", "choices": {"A": "Guaifenesin", "B": "Montelukast", "C": "Codeine", "D": "Dextromethorphan"}, "answer": "A", "explanation": "Rationale not provided in the PDF."}, {"number": 11, "question": "Which medication carries a boxed warning for agitation, depression, sleep disturbances, and suicidal ideation?", "choices": {"A": "Tiotropium", "B": "Fluticasone", "C": "Montelukast", "D": "Albuterol"}, "answer": "C", "explanation": "Rationale not provided in the PDF."}, {"number": 12, "question": "Which medication commonly causes throat irritation but has otherwise minimal adverse effects?", "choices": {"A": "Formoterol", "B": "Montelukast", "C": "Albuterol", "D": "Cromolyn"}, "answer": "D", "explanation": "Rationale not provided in the PDF."}, {"number": 13, "question": "Which medication should not be chewed or crushed due to risk of local anesthesia and choking?", "choices": {"A": "Dextromethorphan", "B": "Guaifenesin", "C": "Codeine", "D": "Benzonatate"}, "answer": "D", "explanation": "Rationale not provided in the PDF."}, {"number": 14, "question": "Which medication is contraindicated with MAOI use within the previous 14 days?", "choices": {"A": "Codeine", "B": "Guaifenesin", "C": "Benzonatate", "D": "Dextromethorphan"}, "answer": "D", "explanation": "Rationale not provided in the PDF."}, {"number": 15, "question": "Which medication acts by stimulating beta2 receptors causing bronchodilation?", "choices": {"A": "Ipratropium", "B": "Cromolyn", "C": "Montelukast", "D": "Albuterol"}, "answer": "D", "explanation": "Rationale not provided in the PDF."}, {"number": 16, "question": "Which medication acts by blocking muscarinic receptors to prevent bronchoconstriction?", "choices": {"A": "Montelukast", "B": "Ipratropium", "C": "Albuterol", "D": "Formoterol"}, "answer": "B", "explanation": "Rationale not provided in the PDF."}, {"number": 17, "question": "Which medication blocks leukotriene-mediated bronchoconstriction, mucus secretion, and airway edema?", "choices": {"A": "Montelukast", "B": "Codeine", "C": "Fluticasone", "D": "Tiotropium"}, "answer": "A", "explanation": "Rationale not provided in the PDF."}, {"number": 18, "question": "Which medication anesthetizes stretch receptors in the respiratory tract to suppress cough?", "choices": {"A": "Guaifenesin", "B": "Dextromethorphan", "C": "Codeine", "D": "Benzonatate"}, "answer": "D", "explanation": "Rationale not provided in the PDF."}, {"number": 19, "question": "Which medication suppresses the cough center in the medulla through opioid agonism?", "choices": {"A": "Guaifenesin", "B": "Codeine", "C": "Dextromethorphan", "D": "Benzonatate"}, "answer": "B", "explanation": "Rationale not provided in the PDF."}, {"number": 20, "question": "Which medication is an expectorant that thins and loosens mucus?", "choices": {"A": "Benzonatate", "B": "Dextromethorphan", "C": "Guaifenesin", "D": "Codeine"}, "answer": "C", "explanation": "Rationale not provided in the PDF."}];
const form = document.getElementById('examForm');
function renderExam() {
  form.innerHTML = '';
  questions.forEach((q, idx) => {
    const card = document.createElement('section');
    card.className = 'question-card';
    card.id = 'question-' + q.number;
    let choices = Object.entries(q.choices).map(([letter, text]) => `
      <label class="choice" data-question="${q.number}" data-choice="${letter}">
        <input type="radio" name="q${q.number}" value="${letter}">
        <span><strong>${letter}.</strong> ${escapeHtml(text)}</span>
      </label>`).join('');
    card.innerHTML = `<div class="qnum">Question ${q.number}</div>
      <div class="question-text">${escapeHtml(q.question)}</div>
      <div class="choices">${choices}</div>
      <div class="answer-note" id="note-${q.number}"></div>`;
    form.appendChild(card);
  });
}
function escapeHtml(str) { return String(str).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function gradeExam() {
  let correct = 0, missed = [];
  questions.forEach(q => {
    const selected = document.querySelector(`input[name="q${q.number}"]:checked`);
    const selectedVal = selected ? selected.value : null;
    document.querySelectorAll(`[data-question="${q.number}"]`).forEach(el => {
      el.classList.remove('correct','incorrect');
      if (el.dataset.choice === q.answer) el.classList.add('correct');
      if (selectedVal && el.dataset.choice === selectedVal && selectedVal !== q.answer) el.classList.add('incorrect');
    });
    if (selectedVal === q.answer) correct++; else missed.push(q.number);
    const note = document.getElementById('note-' + q.number);
    note.classList.add('show');
    note.innerHTML = `<strong>Correct answer:</strong> ${q.answer}. ${escapeHtml(q.choices[q.answer])}<br><strong>Rationale:</strong> ${escapeHtml(q.explanation)}`;
  });
  const pct = Math.round((correct / questions.length) * 100);
  const scorebox = document.getElementById('scorebox');
  scorebox.classList.add('show');
  scorebox.innerHTML = `<p class="scorebig">Score: ${correct}/${questions.length} (${pct}%)</p>
    <p>${missed.length ? 'Missed questions: ' + missed.join(', ') : 'Perfect score.'}</p>`;
  window.scrollTo({top:0, behavior:'smooth'});
}
function resetExam() {
  document.getElementById('examForm').reset();
  document.querySelectorAll('.choice').forEach(el => el.classList.remove('correct','incorrect'));
  document.querySelectorAll('.answer-note').forEach(el => { el.classList.remove('show'); el.innerHTML=''; });
  document.getElementById('scorebox').classList.remove('show');
  window.scrollTo({top:0, behavior:'smooth'});
}
function reviewMissed() {
  const missed = [];
  questions.forEach(q => { const sel = document.querySelector(`input[name="q${q.number}"]:checked`); if (!sel || sel.value !== q.answer) missed.push(q.number); });
  if (!missed.length) { alert('No missed questions to review.'); return; }
  document.getElementById('question-' + missed[0]).scrollIntoView({behavior:'smooth', block:'start'});
}
renderExam();
</script>
</body>
</html>
